name: ansible-security-scanner
base: core24
adopt-info: scanner
title: Ansible Security Scanner
summary: "Security scanner for Ansible: malicious code, RCE, secrets, supply chain"
description: |
  Static SAST for Ansible content: playbooks, roles, collections, task
  files, vars, and inventories.

  Detects malicious code, remote code execution, command and template
  injection, hardcoded credentials, supply-chain risk, unauthorized cloud
  access, lateral movement, and reverse shells. Every finding ships with
  remediation guidance and maps to CWE, OWASP Top 10, OWASP ASVS, MITRE
  ATT&CK, NIST, and CIS.

  Over 1,000 rules across 30+ detection categories, auto-discovered from
  YAML pattern plugins. Outputs SARIF, CycloneDX SBOM, GitLab SAST, JUnit,
  JSON, HTML, and Markdown.

  CI-native and autofix-capable. Releases are Sigstore-signed with SLSA
  Build Level 3 provenance.
icon: snap/gui/icon.svg
license: Apache-2.0
source-code: https://github.com/cpeoples/ansible-security-scanner
issues: https://github.com/cpeoples/ansible-security-scanner/issues
contact: https://github.com/cpeoples/ansible-security-scanner/issues
donation: https://github.com/sponsors/cpeoples
website: https://cpeoples.github.io/ansible-security-scanner/
grade: stable

# Strict confinement sandboxes file access to the plugged interfaces: home
# (auto-connected) for content under the user's home directory, removable-media
# (connect manually) for mounted drives. System paths like /etc and /opt are
# out of scope by design.
confinement: strict

apps:
  ansible-security-scanner:
    command: bin/ansible-security-scanner
    plugs:
      - home
      - removable-media

parts:
  scanner:
    plugin: python
    source: .
    # core24 has no git, which hatch-vcs needs to resolve the version from
    # the tag; the workflow stamps it into snap/.version instead.
    build-packages:
      - git
    # Bundle the interpreter and stdlib so the venv is self-contained; drop
    # pyvenv.cfg so it doesn't resolve python to a build-time path at runtime.
    stage-packages:
      - python3-venv
      - python3.12-minimal
      - libpython3.12-minimal
      - libpython3.12-stdlib
    stage:
      - -pyvenv.cfg
    override-build: |
      git config --global --add safe.directory "${CRAFT_PART_BUILD}"
      craftctl set version="$(cat "${CRAFT_PROJECT_DIR}/snap/.version")"
      craftctl default
