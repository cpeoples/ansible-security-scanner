name: ansible-security-scanner
base: core24
adopt-info: scanner
title: Ansible Security Scanner
summary: Static security scanner for Ansible playbooks, roles, and collections
description: |
  Detects malicious code, RCE, command and template injection, hardcoded
  credentials, supply-chain risk, and unauthorized cloud access. Outputs
  SARIF, CycloneDX SBOM, and GitLab SAST.
icon: snap/gui/icon.svg
license: Apache-2.0
source-code: https://github.com/cpeoples/ansible-security-scanner
issues: https://github.com/cpeoples/ansible-security-scanner/issues
contact: https://github.com/cpeoples/ansible-security-scanner/issues
website: https://cpeoples.github.io/ansible-security-scanner/
grade: stable

# classic: the scanner reads whatever directory the user points it at
# (--directory /etc/ansible, /opt, mounted volumes, ...) and writes reports
# anywhere. strict confinement would sandbox it to $HOME and break that, so
# classic is required. Needs a one-time store review for the registered name.
confinement: classic

apps:
  ansible-security-scanner:
    command: bin/ansible-security-scanner

parts:
  scanner:
    plugin: python
    source: .
    # Built in destructive/host mode (see the workflow), so git and the tags
    # are present and hatch-vcs resolves the version from the release tag.
    override-pull: |
      craftctl default
      craftctl set version="$(git describe --tags --abbrev=0 | sed 's/^v//')"
