# -- YAML schema abuse --------------------------------------------------
# Render a deliberately-malformed YAML payload via copy.content so the
# dangerous tags are STRINGS inside our playbook (safe to yaml.safe_load)
# but still match the regex rules that run on raw file text.
- hosts: yaml_schema_abuse_examples
  tasks:
    - name: render a YAML payload exercising every schema-abuse trigger
      ansible.builtin.copy:
        dest: /tmp/malicious.yml
        # yamllint disable
        content: |
          # !!python/object deserialisation RCE
          pickled: !!python/object/apply:os.system ['id']
          # !!binary blob large enough to conceal a packed binary (>2KB b64)
          blob: !!binary |
            
          # anchor bomb / billion-laughs primitive
          leaf: &leaf "x"
          level1: &l1 [*leaf, *leaf, *leaf, *leaf, *leaf, *leaf, *leaf, *leaf, *leaf]
          # merge key silently scatters an api_token across consumers
          defaults: &d
            api_token: secret-hunter
          consumer:
            <<: *d
            api_token: override-anyway
          # duplicate key (PyYAML keeps the LAST value silently)
          task_with_dup:
            no_log: true
            when: true
            no_log: false
          # non-Python unsafe global tag (js, perl, etc.)
          js_payload: !!js/function "function(){return 1}"

