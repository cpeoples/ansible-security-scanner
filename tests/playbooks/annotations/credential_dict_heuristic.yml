---
# Test fixture: contract for the dict-based hardcoded-credentials heuristic.
#
# The scanner inspects every key/value pair in every dict it parses and
# flags values whose KEY looks credential-shaped AND whose VALUE looks
# secret-shaped. Historical false positives came from:
#
#   1. Vendor-prefix keys (github_*, aws_*, google_*, azure_*) being
#      treated as credential indicators on their own, regardless of
#      whether the value was an actual secret.
#   2. The value-plausibility check being just ``3 <= len <= 200``, so
#      any short unrelated string matched.
#
# Lines below use ``# scanner-test: expect <rule_id>`` / ``reject <rule_id>``
# to pin the contract. See tests/test_playbook_annotations.py.
#
# All values are SYNTHETIC - no real credentials, hostnames, org paths,
# or GitHub handles. This file lives in the repo and in CI output logs.

- name: fixture play for the credential-dict heuristic
  hosts: localhost
  gather_facts: false
  vars:
    # -- Genuine hardcoded credentials (MUST fire) ----------------------
    # Either the specific rule (hardcoded_password, hardcoded_api_key,
    # ...) or the generic dict heuristic (hardcoded_credentials) is an
    # acceptable detection - specific is preferred, generic is a fallback.
    password: "ExamplePlaceholder1!"                                     # scanner-test: expect hardcoded_password
    api_key: "ExampleApiKey1234567890"                                   # scanner-test: expect hardcoded_api_key
    admin_token: "ExampleToken1234ABCD"                                  # scanner-test: expect hardcoded_credentials

    # -- Vendor-prefix keys with non-secret values (MUST NOT fire) ------
    github_repo_path: "/example-org/example-repo"                        # scanner-test: reject hardcoded_credentials
    github_branch: "main"                                                # scanner-test: reject hardcoded_credentials
    github_owner: "example-owner"                                        # scanner-test: reject hardcoded_credentials
    aws_region: "us-west-2"                                              # scanner-test: reject hardcoded_credentials
    aws_account_id: "123456789012"                                       # scanner-test: reject hardcoded_credentials
    azure_location: "eastus"                                             # scanner-test: reject hardcoded_credentials
    google_project_id: "example-project-42"                              # scanner-test: reject hardcoded_credentials

    # -- Credential-shaped key but value is a Jinja var (MUST NOT fire) --
    vault_password: "{{ vault_service_password }}"                       # scanner-test: reject hardcoded_credentials
    token: "{{ lookup('env', 'APP_TOKEN') }}"                            # scanner-test: reject hardcoded_credentials

    # -- Credential-shaped key but value is a known-safe sentinel (MUST NOT fire) --
    password_policy: "complex"                                           # scanner-test: reject hardcoded_credentials
    auth_mode: "user-token"                                              # scanner-test: reject hardcoded_credentials
    secret_backend: "vault"                                              # scanner-test: reject hardcoded_credentials

    # -- Boolean-ish / numeric-only values (MUST NOT fire) --------------
    use_password: true                                                   # scanner-test: reject hardcoded_credentials
    token_ttl: 3600                                                      # scanner-test: reject hardcoded_credentials

  tasks:
    - name: noop
      ansible.builtin.debug:
        msg: fixture-only
