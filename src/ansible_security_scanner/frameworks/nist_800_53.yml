# NIST 800-53 Rev. 5 catalog - Security and Privacy Controls for Information
# Systems and Organizations.
#
# Purpose
# -------
# Maps every NIST 800-53 control identifier referenced by the scanner's
# patterns to its official control name and canonical URL. Consumed by
# `link_resolver` to enrich findings and render compliance coverage in
# Markdown / HTML / SARIF / JSON reports.
#
# Authoring rules
# ---------------
# 1. Add only controls actually referenced by a pattern YAML. The framework
#    test fails the build if a pattern references an unknown control ID.
# 2. IDs are stored in the canonical form used by NIST:
#      Family-NN        e.g. "AC-3"           (base control)
#      Family-NN(KK)    e.g. "AC-3(7)"        (control enhancement)
#    Families used by this scanner:
#      AC - Access Control
#      AU - Audit and Accountability
#      CM - Configuration Management
#      IA - Identification and Authentication
#      SC - System and Communications Protection
#      SI - System and Information Integrity
#      SA - System and Services Acquisition
#      RA - Risk Assessment
#      AT - Awareness and Training
#      IR - Incident Response
#      CP - Contingency Planning
#      PE - Physical and Environmental Protection
#      CA - Assessment, Authorization, and Monitoring
#    The resolver normalizes on lookup so patterns can write `nist-AC-3`,
#    `NIST-800-53-AC-3`, or bare `AC-3` and still match.
# 3. `name` is NIST's official control name verbatim. Source:
#    https://csrc.nist.gov/Projects/risk-management/sp800-53-controls
# 4. `url` is the NVD/OSCAL deep-link. We use the NVD control-browser form
#    because it renders usefully for both human operators and LLM agents.

