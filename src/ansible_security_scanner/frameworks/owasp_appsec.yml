---
# OWASP Top 10 - Application Security Risks
#
# Two editions are catalogued:
#
# - 2021 (current reference) - A01:2021 ... A10:2021
# - 2017 (legacy) - A1:2017 ... A10:2017
#
# Both are still referenced by patterns (rules inherited pre-2021 CWE-->OWASP
# mappings) and by external reports the scanner cross-references. Keeping
# both in the catalog preserves link resolution for either edition.
#
# Authoring rules:
# - IDs use the wire form the category is typically cited by:
#     2021 uses zero-padded (A01:2021). 2017 uses unpadded (A1:2017).
# - `name` is the full official category name (used in reports).
# - `url` is the canonical OWASP page for this category.
# - `cwe_primary` lists the CWE IDs the OWASP project explicitly names as
#   the primary mapped CWEs for that category. We use this at backfill time
#   to derive `owasp_appsec` tags from a rule's existing `cwe:` list.
#
# Source: https://owasp.org/Top10/ and https://owasp.org/www-project-top-ten/2017/

