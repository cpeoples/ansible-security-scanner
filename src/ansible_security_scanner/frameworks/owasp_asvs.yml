  level: "1"
  chapter: "V12"
"V12.3.5":
  name: "Untrusted file metadata not used directly with system API / libraries to protect against OS command injection"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x20-V12-Files-Resources.md#v123-file-execution-requirements"
  level: "1"
  chapter: "V12"
"V12.3.6":
  name: "Application does not include / execute functionality from untrusted sources such as unverified CDN / JavaScript, CSS, plugins"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x20-V12-Files-Resources.md#v123-file-execution-requirements"
  level: "2"
  chapter: "V12"
"V12.4.1":
  name: "Files obtained from untrusted sources stored outside the web root with limited permissions"
