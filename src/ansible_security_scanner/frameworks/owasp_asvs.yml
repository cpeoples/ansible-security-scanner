# OWASP Application Security Verification Standard (ASVS) v4.0.3
#
# The full catalog of verification requirements across chapters V1-V14.
# Many ASVS items are code-level (output encoding, session-cookie flags,
# XSS sanitisation) and do NOT map to an Ansible-playbook-level detector.
# We still list them all so:
#
# 1. `link_resolver` can render a clickable reference for any ASVS id a
#    third-party pattern / external tool might cite.
# 2. The backfill step can tag rules with *only* the ASVS ids that
#    genuinely apply (see the rule-level `owasp_asvs` field). Rules with
#    no applicable ASVS item simply carry `[]` - identical to how STIG
#    and other compliance frameworks are handled.
#
# ID format: Vx.y.z  (chapter . section . item), zero-decimals NOT padded.
# Level: 1 | 2 | 3  (the ASVS assurance level where this requirement
#   first appears). Informational for consumers; we do NOT currently use
#   it to partition the catalog.
#
# Source: https://owasp.org/www-project-application-security-verification-standard/
#         https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x10-V1-Architecture.md
#         ... (one file per chapter upstream)

