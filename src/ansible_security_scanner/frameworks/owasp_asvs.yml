  level: "2"
  chapter: "V6"
"V6.2.5":
  name: "Known insecure block modes (e.g. ECB) / padding modes (e.g. PKCS#1 v1.5) / weak cipher suites / hashes (e.g. MD5, SHA1) avoided"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x14-V6-Cryptography.md#v62-algorithms"
  level: "2"
  chapter: "V6"
"V6.2.6":
  name: "Nonces, initialization vectors, and other single-use numbers never used twice with a given encryption key"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x14-V6-Cryptography.md#v62-algorithms"
  level: "2"
  chapter: "V6"
"V6.2.7":
  name: "Encrypted data authenticated via signatures / authenticated cipher modes / HMAC against unauthorized change"
