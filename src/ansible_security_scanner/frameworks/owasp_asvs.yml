  level: "1"
  chapter: "V12"
"V12.3.2":
  name: "User-submitted filename metadata validated / ignored to prevent disclosure / modification / execution of server-side file resources"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x20-V12-Files-Resources.md#v123-file-execution-requirements"
  level: "1"
  chapter: "V12"
"V12.3.3":
  name: "User-submitted filename metadata validated / ignored to prevent disclosure / modification of server-side content / API"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x20-V12-Files-Resources.md#v123-file-execution-requirements"
  level: "1"
  chapter: "V12"
"V12.3.4":
  name: "Application protects against Reflective File Download (RFD) by validating / ignoring user-submitted filenames for JSON / JSONP / API"
