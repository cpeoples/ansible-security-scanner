  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x21-V13-API.md#v132-restful-web-service-verification-requirements"
  level: "1"
  chapter: "V13"
"V13.2.4":
  name: "REST services have anti-automation controls to protect against excessive calls, especially if the API is unauthenticated"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x21-V13-API.md#v132-restful-web-service-verification-requirements"
  level: "2"
  chapter: "V13"
"V13.2.5":
  name: "REST services explicitly check the incoming Content-Type to be the expected one, such as application/xml or application/json"
