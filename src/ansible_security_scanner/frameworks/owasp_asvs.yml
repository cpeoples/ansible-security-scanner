  level: "1"
  chapter: "V12"
"V12.5.1":
  name: "Web tier configured to serve only files with specific extensions to prevent unintentional information / source code leakage"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x20-V12-Files-Resources.md#v125-file-download-requirements"
  level: "1"
  chapter: "V12"
"V12.5.2":
  name: "Direct requests to uploaded files will never be executed as HTML / HTML content"
  url: "https://github.com/OWASP/ASVS/blob/v4.0.3/4.0/en/0x20-V12-Files-Resources.md#v125-file-download-requirements"
  level: "1"
  chapter: "V12"
