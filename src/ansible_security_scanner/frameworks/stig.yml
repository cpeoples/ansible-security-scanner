# OpenSCAP STIG catalog - DISA Security Technical Implementation Guide
# identifiers for the operating systems and platforms that this scanner
# most commonly audits (RHEL 8/9, Ubuntu 20.04/22.04, Kubernetes).
#
# Purpose
# -------
# Maps every STIG Vulnerability ID (V-XXXXXX) referenced by the scanner's
# patterns to its rule title and canonical URL. Consumed by `link_resolver`
# to enrich findings.
#
# Authoring rules
# ---------------
# 1. Add only STIG IDs actually referenced by a pattern YAML. The framework
#    test fails the build if a pattern references an unknown ID.
# 2. IDs are stored in the canonical form used by DISA: `V-NNNNNN`.
#    The alternate `SV-NNNNNNrNNNNNN_rule` form is NOT accepted here;
#    map to the V-prefixed short form.
#    The resolver normalizes on lookup so patterns may write `stig-V-230221`,
#    `V-230221`, or `STIG-V-230221` interchangeably.
# 3. `name` is the STIG rule title verbatim.
# 4. `url` points to DISA's STIG Viewer catalog for the most recent release.
# 5. `platform` field records the target OS/platform for filtering.
#
# These are representative / commonly-cited STIG IDs from the RHEL-8, RHEL-9,
# Ubuntu 22.04, and Kubernetes STIGs. Coverage is intentionally narrow -
# STIG catalogs contain thousands of rules; we include only those that map
# cleanly to Ansible-detectable findings.

