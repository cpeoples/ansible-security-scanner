# HIPAA §164.312 catalog - HIPAA Security Rule, Technical Safeguards.
#
# Purpose
# -------
# Maps every HIPAA Security Rule technical-safeguard citation referenced by
# the scanner's patterns to its official title and canonical URL. Consumed
# by `link_resolver` to enrich findings.
#
# Authoring rules
# ---------------
# 1. Add only safeguards actually referenced by a pattern YAML. The framework
#    test fails the build if a pattern references an unknown ID.
# 2. IDs are stored in the canonical form used by CFR:
#      164.312(a)(1)          - safeguard
#      164.312(a)(2)(i)       - implementation specification (required)
#      164.312(a)(2)(iv)      - implementation specification (addressable)
#    The resolver normalizes on lookup so patterns may write `hipaa-164.312(a)(1)`,
#    `164.312(a)(1)`, or `HIPAA-164.312(a)(1)` interchangeably.
# 3. `name` is the 45 CFR §164.312 verbatim heading / specification text.
# 4. `url` is the eCFR permalink to §164.312.
#
# We limit this catalog to §164.312 (Technical Safeguards) because those are
# the ones realistically detectable in Ansible code. §164.308 (Administrative)
# and §164.310 (Physical) are org-process / facility controls that a static
# code scanner cannot verify.

# -- (a) Access Control ----------------------------------------------------
