# MITRE ATLAS technique catalog - Adversarial Threat Landscape for AI Systems
# (v5.4.0, Feb 2026 release / v5.1.0 Nov 2025 expansion).
#
# Purpose
# -------
# Maps every MITRE ATLAS technique ID referenced by the scanner's AI/ML patterns
# to its official name, parent technique (for sub-techniques), tactic(s), and
# canonical URL. ATLAS is the AI/ML counterpart of MITRE ATT&CK; its IDs are
# namespaced with the `AML.` prefix (Adversarial Machine Learning). Consumed by
# `link_resolver` to enrich findings in Markdown / HTML / SARIF / CycloneDX
# reports.
#
# Authoring rules
# ---------------
# 1. Add only techniques actually referenced by a pattern YAML. An automated
#    test in `tests/test_framework_catalog.py` fails the build if a pattern
#    references an ID not listed here, so "curated by need" is enforced.
# 2. Use MITRE's canonical names verbatim - don't paraphrase. Source:
#    https://atlas.mitre.org/matrices/ATLAS
# 3. `parent` is set for sub-techniques (IDs of the form AML.TNNNN.NNN). For
#    top-level techniques it's omitted.
# 4. `url` must be the deep-link shape: /techniques/AML.TNNNN or
#    /techniques/AML.TNNNN.NNN (ATLAS uses `.` separators, not `/`).
# 5. `tactics` is a list (a few techniques span more than one tactic).

