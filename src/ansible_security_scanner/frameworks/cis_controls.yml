# CIS Controls catalog - CIS Critical Security Controls v8, CIS Kubernetes
# Benchmark v1.9, and informal category tokens in use today.
#
# Purpose
# -------
# Maps every CIS identifier referenced by the scanner's patterns to a
# human-readable name and a link target. Consumed by `link_resolver`.
#
# Why this file has three kinds of entries
# ----------------------------------------
# 1. Numeric v8 safeguards (CIS-N.M[.O])
#    These are the formal v8 safeguards. CIS publishes the full framework
#    on a gated page; we deep-link to the v8 landing page rather than
#    pretending we have per-safeguard anchors.
# 2. CIS Kubernetes Benchmark safeguards (CIS-K8s-N.M.O)
#    The K8s Benchmark uses the same section numbers as the CIS document
#    (v1.9 at time of writing). We link to the benchmark landing page.
# 3. Informal category tokens (CIS-Docker, CIS-Network, CIS-Secrets, CIS-Supply-Chain)
#    These predate the formal mapping and stay here for backward compat.
#    They aren't real CIS safeguard IDs, but patterns reference them today
#    and we don't want to churn behaviour. If a future contributor wants to
#    migrate them to the numeric form, that's a pattern-file edit, not a
#    catalog edit.
#
# Authoring rules
# ---------------
# - Keep ID strings verbatim as they appear in pattern YAML. The test
#   enforces catalog coverage for every ID used by a pattern.
# - `name` is the short description CIS publishes for that safeguard, or
#   a descriptive label for the informal tokens.
# - `url` points at a real, free, no-auth landing page. We do not pretend
#   to deep-link to paywalled content.

CIS_DOCKER_URL: &cis_docker_url "https://www.cisecurity.org/benchmark/docker"
CIS_K8S_URL: &cis_k8s_url "https://www.cisecurity.org/benchmark/kubernetes"
CIS_V8_URL: &cis_v8_url "https://www.cisecurity.org/controls/v8"

