# CWE catalog - MITRE Common Weakness Enumeration (v4.14).
#
# Purpose
# -------
# Maps every CWE ID referenced by the scanner's patterns to its official name
# and canonical URL. Consumed by `link_resolver` to enrich findings.
#
# Authoring rules
# ---------------
# 1. Add only CWEs actually referenced by a pattern YAML. The framework test
#    fails the build if a pattern references an unknown CWE.
# 2. IDs are stored in the canonical `CWE-N` form (hyphen, uppercase, no
#    leading zeros). The resolver normalizes on lookup so patterns can write
#    `cwe-78`, `CWE-78`, or bare `78` and still match.
# 3. `name` is MITRE's official weakness name verbatim. Source:
#    https://cwe.mitre.org/data/index.html
# 4. `url` is the direct deep-link: /data/definitions/N.html

