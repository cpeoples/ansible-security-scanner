# CVE catalog - publicly disclosed vulnerabilities cited by scanner rules.
#
# Purpose
# -------
# Maps every CVE identifier referenced by a pattern's ``cve:`` field, title,
# description, or recommendation to a concise human-readable name and the
# canonical NVD detail URL. Consumed by ``link_resolver.resolve_cve``.
#
# Authoring rules
# ---------------
# 1. Add an entry for every CVE referenced anywhere in the patterns/ tree. The
#    framework-catalog test fails the build if a pattern cites an unknown CVE.
# 2. IDs are stored in the canonical ``CVE-YYYY-NNNN`` form (uppercase,
#    hyphenated). The resolver normalizes input so authors may write
#    ``cve-2024-3094``, ``CVE_2024_3094``, or even bare ``2024-3094`` and still
#    match.
# 3. ``name`` is a short identifier (vendor + product + class of vuln, or a
#    well-known nickname). Keep under ~80 chars; full description belongs in
#    the rule's ``description``.
# 4. ``url`` is always the NVD detail page. The resolver synthesizes the same
#    URL on the fly for valid-but-uncatalogued CVEs, so adding an entry here
#    is purely for the human-readable ``name``.
#
# Note: this catalog is intentionally a hand-curated subset, not a mirror of
# NVD. Entries exist iff some rule has a reason to cite the CVE.

