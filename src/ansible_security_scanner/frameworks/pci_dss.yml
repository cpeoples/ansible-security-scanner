# PCI-DSS v4.0 catalog - Payment Card Industry Data Security Standard.
#
# Purpose
# -------
# Maps every PCI-DSS v4.0 requirement identifier referenced by the scanner's
# patterns to its requirement name and canonical URL. Consumed by
# `link_resolver` to enrich findings.
#
# Authoring rules
# ---------------
# 1. Add only requirements actually referenced by a pattern YAML. The
#    framework test fails the build if a pattern references an unknown ID.
# 2. IDs are stored in the canonical form used by PCI SSC: top-level
#    requirement 1-12, then dotted sub-requirements, e.g.
#      "1.3.1"       - base requirement
#      "3.5.1.2"     - sub-sub-requirement (v4 has three-level nesting)
#    The resolver normalizes on lookup: `pci-3.5.1.2`, `PCI-DSS-3.5.1.2`,
#    and `3.5.1.2` all match.
# 3. `name` is the PCI SSC short requirement wording. Source:
#    https://www.pcisecuritystandards.org/document_library/
# 4. `url` points to the PCI SSC document library. PCI-SSC does not publish
#    stable per-requirement URLs, so we use the document-level anchor.

# -- Requirement 1 - Install and Maintain Network Security Controls --------
"1.2.1":
  name: "Configuration standards for NSC rulesets are defined and implemented"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "1 - Network Security Controls"

"1.3.1":
  name: "Inbound traffic to the CDE is restricted to only that which is necessary"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "1 - Network Security Controls"

"1.3.2":
  name: "Outbound traffic from the CDE is restricted to only that which is necessary"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "1 - Network Security Controls"

"1.4.1":
  name: "NSCs are implemented between trusted and untrusted networks"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "1 - Network Security Controls"

# -- Requirement 2 - Apply Secure Configurations to All System Components --
"2.2.1":
  name: "Configuration standards are developed and maintained for all system components"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "2 - Secure Configuration"

"2.2.2":
  name: "Vendor default accounts are managed (changed or disabled)"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "2 - Secure Configuration"

"2.2.4":
  name: "Only necessary services, protocols, daemons, and functions are enabled"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "2 - Secure Configuration"

"2.2.7":
  name: "All non-console administrative access is encrypted using strong cryptography"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "2 - Secure Configuration"

# -- Requirement 3 - Protect Stored Account Data --------------------------
"3.3.1":
  name: "SAD is not retained after authorization"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "3 - Protect Stored Account Data"

"3.5.1":
  name: "PAN is rendered unreadable wherever it is stored"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "3 - Protect Stored Account Data"

"3.5.1.2":
  name: "Disk-level / partition-level encryption is only used on removable media, or is used with one of the approved methods of PAN protection"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "3 - Protect Stored Account Data"

"3.6.1":
  name: "Procedures are defined and implemented to protect cryptographic keys"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "3 - Protect Stored Account Data"

# -- Requirement 4 - Protect Cardholder Data with Strong Cryptography ------
"4.2.1":
  name: "Strong cryptography and security protocols safeguard PAN during transmission over open, public networks"
  url: "https://www.pcisecuritystandards.org/document_library/"

"4.2.2":
  name: "PAN is secured with strong cryptography whenever it is sent via end-user messaging technologies"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "4 - Protect CHD in Transit"

"4.2.1.1":
  name: "An inventory of the entity's trusted keys and certificates used to protect PAN is maintained"
  url: "https://www.pcisecuritystandards.org/document_library/"
  requirement: "4 - Protect CHD in Transit"

# -- Requirement 6 - Develop and Maintain Secure Systems and Software -----
"6.2.4":
