# MITRE ATT&CK technique catalog - Enterprise matrix v15 (2024-04-23 release).
#
# Purpose
# -------
# Maps every MITRE ATT&CK technique ID referenced by the scanner's patterns to
# its official name, parent technique (for sub-techniques), tactic(s), and
# canonical URL. Consumed by `link_resolver` to enrich findings in the
# Markdown / HTML / SARIF / CycloneDX reports.
#
# Authoring rules
# ---------------
# 1. Add only techniques actually referenced by a pattern YAML. An automated
#    test in `tests/test_framework_catalog.py` fails the build if a pattern
#    references an ID not listed here, so "curated by need" is enforced.
# 2. Use MITRE's canonical names verbatim - don't paraphrase. Source:
#    https://attack.mitre.org/techniques/enterprise/
# 3. `parent` is set for sub-techniques (IDs of the form Txxxx.NNN). For
#    top-level techniques it's omitted.
# 4. `url` must be the deep-link shape: /techniques/Txxxx/ or /techniques/Txxxx/NNN/.
# 5. `tactics` is a list (some techniques belong to more than one).

