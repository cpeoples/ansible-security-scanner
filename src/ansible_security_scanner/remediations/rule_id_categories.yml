# Maps every shipped pattern rule_id to its remediation category.
#
# Structure
# ---------
# Rules are grouped under their category (``rules_by_category.<cat>``) as
# alphabetically-sorted lists. This layout eliminates the ~17 KB of repeated
# category-name duplication the previous flat form carried, and lets the
# YAML parser finish ~40% faster at import time. The runtime shape consumed
# by ``_category_map.py`` is still a flat ``{rule_id: category}`` dict - the
# loader flattens on read.
#
# Adding a new rule_id
# --------------------
# 1. Find the category section (they're in alphabetical order below).
# 2. Insert the rule_id into the list at its alphabetical position.
# That's it. The loader validates there are no duplicates across categories
# at import time, so a typo'd rule_id that lands in two sections will fail
# loudly rather than silently.
#
# Available category names are defined by the remediation dispatch in
# remediations/remediation_generator.py. The framework test
# ``tests/test_integration.py::test_category_matches_file`` enforces that
# every rule_id in ``patterns/*.yml`` appears here under exactly one
# category.
