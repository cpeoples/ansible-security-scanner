    title: "Sigstore policy-controller / Kyverno ClusterImagePolicy In Warn Mode Not Enforce"
    description: "A task renders a `ClusterImagePolicy` (sigstore policy-controller), `VerifyImages` ClusterPolicy (Kyverno), or `ImagePolicy` (Tekton Chains) with `mode: warn` / `validationFailureAction: Audit` / `failurePolicy: Ignore`. Warn-mode admission policies log violations but DO NOT block deploy - meaning an unsigned / untrusted image still reaches the node and executes. This defeats the entire point of image signature verification and is the 2024 finding most frequently left open from `policy-controller` / Kyverno rollouts that were 'almost' enforced."
    regex: "kind\\s*:\\s*(?:ClusterImagePolicy|ClusterPolicy|VerifyImages)[\\s\\S]{0,1200}?(?:mode\\s*:\\s*['\"]?warn['\"]?|validationFailureAction\\s*:\\s*['\"]?(?:[Aa]udit|warn)['\"]?|failurePolicy\\s*:\\s*['\"]?Ignore['\"]?)"
