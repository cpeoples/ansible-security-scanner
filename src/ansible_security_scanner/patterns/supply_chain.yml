    hipaa: ['164.308(a)(5)(ii)(D)', '164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC6.2', 'CC6.3']

  - id: "github_actions_pull_request_target_with_checkout"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "GitHub Actions workflow uses pull_request_target with checkout of PR HEAD (pwn request)"
    description: "A task renders a `.github/workflows/*.yml` containing `on: pull_request_target` AND an `actions/checkout@v*` step that checks out `${{ github.event.pull_request.head.sha }}` / `head.ref` / `refs/pull/${{ ... }}/merge` / `refs/pull/${{ ... }}/head`. `pull_request_target` runs with write-scoped `GITHUB_TOKEN` and access to repository secrets, AND by default targets the base-branch workflow file - but checking out the PR head merges attacker-controlled code INTO that privileged context. This is the canonical 'pwn request' pattern (GHSA-CKM5-PF4V-FG99, NX 2024 incident, Tj-actions/changed-files 2025) and has leaked thousands of secrets across OSS repos."
    regex: "on\\s*:\\s*[\\s\\S]{0,200}?pull_request_target[\\s\\S]{0,2000}?uses\\s*:\\s*actions/checkout@v[0-9][\\s\\S]{0,300}?(?:ref\\s*:\\s*\\$\\{\\{\\s*github\\.event\\.pull_request\\.head\\.(?:sha|ref)|ref\\s*:\\s*refs/pull/\\$\\{\\{\\s*github\\.event\\.(?:pull_request|number))"
    multiline: true
    window: 60
    positive_examples:
      - |2
        on:
          pull_request_target:
            branches: [main]
        jobs:
          test:
            steps:
              - uses: actions/checkout@v4
                with:
                  ref: ${{ github.event.pull_request.head.sha }}
    recommendation: "Do NOT combine `pull_request_target` with a checkout of the PR head. Either (a) use `pull_request` - which runs in a fork-isolated context without repo secrets and without write token - for any step that builds/tests attacker-controlled code, or (b) split the workflow into two jobs: a `pull_request_target` job that only reads PR metadata (labels, approved-by) and a downstream `workflow_run`-triggered job that does the privileged work on already-merged / already-approved commits. If you must check out the PR head in `pull_request_target`, explicitly require an approval gate (`if: contains(github.event.pull_request.labels.*.name, 'safe-to-test')`) AND scope `GITHUB_TOKEN` to `permissions: contents: read`, AND audit every workflow quarterly against the `pull_request_target` abuse checklist."
    cwe: ['CWE-266', 'CWE-269', 'CWE-732']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1078', 'T1195.002', 'T1199']
    cis_controls: ['CIS-16.1', 'CIS-16.2', 'CIS-16.11']
    nist_controls: ['AC-3', 'AC-6', 'SA-15']
    pci_dss: ['6.3.2', '6.4.1']
    soc2: ['CC7.1', 'CC8.1']

  - id: "github_actions_self_hosted_runner_on_public_repo"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "GitHub Actions self-hosted runner attached to public repository (fork-PR RCE)"
    description: "A task configures a GitHub Actions self-hosted runner (`actions-runner/config.sh --url https://github.com/... --token ...` OR `runs-on: self-hosted` in a workflow) and registers it to a repository that is public (or an organization-level runner without `--runnergroup` restrictions). Self-hosted runners run untrusted fork-PR workflows on persistent infrastructure by default - attackers open a PR that executes their code on your runner, reads any secret, pivots into your network. GitHub explicitly warns against this (docs.github.com/en/actions/hosting-your-own-runners#self-hosted-runner-security) but the pattern continues to ship."
    regex: "(?:actions-runner(?:/config\\.sh)?\\s+[^\\n]*?--url\\s+https://github\\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(?:(?!--labels[^\\n]*ephemeral|--ephemeral)[\\s\\S]){0,300}(?:--token|RUNNER_CFG_PAT)|runs-on\\s*:\\s*(?:self-hosted|\\[\\s*self-hosted[^\\]]*\\]))"
    positive_examples:
      - "runs-on: self-hosted"
    multiline: true
    window: 20
    recommendation: "NEVER attach a stateful self-hosted runner to a public repository or to an organization with public repositories and permissive runner-group settings. Use GitHub-hosted runners for public repos. If you must use self-hosted for public workloads, require ALL of: (1) ephemeral runners (`--ephemeral` flag + `actions/runner-scale-set`/`ARC` one-job pods) that are destroyed after each job, (2) `runs-on:` labels scoped to a runner group that explicitly excludes public repos (`Organization settings -> Actions -> Runner groups -> Only selected repositories`), (3) network isolation (runner in a dedicated VPC/subnet with no access to prod secrets / internal networks), (4) `actions: read` minimum token + no org-admin-scope PATs, (5) quarterly audit of `Runner groups` and `Allowed workflows` policies."
    cwe: ['CWE-269', 'CWE-284', 'CWE-913']
    owasp_appsec: ["A01:2021", "A04:2021"]
    mitre_attack: ['T1078', 'T1199', 'T1578']
    cis_controls: ['CIS-13.7', 'CIS-16.1', 'CIS-16.7']
    nist_controls: ['AC-3', 'AC-6', 'SC-7']
    pci_dss: ['1.2.1', '6.4.1', '7.2.1']
