                  gh pr edit ${{ github.event.issue.number }}
    multiline: true
    window: 60
    recommendation: "Never interpolate `${{ github.event.* }}` / `${{ github.head_ref }}` directly into a `run:` block. Pass the value via an environment variable and reference it as a shell parameter: `env:\\n  TITLE: ${{ github.event.issue.title }}` then `run: echo \"$TITLE\"`. For multi-line logic, read from a file placed by a preceding `actions/github-script` step that explicitly sanitises the input. Add `zizmor` or `actionlint` to CI; both flag this pattern with `template-injection`. Enforce `permissions: {}` default at the workflow top level and elevate per-job only as needed."
    cwe: ['CWE-74', 'CWE-77', 'CWE-94']
    owasp_appsec: ["A03:2021"]
    mitre_attack: ['T1059.004', 'T1195.002']
    cis_controls: ['CIS-16.1', 'CIS-16.2']
    nist_controls: ['AC-3', 'SC-18', 'SI-10']
    pci_dss: ['6.2.4', '6.5.1']
    hipaa: ['164.312(c)(1)']
    soc2: ['CC6.1', 'CC7.1']

  - id: "github_actions_script_block_injection_untrusted_context"
    category: "supply_chain"
    severity: "HIGH"
    title: "GitHub Actions: Untrusted github.event Context Interpolated Into actions/github-script"
    description: "An `actions/github-script@v*` step's `script:` body interpolates attacker-controllable `${{ github.event.* }}` expressions (issue/pr/comment/review/pages/head_commit/discussion/release bodies or titles, or `${{ github.head_ref }}`) directly into the JavaScript source. GitHub substitutes these values BEFORE the runtime evaluates the JS, so any backtick, string terminator, or template-literal inside the untrusted text completes the string and executes arbitrary JS with the workflow's `${{ secrets.GITHUB_TOKEN }}` privileges - repo-wide write access, secrets read, arbitrary-branch create/force-push."
