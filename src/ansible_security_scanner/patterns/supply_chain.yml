  - id: "dockerfile_healthcheck_curl_insecure"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Dockerfile HEALTHCHECK Uses curl -k (Skips TLS Verification Inside Container)"
    description: "A rendered Dockerfile / Containerfile or an `ansible-builder` execution-environment definition has `HEALTHCHECK` (or a CI `healthcheck:` block) that invokes `curl -k` / `curl --insecure` / `wget --no-check-certificate`. Beyond the MitM risk, the `-k` health-check PASSES when TLS is broken - meaning a container with an expired cert, a corrupted CA bundle, or an attacker-stripped TLS proxy is reported healthy and left in the Kubernetes service load-balancer pool."
