  - id: "buildkit_cache_mount_shared_unscoped"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Dockerfile RUN --mount=type=cache With sharing=shared And Unscoped target"
    description: "A task templates a Dockerfile / Containerfile containing `RUN --mount=type=cache,sharing=shared,target=/root/.cache/pip` (or `/var/cache/apk`, `/go/pkg/mod`, `/root/.npm`) WITHOUT an `id=` that scopes the cache per-repository + per-lockfile. `sharing=shared` pools the cache across every concurrent build on the builder - on a multi-tenant BuildKit instance (GitHub Actions hosted runners, BuildKit rootless daemons shared across teams, Depot.dev, Docker Hub Automated Builds), a malicious build can write poisoned wheels / apks / go modules into the cache that a subsequent legitimate build ingests."
