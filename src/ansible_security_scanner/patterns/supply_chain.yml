    title: "ECR Repository image_tag_mutability = MUTABLE (Tag Overwrite Allowed)"
    description: "A `community.aws.ecs_ecr` task sets `image_tag_mutability: MUTABLE` (or leaves it at the AWS default, which is MUTABLE). Mutable tags let a compromised CI token or a malicious insider RE-PUSH a different image under the same tag (e.g. `:prod`, `:v1.2.3`), silently replacing a previously-reviewed image for every downstream deployer that pulls the tag. This is how the 2022 `ctx` PyPI takeover + the 2021 Codecov bash-uploader incident propagated. Combined with ECS's `:latest` anti-pattern, a single CI compromise lets an attacker replace every running task at the next deployment."
