    description: "A task renders an OperatorHub `CatalogSource` manifest whose `spec.image` is NOT on the Red-Hat / RHEL certified catalog allowlist (`registry.redhat.io/redhat/*`, `registry.access.redhat.com/*`, `certified-operators.s3.amazonaws.com`, `registry.connect.redhat.com/*`) AND whose `spec.updateStrategy.registryPoll.interval` is non-zero / uses implicit `imagePullPolicy: Always`. OLM + `imagePullPolicy: Always` on an untrusted catalog means every 15-60 min the cluster pulls whatever the catalog registry serves - an attacker who compromises the catalog registry (or the DNS of it) can push a malicious ClusterServiceVersion that OLM auto-installs with the operator's existing ServiceAccount RBAC (often cluster-admin-equivalent for 'core' operators)."
