  - id: "gitlab_ci_runner_privileged_true"
    category: "supply_chain"
    severity: "HIGH"
    title: "GitLab CI runner deployed with Docker executor privileged=true (container escape)"
    description: "A task configures a GitLab Runner with `[runners.docker] privileged = true` in `config.toml` OR renders a Helm values file with `runners.privileged: true` OR deploys via the GitLab Runner Operator with `.spec.privileged: true`. Privileged mode gives the build container full access to the host kernel (mount cgroups, load modules, access /dev/*) - any pipeline (including from any developer with push access) gets root on the runner host. Docker-in-Docker (DinD) is the usual excuse, but rootless DinD / Kaniko / BuildKit in userspace are viable drop-ins."
    regex: "(?:\\[runners\\.docker\\][\\s\\S]{0,500}?privileged\\s*=\\s*true|runners\\s*:\\s*[\\s\\S]{0,500}?privileged\\s*:\\s*(?:true|['\"]true['\"])|GitlabRunner[\\s\\S]{0,600}?privileged\\s*:\\s*true)"
    positive_examples:
      - "[runners.docker]privileged=true"
    multiline: true
    window: 30
    recommendation: "Set `privileged = false`. Replace DinD with rootless image-builders that do NOT require privileged: **Kaniko** (google/kaniko-project), **BuildKit rootless** (`docker.io/moby/buildkit:rootless`), **Buildah unprivileged**, or **img**. For tests that legitimately need privileged ops (kernel modules, nested virtualization), isolate them on a dedicated runner tagged `privileged-only`, restrict project access to that runner via `protected` runners, and require `protected` branches / tagged pipelines only. Never share a privileged runner between projects. Audit `config.toml` + Helm values in source control; fail CI if `privileged: true` appears in runner configs."
    cwe: ['CWE-250', 'CWE-269', 'CWE-284']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V13.4.5, V15.2.3]
    mitre_attack: ['T1068', 'T1199', 'T1611']
    cis_controls: ['CIS-5.2', 'CIS-16.11', 'CIS-Docker']
    nist_controls: ['AC-6', 'CM-7', 'SC-39']
    pci_dss: ['2.2.1', '7.2.1']
    soc2: ['CC6.1', 'CC6.3']

  - id: "jenkins_agent_secret_in_url_or_plaintext"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Jenkins agent JNLP secret exposed in URL or plaintext config"
    description: "A task renders a Jenkins agent bootstrap with the JNLP `-secret <hex>` flag passed on the command line (visible in `ps`, shell history, systemd journal), OR embeds the secret in `agent.jnlp` / `jenkins-agent.service` as a literal, OR sets `JENKINS_SECRET` / `JENKINS_AGENT_SECRET` env-var to a hex literal instead of a Vault reference. Jenkins agent secrets authenticate the agent to the controller with persistent rights - leaking one yields arbitrary-pipeline injection on every agent that controller serves, including credential-store access via `Credentials Binding` and arbitrary Groovy via the build script."
    regex: "(?:java\\s+-jar\\s+agent(?:\\.jar)?[\\s\\S]{0,500}?-secret\\s+[0-9a-f]{32,}|jenkins-agent(?:\\.sh)?[\\s\\S]{0,500}?-secret\\s+[0-9a-f]{32,}|JENKINS_(?:AGENT_)?SECRET\\s*[:=]\\s*['\"]?[0-9a-f]{32,}['\"]?|<jnlp[\\s\\S]{0,400}?<argument>-secret</argument>\\s*<argument>[0-9a-f]{32,}</argument>)"
    positive_examples:
      - "java -jar agent-secret 00000000000000000000000000000000"
    multiline: true
    window: 15
    recommendation: "Never pass the JNLP secret on the command line. Store the secret in a file with mode 0600 owned by the agent user, and pass `-secretFile /etc/jenkins/agent.secret`. Better: use the **Jenkins WebSocket agent** protocol (since 2.217) which authenticates via outbound HTTPS and avoids the raw TCP JNLP port entirely. Source secrets from Vault / AWS Secrets Manager at boot (`lookup('community.hashi_vault.vault_kv2_get', ...)`). Rotate the secret whenever an agent is decommissioned (`groovy` step: `jenkins.model.Jenkins.instance.getNode('agent').computer.setJnlpMac(null)`). Audit `journalctl -u jenkins-agent` / `ps auxf` for exposure."
