  - id: "azure_container_registry_admin_user_enabled"
    category: "supply_chain"
    severity: "HIGH"
    title: "Azure Container Registry with admin_user_enabled: true (Shared Credentials Anti-Pattern)"
    description: "An `azure.azcollection.azure_rm_containerregistry` task sets `admin_user_enabled: true`. This activates a SHARED username + password combo on the registry (retrievable via `az acr credential show`) that everyone with registry RBAC can use to push/pull images - collapsing any per-identity audit trail. Worse, teams often embed these shared creds into CI secrets, Kubernetes image-pull secrets, and docker-login scripts, where they leak across environments. The modern pattern is managed-identity or service-principal authentication, which preserves per-workload attribution."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_containerregistry\\s*:[\\s\\S]{0,1500}?admin_user_enabled\\s*:\\s*(?:true|True|yes|Yes|1)\\b"
    positive_examples:
      - |2-
        azure.azcollection.azure_rm_containerregistry:
                # ...
                admin_user_enabled: true
    multiline: true
    window: 40
    recommendation: "Set `admin_user_enabled: false` on every ACR. For Kubernetes, use `--attach-acr` with the AKS kubelet managed-identity (`az aks update --attach-acr`). For Azure Container Apps / Container Instances, use the built-in managed-identity integration. For CI (GitHub Actions / Azure DevOps), use OpenID Connect federation instead of a shared password. Rotate + disable the admin creds immediately if they were ever enabled. Enforce via Azure Policy built-in `ID: dc921057-6b28-4fbe-9b83-f7bec05db6c2` (Container registries should have local admin account disabled)."
    cwe: ['CWE-284', 'CWE-522', 'CWE-798']
    owasp_appsec: ["A01:2021", "A04:2021", "A07:2021"]
    owasp_asvs: [V13.2.1, V13.2.3, V13.3.1, V11.2.5]
