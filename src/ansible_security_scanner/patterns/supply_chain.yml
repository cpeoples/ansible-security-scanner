  - id: "gem_cpan_cargo_insecure_source_added"
    category: "supply_chain"
    severity: "HIGH"
    title: "RubyGems / CPAN / Cargo / Go Proxy Source Added With HTTP Or --insecure Flag"
    description: "A task runs `gem sources -a http://...`, `cpan o conf http_proxy http://...` (or a `PERL_CPANM_OPT` with `--insecure`), `cargo install --registry http://...` or renders `~/.cargo/config.toml` with `[source.<name>] replace-with = 'insecure'`, or sets `GOPROXY=http://...`/`GOINSECURE=*` / `GONOSUMCHECK=1`. Every modern language package ecosystem requires TLS to its registry; downgrading to HTTP or disabling hash verification (`GONOSUMCHECK`, `--insecure`, `lockfile_verify = false`) recreates the same MitM primitive documented in the 2024 JFrog reports for polyglot repositories."
    regex: "(?:gem\\s+sources\\s+-a\\s+http://|cpan[^\\n]*?(?:--insecure|no_check_certificate)\\b|cpanm[^\\n]*?--insecure|cargo\\s+install\\s+[^\\n]*?--registry\\s+http://|GOPROXY\\s*[:=]\\s*['\"]?http://|GOINSECURE\\s*[:=]\\s*['\"]?\\*['\"]?|GONOSUMCHECK\\s*[:=]\\s*['\"]?(?:1|true)['\"]?|GOFLAGS\\s*[:=]\\s*['\"]?[^'\"]*?-insecure)"
    positive_examples:
      - "gem sources -a http://"
    multiline: true
    window: 8
    recommendation: "Use HTTPS for every registry. For RubyGems: `gem sources --add https://rubygems.org/ --remove http://...`. For CPAN: `o conf http_proxy https://...` + enable `verify_certificate 1`. For Cargo: `[registries.custom] index = 'https://...'` + `[source.crates-io] replace-with = 'custom'` + ensure `[registries.custom].token` is set via env. For Go modules: set `GOPROXY=https://proxy.golang.org,direct` + `GOSUMDB=sum.golang.org` (NEVER set `GONOSUMCHECK=1`). For internal modules in Go, use `GOPRIVATE=*.internal.corp` which bypasses the public SUMDB while keeping TLS to the internal proxy. Lock dependency hashes: Ruby `Gemfile.lock`, Go `go.sum`, Cargo `Cargo.lock`. Fail CI on any mismatch."
    cwe: ['CWE-319', 'CWE-345', 'CWE-353', 'CWE-494']
