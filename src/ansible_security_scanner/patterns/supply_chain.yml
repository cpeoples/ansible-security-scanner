  - id: "slsa_provenance_verification_missing"
    category: "supply_chain"
    severity: "HIGH"
    title: "SLSA Provenance / in-toto Attestation Verification Missing"
    description: "An Ansible task pulls a BUILT ARTIFACT (container image, wheel, tarball, Galaxy collection tarball, binary release asset) from a registry or URL but never invokes `slsa-verifier verify-artifact`, `cosign verify-attestation --type slsaprovenance`, `in-toto verify`, or `gh attestation verify`. Level-2+ SLSA guarantees depend on the **consumer** verifying provenance - otherwise a signed-but-forged build masquerades as legitimate. This is the gap exploited by the 2024 `@solana/web3.js` and 2025 `actions/checkout` typosquat campaigns."
    # Only fire on actual artefact-retrieval tasks, not every
    # ``uri:`` API call. The previous regex matched any ``uri:`` /
    # ``get_url:`` that wasn't followed within 2000 chars by a verifier
    # invocation, which flagged basically every HTTP interaction in
    # the corpus as a SLSA violation. Real artefact surfaces:
    #   * ``ansible.builtin.unarchive`` (always pulls an archive)
    #   * ``community.general.docker_image`` / ``podman_image``
    #   * ``ansible.galaxy.collection`` install
    #   * ``ansible.builtin.get_url`` when the URL looks like a
    #     release asset (``.tar.gz``, ``.tgz``, ``.zip``, ``.whl``,
    #     ``.deb``, ``.rpm``, ``.jar``, ``.apk``, ``.pkg``,
    #     ``/releases/download/``, ``/archive/`` on GitHub).
    # Plain ``uri:`` calls are excluded - they're API requests, not
    # artefact downloads.
    regex: "(?:ansible\\.builtin\\.unarchive|ansible\\.galaxy\\.collection|community\\.general\\.(?:docker_image|podman_image)|ansible\\.builtin\\.get_url:[\\s\\S]{0,600}?(?:\\.(?:tar(?:\\.gz)?|tgz|zip|whl|deb|rpm|jar|apk|pkg|exe|msi|dmg|tbz2|xz)\\b|/releases/download/|/archive/refs/))(?:(?!slsa-verifier|cosign\\s+verify-attestation|in-toto\\s+verify|gh\\s+attestation\\s+verify)[\\s\\S]){0,2000}"
    multiline: true
    window: 40
    recommendation: "Before consuming any external artifact, verify its provenance: `slsa-verifier verify-artifact --provenance-path build.intoto.jsonl --source-uri github.com/myorg/myrepo <artifact>` or `cosign verify-attestation --type slsaprovenance --certificate-identity-regexp ... <image>`. For Galaxy, use `ansible-galaxy collection verify --signature` (requires galaxy_ng 4.7+)."
    positive_examples:
      - |2-
            ansible.builtin.unarchive:
              src: https://example.com/app.tar.gz
      - |2-
            community.general.docker_image:
              name: ghcr.io/org/svc:1.2.3
      - |2-
            ansible.builtin.get_url:
              url: https://github.com/org/repo/releases/download/v1/app.tar.gz
      - |2-
            ansible.builtin.get_url:
              url: https://example.com/tool-1.2.3.zip
    negative_examples:
      - |2-
            ansible.builtin.uri:
              url: "{{ api_base }}/v1/status"
      - |2-
            ansible.builtin.uri:
              url: https://api.example.com/tokens
              method: POST
      - |2-
            ansible.builtin.get_url:
              url: https://example.com/api/config
              dest: /etc/app.json
    cve: ["CVE-2026-45321"]
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ["CM-11", "SA-10", "SA-11", "SI-7"]
    pci_dss: ["6.3.2", "6.3.3"]
    soc2: ["CC7.1", "CC8.1"]
    mitre_attack: ["T1195.002"]
    cwe: ["CWE-345", "CWE-494"]
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  # -- GitOps controllers (2025-2026) ---------------------------------------

  - id: "argocd_application_untrusted_repo"
    category: "supply_chain"
    severity: "HIGH"
    title: "ArgoCD Application Points At Untrusted / Unpinned Repository"
    description: "An `argoproj.io/v1alpha1` Application or ApplicationSet manifest has `spec.source.repoURL` pointing at `github.com/*` (without a `known_hosts`-verified SSH fingerprint), `docker.io/*`, or a tag-only `targetRevision` (`HEAD`, `main`, `master`, `latest`). Every GitOps sync then pulls whatever the tip of that branch is at reconciliation time - a compromised upstream commit reaches production in the next sync interval (default: 3 minutes) with no human in the loop."
    regex: "kind\\s*:\\s*Application(?:Set)?\\b[\\s\\S]{0,800}?repoURL\\s*:\\s*[\"']?(?:https?://github\\.com/|ghcr\\.io/|docker\\.io/)[^\\n]{0,200}[\\s\\S]{0,400}?targetRevision\\s*:\\s*[\"']?(?:HEAD|main|master|latest|stable)\\b"
    positive_examples:
      - |2-
            kind: Application
              spec:
                source:
                  repoURL: https://github.com/example/charts
                  targetRevision: main
    multiline: true
    window: 25
    recommendation: "Pin `targetRevision` to a commit SHA or a signed tag (`v2.1.4`). Configure ArgoCD's `repository credentials` secret to require a known SSH host-key fingerprint. Enforce `signatureKeys` on the ArgoCD Project so only commits signed by a listed GPG key are synced. For ApplicationSet generators, never feed a Git `list` generator untrusted branch names."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ["CM-3", "CM-11", "SI-7"]
    pci_dss: ["6.3.2", "6.3.3"]
    soc2: ["CC7.1", "CC8.1"]
    mitre_attack: ["T1195.002"]
    cwe: ["CWE-345", "CWE-494"]
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "flux_image_automation_broad_perms"
    category: "supply_chain"
    severity: "HIGH"
    title: "Flux ImageUpdateAutomation Can Commit To Default Branch Without Review"
    description: "A `image.toolkit.fluxcd.io/v1beta1` ImageUpdateAutomation is configured with `spec.git.push.branch` equal to the `checkoutRef.branch` (i.e. writes straight to the default branch) and no `commit.messageTemplate` filter. Combined with a broad `ImagePolicy` (regex `.*`, semver `>=0.0.0`), any image tag appearing in the registry reaches production with no PR review, no CODEOWNERS approval, and no signature gate."
    regex: "kind\\s*:\\s*ImageUpdateAutomation\\b[\\s\\S]{0,800}?push\\s*:[\\s\\S]{0,200}?branch\\s*:\\s*[\"']?(?:main|master|production|default)[\"']?[\\s\\S]{0,600}?(?:ImagePolicy|policy)\\s*:[\\s\\S]{0,400}?(?:semver\\s*:\\s*[\"']?>=0\\.0\\.0|regex\\s*:\\s*[\"']?\\.\\*)"
    positive_examples:
      - "kind : ImageUpdateAutomation push : branch :  main  ImagePolicy : semver :  >=0.0.0"
    multiline: true
    window: 40
    recommendation: "Point `spec.git.push.branch` at a dedicated `flux-image-updates` branch and require a PR (with CODEOWNERS + SLSA attestation check) before merge to main. Tighten the ImagePolicy: pin semver range (`~1.4`), require the image to be signed (`cosign verify` via Kyverno admission), and pin the registry host to an internal mirror."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ["CM-3", "CM-5", "SI-7"]
    pci_dss: ["6.3.2", "6.3.3"]
    soc2: ["CC7.1", "CC8.1"]
    mitre_attack: ["T1195.002"]
    cwe: ["CWE-284", "CWE-494"]
    owasp_appsec: ["A01:2021", "A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "crossplane_providerconfig_broad_iam"
    category: "supply_chain"
    severity: "HIGH"
    title: "Crossplane ProviderConfig Binds Broad Cloud IAM Role"
    description: "A `ProviderConfig` (AWS / GCP / Azure) for Crossplane references a service account or IAM role with `*:*` permissions, `AdministratorAccess`, `roles/owner`, or `Contributor` at subscription scope. Because Crossplane is the single in-cluster actor that provisions cloud resources on behalf of every user's `Claim`, a compromise of its ProviderConfig is a direct path from kube-apiserver RCE to full cloud-account takeover."
    regex: "kind\\s*:\\s*ProviderConfig\\b[\\s\\S]{0,600}?(?:roleARN|role|principal|sa_name)\\s*:\\s*[\"']?[^\\n\"']*(?:AdministratorAccess|Admin|Owner|Contributor|\\*(?:/\\*)?)"
    positive_examples:
      - "kind : ProviderConfig roleARN :   AdministratorAccess"
    multiline: true
    window: 30
    recommendation: "Create per-Composition IAM roles with least-privilege policies (e.g. `AmazonS3FullAccess` scoped with a condition on resource tag). Use IRSA (EKS) / Workload Identity (GKE) / Azure Federated Identity to avoid long-lived keys. Audit with `crossplane beta trace` + `aws iam get-role-policy` on every ProviderConfig role."
    cis_controls: ["CIS-6.1", "CIS-6.8"]
    nist_controls: ["AC-3", "AC-6", "AC-6(1)"]
    pci_dss: ["7.2.1"]
    soc2: ["CC6.1", "CC6.3"]
    mitre_attack: ["T1078.004", "T1098.003"]
    cwe: ["CWE-269", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]

  - id: "pip_index_url_plaintext_http"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "pip install Pointed At Plaintext HTTP Index Or With --trusted-host"
    description: "A task invokes `pip install` / `ansible.builtin.pip` / `--extra-index-url` with an `http://` URL, or passes `--trusted-host` to silence the TLS warning on an HTTPS index that does not actually validate. pip wheel installs execute arbitrary Python at install time via `setup.py` / PEP 517 backends; intercepting the download (captive-portal, hostile LAN, compromised internal proxy) is the 2024 `Marc-Etienne M.Léveillé` class of attack and is trivial with `mitmproxy`."
    regex: "(?:pip(?:3)?\\s+install|ansible\\.builtin\\.pip\\b)[\\s\\S]{0,400}?(?:--index-url\\s+http://|--extra-index-url\\s+http://|--trusted-host\\b)|(?:index-url|extra-index-url)\\s*=\\s*http://"
    positive_examples:
      - "pip install--index-url http://"
    multiline: true
    window: 15
    recommendation: "Always use `https://` for index URLs (`--index-url https://pypi.org/simple` or your internal Artifactory/Nexus). Remove `--trusted-host` and fix the underlying TLS configuration instead (add the internal CA to the system trust store, not to pip). Pin hashes with `--require-hashes` + a `requirements.txt` produced by `pip-compile --generate-hashes`, and enable PEP 458 / PEP 480 TUF-based signed indexes where supported."
    cwe: ['CWE-295', 'CWE-319', 'CWE-494']
    owasp_appsec: ["A02:2021", "A07:2021", "A08:2021"]
    owasp_asvs: [V12.2.1, V12.3.4, V15.2.4]
    mitre_attack: ['T1195.001', 'T1195.002', 'T1557']
    cis_controls: ['CIS-2.4', 'CIS-3.10', 'CIS-16.11']
    nist_controls: ['CM-14', 'SC-8', 'SC-12', 'SI-7']
    pci_dss: ['4.2.1', '6.3.2', '6.3.3']
    soc2: ['CC6.1', 'CC6.7', 'CC7.1']

  - id: "npm_registry_plaintext_http_strict_ssl_false"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "npm Registry Over HTTP Or strict-ssl=false In .npmrc"
    description: "A task writes `.npmrc` / `npm config set` with `registry=http://...`, `strict-ssl=false`, or `always-auth=false` combined with `http://`. npm executes `preinstall` / `install` / `postinstall` lifecycle scripts on every `npm install`; a MITM or poisoned registry can substitute a malicious tarball that runs arbitrary code in the user/CI context on first install (see the 2024 `web3.js` supply-chain incident chain)."
    regex: "(?:registry\\s*=\\s*http://|strict-ssl\\s*=\\s*false\\b)|npm\\s+config\\s+set\\s+registry\\s+http://|npm\\s+config\\s+set\\s+strict-ssl\\s+false"
    positive_examples:
      - "registry=http://"
    recommendation: "Set `registry=https://registry.npmjs.org/` (or your private Verdaccio / Artifactory endpoint on HTTPS). Keep `strict-ssl=true` and fix the underlying CA trust problem. Use `npm ci --ignore-scripts` in CI, pin transitive hashes with `package-lock.json` committed, and run `npm audit signatures` (npm 9+) to verify registry-signed provenance."
    cwe: ['CWE-295', 'CWE-319', 'CWE-494']
    owasp_appsec: ["A02:2021", "A07:2021", "A08:2021"]
    owasp_asvs: [V12.2.1, V12.3.4, V15.2.4]
    mitre_attack: ['T1195.001', 'T1195.002', 'T1557']
    cis_controls: ['CIS-2.4', 'CIS-3.10', 'CIS-16.11']
    nist_controls: ['CM-14', 'SC-8', 'SC-12', 'SI-7']
    pci_dss: ['4.2.1', '6.3.2', '6.3.3']
    soc2: ['CC6.1', 'CC6.7', 'CC7.1']

  - id: "rpm_install_nosignature_or_nogpg"
    category: "supply_chain"
    severity: "HIGH"
    title: "rpm/dnf/yum Invoked With --nosignature Or gpgcheck=0"
    description: "A task runs `rpm -i --nosignature` / `--nodigest`, `dnf install --nogpgcheck`, `yum install --nogpgcheck`, or renders `/etc/yum.repos.d/*.repo` with `gpgcheck=0` (or `repo_gpgcheck=0` on a repo whose packages are not additionally signed). Skipping RPM signature validation defeats the entire distro trust chain and is the root cause of every Rocky/AlmaLinux/RHEL post-exploitation persistence via a typo-squatted mirror."
    regex: "(?:rpm(?:\\s+-\\w+)*\\s+--(?:nosignature|nodigest)|(?:dnf|yum|microdnf)\\s+(?:install|upgrade|update)[\\s\\S]{0,200}?--nogpgcheck)|gpgcheck\\s*=\\s*0\\b|repo_gpgcheck\\s*=\\s*0\\b"
    positive_examples:
      - "gpgcheck=0"
    recommendation: "Never pass `--nogpgcheck` / `--nosignature`. In `.repo` files set `gpgcheck=1`, `repo_gpgcheck=1`, and pin `gpgkey=file:///etc/pki/rpm-gpg/...`. Import vendor keys ahead of time with `rpm --import` in a playbook that runs before any install. For air-gapped environments, mirror the repo and re-sign with an internal key rather than disabling verification."
    cwe: ['CWE-345', 'CWE-347', 'CWE-494']
    owasp_appsec: ["A02:2021", "A08:2021"]
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1195.002', 'T1554']
    cis_controls: ['CIS-2.4', 'CIS-3.10', 'CIS-16.11']
    nist_controls: ['CM-14', 'SC-12', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    hipaa: ['164.312(c)(1)', '164.312(c)(2)']
    soc2: ['CC6.7', 'CC7.1']

  - id: "dockerfile_add_remote_http_url"
    category: "supply_chain"
    severity: "HIGH"
    title: "Dockerfile / Containerfile Uses ADD With Remote HTTP URL"
    description: "A task templates or writes a Dockerfile / Containerfile / `execution-environment.yml` `additional_build_files` that contains `ADD http://...` or `ADD https://... /path` without a checksum validation layer. `ADD <URL>` fetches at build time with no signature check, no pin, and with the build daemon's credentials - any MITM or DNS-hijack at build time yields a poisoned image layer that is subsequently pushed to the registry and deployed fleet-wide."
    regex: "^\\s*ADD\\s+https?://[^\\s]+\\s+"
    positive_examples:
      - "ADD https://github.com/Yelp/dumb-init/releases/download/v1.2.0/dumb-init_1.2.0_amd64 /usr/sbin/dumb-init"
    multiline: true
    recommendation: "Replace `ADD <url>` with `RUN curl -fsSLO <https-url> && echo '<sha256>  <file>' | sha256sum -c - && tar xzf <file>` (or use `COPY` of a vendored local artifact). Better: fetch via a SLSA-L3 build system that produces a signed SBOM and attestation, and pull the artifact from an OCI registry with `cosign verify-attestation`."
    cwe: ['CWE-319', 'CWE-494', 'CWE-829']
    owasp_appsec: ["A02:2021", "A08:2021"]
    owasp_asvs: [V12.2.1, V12.3.4, V15.2.4]
    mitre_attack: ['T1195.002', 'T1505.003']
    cis_controls: ['CIS-2.4', 'CIS-16.11']
    nist_controls: ['CM-14', 'SC-12', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC6.7', 'CC7.1']

  - id: "cloudflared_tunnel_install_arbitrary"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "cloudflared Tunnel Service Installed Via Inline Token From Playbook"
    description: "A task installs `cloudflared` and runs `cloudflared service install <token>` or `cloudflared tunnel run --token <token>` with the token pasted inline. Cloudflare Tunnels create an outbound-only reverse-tunnel that bypasses ingress firewall, zero-trust posture, and many EDRs - they were the primary C2 mechanism for the 2024 `Storm-1811` / Black-Basta vishing campaign and are increasingly used by commodity actors because the traffic blends with legitimate `*.trycloudflare.com` / `*.cfargotunnel.com` workloads."
    regex: "cloudflared\\s+(?:service\\s+install|tunnel\\s+run|tunnel\\s+--token)\\s+[a-zA-Z0-9_\\-\\.=]{20,}"
    positive_examples:
      - "cloudflared service install aaaaaaaaaaaaaaaaaaaa"
    recommendation: "Remove the task unless there is a documented, change-controlled remote-access exception. If Cloudflare Tunnels are a sanctioned tool, provision the token via `ansible-vault` or a secrets manager (never inline), restrict egress to `*.cloudflare.com` only from approved hosts via outbound firewall, and enforce `Access for Infrastructure` policies requiring SSO + device posture. Detect with Sysmon Event ID 3 + DNS queries to `*.cloudflareaccess.com` from unexpected hosts."
    cwe: ['CWE-668', 'CWE-912']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1090.004', 'T1219', 'T1572']
    cis_controls: ['CIS-4.8', 'CIS-12.5', 'CIS-13.7']
    nist_controls: ['AC-17', 'CM-7', 'SC-7', 'SI-4']
    pci_dss: ['1.2.1', '1.3.1', '12.10.1']
    soc2: ['CC6.6', 'CC7.2']

  - id: "frp_fast_reverse_proxy_install"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "frp (Fast Reverse Proxy) Client Installed For Outbound Tunnel"
    description: "A task downloads or renders a systemd unit for `frpc` (Fast Reverse Proxy client) with an `frps` server config pointing at an arbitrary public host. frp is the most common reverse-proxy tool in the 2023-2025 Chinese-speaking ransomware / APT playbook (Mustang Panda, RedDelta, Sandman): the compromised host dials outbound to an attacker-controlled `frps` and exposes RDP / SSH / arbitrary TCP back through the tunnel."
    regex: "(?:frpc(?:\\.exe)?|/frpc|frps_addr|server_addr\\s*=)[\\s\\S]{0,200}?(?:server_port|server_addr|token)\\s*=\\s*[^\\n]+|frpc\\s+-c\\s+[^\\n]*\\.(?:toml|ini|yaml)"
    positive_examples:
      - "frpcserver_port=x"
    multiline: true
    window: 20
    recommendation: "Remove the task. frp is never a legitimate configuration-management primitive - if the stated need is ingress to a private host, use an SSO-gated zero-trust reverse proxy (Cloudflare Access, Tailscale Funnel with ACLs, Pomerium, Teleport) with device posture and audit logging. Block outbound TCP to unknown high-port listeners at the egress firewall."
    cwe: ['CWE-668', 'CWE-912']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1090', 'T1219', 'T1572']
    cis_controls: ['CIS-4.8', 'CIS-12.5', 'CIS-13.7']
    nist_controls: ['AC-17', 'CM-7', 'SC-7', 'SI-4']
    pci_dss: ['1.2.1', '1.3.1']
    soc2: ['CC6.6', 'CC7.2']

  - id: "gost_tunnel_listener_install"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "gost (Go Simple Tunnel) Multi-Hop Proxy Installed"
    description: "A task installs or runs `gost -L <listener> -F <forward>` (or multi-hop `-F` chains). gost is a generic multi-protocol tunnel (HTTP, SOCKS5, WebSocket, QUIC, SSH) used heavily by 2024 cryptomining worms (TeamTNT successor `Kinsing`, `RedTail`) and by North-Korean-aligned `UNC4899` operations for long-lived proxy chains. There is no legitimate sysadmin reason to install gost on a production host."
    regex: "(?:/usr/(?:local/)?bin/gost|\\bgost\\s+)-L\\s+[^\\s]+(?:\\s+-F\\s+[^\\s]+){0,5}"
    positive_examples:
      - "/usr/bin/gost-L x"
    recommendation: "Remove the task and audit the host for persistent gost binaries (`find / -name gost -type f 2>/dev/null`) and systemd units referencing it. Rotate any credentials accessible from the host and investigate how the task was introduced (likely via compromised CI or a malicious role). Add gost/frpc/rathole/chisel binary names to EDR blocklists."
    cwe: ['CWE-506', 'CWE-912']
    mitre_attack: ['T1090', 'T1219', 'T1572']
    cis_controls: ['CIS-4.8', 'CIS-10.5']
    nist_controls: ['AC-17', 'SC-7', 'SI-4']
    pci_dss: ['1.2.1', '12.10.1']
    soc2: ['CC6.6', 'CC7.2']

  - id: "adb_tcpip_remote_debug_enabled"
    category: "supply_chain"
    severity: "HIGH"
    title: "Android adb tcpip Enabled From Automation Exposing Device Over Network"
    description: "A task invokes `adb tcpip <port>` (typically 5555) on a connected Android device or emulator. `adb tcpip` disables USB-only authentication and exposes the full adb protocol (shell, push, install) on a TCP port, historically exploited by the `ADB.Miner` worm and the 2024 `Fbot` / `Satori` botnet resurgence - any device left in this state and reachable over the network is a one-command root shell for any attacker."
    regex: "\\badb(?:\\.exe)?\\s+tcpip\\s+\\d+"
    positive_examples:
      - "adb tcpip 0"
    recommendation: "Remove the task. If remote debugging is genuinely required for CI, restrict it to a loopback / host-only emulator interface and immediately follow with `adb usb` to return to USB-only mode at the end of the job. Never enable `adb tcpip` on a physical device on a shared network - use `adb -s <serial>` over USB + UAC-confirmed authorisation instead."
    cwe: ['CWE-306', 'CWE-749']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1021', 'T1078']
    cis_controls: ['CIS-3.3', 'CIS-4.8']
    nist_controls: ['AC-3', 'AC-17', 'SC-7']
    pci_dss: ['1.2.1', '8.3.1']
    soc2: ['CC6.6']

  - id: "gha_workflow_contents_write_on_pull_request_target"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "GitHub Actions pull_request_target With contents:write Or Secrets Exposure"
    description: "A task renders a GitHub Actions workflow under `.github/workflows/*.yml` that triggers on `pull_request_target` AND grants `permissions: { contents: write }` (or `write-all`) OR checks out `${{ github.event.pull_request.head.sha }}` (the untrusted fork HEAD). This is the canonical GHA RCE / supply-chain-compromise primitive: `pull_request_target` runs in the base-repo context with access to `GITHUB_TOKEN` and secrets, and `contents: write` lets any forked PR push to the protected branch. The pattern caused the 2023 `tj-actions/changed-files` incident and is the #1 finding in every 2024-2025 GHA audit."
    regex: "on\\s*:[\\s\\S]{0,200}?pull_request_target[\\s\\S]{0,800}?permissions\\s*:[\\s\\S]{0,300}?contents\\s*:\\s*write|pull_request_target[\\s\\S]{0,1500}?checkout[\\s\\S]{0,200}?github\\.event\\.pull_request\\.head\\.(?:sha|ref)"
    positive_examples:
      - |2-
        on:
          pull_request_target:
            types:
              - closed

        jobs:
          release:
            if: |
              github.event.pull_request.merged &&
              !contains(github.event.pull_request.labels.*.name, 'skip_changelog')
            runs-on: ubuntu-latest
            permissions:
              contents: write
    multiline: true
    window: 80
