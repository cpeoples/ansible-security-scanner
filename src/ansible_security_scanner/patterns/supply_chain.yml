  # -- Execution Environment runtime identity (2025-2026) -------------------

  - id: "ee_runs_as_root_user"
    category: "supply_chain"
    severity: "HIGH"
    title: "Execution Environment Dockerfile / Containerfile Runs As Root"
    description: "The execution-environment.yml build context or its generated Containerfile/Dockerfile does not include a trailing `USER` directive (or pins USER to 0/root). Every `ansible-runner`/`ansible-navigator` invocation then runs collection code, lookup plugins, and Jinja expressions as uid 0 inside the container - the standard Red-Hat-recommended baseline is USER 1001. Running as root inside the EE removes one entire layer of the defence-in-depth against a compromised collection (e.g. community.general.trojan)."
    regex: "(?:execution-environment\\.ya?ml|Containerfile|Dockerfile)[\\s\\S]{0,1500}?USER\\s+(?:0|root)\\b|(?:ansible-builder\\s+build[\\s\\S]{0,400}?--container-runtime[^\\n]*)(?![\\s\\S]{0,2000}USER\\s+\\d)"
    positive_examples:
      - "execution-environment.ymlUSER 0"
    multiline: true
    window: 80
    recommendation: "In `execution-environment.yml`, set `additional_build_steps.append: [\"USER 1001\"]` (Red Hat baseline). In a hand-rolled Containerfile, add `RUN useradd -u 1001 -m runner && chown -R 1001 /runner` and end the file with `USER 1001`. Pair with `runAsNonRoot: true` in the orchestrating K8s Pod if the EE runs in AAP."
    cis_controls: ["CIS-4.6"]
    nist_controls: ["AC-6", "CM-7"]
