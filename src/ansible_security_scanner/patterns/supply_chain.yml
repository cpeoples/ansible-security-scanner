    mitre_attack: ["T1053", "T1098", "T1546"]
    cwe: ['CWE-284', 'CWE-506']
    owasp_appsec: ["A01:2021"]

  - id: "selfhosted_runner_untrusted_event"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Self-Hosted Runner on Fork-Triggered Workflow"
    description: "A GitHub Actions workflow declares `runs-on: self-hosted` (or a self-hosted label) on a job triggered by `pull_request`, `pull_request_target`, `issue_comment`, or `workflow_run`, without an `if: github.actor ==` / `github.event.pull_request.author_association == 'MEMBER'` guard. Any outside contributor can open a PR that runs arbitrary code on your self-hosted runner - and self-hosted runners are by default long-lived machines with network and filesystem persistence (GitHub explicitly warns against this configuration)."
    regex: "runs-on\\s*:\\s*(?:\\[[^\\]]*self-hosted[^\\]]*\\]|[\"']?self-hosted[\"']?|\\$\\{\\{\\s*[^}]*self[- _]hosted[^}]*\\}\\})"
    positive_examples:
      - "runs-on: self-hosted"
    multiline: true
    window: 40
    recommendation: "Never run a self-hosted runner on any job that a non-collaborator can trigger. Either (a) move to GitHub-hosted runners for fork-triggered workflows, (b) add a gating job using `pull_request_target` + `if: github.event.pull_request.head.repo.full_name == github.repository`, or (c) require a trusted-reviewer `workflow_dispatch` approval before the self-hosted job runs. Ephemeral, rootless runners (actions-runner-controller with `ephemeral: true`) reduce the blast radius if this slips through."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['AC-3', 'AC-6', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '7.2.1', '7.2.2']
