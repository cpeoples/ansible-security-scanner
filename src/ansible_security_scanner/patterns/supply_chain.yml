  - id: "git_hook_or_config_write"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Ansible Task Modifies .git/hooks, .git/config, or core.hooksPath"
    description: "A task writes to `.git/hooks/*`, `.git/config`, `.gitconfig`, `.gitattributes`, or calls `git config --local core.hooksPath` / `core.sshCommand` / `http.extraheader` / `credential.helper`. Git hooks execute silently on every subsequent `git` command the developer or CI runner performs, making this a prime persistence + credential-theft primitive (the `core.sshCommand` form is actively used by in-the-wild malware to proxy all git auth through an attacker host)."
    regex: "(?:copy|template|lineinfile|blockinfile|file|command|shell|ansible\\.builtin\\.(?:copy|template|lineinfile|blockinfile|file|command|shell))\\s*:[\\s\\S]{0,300}?(?:(?:dest|path)\\s*:\\s*[\"']?[^\"'\\n]*?(?:\\.git/hooks/|\\.git/config|\\.gitconfig|\\.gitattributes)[\"']?|git\\s+config\\s+(?:--local\\s+)?(?:core\\.hooksPath|core\\.sshCommand|http\\.extraheader|credential\\.helper))"
    positive_examples:
      - |2-
        file:
            path: ~/.gitconfig
    multiline: true
    window: 8
    recommendation: "Never let a playbook modify `.git/hooks/*` or rewrite `core.hooksPath` / `core.sshCommand`. If you must distribute git hooks, use pre-commit.com or husky - both live in the repository itself and are only active after an explicit `pre-commit install` run that the developer sees. For server-side policy, use repository-server hooks (GitHub/GitLab protected branches + CODEOWNERS), not client-side `.git/hooks/` which are untrusted."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['AC-3', 'AC-6', 'CM-11', 'SA-10', 'SI-3', 'SI-7']
    pci_dss: ['6.3.2', '7.2.1', '7.2.2']
