    recommendation: "Fix the TLS trust chain in the image: `ADD ca-bundle.crt /etc/ssl/certs/` + `RUN update-ca-certificates`, or for self-signed dev certs bake the CA into the image via `COPY rootCA.pem /usr/local/share/ca-certificates/`. Health-check should be: `HEALTHCHECK CMD curl -fsS --max-time 3 https://localhost:8443/health || exit 1` - with valid TLS. For internal-only endpoints use HTTP on loopback (127.0.0.1) which needs no TLS and is faster. Never `-k` in a healthcheck."
