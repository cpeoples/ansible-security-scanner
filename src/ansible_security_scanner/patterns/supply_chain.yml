  - id: "apt_force_flag_true"
    category: "supply_chain"
    severity: "HIGH"
    title: "ansible.builtin.apt With force: true (Bypasses Signature Validation + Allows Downgrade)"
    description: "An `ansible.builtin.apt` / `apt` task sets `force: true`. Apt's `--force-yes`/`--allow-downgrades`/`--allow-unauthenticated` semantics disable release-file signature validation and permit the installation of older, potentially-vulnerable package versions. This is the Ansible analogue of running `apt-get install -y --force-yes --allow-downgrades` on the CLI - both features were deprecated by Debian in 2017 specifically because attackers used them to deliver trojanized debs via MITM'd mirror URLs and cache-poisoning attacks."
    # Anchor on ``apt:`` (optionally fully-qualified) and allow up to 800
    # chars of ``apt:`` arguments before ``force:`` - but the intervening
    # stretch must NOT cross a task boundary. Two sentinels mark a task
    # boundary: a new ``- name:`` list item (sibling task) or any other
    # top-level module key (``git:``, ``shell:``, ``copy:``, ...) at the
    # very start of a line after whitespace. Without this carve-out the
    # regex happily matched ``force: yes`` inside a ``git:`` task 28
    # lines below an ``apt:`` task - a pure structural FP.
    regex: "(?ms)(?:ansible\\.builtin\\.apt|^[\\t ]*apt)\\s*:(?:(?!^\\s*-\\s+name\\s*:|^\\s*(?:ansible\\.builtin\\.)?(?:git|shell|command|copy|file|template|raw|script|get_url|uri|unarchive|lineinfile|replace|blockinfile|pip|npm|yum|dnf|package|systemd|service|user|group|mount|cron|assemble|synchronize)\\s*:)[\\s\\S]){0,800}?\\bforce\\s*:\\s*(?:true|True|yes|Yes|1)\\b"
    multiline: true
    window: 30
    recommendation: "Remove `force: true` from every `ansible.builtin.apt` task. If a specific package absolutely MUST be downgraded (rare; usually indicative of a broken upgrade path), use `force_apt_get: true` + `allow_downgrade: true` under controlled change-management, and add an allowlist entry via `nosec: apt_force_flag_true reason=\"<JIRA-ID>: reverting CVE-2025-XXX regression\"`. Prefer fixing the underlying version pin in your Ansible variables or APT pin-priority file (`/etc/apt/preferences.d/`)."
    cwe: ['CWE-345', 'CWE-494', 'CWE-1395']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1078', 'T1195.002']
    cis_controls: ['CIS-2.2', 'CIS-2.6']
    nist_controls: ['CM-7', 'CM-11', 'SI-7']
    pci_dss: ['6.2', '6.3.2']
    hipaa: ['164.308(a)(1)(ii)(D)']
    soc2: ['CC7.1', 'CC8.1']
    positive_examples:
      # Single-task ``apt:`` with ``force: yes`` - the canonical match.
      - |
        - name: install legacy package
          apt:
            name: legacy-pkg
            force: yes
      # Fully-qualified module name plus ``force: true``.
      - |
        - name: install legacy package (FQCN)
          ansible.builtin.apt:
            name: legacy-pkg
            force: true
    negative_examples:
      # ``apt:`` without force, followed by a ``git:`` task that HAS
      # ``force: yes``. The old regex crossed the task boundary and
      # mis-attributed git's force flag to apt - the new regex stops at
      # the intervening ``git:`` module key.
      - |
        - name: update packages
          apt:
            pkg: [openjdk-17-jdk]
            update_cache: yes
          become: yes

        - name: clone repo
          git:
            repo: https://example.com/x.git
            dest: /tmp/x
            force: yes
      # ``apt:`` without force, followed by a ``copy:`` task with
      # ``force: yes`` - same cross-task FP class as above.
      - |
        - name: update packages
          apt:
            pkg: [unzip]

        - name: copy config
          copy:
            src: a.cfg
            dest: /etc/a.cfg
            force: yes

  - id: "yum_validate_certs_false"
    category: "supply_chain"
    severity: "HIGH"
    title: "ansible.builtin.yum With validate_certs: false (Disables Mirror TLS Validation)"
    description: "An `ansible.builtin.yum` / `yum` task sets `validate_certs: false`. Yum will fetch repo metadata and RPM packages from the configured mirror URLs without verifying the mirror's TLS certificate chain. Any on-path attacker (rogue WiFi, ARP-spoof, compromised CDN edge, malicious VPN gateway) can swap out RPMs for trojanized versions before they reach the target host - especially dangerous because RPMs execute pre/post install scriptlets as root."
    regex: "(?ms)(?:ansible\\.builtin\\.yum|^[\\t ]*yum)\\s*:[\\s\\S]{0,800}?\\bvalidate_certs\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?(?:\\s|$|#)"
    positive_examples:
      - |2-
        yum:
                # ...
                validate_certs: false
      - |2-
        yum:
                name: foo
                validate_certs: 'no'
      - |2-
        ansible.builtin.yum:
                name: foo
                validate_certs: "false"
    negative_examples:
      - |2-
        yum:
                name: foo
                validate_certs: true
    multiline: true
    window: 30
    recommendation: "Remove `validate_certs: false` from every yum task. If your internal mirror genuinely uses a self-signed cert, distribute the CA bundle via `ansible.builtin.copy` into `/etc/pki/ca-trust/source/anchors/` + `ansible.builtin.command: update-ca-trust` - never disable validation. Pair with GPG validation (`disable_gpg_check: false`, which is the default) and pin repos with `gpgcheck=1` + `repo_gpgcheck=1` in the `.repo` file."
    cwe: ['CWE-295', 'CWE-345', 'CWE-494']
    owasp_appsec: ["A07:2021", "A08:2021"]
    owasp_asvs: [V12.3.4, V15.2.4]
    mitre_attack: ['T1195.002', 'T1557']
    cis_controls: ['CIS-2.2', 'CIS-2.6']
    nist_controls: ['SC-8', 'SC-8(1)', 'SI-7']
    pci_dss: ['4.1', '6.2']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7', 'CC7.1']

  - id: "yum_sslverify_false"
    category: "supply_chain"
    severity: "HIGH"
    title: "ansible.builtin.yum With sslverify: false (Disables Repo-Level SSL Verification)"
    description: "An `ansible.builtin.yum` / `yum` task sets `sslverify: false`. This writes `sslverify=0` into the repo config, disabling SSL verification of the mirror URLs at the yum-daemon level (lower in the stack than `validate_certs:`, and harder to audit after the fact because it persists in `/etc/yum.repos.d/*.repo`). Equivalent to making every subsequent `yum install` vulnerable to mirror-swap attacks, not just this one task."
    regex: "(?ms)(?:ansible\\.builtin\\.yum|^[\\t ]*yum)\\s*:[\\s\\S]{0,800}?\\bsslverify\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?(?:\\s|$|#)"
    positive_examples:
      - |2-
        ansible.builtin.yum:
                    # ...
                    sslverify: False
      - |2-
        yum:
                    name: foo
                    sslverify: 'no'
      - |2-
        ansible.builtin.yum:
                    name: foo
                    sslverify: "false"
    negative_examples:
      - |2-
        yum:
                    name: foo
                    sslverify: true
    multiline: true
    window: 30
    recommendation: "Remove `sslverify: false` from yum tasks. For self-signed internal mirrors: distribute the CA bundle to `/etc/pki/ca-trust/source/anchors/` and run `update-ca-trust`. Audit existing hosts with `ansible -m shell -a 'grep -rE \"^sslverify\\s*=\\s*0\" /etc/yum.repos.d/'`."
    cwe: ['CWE-295', 'CWE-345', 'CWE-494']
