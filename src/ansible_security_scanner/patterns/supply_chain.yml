  - id: "self_modifying_ci_config"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Ansible Task Writes to Own CI/CD Configuration"
    description: "A copy/template/lineinfile/blockinfile/replace/file task writes to `.github/workflows/`, `.gitlab-ci.yml`, `Jenkinsfile`, `bitbucket-pipelines.yml`, `azure-pipelines.yml`, `.circleci/config.yml`, `.drone.yml`, or Tekton PipelineRuns in the scanned repository. A playbook modifying its own CI pipeline is the canonical persistence + privilege-escalation primitive - the attacker gets every future CI token."
    regex: "(?:copy|template|lineinfile|blockinfile|replace|file|ansible\\.builtin\\.(?:copy|template|lineinfile|blockinfile|replace|file))\\s*:[\\s\\S]{0,400}?(?:dest|path)\\s*:\\s*[\"']?[^\"'\\n]*?(?:\\.github/workflows/|\\.gitlab-ci\\.yml|Jenkinsfile|bitbucket-pipelines\\.yml|azure-pipelines\\.yml|\\.circleci/config\\.yml|\\.drone\\.yml|tekton/.*\\.yml)"
    positive_examples:
      - "copy:dest:.github/workflows/"
    multiline: true
    window: 10
    recommendation: "CI configuration must be changed by human-reviewed commits, not by automation running inside CI. If you truly need generated CI (monorepo matrices, generated language bindings), generate the config in a separate untrusted-sandbox job with a minimal token (read-only on the repo, no write to `.github/`). Protect the branches that own CI files with CODEOWNERS + required reviews."
    cis_controls: ["CIS-Supply-Chain"]
