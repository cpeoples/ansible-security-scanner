  - id: "rpm_install_no_digest_no_signature_flags"
    category: "supply_chain"
    severity: "HIGH"
    title: "rpm --nodigest / --nosignature / --nofiledigest Flag Used Directly In Install"
    description: "A task runs `rpm -i` / `rpm -U` / `rpm -ivh` / `rpm -Uvh` with `--nodigest`, `--nosignature`, `--nofiledigest`, or `--noverify`. These bypass the per-package header signature AND per-file digest checks that are rpm's core supply-chain defences - independent of the repo-level `gpgcheck=0` setting (already covered by `rpm_install_nosignature_or_nogpg`) which controls metadata signing. The `rpm --no*` flags bypass PACKAGE AND FILE-level verification, so a malicious RPM with a legitimate-looking filename (e.g. a retagged `firefox-115.0-1.el9.rpm` pointing at backdoored binaries) will install without error. Exploited in 2024 during the `dvmpox` operation that distributed malicious .rpm via a compromised mirror."
    regex: "rpm\\s+[^\\n]*?-[iUF](?:vh|hv|v|h)?\\s+[^\\n]*?(?:--nodigest|--nosignature|--nofiledigest|--noverify)\\b"
