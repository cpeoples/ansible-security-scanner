  - id: "docker_buildx_secret_mounted_as_env"
    category: "supply_chain"
    severity: "HIGH"
    title: "Docker BuildKit secret mounted as environment variable (persists in image layer)"
    description: "A Dockerfile or `docker buildx build` command uses `--mount=type=secret` AND then immediately copies the secret into an environment variable (`ENV TOKEN=$(cat /run/secrets/token)`) or writes it to a persistent path (`RUN cp /run/secrets/token /etc/app/token`) - defeating BuildKit's secret-mount guarantee that the secret is NOT persisted in the image. Also catches `docker build --build-arg SECRET=...` which is stored verbatim in image history. This is the 2023-2024 top finding in Snyk / Docker Hub secret-scanner reports."
    regex: "(?:RUN\\s+--mount=type=secret[^\\n]*\\s+[\\s\\S]{0,300}?(?:ENV\\s+\\w+\\s*=|cp\\s+/run/secrets/|cat\\s+/run/secrets/[^\\n]*>\\s*[^/][^\\n]+)|docker\\s+build(?:x\\s+build)?\\s+[^\\n]*?--build-arg\\s+(?:[A-Z_]*(?:TOKEN|SECRET|PASSWORD|KEY|APIKEY)[A-Z_]*)\\s*=\\s*['\"]?[A-Za-z0-9_/+=.-]{8,}['\"]?)"
    positive_examples:
      - "RUN --mount=type=secret ENV a="
    multiline: true
    window: 10
    recommendation: "Use BuildKit secrets correctly: `RUN --mount=type=secret,id=npm,target=/root/.npmrc npm install` - the secret is available only within that RUN invocation and is not persisted. NEVER copy a BuildKit secret into an `ENV`, a file outside `/run/secrets`, or a layer that will be committed. For runtime secrets, inject at container start via an orchestrator secret-volume (Kubernetes Secret / Swarm secret / ECS Secrets) - not at build time. Never use `--build-arg` for anything sensitive; build args are visible in `docker history`. Audit builds with `docker history <image> --no-trunc | grep -i 'token\\|secret\\|password'`."
    cwe: ['CWE-200', 'CWE-532', 'CWE-798']
    owasp_appsec: ["A01:2021", "A07:2021", "A09:2021"]
    owasp_asvs: [V13.2.3, V13.3.1, V16.2.5, V14.2.2]
    mitre_attack: ['T1552.001', 'T1552.004']
    cis_controls: ['CIS-3.11', 'CIS-Docker']
    nist_controls: ['IA-5', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
