  - id: "npm_install_runs_postinstall_scripts_from_untrusted_registry"
    category: "supply_chain"
    severity: "HIGH"
    title: "npm install runs lifecycle scripts without --ignore-scripts from an untrusted registry"
    description: "A task invokes `npm install`, `npm ci`, `yarn install`, `pnpm install`, `community.general.npm`, or `community.general.yarn` without `--ignore-scripts` (or `ignore_scripts: true`), and without a pinned, integrity-verified lockfile + a trusted registry. npm `preinstall`/`install`/`postinstall` lifecycle scripts execute arbitrary code with the permissions of the running user - the 2024 `lottie-player` tag-hijack, the Oct 2024 `ultralytics` compromise, the 2022 `ua-parser-js` incident, and the Feb 2025 `reproduce.js` / `requestly` incidents all weaponised postinstall. Also matches `npm_config_registry` / `.npmrc` pointing at an unpinned, non-corporate registry (`registry.npmjs.org` without `--before`/shrinkwrap integrity, or an http:// mirror)."
    regex: "(?:(?:community\\.general\\.)?(?:npm|yarn):[\\s\\S]{0,400}?(?:ignore_scripts\\s*[:=]\\s*(?:false|no|0)|^(?![\\s\\S]{0,400}?ignore_scripts))|\\b(?:npm|pnpm)\\s+(?:install|ci|i)\\b(?![^\\n]*--ignore-scripts)[^\\n]*|\\byarn\\s+(?:install|add)\\b(?![^\\n]*--ignore-scripts)(?![^\\n]*--frozen-lockfile)[^\\n]*|\\.npmrc[\\s\\S]{0,200}?registry\\s*=\\s*http://)"
    positive_examples:
      - "- name: Run npm install"
    multiline: true
    window: 10
    recommendation: "Always pass `--ignore-scripts` to every npm / pnpm / yarn invocation in CI and playbooks - `npm ci --ignore-scripts` (or `ignore_scripts: true` in `community.general.npm`). Run a separate, explicit, sandboxed build step for each package that legitimately requires a postinstall (esbuild, sharp, canvas) using `node --permission` (Node 20+) or a gVisor/Firecracker container. Pin every dependency + transitive via lockfile integrity (`package-lock.json` with `lockfileVersion: 3` + `integrity: sha512-...`, or `pnpm-lock.yaml` + `verify-store-integrity: true`). Point `registry` at an internal proxy (Artifactory, Sonatype Nexus, GitHub Packages) that enforces allowlist + malware scanning. Enable `npm audit signatures` (2024 provenance) and block unsigned publishes. Review Socket.dev / Snyk advisories weekly. For CI, prefer `actions/setup-node` with `cache: npm` + `npm ci --ignore-scripts` - never use ad-hoc `curl | bash` installers."
    cwe: ['CWE-494', 'CWE-829', 'CWE-1357']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]
