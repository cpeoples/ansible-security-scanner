name: "Supply Chain Integrity Patterns"
author: "Ansible Security Scanner Team"
description: "Detects supply-chain integrity risks: piping remote payloads into interpreters, unpinned package installers, fetches from raw code hosting, Galaxy requirement anti-patterns, and risky callback/action/filter/lookup/strategy plugin loading that can hand the controller to an attacker."

patterns:
  # -- Remote-payload -> interpreter pipes --------------------------------

  - id: "curl_pipe_to_shell"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "curl Piped Directly to a Shell"
    description: "curl output is piped into bash/sh/zsh with no checksum, signature, or local review. Whoever controls (or can MitM) the URL runs arbitrary code as the playbook user."
    regex: "curl\\s+[^\\n|]*\\|\\s*(?:sudo\\s+)?(?:ba|z)?sh\\b"
    positive_examples:
      - "shell: gpg --keyserver hkp://keys.gnupg.net --recv-keys 409B6B1796C275462A1703113804BB82D39DC0E3 && curl -sSL https://get.rvm.io | bash -s stable"
    recommendation: "Download with `get_url` pinned to a checksum, inspect the script, then run it. Never pipe a network fetch into a shell unattended."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1059.004", "T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "wget_pipe_to_shell"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "wget Piped Directly to a Shell"
    description: "wget output is piped into bash/sh with no integrity verification - identical risk to curl|bash."
    regex: "wget\\s+[^\\n|]*\\|\\s*(?:sudo\\s+)?(?:ba|z)?sh\\b"
    positive_examples:
      - "wget |sh"
    recommendation: "Use `get_url` with `checksum:`, then execute the file explicitly. Don't let the network dictate what runs on your host."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1059.004", "T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "python_remote_exec"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Remote Python Script Piped into python"
    description: "A .py payload is fetched and piped into `python` / `python3` - same RCE pattern as curl|bash but via the Python interpreter."
    regex: "(?:curl|wget)\\s+[^\\n|]*\\.(?:py|python)[^\\n|]*\\|\\s*python(?:3)?\\b"
    positive_examples:
      - "RUN (curl https://bootstrap.pypa.io/get-pip.py | python - --no-cache-dir ) && \\"
    recommendation: "Download the .py with `get_url` + `checksum:`, code-review it, then run it. Don't pipe remote Python into an interpreter."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1059.006", "T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "pip_install_no_version"
    category: "supply_chain"
    severity: "HIGH"
    title: "pip install Without a Version Pin"
    description: "`pip install <pkg>` with no `==<version>` or `--require-hashes` takes the latest release - vulnerable to dependency-confusion, typosquatting, and surprise-transitive upgrades."
    regex: "pip(?:3)?\\s+install\\s+(?!-r\\b|--requirement\\b)(?!.*==)(?!.*--require-hashes)[A-Za-z_][A-Za-z0-9_\\-]*(?:\\s|$)"
    positive_examples:
      - "- bash: python -m pip install ansible-core"
    recommendation: "Pin with `pip install pkg==1.2.3` and prefer `pip install --require-hashes -r requirements.txt` to get reproducible builds."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-829', 'CWE-1357']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "raw_github_script_exec"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "raw.githubusercontent.com Payload Piped to Shell"
    description: "Fetching a script from raw.githubusercontent.com and piping it into a shell. GitHub's raw content is effectively anonymous CDN - ANY commit on ANY branch is reachable without review."
    regex: "(?:curl|wget)\\s+[^\\n|]*raw\\.githubusercontent\\.com[^\\n|]*\\|\\s*(?:sudo\\s+)?(?:ba|z)?sh\\b"
    positive_examples:
      - "curl raw.githubusercontent.com|sh"
    recommendation: "Download the artefact with `get_url` + `checksum:`, store it in your own artefact store, and reference that. Raw GitHub content is not a distribution channel."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1059.004", "T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "install_script_from_url"
    category: "supply_chain"
    severity: "HIGH"
    title: "Vendor Install-Script URL Piped to Shell"
    description: "Classic `curl https://get.<vendor>.<tld> | sh` pattern. Even when the vendor is legitimate today, the install script is opaque and can change at any time."
    regex: "(?:curl|wget)\\s+[^\\n|]*https?://(?:get\\.|install\\.|setup\\.)[^\\s|]*\\s*\\|\\s*(?:sudo\\s+)?(?:ba|z)?sh\\b"
    positive_examples:
      - "shell: gpg --keyserver hkp://keys.gnupg.net --recv-keys 409B6B1796C275462A1703113804BB82D39DC0E3 && curl -sSL https://get.rvm.io | bash -s stable"
    recommendation: "Use the vendor's package repository (apt/yum/rpm) or download and verify a signed release asset. If the vendor only ships a `curl|sh` installer, vendor it behind your own CI and pin a checksum."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "python_setup_py_exec"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "python setup.py install (Legacy, Executes Arbitrary Code)"
    description: "`python setup.py install` runs arbitrary Python from the package's setup.py at install time - the whole reason pip stopped doing it by default. Use pip + wheel instead."
    regex: "\\bpython(?:3)?\\s+setup\\.py\\s+(?:install|develop|build)\\b"
    positive_examples:
      - "python setup.py install"
    recommendation: "Use `pip install .` (it builds a wheel in isolation) or publish to a package index and install pinned. Don't run setup.py directly."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-3', 'SI-7', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-94', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []

  - id: "python_build_from_source"
    category: "supply_chain"
    severity: "LOW"
    title: "python -m build Inside a Playbook"
    description: "Building Python packages from source inside a deploy playbook couples your deploy to your source tree and means artefacts aren't produced by CI. It's also a recipe for 'works on my controller' drift."
    regex: "\\bpython(?:3)?\\s+-m\\s+build\\b"
    positive_examples:
      - "python -m build"
    recommendation: "Move package building into CI. Publish artefacts to a registry (PyPI / Artifactory / Nexus) and have the playbook install from there with pinned versions."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    cwe: ['CWE-1357']
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1195.002']

  - id: "gem_install_local"
    category: "supply_chain"
    severity: "HIGH"
    title: "gem install From a Local Path"
    description: "`gem install /tmp/foo.gem` installs from an unsigned local file - anyone who dropped that file on disk gets code execution as the deploying user."
    regex: "\\bgem\\s+install\\s+(?:/tmp/|/var/tmp/|/dev/shm/|~/)[^\\s]+\\.gem\\b"
    positive_examples:
      - "gem install /tmp/x.gem"
    recommendation: "Install from a trusted gem source (RubyGems or a private gem server) with a pinned version and signed release."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  # -- Galaxy / Collections / requirements.yml ---------------------------
  # Consolidated here from patterns/galaxy_supply_chain.yml. Rule IDs
  # preserved; remediation routed via _RULE_ID_TO_CATEGORY to the existing
  # GalaxySupplyChainRemediationGenerator.

  - id: "galaxy_requirements_http_source"
    category: "supply_chain"
    severity: "HIGH"
    title: "Galaxy Collection / Role Fetched Over http://"
    description: "A galaxy-style requirement (``roles:`` / ``collections:`` list item) specifies ``src:`` or ``url:`` pointing at ``http://`` rather than ``https://``. Any network-adjacent attacker can swap in a malicious tarball, role, or git repo. Anchors on the galaxy-manifest shape (nested under ``roles:`` / ``collections:`` / ``requirements:`` or paired with ``name:``/``version:``/``type:`` within a few lines) to avoid firing on every incidental ``url: http://...`` in normal tasks."
    # The previous regex matched any ``url: http://`` / ``src: http://``
    # on any line of any YAML file - a huge FP class because the same
    # shape appears in ``uri:`` task URLs, ``get_url:`` task URLs,
    # ``inventory: [http://...]`` inventory entries, and ``lineinfile:
    # line: url: http://...`` config-file bodies. A real galaxy
    # requirement is a LIST ITEM directly under a ``roles:`` /
    # ``collections:`` / ``requirements:`` key, and has at least one
    # of ``name:`` / ``version:`` / ``type:`` / ``scm:`` within a few
    # lines of ``src:`` / ``url:``. Require that structural shape.
    regex: "(?ms)(?:^[ \\t]*-\\s+(?:src|url):\\s*['\"]?http://[\\s\\S]{0,300}?^[ \\t]+(?:\\bversion\\b|\\bscm\\b|\\btype\\b|\\bname\\b)\\s*:|(?:^|\\n)[ \\t]*(?:roles|collections|requirements):[\\s\\S]{0,50}?\\n[\\s\\S]{0,800}?[ \\t]*-\\s+[\\s\\S]{0,200}?(?:src|url):\\s*['\"]?http://)"
    multiline: true
    recommendation: "Change every http:// URL to https://. If fetching from a git server that only speaks http, host your own mirror behind https and pin the artefact hash."
    positive_examples:
      - |2-
        roles:
          - src: http://github.example.com/myorg/ansible-role-foo
            name: foo
            version: 1.0.0
      - |2-
        collections:
          - name: myorg.utils
            type: galaxy
          - src: http://git.example.com/ansible/collection-foo
            type: git
            version: main
      - |2-
        - src: http://mirror.example.com/roles/nginx.tar.gz
          name: nginx
          scm: git
    negative_examples:
      - |2-
        - name: hit an internal API
          ansible.builtin.uri:
            url: http://api.internal.example.com/status
      - |2-
        - name: download a tarball
          ansible.builtin.get_url:
            url: http://mirror.example.com/artifact.tgz
            dest: /tmp/
      - |2-
        - name: write a line to a file
          ansible.builtin.lineinfile:
            path: /etc/app.conf
            line: 'backend_url: http://internal:8080/health'
      - |2-
        - name: set a fact
          ansible.builtin.set_fact:
            endpoint: http://internal.example.com
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SC-8', 'SC-8(1)', 'SI-7']
    pci_dss: ['2.2.7', '4.2.1', '6.3.2', '6.3.3']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7', 'CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-319', 'CWE-494']
    owasp_appsec: ["A02:2021", "A08:2021"]
    owasp_asvs: [V12.2.1, V12.3.4, V15.2.4]

  - id: "galaxy_requirements_git_branch_ref"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Galaxy Requirement Uses Branch / HEAD Reference"
    description: "version: main / master / HEAD / develop - pulls whatever is at the tip of a moving branch, so an attacker with push access can change what gets deployed without bumping a version."
    regex: "version:\\s*['\"]?(?:main|master|HEAD|develop|trunk|latest)['\"]?\\s*$"
    positive_examples:
      - "keycloak_version: latest"
    recommendation: "Replace branch refs with an immutable tag (`version: 1.2.3`) or commit SHA (`version: 3f4a1c8...`). Automate the bump through a PR so changes are reviewed."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-829', 'CWE-1357']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "galaxy_requirements_non_galaxy_source"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Galaxy Requirement From Non-Galaxy Source Without Checksum"
    description: "requirements.yml pulls a collection or role via raw git/tarball URL (src: git+... or src: https://...tar.gz) without a signature or checksum - no integrity verification."
    regex: "src:\\s*['\"]?(?:git\\+|https?://[^'\"\\n]+\\.(?:tar\\.gz|zip|tgz))"
    positive_examples:
      - "src: https://dl.google.com/android/repository/platform-tools_r27.0.0-linux.zip"
    recommendation: "Prefer Galaxy / Automation Hub namespaces. If a direct URL is unavoidable, pin by commit SHA (for git) or publish and verify a SHA256 out-of-band."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "ansible_galaxy_install_ignore_errors"
    category: "supply_chain"
    severity: "HIGH"
    title: "ansible-galaxy install --ignore-errors in CI"
    description: "Shell task installs Galaxy content with --ignore-errors (or --force alongside unpinned versions), masking failures that could indicate a hijacked or deleted collection."
    regex: "ansible-galaxy\\s+(?:collection|role)\\s+install[\\s\\S]{0,300}?(?:--ignore-errors|-i)\\b"
    positive_examples:
      - "command: ansible-galaxy role install ansible.nope -vvvv --ignore-errors"
    multiline: true
    window: 4
    recommendation: "Never run ansible-galaxy with --ignore-errors in CI or production. Fail loud on missing or corrupted content."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    cwe: ['CWE-754']
    mitre_attack: ['T1195.002']

  - id: "ansible_galaxy_install_force_latest"
    category: "supply_chain"
    severity: "HIGH"
    title: "ansible-galaxy install --force pulls latest, bypasses lockfile"
    description: "--force reinstalls collections/roles at the latest available version even when a pinned version is present, silently breaking deterministic deploys."
    regex: "ansible-galaxy\\s+(?:collection|role)\\s+install[\\s\\S]{0,300}?(?:--force|-f)\\b"
    positive_examples:
      - "~/.local/bin/ansible-galaxy collection install -vvv --force /tmp/just_new_collection/*.tar.gz"
    multiline: true
    window: 4
    recommendation: "Drop --force. Use `ansible-galaxy install --force-with-deps` only when re-resolving a lockfile on purpose, and always pair with an explicit requirements.yml that has every version pinned."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    cwe: ['CWE-1357']
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1195.002']

  # -- Callback / Plugin / Strategy Risks --------------------------------
  # Consolidated here from patterns/callback_plugin_risk.yml. Rule IDs
  # preserved; remediation routed via _RULE_ID_TO_CATEGORY to the existing
  # CallbackPluginRiskRemediationGenerator.

  - id: "callback_whitelist_arbitrary"
    category: "supply_chain"
    severity: "HIGH"
    title: "Ansible Callback Loads Arbitrary / External Plugin"
    description: "callback_whitelist / callbacks_enabled lists a plugin that is not shipped with ansible-core and not a pinned collection - any Python file under the callback_plugins path is executed in the controller process on every task event."
    regex: "^\\s*(?:callback_whitelist|callbacks_enabled)\\s*=\\s*[^#\\n]*(?:profile|exfil|http|webhook|telemetry|external)"
    positive_examples:
      - "callbacks_enabled = profile_tasks"
    recommendation: "Only enable callbacks from trusted collections (ansible.posix.profile_tasks, ansible.posix.timer, community.general.json). Audit third-party callbacks as code."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-3', 'SI-7', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1546"]
    cwe: ['CWE-94', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []

  - id: "callback_plugins_path_untrusted"
    category: "supply_chain"
    severity: "HIGH"
    title: "callback_plugins Path Points at Writable / Remote Location"
    description: "callback_plugins configured to a path in /tmp, /var/tmp, a user's writable directory, or a mounted remote share - any file dropped there runs inside the Ansible controller on the next play."
    regex: "^\\s*callback_plugins\\s*=\\s*(?:/tmp|/var/tmp|~|\\$HOME|/mnt|/media)"
    positive_examples:
      - "callback_plugins = ~/.ansible/plugins/callback:/usr/share/ansible/plugins/callback:lib/trellis/plugins/callback"
    recommendation: "Set callback_plugins to a read-only, root-owned path inside the project (e.g. ./plugins/callback). Reject world-writable locations in CI."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1546"]
    cwe: ['CWE-426', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: []

  - id: "strategy_plugin_custom"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Custom / Non-Core Strategy Plugin In Use"
    description: "strategy is set to a value that is not 'linear', 'free', 'debug', or a well-known collection strategy - custom strategy plugins run arbitrary Python in the controller process."
    regex: "^\\s*strategy\\s*[=:]\\s*['\"]?(?!(?:linear|free|debug|host_pinned)\\b)[a-zA-Z_][a-zA-Z0-9_.]*"
    positive_examples:
      - "strategy: node-first"
    recommendation: "Use core strategies (linear / free / host_pinned) unless you have a specific need. If you must use a custom strategy, review its source and pin the collection version."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    cwe: ['CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: []
    mitre_attack: ['T1546']

  - id: "filter_plugins_path_untrusted"
    category: "supply_chain"
    severity: "HIGH"
    title: "filter_plugins / lookup_plugins Path In Writable Location"
    description: "filter_plugins, lookup_plugins, action_plugins, or vars_plugins configured to /tmp or $HOME - same risk as callback_plugins: arbitrary Python loads in the controller process."
    regex: "^\\s*(?:filter_plugins|lookup_plugins|action_plugins|vars_plugins)\\s*=\\s*(?:/tmp|/var/tmp|~|\\$HOME|/mnt|/media)"
    positive_examples:
      - "filter_plugins = ~/.ansible/plugins/filter:/usr/share/ansible/plugins/filter:lib/trellis/plugins/filter"
    recommendation: "Plugin paths must be read-only, under the project, and version-controlled. Reject any *_plugins pointing at /tmp or user dirs in CI."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1546"]
    cwe: ['CWE-426', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: []

  - id: "action_plugin_shadow_core"
    category: "supply_chain"
    severity: "HIGH"
    title: "Custom action_plugins/ Shadows a Core Module"
    description: "A file under action_plugins/ is named the same as a core module (command.py, shell.py, copy.py, template.py) - intercepts every call to that module and can exfiltrate arguments or modify behaviour silently."
    regex: "^\\s*action_plugins\\s*=\\s*[^#\\n]*"
    positive_examples:
      - "action_plugins = {{ ara_setup_plugins.stdout }}/action"
    recommendation: "Audit every file under your action_plugins path. Rename custom actions so they don't shadow core module names; prefer an explicit namespace prefix."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-3', 'SI-7', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1546"]
    cwe: ['CWE-94', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []

  # -- Ansible role meta/main hygiene -------------------------------------
  # A role's meta/main.yml declares dependencies, galaxy metadata, and
  # platforms. Attacker-controlled meta pulls in arbitrary roles; an
  # unversioned dependency pulls in whatever is live today on Galaxy.

  - id: "role_meta_dependency_without_version"
    category: "supply_chain"
    severity: "HIGH"
    title: "Role meta/main: dependency without a pinned version"
    description: "A role dependency in meta/main.yml does not pin a version. The next `ansible-galaxy install -r` pulls whatever the upstream maintainer publishes at that moment."
    regex: "^\\s*dependencies\\s*:\\s*\\n(?:\\s*-\\s*(?:role|src)\\s*:\\s*[^\\s#\\n]+\\s*\\n)+(?!\\s*version\\s*:)"
    positive_examples:
      - |2
        dependencies:
          - role: setup_ec2_facts
    multiline: true
    window: 6
    recommendation: "Pin the dependency: `version: 1.2.3` (or a sha). Never depend on `latest` in production roles."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    mitre_attack: ["T1195"]
    cwe: ['CWE-1357']
    owasp_asvs: [V15.2.4]

  - id: "role_meta_dependency_git_url"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Role meta/main: dependency pulled from a git URL"
    description: "Role dependency is sourced from a raw git URL. Unless the URL is pinned to an immutable ref (sha), force-push on the upstream branch replaces the role."
    regex: "src\\s*:\\s*['\"]?git\\+?https?://"
    positive_examples:
      - "- src: git+http://bitbucket.org/willthames/git-ansible-galaxy"
    recommendation: "Prefer a Galaxy role with a pinned version. If you must use git, pin to an immutable sha (`version: abc123...`) rather than a branch name."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
