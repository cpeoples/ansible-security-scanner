  - id: "github_actions_pull_request_target_with_head_ref_checkout"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "GitHub Actions pull_request_target Workflow Checks Out Attacker-Controllable head.ref"
    description: "A GitHub Actions workflow uses `on: pull_request_target` (trigger runs in the TARGET repo context with READ/WRITE secrets) AND performs `actions/checkout@*` with `ref: ${{ github.event.pull_request.head.ref }}` / `head.sha` / `head.repo.full_name`. This is the canonical pattern documented in GitHub's own 'Dangerous Workflows' Security Advisory and written up by Dawid Czagan / NCC Group / Trail of Bits as the direct RCE-against-the-target-repo primitive: an external contributor opens a PR from their fork, the workflow checks out their branch's code INTO the target repo's privileged context, and executes it with full secrets access. This is the specific pattern that caused the 2024 Ultralytics PyPI compromise (CVE-2024-53899) and the 2023 Pwn Request campaigns against >100 major OSS projects. Distinct from the existing `gh_actions_pull_request_target` rule (which catches the trigger alone) - this catches the specific checkout + ref combo that is unambiguously exploitable."
    regex: "on\\s*:[\\s\\S]{0,400}?pull_request_target[\\s\\S]{0,2500}?(?:actions/checkout@|uses\\s*:\\s*actions/checkout@)[\\s\\S]{0,400}?ref\\s*:\\s*\\$\\{\\{\\s*github\\.event\\.pull_request\\.head\\.(?:ref|sha)"
    multiline: true
    window: 80
    positive_examples:
      - |2
        on:
          pull_request_target:
        jobs:
          test:
            steps:
              - uses: actions/checkout@v4
                with:
                  ref: ${{ github.event.pull_request.head.ref }}
    recommendation: "NEVER combine `pull_request_target` with a checkout of the PR author's code. Safe patterns: (1) Use `on: pull_request` (default, runs in read-only fork context - no secrets access, safe to check out PR code), OR (2) Use `on: pull_request_target` ONLY to check out the BASE repo code (`ref: ${{ github.event.pull_request.base.ref }}`) and treat the PR data as data (labels/metadata/title), never executing it. For unavoidable cases (e.g. PR-based linting with secret tokens), use a TWO-WORKFLOW split: a `pull_request`-triggered workflow runs the untrusted code and produces a SIGNED artifact; a `workflow_run`-triggered follow-up workflow (with secrets) verifies the signature and performs privileged actions. Enforce organizationally via GitHub org ruleset: require `pull_request_target` workflows to pass a manual security review. Detect existing instances via CodeQL query `github/codeql` -> `actions/pr-target-ref-checkout`."
    cwe: ['CWE-94', 'CWE-829', 'CWE-1336']
    cve: ["CVE-2024-53899"]
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []
    mitre_attack: ['T1059', 'T1059.004', 'T1195.002']
    cis_controls: ['CIS-2.4', 'CIS-16.2', 'CIS-16.11']
    nist_controls: ['CM-7', 'SI-7', 'SI-10']
    pci_dss: ['6.3.2', '6.3.3', '11.5.1']
    hipaa: ['164.312(c)(1)']
