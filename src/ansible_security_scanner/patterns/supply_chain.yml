    cis_controls: ['CIS-3.11', 'CIS-8.11', 'CIS-16.11']
    nist_controls: ['AU-9', 'IA-5', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2', '10.3.1']
    hipaa: ['164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC7.2']

  - id: "github_actions_run_block_injection_untrusted_context"
    category: "supply_chain"
    severity: "HIGH"
    title: "GitHub Actions: Untrusted github.event Context Interpolated Into Shell run:"
    description: "A GitHub Actions workflow (or an Ansible-rendered workflow) interpolates attacker-controllable expressions such as ${{ github.event.issue.title }}, ${{ github.event.issue.body }}, ${{ github.event.pull_request.title }}, ${{ github.event.pull_request.body }}, ${{ github.event.comment.body }}, ${{ github.event.review.body }}, ${{ github.event.pages.*.page_name }}, ${{ github.head_ref }}, or ${{ github.event.head_commit.message }} directly into a shell `run:` block. Because GitHub substitutes these values BEFORE the shell runs, any quote, semicolon, backtick, or $(...) inside the untrusted text is executed as part of the command. This is the canonical GitHub-Actions RCE primitive."
    regex: "(?ms)^\\s*run\\s*:\\s*(?:[|>]-?\\s*)?\\n[\\s\\S]{0,1200}?\\$\\{\\{\\s*github\\.(?:event\\.(?:issue|pull_request|comment|review|pages|head_commit|discussion|release)\\.[A-Za-z0-9_.*]+|head_ref)\\s*\\}\\}"
    positive_examples:
      - |2-
