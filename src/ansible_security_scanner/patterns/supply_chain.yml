    severity: "HIGH"
    title: "Post-Install Task Adds SUID/SGID Bit To Arbitrary Binary"
    description: "A playbook runs `chmod u+s`, `chmod g+s`, or `chmod 4755` / `chmod 6755` / numeric mode ≥ `4000` on a file that is NOT a known-legitimate SUID binary (`/usr/bin/sudo`, `/bin/ping`, `/usr/bin/passwd`, `/usr/bin/mount`). New SUID binaries are one of the top-3 Linux persistence / privesc primitives (T1548.001, T1543) - any new SUID in `/tmp`, `/opt`, `/usr/local/bin`, or a home directory is a near-certain backdoor."
    regex: "(?:ansible\\.builtin\\.)?(?:file|command|shell)[\\s\\S]{0,200}?(?:mode\\s*:\\s*['\"]?(?:0?[4567][0-7]{3}|u\\+s|g\\+s)|chmod\\s+(?:[ug]\\+s|[4567][0-7]{3})\\s+(?!/usr/bin/(?:sudo|su|passwd|mount|umount|newgrp|chsh|chfn|gpasswd|ping|traceroute|su)(?:\\s|$)|/bin/(?:ping|mount|umount|su)(?:\\s|$)|/usr/libexec/)[^\\s]+)"
    positive_examples:
      - "filemode:4000"
    multiline: true
    window: 12
    recommendation: "NEVER add new SUID/SGID binaries via playbook unless the binary is part of a hardened package (`setuid-dumpable`, `capability`-aware, audited by the distro). Prefer Linux capabilities: `setcap cap_net_bind_service=+ep /opt/app/mybin` which grants ONLY the specific capability without full root exposure. For delegated admin, use `sudo` with narrow sudoers rules. Audit existing SUID inventory: `find / -xdev \\\\( -perm -4000 -o -perm -2000 \\\\) -type f -exec ls -la {} \\\\;` and diff against a golden baseline. Alert on new SUID via auditd `-a always,exit -F path=/bin/chmod -F arch=b64 -S chmod,fchmod -k suid_change`."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
