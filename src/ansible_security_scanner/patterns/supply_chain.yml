  - id: "pip_index_url_or_extra_index_http_not_https"
    category: "supply_chain"
    severity: "HIGH"
    title: "pip --index-url / --extra-index-url Set To Plaintext HTTP (MitM-able Package Download)"
    description: "A task runs `pip install --index-url http://...` / `--extra-index-url http://...`, renders `/etc/pip.conf` or `~/.pip/pip.conf` with `index-url = http://...`, or sets `PIP_INDEX_URL=http://...` / `PIP_EXTRA_INDEX_URL=http://...` in an env block. Plaintext HTTP means any on-path attacker (rogue Wi-Fi, compromised corporate TLS-proxy with an internal-only HTTP fallback, BGP-hijacking a PyPI mirror) can substitute malicious wheels with the correct filenames - pip has no out-of-band signature verification. PyPI itself redirects HTTP -> HTTPS since 2018; the only remaining HTTP indexes are internal mirrors that skipped TLS - exactly the targets compromised by the 2024 JFrog-reported internal-mirror-compromise incidents."
    regex: "(?:pip(?:3)?\\s+install\\s+[^\\n]*?--(?:extra-)?index-url\\s+http://|--trusted-host\\s+[^\\n]*?http|(?:index-url|extra-index-url)\\s*=\\s*http://|PIP_(?:EXTRA_)?INDEX_URL\\s*[:=]\\s*['\"]?http://)"
    positive_examples:
      - "pip install --index-url http://"
    multiline: true
    window: 8
    recommendation: "Use HTTPS for every pip index - `https://pypi.org/simple/` (public) or `https://internal-pypi.example.com/simple/` (internal mirror). For internal mirrors, provision a trusted TLS cert via an internal CA distributed via `/etc/ssl/certs/` and pip will validate automatically. If a mirror genuinely cannot do TLS (legacy), use `pip install --trusted-host internal-mirror.example.com` and PIN THE HOST TO THE CORPORATE NETWORK ONLY via network policy (never expose the HTTP mirror via a VPN-endpoint or laptop egress). For air-gapped installs, use `pip download` on a trusted build host -> transfer wheels via signed tarball -> `pip install --no-index --find-links=/local/wheels`. Enforce signed packages via `pip install --require-hashes` (PEP 665 / PEP 708 in 2024) referencing a committed `requirements.txt` with sha256 hashes."
    cwe: ['CWE-319', 'CWE-345', 'CWE-494']
