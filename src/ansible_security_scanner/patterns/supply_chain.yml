  - id: "github_actions_uses_unpinned_branch_or_main_ref"
    category: "supply_chain"
    severity: "HIGH"
    title: "GitHub Actions workflow references a third-party action by unpinned branch / @main / @master / @latest"
    description: "A task writes a GitHub Actions workflow file (`.github/workflows/*.yml`) whose `uses:` step references a third-party action by a mutable git ref (`@main`, `@master`, `@v1`, `@latest`, `@develop`, any branch name) instead of a full 40-char commit SHA. The `tj-actions/changed-files` (CVE-2025-30066, March 2025) and `reviewdog/action-setup` (March 2025) incidents showed that a single upstream tag/branch compromise cascaded into secret theft across thousands of repositories in hours. GitHub's own hardening guidance and OpenSSF Scorecard's `Pinned-Dependencies` check require SHA pinning for every non-first-party action."
    regex: "(?:^|\\n)\\s*-?\\s*uses\\s*:\\s*['\"]?(?!actions/|github/|\\./)[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+(?:/[a-zA-Z0-9_./\\-]+)?@(?:main|master|develop|latest|v[0-9]+(?:\\.[0-9]+)?(?:\\.[0-9]+)?|HEAD|[a-z0-9_\\-/]{1,39})(?![a-f0-9])"
    positive_examples:
      - "uses: felixfontein/ansible-test-gh-action@main"
    recommendation: "Pin every `uses:` to a full 40-char commit SHA, not a tag or branch. Use Dependabot (`package-ecosystem: github-actions`) to auto-open PRs that bump the SHA + review the upstream diff each time. For first-party actions under `actions/`, `github/`, or your own org, pinning to a major tag is acceptable if your threat model trusts GitHub + your own repo admins. For everything else (community, unknown authors): SHA-pin and audit the action's source before first use. Run OpenSSF Scorecard in CI and fail the build if `Pinned-Dependencies` < 8. Restrict secret scope with `permissions: read-all` at workflow root + per-job `permissions: contents: read` overrides. Enable GitHub's Actions allowlist at the org level to block untrusted marketplace publishers entirely. Review the March 2025 tj-actions incident IR writeups (Step Security, Wiz, Semgrep) and hunt your CI logs for any workflow run that consumed a compromised action during the exposure window."
    cwe: ['CWE-494', 'CWE-829', 'CWE-1357']
