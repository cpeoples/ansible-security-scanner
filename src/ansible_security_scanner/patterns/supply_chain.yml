  - id: "git_config_credential_helper_store_plaintext"
    category: "supply_chain"
    severity: "HIGH"
    title: "git config credential.helper=store (Plaintext Password In ~/.git-credentials)"
    description: "A task runs `git config --global credential.helper store` (or writes it into a rendered `~/.gitconfig` / `/etc/gitconfig`). The `store` helper writes the raw username + password / PAT in cleartext to `~/.git-credentials` - any backup, log-shipping, container-layer, or $HOME-accessible process exfiltrates every git credential at once. The correct helpers are `osxkeychain` (macOS), `wincred` (Windows), or `libsecret`/`cache`/`manager-core` (Linux), all of which store via OS-protected secret storage. GitHub's own docs as of 2024 explicitly warn against `store` for this reason. The 2024 Mandiant-reported 'Whispering Spider' campaign specifically looks for `~/.git-credentials` in post-exploitation."
    regex: "(?:git\\s+config\\s+(?:--global\\s+|--system\\s+)?credential\\.helper\\s+(?:\"?)store(?:\"?)|\\[credential\\][\\s\\S]{0,200}?helper\\s*=\\s*store\\b|credential\\.helper\\s*=\\s*store\\b)"
    positive_examples:
      - "git config credential.helper store"
    multiline: true
    window: 8
    recommendation: "Replace `credential.helper = store` with `manager-core` (cross-platform, 2022+) or platform-native: macOS `osxkeychain`, Windows `wincred`, Linux with GNOME `libsecret`, or `cache --timeout=3600` for short-lived in-memory caching. For automation, use short-lived tokens via `GIT_ASKPASS=/usr/local/bin/get-fresh-pat.sh` where the script fetches a fresh token from Vault on demand. For CI, use OIDC federation to the git host (GitHub's `GITHUB_TOKEN`, GitLab's `CI_JOB_TOKEN`) - no stored credential needed at all. Rotate any existing `~/.git-credentials` contents immediately. Audit: `find /home -name '.git-credentials' -not -empty -printf '%u %p\\n'` - any hit is an immediate credential-rotation trigger."
    cwe: ['CWE-256', 'CWE-312', 'CWE-522']
