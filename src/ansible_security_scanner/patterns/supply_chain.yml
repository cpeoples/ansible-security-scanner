  - id: "container_registry_tag_mutable_or_no_signature_verification"
    category: "supply_chain"
    severity: "HIGH"
    title: "Container Registry Tag Mutability Enabled Or Image Pull Skips Signature Verification"
    description: "A task configures ECR/GCR/ACR/Harbor with mutable tags: `aws_ecr_repository image_tag_mutability = MUTABLE` (the non-default; default since 2022 is IMMUTABLE), `gcloud artifacts repositories create --immutable-tags` OMITTED, Harbor project `prevent_vul` + `enable_content_trust` set false, OR runs a pull with `--disable-content-trust` / `DOCKER_CONTENT_TRUST=0` / `cosign verify` skipped in CI / `--insecure-policy` on skopeo. Mutable tags + unverified pulls = supply-chain nightmare: the `v1.2.3` tag you pulled during build is NOT guaranteed to be the same bytes as the `v1.2.3` running tomorrow. 2024 Sysdig 'Stolen Dream' report documented active campaigns overwriting popular `:latest` tags in compromised public registries. Sigstore / Notary v2 signature verification is the 2024-2025 industry standard - skipping it defeats the entire purpose."
    regex: "(?:image_tag_mutability\\s*[:=]\\s*['\"]?MUTABLE['\"]?|aws_ecr_repository[\\s\\S]{0,500}?image_tag_mutability\\s*[:=]\\s*['\"]?MUTABLE['\"]?|harbor[\\s\\S]{0,500}?(?:enable_content_trust|content_trust_cosign_enabled)\\s*[:=]\\s*['\"]?(?:false|no)['\"]?|DOCKER_CONTENT_TRUST\\s*[:=]\\s*['\"]?0['\"]?|--disable-content-trust\\b|skopeo\\s+copy\\s+[^\\n]*?--insecure-policy\\b|cosign\\s+verify\\s+[^\\n]*?--insecure-ignore-sct\\b|(?:containerd|crictl)[\\s\\S]{0,300}?require_signature_verification\\s*[:=]\\s*['\"]?false['\"]?)"
    positive_examples:
      - "image_tag_mutability: mutable"
    multiline: true
    window: 15
    recommendation: "Enable tag immutability everywhere: ECR `aws_ecr_repository.image_tag_mutability = \"IMMUTABLE\"` (the default, keep it); Artifact Registry `gcloud artifacts repositories update <r> --immutable-tags`; ACR `az acr config content-trust update --status enabled`; Harbor project `Immutability Rules` for `v*.*.*` semver tags. Require signature verification in CI + runtime: `cosign verify --key <pub-key> --certificate-oidc-issuer https://token.actions.githubusercontent.com <image>` for every pull; k8s admission with `sigstore/policy-controller` (ClusterImagePolicy) + fail-closed on unsigned images. Never use `:latest` in production manifests - pin to immutable digest (`image: nginx@sha256:abc123...`). Set `DOCKER_CONTENT_TRUST=1` in all developer + CI environments. Enforce Harbor `enable_content_trust_cosign: true` + `automatic vulnerability scanning` + `prevent_vulnerable_images`. For air-gapped: `cosign sign --key cosign.key <image>` before importing into offline registry + verify on ingress. Rotate signing keys annually; store in cloud KMS (not local .key files)."
