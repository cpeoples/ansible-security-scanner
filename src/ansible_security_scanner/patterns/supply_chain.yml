  - id: "powershell_install_module_skippublishercheck_or_untrusted_repo"
    category: "supply_chain"
    severity: "HIGH"
    title: "PowerShell Install-Module -SkipPublisherCheck / -Force With Untrusted Repo (Unsigned Module RCE)"
    description: "A task runs `Install-Module` / `Install-Script` / `Save-Module` with `-SkipPublisherCheck`, `-AllowPrerelease`, `-AllowClobber -Force` together, OR sets `Register-PSRepository` / `Set-PSRepository` with `-InstallationPolicy Trusted` targeting a custom URL (non-`https://www.powershellgallery.com/api/v2`). `-SkipPublisherCheck` specifically bypasses Authenticode signature verification on the module - meaning any PowerShell code masquerading as e.g. `Microsoft.PowerShell.Archive` or `Az` gets executed with the running user's context (often elevated in automation contexts). 2024 attack pattern 'PipeMagic' (Microsoft Threat Intel) used a typo-squatted PSGallery module installed with `-SkipPublisherCheck`. Combined with `-Scope AllUsers` on a domain controller / management server, this is a single-line domain-admin RCE primitive."
    regex: "Install-(?:Module|Script)\\b[\\s\\S]{0,400}?(?:-SkipPublisherCheck|-AllowPrerelease\\b[\\s\\S]{0,50}?-(?:Force|AllowClobber)|-Force\\b[\\s\\S]{0,100}?-AllowClobber)|(?:Register-PSRepository|Set-PSRepository)\\b[\\s\\S]{0,400}?-InstallationPolicy\\s+['\"]?Trusted['\"]?[\\s\\S]{0,200}?-SourceLocation\\s+['\"]?https?://(?!(?:www\\.)?powershellgallery\\.com|psg-prod-eastus\\.azureedge\\.net)|Install-Module\\s+[^\\s]+\\s+-Repository\\s+['\"]?(?!PSGallery['\"]?\\s)(?!powershellgallery)[^\\s'\"]+|PackageProvider\\s+-Name\\s+NuGet[\\s\\S]{0,200}?-RequiredVersion\\s+[^\\n]*?\\s+-Force"
    positive_examples:
      - "Install-Module-SkipPublisherCheck"
