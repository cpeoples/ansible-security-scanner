  - id: "github_oidc_trust_aud_wildcard_or_missing_subject_claim"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "GitHub OIDC Trust Policy With aud=* Or Missing sub/repo Claim Condition"
    description: "A Terraform / Ansible IAM-role trust policy for GitHub Actions OIDC uses `aud = '*'` (wildcard audience - ANY GitHub Actions workflow in ANY org can assume the role) OR is missing the `token.actions.githubusercontent.com:sub` condition (no per-repo / per-branch pinning). The 2023 Mandiant / Cider Security research on OIDC misconfiguration documented that 15-25% of GitHub-OIDC-to-AWS trust policies in the wild are overly permissive - any attacker with a public repo on GitHub can assume the victim's role if `sub` is unconstrained. AWS's documented best-practice (Jan 2024 update) explicitly requires `aud=sts.amazonaws.com` AND `sub=repo:<org>/<repo>:<environment|branch>`."
    regex: "(?:token\\.actions\\.githubusercontent\\.com:aud)['\"]?\\s*[:=]\\s*['\"]?\\*['\"]?|['\"]?aud['\"]?\\s*[:=]\\s*['\"]\\*['\"]|(?:aws_iam_role|Trust\\w*Policy|assume_role_policy|StringEquals)[\\s\\S]{0,1500}?token\\.actions\\.githubusercontent\\.com[\\s\\S]{0,400}?(?:Federated|Principal)(?![\\s\\S]{0,800}?token\\.actions\\.githubusercontent\\.com:sub)|token\\.actions\\.githubusercontent\\.com:sub[\\s\\S]{0,100}?['\"]\\*['\"]"
    positive_examples:
      - "token.actions.githubusercontent.com:aud:*"
    multiline: true
    window: 60
    recommendation: "Pin OIDC trust policies to specific repo + branch/environment. Example: `StringEquals: { 'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com' }` + `StringLike: { 'token.actions.githubusercontent.com:sub': 'repo:<org>/<repo>:environment:production' }` (ideal) or `'repo:<org>/<repo>:ref:refs/heads/main'` (acceptable). NEVER use `aud: *` - it makes the role assumable by any GitHub workflow anywhere. For multiple repos, create a DEDICATED role per repo, not one shared role with `sub: repo:<org>/*`. For GitLab/BitBucket/CircleCI OIDC, apply the same principle - pin to the specific project path + branch. Audit trust policies via `aws iam list-roles | jq '.Roles[] | select(.AssumeRolePolicyDocument.Statement[].Condition)'` - review every OIDC trust for presence of a `sub` condition."
