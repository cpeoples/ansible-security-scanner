  - id: "galaxy_requirements_collection_without_signatures_key"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "requirements.yml Collection Entry Pinned But Missing signatures: (GPG Verification Opt-Out)"
    description: "A `requirements.yml` pins a collection from Automation Hub / galaxy_ng / Ansible Galaxy via `source: https://...` + `version: X.Y.Z` but omits the `signatures:` key (list of GPG detached-signature URLs) and `keyring:` is not set at the top-level. Since `ansible-galaxy collection install` 2.13+ (galaxy_ng 4.7+, 2023) supports per-entry GPG signature verification (`--signature <url>` / `signatures: [...]` in the requirements file) backed by a project-owned GPG keyring, content pulled without these keys is trust-on-first-hash only - the tarball SHA256 published by Automation Hub is all that protects against a compromise of the hosting infrastructure. An attacker with Automation Hub / galaxy_ng operator credentials (the 2024 Red Hat IAM advisory scenario) can republish a matching-version tarball with a new SHA256 and every unsigned consumer picks it up silently."
    regex: "(?ms)^\\s*collections\\s*:\\s*\\n(?:\\s*-\\s+(?:name|source)\\s*:\\s*['\"]?[A-Za-z0-9._-]+\\.[A-Za-z0-9._-]+['\"]?\\s*\\n(?:\\s+(?:source|version|type)\\s*:[^\\n]+\\n){1,3})(?![\\s\\S]{0,400}?signatures\\s*:|[\\s\\S]{0,400}?keyring\\s*:)"
    multiline: true
    window: 20
    positive_examples:
      - |2
        collections:
          - name: community.general
            source: https://galaxy.ansible.com
            version: 7.5.0
    negative_examples:
      - |2
        collections:
          - name: myorg.infra
            source: https://hub.myorg.com/api/galaxy/
            version: 1.4.2
            signatures:
              - https://hub.myorg.com/.../artifact.tar.gz.asc
    recommendation: "Sign every internally-published collection with a project-owned GPG key (`ansible-galaxy collection build` + `gpg --armor --detach-sign -o artifact.tar.gz.asc artifact.tar.gz`), upload both the tarball and `.asc` to Automation Hub / internal pulp-ansible, then reference the signature from requirements.yml: `- name: myorg.infra\\n  version: 1.4.2\\n  source: https://hub.myorg.com/api/galaxy/\\n  signatures:\\n    - https://hub.myorg.com/.../artifact.tar.gz.asc`. Set `keyring: ~/.ansible/pubring.kbx` (or a project-local path) at the top of requirements.yml and commit the public key alongside. In CI, run `ansible-galaxy collection install -r requirements.yml --signature-count-required 1 --keyring <path>` - fail the build on any missing or invalid signature. For public Galaxy content you don't control, vendor the tarballs into your own Automation Hub / private pulp mirror and re-sign there."
    cwe: ['CWE-345', 'CWE-494', 'CWE-1357']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: [V15.2.4, V3.6.1]
