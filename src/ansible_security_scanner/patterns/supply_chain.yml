  - id: "terraform_state_bucket_no_lock_or_versioning_disabled"
    category: "supply_chain"
    severity: "HIGH"
    title: "Terraform / OpenTofu State Backend Without Lock Table Or Bucket Versioning (State Rollback Attack)"
    description: "A task renders a Terraform backend config with `backend \"s3\"` missing `dynamodb_table` (no lock) or with `versioning { enabled = false }` on the state bucket, OR `backend \"gcs\"` without `bucket_versioning_policy.enabled = true`, OR `backend \"azurerm\"` without `blob_versioning_enabled = true`. Terraform state files contain every provisioned resource's ID, configuration, and often sensitive fields (DB passwords, TLS private keys, cloud credentials marked `sensitive = true` are still PLAINTEXT in state). Without a lock table, two concurrent `apply`s corrupt state (self-inflicted DoS). Without versioning, an attacker who gains write to the state bucket can (1) download current state to harvest credentials, (2) upload a crafted state showing no resources - next `terraform apply` then provisions attacker-controlled replacements, (3) delete the state object entirely forcing painful resource-by-resource re-import. 2024 Unit 42 IR reports cite Terraform state bucket compromise as a primary initial-access vector in cloud breaches."
    regex: "(?:backend\\s+['\"]s3['\"][\\s\\S]{0,800}?\\}|terraform\\s*\\{[\\s\\S]{0,400}?backend\\s+['\"]s3['\"][\\s\\S]{0,600}?\\})(?![\\s\\S]{0,400}?dynamodb_table\\s*=)|(?:backend\\s+['\"](?:gcs|azurerm|s3)['\"][\\s\\S]{0,600}?versioning\\s*\\{?\\s*enabled\\s*=\\s*false|backend\\s+['\"]gcs['\"][\\s\\S]{0,500}?bucket_versioning_policy\\s*\\{?\\s*enabled\\s*=\\s*false|(?:aws_s3_bucket(?:_versioning)?|google_storage_bucket|azurerm_storage_container)[\\s\\S]{0,500}?(?:tfstate|terraform[_-]?state|state-backend)[\\s\\S]{0,500}?versioning[\\s\\S]{0,200}?enabled\\s*=\\s*false)"
    positive_examples:
      - "backend 's3'}"
    multiline: true
    window: 40
    recommendation: "Every Terraform/OpenTofu remote backend must have: (1) state locking (S3: `dynamodb_table = \"tf-lock\"` with `LockID` hash-key; GCS: native locking auto-enabled; AzureRM: native blob-lease auto-enabled), (2) bucket versioning enabled (recover from accidental / malicious state corruption), (3) server-side encryption with customer-managed KMS key (the KMS key lives in a different AWS account so state-bucket write-access alone can't decrypt), (4) MFA Delete on S3 / retention policy on GCS so state objects can't be destroyed without a second factor, (5) bucket replication to a cross-region standby, (6) public-access-block enforced, (7) bucket policy denying `s3:GetObject` except for specific CI-role ARNs. Never commit `.tfstate` to git. Rotate any credential found in state (all of them, periodically) - state is always sensitive. Enforce via tflint / tfsec in CI. Monitor CloudTrail for `GetObject` on tfstate bucket from unexpected principals + alert. For state migration, use `terraform state pull` + `terraform state push` with `-backup` flag."
