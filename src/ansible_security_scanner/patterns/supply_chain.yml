  - id: "go_install_unpinned_main_or_latest"
    category: "supply_chain"
    severity: "HIGH"
    title: "go install Of Package Pinned To @main / @master / @latest / @HEAD"
    description: "A task runs `go install <mod>@main`, `go install <mod>@master`, `go install <mod>@latest`, or `go install <mod>@HEAD` - i.e. installs a Go module from a mutable branch rather than an immutable version tag. Go's module-proxy caches by commit-hash but the mutable-tag resolution happens at install-time; between successive runs, the attacker who compromises the upstream repo (xz-utils 2024, `typosquat-go` 2024, GitHub account takeover) immediately reaches every machine that runs the playbook. The Go-Security 2024 guidance explicitly requires `@v<semver>` or `@<40-char-commit-sha>` for any production installation."
