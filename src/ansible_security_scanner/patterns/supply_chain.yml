  - id: "terraform_local_state_backend_for_production_stack"
    category: "supply_chain"
    severity: "HIGH"
    title: "Terraform configured with local state backend (no remote state / no locking)"
    description: "A task renders a Terraform / OpenTofu config that uses the default `local` backend (or an explicit `backend \"local\"` block) for what is clearly a production / shared stack - committing `terraform.tfstate` to the checkout, the playbook, or a developer workstation. Local state has no locking (concurrent runs corrupt state), no encryption-at-rest by the backend, no versioning/rollback, and - most commonly - ends up in git with provider credentials / AWS access keys / Azure client secrets / DB passwords embedded in plaintext resource attributes. This is one of the most common root-cause findings in cloud-credential-theft incidents. Matches `terraform { backend \"local\" { ... } }`, `terraform init` with no backend config + `state_file` set to a local path, and `community.general.terraform` / `cloud.terraform.terraform` tasks with `state_file` pointing at a workspace-local path."
    regex: "(?:terraform\\s*\\{[\\s\\S]{0,400}?backend\\s*['\"]?local['\"]?\\s*\\{|(?:community\\.general|cloud\\.terraform)\\.terraform[\\s\\S]{0,300}?state_file\\s*:\\s*['\"]?(?!(?:s3|azurerm|gcs|http|remote)://)[./\\w\\-]+\\.tfstate['\"]?|terraform\\s+init(?![^\\n]*-backend-config)[^\\n]*|\\.tfstate(?:\\.backup)?[\\s\\S]{0,200}?(?:git\\s+add|copy|template)|path\\s*=\\s*['\"][^'\"]*\\.tfstate['\"])"
    positive_examples:
      - "terraform{backendlocal{"
    multiline: true
    window: 15
    recommendation: "Always use a remote, locked, encrypted backend for any non-throwaway Terraform stack: S3 + DynamoDB lock table (`backend \"s3\" { bucket = \"...\"; key = \"env/prod/terraform.tfstate\"; region = \"...\"; dynamodb_table = \"terraform-locks\"; encrypt = true; kms_key_id = \"...\" }`), Azure Storage (`backend \"azurerm\" { ... use_azuread_auth = true }`), GCS (`backend \"gcs\" { ... }`), or Terraform Cloud / HCP Terraform / Spacelift / Scalr. Require versioning + KMS encryption on the state bucket. Enforce `terraform fmt -check` + `tflint` + `tfsec` in CI. Gitignore `*.tfstate`, `*.tfstate.backup`, `.terraform/`. Use `terraform state rm` + re-import rather than ever committing state. For secrets, use `random_password` + `aws_secretsmanager_secret` / `azurerm_key_vault_secret` referenced via data source; never commit plaintext credentials to state (note: even remote encrypted state contains plaintext secrets that any reader can extract - use short-lived IAM roles / OIDC federation instead). Review Terraform docs 'Remote State' and 'Sensitive Data in State', plus HashiCorp's 2024 state-security guidance."
    cwe: ['CWE-312', 'CWE-732', 'CWE-922']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V5.3.1]
    mitre_attack: ['T1078.004', 'T1213', 'T1552.001']
    cis_controls: ['CIS-3.11', 'CIS-3.12', 'CIS-16.11']
    nist_controls: ['AC-3', 'AU-9', 'SC-28']
    pci_dss: ['3.5.1', '6.3.2', '7.1.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(c)(2)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "terraform_s3_backend_without_encryption_or_kms"
    category: "supply_chain"
    severity: "HIGH"
    title: "Terraform S3 backend configured without encrypt=true or KMS customer-managed key"
    description: "A task renders a Terraform / OpenTofu `backend \"s3\"` block without `encrypt = true` (pre-default-SSE eras, or bucket default explicitly disabled) or without `kms_key_id` for the state object - or references an S3 state bucket that has SSE disabled / lacks KMS encryption / lacks Block Public Access. Terraform state contains resource attribute values in plaintext (including database passwords, RDS master creds, static IAM access keys, private TLS keys embedded via `aws_iam_server_certificate`, `random_password` outputs). An unencrypted or loosely-scoped state bucket = full cloud-credential disclosure if the bucket is ever misconfigured / snapshot-shared / cross-account leaked. AWS enabled SSE-S3 by default in January 2023, but audits still regularly find pre-2023 buckets + explicit `encrypt = false` configs + missing KMS CMK policies."
    regex: "(?:backend\\s*['\"]s3['\"]\\s*\\{(?:(?:[^\\{\\}]|\\n){0,600}?)(?:encrypt\\s*=\\s*false|(?!(?:[^\\{\\}]|\\n){0,600}?encrypt\\s*=\\s*true)(?:[^\\{\\}]|\\n){0,600}?\\})|backend\\s*['\"]s3['\"]\\s*\\{(?:(?:[^\\{\\}]|\\n){0,600}?)(?!(?:[^\\{\\}]|\\n){0,600}?kms_key_id)(?:[^\\{\\}]|\\n){0,600}?\\}|(?:aws_s3_bucket_server_side_encryption_configuration|server_side_encryption_configuration)[\\s\\S]{0,300}?(?:sse_algorithm\\s*=\\s*['\"]?(?:none|NONE|AES256)['\"]?[\\s\\S]{0,200}?bucket\\s*=\\s*['\"][^'\"]*(?:tfstate|terraform)[^'\"]*['\"]))"
    positive_examples:
      - "backend's3'{encrypt=false"
    multiline: true
    window: 25
    recommendation: "Always set `encrypt = true` AND `kms_key_id = aws_kms_key.tfstate.arn` in every `backend \"s3\"` block - SSE-KMS with a customer-managed key, not SSE-S3. Apply these bucket-level controls: versioning on, MFA-Delete enabled (requires root), Block Public Access ON (all four toggles), bucket policy restricting `s3:GetObject` / `s3:PutObject` to the specific IAM roles that run Terraform + SSO admins, server-access logging on, replication to a cross-region backup bucket, Object Lock in compliance mode for 30+ days. The companion DynamoDB lock table must have encryption-at-rest enabled with KMS CMK + PITR on. Rotate the KMS key annually; use `--bypass-policy-lockout-safety-check` with extreme care. Validate with AWS Config rules `s3-bucket-server-side-encryption-enabled` and `s3-bucket-default-encryption-kms` + `s3-bucket-public-read-prohibited`. Audit existing state: `aws s3api get-bucket-encryption --bucket <tfstate-bucket>` and `aws s3api get-public-access-block`. Review NIST SP 800-171 3.13.16, PCI-DSS v4.0 3.5.1, and CIS AWS Foundations 2.1.1."
    cwe: ['CWE-311', 'CWE-312', 'CWE-921']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1]
    mitre_attack: ['T1213', 'T1530', 'T1552.001']
    cis_controls: ['CIS-3.11', 'CIS-3.12']
    nist_controls: ['MP-5', 'SC-12', 'SC-28']
    pci_dss: ['3.5.1', '3.6.1', '8.6.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(2)(ii)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "terraform_variable_with_secret_value_sensitive_false"
    category: "supply_chain"
    severity: "HIGH"
    title: "Terraform variable / output holding a secret declared with sensitive = false (or unset)"
    description: "A task renders a Terraform / OpenTofu `variable`, `output`, or `locals` block whose name / default clearly holds a secret (`password`, `secret`, `token`, `api_key`, `private_key`, `client_secret`, `connection_string`) but is declared with `sensitive = false` - or with `sensitive` omitted entirely (defaults to `false` in Terraform < 1.3). The value then ends up in `terraform plan` output, CI logs, the state file (still readable, but less obviously), and any downstream provider's log fields. Matches HashiCorp's published anti-patterns from the Terraform Secrets Handling guidance (2023-2024)."
    regex: "(?:variable\\s+['\"]?[a-z0-9_]*(?:password|passwd|secret|token|api[_-]?key|private[_-]?key|client[_-]?secret|connection[_-]?string|credential|aws[_-]?secret|rds[_-]?password)[a-z0-9_]*['\"]?\\s*\\{(?:(?:[^\\{\\}]|\\n){0,400}?)(?:sensitive\\s*=\\s*false|(?!(?:[^\\{\\}]|\\n){0,400}?sensitive\\s*=\\s*true)(?:[^\\{\\}]|\\n){0,400}?(?:default|value)\\s*=)|output\\s+['\"]?[a-z0-9_]*(?:password|passwd|secret|token|api[_-]?key|private[_-]?key|client[_-]?secret|connection[_-]?string)[a-z0-9_]*['\"]?\\s*\\{(?:(?:[^\\{\\}]|\\n){0,400}?)(?:sensitive\\s*=\\s*false|(?!(?:[^\\{\\}]|\\n){0,400}?sensitive\\s*=\\s*true)(?:[^\\{\\}]|\\n){0,400}?value\\s*=))"
    positive_examples:
      - "variable password{sensitive=false"
    multiline: true
    window: 20
    recommendation: "Set `sensitive = true` on every variable, output, and local that holds a secret. For example: `variable \"db_password\" { type = string; sensitive = true }` and `output \"rds_endpoint_password\" { value = aws_db_instance.main.password; sensitive = true }`. Even better: never store the secret in Terraform state at all - use `random_password` at create time, immediately write to `aws_secretsmanager_secret_version` / `azurerm_key_vault_secret` / `google_secret_manager_secret_version`, and use `ignore_changes = [password]` + `data` source lookup on subsequent runs. Upgrade Terraform to ≥ 1.6 for the `ephemeral` resource (HCP 2024) which lets secrets flow without hitting state. Run `tfsec --minimum-severity HIGH` in CI to flag unsensitive secret declarations. For plan output, mark with the 2024 `-json` + sensitive-field redaction and pipe through `jq` that strips `.resource_changes[].change.after_sensitive`. Review HashiCorp 'Sensitive data in state' + '2024 Terraform Secrets Handling' guide."
    cwe: ['CWE-200', 'CWE-312', 'CWE-532']
    owasp_appsec: ["A01:2021", "A04:2021", "A09:2021"]
    owasp_asvs: [V14.1.1, V16.2.5, V14.2.2, V14.2.1]
