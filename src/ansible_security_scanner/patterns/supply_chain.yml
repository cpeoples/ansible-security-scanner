  - id: "git_clone_insecure_skip_ssl_verify"
    category: "supply_chain"
    severity: "HIGH"
    title: "git -c http.sslVerify=false Or GIT_SSL_NO_VERIFY Set (MitM-able Clone)"
    description: "A task runs `git -c http.sslVerify=false clone`, `git config http.sslVerify false`, sets `GIT_SSL_NO_VERIFY=1` / `GIT_SSL_NO_VERIFY=true`, or uses `ansible.builtin.git: verify_commit: no` + `repo: https://...`. This disables TLS cert verification for git operations - any MitM can serve an attacker-controlled repo at the target URL and substitute malicious commits. Common in internal self-signed-cert environments but the legitimate fix is to trust the internal CA, not disable validation. The 2024 git CVE-2024-32002 (symlink handling) compounds with this - an attacker serving a malicious repo via MitM can get RCE on checkout."
    regex: "(?:git\\s+(?:-c\\s+)?http\\.sslVerify\\s*=\\s*false|git\\s+config\\s+(?:--global\\s+)?http\\.sslVerify\\s+false|GIT_SSL_NO_VERIFY\\s*[:=]\\s*['\"]?(?:1|true|yes)['\"]?|ansible\\.builtin\\.git[\\s\\S]{0,500}?verify_commit\\s*:\\s*(?:no|false))"
