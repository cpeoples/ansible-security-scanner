    recommendation: "Always pin: `cargo install --git https://github.com/rust-lang/mdBook --rev 5e2c9df` or `--tag v0.4.40`. For crates-io installs, use `cargo install --locked <crate>` (honours the crate's committed `Cargo.lock`) and pin the crate version (`cargo install --locked cargo-edit@0.12.2`). Host an internal crates-io mirror (`crates.io-index` with `cargo-audit` CI) and set `CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse` + a pinned-commit alternate index for air-gapped envs. Generate and commit `Cargo.lock` for every binary crate."
