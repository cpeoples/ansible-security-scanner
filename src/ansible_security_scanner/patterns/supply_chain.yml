  - id: "gitlab_ci_job_token_exported_or_echoed"
    category: "supply_chain"
    severity: "HIGH"
    title: "GitLab CI_JOB_TOKEN Exported Or Written To File (Cross-Project Pivot Primitive)"
    description: "A `.gitlab-ci.yml` or Ansible task running under GitLab CI exports `CI_JOB_TOKEN` to a file, echoes it, or passes it to a downstream tool that stores it (e.g. writes to `~/.netrc`, `~/.gitconfig`, a build artifact, or a child pipeline env). CI_JOB_TOKEN is short-lived but carries the scope of the running project's GitLab permissions - including (since 16.1 default) the ability to read source of other projects in the same group + trigger pipelines. Leaking it via artifact or log enables lateral movement across the GitLab org. The 2024 GitLab CVE-2024-8114 acknowledged that tokens leaked via artifacts were the exploit primitive for privilege escalation."
