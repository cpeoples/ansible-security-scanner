  - id: "curl_wget_pipe_shell_install_oneliner"
    category: "supply_chain"
    severity: "HIGH"
    title: "curl | bash / wget -O- | sh Install One-Liner (Unauthenticated RCE Pattern)"
    description: "A task contains `curl <url> | bash` / `curl <url> | sh` / `wget -O- <url> | bash` / `wget -qO- <url> | sh` or variants (`| zsh`, `| python`, `| perl`, `| ruby`, `| tee /tmp/x.sh && bash /tmp/x.sh`). The curl-pipe-bash pattern downloads AND executes attacker-controllable shell in a single step with zero signature verification, zero local review, and no atomicity - if the attacker can MitM the connection (already caught by the TLS rules), substitute the download mid-stream, or poison the source host, they have direct RCE as the Ansible-running user. Even HTTPS doesn't help - the source can be compromised independently of transport. Install scripts for Rust (`sh.rustup.rs`), Docker (`get.docker.com`), k3s, Helm, and nvm all use this pattern and have all been separately compromised in 2023-2024. Different from `download_pipe_to_shell` (caught today) which catches the generic pattern - this rule catches it specifically in the context of a package-install task for 2025-2026 attribution."
    regex: "(?:ansible\\.builtin\\.)?(?:shell|command|raw)\\s*:[\\s\\S]{0,200}?(?:curl|wget|fetch)\\s+[^\\n]*?\\|\\s*(?:sudo\\s+)?(?:bash|sh|zsh|ksh|python[23]?|perl|ruby)(?:\\s|$)"
    positive_examples:
      - |2-
        shell: |
            curl -fsSL https://claude.ai/install.sh | bash
    multiline: true
    window: 10
    recommendation: "Download the script, VERIFY its SHA256 or GPG signature against a pinned known-good hash, review it, then execute: `curl -fsSL -o /tmp/install.sh <url> && echo '<sha256>  /tmp/install.sh' | sha256sum -c && less /tmp/install.sh && bash /tmp/install.sh`. Prefer distro-native packaging (apt/dnf/brew with signed repos) over upstream install scripts. For tools that ONLY distribute via curl-pipe-bash, mirror them to an internal artifact repo (JFrog Artifactory, Nexus, Cloudsmith) with hash pinning via `ansible.builtin.get_url: url=<internal-mirror>/rustup.sh checksum=sha256:<pinned>`. For genuinely trusted upstream installers, at minimum use `curl --tlsv1.3 --proto =https --cacert /etc/ssl/internal-ca.pem -fsSL` + pipe to `tee` before bash so the script is kept for forensics. Fail CI builds on any `| (bash|sh)` pattern in any role file."
    cwe: ['CWE-78', 'CWE-494', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: [V15.2.4]
