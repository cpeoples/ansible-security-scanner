  - id: "git_hook_or_post_merge_script_fetched_from_remote"
    category: "supply_chain"
    severity: "HIGH"
    title: "Git Hook (post-merge / pre-commit / post-checkout) Fetched From Remote Or Symlinked Externally"
    description: "A task renders a file under `.git/hooks/` (or `core.hooksPath` location) by DOWNLOADING it (`get_url`, `curl`, `wget`) from a remote URL or by symlinking it to an external path, rather than committing the script content into the repo itself. Git hooks execute on every relevant git operation (`post-merge` runs after every `git pull`; `post-checkout` runs after every branch switch) with the shell user's permissions. A hook fetched from an attacker-controlled URL is a persistent backdoor that auto-executes on routine developer workflow, with no visible trace in the repo history. Used in 2023-2024 by IceFire-group operators once they got write access to a victim's dev-machine."
    regex: "(?:get_url|ansible\\.builtin\\.get_url|ansible\\.builtin\\.uri)[\\s\\S]{0,400}?dest\\s*:\\s*[^\\n]*?\\.git/hooks/(?:post-merge|pre-commit|post-checkout|pre-push|post-commit|post-receive|pre-receive)|file\\s*:[\\s\\S]{0,400}?src\\s*:\\s*(?:['\"]?(?:/tmp|/var/tmp|/dev/shm|/opt/[^/]*?|https?://)[^'\"]+)[\\s\\S]{0,100}?dest\\s*:[^\\n]*?\\.git/hooks/|(?:curl|wget)\\s+[^\\n]*?-o\\s+[^\\n]*?\\.git/hooks/"
