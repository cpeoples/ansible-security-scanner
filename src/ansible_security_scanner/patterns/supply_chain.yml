  - id: "pip_install_without_hash_check_from_public_index"
    category: "supply_chain"
    severity: "HIGH"
    title: "pip install from public PyPI without --require-hashes or a hash-locked requirements file"
    description: "A task runs `pip install`, `pip3 install`, `uv pip install`, or Ansible's `ansible.builtin.pip` / `community.general.pip` module targeting the public PyPI index without `--require-hashes` and without a fully-hashed requirements file (`pip-compile --generate-hashes` output). A PyPI account takeover or name-confusion / typosquat will install attacker code as root. 2024-2025 incidents include the `crytic-compile` typosquat, `ultralytics` tag-hijack, `fabrice` (Boto3 typosquat October 2024), and the `requests-darwin-lite` telemetry backdoor - each shipped to thousands of build agents before detection. `--require-hashes` is the only mitigation that survives index / maintainer compromise."
    regex: "(?:(?:^|\\n)\\s*(?:-\\s*)?(?:ansible\\.builtin\\.|community\\.general\\.)?pip:(?!(?:[^\\n]*\\n){0,8}[^\\n]*(?:extra_args:[^\\n]*--require-hashes|requirements:[^\\n]*\\.hash\\.txt))(?:\\s*\\n[ \\t]+name:\\s*[^\\n]+)|(?:^|\\n|;|&&|\\|\\|)\\s*(?:python3?\\s+-m\\s+)?pip3?\\s+install\\s+(?![^\\n]*--require-hashes)(?![^\\n]*-r\\s+[^\\n]*\\.hash\\.txt)[^\\n]+|(?:^|\\n|;|&&|\\|\\|)\\s*uv\\s+pip\\s+install\\s+(?![^\\n]*--require-hashes)[^\\n]+|\\bshell:\\s*[^\\n]*\\b(?:python3?\\s+-m\\s+)?pip3?\\s+install\\s+(?![^\\n]*--require-hashes)[^\\n]+|\\bcommand:\\s*[^\\n]*\\b(?:python3?\\s+-m\\s+)?pip3?\\s+install\\s+(?![^\\n]*--require-hashes)[^\\n]+)"
    multiline: true
    window: 16
    recommendation: "Produce a hashed requirements file with `pip-compile --generate-hashes` (pip-tools) or `uv pip compile --generate-hashes`, commit both `requirements.in` and `requirements.txt` (with `--hash=sha256:...` per line), and install with `pip install --require-hashes -r requirements.txt`. In `ansible.builtin.pip`, pass `extra_args: \"--require-hashes -r {{ requirements_file }}\"`. Point `index-url` at an internal proxy (Artifactory, devpi, JFrog) that enforces allowlist + malware scanning. Enable PyPI 2FA + Trusted Publishers (OIDC) for any packages your org publishes. Use Sigstore `pip-audit` (2024) to verify attestations where available. For CI, cache the wheels directory keyed on the requirements-hash digest. Never run `pip install <pkg>` ad-hoc in a production playbook - all dependencies must flow through the hash-locked path."
    positive_examples:
      - |2-
            - name: install requests
              ansible.builtin.pip:
                name: requests
      - |2-
            - name: shell pip
              ansible.builtin.shell: pip install requests==2.31.0
      - |2-
            - name: uv install
              ansible.builtin.shell: uv pip install boto3
    negative_examples:
      - |2-
            - name: hashed install
              ansible.builtin.pip:
                requirements: /opt/req.hash.txt
                extra_args: --require-hashes
      - |2-
            - name: hashed shell install
              ansible.builtin.shell: pip install --require-hashes -r req.txt
      - "# install BeautifulSoup later in this file"
