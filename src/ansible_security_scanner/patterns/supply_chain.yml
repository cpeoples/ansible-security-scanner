  - id: "argo_workflows_templateref_cluster_scope_untrusted"
    category: "supply_chain"
    severity: "HIGH"
    title: "Argo Workflows templateRef With clusterScope=true Referencing Unpinned Name"
    description: "An Argo Workflows / WorkflowTemplate / CronWorkflow resource has `templateRef:` with `clusterScope: true` AND a `name:` that's templated (`{{workflow.parameters.*}}`) or references a name not explicitly scoped to an allow-listed ClusterWorkflowTemplate. The `clusterScope: true` flag resolves the template from the CLUSTER-level `ClusterWorkflowTemplate` resource - any user with `argoproj.io/v1alpha1/clusterworkflowtemplates:get` permission can cause the workflow to execute arbitrary cluster-wide templates, including ones planted by a compromised tenant namespace. This is the pattern exploited in Argo CVE-2023-47110 and generalized in the 2024 Snyk-reported Argo misconfigurations that resulted in cross-tenant container execution."
