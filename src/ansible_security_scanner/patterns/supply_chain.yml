  - id: "gh_actions_pull_request_target"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "GitHub Actions Workflow Uses pull_request_target"
    description: "A workflow file triggers on `pull_request_target`, which runs with the **base** repository's secrets and permissions, NOT the fork's. Combining this trigger with any fork-controlled input (checkout of the PR head, running the PR's package.json scripts, executing fork-supplied commands) hands the repository's write token to any attacker who opens a pull request."
    regex: "on\\s*:\\s*(?:\\[[^\\]]*pull_request_target[^\\]]*\\]|[\\s\\S]{0,200}?\\n\\s*pull_request_target\\s*:)"
    positive_examples:
      - |2-
        on:  # yamllint disable-line rule:truthy
          pull_request_target:
    multiline: true
    window: 10
    recommendation: "Prefer `pull_request` (runs in the fork's context with a read-only token). If you genuinely need base-repo secrets, require an `if: github.event.pull_request.head.repo.full_name == github.repository` guard so the job only runs for non-fork branches, and NEVER check out `${{ github.event.pull_request.head.sha }}` before that guard. Read: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/"
    cve: ["CVE-2026-45321"]
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ['AC-3', 'AC-6', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
