    multiline: true
    recommendation: "Always include `id=<repo>-<lockfile-hash>` and either `sharing=private` (per-build) or `sharing=locked` (serialised). Example: `RUN --mount=type=cache,id=myrepo-pip-${LOCKFILE_SHA},sharing=locked,target=/root/.cache/pip pip install -r requirements.txt`. For CI, pin the BuildKit builder to a per-pipeline ephemeral instance (`docker buildx create --use --name ci-ephemeral`) and discard it at the end. For self-hosted BuildKit, enable `--oci-worker-no-process-sandbox=false` and ensure the daemon is isolated per team."
