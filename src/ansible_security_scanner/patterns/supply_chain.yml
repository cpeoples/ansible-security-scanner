    recommendation: "Never use `--nodigest` / `--nosignature` / `--nofiledigest` / `--noverify`. For internal unsigned packages, sign them with `rpm --addsign` using an internal GPG key + distribute the public key via `rpm --import`. Use `ansible.builtin.dnf` / `ansible.builtin.yum` modules (which respect `gpgcheck` automatically) instead of direct `rpm -i` for repo-sourced packages. For one-off local-file installs, use `dnf install /path/to/file.rpm` which still verifies signatures. Enforce via `rpm --define '__signature_check 1'` macro at system level. Audit: `grep -rE 'rpm\\s+[^|]*(--nodigest|--nosignature|--noverify)' playbooks/ roles/` - should return zero."
    cwe: ['CWE-345', 'CWE-347', 'CWE-494']
