  - id: "maven_snapshot_dependency_in_production_playbook"
    category: "supply_chain"
    severity: "HIGH"
    title: "Maven Dependency With -SNAPSHOT Version In A Production Deploy Playbook"
    description: "A task templates a `pom.xml`, `build.gradle`, `build.gradle.kts`, or `ivy.xml` containing `<version>*-SNAPSHOT</version>` / `version '*-SNAPSHOT'` - i.e. a Maven snapshot (mutable) dependency version - and the play context indicates production deployment (filename `deploy_*.yml`, `production-*.yml`, handler `restart app`, `tags: [prod, production, deploy]`). Snapshot artifacts are resolved at install-time against the snapshot-repository HEAD; a compromise of the internal Maven repo or a typosquat snapshot (`org.apache.commans-text` vs `commons-text` 2022 attack-pattern) is immediately cluster-wide. Sonatype Nexus 2024 policy explicitly recommends `failOnSnapshot: true` for release builds."
