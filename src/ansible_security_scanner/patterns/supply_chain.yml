  - id: "apt_allow_unauthenticated_flag_true"
    category: "supply_chain"
    severity: "HIGH"
    title: "apt-get --allow-unauthenticated Or AllowInsecureRepositories (Bypass GPG Signature Check)"
    description: "A task runs `apt-get install --allow-unauthenticated` / `--allow-insecure-repositories` / `--allow-downgrades`, or renders `/etc/apt/apt.conf.d/*` with `APT::Get::AllowUnauthenticated \"true\"`, `Acquire::AllowInsecureRepositories \"true\"`, or `Acquire::Check-Valid-Until \"false\"`. Each of these weakens apt's trust model - `--allow-unauthenticated` installs packages that failed GPG signature verification (the exact path for a malicious-mirror supply-chain attack), `AllowInsecureRepositories` allows repos without any Release file signing at all, and `Check-Valid-Until false` accepts indefinitely-old Release files (replay-attack primitive with known-vulnerable package versions). Debian/Ubuntu default to all of these being strict - any weakening is a regression."
    regex: "(?:apt-get\\s+[^\\n]*?--allow-(?:unauthenticated|insecure-repositories|downgrades|weak-repositories)\\b|aptitude\\s+[^\\n]*?--allow-unauthenticated|APT::Get::AllowUnauthenticated\\s+\"?(?:true|yes|1)\"?|Acquire::AllowInsecureRepositories\\s+\"?(?:true|yes|1)\"?|Acquire::Check-Valid-Until\\s+\"?(?:false|no|0)\"?|ansible\\.builtin\\.apt[\\s\\S]{0,300}?allow_unauthenticated\\s*:\\s*(?:true|yes))"
    positive_examples:
      - |2-
        ansible.builtin.apt:
                # ...
                allow_unauthenticated: yes
    multiline: true
    window: 12
    recommendation: "Remove all `--allow-*` flags. For legitimate unsigned internal packages, mirror them to an internal repo via `reprepro` / `aptly` / `pulp-deb` and SIGN them with an enterprise GPG key distributed via `/etc/apt/trusted.gpg.d/` or (better) `/etc/apt/keyrings/` with `signed-by=` in the sources list. For package rollback use `apt install pkg=version` with the version pinned via `apt-mark hold` - not `--allow-downgrades`. For dev/CI unsigned builds, use a separate `deb-src` repo with `Acquire::AllowInsecureRepositories \"true\"` scoped ONLY to that one source via `[allow-insecure=yes]` prefix. Audit: `grep -rhE 'Allow(Unauth|Insecure)|Check-Valid-Until' /etc/apt/apt.conf.d/` - should return only comments or nothing."
    cwe: ['CWE-345', 'CWE-347', 'CWE-494']
    owasp_appsec: ["A02:2021", "A08:2021"]
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1072', 'T1195.002', 'T1553.002']
    cis_controls: ['CIS-2.4', 'CIS-2.7', 'CIS-16.11']
    nist_controls: ['CM-14', 'SC-12', 'SI-7']
