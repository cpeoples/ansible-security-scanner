  - id: "cargo_install_from_git_unpinned"
    category: "supply_chain"
    severity: "HIGH"
    title: "cargo install --git Used Without --rev / --tag Pin"
    description: "A task runs `cargo install --git <url>` or `cargo install <crate> --git <url>` WITHOUT a `--rev` or `--tag` argument pinning the install to a specific commit or tag. Without a rev/tag, cargo installs from the default branch HEAD - identical attacker-compromise window as `go install @main`. Rust crates installed from unpinned git are additionally built from source with no `Cargo.lock` verification against the crates.io signed index (the 2025 crates.io-signing-WG rollout only covers tarball installs, not git installs). This is the #2 most common Rust-CI finding after `cargo install` without `--locked`."
    regex: "cargo\\s+install\\s+(?:[^\\n]*--git\\s+\\S+)(?![\\s\\S]{0,300}(?:--rev\\s+[a-f0-9]{7,}|--tag\\s+\\S+))"
