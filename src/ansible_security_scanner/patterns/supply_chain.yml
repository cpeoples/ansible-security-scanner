  - id: "homebrew_tap_from_untrusted_user_repo"
    category: "supply_chain"
    severity: "HIGH"
    title: "Homebrew tap added from an untrusted third-party GitHub user or repo"
    description: "A task adds a Homebrew tap (`brew tap <user>/<repo>`) whose source is a personal GitHub account (not an org/owner/first-party/verified maintainer) or an HTTP URL, and then `brew install`s formulas from it. Homebrew taps run arbitrary Ruby formula code at install-time (`install` block, `def caveats`, `def post_install`, `on_macos do`) with the user's permissions - effectively macOS RCE on each agent that applies the playbook. 2024 saw several community-published homebrew taps compromised via GitHub personal access tokens and used to deploy `AtomicStealer` and `Realst` variants to developer endpoints."
    regex: "(?:(?:community\\.general\\.)?homebrew_tap[\\s\\S]{0,200}?name\\s*:\\s*['\"]?(?!homebrew/|[a-zA-Z0-9_-]+-org/)[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+['\"]?|brew\\s+tap\\s+(?!homebrew/)[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+(?:\\s|$)|brew\\s+tap\\s+[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+\\s+https?://(?!github\\.com/homebrew/)[^\\s'\"]+)"
