    title: "Git Submodule / GitHub Action Pinned To main / master / HEAD (Moving Reference)"
    description: "A task uses `ansible.builtin.git: version: main` / `master` / `HEAD` / `develop` OR a GitHub Actions `uses: org/action@main` / `@master` / `@v2` (major-tag only, which moves). Moving references mean the build is non-reproducible AND vulnerable to commit-substitution supply-chain attacks (e.g. the 2024 tj-actions/changed-files CVE-2025-30066 that retroactively modified all `@v44`/`@v45` tag targets to exfiltrate secrets, affecting 23k+ repos). The only safe pin is a full 40-char git SHA, which cannot be silently changed by the upstream maintainer. Distinct from `supply_chain_unpinned_docker_image` - this catches the git-ref variant."
