  - id: "sccm_client_push_installation_account_plaintext"
    category: "supply_chain"
    severity: "CRITICAL"
    title: "SCCM / MECM Client Push Installation Account In Plaintext Or Network-Access Account Misconfig"
    description: "A task renders an SCCM / MECM (Microsoft Endpoint Configuration Manager) config: `ccmsetup.exe` command line with `/mp:` + `SMSSITECODE=` + inline domain credentials, `ConfigMgr` Network Access Account (NAA) set with a literal password, or `Client Push Installation` account with a plaintext credential in an Ansible task. The **Client Push Installation** and **NAA** accounts are prime 2023-2024 red-team targets: (1) NAA credentials are distributed IN CLEARTEXT as policy to every SCCM client - an attacker with local admin on any managed host extracts them from WMI / `InstallationProperties`, (2) Client Push Account has local admin across ALL sites by design - a 'misnaa' extraction via `MalSCCM` / `SharpSCCM` yields domain-wide lateral-movement credentials in one query. Microsoft has published mitigation guidance (move to 'Enhanced HTTP' + MFA + scoped permissions), but playbook deployments continue to ship the legacy NAA pattern in 2024."
    regex: "(?:ccmsetup(?:\\.exe)?\\s+|ConfigMgr|SMSSITECODE\\s*=|SMS_SITE_CODE|SMSMP\\s*=)[\\s\\S]{0,400}?(?:SMSSLP|NetworkAccessAccount|NAAUser|ClientPushInstallationAccount|PASSWORD\\s*=)[\\s\\S]{0,100}?['\"]?[^'\"\\s{][^'\"\\n]{4,}['\"]?|(?:Invoke-WebRequest|Start-Process)\\s+[^\\n]*?ccmsetup\\.exe[\\s\\S]{0,300}?(?:/source:|SMSSITECODE=|CCMALLOWSILENTREBOOT)|NetworkAccessAccount[\\s\\S]{0,200}?(?:Password|UserName|pwd)\\s*[:=]\\s*['\"]?[^'\"\\n\\s]{4,}['\"]?|Set-CMAccount\\s+[^\\n]*?-Password\\s+['\"][^'\"]+['\"]|(?:sccm|mecm|configmgr)[\\s\\S]{0,300}?(?:client_?push|naa|network_?access)[\\s\\S]{0,150}?(?:user(?:name)?|account)\\s*[:=]\\s*[^{][^\\n]{2,}"
    positive_examples:
      - "ccmsetup SMSSLPxxxxx"
    multiline: true
    window: 15
    recommendation: "Migrate off the legacy **Network Access Account (NAA)** pattern entirely. Use **Enhanced HTTP** mode for SCCM (≥2103) + client authentication via Azure AD device tokens OR Entra-ID joined device certs - no shared NAA needed. For remaining NAA use, grant ONLY `ReadAndExecute` on the DP content share (NEVER a domain-privileged account; not Domain Admin; not the backup account; create a dedicated `svc_sccm_naa` with least privilege). Never use the **Client Push Installation Account** - deploy clients via **Autopilot** / **Intune** / **GPO** / **MDM** instead, which don't require a domain credential distributed across hosts. Store all SCCM-related credentials in **CyberArk** / **HashiCorp Vault** / **AWS Secrets Manager** - inject into playbooks via lookup: `password: \"{{ lookup('community.hashi_vault.vault_kv2_get', 'secret/sccm/naa')['data']['password'] }}\"`. Detect NAA extraction: Microsoft Defender for Endpoint alert `SCCMNetworkAccessAccountCredentialsAccessed`, Sysmon Event ID 10 for `lsass.exe` read by `SharpSCCM.exe`/`MalSCCM.exe`/`Impacket` signatures. Rotate NAA immediately if any extraction is suspected; rotate quarterly regardless."
    cwe: ['CWE-257', 'CWE-522', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: [V13.2.1, V13.2.3, V13.3.1, V11.2.5]
