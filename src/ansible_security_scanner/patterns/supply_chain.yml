  - id: "docker_pull_platform_skip_arch_verify"
    category: "supply_chain"
    severity: "MEDIUM"
    title: "docker pull --platform Override (Bypasses Per-Arch Signature Verification)"
    description: "A task runs `docker pull --platform linux/amd64 <image>` (or `--platform linux/arm64`) while the host's native arch is different - or explicitly with `cosign verify --type=cosign-signature --insecure-ignore-sct` / `--allow-insecure-registry`. Cross-platform pulls bypass the per-architecture manifest-digest verification that Sigstore/cosign uses because the `type=cosign-signature` sidecar is ARCH-SPECIFIC. This is the specific issue raised in the 2024 Sigstore TUF working-group posture review - attackers can serve a clean amd64 image and a malicious arm64 sibling under the same tag."
    regex: "docker\\s+pull\\s+[^\\n]*?--platform\\s+(?:linux/amd64|linux/arm64|linux/arm/v7)[\\s\\S]{0,300}?[a-z0-9][a-z0-9._/-]*(?::[a-z0-9._-]+)?(?!@sha256:)"
    positive_examples:
      - "docker pull --platform linux/amd64a"
    multiline: true
    window: 15
    recommendation: "Pull images by digest (`@sha256:...`) not by tag, and never use `--platform` unless you are genuinely cross-building. For multi-arch CI use `docker buildx build --platform=linux/amd64,linux/arm64 --provenance=mode=max --sbom=true --push` which produces SLSA-compliant multi-arch manifests with per-arch attestations. Verify on pull: `cosign verify --type=cosign-signature --certificate-identity=<issuer> <registry>/<image>@sha256:<digest>` - cosign binds the signature to the specific digest, so cross-arch swaps fail verification. Enable Kubernetes `policy-controller` / Kyverno `verifyImages` rule to enforce digest-pinning cluster-wide."
    cwe: ['CWE-345', 'CWE-347', 'CWE-494']
