    title: "pip install Of Known Typosquat Or Removed/Malicious Package Name"
    description: "A task runs `pip install` / `ansible.builtin.pip` with a package name that matches a known typosquat of a legitimate package (`reqeusts` -> `requests`, `urlib3` -> `urllib3`, `python-sqlite` -> `pysqlite3`, `crypt` -> `cryptography`, `mattplotlib` -> `matplotlib`, `pytohn-dateutil` -> `python-dateutil`, `djnago` -> `django`, `beautifulsop` -> `beautifulsoup4`) or a historically-malicious removed package (`colourama` -> `colorama`, `jellyfish` variants removed 2023, `ctx` removed 2022, `discord.py-app` malware 2024, `torchtriton` removed 2022). The PyPI security team publishes a removals log and the `typos-in-pypi` research dataset (Checkmarx 2024) enumerates the top-200 active typosquats; this rule catches the most dangerous."
