    positive_examples:
      - "langchainnetwork:host"
    multiline: true
    window: 80
    recommendation: "Deploy agent workloads in a namespace with a default-deny egress `NetworkPolicy` and an explicit allowlist for the LLM-provider endpoints only (`api.openai.com`, `api.anthropic.com`, your internal inference endpoint). In Docker, use `--network=ai-agents-egress` with an explicit iptables/nftables allowlist. Log every agent outbound connection with a service-mesh sidecar (Istio, Linkerd) and alert on any destination outside the allowlist."
