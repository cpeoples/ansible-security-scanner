  - id: "promptfoo_eval_secrets_in_config"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "promptfoo / DeepEval Config Contains Inline Provider API Keys Or Dataset Secrets"
    description: "A task renders `promptfoo.yaml` / `promptfooconfig.yaml` / `deepeval.yaml` containing `apiKey: sk-...`, `OPENAI_API_KEY: <literal>`, `ANTHROPIC_API_KEY: <literal>`, or HuggingFace Hub tokens as inline literals rather than `${env:OPENAI_API_KEY}` / `${secret:...}` references. Eval configs are routinely committed to public repos (they describe test cases, not runtime) and are the second-most-common source of leaked LLM-provider keys in 2024-2025 secret-scanner reports after CI env files."
    regex: "(?:apiKey|api_key|OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_API_KEY|COHERE_API_KEY|HUGGINGFACE_(?:HUB_)?TOKEN|HF_TOKEN)\\s*:\\s*['\"]?(?:sk-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|hf_[A-Za-z0-9]{30,}|AIza[A-Za-z0-9_-]{30,})"
    positive_examples:
      - "apiKey:sk-AAAAAAAAAAAAAAAAAAAA"
    recommendation: "Replace every literal provider key with an env-var or secrets-manager reference: `apiKey: ${env:OPENAI_API_KEY}` / `apiKey: ${secret:aws-secrets-manager:openai-key}`. Rotate any key that ever appeared in a committed config (assume compromised - GitHub Secret-Scanning will already have notified the provider, which may auto-revoke). Pre-commit scan eval configs with `detect-secrets` or `gitleaks` and fail the commit on any `sk-`/`hf_`/`AIza` pattern match."
    cwe: ['CWE-532', 'CWE-798']
    owasp_appsec: ["A07:2021", "A09:2021"]
