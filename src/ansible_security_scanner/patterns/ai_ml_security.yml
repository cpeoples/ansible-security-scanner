name: "AI / ML Security Patterns"
author: "Ansible Security Scanner Team"
description: >
  Detects AI/ML-specific security risks: exposed LLM API keys, untrusted model
  downloads, unsafe deserialization, direct AI service provisioning, GPU compute
  abuse, and prompt injection vectors.

patterns:
  # -- LLM / AI API Keys ---------------------------------------------------

  - id: "openai_api_key"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "OpenAI API Key in Playbook"
    description: "OpenAI API key hardcoded in playbook. These keys grant access to GPT models and billing."
    regex: "(?:OPENAI_API_KEY|openai_api_key|openai\\.api_key)\\s*[:=]\\s*['\"]?sk-[a-zA-Z0-9]{20,}"
    positive_examples:
      - "OPENAI_API_KEY:sk-aaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store OpenAI API keys in Vault or environment variables; never embed in playbooks"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "anthropic_api_key"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Anthropic API Key in Playbook"
    description: "Anthropic API key hardcoded in playbook. Grants access to Claude models."
    regex: "(?:ANTHROPIC_API_KEY|anthropic_api_key)\\s*[:=]\\s*['\"]?sk-ant-[a-zA-Z0-9]{20,}"
    positive_examples:
      - "ANTHROPIC_API_KEY:sk-ant-aaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store Anthropic API keys in Vault or environment variables"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "huggingface_token"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Hugging Face Token in Playbook"
    description: "Hugging Face access token hardcoded in playbook. Grants access to model hub and inference."
    regex: "(?:HF_TOKEN|HUGGING_FACE_TOKEN|huggingface_token|hf_token)\\s*[:=]\\s*['\"]?hf_[a-zA-Z0-9]{20,}"
    positive_examples:
      - "HF_TOKEN:hf_aaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store Hugging Face tokens in Vault or environment variables"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "google_ai_api_key"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Google AI / Gemini API Key in Playbook"
    description: >-
        Google AI / Gemini API key (AIza-prefixed) is hardcoded in a playbook. The
        key grants billed model access and can be extracted from logs, version
        control, or CI artifacts.
    regex: "(?:GOOGLE_AI_API_KEY|GEMINI_API_KEY|google_ai_key)\\s*[:=]\\s*['\"]?AIza[a-zA-Z0-9_-]{30,}"
    positive_examples:
      - "GOOGLE_AI_API_KEY:AIzaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store Google AI keys in Secret Manager; use workload identity for service access"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "azure_openai_key"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Azure OpenAI Key in Playbook"
    description: >-
        Azure OpenAI service key (32-char hex) is hardcoded in a playbook. Anyone
        reading the file can call Azure-hosted GPT models on the owner's
        subscription and incur cost or PII risk.
    regex: "(?:AZURE_OPENAI_KEY|AZURE_OPENAI_API_KEY|azure_openai_key)\\s*[:=]\\s*['\"]?[a-f0-9]{32}"
    positive_examples:
      - "AZURE_OPENAI_KEY:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    recommendation: "Use managed identity for Azure OpenAI; never embed keys in playbooks"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "cohere_api_key"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Cohere API Key in Playbook"
    description: >-
        Cohere API key is hardcoded in a playbook. The key authorizes
        embeddings/generation calls billed to the owner and survives in git history
        once committed.
    regex: "(?:COHERE_API_KEY|cohere_api_key|CO_API_KEY)\\s*[:=]\\s*['\"]?[a-zA-Z0-9]{30,}"
    positive_examples:
      - "COHERE_API_KEY:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store Cohere API keys in Vault or environment variables"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "replicate_api_token"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Replicate API Token in Playbook"
    description: >-
        Replicate API token (r8_-prefixed) is hardcoded in a playbook. Replicate
        tokens grant model-execution access and remain valid until manually rotated.
    regex: "(?:REPLICATE_API_TOKEN|replicate_api_token)\\s*[:=]\\s*['\"]?r8_[a-zA-Z0-9]{30,}"
    positive_examples:
      - "REPLICATE_API_TOKEN:r8_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store Replicate tokens in Vault or environment variables"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  - id: "generic_llm_api_key"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "LLM API Key Variable"
    description: "A variable name suggests an LLM/AI API key is being set in this playbook"
    regex: "(?:MISTRAL_API_KEY|TOGETHER_API_KEY|GROQ_API_KEY|FIREWORKS_API_KEY|PERPLEXITY_API_KEY|DEEPSEEK_API_KEY|SAMBANOVA_API_KEY)\\s*[:=]"
    positive_examples:
      - "MISTRAL_API_KEY:"
    recommendation: "Store AI/LLM API keys in Vault or environment variables; never embed in playbooks"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06", "LLM10"]

  # -- Untrusted Model Downloads --------------------------------------------

  - id: "huggingface_model_download"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Hugging Face Model Download"
    description: "Downloads ML models from Hugging Face hub. Models can contain arbitrary code via pickle."
    regex: "huggingface\\.co/.*(?:resolve|download)|from_pretrained\\(|snapshot_download|hf_hub_download"
    positive_examples:
      - "huggingface.co/resolve"
    recommendation: "Pin model downloads to specific revisions with SHA verification; scan models for malicious payloads"
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0010', 'AML.T0011.000', 'AML.T0019']
    owasp_llm: ["LLM05"]

  - id: "pickle_remote_load"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Remote Pickle/Model Deserialization"
    description: "Loads pickle/joblib/torch files from remote sources. Pickle deserialization executes arbitrary code."
    regex: "pickle\\.load|torch\\.load|joblib\\.load|dill\\.load|cloudpickle\\.load"
    positive_examples:
      - "pickle.load"
    recommendation: "Never load pickle files from untrusted sources; use safetensors format for ML models"
    cve: ["CVE-2024-12029", "CVE-2024-3568"]
    nist_controls: ['SI-3', 'SI-10', 'CM-11']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0011.000', 'AML.T0010']
    owasp_llm: ["LLM03", "LLM05"]

  - id: "model_from_url"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "ML Model Downloaded from URL"
    description: "Downloads ML model weights directly from a URL without integrity verification"
    # `get_url`/`curl`/`wget` + model file extension can be split across the
    # module key and `url:` / destination lines.
    regex: "(?:get_url|curl|wget)(?:[\\s\\S]{0,300})?\\.(?:pt|pth|pkl|pickle|joblib|onnx|h5|pb|safetensors|gguf|bin)\\b"
    positive_examples:
      - "get_url.pt"
    multiline: true
    window: 10
    recommendation: "Pin model URLs to specific versions and verify SHA256 checksums"
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0010', 'AML.T0011.000']
    owasp_llm: ["LLM05"]

  # -- AI Service Provisioning ----------------------------------------------

  - id: "aws_sagemaker_access"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Direct SageMaker Access"
    description: "Creates or invokes SageMaker resources directly from a playbook"
    regex: "aws\\s+sagemaker\\s+(?:create-|invoke-|describe-|delete-)|boto3.*client.*sagemaker"
    positive_examples:
      - "aws sagemaker create-"
    recommendation: "SageMaker provisioning should go through approved ML pipelines, not Ansible"
    nist_controls: ['AC-3', 'AC-6', 'AU-12']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0040', 'AML.T0034']
    owasp_llm: ["LLM05"]

  - id: "aws_bedrock_access"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Direct AWS Bedrock Access"
    description: "Invokes foundation models via AWS Bedrock directly from a playbook"
    regex: "aws\\s+bedrock(?:-runtime)?\\s+invoke|boto3.*client.*bedrock"
    positive_examples:
      - "aws bedrock invoke"
    recommendation: "Bedrock access should go through approved API gateways with cost controls"
    nist_controls: ['AC-3', 'AC-6', 'AU-12']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0040', 'AML.T0034']
    owasp_llm: ["LLM05"]

  - id: "gcp_vertex_ai_access"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Direct Vertex AI Access"
    description: >-
        Task invokes Vertex AI directly via gcloud or the aiplatform endpoint
        instead of using the Ansible google.cloud collection. Direct CLI calls
        bypass change tracking and idempotency checks.
    regex: "gcloud\\s+ai\\s+|gcloud\\s+ml-engine\\s+|aiplatform\\.googleapis\\.com"
    positive_examples:
      - "gcloud ai "
    recommendation: "Vertex AI provisioning should go through approved ML pipelines"
    nist_controls: ['AC-3', 'AC-6', 'AU-12']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0040', 'AML.T0034']
    owasp_llm: ["LLM05"]

  - id: "azure_ml_access"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Direct Azure ML Access"
    description: "Accesses Azure Machine Learning services directly from a playbook"
    regex: "az\\s+ml\\s+(?:online-deployment|endpoint|compute|workspace)|azureml://"
    positive_examples:
      - "environment: azureml://registries/azureml/environments/sklearn-1.5/labels/latest"
    recommendation: "Azure ML provisioning should go through approved ML pipelines"
    nist_controls: ['AC-3', 'AC-6', 'AU-12']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0040', 'AML.T0034']
    owasp_llm: ["LLM05"]

  # -- GPU Compute Abuse ----------------------------------------------------

  - id: "gpu_instance_launch"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "GPU Instance Launch"
    description: "Launches GPU-equipped instances, which are expensive and could indicate crypto mining or unauthorized training"
    regex: "(?:instance.type|instance_type|machine_type|vm_size).*(?:p[2-5]\\.|g[4-6]\\.|inf[12]\\.|trn1|Standard_N[CVD]|a2-|a3-|n1-.*gpu)"
    positive_examples:
      - "description: Please enter the AWS instance type to use, e.g. 'g6.2xlarge'."
    recommendation: "GPU instance launches must be approved and tagged with a cost center and expiration"
    nist_controls: ['AC-6', 'CM-7', 'AU-12']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0034']
    owasp_llm: ["LLM05"]

  # -- Jupyter / Notebook Exposure ------------------------------------------

  - id: "jupyter_no_auth"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Jupyter Notebook Without Authentication"
    description: "Starts a Jupyter notebook server with authentication disabled, allowing unauthenticated code execution"
    regex: "jupyter.*--NotebookApp\\.token=['\"]?['\"]|jupyter.*--no-browser.*--ip=0\\.0\\.0\\.0|notebook.*--NotebookApp\\.disable_check_xsrf"
    positive_examples:
      - "jupyter--NotebookApp.token='"
    recommendation: "Always require authentication tokens for Jupyter; never bind to 0.0.0.0 without network controls"
    nist_controls: ['AC-3', 'IA-2', 'SC-7']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0049', 'AML.T0050']
    owasp_llm: ["LLM06", "LLM08"]

  - id: "jupyter_server_start"
    category: "ai_ml_security"
    severity: "MEDIUM"
    title: "Jupyter Notebook Server Started from Playbook"
    description: "Starts a Jupyter notebook server, which provides interactive code execution capability"
    regex: "jupyter\\s+(?:notebook|lab|server)\\s+.*--ip"
    positive_examples:
      - "buildah config --cmd \"jupyter lab --ip=0.0.0.0 --no-browser\" {{ container_id }}"
    recommendation: "Jupyter servers should be deployed through approved platforms with authentication"
    nist_controls: ['AC-3', 'IA-2', 'SC-7']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0049', 'AML.T0050']
    owasp_llm: ["LLM06"]

  # -- LLM Prompt Injection Vector ------------------------------------------

  - id: "template_in_llm_prompt"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Template Variable in LLM Prompt"
    description: "Injects unvalidated template variables into LLM API prompts, enabling prompt injection"
    regex: "(?:prompt|messages|content|system_message).*\\{\\{.*\\}\\}.*(?:openai|anthropic|llm|chat|completion|bedrock)"
    positive_examples:
      - "wp_cli_completion_url: \"https://raw.githubusercontent.com/wp-cli/wp-cli/v{{ wp_cli_version }}/utils/wp-completion.bash\""
    recommendation: "Sanitize and validate all user input before including in LLM prompts; use input guardrails"
    nist_controls: ['SI-10', 'SI-3']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0051', 'AML.T0051.001']
    owasp_llm: ["LLM01"]

  # -- ML Pipeline Manipulation ---------------------------------------------

  - id: "mlflow_direct_access"
    category: "ai_ml_security"
    severity: "MEDIUM"
    title: "MLflow Direct Access"
    description: "Accesses MLflow tracking server or model registry directly from a playbook"
    regex: "mlflow\\s+(?:run|models|deployments)|MLFLOW_TRACKING_URI\\s*[:=]"
    positive_examples:
      - "mlflow run"
    recommendation: "MLflow access should go through approved ML pipeline orchestration"
    nist_controls: ['AC-3', 'AC-6', 'AU-12']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0010', 'AML.T0018']
    owasp_llm: ["LLM06"]

  - id: "wandb_api_key"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Weights & Biases API Key"
    description: >-
        Weights & Biases API key (40-char hex) is hardcoded in a playbook. The key
        grants write access to experiment data and model artifacts on the owner's
        W&B team.
    regex: "(?:WANDB_API_KEY|wandb_api_key)\\s*[:=]\\s*['\"]?[a-f0-9]{40}"
    positive_examples:
      - "WANDB_API_KEY:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    recommendation: "Store W&B API keys in Vault or environment variables"
    nist_controls: ['IA-5(7)', 'SC-28', 'SI-4']
    soc2: ['CC7.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']
    owasp_llm: ["LLM06"]

  # -- Model / runtime security (2025-2026) ---------------------------------

  - id: "mcp_server_deployed_without_auth"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Model Context Protocol (MCP) Server Deployed Without Authentication"
    description: "A playbook installs or runs an MCP server (`@modelcontextprotocol/server-*`, `mcp-server-*`, `uvx mcp-*`) with `--stdio` or `--sse` / `--http` transport but no `--auth` / `authentication_required`, no bearer-token middleware, and no mTLS. MCP servers expose arbitrary tool calls (shell, filesystem, database) to any connected LLM client - an unauthenticated MCP server on a shared host is an RCE service on a well-known port."
    regex: "(?:npx\\s+@modelcontextprotocol/server-[a-z]+|mcp-server-[a-z]+|uvx\\s+mcp-[a-z]+)[\\s\\S]{0,300}?--(?:sse|http|port)\\b(?:(?!--auth|--token|--bearer|authorization|mTLS|client_cert)[\\s\\S]){0,300}"
    positive_examples:
      - "npx @modelcontextprotocol/server-a--sse"
    multiline: true
    window: 10
    recommendation: "Require a bearer token or mTLS for every non-stdio MCP transport. For SSE/HTTP, put the server behind a reverse proxy that enforces auth (oauth2-proxy, Pomerium). Bind to 127.0.0.1 if the client is co-located; never 0.0.0.0 without auth. Audit tool-exposure surface: disable `shell`, `filesystem` writes, and network fetch unless the workflow genuinely needs them."
    cwe: ["CWE-306", "CWE-862"]
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_llm: ["LLM07"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ["T1133", "T1190"]
    cis_controls: ["CIS-6.1"]
    nist_controls: ["AC-3", "IA-2", "SC-7"]
    pci_dss: ["1.2.1", "8.6.2"]
    soc2: ["CC6.1", "CC6.6"]
    mitre_atlas: ["AML.T0049", "AML.T0053", "AML.T0050"]

  - id: "rag_vector_db_world_readable"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "RAG Vector Database Stored World-Readable Or Without ACL"
    description: "A task deploys a vector DB (Chroma, FAISS, Qdrant, Milvus, pgvector, Weaviate) and sets its data directory to mode `0755`/`0777` or writes embeddings to `/tmp/` / `/var/tmp/`. RAG embeddings often contain verbatim chunks of the source documents - world-readable embeddings are world-readable SharePoint / Confluence / customer-data leaks."
    regex: "(?:chroma(?:db)?|faiss|qdrant|milvus|weaviate|pgvector)[\\s\\S]{0,400}?(?:persist_directory|data_dir|storage_path|volume)\\s*[:=]\\s*['\"]?(?:/tmp/|/var/tmp/|/opt/[^/]+/data)['\"]?|(?:ansible\\.builtin\\.file|copy)\\s*:[\\s\\S]{0,300}?path\\s*:\\s*['\"]?[^\\n'\"]*(?:chroma|faiss|qdrant|milvus|vector|embeddings)[^\\n'\"]*['\"]?[\\s\\S]{0,200}?mode\\s*:\\s*['\"]?0?7[57][57]"
    positive_examples:
      - "chromapersist_directory:/tmp/"
    multiline: true
    window: 20
    recommendation: "Store vector DB data in a dedicated directory with `mode: '0700'` owned by the app's service account. Never persist embeddings under `/tmp`. Encrypt at rest (LUKS / cloud-provider disk encryption). Treat the embedding store as a copy of the source corpus - apply the same ACL as the source documents."
    cwe: ["CWE-200", "CWE-276"]
    owasp_appsec: ["A01:2021"]
    owasp_llm: ["LLM06"]
    owasp_asvs: [V14.2.2]
    mitre_attack: ["T1530", "T1552.001"]
    cis_controls: ["CIS-3.3", "CIS-13.4"]
    nist_controls: ["AC-3", "SC-28"]
    pci_dss: ["3.5.1", "7.2.1"]
    hipaa: ["164.312(a)(1)", "164.312(e)(1)"]
    soc2: ["C1.1", "CC6.1"]
    mitre_atlas: ["AML.T0037", "AML.T0025"]

  - id: "prompt_injection_untrusted_to_shell_sink"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "LLM Output Piped Directly Into Shell / Command Module"
    description: "A task feeds the output of an LLM call (`openai.chat.completions`, `anthropic.messages.create`, `ansible.builtin.uri` to an LLM endpoint, `community.general.ai_*` modules, or a registered variable from a lookup plugin whose name contains `llm`/`gpt`/`claude`) directly into `ansible.builtin.shell`/`command`/`script`/`raw`. LLM outputs are attacker-controlled by any user who can influence the prompt - piping them to a shell is the canonical prompt-injection-to-RCE sink."
    regex: "register\\s*:\\s*(\\w*(?:llm|gpt|claude|chat|openai|anthropic|bedrock|gemini)\\w*)[\\s\\S]{0,800}?(?:ansible\\.builtin\\.)?(?:shell|command|script|raw)\\s*:[^\\n]*\\{\\{\\s*\\1"
    positive_examples:
      - |2-
            register: gpt_response
                  ansible.builtin.shell: echo {{ gpt_response.stdout }}
    multiline: true
    window: 60
    recommendation: "Never pipe raw LLM output to shell. Parse the LLM response as structured JSON with a strict schema (JSON-Schema / Pydantic). Allowlist exactly the commands / arguments the workflow needs and invoke them explicitly by name with validated arguments - not via string interpolation. Add a second-pass classifier that rejects outputs containing shell metacharacters (`;`, `&`, `|`, backticks)."
    cwe: ["CWE-77", "CWE-94", "CWE-1427"]
    owasp_appsec: ["A03:2021"]
    owasp_llm: ["LLM01", "LLM02"]
    mitre_attack: ["T1059", "T1204"]
    cis_controls: ["CIS-16.11"]
    nist_controls: ["SI-4", "SI-10"]
    pci_dss: ["6.2.4"]
    soc2: ["CC7.1", "CC7.2"]
    mitre_atlas: ["AML.T0051", "AML.T0051.000", "AML.T0051.001", "AML.T0050"]

  - id: "huggingface_model_unpinned_revision"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "Hugging Face Model Downloaded Without Commit Revision Pin"
    description: "A task downloads a Hugging Face model (`huggingface_hub.snapshot_download`, `transformers.AutoModel.from_pretrained`, `ansible.builtin.get_url` to `huggingface.co/.../resolve/main/...`) without specifying `revision=<commit-sha>`. HF models are mutable - `main` branch can be force-pushed with a malicious `pytorch_model.bin` (pickle) or `tokenizer_config.json` (RCE via `trust_remote_code`). This was the attack vector of the PoisonGPT and Xet-Sentinel incidents."
    regex: "(?:snapshot_download|from_pretrained|hf_hub_download|AutoModel|AutoTokenizer)\\s*\\((?:(?!revision\\s*=|revision\\s*:)[\\s\\S]){0,300}|huggingface\\.co/[A-Za-z0-9._/-]+/resolve/main/|trust_remote_code\\s*[:=]\\s*(?:True|true|yes)"
    positive_examples:
      - "snapshot_download("
    multiline: true
    window: 10
    recommendation: "Pin every HF download by commit SHA: `AutoModel.from_pretrained('org/model', revision='5a4e...')`. Set `trust_remote_code=False` (the default in transformers 4.x) and review every `*.py` file that ships with a model before enabling remote code. Mirror critical models into an internal Artifactory / HF-cache and apply the same SHA pinning discipline as PyPI / npm."
    cwe: ["CWE-345", "CWE-494"]
    cve: ["CVE-2024-3568"]
    owasp_appsec: ["A08:2021"]
    owasp_llm: ["LLM05"]
    owasp_asvs: [V15.2.4]
    mitre_attack: ["T1195.001", "T1195.002"]
    cis_controls: ["CIS-Supply-Chain"]
    nist_controls: ["CM-11", "SA-10", "SI-7"]
    pci_dss: ["6.3.2", "6.3.3"]
    soc2: ["CC7.1", "CC8.1"]
