    description: "A play runs as `become: true` (or the whole play has `become: yes` at play scope) and invokes `pickle.load` / `pickle.loads` / `torch.load` / `joblib.load` on a file that was fetched from the network in an earlier task. `pickle.load` executes arbitrary code during deserialisation - running it as root after a network fetch is a straight line from supply-chain compromise to full host takeover."
