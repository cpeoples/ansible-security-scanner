  - id: "llm_agent_network_egress_unrestricted"
    category: "ai_ml_security"
    severity: "HIGH"
    title: "LangChain / AutoGen / CrewAI Agent Deployed With Unrestricted Outbound Internet Egress"
    description: "A task deploys an LLM-agent workload (container, pod, systemd unit running `langchain`, `autogen`, `crewai`, `openai-agents`, or `langgraph`) without egress network-policy / firewall restrictions (`NetworkPolicy` absent, Docker `--network=host` or default bridge with no outbound rules). A prompt-injected agent with tool-use will exfiltrate RAG context / secrets to any attacker-controlled URL via its built-in `requests`/`urllib`/`httpx` tools. This is OWASP LLM Top-10 v1.1 LLM02 (Insecure Output Handling) operationalised at the deploy layer."
