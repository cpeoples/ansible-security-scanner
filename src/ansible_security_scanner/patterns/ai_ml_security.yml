  - id: "jupyter_serverapp_token_disabled"
    category: "ai_ml_security"
    severity: "CRITICAL"
    title: "Jupyter ServerApp / Notebook Deployed With Authentication Disabled"
    description: "A playbook configures a Jupyter ServerApp (or the older `jupyter_notebook_config.py`) with `c.ServerApp.token = ''`, `c.ServerApp.password = ''`, `c.ServerApp.disable_check_xsrf = True`, `c.ServerApp.allow_origin = '*'`, or `--allow-root --ip=0.0.0.0 --NotebookApp.token=''`. An unauthenticated Jupyter instance on a routable IP is an RCE service - Python + network + filesystem. Botnets actively scan for this on port 8888/8889."
