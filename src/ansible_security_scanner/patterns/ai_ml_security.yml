    multiline: true
    window: 200
    positive_examples:
      - |2-
            on:
              issue_comment:
                types: [created]
            jobs:
              warp-fix:
                if: contains(github.event.comment.body, '@warp-fix')
                permissions:
                  contents: write
                  pull-requests: write
                steps:
                  - run: sudo apt install warp-cli -y
                  - env:
                      WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
                    run: |
                      warp-cli agent run --prompt "$(cat prompt.txt)"
