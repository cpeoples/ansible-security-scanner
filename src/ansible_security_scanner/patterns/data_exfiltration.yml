    recommendation: "Rclone remote configuration enables data exfiltration; ensure this is authorized"
    no_ansible_remediation: true
    cwe: ['CWE-200']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V8.1.1"]
    mitre_attack: ['T1567.002']
    cis_controls: ['CIS-3.3', 'CIS-13.1']
    nist_controls: ['AC-3', 'AC-6', 'SC-28', 'SI-4']
    pci_dss: ['3.3.1', '3.5.1', '7.2.1', '11.3.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.3', 'CC6.7', 'CC7.2']

  - id: "mega_cmd_exfiltration"
    category: "data_exfiltration"
    severity: "CRITICAL"
    title: "MEGA.nz CLI Data Transfer"
    description: "Uses MEGAcmd tools to upload or download data to/from MEGA.nz cloud storage"
    regex: '\bmega-(?:put|get|copy|sync|cmd|login|export)\b'
    positive_examples:
      - "mega-put"
    recommendation: "MEGA.nz CLI tools can exfiltrate data to encrypted cloud storage; remove immediately"
    no_ansible_remediation: true
    cwe: ['CWE-200']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V8.1.1"]
    mitre_attack: ['T1567.002']
    cis_controls: ['CIS-3.3', 'CIS-13.1']
    nist_controls: ['AC-3', 'AC-6', 'SC-28', 'SI-4']
    pci_dss: ['3.3.1', '3.5.1', '7.2.1', '11.3.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.3', 'CC6.7', 'CC7.2']

  - id: "azcopy_data_transfer"
    category: "data_exfiltration"
    severity: "HIGH"
    title: "AzCopy Azure Blob Transfer"
    description: >-
        azcopy copy/sync/make/remove/list targets *.blob.core.windows.net. azcopy
        bypasses Azure's audit-rich Storage SDK and is a known exfiltration tool in
        cloud-attacker playbooks.
    regex: '\bazcopy\b\s+(?:copy|sync|make|remove|list)\s+.*(?:blob\.core\.windows\.net|\.blob\.)'
    positive_examples:
      - "azcopy copy blob.core.windows.net"
    recommendation: "AzCopy to external Azure accounts can be used for data exfiltration; verify the destination"
    no_ansible_remediation: true
    cwe: ['CWE-200']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V8.1.1"]
    mitre_attack: ['T1567.002']
