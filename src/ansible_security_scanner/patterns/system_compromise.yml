  - id: "clickhouse_access_management_user_enabled"
    category: "system_compromise"
    severity: "HIGH"
    title: "ClickHouse User With access_management=1 (Privilege-Granting Backdoor)"
    description: "A ClickHouse users.xml / SQL-based access config has `<access_management>1</access_management>` (or `access_management=1`) on a non-admin user. This gives the user the ability to CREATE/DROP/GRANT any role or user in the cluster - a full administrative escalation path. Combined with default ClickHouse installs that leave the `default` user unauthenticated on `9000/tcp`, this is a common finding in the 2024 Censys report on exposed ClickHouse."
