                  kernel.kexec_load_disabled: 1
                  kernel.sysrq: 0
    multiline: true
    window: 6
    recommendation: "Set `kernel.kptr_restrict = 2` in `/etc/sysctl.d/10-kernel-hardening.conf` (strictest, only violates niche profiler use-cases). `kernel.perf_event_paranoid = 3` should accompany it to close the same leak via perf. Revert to `1` ONLY on hosts running perf/eBPF profilers in prod, not on application servers."
