  - id: "postgres_copy_program_rce_as_postgres"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "PostgreSQL COPY ... PROGRAM Used From Playbook (RCE-As-postgres-User Primitive)"
    description: "A task issues a SQL statement via `community.postgresql.postgresql_query`, `postgresql_script`, or raw `psql -c` containing `COPY <table> FROM PROGRAM '...'` / `COPY <table> TO PROGRAM '...'`. `COPY ... PROGRAM` (PG 11+) executes the argument as a shell command in the `postgres` OS user context - it is the documented Postgres-superuser RCE primitive. Any SQL-injection finding in an application that eventually reaches a playbook-run query becomes a trivial RCE. Even legitimate use is a red flag because it requires the `pg_execute_server_program` role (PG 11+) / superuser privileges, which should never be granted to an Ansible-provisioned app role."
    regex: "COPY\\s+[\\w\\.\"]+\\s+(?:FROM|TO)\\s+PROGRAM\\s+['\"]"
    positive_examples:
      - "COPY a FROM PROGRAM '"
    multiline: true
    recommendation: "Never use `COPY ... PROGRAM` from Ansible; replace with `COPY ... FROM '/path/file.csv'` for file ingestion (no shell-out). Revoke the `pg_execute_server_program` role from all app users: `REVOKE pg_execute_server_program FROM app_role;`. For data-loading pipelines, use `\\copy` (client-side, runs as the OS user running psql, far narrower blast radius) or a dedicated ETL process with a purpose-built FDW. Audit existing grants: `SELECT member::regrole, granted_by::regrole FROM pg_auth_members WHERE roleid = 'pg_execute_server_program'::regrole;`."
