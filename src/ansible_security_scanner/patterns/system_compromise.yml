  - id: "runc_leaky_vessels_vulnerable_install"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "runc Installed/Pinned At Version Vulnerable To Leaky Vessels (CVE-2024-21626)"
    description: "A task installs or pins `runc` / `containerd.io` / `docker-ce` at a version known vulnerable to CVE-2024-21626 (Leaky Vessels, Snyk Jan 2024) - specifically runc `< 1.1.12`, containerd `< 1.6.28`/`< 1.7.13`, Docker `< 25.0.2`. Leaky Vessels is a file-descriptor leak in `runc run`/`exec` that allows a malicious container image or a crafted `WORKDIR`/`--workdir` argument to escape the container and read/write the host filesystem - a full container-escape achievable with standard, non-privileged image pulls (no CAP_SYS_ADMIN required). In 2024-2025 this remains the most-exploited container-escape CVE per the Sysdig Threat Report."
    regex: "(?:ansible\\.builtin\\.(?:package|apt|dnf|yum))[\\s\\S]{0,300}?name\\s*:\\s*['\"]?(?:runc|containerd(?:\\.io)?|docker(?:-ce)?)['\"]?[\\s\\S]{0,300}?(?:version|state)\\s*:\\s*['\"]?(?:1\\.1\\.(?:[0-9]|1[01])(?![0-9])|1\\.6\\.(?:[0-9]|1[0-9]|2[0-7])(?![0-9])|1\\.7\\.(?:[0-9]|1[0-2])(?![0-9])|2[0-4]\\.\\d+\\.\\d+|present|latest)"
    positive_examples:
      - "ansible.builtin.packagename:runcversion:1.1.0"
    multiline: true
    window: 30
    recommendation: "Upgrade immediately: `runc >= 1.1.12`, `containerd >= 1.6.28` or `>= 1.7.13`, `docker-ce >= 25.0.2`, `moby-engine >= 25.0.2`. On RHEL/OpenShift, patch via `dnf upgrade runc containerd` and restart every node. For airgapped environments that cannot immediately upgrade, mitigate by: (1) only pulling images from signed/trusted registries (cosign verification via `policy-controller`), (2) running rootless containers (`--userns-remap` or `--security-opt userns=<map>`), (3) enabling seccomp default profile + AppArmor. Scan running containers for exploitation attempts via Falco rule `runc_leak_exploit_attempt`."
