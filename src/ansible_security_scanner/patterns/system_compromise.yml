  - id: "kernel_perf_event_paranoid_lowered_or_unprivileged_bpf_enabled"
    category: "system_compromise"
    severity: "HIGH"
    title: "kernel.perf_event_paranoid Lowered Or kernel.unprivileged_bpf_disabled=0 (Userland Tracing / BPF Primitive)"
    description: "A task sets `kernel.perf_event_paranoid` to `-1`, `0`, or `1` (default is `2` on Debian/Ubuntu/RHEL 9+, `3` on hardened kernels) OR sets `kernel.unprivileged_bpf_disabled` to `0` (default `1`/`2`). Lowered `perf_event_paranoid` permits unprivileged users to run `perf record` / `perf trace` on arbitrary processes - enabling syscall tracing, stack unwinding, and TSC-skew side-channel attacks (used in 2024 RetBleed and Downfall exploit chains). Setting `unprivileged_bpf_disabled=0` permits unprivileged BPF program loading - the exact primitive used in CVE-2022-23222 (BPF pointer arithmetic escape), CVE-2023-2163 (BPF verifier bypass), and the 2024 BPFDoor variants. Red Hat's 2024 hardening guide for RHEL 9 explicitly requires `perf_event_paranoid >= 2` and `unprivileged_bpf_disabled = 1`."
    regex: "(?:sysctl|ansible\\.posix\\.sysctl|ansible\\.builtin\\.sysctl|/etc/sysctl\\.(?:conf|d/[^\\s]+))[\\s\\S]{0,400}?(?:kernel\\.perf_event_paranoid\\s*[:=]\\s*['\"]?(?:-1|0|1)['\"]?|kernel\\.unprivileged_bpf_disabled\\s*[:=]\\s*['\"]?0['\"]?)|name\\s*:\\s*kernel\\.perf_event_paranoid[\\s\\S]{0,200}?value\\s*:\\s*['\"]?(?:-1|0|1)['\"]?|name\\s*:\\s*kernel\\.unprivileged_bpf_disabled[\\s\\S]{0,200}?value\\s*:\\s*['\"]?0['\"]?|(?:^|\\n)\\s*(?:kernel\\.perf_event_paranoid\\s*=\\s*(?:-1|0|1)\\b|kernel\\.unprivileged_bpf_disabled\\s*=\\s*0\\b)"
    positive_examples:
      - "sysctlkernel.perf_event_paranoid:-1"
    multiline: true
    window: 10
    recommendation: "Set `kernel.perf_event_paranoid = 2` (or `3` on workloads with no legitimate `perf` users) and `kernel.unprivileged_bpf_disabled = 1` (or `2` to fully disable unprivileged BPF). Persist in `/etc/sysctl.d/99-hardening.conf` + `sysctl --system`. For workloads that NEED `perf` (legitimate profiling, tracing), grant `CAP_PERFMON` + `CAP_BPF` to the specific service account via `setcap` or systemd `CapabilityBoundingSet=` - never lower the system-wide knob. For k8s nodes, bake these values into the node-image via cloud-init + immutable infrastructure pipeline. Audit via `sysctl kernel.perf_event_paranoid kernel.unprivileged_bpf_disabled` - fail on any deviation from `>= 2` / `>= 1`. Alert on `sysctl` audit events targeting these keys (`auditctl -w /proc/sys/kernel/perf_event_paranoid -p wa -k kernel_hardening`)."
    cwe: ['CWE-284', 'CWE-732', 'CWE-1269']
