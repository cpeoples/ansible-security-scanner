  - id: "elasticsearch_xpack_security_disabled_bound_public"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Elasticsearch xpack.security.enabled=false With Bind On 0.0.0.0 (Unauth Data Exfil)"
    description: "An Elasticsearch / OpenSearch config (`elasticsearch.yml`, `opensearch.yml`, or env-var in a Docker/K8s manifest) has `xpack.security.enabled: false` (or `plugins.security.disabled: true` for OpenSearch) AND `network.host: 0.0.0.0` (or unspecified, which defaults to 0.0.0.0). This combination exposes an unauthenticated ES cluster - anyone reachable at port 9200 can read/write all indices and use scripting engines (Painless) for RCE. The 2024 Shadowserver report counts >15,000 Internet-exposed unauth ES clusters; this is the canonical 'I just wanted to dev locally' production leak."
