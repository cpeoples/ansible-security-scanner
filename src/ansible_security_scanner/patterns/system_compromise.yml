  - id: "grub_password_disabled_or_set_from_playbook"
    category: "system_compromise"
    severity: "HIGH"
    title: "GRUB Password Set Inline From Playbook Or Boot Menu Unlocked"
    description: "A task renders `/etc/grub.d/40_custom` / `/etc/default/grub` with `set superusers=\"\"` (empty), `--unrestricted` on a menu entry, or a `grub.pbkdf2.sha512` hash set from an inline variable. Empty superusers disable boot-menu authentication entirely (allowing `init=/bin/bash` single-user escalation at the console). Inline-provisioned GRUB password hashes end up in Git/CI logs, defeating the control they're meant to enforce."
