  - id: "auditctl_failure_mode_silent"
    category: "system_compromise"
    severity: "HIGH"
    title: "auditctl -f 0 Sets Audit Failure Mode To Silent (Buffer-Overflow Loss)"
    description: "A task runs `auditctl -f 0` (or renders `-f 0` into `/etc/audit/audit.rules`), which sets the audit subsystem's failure mode to `silent` - when the audit buffer fills (DoS from an attacker creating thousands of events), further events are DISCARDED without panic or log entry. Production baselines require `-f 1` (printk warning) or `-f 2` (kernel panic) so an overflow cannot be exploited as an anti-forensic primitive. RHEL / CIS L2 / DISA STIG all require `-f 2` on regulated workloads."
    regex: "(?:^|[\\s;&|])auditctl\\s+-f\\s+0\\b|failure_mode\\s*[:=]\\s*['\"]?silent['\"]?|-f\\s+0\\s*$"
    positive_examples:
      - " auditctl -f 0"
    multiline: true
    window: 3
    recommendation: "Set `-f 2` (kernel panic on audit-subsystem failure) on regulated/PCI/HIPAA hosts - if an attacker can exhaust the buffer, the host halts rather than silently drops events. On non-critical fleets use `-f 1` (printk warning visible in dmesg). Increase `-b` (backlog limit) to at least 8192 to absorb bursty workloads: `auditctl -b 8192`. Validate via `auditctl -s | grep -E 'failure|backlog'` and export to your compliance dashboard."
    cwe: ['CWE-693', 'CWE-703', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-8.2', 'CIS-8.3', 'CIS-8.11']
    nist_controls: ['AU-4', 'AU-5', 'AU-9']
    pci_dss: ['10.2.1', '10.3.1']
    hipaa: ['164.312(b)']
