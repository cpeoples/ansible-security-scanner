name: "System Compromise Patterns"
author: "Ansible Security Scanner Team"
description: "Detects system compromise, privilege escalation, and dangerous system modifications"

patterns:
  - id: "privilege_escalation_sudo"
    category: "system_compromise"
    severity: "HIGH"
    title: "Privilege Escalation via Sudo"
    description: "Task attempts to escalate privileges using sudo with user input"
    regex: "^(?!\\s*#)\\s*(?:shell|command|raw):\\s*.*sudo.*\\{\\{[^}]*\\}\\}"
    positive_examples:
      - "shell: sudo {{phabricator_directory}}/phabricator/phabricator/bin/config set mysql.host localhost"
    recommendation: "Replace shell: sudo {{ var }} ... with the dedicated module call plus become: true and become_method: sudo; this elevates without exposing the user-controlled value to a shell parser."
    cwe: ['CWE-78', 'CWE-269']
    owasp_appsec: ["A03:2021", "A04:2021"]
    mitre_attack: ['T1059.004', 'T1548.003']
    cis_controls: ['CIS-5.4', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)', 'SI-3', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1', '7.2.1', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3', 'CC7.1']
    stig: ['V-230503']

  - id: "file_permission_777"
    category: "system_compromise"
    severity: "HIGH"
    title: "Dangerous File Permissions (777)"
    description: >-
        chmod 777 is applied to a file, leaving it world-writable. Any local user
        can replace the contents, defeating any integrity assumption that depended
        on the path.
    regex: "chmod\\s+777"
    positive_examples:
      - "- chmod 777 /tmp/releases"
    recommendation: "0777 grants write to every local user and is a privilege-escalation primitive; set the most restrictive mode the workload requires (0640 / 0750) and grant additional access via group membership."
    cwe: ['CWE-732']
    owasp_asvs: ["V12.4.1"]
    mitre_attack: ['T1222.002']
    cis_controls: ['CIS-3.3', 'CIS-4.1']
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  - id: "setuid_binary_creation_compromise"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "SetUID Binary Creation"
    description: >-
        chmod sets the setuid bit (4xxx mask or u+s). New setuid binaries are a
        textbook persistence/privesc primitive on Linux.
    recommendation: |
      Avoid creating new setuid/setgid binaries. Most legitimate privilege escalation needs are met by `sudo` rules, capabilities (`setcap cap_net_bind_service+ep`), systemd `User=`/`Group=` units, or polkit. If a setuid binary is genuinely required, ship it from a trusted package (rpm/deb) so the file is owned by `root:root`, mode `4755`, and tracked by the package manager - never `chmod u+s` an arbitrary script or copy from a playbook. Audit existing setuid binaries on every host with `find / -perm -4000 -type f -xdev -ls` and remove anything not in your distro's setuid baseline.
    regex: "chmod\\s+[0-7]*[4][0-7]*\\s+|chmod\\s+u\\+s"
    positive_examples:
      - "chmod 0640 /etc/ldap/localhost.key"
    cwe: ['CWE-250', 'CWE-732']
    owasp_asvs: ["V12.4.1", "V14.2.2"]
    mitre_attack: ['T1548.001']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['AC-3', 'AC-6', 'AC-6(1)', 'CM-6', 'CM-7', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "shadow_file_access"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Shadow File Access"
    description: >-
        /etc/shadow or /etc/gshadow is referenced in a task. Reading either requires
        root and is the shape used to stage offline password cracking.
    recommendation: |
      Never read, copy, template, or fetch `/etc/shadow` or `/etc/gshadow` from a playbook. These files contain hashed passwords and are root-only on every Linux distro for that reason. To create or update a user's password, use the `ansible.builtin.user` module with `password:` set to a vault-encrypted hash (`mkpasswd --method=sha-512` or `openssl passwd -6`). To rotate machine credentials, integrate with FreeIPA/AD/Vault rather than manipulating the shadow file directly. If you absolutely must inspect shadow contents (forensics), do it out-of-band with proper change-control and never via Ansible automation.
    regex: "/etc/shadow|/etc/gshadow"
    positive_examples:
      - "- name: Copy /etc/shadow"
    cwe: ['CWE-200', 'CWE-522']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V8.1.1"]
    mitre_attack: ['T1003.008']
    cis_controls: ['CIS-3.3', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '7.2.1', '7.2.5', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.2', 'CC6.3', 'CC6.7']

  - id: "root_ssh_key_modification"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Root SSH Key Modification"
    description: >-
        Task targets /root/.ssh/authorized_keys directly. Modifying root's
        authorized_keys plants persistent root SSH access on the host.
    recommendation: |
      Disable direct root SSH login (`PermitRootLogin no` in `/etc/ssh/sshd_config`) and never write to `/root/.ssh/authorized_keys` from a playbook - this is the classic persistence primitive used by every credentialed-attacker kill chain. Provision per-admin user accounts, grant them passwordless `sudo` for required commands only, and use `ansible.posix.authorized_key` against THOSE accounts (not root). Centralize SSH key distribution via a directory service (FreeIPA, OpenLDAP+sssd) or a CA-signed-key flow (`TrustedUserCAKeys`) so key rotation is a single-source-of-truth change rather than an N-host file edit.
    regex: "/root/\\.ssh/authorized_keys"
    positive_examples:
      - "path: '{{ \"/etc/initramfs-tools/root/.ssh/authorized_keys\""
    cwe: ['CWE-284']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1078', 'T1098.004']
    cis_controls: ['CIS-5.1', 'CIS-5.4']
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']
    stig: ['V-230556']

  - id: "crontab_modification"
    category: "system_compromise"
    severity: "HIGH"
    title: "Crontab Modification"
    description: >-
        crontab -e/-u, /etc/cron*, or /var/spool/cron is being edited. Cron units
        are a classic persistence mechanism that survives reboot and runs as the
        cron user.
    recommendation: |
      Manage scheduled jobs declaratively with `ansible.builtin.cron` (which writes to user crontabs via `crontab -l`/`crontab -` so it is auditable and idempotent), or with systemd timer units for anything hostwide. Never `crontab -e` or write directly to `/etc/cron.d`/`/var/spool/cron` from a playbook - both bypass Ansible's idempotency model and are a textbook persistence primitive (MITRE T1053.003). For root-owned scheduled jobs prefer `/etc/cron.d/<package>.cron` shipped by a package over playbook-edited files. Audit existing schedules with `for u in $(cut -d: -f1 /etc/passwd); do crontab -l -u $u 2>/dev/null && echo "<-- $u"; done` plus `ls -la /etc/cron.* /var/spool/cron/`.
    regex: "crontab\\s+-[eu]|/etc/cron|/var/spool/cron"
    positive_examples:
      - "cron_config_path: /etc/cron.d"
    cwe: ['CWE-250']
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1053.003']
    cis_controls: ['CIS-4.1', 'CIS-8.2']
    nist_controls: ['AC-6', 'AC-6(1)', 'AU-2', 'AU-12', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '10.2.1']
    hipaa: ['164.312(b)']
    soc2: ['CC6.3', 'CC7.1', 'CC7.2', 'CC8.1']

  - id: "kernel_module_loading"
    category: "system_compromise"
    severity: "HIGH"
    title: "Kernel Module Loading"
    description: >-
        insmod / modprobe / rmmod is invoked. Kernel modules run with full ring-0
        privilege; loading an unverified module is equivalent to root code execution
        in the kernel.
    recommendation: |
      Avoid runtime kernel module loading (`insmod`/`modprobe`/`rmmod`) from playbooks - LKM loads are the primary rootkit-installation primitive (MITRE T1547.006). For modules genuinely required at boot, declare them in `/etc/modules-load.d/<package>.conf` (so the package owns the change and `kernel.modules_disabled=1` post-boot can lock the kernel). Block unwanted modules with `/etc/modprobe.d/blacklist-<name>.conf` plus `install <name> /bin/true`. On kernels >= 5.4 enable `module.sig_enforce=1` so unsigned modules cannot load at all; on regulated systems (PCI/HIPAA) flip `kernel.modules_disabled=1` after boot in `/etc/sysctl.d/` so no further module loads are possible without a reboot.
    regex: "(?:insmod|modprobe|rmmod)\\s+"
    positive_examples:
      - "- modprobe - remove redundant conversions to unicode (https://github.com/ansible-collections/community.general/pull/11098)."
    cwe: ['CWE-250']
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1014', 'T1547.006']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['AC-6', 'AC-6(1)', 'CM-6', 'CM-7', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1']
    soc2: ['CC6.3', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "system_service_manipulation"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "System Service Manipulation"
    description: >-
        systemctl start/stop/enable/disable/mask receives a {{ ... }} expression as
        its unit name. User-controlled unit names allow attackers to disable
        security services or enable rogue ones.
    regex: "systemctl\\s+(?:start|stop|enable|disable|mask)\\s+\\{\\{[^}]*\\}\\}"
    positive_examples:
      - "systemctl start {{}}"
    recommendation: "Validate the service name against an allow-list before passing it to ansible.builtin.systemd_service / ansible.builtin.service: use ansible.builtin.assert with a regex like ^[a-zA-Z0-9_.@-]+$ and a known-services set rather than passing {{ var }} straight to systemctl."
    cwe: ['CWE-20', 'CWE-250']
    owasp_appsec: ["A03:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1543.002']
    cis_controls: ['CIS-4.1', 'CIS-8.2']
    nist_controls: ['AC-6', 'AC-6(1)', 'AU-2', 'AU-12', 'CM-6', 'CM-7', 'SI-10']
    pci_dss: ['2.2.1', '2.2.4', '6.2.4', '7.2.1', '10.2.1']
    hipaa: ['164.312(b)']
    soc2: ['CC6.3', 'CC7.1', 'CC7.2', 'CC8.1']

  - id: "firewall_rule_modification"
    category: "system_compromise"
    severity: "HIGH"
    title: "Firewall Rule Modification"
    description: >-
        iptables / ufw / firewall-cmd is invoked with disable, flush, or delete. The
        shape erases network controls and is often the first move before a noisier
        attack stage.
    regex: "(?:iptables|ufw|firewall-cmd).*(?:disable|flush|delete)"
    positive_examples:
      - "- name: Reset ufw to factory defaults and disable"
    recommendation: "Manage firewall state declaratively via ansible.posix.firewalld / community.general.ufw / ansible.builtin.iptables modules with state: present, rather than imperatively flushing or disabling rules from a shell task."
    cwe: ['CWE-693']
    mitre_attack: ['T1562.004']
    cis_controls: ['CIS-4.1', 'CIS-12.3']
    nist_controls: ['CM-6', 'CM-7', 'SC-8', 'SC-8(1)']
    pci_dss: ['2.2.1', '2.2.4', '2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7', 'CC7.1', 'CC8.1']

  - id: "user_account_creation"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "User Account Creation with Privileges"
    description: >-
        useradd -G or usermod -aG adds an account into sudo/wheel/admin. New
        administrative accounts are a textbook persistence mechanism.
    regex: "useradd.*-G.*(?:sudo|wheel|admin)|usermod.*-a.*-G.*(?:sudo|wheel|admin)"
    positive_examples:
      - "useradd-Gsudo"
    recommendation: "Use ansible.builtin.user with the groups: list and append: true so membership is idempotent and reviewable; gate the play with a permissions guardrail (e.g. an explicit allow-list of accounts permitted in sudo / wheel / admin)."
    cwe: ['CWE-269']
    owasp_appsec: ["A04:2021"]
    mitre_attack: ['T1098', 'T1136.001']
    cis_controls: ['CIS-5.1', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "backdoor_listener"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Backdoor Network Listener"
    description: "Opening a listening socket that spawns a shell (netcat/socat/ncat backdoor)"
    regex: "(?:(?:nc|ncat|netcat)\\s+(?:-\\w*l\\w*|--listen)\\s+.*-e\\s+(?:/bin/)?(?:ba)?sh|socat\\s+(?:TCP4?-LISTEN|OPENSSL-LISTEN).*EXEC:)"
    positive_examples:
      - "nc -l -e sh"
    recommendation: "A listening nc/ncat/socat with -e or EXEC: is a textbook reverse shell; remove the task and audit the host for compromise. Legitimate one-off shells should be delivered via ansible.builtin.ssh with key-based auth, never an unauthenticated TCP listener."
    cwe: ['CWE-78', 'CWE-506']
    owasp_appsec: ["A03:2021"]
    mitre_attack: ['T1059.004', 'T1571']
    cis_controls: ['CIS-4.1', 'CIS-13.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-3', 'SI-4', 'SI-7', 'SI-10']
    pci_dss: ['2.2.1', '2.2.4', '6.2.4', '6.3.1', '11.3.1']
    soc2: ['CC6.8', 'CC7.1', 'CC7.2', 'CC8.1']

  - id: "web_shell_drop"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Web Shell Drop to Webroot"
    description: "Writing executable scripts with shell-exec primitives into a webroot directory"
    regex: "(?:/var/www/|/srv/www/|/usr/share/nginx/html/|htdocs/|wwwroot/).*\\.(?:php|jsp|aspx?|cgi)(?:[\"'\\s]|$)"
    positive_examples:
      - "dest: /var/www/html/index.php"
    recommendation: "Writing executable script files into a webroot is the canonical web-shell deployment pattern; remove the task, audit the webroot for unknown files, and deploy application code via packaged artifacts (RPM/DEB, container image, git checkout) rather than ansible.builtin.copy of loose .php / .jsp files."
    cwe: ['CWE-434', 'CWE-506']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V12.2.1", "V12.4.1"]
    mitre_attack: ['T1505.003']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-3', 'SI-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC6.8', 'CC7.1', 'CC8.1']

  # -- Windows Defense Evasion / Post-Compromise ------------------------------
  - id: "windows_shadow_copies_delete"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Windows Shadow Copy / Backup Deletion"
    description: "Deletes Volume Shadow Copies or Windows Server Backup catalogs via vssadmin delete shadows, wbadmin delete catalog|backup, wmic shadowcopy delete, or PowerShell Remove-WmiObject Win32_ShadowCopy / Get-WmiObject ... | Remove-WmiObject. This is a near-universal ransomware precursor that prevents rollback."
    regex: "(?:vssadmin(?:\\.exe)?\\s+delete\\s+shadows|wbadmin(?:\\.exe)?\\s+delete\\s+(?:catalog|backup|systemstatebackup)|wmic(?:\\.exe)?\\s+shadowcopy\\s+delete|Get-WmiObject\\s+Win32_ShadowCopy[\\s\\S]{0,100}Remove-WmiObject|Remove-WmiObject\\s+Win32_ShadowCopy)"
    positive_examples:
      - "vssadmin delete shadows"
    recommendation: "Volume Shadow Copy deletion is essentially never a legitimate operation in configuration management. Flag this as an incident, verify backups are intact offsite, and hunt for additional impact-stage activity (encryption, event-log clearing) from the same actor."
    cwe: ['CWE-404', 'CWE-693']
    mitre_attack: ['T1485', 'T1490']
    cis_controls: ['CIS-11.1', 'CIS-11.4']
    nist_controls: ['SC-8', 'SC-8(1)']
    pci_dss: ['2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7']

  - id: "windows_defender_tamper"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Windows Defender Configuration Tampering"
    description: "Uses Set-MpPreference to disable real-time protection / cloud protection / script scanning, Add-MpPreference to add broad exclusion paths (C:\\, %TEMP%, %APPDATA%), or modifies the DisableAntiSpyware registry key. These are direct defense-evasion primitives - an attacker disables EDR so subsequent tooling runs without alerts."
    regex: "(?:Set-MpPreference\\s+-(?:DisableRealtimeMonitoring|DisableBehaviorMonitoring|DisableIOAVProtection|DisableScriptScanning|MAPSReporting\\s+0|SubmitSamplesConsent\\s+2)|Add-MpPreference\\s+-Exclusion(?:Path|Process|Extension)\\s+[\"']?(?:C:\\\\?[\"']?$|C:\\\\\\\\$|\\*|\\.)|DisableAntiSpyware\\s*[:=]\\s*(?:1|0x1|true))"
    positive_examples:
      - "Set-MpPreference -DisableRealtimeMonitoring"
    recommendation: "Defender config is managed centrally (Group Policy / Intune / Defender for Endpoint portal). Host-local Set-MpPreference calls bypass that policy. Audit the exclusion list, re-enable real-time protection, and investigate what ran while protection was off."
    cwe: ['CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1562.001']
    cis_controls: ['CIS-10.1', 'CIS-10.7']
    nist_controls: ['AU-2', 'AU-3', 'AU-12', 'SC-8', 'SC-8(1)', 'SI-3']
    pci_dss: ['2.2.7', '4.2.1', '10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)', '164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7', 'CC6.8', 'CC7.2']

  - id: "event_log_clear_windows"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Windows Event Log Clearing"
    description: "Clears Windows event logs via wevtutil cl <log>, Clear-EventLog, Remove-EventLog, or WMIC nteventlog where(...)=TRUE call ClearEventLog(). Log clearing is a defense-evasion primitive almost always associated with post-exploitation cleanup - there is rarely a legitimate automation reason to clear Security/System/Application logs."
    regex: "(?:wevtutil(?:\\.exe)?\\s+cl\\s+(?:Security|System|Application|Setup|Microsoft-Windows)|Clear-EventLog\\s+-LogName|Remove-EventLog\\s+-LogName|wmic(?:\\.exe)?\\s+nteventlog[\\s\\S]{0,100}ClearEventLog)"
    positive_examples:
      - "wevtutil cl Security"
    recommendation: "Do not clear event logs from automation. Forward logs to a centralized SIEM (Windows Event Forwarding, Splunk UF, Elastic Beats) so retention is not host-local. If log volume is the concern, adjust retention/size instead of clearing."
    cwe: ['CWE-117', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1", "V7.3.1"]
    mitre_attack: ['T1070.001', 'T1562.002']
    cis_controls: ['CIS-8.2', 'CIS-8.5']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  # -- Kernel-level exploitation primitives (2024-2026) ---------------------
  - id: "userfaultfd_kernel_exploit_primitive"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "userfaultfd Syscall Enabled for Unprivileged Users (Kernel Exploit Primitive)"
    description: "Enables userfaultfd(2) for unprivileged users by writing `1` to `/proc/sys/vm/unprivileged_userfaultfd` or removing the sysctl hardening. userfaultfd is a documented exploitation primitive used in Dirty Pipe, Dirty Cred, and numerous io_uring / tmpfs races because it lets an attacker stall a kernel page-fault handler at an attacker-controlled address - turning many race-condition bugs into reliable privilege escalation."
    regex: "(?:vm\\.unprivileged_userfaultfd|unprivileged_userfaultfd)[\\s\\S]{0,80}?(?:value|content|line|[:=])\\s*[:=]?\\s*[\"']?1\\b|/proc/sys/vm/unprivileged_userfaultfd[\\s\\S]{0,80}(?:content|line)\\s*[:=]\\s*[\"']?1"
    positive_examples:
      - "vm.unprivileged_userfaultfdvalue1"
    multiline: true
    window: 6
    recommendation: "Keep `vm.unprivileged_userfaultfd=0` in `/etc/sysctl.d/90-hardening.conf`. If a workload genuinely needs userfaultfd, grant `CAP_SYS_PTRACE` to that specific process rather than opening it fleet-wide."
    cwe: ['CWE-362', 'CWE-1023']
    mitre_attack: ['T1068']
    cis_controls: ['CIS-3.3']

  - id: "proc_self_mem_write_primitive"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "/proc/self/mem or /proc/<pid>/mem Write (Dirty-Pipe Style Primitive)"
    description: "Writes to `/proc/self/mem` or `/proc/<pid>/mem`, the primitive at the heart of Dirty Pipe (CVE-2022-0847), Dirty Cred, and suid-binary overwrite chains. Legitimate Ansible automation essentially never needs `dd of=/proc/*/mem`."
    regex: "(?:dd\\s+[^\\n]*\\bof=/proc/(?:self|\\d+|\\$\\$)/mem|>\\s*/proc/(?:self|\\d+|\\$\\$)/mem)"
    positive_examples:
      - "dd of=/proc/self/mem"
    recommendation: "Remove the task; if you genuinely need in-memory patching (extremely rare), use a signed kernel-live-patching framework (kpatch, livepatch) through the vendor's channel rather than raw `/proc/*/mem` writes."
    cwe: ['CWE-276', 'CWE-787']
    cve: ["CVE-2022-0847"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1068', 'T1211']
    cis_controls: ['CIS-3.3']

  - id: "systemd_timer_persistence_world_writable_unit"
    category: "system_compromise"
    severity: "HIGH"
    title: "systemd Timer + Service Unit Dropped With Suspicious ExecStart Or World-Writable Path"
    description: "A task creates a paired `.timer` + `.service` unit under `/etc/systemd/system/` or `~/.config/systemd/user/` whose `ExecStart=` references a world-writable directory (`/tmp`, `/var/tmp`, `/dev/shm`), a base64 payload (`bash -c 'echo <b64> | base64 -d | bash'`), or a script downloaded inline with `curl | bash`. systemd timers are the Linux equivalent of scheduled tasks and the #1 persistence primitive in 2024-2025 Linux intrusion reports (MITRE T1053.006)."
    regex: "(?:\\.timer|\\.service)[\\s\\S]{0,600}?ExecStart\\s*=\\s*[^\\n]*(?:/tmp/|/var/tmp/|/dev/shm/|base64\\s+-d\\s*\\|\\s*(?:bash|sh)|curl\\s+[^|]{0,200}\\|\\s*(?:bash|sh)|wget\\s+[^|]{0,200}\\|\\s*(?:bash|sh))"
    positive_examples:
      - |2-
        .service"
              # ...
              ExecStart=/bin/bash -c 'curl -fsSL https://claude.ai/install.sh | bash
    multiline: true
    window: 30
    recommendation: "Remove the unit. Legitimate systemd timers place `ExecStart` at a root-owned, non-world-writable path (e.g. `/usr/local/bin/`), reference a file that was provisioned via a signed-and-pinned package or a `copy` task with explicit `owner: root`, `group: root`, `mode: '0755'`, and never inline base64 or `curl | bash`. Audit existing timers with `systemctl list-timers --all` and inspect `ExecStart` for each unit. Monitor `/etc/systemd/system/*.{timer,service}` with auditd."
    cwe: ['CWE-426', 'CWE-506', 'CWE-732']
