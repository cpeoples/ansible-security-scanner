  - id: "kernel_kptr_restrict_disabled"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "kernel.kptr_restrict Set To 0 (Kernel Pointer Leak, KASLR Defeated)"
    description: "A task sets `kernel.kptr_restrict = 0`, which causes `%pK` printk format specifiers to leak raw kernel pointers via `/proc/kallsyms`, `/proc/modules`, `/proc/net/*`, `/sys/kernel/*` - readable by any user. Raw pointers immediately defeat Kernel ASLR and convert otherwise-unreliable 1-byte-OOB-write bugs into deterministic LPE. Mainline default is `2` (never show pointers to anyone). Debian/Ubuntu default is `1` (admin-only)."
    regex: "(?:kernel\\.kptr_restrict)[\\s\\S]{0,80}?(?:value|content|line|[:=])\\s*[:=]?\\s*[\"']?0\\b"
    positive_examples:
