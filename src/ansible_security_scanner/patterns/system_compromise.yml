  - id: "kernel_dmesg_restrict_disabled"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "kernel.dmesg_restrict Set To 0 (Kernel Log Readable By Unprivileged Users)"
    description: "A task sets `kernel.dmesg_restrict = 0`, which allows any unprivileged user to read `/dev/kmsg` and `dmesg(1)` output. Kernel logs routinely contain driver addresses, %p pointer leaks, oopses with RIP/RSP values, crypto key fingerprints, and disk layout - all of which defeat KASLR and are the direct information-leak primitive exploited in the 2024 cachewarp / retbleed / Inception PoCs. RHEL 7+, Ubuntu 22.04+, Debian 12+ all default to `1`. Dropping to `0` has no legitimate operational benefit - use `journalctl -k` with `adm`-group membership for ops staff."
    regex: "(?:kernel\\.dmesg_restrict)[\\s\\S]{0,80}?(?:value|content|line|[:=])\\s*[:=]?\\s*[\"']?0\\b"
    positive_examples:
      - "kernel.dmesg_restrictvalue0"
    multiline: true
    window: 6
    recommendation: "Set `kernel.dmesg_restrict = 1` in `/etc/sysctl.d/10-kernel-hardening.conf`. Grant `adm` or `systemd-journal` group to ops staff who legitimately need dmesg. Validate via CIS Benchmark L1 rule 1.5.3 (RHEL) / 1.6.3 (Ubuntu). On Kubernetes nodes add an additional kernel commandline arg `dmesg_restrict=1` to harden against runtime sysctl reverts."
