  - id: "kernel_net_rp_filter_disabled"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "net.ipv4.conf.all.rp_filter Set To 0 (Reverse-Path Filtering Disabled, IP Spoofing Enabler)"
    description: "A task sets `net.ipv4.conf.all.rp_filter = 0` (or `default.rp_filter = 0`), which disables the kernel's reverse-path source-address validation. This allows the host to both accept spoofed inbound packets (e.g. pretend-to-be-loopback packets from the wire) AND forward locally-spoofed egress packets - the exact primitives used in DNS-cache-poisoning side-channels (SADDNS / CVE-2020-25705), cross-cluster pod spoofing on flat CNI networks, and kube-apiserver impersonation when combined with API-server trust of `X-Forwarded-For`. Mainline default is `2` (loose) on most distros, `1` on systemd-networkd - `0` is always a regression."
    regex: "net\\.ipv4\\.conf\\.(?:all|default)\\.rp_filter[\\s\\S]{0,80}?(?:value|content|line|[:=])\\s*[:=]?\\s*[\"']?0\\b"
    positive_examples:
      - "net.ipv4.conf.all.rp_filtervalue0"
    multiline: true
    window: 6
    recommendation: "Set `net.ipv4.conf.all.rp_filter = 1` (strict) and `net.ipv4.conf.default.rp_filter = 1` in `/etc/sysctl.d/10-network-hardening.conf`. On multi-homed hosts with asymmetric routing (e.g. rare BGP edges), use `2` (loose) not `0`. Validate via `sysctl -a | grep rp_filter` after boot and export the value to your CIS-Benchmark compliance dashboard."
    cwe: ['CWE-290', 'CWE-346']
