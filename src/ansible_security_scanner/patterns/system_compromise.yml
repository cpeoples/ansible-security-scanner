  - id: "cassandra_allow_all_authenticator_with_superuser"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Cassandra AllowAllAuthenticator Configured With Default cassandra/cassandra Superuser"
    description: "A rendered `cassandra.yaml` has `authenticator: AllowAllAuthenticator` (no password check) OR the default `cassandra/cassandra` superuser credentials were not rotated while `PasswordAuthenticator` is enabled. Cassandra's default install leaves `AllowAllAuthenticator` on port 9042 - anyone who reaches that port can DROP KEYSPACE, read any column family, and use `ALTER TABLE` to plant triggers. The 2023-2024 Shadowserver reports show >4000 Internet-reachable unauth Cassandra clusters from exactly this misconfig."
