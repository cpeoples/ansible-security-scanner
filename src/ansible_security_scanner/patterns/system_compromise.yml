  - id: "journald_storage_none_or_volatile"
    category: "system_compromise"
    severity: "HIGH"
    title: "systemd-journald Storage=none Or =volatile (Log Persistence Eliminated)"
    description: "A task renders `/etc/systemd/journald.conf` (or a `journald.conf.d/*.conf` drop-in) with `Storage=none` (no journal written anywhere, events only in-memory with runtime view) or `Storage=volatile` (in-memory tmpfs under `/run/log/journal`, wiped on reboot). On a system without `rsyslog`/`syslog-ng` catching the journal, this eliminates all post-reboot forensic evidence of intrusion. Distinct from the existing `rsyslog_or_journald_stopped_masked` rule which catches the service-stop variant - this one catches the `Storage=` setting which silently disables persistence while the service appears fully running."
    regex: "/etc/systemd/journald\\.conf(?:\\.d/[^/\\s]+)?[\\s\\S]{0,1500}?^\\s*Storage\\s*=\\s*(?:none|volatile)\\b|^\\s*Storage\\s*=\\s*(?:none|volatile)\\s*$"
    positive_examples:
      - "Storage=none"
    multiline: true
    window: 30
    recommendation: "Set `Storage=persistent` in `/etc/systemd/journald.conf` and ensure `/var/log/journal` exists (`systemd-tmpfiles --create --prefix /var/log/journal`). Size appropriately: `SystemMaxUse=2G`, `SystemKeepFree=4G`, `MaxRetentionSec=3month` for PCI-scoped hosts. Ship journal off-host with `systemd-journal-upload.service` to a central SIEM - that way even if on-host persistence is tampered with, centrally-collected events remain. Alert on `Storage=` changes via auditd `-w /etc/systemd/journald.conf -p wa -k journald_cfg`."
    cwe: ['CWE-284', 'CWE-693', 'CWE-778']
    owasp_appsec: ["A01:2021", "A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070.002', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-8.2', 'CIS-8.5', 'CIS-8.10']
    nist_controls: ['AU-4', 'AU-9', 'AU-11']
    pci_dss: ['10.2.1', '10.5.3', '10.7.1']
    hipaa: ['164.308(a)(1)(ii)(D)', '164.312(b)']
    soc2: ['CC7.2', 'CC7.3']

  - id: "journald_rate_limit_burst_zero_disables_capture"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "systemd-journald RateLimitBurst=0 With Short Interval (Event Dropping Primitive)"
    description: "A task renders `/etc/systemd/journald.conf` with `RateLimitBurst=0` combined with a non-zero `RateLimitIntervalSec` - which in systemd ≥ 240 is the documented way to DISABLE rate-limiting but in older systemd (≤ 239) is the pathological config that rate-limits every message to zero within the interval (i.e. total silencing). More commonly: `RateLimitBurst=1` + `RateLimitIntervalSec=1h` silences the log file after one event per hour - a plausible-looking config that destroys forensic timelines. Any explicit rate-limit config on a host with CIS-L2 baseline is suspect because CIS requires rate-limit=off."
    regex: "/etc/systemd/journald\\.conf(?:\\.d/[^/\\s]+)?[\\s\\S]{0,1500}?RateLimitBurst\\s*=\\s*(?:0|1|[1-9])\\b[\\s\\S]{0,200}?RateLimitIntervalSec\\s*=\\s*(?!0\\b)[0-9]+[smhd]?|RateLimitBurst\\s*=\\s*(?:0|1)\\s*$"
    positive_examples:
      - |2-
            /etc/systemd/journald.conf
            [Journal]
            RateLimitBurst=0
            RateLimitIntervalSec=30s
    multiline: true
    window: 20
    recommendation: "Leave journald rate-limiting at the distro default on audit-in-scope systems, OR disable it explicitly with `RateLimitIntervalSec=0` (canonical systemd ≥240 form - unambiguous, no `RateLimitBurst=0` ambiguity). If you must rate-limit on a noisy host, use `RateLimitBurst=10000` + `RateLimitIntervalSec=30s` so legitimate burst storms are absorbed. Forward all events to a central SIEM with `systemd-journal-upload` where rate-limiting can be re-applied centrally without affecting on-host retention. Alert on any change to these two knobs."
    cwe: ['CWE-400', 'CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
