  - id: "kernel_fs_protected_symlinks_disabled"
    category: "system_compromise"
    severity: "HIGH"
    title: "fs.protected_symlinks Or fs.protected_hardlinks Disabled (TOCTOU / symlink-race Primitive)"
    description: "A task sets `fs.protected_symlinks = 0` or `fs.protected_hardlinks = 0`. These sysctls (enabled by default on every mainstream distro since 2013) block the canonical `/tmp` symlink-race / TOCTOU pattern: a sticky-bit directory with a writable file owned by another user is dereferenced by a privileged process that follows a symlink implanted by an attacker. Disabling them reintroduces a 20-year-old exploitation class used by `tmpwatch`, `logrotate`, and any CI runner that writes into `/tmp`/`/var/tmp`. The 2024 `cron` + `inotifywait` privesc PoC specifically requires one of these to be `0`."
    regex: "(?:fs\\.protected_(?:symlinks|hardlinks|fifos|regular))[\\s\\S]{0,80}?(?:value|content|line|[:=])\\s*[:=]?\\s*[\"']?0\\b"
    positive_examples:
      - |2-
        fs.protected_fifos: 1
                  fs.protected_regular: 2
                  fs.suid_dumpable: 0
    multiline: true
    window: 6
    recommendation: "Keep ALL of `fs.protected_symlinks=1`, `fs.protected_hardlinks=1`, `fs.protected_fifos=2`, `fs.protected_regular=2` in `/etc/sysctl.d/10-fs-hardening.conf`. These are cost-free - no legitimate workload ever needs them disabled. If a specific app breaks, fix the app to stop following user-supplied symlinks; do not weaken the kernel-wide hardening."
    cwe: ['CWE-59', 'CWE-367', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V12.4.1"]
    mitre_attack: ['T1068', 'T1548.001']
    cis_controls: ['CIS-3.3', 'CIS-4.8']
    nist_controls: ['AC-6', 'CM-7', 'SI-10']
    pci_dss: ['2.2.1', '7.2.1']
    soc2: ['CC6.1', 'CC7.1']

  - id: "kernel_unprivileged_userns_clone_enabled"
    category: "system_compromise"
    severity: "HIGH"
    title: "kernel.unprivileged_userns_clone Set To 1 (User-Namespace Escape Primitive)"
    description: "A task sets `kernel.unprivileged_userns_clone = 1` or `user.max_user_namespaces` to a non-zero value on a Debian/Ubuntu/RHEL fleet where the distro default disables unprivileged userns. Unprivileged user-namespaces are the prerequisite for the 2024 CVE-2024-1086 nft_verdict_init UAF (Pwn2Own Toronto -> root), CVE-2024-26808 netfilter-userns, and every `runc` / `containerd` escape since 2019. Systems that don't run rootless containers (Podman, Bubblewrap, Flatpak) have zero operational need to enable it."
