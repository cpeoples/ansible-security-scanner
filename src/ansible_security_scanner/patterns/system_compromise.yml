  - id: "efi_secureboot_disabled_or_uefi_vars_tampered"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Secure Boot Disabled Or UEFI SetupMode Re-Enabled Via efivar / mokutil"
    description: "A task invokes `mokutil --disable-validation`, writes to `/sys/firmware/efi/efivars/SecureBoot-*`, or runs `efibootmgr` with `-c` (create) targeting an unsigned `.efi` binary on a Secure-Boot-enforced system. Disabling Secure Boot from automation opens the host to bootkits (BlackLotus, CosmicStrand, MoonBounce 2024-2025 resurgence) that survive OS reinstall and evade every in-OS EDR."
