  - id: "io_uring_runtime_enabled_without_seccomp_filter"
    category: "system_compromise"
    severity: "HIGH"
    title: "io_uring Runtime Enabled On Host Without Seccomp/AppArmor Filter"
    description: "A task sets `kernel.io_uring_disabled = 0` in sysctl, loads the `io_uring` module via `modprobe`, or renders a Docker/Kubernetes config with `io_uring` explicitly enabled in the seccomp profile (`\"defaultAction\": \"SCMP_ACT_ALLOW\"` for `io_uring_*` syscalls). `io_uring` is the Linux kernel's async-IO subsystem - since 5.1 it has accumulated >30 CVEs (CVE-2024-0582, CVE-2024-1086, CVE-2023-6932, CVE-2022-1015) most of which are unauthenticated container-to-kernel LPE. Critically, `io_uring` operations BYPASS most eBPF-based runtime detection (Falco, Tetragon) because syscalls are issued via a shared ring buffer, not through `sys_enter_*`. Google (2023), DigitalOcean (2024), and ChromeOS (2024) all disabled `io_uring` host-wide citing this tradeoff."
    regex: "(?:kernel\\.io_uring_disabled\\s*=\\s*0|modprobe\\s+io_uring|insmod\\s+[^\\s]*io_uring|echo\\s+0\\s*>\\s*/proc/sys/kernel/io_uring_disabled|io_uring_setup[\\s\\S]{0,200}?SCMP_ACT_ALLOW|\"io_uring_setup\"[\\s\\S]{0,200}?\"action\"\\s*:\\s*\"SCMP_ACT_ALLOW\")"
    positive_examples:
      - "kernel.io_uring_disabled=0"
    multiline: true
    window: 10
    recommendation: "Disable io_uring host-wide: `sysctl -w kernel.io_uring_disabled=2` (persistent via `/etc/sysctl.d/99-io-uring.conf`) - the 2023-introduced sysctl that blocks `io_uring_setup()` entirely. For workloads that genuinely need async-IO, use a seccomp filter that returns `SCMP_ACT_ERRNO` for `io_uring_setup`, `io_uring_enter`, `io_uring_register` OR restrict via AppArmor/SELinux to a narrow set of known-good binaries. On Kubernetes, add `io_uring_setup` to the default seccomp-deny list in the RuntimeDefault profile (`/var/lib/kubelet/seccomp/profiles/default.json`). Audit exploitation-attempt via auditd: `-a always,exit -F arch=b64 -S io_uring_setup -k iouring_attempt`."
    cwe: ['CWE-284', 'CWE-732', 'CWE-829']
    cve: ["CVE-2022-1015", "CVE-2023-6932", "CVE-2024-0582", "CVE-2024-1086"]
    owasp_appsec: ["A01:2021", "A08:2021"]
    owasp_asvs: ["V10.3.1", "V12.4.1"]
    mitre_attack: ['T1068', 'T1562.001', 'T1611']
