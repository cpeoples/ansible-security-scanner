  - id: "redis_module_load_arbitrary_so"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Redis MODULE LOAD Of Arbitrary .so File (RCE-As-Redis-User Primitive)"
    description: "A task issues `redis-cli MODULE LOAD /path/to/module.so`, templates a Redis config file with `loadmodule /path/to/module.so`, or uses `community.general.redis` to run a `MODULE LOAD` command. Redis modules are C shared objects loaded into the `redis-server` process address-space with no sandbox - `MODULE LOAD` is effectively `dlopen()` as the `redis` user. Attacker-controlled `.so` paths (or attacker-controlled Redis configs pointing at a writable tmp-dir module) are one of the most common `unauthenticated-Redis -> RCE` chains exploited by 2024 H2Miner / Kinsing / Muhstik cryptomining botnets."
    regex: "(?:redis-cli\\s+[^\\n]*MODULE\\s+LOAD|MODULE\\s+LOAD\\s+['\"]?/[^'\"\\s]+\\.so|loadmodule\\s+['\"]?/[^'\"\\s]+\\.so|community\\.general\\.redis[\\s\\S]{0,300}?command\\s*:\\s*['\"]?MODULE\\s+LOAD)"
    positive_examples:
      - "redis-cli MODULE LOAD"
    multiline: true
    recommendation: "Remove the `MODULE LOAD` task entirely and audit the target Redis for unauthorised modules: `redis-cli MODULE LIST` - anything not matching your allowlist is an incident. Set `enable-module-command no` in `redis.conf` (Redis 7.0+) to disable the command entirely. Bind Redis to loopback / private network only, require `requirepass <strong>` + `aclfile /etc/redis/users.acl`, and run with `rename-command MODULE \"\"` for defence-in-depth. For legitimate modules, install from the distro package manager only, pin the module hash in the playbook, and load via a read-only `redis.conf` built into the image rather than runtime `MODULE LOAD`."
    cwe: ['CWE-78', 'CWE-94', 'CWE-427']
