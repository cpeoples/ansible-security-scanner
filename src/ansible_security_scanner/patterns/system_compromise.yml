  - id: "kernel_yama_ptrace_scope_disabled"
    category: "system_compromise"
    severity: "HIGH"
    title: "kernel.yama.ptrace_scope Set To 0 (Cross-Process Memory Read Enabled)"
    description: "A task sets `kernel.yama.ptrace_scope = 0` in sysctl / sysctl.d / /proc, which DISABLES the YAMA LSM's ptrace restriction and allows ANY process owned by a user to `PTRACE_ATTACH` ANY other process of the same user - including gpg-agent, ssh-agent, browsers holding session cookies, 1Password CLI, and keyring daemons. Default since Ubuntu 10.10, Fedora, RHEL 8+ is `1` (child-only). Dropping to `0` is the exact post-exploitation step used by Pegasus/Predator droppers, APT41, and the 2024 xz backdoor research to dump credential caches from long-lived session agents without root. No legitimate production workload needs scope=0."
    regex: "(?:kernel\\.yama\\.ptrace_scope|yama/ptrace_scope)[\\s\\S]{0,80}?(?:value|content|line|[:=])\\s*[:=]?\\s*[\"']?0\\b"
    positive_examples:
      - |2-
        kernel.yama.ptrace_scope: 1
                  net.ipv4.ip_forward: 0
    multiline: true
    window: 6
    recommendation: "Keep the distro default: `kernel.yama.ptrace_scope = 1` (child-only) for general fleets, `2` (admin-only, requires CAP_SYS_PTRACE) for PCI/HIPAA-scoped hosts, `3` (no ptrace at all) for kiosks / single-app servers. Persist via `/etc/sysctl.d/10-ptrace.conf` and validate at boot via a CIS-baseline Ansible task. If a legitimate debugger needs scope=0 TEMPORARILY, gate it behind a `tags: dev-only` role and never ship it to staging/prod."
