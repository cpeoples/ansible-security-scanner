    cis_controls: ['CIS-8.2', 'CIS-8.3']
    nist_controls: ['AU-4', 'AU-5', 'AU-9']
    pci_dss: ['10.2.1', '10.3.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "lsm_apparmor_selinux_runtime_permissive"
    category: "system_compromise"
    severity: "HIGH"
    title: "SELinux setenforce 0 / AppArmor aa-complain Applied At Runtime (LSM Downgrade)"
    description: "A task runs `setenforce 0` (SELinux runtime -> permissive), `setsebool` with `-N` on a security-critical boolean, `aa-complain /etc/apparmor.d/usr.sbin.*`, `aa-disable`, or `apparmor_parser -R` on a loaded profile. Distinct from the existing `selinux_disabled` rule (which catches `/etc/selinux/config SELINUX=disabled` requiring reboot) - this catches the runtime downgrade that persists until next boot WITHOUT changing any on-disk config, making it a stealth primitive. Used in Sandfly Security's 2024 Linux-rootkit research as the step between 'got shell' and 'drop kernel module'."
    regex: "(?:ansible\\.builtin\\.)?(?:shell|command|raw)\\s*:[^\\n]{0,200}?(?:setenforce\\s+(?:0|Permissive)|aa-(?:complain|disable)\\s+[^\\n]+|apparmor_parser\\s+-R\\s+[^\\n]+|setsebool\\s+[^\\n]*?-N\\s+[a-z_]+\\s+(?:off|0|false))|setenforce\\s+(?:0|Permissive)\\b|aa-complain\\s+/etc/apparmor\\.d/"
    positive_examples:
      - "command: /usr/sbin/setenforce 0"
    multiline: true
    window: 8
    recommendation: "Never runtime-downgrade MAC (Mandatory Access Control). If SELinux breaks a legitimate app, FIX the policy: `audit2allow -M mymodule -i /var/log/audit/audit.log`, then `semodule -i mymodule.pp` - enforcing mode stays on. For AppArmor, profile adjustments go in `/etc/apparmor.d/local/<name>` (local customization) and are reloaded via `apparmor_parser -r`, not disabled. If a break-glass is genuinely needed, scope to a single binary via `permissive <type>` (SELinux) or `complain` on ONE profile (AppArmor) - never disable the entire LSM. Alert on runtime-mode-change events: auditd `-a always,exit -F arch=b64 -S setxattr -F key=MAC_status_change`."
    cwe: ['CWE-284', 'CWE-693', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V12.4.1"]
    mitre_attack: ['T1068', 'T1562.001', 'T1562.004']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-10.5']
    nist_controls: ['AC-3', 'AC-6', 'CM-7']
    pci_dss: ['2.2.1', '7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC7.1']

  - id: "mokutil_secure_boot_disabled_or_sbat_bypass"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "mokutil --disable-validation / sb-state Disable Or SBAT Bypass (Pre-OS Root Of Trust Broken)"
    description: "A task runs `mokutil --disable-validation`, `mokutil --sb-state off`, `sbctl disable-secureboot`, or writes a MokList entry that enrolls an attacker-controllable key (e.g. `mokutil --import /path/to/<attacker>.der`). Disabling Secure Boot at the shim layer allows arbitrary unsigned EFI binaries (bootkits) to execute pre-OS with DMA-capable access to memory. The 2023 BlackLotus UEFI bootkit, 2024 CosmicStrand, and 2024 Pikabot-EFI specifically require this step as persistence. Enterprise fleets that disable Secure Boot for driver-signing workarounds (NVIDIA, VirtualBox) create the exact window attackers exploit. Distinct from BIOS-level Secure Boot settings (firmware-managed) - this catches the OS-initiated shim/MokList bypass via mokutil."
    regex: "(?:mokutil\\s+(?:--disable-validation|--sb-state\\s+(?:off|disabled)|--import\\s+[^\\n]+\\.(?:der|cer)\\b)|sbctl\\s+disable-secureboot|efibootmgr\\s+[^\\n]*?-c\\s+[^\\n]*?(?:/EFI/[^/\\s]+/\\S*\\.efi)(?!.*--verify)|dbxtool\\s+--force-clear)"
    positive_examples:
      - "mokutil --disable-validation"
    multiline: true
    window: 10
    recommendation: "Never disable Secure Boot on production hosts. For driver-signing workarounds, ENROLL your driver-signing cert via `mokutil --import <internal-ca>.der` (which adds to MokList WITHOUT disabling validation) + sign drivers with that cert. For NVIDIA/VMware-tools kernel modules, use the distro's pre-signed variant (`kmod-nvidia` from RPM Fusion for RHEL, `nvidia-dkms` with distro-signed kernel for Ubuntu), not an unsigned hand-compiled module. Maintain a SBAT revocation-policy baseline: `sbverify --list /boot/efi/EFI/*/shimx64.efi` should show a current-year SBAT policy. Audit: `mokutil --sb-state` must return `SecureBoot enabled`. Alert on `mokutil --disable-validation` or `sbctl disable-secureboot` via auditd `-w /usr/bin/mokutil -p x -k secure_boot` + centralize events."
    no_ansible_remediation: true
    cwe: ['CWE-347', 'CWE-347', 'CWE-1329']
    owasp_appsec: ["A02:2021"]
    mitre_attack: ['T1542.001', 'T1542.003', 'T1553.006']
    cis_controls: ['CIS-2.3', 'CIS-4.1', 'CIS-10.5']
    nist_controls: ['SA-12', 'SC-18', 'SI-7']
    pci_dss: ['2.2.1', '11.5.2']
    hipaa: ['164.308(a)(5)(ii)(B)']
    soc2: ['CC7.1', 'CC7.2']

  - id: "grub2_password_not_set_with_custom_kernel_entries"
    category: "system_compromise"
    severity: "HIGH"
    title: "GRUB2 Superuser/Password Missing With Custom Or Rescue Kernel Entry Defined"
    description: "A task renders `/etc/grub.d/40_custom` / `/etc/grub.d/41_custom` (custom GRUB entries) OR defines a rescue kernel entry in `/boot/grub2/user.cfg` WITHOUT also setting `set superusers=\"...\"` + `password_pbkdf2 <user> grub.pbkdf2.sha512.10000....`. Without a GRUB password, anyone with physical access (or a KVM / iLO / DRAC console) can boot the kernel with `init=/bin/bash` for an unauthenticated root shell - bypassing disk encryption unlock prompts that rely on the boot chain having been tamper-protected. CIS L1 for every Linux benchmark requires GRUB password protection. The custom-entry variant is specifically dangerous because custom entries often omit `${CLASS}` -> inherit no password restriction even if the default entry has one."
    regex: "(?:/etc/grub\\.d/(?:4[01]_custom|9[0-9]_custom)|/boot/grub2?/(?:user\\.cfg|custom\\.cfg)|GRUB_CUSTOM_ENTRIES)[\\s\\S]{0,1500}?menuentry\\s+['\"][^'\"]+['\"][\\s\\S]{0,1000}?linux(?:16|efi)?\\s+[^\\n]+(?![\\s\\S]{0,2000}?(?:set\\s+superusers|password_pbkdf2|password\\s+))"
    positive_examples:
      - "/etc/grub.d/40_custommenuentry 'x'linux x"
    multiline: true
    window: 60
    recommendation: "Set a GRUB password across ALL entries: 1) Generate PBKDF2 hash: `grub2-mkpasswd-pbkdf2` -> copy the `grub.pbkdf2.sha512.10000.<salt>.<hash>` value. 2) Add to `/etc/grub.d/01_users` (persistent): `set superusers=\"grubadmin\"` + `password_pbkdf2 grubadmin grub.pbkdf2.sha512.10000.XXX...`. 3) Regenerate: `grub2-mkconfig -o /boot/grub2/grub.cfg` (RHEL) or `update-grub` (Debian). 4) For custom entries that should be accessible WITHOUT password at boot but not edit, use `--unrestricted` flag on the `menuentry`. For highest assurance, combine with full-disk-encryption (LUKS) + TPM-backed unlock (Clevis + tang) so even physical-presence can't extract data. Enforce via CIS scan: `/etc/grub2.cfg` must contain `password_pbkdf2` and `/etc/grub.d/` entries must NOT have `--unrestricted` on rescue/emergency entries."
    no_ansible_remediation: true
    cwe: ['CWE-250', 'CWE-272', 'CWE-306']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.1.1", "V14.2.2"]
    mitre_attack: ['T1068', 'T1078.003', 'T1542.003']
    cis_controls: ['CIS-2.3', 'CIS-4.1', 'CIS-10.5']
    nist_controls: ['AC-3', 'IA-2', 'SI-7']
    pci_dss: ['2.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC7.1']

  - id: "firmware_update_service_disabled_fwupd_uefi_capsule"
    category: "system_compromise"
    severity: "MEDIUM"
    title: "fwupd / UEFI Capsule Update Service Disabled Or Masked (Firmware Patching Blocked)"
    description: "A task runs `systemctl mask fwupd` / `systemctl disable --now fwupd`, sets `DisabledPlugins=*` or `UpdateMotd=false` + `EnableUefiCapsuleUpdates=false` in `/etc/fwupd/fwupd.conf`, or removes the `fwupd-refresh.timer`. `fwupd` is the Linux mechanism that applies UEFI/BIOS/microcode capsule updates published via LVFS (Linux Vendor Firmware Service) - disabling it blocks every CPU microcode patch (including post-discovery Spectre/Meltdown/Retbleed/Inception/Downfall/Reptar class fixes) AND every UEFI firmware patch (BlackLotus, MoonBounce, CosmicStrand mitigations). Distinct from generic unattended-upgrades - this is the specific firmware-layer patching channel."
    regex: "(?:systemctl\\s+(?:mask|disable)\\s+[^\\n]*?fwupd(?:\\.service|-refresh\\.timer)?|fwupd\\.service[\\s\\S]{0,200}?state\\s*:\\s*['\"]?(?:stopped|masked|disabled)['\"]?|/etc/fwupd/fwupd\\.conf[\\s\\S]{0,500}?(?:DisabledPlugins\\s*=\\s*\\*|EnableUefiCapsuleUpdates\\s*=\\s*false|UpdateMotd\\s*=\\s*false)|EnableUefiCapsuleUpdates\\s*=\\s*false)"
    positive_examples:
      - "systemctl mask fwupd"
    multiline: true
    window: 15
    recommendation: "Keep fwupd running and weekly-scheduled: `systemctl enable --now fwupd-refresh.timer`. Refresh LVFS metadata: `fwupdmgr refresh --force` + auto-update eligible devices: `fwupdmgr update`. For air-gapped environments, pre-download firmware capsules via a DMZ staging host + transfer via signed channels + apply via `fwupdmgr install <capsule.cab>`. Opt into LVFS testing stream for early microcode patches: `fwupdmgr enable-remote lvfs-testing`. Do NOT disable `EnableUefiCapsuleUpdates` - this is the mechanism that applies Spectre/Meltdown/Retbleed microcode. For compliance, capture firmware inventory via `fwupdmgr get-devices --json` + ingest to CMDB. Alert on any playbook action that masks/disables fwupd."
    cwe: ['CWE-657', 'CWE-1104', 'CWE-1329']
    owasp_appsec: ["A04:2021", "A06:2021"]
    mitre_attack: ['T1542.001', 'T1562.001']
