  - id: "polkit_rule_world_allow_any_user"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "polkit Rule Installed In /etc/polkit-1/rules.d With polkit.Result.YES For Any User"
    description: "A task installs a `*.rules` file under `/etc/polkit-1/rules.d/` or `/usr/share/polkit-1/rules.d/` whose JavaScript body returns `polkit.Result.YES` for any subject/action without a proper subject check - e.g. `polkit.addRule(function(action,subject){ return polkit.Result.YES; })` or `if (subject.isInGroup('users')) return polkit.Result.YES`. polkit rules run with full authority to grant any `org.freedesktop.*` authorisation to any PID that satisfies the (attacker-controlled) JS predicate - this is the persistence primitive used in Pwnkit (CVE-2021-4034) post-exploit and in 2024 Linux-ransomware persistence (Kinsing, XorDDoS) to elevate cron-scheduled tasks to root without entering a password."
    regex: "(?:ansible\\.builtin\\.(?:copy|template|file)|lineinfile|blockinfile)[\\s\\S]{0,300}?(?:dest|path)\\s*:\\s*['\"]?(?:/etc/polkit-1/rules\\.d/|/usr/share/polkit-1/rules\\.d/)[^'\"\\n]*\\.rules['\"]?[\\s\\S]{0,2000}?polkit\\.(?:addRule|addAdminRule)[\\s\\S]{0,500}?polkit\\.Result\\.YES(?![\\s\\S]{0,200}(?:subject\\.user\\s*==\\s*['\"][a-z][a-z0-9_-]+['\"]|action\\.id\\.indexOf))"
    positive_examples:
      - "ansible.builtin.copydest:/etc/polkit-1/rules.d/.rulespolkit.addRulepolkit.Result.YES"
    multiline: true
    window: 120
    recommendation: "Never install custom polkit rules via Ansible. If legitimately required (specific service-account running specific action), the rule MUST: (1) check `subject.user` against an explicit allowlist of named users, (2) check `action.id` against an explicit allowlist of action IDs, (3) return `polkit.Result.AUTH_ADMIN_KEEP` not `YES` where possible. Audit existing rules: `find /etc/polkit-1/rules.d/ /usr/share/polkit-1/rules.d/ -name '*.rules' -exec grep -L 'subject.user' {} \\;` - any file without a `subject.user` check is suspect. Monitor for new `.rules` files via auditd: `-w /etc/polkit-1/rules.d/ -p wa -k polkit_persistence`."
