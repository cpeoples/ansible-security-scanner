  - id: "kernel_cmdline_mitigations_disabled_nopti_nosmep_nosmap"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Kernel Command Line Disables CPU Side-Channel Mitigations (nopti/nosmep/nosmap/nokaslr/mitigations=off)"
    description: "A task renders a bootloader config (`/etc/default/grub`, `/boot/loader/entries/*.conf`, `kernelopts` tuning, cloud-init `kernel_cmdline`) including `mitigations=off`, `nopti` (no page-table isolation -> Meltdown), `nosmep` (no Supervisor Mode Execution Prevention -> kernel exec-from-userland), `nosmap` (no Supervisor Mode Access Prevention -> kernel read/write userland freely), `nokaslr` (no kernel-address randomization -> ROP gadgets at fixed offsets), `nospectre_v1`/`nospectre_v2`, `noibrs`/`noibpb`/`nospec_store_bypass_disable`, or `spectre_v2=off`. Each of these knobs re-enables a hardware-class vulnerability that has a live in-the-wild exploit (Meltdown 2018, RetBleed 2022, Downfall 2023, Reptar 2023, GhostRace 2024). `mitigations=off` is the master switch used by perf-focused HPC and gaming communities - also by attackers who want their shellcode to work despite hardware defenses."
    regex: "(?:/etc/default/grub|GRUB_CMDLINE_LINUX(?:_DEFAULT)?|kernelopts|kernel_cmdline|/boot/loader/entries|linux[\\s\\\\t]+[^\\n]*?vmlinuz)[\\s\\S]{0,800}?\\b(?:mitigations=off|nopti|nosmep|nosmap|nokaslr|nospectre_v[12]|noibrs|noibpb|nospec_store_bypass_disable|spectre_v2=off|pti=off|spec_store_bypass_disable=off|l1tf=off|mds=off|tsx_async_abort=off)\\b|(?:^|\\s)(?:mitigations=off|nopti|nosmep|nosmap|spectre_v2=off)(?:\\s|$)"
    positive_examples:
      - "/etc/default/grub mitigations=off"
    multiline: true
    window: 15
    recommendation: "Never add CPU-mitigation-disabling flags to kernel cmdline. For performance-critical workloads, FIRST measure actual overhead (`perf stat` with + without mitigations) - typical impact is 2-8%, not the 30-50% some vendors claim. If specific mitigations demonstrably have unacceptable overhead for your workload (e.g. L1TF=full on a single-tenant host), disable ONLY that ONE and document the risk-acceptance in a security-exception register - never `mitigations=off` (which is a shotgun). For cloud workloads, upgrade instance type - newer Intel Ice Lake / AMD Zen 4 / Graviton3 have hardware-level fixes with near-zero performance cost. Validate: `grep -E 'mitigations|nopti|nosmep|nosmap' /proc/cmdline` must return nothing. Check `cat /sys/devices/system/cpu/vulnerabilities/*` - every file should show `Mitigation:` or `Not affected`, never `Vulnerable`."
    cwe: ['CWE-203', 'CWE-693', 'CWE-1037']
    mitre_attack: ['T1068', 'T1202', 'T1562.001']
    cis_controls: ['CIS-3.3', 'CIS-4.1', 'CIS-7.3']
    nist_controls: ['CM-6', 'SI-3', 'SI-7']
    pci_dss: ['6.3.3', '11.5.2']
    hipaa: ['164.308(a)(5)(ii)(B)']
    soc2: ['CC7.1', 'CC7.2']

  - id: "sshd_weak_hostkey_dsa_or_rsa_under_2048"
    category: "system_compromise"
    severity: "HIGH"
    title: "SSH HostKey Generated As DSA Or RSA < 2048 Bits (Weak Server Identity)"
    description: "A task runs `ssh-keygen -t dsa` (DSA is deprecated since 2015, removed from OpenSSH 9.8 in 2024), `ssh-keygen -t rsa -b 1024` / `-b 1536` (below NIST SP 800-131A minimum 2048), or writes a `HostKey` directive in `sshd_config` pointing at such a key. A weak host key lets an on-path attacker (with months of quantum-adversary compute, or in-the-wild today for RSA-1024 via dedicated hardware) forge the server's identity, defeating SSH's primary integrity guarantee. Distinct from `sshd_password_authentication_enabled` (user-authN) - this catches the server-identity weakness which affects EVERY session regardless of auth method."
    regex: "(?:ssh-keygen\\s+[^\\n]*?-t\\s+(?:dsa|DSA)\\b|ssh-keygen\\s+[^\\n]*?-t\\s+rsa\\s+[^\\n]*?-b\\s+(?:512|768|1024|1536)\\b|ssh-keygen\\s+[^\\n]*?-b\\s+(?:512|768|1024|1536)\\s+[^\\n]*?-t\\s+rsa|HostKey\\s+[^\\n]*?ssh_host_dsa_key|HostKeyAlgorithms\\s+[^\\n]*?ssh-dss\\b|PubkeyAcceptedAlgorithms\\s+[^\\n]*?ssh-dss\\b)"
    positive_examples:
      - "ssh-keygen -t dsa"
    multiline: true
    window: 8
    recommendation: "Generate modern host keys on every SSH server: `ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N ''` (primary - EdDSA 256-bit, immune to bad RNG, fixed-size signatures) + `ssh-keygen -t rsa -b 4096 -f /etc/ssh/ssh_host_rsa_key -N ''` (fallback for legacy clients). Delete any existing `ssh_host_dsa_key*` and `ssh_host_rsa_key*` below 4096 bits. Pin supported algorithms in `/etc/ssh/sshd_config`: `HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256` + `KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,sntrup761x25519-sha512@openssh.com` (post-quantum hybrid). Distribute host keys via SSHFP DNS records (DNSSEC-signed) or SSH Certificate Authority (`ssh-keygen -s ca -I host-cert` + `TrustedUserCAKeys`) so clients verify without TOFU. Audit: `ssh-keyscan <host> | ssh-keygen -l -f -` - reject anything with `(DSA)` or RSA < 4096."
    cwe: ['CWE-326', 'CWE-327', 'CWE-331']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: ["V6.2.1", "V6.2.3", "V6.2.5"]
    mitre_attack: ['T1021.004', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-4.8', 'CIS-12.6']
    nist_controls: ['SC-8', 'SC-12', 'SC-13']
    pci_dss: ['4.2.1', '8.3.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "byovd_known_vulnerable_kernel_driver_install"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "Bring Your Own Vulnerable Driver (BYOVD) - Known-Vulnerable Kernel Driver Load / Install"
    description: "A task copies, installs, or loads a known-vulnerable kernel driver via `win_copy`, `win_service`, `sc create`, `fltmc`, `sysdrv`, `/driver_load`, `NtLoadDriver`, or systemd modprobe: `RTCore64.sys` (MSI Afterburner, CVE-2019-16098), `procexp152.sys` (Process Explorer, PrintNightmare pivot), `iqvw64e.sys` (Intel, CVE-2015-2291), `gdrv.sys` (Gigabyte, CVE-2018-19320), `dbutil_2_3.sys` (Dell, CVE-2021-21551), `mhyprot2.sys` (Genshin anti-cheat), `capcom.sys` (Capcom), `atillk64.sys` (ATI), `agent64.sys` (Avast), `trufos.sys` (Bitdefender), `asIO.sys` (ASUS), `viragt64.sys` (OpenLibSys / OpenHardwareMonitor), `kprocesshacker.sys`. These signed-but-vulnerable drivers are the #1 primitive for disabling EDR/AV in 2023-2024 ransomware operations (LockBit 3.0 BYOVD disabler `EDRSandBlast`, `TrueSightKiller`, `Terminator`, `BadMatter`). Microsoft maintains a public vulnerable-driver blocklist that is NOT enabled by default on older Windows; detection here catches the deployment step."
    regex: "\\b(?:RTCore64|procexp152|procexp|iqvw64e|gdrv|dbutil_2_3|dbutil|mhyprot2|capcom|atillk64|asIO|agent64|trufos|viragt64|kprocesshacker|amifldrv64|advmon64|BS_Hwio64|ntiolib|asrdrv10|asrdrv101|GLCKIO2|gmer|gmer64|navdefender|pcimem|piddrv64|renesas|speedfan|stdcdrv64|wnt|msi-util|msio64|truesight|terminator|gigabyte\\.sys|gigbyte|vulndrv|koutech-sys|taskkilldrv)\\.sys\\b|CVE-(?:2019-16098|2015-2291|2018-19320|2021-21551|2022-36991|2022-38623|2023-38544)\\b|(?:NtLoadDriver|StartService|sc\\s+create|fltmc|fltMC)[\\s\\S]{0,400}?\\b(?:RTCore64|procexp152|dbutil|mhyprot|gdrv|iqvw)\\.sys|\\\\drivers\\\\(?:RTCore64|procexp152|dbutil|mhyprot|iqvw|gdrv|agent64|capcom|viragt64)\\.sys"
    positive_examples:
      - "RTCore64.sys"
    multiline: true
    window: 10
    recommendation: "Enable Microsoft's **vulnerable driver blocklist** on every Windows host: `Windows Security -> Device Security -> Core Isolation -> Microsoft Vulnerable Driver Blocklist = On`. For Windows 10/11/Server 2022, this blocks the Microsoft-curated list of ~300 known-abusive drivers at kernel load time via Windows Defender Application Control (WDAC). For older hosts (Win Server 2019 and earlier), deploy the blocklist manually via WDAC policy XML (Microsoft publishes the reference XML at https://github.com/MicrosoftDocs/windows-itpro-docs). Combine with: **HVCI** (Hypervisor-enforced Code Integrity) to prevent attacker-loaded unsigned drivers at all, **Smart App Control** (Win 11 22H2+), and EDR behavioral detection for driver-load anomalies. For Linux, enable kernel lockdown: `kernel.lockdown=confidentiality` via `/sys/kernel/security/lockdown` and sign all modules with a locally-held MOK (machine owner key). Audit installed kernel drivers periodically: `fltmc instances` (Windows filter drivers), `driverquery /v` (Windows), `lsmod` (Linux) + cross-reference against vulnerable-driver databases (`loldrivers.io`). Alert on NEW driver loads via Sysmon Event ID 6 (DriverLoad) + correlate with the `loldrivers.io` feed in SIEM."
    no_ansible_remediation: true
    cwe: ['CWE-94', 'CWE-829', 'CWE-1357']
    cve: ["CVE-2015-2291", "CVE-2018-19320", "CVE-2019-16098", "CVE-2021-21551"]
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: ["V10.3.1", "V10.3.2"]
    mitre_attack: ['T1014', 'T1068', 'T1562.001']
    cis_controls: ['CIS-2.7', 'CIS-10.5', 'CIS-10.7']
    nist_controls: ['CM-7', 'SI-3', 'SI-7']
    pci_dss: ['5.2.1', '6.3.3', '11.5.2']
    hipaa: ['164.308(a)(5)(ii)(B)', '164.312(c)(1)']
    soc2: ['CC7.1', 'CC7.2']

  - id: "dll_search_order_hijack_drop_into_system_or_program_files"
    category: "system_compromise"
    severity: "HIGH"
    title: "DLL Search-Order / Side-Loading Hijack - DLL Dropped Into System32 Or Program Files App Directory"
    description: "A task writes / copies a `.dll` or `.ocx` file via `win_copy`, `win_file`, `copy`, `fetch`, or `ansible.windows.win_copy` to a Windows DLL search-order location: `C:\\Windows\\System32\\`, `C:\\Windows\\SysWOW64\\`, `C:\\Windows\\` (root), the current directory of a running service (`C:\\Program Files\\<vendor>\\<app>\\`), or user profile directories where trusted apps search (`%AppData%\\Microsoft\\Office\\`, `%LocalAppData%\\Microsoft\\Teams\\current\\`, `%ProgramData%\\Microsoft\\Windows\\Start Menu\\`). Windows' DLL search order (Known DLLs -> System -> 16-bit System -> Windows -> Current -> PATH) is well-documented; an attacker drops a DLL with a name the target application LoadLibrary's without a full path (e.g. `version.dll`, `wininet.dll`, `secur32.dll`, `propsys.dll`, `oci.dll`) and the app loads the attacker's copy on next startup - executing attacker code with the APP's privileges. MITRE T1574.001. Sysinternals 'Process Monitor' filtered on `NAME NOT FOUND` on `.dll` loads still shows dozens of hijackable locations on every fresh Windows install in 2024."
    regex: "(?:win_copy|ansible\\.windows\\.win_copy|copy|ansible\\.builtin\\.copy|win_get_url|get_url|fetch)[\\s\\S]{0,600}?(?:dest|path)\\s*[:=]\\s*['\"]?[^'\"\\n]*?(?:C:\\\\Windows\\\\System32\\\\|C:\\\\Windows\\\\SysWOW64\\\\|C:\\\\Windows\\\\(?![Ss]ystem32)[^\\\\\\n]{0,40}?\\\\?\\s*$|C:\\\\Program\\s+Files(?:\\s+\\(x86\\))?\\\\[^\\n\"']+\\\\|%(?:AppData|LocalAppData|ProgramData)%\\\\[^'\"\\n]+?\\\\|AppData\\\\(?:Roaming|Local)\\\\Microsoft\\\\(?:Office|Teams|OneDrive)\\\\[^'\"\\n]*?)[^'\"\\n]*?\\.(?:dll|ocx)['\"]?|(?:dest|path)\\s*[:=]\\s*['\"]?[A-Z]:\\\\Windows\\\\(?:System32|SysWOW64)\\\\[^'\"\\n]{0,40}?\\.dll['\"]?|dll_side[-_]load|\\.dll'?\\s+.*(?:LoadLibrary(?:Ex)?|LoadPackagedLibrary)|(?:src|path|source)\\s*[:=]\\s*['\"]?[^'\"\\n]*?\\\\(?:version|wininet|secur32|propsys|oci|crypt32|cryptbase|dwmapi|uxtheme|shell32|rpcrt4|winmm|dnsapi)\\.dll"
    positive_examples:
      - 'win_copydest:C:\Windows\System32\.dll'
    multiline: true
    window: 12
    recommendation: "Never write DLLs into Windows system directories or application Program Files directories via Ansible unless absolutely necessary, and ONLY from a signed, hash-verified source. Use the vendor's official installer/updater where possible (MSI with signed catalog, WinGet, Chocolatey signed package). If a custom DLL replacement IS required: (1) verify the DLL's Authenticode signature with `Get-AuthenticodeSignature <file>.dll` before deployment, (2) write to a dedicated vendor directory (`C:\\Program Files\\<YourCompany>\\<app>\\`) with NTFS deny-write for non-Administrators, (3) set `CWDIllegalInDllSearch` policy (Windows 8+) to `0xFFFFFFFF` to remove the current directory from DLL search, (4) enable **Safe DLL Search Mode** (`HKLM\\System\\CurrentControlSet\\Control\\Session Manager\\SafeDllSearchMode = 1`, default on Win10+), (5) use explicit LoadLibraryEx with `LOAD_LIBRARY_SEARCH_SYSTEM32` flag in your own code. Detect hijack attempts: Sysmon Event ID 7 (ImageLoaded) where `SignatureStatus != Valid` or `Signed = false` - this single rule catches nearly every DLL-hijack. Enforce WDAC with a user-mode code integrity policy in Audit or Enforce mode. Audit: Sysinternals `Process Monitor` filtered `Operation is Load Image` + `Path contains .dll` + `Signed is False` - any match is suspicious."
    cwe: ['CWE-426', 'CWE-427', 'CWE-732']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: ["V12.4.1"]
    mitre_attack: ['T1543.003', 'T1574.001', 'T1574.002']
    cis_controls: ['CIS-2.7', 'CIS-10.5', 'CIS-16.4']
    nist_controls: ['CM-5', 'SI-3', 'SI-7']
    pci_dss: ['5.2.1', '6.3.3']
    hipaa: ['164.308(a)(5)(ii)(B)', '164.312(c)(1)']
    soc2: ['CC7.1', 'CC7.2']

  - id: "macos_gatekeeper_and_sip_tamper_playbook_executed"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "macOS Gatekeeper globally disabled (spctl --master-disable / --global-disable)"
    description: "A task executes `spctl --master-disable` or `spctl --global-disable` (macOS 14+ syntax) on a macOS host. This globally disables Gatekeeper - the OS-level check that every executable is signed by an Apple-notarized developer ID. With Gatekeeper off, any unsigned or malware-signed binary runs without warning, Quarantine attributes are ignored, and the 2020+ Apple notarization chain is bypassed entirely. This is the #1 macOS post-compromise action in the 2024 Mandiant M-Trends report (North-Korean BeaverTail, Charming-Kitten, and APT38 all use it)."
    regex: "(?:ansible\\.builtin\\.command|ansible\\.builtin\\.shell|command|shell|raw)\\s*:[\\s\\S]{0,400}?spctl\\s+(?:--master-disable|--global-disable|-m\\s+disable)|cmd\\s*:\\s*['\"]?[^'\"\\n]*spctl\\s+--(?:master|global)-disable"
    positive_examples:
      - "ansible.builtin.command:spctl --master-disable"
    multiline: true
    window: 6
    recommendation: "Never disable Gatekeeper. If a specific app legitimately can't be notarized (internal tooling only), sign it with a Developer ID and notarize via `xcrun notarytool submit` - then it runs with Gatekeeper enabled. For dev-environment exceptions, use `spctl --add --label 'DevTooling' /path/to/app` to allow a specific path WITHOUT disabling globally. Enforce Gatekeeper state via MDM (Jamf `Restrictions` -> `Gatekeeper: App Store and identified developers`). Audit: `spctl --status` should return `assessments enabled` on every managed Mac. Monitor for the disable action via `log stream --predicate 'subsystem == \"com.apple.syspolicy\"'` and alert on any occurrence."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1553.001', 'T1562.001', 'T1562.010']
    cis_controls: ['CIS-10.1', 'CIS-10.2', 'CIS-10.5']
    nist_controls: ['CM-7', 'SI-3', 'SI-7']
    pci_dss: ['5.2.1', '5.3.3']
    hipaa: ['164.308(a)(5)(ii)(B)']
    soc2: ['CC7.1', 'CC7.2']

  - id: "macos_system_integrity_protection_disabled_csrutil"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "macOS System Integrity Protection (SIP) disabled via csrutil disable"
    description: "A task executes `csrutil disable`, `csrutil authenticated-root disable`, or `nvram boot-args=\"rootless=0\"` - disabling System Integrity Protection (SIP), the kernel-enforced protection that prevents ANY process (including root) from modifying `/System`, `/usr` (except `/usr/local`), `/bin`, `/sbin`, Apple-signed kexts, or the boot environment. With SIP off, rootkits can install unsigned kernel extensions, modify the dyld shared cache to inject into every process, and persist across OS upgrades. `csrutil` can only run from Recovery Mode - any task that attempts it from a running macOS is a (non-functional) indicator of intent; any task that reboots to Recovery and runs it is actively subverting the OS security model."
    regex: "(?:ansible\\.builtin\\.command|ansible\\.builtin\\.shell|command|shell|raw)\\s*:[\\s\\S]{0,400}?(?:csrutil\\s+(?:disable|authenticated-root\\s+disable)|nvram\\s+boot-args\\s*=\\s*['\"][^'\"]*rootless=0)|cmd\\s*:\\s*['\"]?[^'\"\\n]*(?:csrutil\\s+(?:disable|authenticated-root\\s+disable)|boot-args.*rootless=0)"
    positive_examples:
      - "ansible.builtin.command:csrutil disable"
    multiline: true
    window: 6
    recommendation: "Never disable SIP on a production or user-facing Mac. For the extremely rare case a dev tool requires SIP-off (low-level kernel research, legacy kext development), isolate it to a DEDICATED test Mac that is not on the production network and holds no production data. Enforce SIP-enabled via MDM and alert on any disabled status (`csrutil status` should return `System Integrity Protection status: enabled.` - anything else is a P0 incident). For legitimate kext needs, use the new System Extensions framework (Network, Endpoint Security, DriverKit) which works with SIP enabled. Audit on boot via a LaunchDaemon that invokes `csrutil status` and ships the result to SIEM. Treat `csrutil disable` as equivalent to `rm -rf / --no-preserve-root` for incident-response purposes."
    no_ansible_remediation: true
    cwe: ['CWE-250', 'CWE-693']
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1014', 'T1562.001']
    cis_controls: ['CIS-4.8', 'CIS-10.2', 'CIS-10.5']
    nist_controls: ['AC-6', 'CM-7', 'SI-7']
    pci_dss: ['2.2.1', '5.2.1', '6.3.3']
    hipaa: ['164.308(a)(5)(ii)(B)', '164.312(c)(1)']
    soc2: ['CC6.1', 'CC7.1']
