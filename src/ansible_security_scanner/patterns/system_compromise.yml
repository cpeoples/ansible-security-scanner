  - id: "kernel_modules_disabled_flipped_off_then_modprobe"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "kernel.modules_disabled Flipped Off Then modprobe Executed (LKM Rootkit Load Primitive)"
    description: "A playbook sets `kernel.modules_disabled = 0` (or runs `echo 0 > /proc/sys/kernel/modules_disabled`) and in the same file runs `modprobe <module>` / `insmod`. On hardened hosts `modules_disabled=1` is the one-way lockdown that prevents any further module loads for the lifetime of the boot - flipping it back to `0` before loading a module is a classic pre-stage for LKM rootkits (Diamorphine, Reptile, bedevil) and happens in the 2024 DragonRank / Mélofée Linux-persistence chains."
    regex: "(?:kernel\\.modules_disabled\\s*=\\s*0|/proc/sys/kernel/modules_disabled[\\s\\S]{0,120}?(?:content|line)\\s*[:=]?\\s*[\"']?0)[\\s\\S]{0,800}?(?:modprobe|insmod)\\s+[A-Za-z0-9_/.-]+"
    positive_examples:
      - "kernel.modules_disabled=0modprobe A"
    multiline: true
    window: 40
    recommendation: "Never flip `kernel.modules_disabled` back to 0 in a playbook - the whole point of this one-way sysctl is that it cannot be un-set without a reboot, giving you a forensic signal. If the host legitimately needs a new module at run-time, load it via `/etc/modules-load.d/*.conf` early in boot BEFORE lockdown takes effect. For reactive runs, reboot the host into a maintenance window with `modules_disabled=0`, load the module with Secure-Boot-signed `kmod-*` packages, and immediately re-apply `modules_disabled=1`. Add auditd `-w /proc/sys/kernel/modules_disabled -p wa -k modules_lockdown_flip`."
    cwe: ['CWE-250', 'CWE-284', 'CWE-506']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1014', 'T1547.006', 'T1562.001']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-10.5']
    nist_controls: ['AC-6', 'CM-7', 'SI-7']
    pci_dss: ['2.2.1', '11.5.1']
    hipaa: ['164.312(c)(1)']
