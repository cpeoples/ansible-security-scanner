  - id: "openssh_regresshion_vulnerable_install"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "OpenSSH Installed/Pinned At Version Vulnerable To regreSSHion (CVE-2024-6387)"
    description: "A task installs or pins `openssh-server` / `openssh` at a version in the vulnerable range (glibc-based Linux, `OpenSSH 8.5p1` through `9.7p1` inclusive, plus the reintroduced regression that affects `4.4p1` through `8.5p1` without the backported fix) AND sets `LoginGraceTime` to a non-zero default (120 sec), OR fails to pin `>= 9.8p1`. CVE-2024-6387 (Qualys, Jul 2024) is an unauthenticated race-condition -> pre-auth RCE as root on glibc Linux; every unpatched sshd listening on the internet is a one-packet takeover. The default debian/RHEL packages lagged the upstream patch by ~1-2 weeks, so version-pinned playbooks written in that window still install vulnerable sshd."
    regex: "(?:ansible\\.builtin\\.(?:package|apt|dnf|yum))[\\s\\S]{0,300}?name\\s*:\\s*['\"]?openssh(?:-server|-clients)?['\"]?[\\s\\S]{0,300}?(?:version|state)\\s*:\\s*['\"]?(?:(?:8\\.(?:[5-9])|9\\.[0-7])(?:p[0-9])?|present|latest)(?![\\s\\S]{0,400}LoginGraceTime\\s*[:=]\\s*0\\b)"
    positive_examples:
      - "ansible.builtin.packagename:opensshversion:8.5"
    multiline: true
    window: 30
    recommendation: "Pin `openssh-server >= 9.8p1` (upstream regreSSHion fix, Jul 1 2024). On distros that have not yet released 9.8p1 in their stable channel, apply the one-line mitigation in `/etc/ssh/sshd_config`: `LoginGraceTime 0` (disables the vulnerable timer -> SIGALRM race). Verify with `ssh -V` and re-check after every kernel / glibc update. Monitor for exploitation indicators via auditd on `/usr/sbin/sshd` SIGALRM delivery + Falco rule `ssh_brute_force_with_alarm`. Restrict sshd to management subnets via `AllowUsers`, `Match Address`, and a fail2ban jail with a narrow `findtime`."
    cwe: ['CWE-362', 'CWE-364', 'CWE-787']
