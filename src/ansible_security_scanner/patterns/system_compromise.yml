  - id: "kexec_load_hot_patch_persistence"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "kexec Used To Load Arbitrary Kernel (Boot-Chain Persistence / SecureBoot Bypass Primitive)"
    description: "A task runs `kexec -l <kernel>`, `kexec --load`, or `kexec_load(2)` with an `--initrd` / `--append` argument - especially from a playbook that does not describe a legitimate live-kernel-patch rollout (kpatch / livepatch). `kexec` loads a new kernel image directly into memory and (via `kexec -e`) transfers control without a full BIOS/UEFI boot - this BYPASSES Secure Boot signature verification, persists across reboots as long as the kexec-loaded kernel stays resident, and leaves no trace in `/boot` / UEFI firmware logs. The 2024 UNC5221 / Velvet Ant Linux-persistence campaigns use `kexec` to swap the running kernel for an attacker-controlled variant with a rootkit pre-installed."
    regex: "(?:kexec\\s+(?:-l|--load)\\s+[^\\s]+|kexec_load\\s*\\(|ansible\\.builtin\\.command\\s*:\\s*['\"]?kexec\\s+-l|ansible\\.builtin\\.shell[\\s\\S]{0,200}?kexec\\s+-l)(?![\\s\\S]{0,500}(?:kpatch|livepatch|kdump))"
    positive_examples:
      - "kexec -l x"
    multiline: true
    window: 20
    recommendation: "Remove the `kexec` task unless it is part of a documented kdump / crash-capture flow. For legitimate live kernel patching use `kpatch` (RHEL/CentOS), `livepatch` (Ubuntu Pro), or `kGraft` (SLES) - all of which are signed, audited, and preserve Secure Boot chain. Disable kexec_load host-wide if not needed: `echo 1 > /proc/sys/kernel/kexec_load_disabled` (one-way until reboot), persistent via `kernel.kexec_load_disabled=1` in sysctl. On kernels built with `CONFIG_KEXEC_SIG=y`, require signed kernel images: `kernel.kexec_image_verify_sig=1`. Monitor kexec invocations via auditd: `-a always,exit -F arch=b64 -S kexec_load,kexec_file_load -k kexec_use`."
    cwe: ['CWE-250', 'CWE-345', 'CWE-506']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1014', 'T1542.003', 'T1547']
