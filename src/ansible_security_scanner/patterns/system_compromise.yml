  - id: "mysql_grant_file_privilege"
    category: "system_compromise"
    severity: "HIGH"
    title: "MySQL GRANT FILE Privilege (Arbitrary File Read/Write Primitive)"
    description: "A task runs `GRANT FILE ON *.* TO '<user>'@'%'` (or `community.mysql.mysql_user` with `priv: '*.*:FILE'`). The FILE privilege lets the grantee use `SELECT ... INTO OUTFILE`, `LOAD DATA INFILE`, and `LOAD_FILE()` - giving arbitrary file read/write as the `mysqld` process user across any path `mysqld` has filesystem access to. This is THE classic MySQL privesc-to-RCE primitive: read `/etc/shadow`, write a webshell into the document root, or plant a UDF library in the plugin dir (`plugin_dir`) to load as `CREATE FUNCTION ... SONAME`."
    regex: "(?:GRANT\\s+FILE\\s+ON\\s+\\*\\.\\*\\s+TO\\s+['\"][^'\"]+['\"]|community\\.mysql\\.mysql_user[\\s\\S]{0,200}?priv\\s*:\\s*['\"]?[^'\"]*?\\*\\.\\*\\s*:\\s*[^'\"]*?\\bFILE\\b)"
    positive_examples:
      - "GRANT FILE ON *.* TO 'x'"
    multiline: true
    window: 8
    recommendation: "Never grant FILE to application users. If a specific import/export job legitimately needs file I/O, create a dedicated MySQL user restricted to `secure_file_priv` directory: `SET GLOBAL secure_file_priv = '/var/lib/mysql-files/'`, `GRANT FILE ON *.* TO 'etl_user'@'127.0.0.1'` + connection-restricted to loopback. Revoke from existing users: `REVOKE FILE ON *.* FROM '<user>'@'%'`. Audit with `SELECT User, Host, File_priv FROM mysql.user WHERE File_priv='Y'` - every row is a review-required escalation."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V12.4.1", "V14.2.2"]
    mitre_attack: ['T1059', 'T1068', 'T1078.003']
    cis_controls: ['CIS-3.3', 'CIS-6.8', 'CIS-16.5']
    nist_controls: ['AC-6', 'AC-6(1)', 'AC-6(5)']
    pci_dss: ['7.2.1', '7.2.2', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "postgres_alter_role_superuser"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "PostgreSQL ALTER ROLE WITH SUPERUSER (Unrestricted Cluster Takeover)"
    description: "A task runs `ALTER ROLE <user> WITH SUPERUSER`, `CREATE ROLE <user> WITH SUPERUSER`, or `community.postgresql.postgresql_user` with `role_attr_flags: SUPERUSER`. A Postgres SUPERUSER bypasses ALL permission checks, can execute `COPY TO PROGRAM 'shell-cmd'` (RCE as the postgres UNIX user), load arbitrary C extensions, read/write any file via `pg_read_server_files`, and change `pg_hba.conf` at runtime. The rule fires even on first grant - there's never a legitimate reason to elevate an application role to SUPERUSER in a CI/CD playbook."
    regex: "(?:(?:ALTER|CREATE)\\s+(?:ROLE|USER)\\s+[\"']?[a-zA-Z_][a-zA-Z0-9_]*[\"']?\\s+(?:WITH\\s+)?[^;]*?\\bSUPERUSER\\b|community\\.postgresql\\.postgresql_user[\\s\\S]{0,300}?role_attr_flags\\s*:\\s*['\"][^'\"]*?SUPERUSER[^'\"]*['\"])"
    positive_examples:
      - "ALTER ROLE a SUPERUSER"
    multiline: true
    window: 10
    recommendation: "Use role inheritance with targeted privileges instead of SUPERUSER. For DBA automation, grant specific attributes (`CREATEROLE`, `CREATEDB`, `REPLICATION`) as needed - not the nuclear SUPERUSER bundle. For `COPY` / `pg_read_server_files` specifically, grant `pg_read_server_files` / `pg_write_server_files` predefined roles (Postgres 11+) which are narrower. Audit existing superusers: `SELECT rolname FROM pg_roles WHERE rolsuper = true` - should only contain the `postgres` bootstrap account. Revoke via `ALTER ROLE <user> NOSUPERUSER`. Require dual-control (two DBAs) for any `CREATE ROLE ... SUPERUSER`."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V12.4.1", "V14.2.2"]
    mitre_attack: ['T1059', 'T1068', 'T1078.003']
