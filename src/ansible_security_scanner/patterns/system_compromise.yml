  - id: "postgres_untrusted_language_extension_created"
    category: "system_compromise"
    severity: "CRITICAL"
    title: "PostgreSQL CREATE EXTENSION plpython3u / plperlu / pltclu (OS Code Execution Primitive)"
    description: "A task runs `CREATE EXTENSION plpython3u`, `CREATE EXTENSION plperlu`, `CREATE EXTENSION pltclu`, `CREATE EXTENSION plsh`, or `community.postgresql.postgresql_ext` with one of those extensions. The `u` (untrusted) variants run with unrestricted access to the underlying OS as the `postgres` UNIX user - any function defined `LANGUAGE plpython3u` can `os.system('/bin/sh -c <cmd>')`. This is the standard PG-to-RCE pivot used in every Postgres CTF and in real-world attacks post-SQLi."
