  - id: "auditd_rules_flushed_auditctl_D"
    category: "system_compromise"
    severity: "HIGH"
    title: "auditctl -D Flushes All Audit Rules (Blind-The-EDR Primitive)"
    description: "A task runs `auditctl -D` - which DELETES every loaded audit rule in-place without rewriting `/etc/audit/rules.d/*` - leaving the kernel audit subsystem running but with zero match rules. All syscalls, file watches, and exec events stop generating audit records until a reload. This is the canonical quiet-the-EDR step used by TeamTNT, Kinsing, Perfctl, and the 2024 SandStrike Linux implant - distinct from `auditctl -e 0` (which disables audit entirely) because the audit service appears healthy in `systemctl status auditd` and `service auditd status`, while producing zero events. The existing `audit_disable` rule only catches `-e 0`; this one catches the silent-flush variant."
    regex: "(?:ansible\\.builtin\\.)?(?:shell|command|raw)\\s*:[^\\n]{0,200}?auditctl\\s+[^\\n]*?-D\\b|auditctl\\s+-D(?:\\s|$)"
    positive_examples:
      - "shell:auditctl -D"
    multiline: true
    window: 6
    recommendation: "Never `auditctl -D` in a playbook. Manage audit rules declaratively by writing to `/etc/audit/rules.d/<name>.rules` and invoking `augenrules --load` (which PRESERVES non-overlapping rule-set files). For a full replacement, use `ansible.builtin.template` -> `/etc/audit/rules.d/zz-baseline.rules` with `notify: reload auditd`. Add an immutable marker `-e 2` at the END of the ruleset so the audit config cannot be modified until reboot - any playbook needing `auditctl -D` after `-e 2` is an immediate alert. Audit with `auditctl -l` (list rules) + `auditctl -s` (show config) - alert when the rule count drops unexpectedly between consecutive CMDB inventory snapshots."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-693', 'CWE-778']
    owasp_appsec: ["A01:2021", "A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-8.2', 'CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-6', 'AU-9', 'SI-4']
