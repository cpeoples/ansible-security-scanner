    multiline: true
    window: 8
    recommendation: "Use the TRUSTED `plpython3` (no `u` suffix - PG 13+) / `plperl` / `pltcl` variants which run in a sandboxed interpreter without direct OS access. If OS-level integration is truly required, move it OUT of the database into a separate service (e.g. trigger a message on a queue consumed by a sandboxed worker). Remove existing untrusted extensions: `DROP EXTENSION plpython3u CASCADE`. Restrict extension creation to the `postgres` role only: `REVOKE CREATE ON DATABASE <db> FROM PUBLIC` (default in PG 15+). Audit with `SELECT extname FROM pg_extension WHERE extname IN ('plpython3u','plperlu','pltclu','plsh')` - every row is a review-required backdoor."
    cwe: ['CWE-78', 'CWE-94', 'CWE-829']
