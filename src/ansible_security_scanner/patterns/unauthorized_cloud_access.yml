  - id: "aws_lambda_function_url_auth_type_none"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS Lambda Function URL AuthType=NONE (Unauthenticated Public Invoke)"
    description: "A task creates a Lambda Function URL (`aws_lambda_function_url` Terraform, `aws lambda create-function-url-config`, `community.aws.lambda_function_url`) with `AuthType: NONE` / `authorization_type: NONE`. A Function URL with `AuthType=NONE` is a public HTTPS endpoint - ANY internet client can invoke the Lambda with zero authentication. The function runs with its execution-role permissions, which often include DB access, secrets retrieval, and cross-service invoke. 2024 Wiz + Orca cloud-research reports consistently find unintended public Function URLs in >15% of scanned AWS orgs. Lambda Function URLs were GA in 2022; this misconfig is a post-2022 footgun (there's no equivalent in API Gateway - AuthType=NONE is Function-URL-specific)."
    regex: "(?:aws_lambda_function_url|aws\\s+lambda\\s+create-function-url-config|community\\.aws\\.lambda_function_url|amazon\\.aws\\.lambda_function_url)[\\s\\S]{0,600}?(?:authorization_type|AuthType|--auth-type)\\s*[:= ]\\s*['\"]?NONE['\"]?|(?:authorization_type|AuthType)\\s*[:=]\\s*['\"]?NONE['\"]?[\\s\\S]{0,500}?(?:function_url|FunctionUrlConfig|lambda_function_url)"
    positive_examples:
      - "aws_lambda_function_urlauthorization_type:NONE"
    multiline: true
    window: 25
    recommendation: "Set `AuthType: AWS_IAM` for every Function URL - this requires the caller to present SigV4-signed requests with an IAM principal that has `lambda:InvokeFunctionUrl`. For public APIs, use API Gateway with a Cognito/Lambda authorizer instead of Function URL with AuthType=NONE - it provides rate-limiting, request-validation, WAF integration, and better audit trail. For internal cross-account invoke, use Lambda Invoke API (not Function URL) + resource-based policy with specific principals. If you MUST have unauthenticated public access (e.g. webhook receiver), add AWS WAF in front + strict request validation + DLQ/throttling + X-Ray for post-hoc forensics. Enforce via SCP: `lambda:CreateFunctionUrlConfig` / `lambda:UpdateFunctionUrlConfig` denied when `lambda:FunctionUrlAuthType=NONE`. Audit: `aws lambda list-function-url-configs --function-name <fn> --query 'FunctionUrlConfigs[?AuthType==\\`NONE\\`]'`."
    cwe: ['CWE-284', 'CWE-306', 'CWE-862']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1078.004', 'T1133', 'T1190']
