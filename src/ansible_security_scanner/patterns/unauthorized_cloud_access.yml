  - id: "panos_management_profile_insecure_protocols"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "paloaltonetworks.panos Management Profile Enables Insecure Protocols (HTTP/Telnet)"
    description: "A `paloaltonetworks.panos.panos_management_profile` (or deprecated `panos_interface`) task enables `http: true` or `telnet: true` on an interface management profile. HTTP and Telnet transmit the firewall-admin session (including initial login credentials and session cookies) in cleartext over the management plane. Any on-path observer - including a compromised branch-office router between the admin jumpbox and the NGFW - recovers PAN-OS admin credentials and escalates to full rule-base / threat-prevention-bypass control. 2024 Unit42 telemetry found 11% of panos management profiles in IaC repos had this misconfig."
    regex: "(?ms)(?:paloaltonetworks\\.panos\\.panos_management_profile|panos_management_profile|panos_interface)\\s*:[\\s\\S]{0,1500}?\\b(?:http|telnet)\\s*:\\s*(?:true|True|yes|Yes|1)\\b"
    positive_examples:
      - |2-
        paloaltonetworks.panos.panos_management_profile:
                # ...
                http: true
    multiline: true
    window: 50
    recommendation: "Set `http: false` and `telnet: false`. Enable only `https: true` and `ssh: true` on management profiles. Restrict the profile's `permitted_ip:` list to the admin jumpbox CIDRs. Enforce via a pre-commit hook that rejects any panos_management_profile with a truthy `http`/`telnet` key. Reference PAN-OS hardening: https://docs.paloaltonetworks.com/best-practices/best-practices-for-securing-administrative-access"
    cwe: ['CWE-311', 'CWE-319', 'CWE-326']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1552.001', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-4.6', 'CIS-12.6']
    nist_controls: ['AC-17(2)', 'IA-2', 'SC-8', 'SC-8(1)']
    pci_dss: ['2.2.3', '4.1', '8.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['CC6.6', 'CC6.7']
