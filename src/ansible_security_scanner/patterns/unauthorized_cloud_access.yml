  - id: "azure_storage_connection_string_embedded_in_playbook"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Azure Storage account connection string with embedded AccountKey"
    description: "A task hard-codes an Azure Storage connection string of the form `DefaultEndpointsProtocol=...;AccountName=...;AccountKey=...;EndpointSuffix=core.windows.net` - this is the full storage-account master key (base64-encoded 64-byte symmetric secret) granting full read/write/delete on every container + file-share + queue + table in the account. Leaked connection strings are the #1 cause of Azure-related breaches in the 2024 Microsoft Digital Defense Report (e.g. T-Mobile API key leak, numerous Shodan-exposed `web.config`/`application.properties`). Matches both Ansible `ansible.builtin.set_fact`/`vars` and embedded CI/CD snippets."
    regex: "DefaultEndpointsProtocol\\s*=\\s*https?\\s*;\\s*AccountName\\s*=\\s*[a-z0-9]{3,24}\\s*;\\s*AccountKey\\s*=\\s*[A-Za-z0-9+/]{86,88}={0,2}(?:\\s*;\\s*EndpointSuffix\\s*=\\s*[a-z0-9.]+)?|AccountKey\\s*=\\s*[A-Za-z0-9+/]{86,88}={0,2}\\s*;\\s*EndpointSuffix\\s*=\\s*core\\.(?:windows|chinacloudapi|cloudapi\\.de|usgovcloudapi)\\.net"
    positive_examples:
      - "DefaultEndpointsProtocol=http;AccountName=aaa;AccountKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    recommendation: "Never embed Storage connection strings. Use Managed Identity + Entra ID RBAC (`Storage Blob Data Contributor`, scoped to the specific container) - no secrets live on disk. For external systems that truly need key-based auth, store the connection string in Azure Key Vault and fetch at runtime via Managed Identity; rotate both `key1` and `key2` at least every 90 days using automated key rotation. If a key is ever committed to git, push a new commit removing it, ROTATE BOTH KEYS IMMEDIATELY (the previous key does not expire on its own), and audit every request in storage diagnostic logs from the commit date forward for unexpected IPs / user-agents. Enable Microsoft Defender for Storage (malware scanning + sensitive-data threat detection) and storage-account firewall with selected-network or private-endpoint access only."
    cwe: ['CWE-312', 'CWE-522', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
