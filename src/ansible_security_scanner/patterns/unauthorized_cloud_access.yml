  - id: "gcp_wif_provider_empty_attribute_condition"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "GCP Workload Identity Federation Provider With Empty Or Wildcard attribute_condition"
    description: "A task creates a Workload Identity Pool Provider (`gcloud iam workload-identity-pools providers create-oidc`, `google_iam_workload_identity_pool_provider`) with `--attribute-condition` empty, missing, or matching `.*`/`true` - and no `--allowed-audiences` narrowing. Without an attribute condition, ANY OIDC token signed by the configured issuer (e.g. `https://token.actions.githubusercontent.com`) is accepted - meaning every GitHub Actions workflow in every public repo on the internet can impersonate your GCP service account. This is the 2023 `token.actions.githubusercontent.com` / 2024 GitLab WIF misuse CVE class."
    regex: "(?:gcloud\\s+iam\\s+workload-identity-pools\\s+providers\\s+create-oidc|google_iam_workload_identity_pool_provider)[\\s\\S]{0,800}?(?:issuer-uri|issuer_uri)\\s*[:=]\\s*['\"]?https?://[^'\"\\s]+(?![\\s\\S]{0,2000}(?:attribute-condition\\s*[:=]\\s*['\"]?\\S+[=!<>]|attribute_condition\\s*[:=]\\s*['\"]?\\S+[=!<>]))"
