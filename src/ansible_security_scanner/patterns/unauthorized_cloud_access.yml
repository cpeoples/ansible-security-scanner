  - id: "gcp_service_account_key_created_user_managed"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "GCP user-managed service account key (long-lived JSON key) created"
    description: "A task creates a user-managed service account key via `gcloud iam service-accounts keys create`, `google.cloud.gcp_iam_service_account_key`, or direct REST `projects.serviceAccounts.keys.create`. User-managed SA keys are long-lived (no expiry by default), rarely rotated, and are the most common root-cause of GCP breaches per Google Cloud Threat Intelligence H2-2024 (33% of incidents). The December 2023 Storm-0558 postmortem + 2024 Volexity reports on GCP-hosted SaaS breaches both traced back to leaked SA key JSON in public git. GCP's own Organization Policy `iam.disableServiceAccountKeyCreation` is now enabled by default for new projects since Q2 2024."
    regex: "(?:gcloud\\s+iam\\s+service-accounts\\s+keys\\s+create\\b|google\\.cloud\\.gcp_iam_service_account_key\\b|google\\.cloud\\.gcp_serviceaccount_key\\b|iam/v1/projects/[^/]+/serviceAccounts/[^/]+/keys(?::create|\\?)|gcp_service_account_key_file\\s*[:=]|type\\s*[:=]\\s*['\"]?service_account['\"]?[\\s\\S]{0,200}?private_key\\s*[:=]\\s*['\"]?-----BEGIN PRIVATE KEY-----)"
    positive_examples:
      - |2-
        redirect: google.cloud.gcp_iam_service_account_key
            gcp_kms_crypto_key:
    multiline: true
    window: 8
    recommendation: "Prefer Workload Identity Federation (for workloads outside GCP - GitHub Actions, AWS, on-prem, Azure) or Workload Identity (for GKE) over user-managed keys - both issue short-lived credentials via OIDC/SAML with no long-lived secret. If you absolutely must use an SA key, enable org policy `iam.disableServiceAccountKeyCreation` scoped to folders where it's not needed, set `iam.serviceAccountKeyExpiry` to ≤ 90 days via Key Access Justifications, store the JSON in Secret Manager (never in git), and rotate quarterly via `gcloud iam service-accounts keys create ... --rotate` + delete-old workflow. Detect existing keys with the `gcloud iam service-accounts keys list --managed-by=user` command and the Recommender API `google.iam.serviceAccountInsight`. Monitor for key usage anomalies with Cloud Audit Logs `serviceAccountKeyData.authenticate` and revoke on any foreign-IP hit."
    cwe: ['CWE-522', 'CWE-798', 'CWE-798']
