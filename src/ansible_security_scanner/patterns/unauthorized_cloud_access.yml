  - id: "panos_security_rule_src_any_and_dst_any"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "paloaltonetworks.panos Security Rule With source_ip: any AND destination_ip: any"
    description: "A `paloaltonetworks.panos.panos_security_rule` (or deprecated `panos_security_rule`) task declares both `source_ip: any` (or `['any']`) and `destination_ip: any`. A Palo Alto security rule with any/any/any semantics is effectively a permit-all rule regardless of application/service restrictions applied downstream - and worse, these rules are commonly placed *above* more-restrictive ones in the rulebase, short-circuiting them. This is the single most-exploited misconfiguration in on-prem -> cloud firewall migrations (cf. Palo Alto PAN-SA-2024-0012 advisory)."
    regex: "(?ms)(?:paloaltonetworks\\.panos\\.panos_security_rule|panos_security_rule)\\s*:[\\s\\S]{0,2500}?\\bsource_ip\\s*:\\s*(?:['\"]?any['\"]?|\\[\\s*['\"]?any['\"]?\\s*\\])[\\s\\S]{0,2500}?\\bdestination_ip\\s*:\\s*(?:['\"]?any['\"]?|\\[\\s*['\"]?any['\"]?\\s*\\])"
    multiline: true
    window: 100
    positive_examples:
      - |2
        - paloaltonetworks.panos.panos_security_rule:
            rule_name: allow-all
            source_zone: ["any"]
            source_ip: ["any"]
            destination_zone: ["any"]
            destination_ip: ["any"]
            application: ["any"]
            service: ["application-default"]
            action: "allow"
