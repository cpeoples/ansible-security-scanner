  - id: "gcp_compute_disk_without_cmek"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "GCP Compute Disk / Instance Disk Created Without Customer-Managed Encryption Key (CMEK)"
    description: "A `google.cloud.gcp_compute_disk` / `google.cloud.gcp_compute_instance` task creates a persistent disk without `disk_encryption_key:` referencing a Cloud KMS key (`kms_key_name:` or `kms_key_service_account:`) and without `source_image_encryption_key:`. Data at rest is still encrypted - but only with Google-managed keys (GMEK). The tenant has no ability to rotate the key on demand, revoke access during an incident, prove custody for compliance (PCI, HIPAA, FedRAMP Moderate/High), or cryptographically shred the disk."
    regex: "(?ms)google\\.cloud\\.gcp_compute_disk\\s*:\\s*\\n(?:(?!disk_encryption_key\\s*:|kms_key_name\\s*:)[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
