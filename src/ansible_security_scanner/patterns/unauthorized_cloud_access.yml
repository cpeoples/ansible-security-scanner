  - id: "aws_kms_key_policy_wildcard_principal"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS KMS Key Policy Grants kms:* Or Principal * On Resource *"
    description: "A task creates or updates a KMS key policy with `\"Principal\": \"*\"` (or `\"AWS\": \"*\"`) AND either `\"Action\": \"kms:*\"` or `\"Action\": \"kms:Decrypt\"` / `\"kms:GenerateDataKey\"` on `\"Resource\": \"*\"`. A wildcard-principal KMS key policy is the worst-case cloud-crypto finding: every encrypted-at-rest secret (EBS volumes, RDS snapshots, Secrets Manager, Parameter Store SecureStrings) keyed with that CMK is decryptable by any IAM principal in any account. This is the 2019 Capital One pattern repeated across every 2024 cloud-breach post-mortem."
    regex: "(?:aws_kms_key|amazon\\.aws\\.kms_key|community\\.aws\\.kms_key|kms\\.policy)[\\s\\S]{0,800}?\"Principal\"\\s*:\\s*\\{?\\s*(?:\"AWS\"\\s*:\\s*)?\"\\*\"[\\s\\S]{0,400}?\"Action\"\\s*:\\s*(?:\\[[^\\]]*\"(?:kms:\\*|kms:Decrypt|kms:GenerateDataKey)\"[^\\]]*\\]|\"(?:kms:\\*|kms:Decrypt|kms:GenerateDataKey)\")[\\s\\S]{0,200}?\"Resource\"\\s*:\\s*\"\\*\""
