  - id: "aws_eks_cluster_public_endpoint_access_cidr_open"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS EKS Cluster Public Endpoint Open to 0.0.0.0/0"
    description: "A `community.aws.eks_cluster` task sets `endpoint_public_access: true` AND `public_access_cidrs:` to either the default (which is `['0.0.0.0/0']`) or explicitly lists `0.0.0.0/0` / `::/0`. This exposes the Kubernetes API server - including `/api/v1/namespaces/*/secrets` reachable with any compromised kubeconfig - to the entire internet. Even with OIDC + IAM authentication enforced, the control-plane surface is attack-probeable 24/7 (think: CVE-2024-3400 style 0-days, upstream kube-apiserver bugs, audit-log-probe DoS). CIS EKS Benchmark 5.4.2."
