  - id: "samba_server_min_protocol_nt1_or_core"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Samba server min protocol Set To NT1 / CORE / LANMAN (SMBv1 Server Enabled)"
    description: "A task renders `/etc/samba/smb.conf` with `server min protocol = NT1`, `CORE`, `LANMAN1`, `LANMAN2`, or `COREPLUS`. This makes the Samba server accept SMBv1 connections - the same protocol that Windows hosts have been hardened against since 2017 (EternalBlue / WannaCry). Linux-Samba-hosted file shares running SMB1 are the primary pivot target in mixed Windows+Linux environments where Windows fleets are SMB1-disabled but Linux file servers are not. Modern Samba (4.11+) defaults to `SMB2_02` but legacy installs and Docker images (`dperson/samba`, `elswork/samba`) often keep SMB1 for 'compatibility'."
    regex: "(?:server\\s+min\\s+protocol|client\\s+min\\s+protocol)\\s*=\\s*(?:NT1|CORE|LANMAN1|LANMAN2|COREPLUS|SMB1)\\b"
    positive_examples:
      - "server min protocol=NT1"
    multiline: true
    window: 5
    recommendation: "Set `server min protocol = SMB2_10` (minimum), `SMB3_00` (recommended), or `SMB3_11` (strict) in `/etc/samba/smb.conf`. Also set `server max protocol = SMB3_11`, `server signing = mandatory`, `smb encrypt = required`. Reload: `smbcontrol smbd reload-config`. Disable guest access: `map to guest = Never`, `guest ok = no`. For legacy SMB1-only clients (old scanners/copiers), do NOT weaken the whole server - put the legacy client behind an SMB1 -> SMB3 proxy (e.g. a dedicated Windows-Print-Server VM) or replace the client. Validate: `smbclient -L //localhost -U%  --option='client min protocol = SMB1'` should FAIL on a hardened server."
    cwe: ['CWE-311', 'CWE-326', 'CWE-327']
    cve: ["CVE-2017-7494", "CVE-2017-0144"]
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1, V14.2.1, V12.2.1]
    mitre_attack: ['T1021.002', 'T1210', 'T1562.001']
