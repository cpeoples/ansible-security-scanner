    title: "Entra Conditional Access Policy Excludes All Users Or Broad Non-Breakglass Groups"
    description: "A task creates/updates an Entra ID Conditional Access policy (`New-MgIdentityConditionalAccessPolicy`, `az ad policy create`, or the Graph `POST /identity/conditionalAccess/policies`) whose `conditions.users.excludeUsers` contains `\"All\"`/`\"*\"`, OR whose `excludeGroups` contains more than the documented break-glass / emergency-access groups (`Emergency Access Accounts`, `Break Glass`). A CA policy that excludes all users (or an entire large group) renders MFA / risk-based / location-based controls moot for the excluded population - this is the canonical Storm-0558 / Midnight Blizzard 2023-2024 pivot (attacker-created CA exclusion to bypass MFA on the compromised service principal)."
