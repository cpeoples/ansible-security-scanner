  - id: "aws_ecs_taskdefinition_network_mode_not_awsvpc"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "ECS Task Definition Uses Non-Recommended network_mode (host/bridge/none)"
    description: "A `community.aws.ecs_taskdefinition` task sets `network_mode: host`, `network_mode: bridge`, or `network_mode: none`. AWS security baseline recommends `awsvpc` for ECS tasks because it gives each task its own ENI + security-group, enabling task-level network segmentation and IAM-per-task (task roles). `host` mode shares the EC2 instance's network namespace (no segmentation, breaks `awslogs` source-IP attribution), `bridge` uses the legacy Docker bridge (no SG-per-task), and `none` breaks service discovery. `host` mode specifically lets a container SSRF the instance metadata service (169.254.169.254) with IMDSv1 = instance-profile credentials, escalating task-level compromise to instance-level."
    regex: "(?ms)community\\.aws\\.ecs_taskdefinition\\s*:[\\s\\S]{0,1000}?network_mode\\s*:\\s*(?:host|bridge|none)\\b"
    multiline: true
    window: 60
    positive_examples:
      - |2
        - community.aws.ecs_taskdefinition:
            family: webapp
            network_mode: host
    recommendation: "Set `network_mode: awsvpc` on every ECS task definition, combined with a per-task security group scoped to the minimum required ingress (often: only ALB SG), and per-task IAM task role (NOT the instance profile) with a resource-scoped policy. For tasks that genuinely require host networking (high-throughput UDP, BPF programs), require an exception-review ticket and compensating controls (dedicated instance cluster, IMDSv2-required=true, no instance-profile beyond `ec2:DescribeInstances`). See https://docs.aws.amazon.com/AmazonECS/latest/bestpracticesguide/networking.html."
    cwe: ['CWE-668', 'CWE-693', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1040', 'T1210']
    cis_controls: ['CIS-12.2', 'CIS-13.3']
    nist_controls: ['AC-4', 'SC-7', 'SC-7(5)']
    pci_dss: ['1.2.1', '1.3.2']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "aws_ecs_service_assigns_public_ip"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "ECS Service Assigns Public IP (Task Exposed Directly to Internet)"
    description: "A `community.aws.ecs_service` task sets `network_configuration.assign_public_ip: ENABLED`, which attaches a public IPv4 to every task ENI. The task is directly reachable from the internet on whatever ports its security group permits, bypassing the ALB/NLB/private-subnet pattern that makes up the normal AWS ingress perimeter. This exposes container application vulnerabilities, unauthenticated admin endpoints (Prometheus, actuator/*, /debug/pprof), and leaked container secrets to the entire internet."
    regex: "(?ms)community\\.aws\\.ecs_service\\s*:[\\s\\S]{0,1500}?assign_public_ip\\s*:\\s*(?:ENABLED|enabled|True|true|yes|Yes)\\b"
    positive_examples:
      - |2-
        community.aws.ecs_service:
                  # ...
                  assign_public_ip: true
    multiline: true
    window: 60
    recommendation: "Set `assign_public_ip: DISABLED`, put the task ENIs in PRIVATE subnets, and ingress only via an ALB/NLB in PUBLIC subnets with a target-group to the task SG. For egress-only tasks (CI workers, build images), use a NAT gateway, not a public IP. If a task legitimately needs to be reachable (rare - almost always an ALB is correct), use `service_connect` / `Cloud Map` / API Gateway VPC Link, not direct task public IPs."
    cwe: ['CWE-201', 'CWE-285', 'CWE-668']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1133', 'T1190']
    cis_controls: ['CIS-12.2', 'CIS-13.3']
    nist_controls: ['AC-4', 'SC-7', 'SC-7(3)']
    pci_dss: ['1.2.1', '1.3.2', '1.3.4']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "aws_ecr_repository_policy_public"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "ECR Repository Policy Grants Principal '*' (Publicly Pullable Image)"
    description: "A `community.aws.ecs_ecr` task sets a repository `policy:` that contains `\"Principal\": \"*\"` (or `\"Principal\": {\"AWS\": \"*\"}`) with an Allow Effect and any of `ecr:BatchGetImage`, `ecr:GetDownloadUrlForLayer`, `ecr:DescribeImages`, or `ecr:*`. This publishes the image to the entire internet. Even if the image is \"public-facing\" by design, a public ECR repo leaks Dockerfiles, layer-hashes (used to identify installed CVE versions), embedded secrets (env-var ARG leaks), and the exact supply-chain of the application - a high-value recon primitive."
    regex: "(?ms)community\\.aws\\.ecs_ecr\\s*:[\\s\\S]{0,2000}?(?:\"Principal\"\\s*:\\s*\"\\*\"|Principal\\s*:\\s*['\"]?\\*['\"]?|\"AWS\"\\s*:\\s*\"\\*\")[\\s\\S]{0,800}?\"?ecr:(?:\\*|BatchGetImage|GetDownloadUrlForLayer|DescribeImages)"
    multiline: true
    window: 80
    positive_examples:
      - |2
        - community.aws.ecs_ecr:
            name: my-repo
            policy:
              Statement:
                - Effect: Allow
                  Principal: "*"
                  Action:
                    - ecr:GetDownloadUrlForLayer
    recommendation: "Never set `Principal: *` on an ECR repository policy. For cross-account pulls, list the specific AWS account IDs: `Principal: {AWS: [arn:aws:iam::111111111111:root]}` plus an explicit condition (`aws:SourceAccount`). For truly-public images, use ECR Public (`public.ecr.aws`), which has a separate permission model and is monitored for abuse by AWS. Audit with `aws ecr get-repository-policy` across every region + account; combine with `aws ecr describe-registry` to confirm the scanning and replication posture."
    cwe: ['CWE-200', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]
    mitre_attack: ['T1213', 'T1526']
    cis_controls: ['CIS-3.3', 'CIS-12.6']
    nist_controls: ['AC-3', 'AC-4', 'SI-4']
    pci_dss: ['1.3.4', '7.1.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "aws_s3_bucket_policy_principal_wildcard_with_write"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "S3 Bucket Policy Grants Principal '*' With Write/Delete (Publicly Writable Bucket)"
    description: "An `amazon.aws.s3_bucket` / `community.aws.s3_bucket_info` / `amazon.aws.s3_bucket_notification` task with `policy:` or a `community.aws.aws_s3_bucket_policy` task contains an Allow statement with `Principal: '*'` (or `Principal: {AWS: '*'}`) combined with any write-type action: `s3:PutObject`, `s3:PutObjectAcl`, `s3:DeleteObject`, `s3:DeleteObjectVersion`, `s3:PutBucketPolicy`, `s3:PutBucketAcl`, `s3:*`. This makes the bucket writable by any anonymous internet user - the exact configuration behind the 2017 Accenture, 2017 Verizon, 2019 Capital One (read path) and 2023 MOVEit (exfil path) incidents, and weaponised by ransomware groups that overwrite objects with `.encrypted` extensions."
    regex: "(?ms)(?:amazon\\.aws\\.s3_bucket|community\\.aws\\.s3_bucket_policy|community\\.aws\\.aws_s3_bucket_policy)\\s*:[\\s\\S]{0,3000}?(?:\"Principal\"\\s*:\\s*\"\\*\"|Principal\\s*:\\s*['\"]?\\*['\"]?|\"AWS\"\\s*:\\s*\"\\*\")[\\s\\S]{0,1500}?\"?s3:(?:\\*|PutObject(?:Acl)?|DeleteObject(?:Version)?|PutBucketPolicy|PutBucketAcl)"
    positive_examples:
      - 'amazon.aws.s3_bucket:"Principal":"*"s3:*'
    multiline: true
    window: 100
    recommendation: "Never grant `Principal: '*'` with write-type actions. For public-read static-website buckets, restrict to `s3:GetObject` only, pair with `aws:SecureTransport=true` condition, and enable S3 Block Public Access at the account level with `BlockPublicPolicy=true` to prevent accidental policy drift. For cross-account write, use explicit account ARNs + `aws:SourceAccount` + `aws:SourceArn` conditions. Enable `s3:ObjectLock` in compliance mode on buckets that cannot tolerate tampering. Run `aws s3api get-bucket-policy --bucket $B` + `aws s3api get-public-access-block --bucket $B` in a scheduled audit; alert via AWS Config rule `s3-bucket-public-write-prohibited`."
    cwe: ['CWE-284', 'CWE-285', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1485', 'T1537', 'T1567.002']
    cis_controls: ['CIS-3.3', 'CIS-3.12']
    nist_controls: ['AC-3', 'AC-6', 'SC-7']
    pci_dss: ['1.3.4', '7.1.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "aws_s3_bucket_without_server_side_encryption"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "S3 Bucket Created Without Server-Side Encryption (encryption: none or missing)"
    description: "An `amazon.aws.s3_bucket` task creates/manages a bucket with `encryption: 'none'`, or explicitly does not set `encryption:` while also not configuring default bucket encryption via `community.aws.s3_bucket_encryption` / `amazon.aws.s3_bucket_notification`. Without default SSE, objects PUT without an explicit `ServerSideEncryption` header land unencrypted; a leaked pre-signed URL or IAM compromise exposes cleartext data. AWS enabled default SSE-S3 for new buckets in Jan 2023 but Ansible playbooks that were written before that date (and run against OLD buckets) still toggle it off or leave it implicit."
    regex: "(?ms)amazon\\.aws\\.s3_bucket\\s*:[\\s\\S]{0,1500}?encryption\\s*:\\s*(?:['\"]?none['\"]?|['\"]?false['\"]?|['\"]?off['\"]?)\\b"
    positive_examples:
      - |2
            amazon.aws.s3_bucket:
              name: data-bucket
              encryption: 'none'
    multiline: true
    window: 50
    recommendation: "Set `encryption: AES256` (SSE-S3) as the baseline, or `encryption: aws:kms` with `encryption_key_id: arn:aws:kms:...` for regulated workloads. Add a bucket policy that denies `s3:PutObject` without the `x-amz-server-side-encryption` header: `Condition: { StringNotEquals: { 's3:x-amz-server-side-encryption': 'AES256' } }`. Enable `aws s3api put-bucket-encryption` with `BucketKeyEnabled=true` to reduce KMS costs. Enforce organisation-wide via SCP `aws:SourceVPC` + `aws:SecureTransport=true` + `s3:x-amz-server-side-encryption` required."
    cwe: ['CWE-311', 'CWE-312', 'CWE-319']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1213', 'T1530']
    cis_controls: ['CIS-3.11', 'CIS-14.8']
    nist_controls: ['MP-4', 'SC-28', 'SC-28(1)']
    pci_dss: ['3.4.1', '3.5.1']
    hipaa: ['164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "aws_s3_bucket_without_access_logging"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "S3 Bucket Created Without Access Logging (requesting_payer/logging Absent)"
    description: "An `amazon.aws.s3_bucket` task creates/manages a bucket without a `requester_pays:` + server access `logging:` target bucket, and no accompanying `community.aws.s3_logging` / CloudTrail data-event trail scoped to the bucket. Server access logs (or their modern replacement, CloudTrail S3 data events) are the PRIMARY forensic evidence for investigating object-level reads / writes / deletions after an incident; without them, determining what an attacker exfiltrated is impossible. This is regulatory table-stakes for HIPAA, PCI-DSS req 10, SOC 2 CC7.2,."
    regex: "(?ms)amazon\\.aws\\.s3_bucket\\s*:\\s*\\n(?:(?!logging\\s*:|requester_pays\\s*:)[\\s\\S]){0,1500}?(?:^\\s*name\\s*:|^\\s*state\\s*:\\s*present)(?:(?!logging\\s*:|requester_pays\\s*:|^\\s*- name:|^-\\s*name:)[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
        amazon.aws.s3_bucket:
                state: present
    multiline: true
    window: 60
    recommendation: "Enable S3 server access logging on every production bucket to a dedicated log-archive bucket (in a different account, ideally the log-archive account of the AWS Organization) with Object Lock in compliance mode. Alternatively, enable CloudTrail data events for the bucket (`aws cloudtrail put-event-selectors ... --data-resources S3`), which gives structured events and integrates with AWS Config/Security Hub. Enforce via AWS Config rule `s3-bucket-logging-enabled` + organisation SCP that denies `s3:PutBucketLogging` set to disabled. Ansible: add a `community.aws.s3_logging` task immediately after every `amazon.aws.s3_bucket` creation."
    cwe: ['CWE-223', 'CWE-532', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1530', 'T1562.008']
    cis_controls: ['CIS-3.14', 'CIS-8.2']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.7']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "aws_apigateway_method_authorization_none"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "API Gateway Method Without Authorization (authorization_type: NONE)"
    description: "A `community.aws.api_gateway` / `community.aws.aws_api_gateway` task (or a Swagger/OpenAPI-imported REST API) defines a method with `authorization_type: NONE` (or `AuthorizationType: NONE`). The endpoint is unauthenticated and reachable by any internet caller; combined with any sensitive downstream integration (Lambda, DynamoDB proxy, RDS Data API) this is a direct data-exposure or RCE pivot."
    regex: "(?ms)community\\.aws\\.(?:api_gateway|aws_api_gateway)\\s*:[\\s\\S]{0,3000}?(?:authorization_type|AuthorizationType)\\s*:\\s*['\"]?NONE['\"]?"
    positive_examples:
      - "community.aws.api_gateway:authorization_type:NONE"
    multiline: true
    window: 80
    recommendation: "Set `authorization_type: AWS_IAM` (for service-to-service calls, signed with SigV4), `COGNITO_USER_POOLS` (for end-user auth), `CUSTOM` (for Lambda authorizer), or `JWT` (HTTP API). For endpoints that genuinely must be public (e.g. `/health`, OAuth callback), scope them narrowly AND require a WAF rule + rate-limit + challenge on unusual patterns. Audit with `aws apigateway get-resources --rest-api-id $ID --query 'items[*].resourceMethods.*.authorizationType'`. Use AWS Config rule `api-gw-endpoint-type-check` and a custom rule for `AuthorizationType != NONE` enforcement."
    cwe: ['CWE-284', 'CWE-306', 'CWE-862']
