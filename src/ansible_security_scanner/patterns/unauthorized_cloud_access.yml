  - id: "gcp_compute_instance_full_cloud_api_scope"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "GCP Compute Instance with Full Cloud-API Scope (https://www.googleapis.com/auth/cloud-platform)"
    description: "A `google.cloud.gcp_compute_instance` / `google.cloud.gcp_compute_instance_template` task sets `service_accounts.scopes:` to include `https://www.googleapis.com/auth/cloud-platform` (or the aliases `cloud-platform` / `compute-rw,cloud-platform`). This grants the VM's attached service-account IAM permission to call ANY Google Cloud API the SA is authorized for - in effect making the VM metadata-server token a cluster-wide admin credential. Anyone who exploits the workload (SSRF, RCE, container escape) can `curl -s -H 'Metadata-Flavor: Google' http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token` and then call `gcloud storage cp gs://*` / `gcloud compute instances list` / `gcloud iam service-accounts keys create`."
