  - id: "vector_db_weaviate_qdrant_milvus_anonymous_or_empty_api_key"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Vector DB (Weaviate / Qdrant / Milvus / Chroma) Anonymous Access Enabled Or Empty API Key"
    description: "A task renders a vector-database config with authentication disabled: Weaviate `authentication.anonymous_access.enabled: true` (or missing `authentication.apikey.enabled: true`), Qdrant `service.api_key: \"\"` / unset with `service.http_port: 0.0.0.0`, Milvus `common.security.authorizationEnabled: false`, Chroma `CHROMA_SERVER_AUTHN_PROVIDER=\"\"` / unset. Vector databases hold embeddings generated from proprietary / PII-laden corpora (customer support transcripts, internal wikis, code bases, medical records) - unauth access allows (1) wholesale vector exfil (then inversion attacks to reconstruct near-original text per 2024 Google Research 'Stealing Part of a Production Language Model'), (2) collection enumeration for reconnaissance, (3) poisoning via `upsert` to corrupt RAG retrieval downstream of the DB. Shodan finds >5,000 unauthenticated Weaviate/Qdrant instances as of 2025."
    regex: "(?:authentication\\.anonymous_access\\.enabled\\s*:\\s*['\"]?true['\"]?|weaviate[\\s\\S]{0,500}?(?:AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED\\s*[:=]\\s*['\"]?true['\"]?|anonymous_access\\s*:\\s*\\{?\\s*enabled\\s*:\\s*true)|qdrant[\\s\\S]{0,400}?(?:api_key\\s*:\\s*['\"]?['\"]?\\s*$|api_key\\s*:\\s*(?:null|~|''|\"\"))|QDRANT__SERVICE__API_KEY\\s*[:=]\\s*['\"]?['\"]?\\s*$|common\\.security\\.authorizationEnabled\\s*:\\s*['\"]?false['\"]?|CHROMA_SERVER_AUTHN_PROVIDER\\s*[:=]\\s*['\"]?['\"]?\\s*$|milvus[\\s\\S]{0,500}?authorizationEnabled\\s*:\\s*false)"
    positive_examples:
      - "authentication.anonymous_access.enabled:true"
    multiline: true
    window: 15
    recommendation: "Enable authentication on every vector DB. Weaviate: set `AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=false` + `AUTHENTICATION_APIKEY_ENABLED=true` + `AUTHENTICATION_APIKEY_ALLOWED_KEYS=<from-vault>` + `AUTHORIZATION_ADMINLIST_ENABLED=true` + `AUTHORIZATION_ADMINLIST_USERS=admin@corp.example.com`. Qdrant: `service.api_key: <from-vault>` + enable TLS (`service.enable_tls: true`). Milvus: `common.security.authorizationEnabled: true` + rotate the default root credential immediately + set `userConfig.rootCoord.tls.enabled: true`. Chroma: `CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.basic_authn.BasicAuthenticationServerProvider` + `CHROMA_SERVER_AUTHN_CREDENTIALS_FILE=/etc/chroma/htpasswd`. For all: bind to 127.0.0.1 or a private k8s service + NetworkPolicy, NEVER 0.0.0.0 on a public-IP host. Audit: `curl -s http://<host>:<port>/v1/meta` (Weaviate), `/collections` (Qdrant) - any 2xx without auth is a finding. Rotate API keys + scrub collections if exposure confirmed."
    cwe: ['CWE-200', 'CWE-284', 'CWE-306']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V14.2.2]
    mitre_attack: ['T1133', 'T1190', 'T1530']
    cis_controls: ['CIS-3.3', 'CIS-4.7', 'CIS-14.4']
    nist_controls: ['IA-5', 'AC-3', 'IA-2', 'SC-28']
    pci_dss: ['2.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "mcp_model_context_protocol_server_no_auth_or_stdio_over_network"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "MCP (Model Context Protocol) Server Exposed Over Network With No Auth (Claude/Cursor Integration RCE)"
    description: "A task runs an MCP (Model Context Protocol - Anthropic 2024 / OpenAI 2025) server over SSE or HTTP transport, with `allow_unauthenticated: true`, `auth: none`, `MCP_SERVER_TRANSPORT=sse` + `MCP_SERVER_HOST=0.0.0.0` and no `MCP_AUTH_TOKEN`, OR with the stdio transport incorrectly exposed via an inetd / socat wrapper over TCP. MCP servers expose tools (often `run_shell`, `read_file`, `execute_sql`) that the LLM client calls - unauthenticated network-exposed MCP means anyone on the network can invoke those tools with the MCP process's privileges. The 2024-2025 tool-calling RCE class: an attacker prompts the exposed server with a crafted tool call. Unlike the LangChain `ShellTool` rule (caught by `langchain_shell_tool_unconstrained`), this targets the MCP server-config layer which is the 2025 attack surface for Claude Desktop, Cursor, Cline, Continue.dev, and OpenAI Responses integrations."
    regex: "(?:mcp[_-]?server|model[_-]?context[_-]?protocol|@modelcontextprotocol/)[\\s\\S]{0,600}?(?:MCP_AUTH_TOKEN\\s*[:=]\\s*['\"]?['\"]?\\s*$|allow_unauthenticated\\s*:\\s*['\"]?true['\"]?|auth\\s*:\\s*['\"]?none['\"]?|MCP_SERVER_TRANSPORT\\s*[:=]\\s*['\"]?(?:sse|http)['\"]?[\\s\\S]{0,300}?MCP_SERVER_HOST\\s*[:=]\\s*['\"]?(?:0\\.0\\.0\\.0|\\*)['\"]?(?![\\s\\S]{0,400}?MCP_AUTH_TOKEN\\s*[:=]\\s*['\"]?\\S)|socat\\s+[^\\n]+(?:TCP-LISTEN:|tcp-listen:)[^\\n]*?EXEC:[^\\n]*?(?:mcp|modelcontext))"
    positive_examples:
      - "mcpserverMCP_AUTH_TOKEN:"
    multiline: true
    window: 20
    recommendation: "Default to stdio transport for MCP (in-process, per-user) - the protocol was designed as a per-session local pipe, not a networked service. If you MUST use SSE/HTTP transport (e.g. remote LLM gateway), require authentication: set `MCP_AUTH_TOKEN` to a Vault-sourced high-entropy bearer + validate on every request + bind to `127.0.0.1` or a private k8s service + put an authenticating proxy in front (Authelia/Pomerium/Cloudflare Access with OIDC). Restrict TOOLS exposed: never expose `run_shell`, `execute_sql`, `write_file` over network MCP - scope to read-only + narrow-domain tools. Rate-limit per-caller + log every tool invocation with structured args to a SIEM. For multi-tenant MCP, use per-tenant secrets + audit trail. Review `.cursor/mcp.json`, `claude_desktop_config.json`, `continue/config.json` for any MCP server with a URL (not a local command) - those are network-exposed. Monitor: tcpdump + ja4 signature for MCP traffic on unexpected ports. For servers found vulnerable, rotate `MCP_AUTH_TOKEN` + audit tool-call history for unauthorized invocations."
    cwe: ['CWE-78', 'CWE-284', 'CWE-306']
    owasp_appsec: ["A01:2021", "A03:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1059', 'T1133', 'T1190']
    cis_controls: ['CIS-3.3', 'CIS-4.7', 'CIS-16.2']
    nist_controls: ['AC-3', 'IA-2', 'SC-7']
    pci_dss: ['2.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)']
    soc2: ['CC6.1', 'CC6.3']
    mitre_atlas: ['AML.T0049', 'AML.T0053', 'AML.T0050']

  - id: "cloudformation_rogue_iam_user_with_access_key_or_login_profile"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "CloudFormation / CDK / Terraform Template Creating IAM User With Access Keys Or Console Login Profile"
    description: "A task renders a CloudFormation template (or CDK output, or Terraform `aws_iam_user` resource inside a stack) that creates `AWS::IAM::User` + `AWS::IAM::AccessKey` in the same stack AND/OR sets `AWS::IAM::User` `LoginProfile` with a `Password` property OR attaches a managed policy like `AdministratorAccess` / `PowerUserAccess`. This is the classic 'attacker landed with one-time cred, deploys a stack, gets a persistent admin user with programmatic access keys' persistence technique - a cornerstone of 2021 CodeCov breach, 2022 LastPass breach, and 2023-2024 multiple Scattered Spider campaigns. Legitimate infrastructure-as-code should create IAM **roles** + **instance profiles** (short-lived, assumed, auditable), never IAM users with long-lived access keys. Detected by GuardDuty `PrivilegeEscalation:IAMUser/AnomalousPermissionChange` but often only after the damage is done."
    regex: "(?:AWS::IAM::User|aws_iam_user|iam_user)[\\s\\S]{0,1500}?(?:AWS::IAM::AccessKey|aws_iam_access_key|iam_access_key|LoginProfile|Password\\s*:|password\\s*[:=])|Type\\s*:\\s*AWS::IAM::User[\\s\\S]{0,2000}?(?:ManagedPolicyArns|managed_policy_arns)[\\s\\S]{0,300}?(?:AdministratorAccess|PowerUserAccess|IAMFullAccess)|(?:cloudformation|aws_cloudformation_stack|amazon\\.aws\\.cloudformation)[\\s\\S]{0,1000}?(?:AWS::IAM::User|AWS::IAM::AccessKey|LoginProfile)|iam_user\\s+[\"'][^\"']*[\"']\\s*\\{[\\s\\S]{0,500}?\\}[\\s\\S]{0,400}?iam_user_login_profile"
    positive_examples:
      - |2-
        iam_user:
                name: "{{ test_user }}"
                state: present
              register: iam_user
            - ansible.builtin.assert:
                that:
                  - iam_user is successful
                  - iam_user is changed

            # ==================================================================================

            - name: Fetch IAM key info (no keys)
              amazon.aws.iam_access_key
    multiline: true
    window: 40
    recommendation: "Never create IAM Users with access keys or LoginProfile via IaC. Use IAM Roles + short-lived STS credentials: `AWS::IAM::Role` with a trust policy for the specific service principal (`ec2.amazonaws.com`, `lambda.amazonaws.com`, `eks.amazonaws.com`) and attach via Instance Profile / ServiceAccount / Service Role. For cross-account access, use `AssumeRole` with `ExternalId` and a ≤1-hour session duration. For CI/CD access, use **GitHub OIDC** / **GitLab OIDC** / **AWS IAM Identity Center** - no long-lived keys ever. For users who MUST have programmatic access (legacy tools), enforce: access-key-rotation via `aws iam update-access-key --status Inactive` + new-key after 90 days, MFA via `aws:MultiFactorAuthPresent = true` condition in all IAM policies. Preventive control: AWS Organizations SCP denying `iam:CreateUser` + `iam:CreateAccessKey` + `iam:CreateLoginProfile` for all member accounts except break-glass. Detective: Config rule `iam-user-no-policies-check` + `iam-user-mfa-enabled` + CloudTrail Insight alerting on `CreateUser`. Audit: `aws iam list-users --query 'Users[?PasswordLastUsed==null]'` - any 'console-enabled-but-unused' user is suspicious."
    cwe: ['CWE-284', 'CWE-732', 'CWE-798']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1, V5.3.1]
    mitre_attack: ['T1078.004', 'T1098.001', 'T1136.003']
    cis_controls: ['CIS-3.3', 'CIS-5.2', 'CIS-6.7']
    nist_controls: ['IA-5', 'AC-2', 'AC-2(7)', 'AC-6']
    pci_dss: ['7.2.1', '8.2.1', '8.3.1']
    hipaa: ['164.308(a)(4)(ii)(B)', '164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.2', 'CC6.3']

  - id: "aws_ami_or_snapshot_public_share_launch_permission_all"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS AMI / EBS Snapshot / RDS Snapshot Shared Publicly (--launch-permission Group=all)"
    description: "A task runs `aws ec2 modify-image-attribute` with `--launch-permission 'Add=[{Group=all}]'`, `aws ec2 modify-snapshot-attribute` with `--create-volume-permission 'Add=[{Group=all}]'`, `aws rds modify-db-snapshot-attribute` with `--values-to-add '[\"all\"]'`, sets `launch_permission_users: ['all']` / `attribute: launchPermission` + `value: public` in `amazon.aws.ec2_ami` / `community.aws.ec2_ami_copy`, OR sets `public: true` on any AMI/snapshot resource. Public AMIs/snapshots are **world-readable** - any AWS account (including throwaway 4-digit test accounts) can copy them, mount the EBS volumes, and extract EVERYTHING the original instance had on disk: SSH host keys, service credentials, `.bash_history`, DB files, app source, Ansible Vault files. 2024 Wiz reports: ~50k public AMIs exist across AWS regions; ~15% contain long-lived credentials, RSA private keys, or customer data. Distinct from S3 public-bucket rules (this is EC2/EBS/RDS)."
    regex: "(?:ec2\\s+modify-image-attribute|ec2\\s+modify-snapshot-attribute|rds\\s+modify-db-snapshot-attribute|rds\\s+modify-db-cluster-snapshot-attribute|ec2_ami|ec2_snapshot|rds_snapshot)[\\s\\S]{0,800}?(?:--launch-permission|--create-volume-permission|--values-to-add|launch_permission|create_volume_permission|attribute_values)[\\s\\S]{0,400}?(?:Group\\s*[:=]\\s*['\"]?all['\"]?|['\"]all['\"](?:\\s*,|\\s*\\]|\\s*\\))|group\\s*[:=]\\s*['\"]?all['\"]?|\\{['\"]?Group['\"]?\\s*:\\s*['\"]all['\"]\\})|(?:amazon\\.aws\\.ec2_ami|community\\.aws\\.ec2_ami_copy|amazon\\.aws\\.ec2_snapshot)[\\s\\S]{0,500}?(?:launch_permissions|group_names|user_groups)[\\s\\S]{0,150}?['\"]?all['\"]?|attribute\\s*:\\s*['\"]?launchPermission['\"]?[\\s\\S]{0,300}?value\\s*:\\s*['\"]?(?:all|public)['\"]?"
    positive_examples:
      - |2-
        amazon.aws.ec2_ami:
                state: present
                image_id: "{{ result.image_id }}"
                description: "{{ ec2_ami_description }}"
                tags:
                  Name: "{{ ec2_ami_name }}_ami"
                launch_permissions:
                  group_names: [all
    multiline: true
    window: 20
    recommendation: "NEVER make AMIs, EBS snapshots, or RDS snapshots public. For legitimate cross-account sharing, share to **specific account IDs only**: `aws ec2 modify-image-attribute --image-id ami-xxx --launch-permission 'Add=[{UserId=\"123456789012\"}]'` (same for snapshots: `UserId` not `Group=all`). If a public AMI is legitimately required (open-source project's official image), pre-validate the AMI has ZERO sensitive contents via `aws ebs list-snapshot-blocks` + downstream scanning pipeline that checks for: SSH private keys, `.aws/credentials`, `.bash_history`, DB files, `shadow` file, Ansible Vault files - block publication if found. Organization-wide preventive control: AWS Organizations SCP denying `ec2:ModifyImageAttribute`, `ec2:ModifySnapshotAttribute`, `rds:ModifyDBSnapshotAttribute` when condition includes `Group=all` or `UserId=all`. Enable AWS Config rule `ec2-image-builder-public-ami` + `rds-snapshot-public-prohibited` + `ebs-snapshot-public-restorable-check`. Scan existing: `aws ec2 describe-images --owners self --executable-users all` + `aws ec2 describe-snapshots --owner-ids self --restorable-by-user-ids all` must return empty per-region. Un-publish any findings via the same modify-*-attribute commands with `Remove` instead of `Add`."
    cwe: ['CWE-200', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]
    mitre_attack: ['T1213', 'T1530', 'T1537']
    cis_controls: ['CIS-3.3', 'CIS-3.11', 'CIS-4.7']
    nist_controls: ['AC-3', 'AC-4', 'AC-24']
    pci_dss: ['1.4.1', '3.4.1', '7.2.1']
    hipaa: ['164.308(a)(4)(ii)(B)', '164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3', 'CC6.6']

  - id: "aws_iam_role_trust_wildcard_principal"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS IAM role trust policy uses wildcard principal (role assumable by any AWS account)"
    description: "A task renders an AWS IAM role trust policy (`AssumeRolePolicyDocument`) with `Principal: '*'`, `Principal: AWS: '*'`, or `Principal: { AWS: '*' }` and no `Condition` block narrowing the trust (no `aws:PrincipalOrgID`, no `aws:SourceAccount`, no `sts:ExternalId`). Any AWS account in the world can assume this role with the `AssumeRole` API. This is the canonical misconfiguration behind dozens of 2023-2024 cross-tenant data-exfiltration incidents (including the December 2023 CodeSpider chain and multiple bug-bounty disclosures against Fortune-500 tenants)."
    regex: "AssumeRolePolicyDocument[\\s\\S]{0,400}?Principal[\\s\\S]{0,200}?(?:AWS\\s*['\":=]\\s*['\"]\\*['\"]|['\":=]\\s*['\"]\\*['\"])(?![\\s\\S]{0,800}?(?:aws:PrincipalOrgID|aws:SourceAccount|aws:SourceArn|sts:ExternalId))|\"Principal\"\\s*:\\s*['\"]\\*['\"](?![\\s\\S]{0,800}?(?:aws:PrincipalOrgID|aws:SourceAccount|sts:ExternalId))"
    positive_examples:
      - "\"Principal\": \"*\""
    multiline: true
    window: 30
    recommendation: "Never set `Principal: '*'` in an IAM role trust policy. Scope to the minimum set of trusted principals: a specific AWS account ARN (`arn:aws:iam::123456789012:root`), a specific IAM role/user ARN, or a federated identity provider (OIDC/SAML). If cross-account access is genuinely required with a partner, use a `Condition` with `sts:ExternalId` (a random per-partner secret) AND `aws:SourceAccount` AND (for AWS Organizations) `aws:PrincipalOrgID`. Audit: `aws iam list-roles --query 'Roles[?contains(to_string(AssumeRolePolicyDocument), `\\\"*\\\"`)]'`. Enable AWS IAM Access Analyzer to surface public/cross-account role access continuously."
    cwe: ['CWE-269', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1078.004', 'T1199', 'T1550.001']
    cis_controls: ['CIS-3.3', 'CIS-6.8', 'CIS-16.12']
    nist_controls: ['AC-2', 'AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2', '8.3.1']
    hipaa: ['164.308(a)(4)(ii)(B)', '164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "aws_sts_assume_role_without_mfa_for_privileged_role"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS STS AssumeRole for privileged role without MFA condition (aws:MultiFactorAuthPresent)"
    description: "A task renders an IAM role trust policy for a privileged role (name matches `admin|root|break-glass|superuser|poweruser|poweradmin|billing|audit|iam-admin|security-admin` OR attached policies include `AdministratorAccess` / `IAMFullAccess`) without a `Condition` requiring `aws:MultiFactorAuthPresent: true` or `aws:MultiFactorAuthAge`. Static long-lived access keys assuming privileged roles without MFA is the top-reported exploitation path in the 2024 IBM X-Force Threat Intelligence Index for cloud breaches - a single leaked developer key can escalate to account-wide admin."
    regex: "(?:RoleName|role_name)\\s*[:=]\\s*['\"]?[^'\"\\n]*(?:admin|root|break[-_]?glass|superuser|power[-_]?(?:user|admin)|iam[-_]admin|security[-_]admin)[^'\"\\n]*['\"]?[\\s\\S]{0,1200}?AssumeRolePolicyDocument(?:(?!aws:MultiFactorAuthPresent|aws:MultiFactorAuthAge)[\\s\\S]){0,1200}Action[\\s\\S]{0,200}?sts:AssumeRole|ManagedPolicyArns[\\s\\S]{0,300}?(?:AdministratorAccess|IAMFullAccess)[\\s\\S]{0,1500}?AssumeRolePolicyDocument(?:(?!aws:MultiFactorAuthPresent)[\\s\\S]){0,1200}Action[\\s\\S]{0,200}?sts:AssumeRole"
    positive_examples:
      - "RoleName:adminAssumeRolePolicyDocumentActionsts:AssumeRole"
    multiline: true
    window: 80
    recommendation: "Require MFA on every privileged role trust policy: `Condition: { Bool: { 'aws:MultiFactorAuthPresent': 'true' }, NumericLessThan: { 'aws:MultiFactorAuthAge': '3600' } }`. For break-glass / emergency-access roles, require hardware MFA (`aws:MultiFactorAuthType: 'U2F'` or via SCP). Pair with `aws:PrincipalOrgID` to keep the trust within your organization. Eliminate long-lived IAM user access keys entirely - use IAM Identity Center (SSO) with short-lived credentials + MFA at the identity-provider layer. Audit: `aws iam generate-service-last-accessed-details` + AWS IAM Access Analyzer unused-access findings. Enable CloudTrail event-selector alerting on `sts:AssumeRole` calls without MFA for these role names."
    cwe: ['CWE-287', 'CWE-306', 'CWE-308']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1078.004', 'T1556.006', 'T1621']
    cis_controls: ['CIS-6.5', 'CIS-6.8']
    nist_controls: ['AC-6', 'IA-2(1)', 'IA-2(2)']
    pci_dss: ['8.3.1', '8.4.2', '8.5.1']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "azure_storage_sas_token_long_lived_or_over_privileged"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Azure Storage SAS token with long expiry or over-privileged permissions"
    description: "A task generates or embeds an Azure Storage SAS (Shared Access Signature) token with an expiry ≥ 7 days, with write/delete/permanent-delete permissions on an entire account/container, or without IP restriction - the 2023 Microsoft Storm-0558 and 2024 Midnight Blizzard intrusions both leveraged over-scoped SAS tokens for long-term data exfiltration because SAS tokens are bearer credentials that cannot be revoked without rotating the underlying storage account key. Matches `azure.azcollection.azure_rm_storageaccount_info`/`azure_rm_storageblob` with `sas_token`/`signed_expiry` > 7d, `az storage blob generate-sas --expiry` more than 7 days out, and signed-permissions strings (`sp=`) containing `racwdxltmeop` or `rwdlacup` on account SAS."
    regex: "(?:(?:sas_expiry|signed[_-]?expiry|--expiry)\\s*[:=]\\s*['\"]?20[2-9][0-9]-(?:1[0-2]|0[1-9])-[0-3][0-9]T[^'\"\\n,}\\]]*['\"]?|generate[-_]sas[\\s\\S]{0,200}?--expiry\\s+20[2-9][0-9]-(?:1[0-2]|0[1-9])-[0-3][0-9]|[?&]sv=20[12][0-9]-[0-9]{2}-[0-9]{2}&[^'\"\\s]*?sp=[racwdxltmeopfi]*[wdap][racwdxltmeopfi]*&[^'\"\\s]*?se=20[2-9][0-9]-(?:1[0-2]|0[1-9])-[0-3][0-9]|signed[_-]?permissions?\\s*[:=]\\s*['\"]?(?:racwdxltmeop|rwdlacup|rwdlacupx|racwdlup)['\"]?)"
    positive_examples:
      - "sas_expiry:2020-10-00T"
    multiline: true
    window: 8
    recommendation: "Issue SAS tokens for ≤ 1 hour whenever possible (never > 7 days), scope to a specific blob/path - NOT an entire container or account - with the minimum permissions required (usually read-only for consumers, write-only for upload endpoints). Pin source IP ranges via `signedIp`. Prefer User Delegation SAS (signed by an Entra ID principal, revocable by disabling the principal) over Account SAS. For automation, use Managed Identity + RBAC role assignments instead of SAS entirely. Enable storage-account diagnostic logging and alert on SAS-signed operations, unusual source IPs, or sudden spikes in anonymous-looking reads. If a long-lived SAS is ever leaked, you MUST rotate both `key1` and `key2` storage-account keys to invalidate it; there is no other revocation mechanism."
    cwe: ['CWE-522', 'CWE-613', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: [V13.2.1, V13.2.3, V13.3.1, V11.2.5]
    mitre_attack: ['T1078.004', 'T1537', 'T1552.001']
    cis_controls: ['CIS-3.3', 'CIS-6.5']
    nist_controls: ['AC-6', 'AC-12', 'IA-5']
    pci_dss: ['7.2.4', '8.3.9', '8.6.3']
