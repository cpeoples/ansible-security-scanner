    window: 50
    recommendation: "Always supply `disk_encryption_key: {kms_key_name: projects/<proj>/locations/<region>/keyRings/<ring>/cryptoKeys/<key>}` on every gcp_compute_disk / instance. Grant the `roles/cloudkms.cryptoKeyEncrypterDecrypter` role to the Compute Engine service-agent (`service-<PROJECT_NUM>@compute-system.iam.gserviceaccount.com`). Enable KMS key-rotation (e.g. `rotation_period: '7776000s'` = 90 days). Enforce org-wide with Organization Policy `constraints/gcp.restrictNonConfidentialComputing` and `constraints/compute.restrictXpnProjectLienRemoval`, plus the CIS-benchmark policy `gcp.resourceLocations`. Audit with `gcloud compute disks list --format=\"table(name, diskEncryptionKey.kmsKeyName)\"`."
    cwe: ['CWE-311', 'CWE-312', 'CWE-922']
    owasp_appsec: ["A01:2021", "A04:2021"]
