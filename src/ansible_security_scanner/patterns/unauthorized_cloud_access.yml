  - id: "nfs_export_no_root_squash_plus_rw"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "NFS Export Grants rw + no_root_squash (Remote Root On Exported Volume)"
    description: "A task renders `/etc/exports` (or equivalent nfs-ganesha config) with an export line containing BOTH `rw` AND `no_root_squash`. With `no_root_squash`, remote clients connecting as `uid=0` retain UID 0 on the server - directly combined with `rw`, any NFS client can write files as root into the exported tree, read everyone's `~/.ssh/id_rsa`, modify SUID binaries, and drop shells via `echo 'root::0:0:root:/root:/bin/bash' >> /etc/passwd`. The canonical lateral-movement primitive in flat-L2 datacenters where the NFS-server-to-client network is trusted but clients are not. Distinct from generic `nfs_export_open` findings - this specific combo is the direct RCE-as-root primitive."
    regex: "/etc/exports[\\s\\S]{0,1500}?(?:^|\\n)\\s*/\\S+\\s+[^\\n]*?\\([^)]*(?:\\brw\\b[^)]*\\bno_root_squash\\b|\\bno_root_squash\\b[^)]*\\brw\\b)|(?:^|\\n)\\s*/\\S+\\s+\\S+\\([^)]*(?:\\brw\\b[^)]*\\bno_root_squash\\b|\\bno_root_squash\\b[^)]*\\brw\\b)\\)"
    positive_examples:
      - |-
        /etc/exports 
         /0  ( rw no_root_squash
    multiline: true
    window: 10
    recommendation: "Never combine `rw` with `no_root_squash`. For an export that legitimately needs root-write (e.g. a backup target pulling from clients), use `rw,root_squash,all_squash,anonuid=<backup-uid>,anongid=<backup-gid>` - root on clients maps to a low-priv user on the server. Prefer `sec=krb5p` (Kerberos with privacy) over AUTH_SYS for any inter-host NFS - this cryptographically authenticates clients, making UID-spoofing impossible. For shared-compute HPC clusters that need root access to a scratch volume, export `rw,no_root_squash` to specific IP CIDRs only (never `*`), and put the NFS server on a dedicated management VLAN. Audit `/etc/exports` + `exportfs -v` for any `no_root_squash` - treat each as compliance-review required."
    cwe: ['CWE-250', 'CWE-284', 'CWE-732']
