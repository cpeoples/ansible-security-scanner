  - id: "s3_bucket_acl_public_read_write_literal"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "S3 Bucket ACL Set To public-read / public-read-write / authenticated-read"
    description: "A task sets an S3 bucket or object canned-ACL to `public-read-write` (world-writable - allows attackers to overwrite objects, plant phishing pages, or serve malware from the victim's domain), `public-read` (world-readable - direct data-leak primitive), or `authenticated-read` (any AWS account can read, i.e. effectively public since anyone can create an AWS account in 60s). AWS BlockPublicAccess defaults to ON since 2023 for NEW buckets but does NOT retroactively apply to existing buckets, and can be bypassed by explicit ACL overrides. The 2024 Guardicore / Censys / Wiz public-S3 reports consistently find >50k buckets still exposing customer data this way."
    regex: "(?:amazon\\.aws\\.s3_bucket|community\\.aws\\.s3_bucket|aws_s3_bucket_acl|aws\\s+s3api\\s+put-bucket-acl)[\\s\\S]{0,400}?(?:acl|canned_acl|ACL|policy)\\s*[:=]\\s*['\"]?(?:public-read-write|public-read|authenticated-read)['\"]?"
    positive_examples:
      - |2-
        amazon.aws.s3_bucket:
                name: "{{ local_bucket_name }}"
                acl: public-read
    multiline: true
    window: 15
    recommendation: "Enable BlockPublicAccess at the ACCOUNT level (idempotent, covers all buckets): `aws s3control put-public-access-block --account-id <acct> --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true`. For per-bucket policies, use resource-based IAM with specific principals - never canned-ACL public. For CDN-style public serving, put the bucket behind CloudFront with Origin Access Control (OAC) so the bucket itself stays private. Audit: `aws s3api get-bucket-acl --bucket <b> | jq '.Grants[].Grantee.URI'` - any match on `http://acs.amazonaws.com/groups/global/(AllUsers|AuthenticatedUsers)` is an immediate finding. Enforce via SCP: `s3:PutBucketAcl` denied when `s3:x-amz-acl IN [public-read,public-read-write,authenticated-read]`."
    cwe: ['CWE-200', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]
    mitre_attack: ['T1078.004', 'T1530', 'T1580']
    cis_controls: ['CIS-3.3', 'CIS-3.7', 'CIS-11.2']
    nist_controls: ['AC-3', 'AC-6', 'SC-7']
    pci_dss: ['1.3.6', '7.2.1']
    hipaa: ['164.308(a)(3)(ii)(A)', '164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "gcs_bucket_iam_alluser_storage_admin"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "GCS Bucket IAM Grants Storage Admin / Object Admin To allUsers Or allAuthenticatedUsers"
    description: "A task grants `roles/storage.admin`, `roles/storage.objectAdmin`, `roles/storage.objectCreator`, or `roles/storage.legacyBucketOwner` to `allUsers` (fully anonymous world) or `allAuthenticatedUsers` (any Google account - effectively public). These roles permit OBJECT CREATION and DELETION, not just read - an attacker can overwrite existing objects with malware, pivot the bucket into a drive-by-download hosting service, or delete-and-ransom the bucket. GCS IAM supports Uniform Bucket-Level Access (UBLA) since 2020 but the ACL-compatible role-bindings (`storage.legacyBucketOwner`) remain a common misconfiguration. Google's 2024 Security Command Center catches this as a HIGH finding (category: `PUBLIC_BUCKET_ACL`)."
    regex: "(?:google_storage_bucket_iam(?:_binding|_member|_policy)?|google\\.cloud\\.gcp_storage_bucket_iam|gsutil\\s+iam\\s+ch)[\\s\\S]{0,600}?(?:allUsers|allAuthenticatedUsers)[\\s\\S]{0,300}?(?:role|roles)\\s*[:=]\\s*['\"]?roles/storage\\.(?:admin|objectAdmin|objectCreator|legacyBucketOwner|legacyBucketWriter)['\"]?|(?:role|roles)\\s*[:=]\\s*['\"]?roles/storage\\.(?:admin|objectAdmin|objectCreator|legacyBucketOwner|legacyBucketWriter)['\"]?[\\s\\S]{0,600}?(?:allUsers|allAuthenticatedUsers)"
    positive_examples:
      - "google_storage_bucket_iamallUsersroles:roles/storage.admin"
    multiline: true
    window: 40
    recommendation: "Enable Uniform Bucket-Level Access (UBLA): `gcloud storage buckets update gs://<bucket> --uniform-bucket-level-access` - this eliminates per-object ACLs and forces all access through IAM. Set org-constraint `constraints/storage.publicAccessPrevention = enforced` at the org level - prevents ANY bucket from becoming publicly accessible. For legitimate public CDN-style hosting, use a dedicated project with `enforced` off ONLY on the one bucket + Cloud CDN in front. Never grant write roles to `allUsers`. Audit: `gcloud projects get-iam-policy <proj> --flatten='bindings[].members' --filter='bindings.members~allUsers' --format='value(bindings.role)'` - any row with `storage.*` is immediate remediation. Alert on Cloud Audit Logs `methodName=storage.setIamPermissions` with `allUsers`/`allAuthenticatedUsers` in the new policy."
    cwe: ['CWE-200', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]
    mitre_attack: ['T1530', 'T1580']
    cis_controls: ['CIS-3.3', 'CIS-3.7', 'CIS-11.2']
    nist_controls: ['AC-3', 'AC-6', 'SC-7']
    pci_dss: ['1.3.6', '7.2.1']
    hipaa: ['164.308(a)(3)(ii)(A)', '164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "azure_blob_public_access_container_or_blob"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Azure Storage Container Public Access Set To container Or blob (Anonymous Enumeration / Read)"
    description: "A task sets an Azure Storage container's `publicAccess` property to `container` (anonymous enumeration AND read of every blob - the worst level) or `blob` (anonymous read of individual blobs if the name is known, no enumeration). The account-level `allowBlobPublicAccess` must also be `true` for these to take effect - but this task-level opt-in is the canonical anti-pattern caught by Azure Policy `[Preview] Storage accounts should prevent public blob access`. The 2023-2024 Microsoft Threat Intelligence reports document Midnight Blizzard (APT29) and LAPSUS$ leveraging exactly this misconfiguration post-exfiltration to stage data outside the victim's perimeter."
    regex: "(?:azure_rm_storageblob|azurerm_storage_container|az\\s+storage\\s+container\\s+(?:create|update|set-permission)|Set-AzStorageContainerAcl)[\\s\\S]{0,400}?(?:public_access|publicAccess|--public-access|-Permission)\\s*[:=]\\s*['\"]?(?:container|blob|Container|Blob|Off(?!icial))['\"]?(?!\\s*['\"]?(?:private|None|none))"
    positive_examples:
      - |2-
        azure_rm_storageblob:
            # ...
            public_access: blob
    multiline: true
    window: 15
    recommendation: "Set `publicAccess = None` (alias: `private`) for all production containers. At the storage-account level, set `allowBlobPublicAccess = false` - this is a HARD block regardless of container setting. Enforce via Azure Policy `Storage accounts should disallow public access` (`id=/providers/Microsoft.Authorization/policyDefinitions/4fa4b6c0-31ca-4c0d-b10d-24b96f62a751`) at Management Group scope with `Deny` effect. For legitimate public content, use Azure Front Door + Private Link origin - the storage stays private. Alert on `Microsoft.Storage/storageAccounts/blobServices/containers/write` Activity Log events where the new `publicAccess` value is not `None`. Audit: `az storage container list --account-name <acct> --query '[].{name:name,public:properties.publicAccess}'`."
    cwe: ['CWE-200', 'CWE-284', 'CWE-306']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V14.2.2]
