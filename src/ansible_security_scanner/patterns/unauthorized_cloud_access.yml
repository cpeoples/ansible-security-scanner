  - id: "aws_ec2_instance_assigns_public_ip"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "amazon.aws.ec2_instance Explicitly Assigns a Public IPv4 Address"
    description: "An `amazon.aws.ec2_instance` (or legacy `ec2`) task sets `assign_public_ip: true` (or `network.assign_public_ip: true` for VPC-launched instances). Per AWS Well-Architected Security Pillar § SEC-01 and CIS AWS 5.2, workload instances should sit in private subnets and egress via a NAT/gateway - public IPv4 exposure shortens time-to-first-scan from hours to ≈90 seconds on common ports (22, 3389, 445) and is the top-of-funnel for mass-exploitation campaigns (e.g. Looney Tunables, CVE-2024-6387 regreSSHion)."
    regex: "(?ms)(?:amazon\\.aws\\.ec2_instance|amazon\\.aws\\.ec2|community\\.aws\\.ec2|^[\\t ]*ec2(?:_instance)?)\\s*:[\\s\\S]{0,1500}?\\bassign_public_ip\\s*:\\s*(?:true|True|yes|Yes|1)\\b"
    positive_examples:
