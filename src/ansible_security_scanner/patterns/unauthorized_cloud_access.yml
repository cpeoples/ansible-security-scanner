  - id: "azure_sql_firewall_rule_allow_all_public_ips"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Azure SQL/PostgreSQL Firewall Rule Allows All Public IPs (0.0.0.0 - 255.255.255.255)"
    description: "An `azure.azcollection.azure_rm_sqlfirewallrule` / `azure.azcollection.azure_rm_postgresqlfirewallrule` / `azure.azcollection.azure_rm_mysqlfirewallrule` / `azure.azcollection.azure_rm_mariadbfirewallrule` task sets `start_ip_address: '0.0.0.0'` + `end_ip_address: '255.255.255.255'` (or the pseudo-range `0.0.0.0` - `0.0.0.0` 'AllowAllWindowsAzureIps'). The database is then reachable from every IP on the internet - any leaked connection string gives immediate admin access. This is the #1 Azure database exposure."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_(?:sql|postgresql|mysql|mariadb)firewallrule\\s*:[\\s\\S]{0,1500}?start_ip_address\\s*:\\s*['\"]?0\\.0\\.0\\.0['\"]?[\\s\\S]{0,300}?end_ip_address\\s*:\\s*['\"]?(?:255\\.255\\.255\\.255|0\\.0\\.0\\.0)['\"]?"
