  - id: "aws_rds_publicly_accessible_true"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS RDS / Aurora / DocumentDB Instance PubliclyAccessible=true"
    description: "A task creates/modifies an RDS instance (`community.aws.rds_instance`, `amazon.aws.rds_instance`, `aws rds create-db-instance`, `aws_db_instance` Terraform) with `PubliclyAccessible=true` / `publicly_accessible: true`. This assigns the DB a public IPv4 address and DNS name reachable from the internet - even with security-group restrictions in front of it, the attack-surface becomes every IP on earth for password-spray, CVE-day-0 (like CVE-2024-10976 pg replication RCE), and known-credential replay. The 2024 Mandiant M-Trends shows >20% of initial-access in cloud IR engagements starts with a public RDS instance. AWS Well-Architected Security Pillar explicitly requires private subnets + NAT-egress + PrivateLink for RDS."
    regex: "(?:community\\.aws\\.rds_instance|amazon\\.aws\\.rds_instance|aws_db_instance|aws\\s+rds\\s+(?:create|modify)-db-instance)[\\s\\S]{0,600}?(?:publicly_accessible|PubliclyAccessible|--publicly-accessible)\\s*[:= ]\\s*['\"]?(?:true|yes|True)['\"]?|(?:publicly_accessible|PubliclyAccessible)\\s*[:=]\\s*['\"]?true['\"]?[\\s\\S]{0,600}?(?:rds_instance|db_instance|DBInstance)"
    positive_examples:
      - |2-
        community.aws.rds_instance:
            # ...
            publicly_accessible: Yes
    multiline: true
    window: 25
    recommendation: "Set `publicly_accessible: false` for every RDS / Aurora / DocumentDB / Redshift instance. Place the DB in a PRIVATE subnet within a VPC with no IGW route. For developer access, use AWS VPN Client / AWS Client VPN / AWS SSM Session Manager port-forward (`aws ssm start-session --document-name AWS-StartPortForwardingSessionToRemoteHost --parameters host=db.internal,portNumber=5432`). For cross-account consumer apps, use VPC Peering or PrivateLink endpoints - never public IP. Enforce via SCP: `rds:CreateDBInstance` / `rds:ModifyDBInstance` denied when `rds:PubliclyAccessible=true` except for a break-glass role. Audit: `aws rds describe-db-instances --query 'DBInstances[?PubliclyAccessible==\\`true\\`].[DBInstanceIdentifier,Endpoint.Address]'`. Rotate master-user credential immediately on any instance that was ever public + review CloudTrail for external IP connection attempts via `rds:DescribeDBInstances` audit trail."
    cwe: ['CWE-200', 'CWE-284', 'CWE-306']
