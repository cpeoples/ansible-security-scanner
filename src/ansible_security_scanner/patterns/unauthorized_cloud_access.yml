            "Principal": {"AWS": "arn:aws:iam::123456789012:root"}
    recommendation: "Every cross-account trust policy MUST require `sts:ExternalId`: `\"Condition\": { \"StringEquals\": { \"sts:ExternalId\": \"<unique-per-customer-secret>\" } }`. Generate a per-customer ExternalId (UUIDv4) server-side and never reuse it across tenants. Prefer narrower conditions when possible (`aws:SourceAccount`, `aws:SourceArn`, `aws:PrincipalTag/<tag>`). For SaaS integrations, follow the AWS-published CloudFormation templates which include the ExternalId condition by default."
    cwe: ['CWE-284', 'CWE-346', 'CWE-441']
    owasp_appsec: ["A01:2021", "A07:2021"]
    mitre_attack: ['T1078.004', 'T1550.001']
    cis_controls: ['CIS-3.3', 'CIS-6.8']
    nist_controls: ['AC-3', 'AC-4', 'IA-4', 'IA-5(2)']
    pci_dss: ['7.2.1', '7.2.5', '8.3.1']
    soc2: ['CC6.1', 'CC6.3']

  - id: "azure_privileged_role_assigned_permanent_not_pim_eligible"
