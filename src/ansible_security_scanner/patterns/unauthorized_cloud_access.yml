  # -- Docker / Containers -------------------------------------------------

  - id: "docker_run_command"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Dangerous docker/podman run Flags - Privileged or Host-Access Container"
    description: "A shell task launches a container with flags that break the container sandbox: ``--privileged``, ``--pid=host``, ``--net=host`` / ``--network=host``, ``--ipc=host``, ``--userns=host``, ``--cap-add=SYS_ADMIN`` / ``SYS_PTRACE`` / ``NET_ADMIN`` / ``ALL``, or a bind-mount of a sensitive host path (``-v /:``, ``-v /var/run/docker.sock:``, ``-v /etc:``, ``-v /root:``, ``-v /proc:``, ``-v /sys:``, ``-v /dev:``). Each of these flags turns the container into a full-host-compromise primitive (T1611 - Escape to Host) documented in IR write-ups for 2024-2025 TeamTNT, Kinsing, and the `actions/upload-artifact` supply-chain escape. Plain ``docker run -d --name foo image:tag`` without these flags is a normal deployment and is NOT flagged."
    # Match `docker run` / `podman run` / `nerdctl run` followed ANY-
    # WHERE on the same line by one of the dangerous flags. The ``-v
    # /:`` / ``-v /etc:`` / ``-v /root:`` / ``-v /var/run/docker.sock``
    # bind-mounts are flagged too - these are the canonical container-
    # escape primitives.
    regex: "\\b(?:docker|podman|nerdctl)\\s+run\\b[^\\n]*?(?:--privileged\\b|--pid[= ]host\\b|--(?:net|network)[= ]host\\b|--ipc[= ]host\\b|--userns[= ]host\\b|--uts[= ]host\\b|--cap-add[= ](?:SYS_ADMIN|SYS_PTRACE|SYS_MODULE|NET_ADMIN|DAC_READ_SEARCH|ALL)\\b|--security-opt[= ]seccomp[= ]unconfined\\b|--security-opt[= ]apparmor[= ]unconfined\\b|(?:-v|--volume)[= ](?:/:|/etc[:/]|/root[:/]|/home[:/]|/proc[:/]|/sys[:/]|/dev[:/]|/var/run/docker\\.sock|/var/lib/docker)(?:[:,][^\\s]+)?)"
    recommendation: "Replace with the ``community.docker.docker_container`` module and drop every dangerous flag you added. If the workload legitimately needs host visibility, use a purpose-built module (``community.docker.docker_host_info``) or a dedicated sidecar with narrow capabilities (``--cap-add=NET_BIND_SERVICE`` only). NEVER ``--privileged`` a production container - the CIS Docker Benchmark (5.4) and NIST SP-800-190 (4.4.2) both forbid it. For docker-socket mounts, replace with rootless dockerd + a DOCKER_HOST TCP listener with client cert auth, or with sysbox/kata so container root isn't host root."
    positive_examples:
      - "    shell: docker run --privileged --rm ubuntu:24.04 /bin/bash"
      - "    shell: podman run --pid=host alpine ps -ef"
      - "    shell: docker run --network=host nginx"
      - "    shell: docker run -v /:/host ubuntu chroot /host"
      - "    shell: docker run -v /var/run/docker.sock:/var/run/docker.sock docker"
      - "    shell: docker run --cap-add=SYS_ADMIN fuse-sidecar"
    negative_examples:
      - "    shell: docker run -d --name golden_cpu splunk/mltk-container-golden-cpu:5.2.1"
      - "    shell: docker run --rm -v /opt/app:/workspace alpine ls /workspace"
      - "    shell: podman run -d --name web nginx:1.27"
    cwe: ["CWE-269", "CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1610", "T1611"]
    cis_controls: ["CIS-Docker"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

