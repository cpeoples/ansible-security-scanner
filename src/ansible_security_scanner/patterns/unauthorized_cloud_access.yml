  - id: "aws_api_gateway_route_authorization_none"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS API Gateway Method / Route Authorization Set To NONE (Unauthenticated Endpoint)"
    description: "A task creates an API Gateway method (REST `aws_api_gateway_method` / HTTP `aws_apigatewayv2_route`) with `authorization: NONE` / `authorization_type: NONE` / `--authorization-type NONE`. Distinct from Lambda Function URL (separate service); API Gateway's NONE means any internet caller can invoke the backend integration - SQS, Lambda, DynamoDB, Step Functions - without authentication. Legitimate use-cases exist (health-check endpoints, OAuth callback routes) but the default should be `CUSTOM`, `AWS_IAM`, `COGNITO_USER_POOLS`, or `JWT`. The 2024 AWS Security Hub `APIGateway.8` finding specifically flags NONE authorizers on non-OPTIONS routes. Many CloudFormation/Terraform templates copy-paste `authorization: NONE` from tutorials and leave it in production."
    regex: "(?:aws_api_gateway_method|aws_apigatewayv2_route|community\\.aws\\.api_gateway|aws\\s+apigateway\\s+put-method|aws\\s+apigatewayv2\\s+create-route)[\\s\\S]{0,500}?(?:authorization|authorization_type|--authorization-type)\\s*[:= ]\\s*['\"]?NONE['\"]?|(?:authorization|authorization_type)\\s*[:=]\\s*['\"]?NONE['\"]?[\\s\\S]{0,500}?(?:api_gateway_method|apigatewayv2_route|ApiGatewayV2::Route)"
    positive_examples:
      - "aws_api_gateway_methodauthorization:NONE"
    multiline: true
    window: 25
    recommendation: "Set `authorization_type: AWS_IAM` (service-to-service) or `COGNITO_USER_POOLS` (user-facing) or `JWT` (HTTP API + OIDC IdP) for every production route. For OPTIONS preflight CORS, NONE is acceptable IF you validate `Origin` server-side. Never leave NONE on POST/PUT/DELETE. Add AWS WAF in front for request-rate-limiting + OWASP rule-set + geo-filtering. Use the API Gateway usage-plan feature with API keys for per-consumer quota. Enforce via AWS Config rule `api-gw-endpoint-authorization-not-none`. Audit: `aws apigatewayv2 get-routes --api-id <id> --query 'Items[?AuthorizationType==\\`NONE\\` && RouteKey!=\\`OPTIONS \\`]'`."
    cwe: ['CWE-284', 'CWE-306', 'CWE-862']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1133', 'T1190']
