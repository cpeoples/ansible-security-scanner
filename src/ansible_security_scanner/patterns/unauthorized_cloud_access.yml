  - id: "aws_ebs_volume_encrypted_false"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS EBS Volume Created With encrypted=false (Unencrypted At-Rest)"
    description: "A task creates an EBS volume (`amazon.aws.ec2_vol`, `community.aws.ec2_vol`, `aws ec2 create-volume`, `aws_ebs_volume` Terraform) with `encrypted: false` / `--no-encrypted` / `Encrypted: false`. Snapshots of unencrypted volumes are also unencrypted - any cross-account snapshot-sharing, AMI-building, or S3 export retains data in cleartext. Since 2023 AWS supports account-level `EnableEbsEncryptionByDefault` - bypassing it for specific volumes is the pattern caught here. Unencrypted EBS fails PCI-DSS 3.5.1 + HIPAA §164.312(a)(2)(iv) + SOC 2 CC6.7. Distinct from generic cloud-storage-encryption rules; this catches EBS specifically because block storage often holds DB data, swap, and encryption-key material at rest."
    regex: "(?:amazon\\.aws\\.ec2_vol|community\\.aws\\.ec2_vol|aws_ebs_volume|aws\\s+ec2\\s+create-volume)[\\s\\S]{0,500}?(?:encrypted|Encrypted)\\s*[:= ]\\s*['\"]?(?:false|False|no|no)['\"]?|(?:encrypted|Encrypted)\\s*[:=]\\s*['\"]?false['\"]?[\\s\\S]{0,400}?(?:ec2_vol|ebs_volume|EBSVolume|volume_type)"
    positive_examples:
      - |2-
        amazon.aws.ec2_vol:
            # ...
            encrypted: no
    multiline: true
    window: 20
    recommendation: "Set `encrypted: true` + `kms_key_id: <cmk-arn>` on every EBS volume. Enable account-wide default encryption: `aws ec2 enable-ebs-encryption-by-default --region <r>` + `aws ec2 modify-ebs-default-kms-key-id --kms-key-id <cmk-arn>`. Use a customer-managed KMS key (CMK) - not the AWS-managed default - so you control rotation + grant-policy + audit. For cross-account snapshot sharing, re-encrypt with the consumer account's KMS key: `aws ec2 copy-snapshot --encrypted --kms-key-id <consumer-cmk>`. Enforce via SCP: `ec2:CreateVolume` denied when `ec2:Encrypted=false`. Migrate existing unencrypted volumes: create encrypted snapshot -> restore -> detach old volume -> attach new. Audit: `aws ec2 describe-volumes --filters Name=encrypted,Values=false`."
    cwe: ['CWE-311', 'CWE-312', 'CWE-319']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1, V12.3.4]
