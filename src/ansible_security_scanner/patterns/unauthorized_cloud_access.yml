  - id: "azure_vm_disk_encryption_not_enabled"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "Azure Virtual Machine Without OS/Data Disk Encryption (ADE or CMK)"
    description: "An `azure.azcollection.azure_rm_virtualmachine` / `azure.azcollection.azure_rm_virtualmachinescaleset` task creates a VM/VMSS where `os_disk.managed_disk_type` is set but no `os_disk.encryption_settings:`/`security_profile:` block is present AND no companion `azure.azcollection.azure_rm_diskencryptionset` is referenced via `disk_encryption_set` on either OS or data disks. The managed disk is then encrypted only with the default platform-managed key (PMK); recovery of the encrypted VHD by a rogue Azure operator or a stolen snapshot (copy to another subscription) would decrypt transparently. Azure Disk Encryption (ADE) with Key Vault customer-managed keys gives the tenant control over key-rotation and revocation."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_(?:virtualmachine|virtualmachinescaleset)\\s*:\\s*\\n(?:(?!encryption_settings\\s*:|disk_encryption_set\\s*:|security_profile\\s*:\\s*\\{?\\s*encryption_at_host\\s*:\\s*true)[\\s\\S]){0,2500}?managed_disk_type\\s*:\\s*['\"]?(?:Standard_LRS|Premium_LRS|StandardSSD_LRS|Premium_ZRS)['\"]?(?:(?!encryption_settings\\s*:|disk_encryption_set\\s*:|security_profile\\s*:\\s*\\{?\\s*encryption_at_host\\s*:\\s*true|^\\s*- name:|^-\\s*name:)[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
        azure.azcollection.azure_rm_virtualmachine:
            # ...
            managed_disk_type: StandardSSD_LRS
    multiline: true
    window: 80
    recommendation: "Enable Azure Disk Encryption (ADE) with customer-managed keys stored in Azure Key Vault. Concretely: (1) create an `azure_rm_diskencryptionset` tied to a Key Vault Premium SKU with soft-delete and purge-protection on, (2) reference that set in `os_disk.managed_disk.disk_encryption_set.id: /subscriptions/...` on every VM, (3) add `security_profile: {encryption_at_host: true}` for confidential-compute defense against host-level attacks (requires Gen2 VM). Audit with `az vm encryption show --name $VM --resource-group $RG` and enforce via Azure Policy built-in `ID: 0961003e-5a0a-4549-abde-af6a37f2724d` ('Virtual machines should encrypt temp disks, caches, and data flows between Compute and Storage resources')."
    cwe: ['CWE-311', 'CWE-312', 'CWE-922']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1]
    mitre_attack: ['T1530', 'T1565.001']
    cis_controls: ['CIS-3.11', 'CIS-14.8']
