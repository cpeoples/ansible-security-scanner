name: "Unauthorized Cloud & Infrastructure Access Patterns"
author: "Ansible Security Scanner Team"
description: >
  Detects direct cloud service calls, unauthorized infrastructure provisioning, and
  cloud credential abuse that bypass controlled workflows. Ansible playbooks should
  use gated APIs and approved IaC pipelines - not raw SDK/CLI calls to cloud services.

patterns:
  # -- AWS: SQS --------------------------------------------------------------

  - id: "direct_sqs_send_message"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Direct SQS SendMessage Call"
    description: "Sends messages directly to an SQS queue, bypassing controlled provisioning workflows"
    regex: "aws\\s+sqs\\s+send-message\\b|boto3[^\\n]*client\\([^)]*['\"]sqs['\"][^)]*\\)[^\\n]*\\.send_message\\s*\\(|\\bSendMessage\\s*\\([^)]*QueueUrl"
    positive_examples:
      - "aws sqs send-message"
    recommendation: "Route SQS messages through a gated API (e.g. API Gateway + API key) instead of direct queue access"
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "direct_sqs_queue_url"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Hardcoded SQS Queue URL"
    description: >-
        An SQS queue URL (https://sqs.<region>.amazonaws.com/<account>/<queue>) is
        hardcoded in a playbook. Hardcoded URLs leak the account ID and bypass
        per-environment configuration.
    regex: "https://sqs\\.[a-z0-9-]+\\.amazonaws\\.com/\\d+/\\w+"
    positive_examples:
      - "https://sqs.a.amazonaws.com/0/a"
    recommendation: "Remove direct SQS queue URLs; use a controlled API endpoint instead"
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "boto3_sqs_client"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Boto3 SQS Client"
    description: >-
        boto3.client('sqs') is constructed inside an Ansible task. Direct SDK use
        bypasses the community.aws collection's idempotency, retry, and error-shape
        contracts.
    regex: "boto3\\.client\\(['\"]sqs['\"]"
    positive_examples:
      - "boto3.client('sqs'"
    recommendation: "Do not create boto3 SQS clients in playbooks; use a gated API"
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "ansible_aws_sqs_module"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Ansible AWS SQS Module"
    description: "Using community.aws or amazon.aws SQS modules for direct queue operations"
    regex: "community\\.aws\\.sqs_queue|amazon\\.aws\\.sqs_queue|aws_sqs_queue"
    positive_examples:
      - "- aws_sqs_queue - Ported the event source plugin from ``ansible.eda`` to ``amazon.aws``"
    recommendation: "Do not use Ansible SQS modules; route through a controlled API instead"

    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  # -- AWS: SNS / Lambda -----------------------------------------------------

  - id: "direct_sns_publish"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Direct SNS Publish"
    description: "Publishes directly to an SNS topic, bypassing controlled workflows"
    regex: "aws\\s+sns\\s+publish|boto3.*client.*sns.*publish|sns\\.publish|TopicArn.*arn:aws:sns"
    positive_examples:
      - "aws sns publish"
    recommendation: "Route SNS messages through a gated API instead of direct topic access"
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "direct_lambda_invoke"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Direct Lambda Invocation"
    description: "Invokes a Lambda function directly, bypassing API Gateway controls"
    regex: "aws\\s+lambda\\s+invoke|boto3.*client.*lambda.*invoke|lambda\\.invoke"
    positive_examples:
      - "aws lambda invoke"
    recommendation: "Invoke Lambda through API Gateway or approved triggers"

    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  # -- AWS: IAM / STS --------------------------------------------------------

  - id: "aws_sts_assume_role"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS STS AssumeRole"
    description: "Assumes an IAM role from within a playbook, which could escalate privileges"
    regex: "aws\\s+sts\\s+assume-role|boto3.*client.*sts.*assume_role|AssumeRole.*RoleArn"
    positive_examples:
      - "aws sts assume-role"
    recommendation: "IAM role assumption should be handled by the execution environment, not playbook code"
    no_ansible_remediation: true
    cwe: ["CWE-269"]
    owasp_appsec: ["A04:2021"]
    mitre_attack: ["T1548.005"]
    cis_controls: ["CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "aws_iam_create_user"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS IAM User Creation"
    description: >-
        Creates an IAM user via `aws iam create-user`,
        boto3.client('iam').create_user, or iam.create_user. IAM user creation
        should run via the community.aws.iam_user module so changes are auditable.
    regex: "aws\\s+iam\\s+create-user|boto3.*client.*iam.*create_user|iam\\.create_user"
    positive_examples:
      - "aws iam create-user"
    recommendation: "IAM user management must go through approved identity governance workflows"
    no_ansible_remediation: true
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1136.003"]
    cis_controls: ["CIS-6.2.1"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "aws_iam_create_access_key"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS IAM Access Key Creation"
    description: "Creates IAM access keys, enabling potentially untracked programmatic access"
    regex: "aws\\s+iam\\s+create-access-key|boto3.*client.*iam.*create_access_key"
    positive_examples:
      - "aws iam create-access-key"
    recommendation: "Access key creation must go through approved workflows"
    no_ansible_remediation: true

    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]
    mitre_attack: ["T1098.001"]
    cis_controls: ["CIS-6.2.1"]
    nist_controls: ['IA-5', 'IA-5(7)']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']

  # -- AWS: EC2 --------------------------------------------------------------

  - id: "aws_ec2_run_instances"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Direct EC2 Instance Launch"
    description: "Launches EC2 instances directly, bypassing provisioning controls"
    regex: "aws\\s+ec2\\s+run-instances|boto3.*client.*ec2.*run_instances|ec2\\.run_instances"
    positive_examples:
      - "aws ec2 run-instances"
    recommendation: "EC2 provisioning should go through approved IaC pipelines"
    no_ansible_remediation: true

    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1578.002"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  # -- AWS: Inline Scripts / Credentials --------------------------------------

  - id: "inline_boto3_script"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Inline Boto3 Script Execution"
    description: "Runs inline Python boto3 code in a command/shell task, hiding AWS calls from static analysis"
    regex: "python3?\\s+-c.*import\\s+boto3"
    positive_examples:
      - "python -cimport boto3"
    recommendation: "Do not embed boto3 in Ansible tasks; use approved service integrations"
    no_ansible_remediation: true
    cwe: ["CWE-506"]
    mitre_attack: ["T1027"]
    cis_controls: ["CIS-8.2"]
    nist_controls: ['AU-2', 'AU-12', 'SI-3', 'SI-7']
    pci_dss: ['10.2.1']
    hipaa: ['164.312(b)']
    soc2: ['CC6.8', 'CC7.2']

  - id: "aws_credentials_in_playbook"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS Credentials in Playbook"
    description: "AWS access keys or secret keys referenced directly in playbook variables"
    regex: "(?:aws_access_key|aws_secret_key|AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY)\\s*[:=]\\s*['\"]?[A-Z0-9]{16,}"
    positive_examples:
      - "aws_access_key:AAAAAAAAAAAAAAAA"
    recommendation: "Never embed AWS credentials; use IAM roles or the execution environment's credential chain"

    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']

  # -- GCP --------------------------------------------------------------------

  - id: "gcloud_direct_command"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Direct gcloud CLI Command"
    description: >-
        gcloud compute/iam/pubsub/functions/run/sql/container is invoked from a
        shell task. Direct CLI use sidesteps the google.cloud collection's typed
        parameters and idempotency checks.
    regex: "gcloud\\s+(?:compute|iam|pubsub|functions|run|sql|container)"
    positive_examples:
      - "gcloud compute"
    recommendation: "Use approved IaC workflows for GCP resource management, not ad-hoc gcloud calls"
    no_ansible_remediation: true
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  - id: "gcp_service_account_key"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "GCP Service Account Key in Playbook"
    description: "GCP service account key JSON or GOOGLE_APPLICATION_CREDENTIALS set in playbook"
    regex: "GOOGLE_APPLICATION_CREDENTIALS|\"type\":\\s*\"service_account\"|gcloud.*auth.*activate-service-account"
    positive_examples:
      - "GOOGLE_APPLICATION_CREDENTIALS: \"{{ molecule_yml.driver.service_account_file | default(lookup('env', 'GCP_SERVICE_ACCOUNT_FILE'), true) }}\""
    recommendation: "Use workload identity or attached service accounts instead of key files"
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']

  - id: "gcp_metadata_access"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "GCP Metadata Server Access"
    description: "Queries the GCP metadata server, potentially extracting credentials or project info"
    regex: "metadata\\.google\\.internal|metadata\\.google\\.internal/computeMetadata"
    positive_examples:
      - "metadata.google.internal/computeMetadata"
    recommendation: "Do not query cloud metadata servers from playbooks; use environment-provided configuration"
    no_ansible_remediation: true

    cwe: ["CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]
    mitre_attack: ["T1552.005"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7', 'IA-5(7)', 'SC-28']
    pci_dss: ['2.2.1', '2.2.4', '3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1', 'CC7.1', 'CC8.1']

  # -- Azure ------------------------------------------------------------------

  - id: "az_cli_direct_command"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Direct Azure CLI Command"
    description: >-
        az vm/aks/storage/keyvault/network/ad/role/group/webapp is invoked from a
        shell task. Direct az CLI use bypasses the azure.azcollection module surface
        and its idempotent parameters.
    regex: "\\baz\\s+(?:vm|aks|storage|keyvault|network|ad|role|group\\s+create|webapp)"
    positive_examples:
      - "az group create -l eastus -n $(setvar.resource_group)"
    recommendation: "Use approved IaC workflows for Azure resource management"
    no_ansible_remediation: true
    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1078.004"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  - id: "azure_credentials_in_playbook"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Azure Credentials in Playbook"
    description: >-
        AZURE_CLIENT_SECRET / AZURE_TENANT_ID / AZURE_CLIENT_ID is set to a 20+ char
        literal in a playbook. The shape leaks service-principal credentials that
        grant Azure API access.
    regex: "(?:AZURE_CLIENT_SECRET|AZURE_TENANT_ID|AZURE_CLIENT_ID)\\s*[:=]\\s*['\"]?[a-zA-Z0-9-]{20,}"
    positive_examples:
      - "AZURE_CLIENT_SECRET:aaaaaaaaaaaaaaaaaaaa"
    recommendation: "Use managed identities or environment-provided credentials"

    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']

  # -- Cloud Metadata (generic) -----------------------------------------------

  - id: "cloud_instance_metadata"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Cloud Instance Metadata Access"
    description: "Queries cloud instance metadata endpoints (AWS, GCP, Azure) to extract credentials or config"
    regex: "169\\.254\\.169\\.254|metadata\\.google\\.internal|169\\.254\\.169\\.254/latest/meta-data"
    positive_examples:
      - "iptables -I OUTPUT 1 -d 169.254.169.254 -j REJECT"
    recommendation: "Do not access cloud metadata from playbooks; use scoped IAM roles and environment variables"
    no_ansible_remediation: true

    cwe: ["CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]
    mitre_attack: ["T1552.005"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7', 'IA-5(7)', 'SC-28']
    pci_dss: ['2.2.1', '2.2.4', '3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1', 'CC7.1', 'CC8.1']

  # -- Kubernetes -------------------------------------------------------------

  - id: "kubectl_exec_in_pod"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "kubectl exec into Running Pod"
    description: "Executes commands inside a running Kubernetes pod from an Ansible task"
    regex: "kubectl\\s+exec\\s+"
    positive_examples:
      - "command: \"{{ bin_dir }}/kubectl exec samplepod -- ip addr show dev net1\""
    recommendation: "Avoid kubectl exec in automation; use Kubernetes Jobs or init containers"
    cwe: ["CWE-78"]
    owasp_appsec: ["A03:2021"]
    mitre_attack: ["T1609"]
    cis_controls: ["CIS-K8s-5.2.1"]
    nist_controls: ['SI-3', 'SI-10']
    pci_dss: ['6.2.4', '6.3.1']
    soc2: ['CC7.1']

  - id: "kubectl_create_secret"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "kubectl Secret Creation"
    description: "Creates Kubernetes secrets directly via kubectl, potentially with plaintext values"
    regex: "kubectl\\s+create\\s+secret"
    positive_examples:
      - "kubectl create secret"
    recommendation: "Manage Kubernetes secrets through sealed-secrets, external-secrets, or Vault"
    cwe: ["CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]
    mitre_attack: ["T1552.007"]
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "kubectl_run_privileged"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "kubectl Run with Overrides"
    description: "Runs ad-hoc pods with override flags, potentially with escalated privileges"
    regex: "kubectl\\s+run.*--overrides"
    positive_examples:
      - "kubectl run--overrides"
    recommendation: "Deploy workloads through approved manifests and Helm charts, not ad-hoc kubectl run"

    cwe: ["CWE-250"]
    owasp_asvs: [V13.4.5, V15.2.3]
    mitre_attack: ["T1611"]
    cis_controls: ["CIS-K8s-5.2.1"]
    nist_controls: ['AC-6', 'AC-6(1)']
    pci_dss: ['7.2.1']
    soc2: ['CC6.3']

  # -- Terraform / IaC Abuse --------------------------------------------------

  - id: "terraform_apply_from_ansible"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Terraform Apply from Ansible"
    description: "Runs terraform apply from an Ansible task, bypassing IaC pipeline controls"
    regex: "terraform\\s+(?:apply|destroy)\\s+"
    positive_examples:
      - "terraform apply "
    recommendation: "Terraform should run through its own CI/CD pipeline with plan review, not from Ansible"
    no_ansible_remediation: true

    cwe: ["CWE-284"]
    owasp_appsec: ["A01:2021"]
    mitre_attack: ["T1578"]
    cis_controls: ["CIS-16.1"]
    nist_controls: ['AC-3', 'AC-6', 'SA-11', 'SA-15']
    pci_dss: ['6.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC8.1']

  # -- Vault / Secrets Engines ------------------------------------------------

  - id: "vault_token_in_playbook"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "HashiCorp Vault Token in Playbook"
    description: "Vault root or service tokens hardcoded in playbook variables"
    regex: "VAULT_TOKEN\\s*[:=]\\s*['\"]?(?:hvs\\.|s\\.)[a-zA-Z0-9]{20,}"
    positive_examples:
      - "VAULT_TOKEN:hvs.aaaaaaaaaaaaaaaaaaaa"
    recommendation: "Use Vault agent auto-auth or AppRole; never embed tokens in playbooks"
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']

  - id: "vault_cli_read_write"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Vault CLI Read/Write from Ansible"
    description: "Reads or writes secrets via the vault CLI, bypassing Ansible Vault integration and audit controls"
    regex: "vault\\s+(?:read|write|kv\\s+(?:get|put|delete))"
    positive_examples:
      - "cmd: \"vault write sys/plugins/catalog/secret/acme"
    recommendation: "Use the community.hashi_vault lookup plugin or Vault agent instead of CLI calls"
    no_ansible_remediation: true
    cwe: ["CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "vault_policy_manipulation"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Vault Policy Manipulation"
    description: "Creates or modifies Vault policies from a playbook, potentially granting unauthorized access"
