  # -- Modern IAM / Identity Attack Surface -----------------------------------

  - id: "aws_imds_v1_enabled"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "EC2 Instance Metadata Service v1 (IMDSv1) Allowed"
    description: "Creates or modifies an EC2 instance / launch template with HttpTokens=optional (IMDSv1), which permits unauthenticated SSRF-style credential theft against the 169.254.169.254 metadata endpoint. This is the Capital One 2019 breach primitive - any SSRF or file-read bug in a workload running on such an instance yields the instance-profile credentials."
    regex: "(?:http_tokens|HttpTokens)\\s*[:=]\\s*[\"']?optional[\"']?|metadata_options\\s*:[\\s\\S]{0,200}http_tokens\\s*:\\s*[\"']?optional[\"']?|MetadataOptions\\s*=\\s*\\{[^}]*HttpTokens[^}]*optional"
    positive_examples:
      - |2-
        metadata_options:
                  http_endpoint: enabled
                  http_tokens: optional
    recommendation: "Require IMDSv2 by setting HttpTokens=required (community.aws.ec2_instance metadata_options.http_tokens: required). Organizations can enforce this fleet-wide via SCP `ec2:MetadataHttpTokens` condition. Set http_put_response_hop_limit=1 so containers cannot reach IMDS."
    cwe: ["CWE-290", "CWE-918"]
    owasp_appsec: ["A07:2021", "A10:2021"]
    mitre_attack: ["T1552.005"]
    cis_controls: ["CIS-3.10", "CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "aws_iam_policy_wildcard_action"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "IAM Policy Grants Wildcard Action on Wildcard Resource"
    description: "Inline or managed IAM policy document contains Statement with Effect=Allow and Action=\"*\" (or a service-level wildcard like \"iam:*\") combined with Resource=\"*\". This is effectively a grant of all permissions - any principal holding it becomes an account administrator."
    regex: "(?:Effect\\s*:\\s*[\"']?Allow[\"']?[\\s\\S]{0,400}Action\\s*:\\s*[\"']?\\*[\"']?[\\s\\S]{0,400}Resource\\s*:\\s*[\"']?\\*[\"']?|Action\\s*:\\s*\\[[\"']\\*[\"']\\][\\s\\S]{0,400}Resource\\s*:\\s*\\[[\"']\\*[\"']\\])"
    positive_examples:
      - |2
        Statement:
          - Effect: Allow
            Action: "*"
            Resource: "*"
    recommendation: "Enumerate the minimum required actions and resources; use `aws iam simulate-principal-policy` to validate. Attach an explicit permission boundary to cap blast radius. Prefer AWS managed policies + service-linked roles over hand-written wildcards."
    cwe: ["CWE-269", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1098.003", "T1484.002"]
    cis_controls: ["CIS-3.3", "CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "aws_iam_trust_policy_public"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "IAM Role Trust Policy Open to Public Principal"
    description: "AssumeRolePolicyDocument / trust policy has Principal=\"*\" or Principal={\"AWS\":\"*\"} without a restrictive Condition block. Any AWS account (including attackers) can assume the role and obtain temporary credentials for whatever it permits."
    regex: "(?:AssumeRolePolicyDocument|assume_role_policy(?:_document)?|trust_policy)[\\s\\S]{0,600}Principal\\s*:\\s*(?:\"?\\*\"?|\\{\\s*\"?AWS\"?\\s*:\\s*\"?\\*\"?\\s*\\})(?![\\s\\S]{0,300}Condition)"
    positive_examples:
      - "AssumeRolePolicyDocumentPrincipal:*"
    recommendation: "Scope Principal to a specific AWS account, IAM user/role ARN, or federated identity provider. If cross-account access is needed, add a Condition with `aws:PrincipalOrgID` or a required `sts:ExternalId`. Review trust policies with `aws iam get-role --role-name X`."
    cwe: ["CWE-284", "CWE-287"]
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ["T1078.004", "T1199"]
    cis_controls: ["CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "aws_iam_passrole_wildcard"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "IAM Policy Grants iam:PassRole on Wildcard Resource"
    description: "Policy grants iam:PassRole with Resource=\"*\" (or a broadly-matching wildcard). PassRole lets the holder attach any IAM role to any service resource (EC2, Lambda, ECS, Glue), yielding direct privilege escalation to the powers of the most privileged role in the account."
    regex: "(?:Action\\s*:\\s*[\"']?iam:PassRole[\"']?|Action\\s*:\\s*\\[[\\s\\S]{0,200}[\"']iam:PassRole[\"'][\\s\\S]{0,200}\\])[\\s\\S]{0,400}Resource\\s*:\\s*[\"']?\\*[\"']?"
    positive_examples:
      - "Action:iam:PassRoleResource:*"
    recommendation: "Scope PassRole to specific role ARNs (`arn:aws:iam::*:role/app-worker-*`). Add a `iam:PassedToService` condition to limit which AWS services can receive the role. Audit with `aws iam simulate-principal-policy --action-names iam:PassRole`."
    cwe: ["CWE-269", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1098.003", "T1548.005"]
    cis_controls: ["CIS-3.3", "CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "aws_oidc_trust_policy_weak"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "OIDC / Web-Identity Trust Policy Missing Subject Condition"
    description: "IAM role trust policy federates an OIDC provider (GitHub Actions, Cognito, EKS IRSA, GitLab OIDC) but the Condition block does not pin `sub` (repository/workflow/namespace) and/or `aud`. Attackers with any workload using that IdP - including public forks or arbitrary repos - can mint a token and assume this role."
    regex: "(?:Federated\\s*:\\s*[\"'][^\"']*(?:token\\.actions\\.githubusercontent\\.com|cognito-identity\\.amazonaws\\.com|gitlab\\.com|oidc\\.eks)[^\"']*[\"']|AssumeRoleWithWebIdentity)(?![\\s\\S]{0,600}(?:StringEquals|StringLike)[\\s\\S]{0,200}(?::sub|:aud))"
    positive_examples:
      - |2-
        Kubernetes authenticates with Route53 using AssumeRoleWithWebIdentity
                                                  by passing a bound ServiceAccount token.
    recommendation: "Add a `StringEquals` or `StringLike` condition on `token.actions.githubusercontent.com:sub` (e.g. `repo:acme/infra:ref:refs/heads/main`) and `:aud` (sts.amazonaws.com). For Cognito, pin `cognito-identity.amazonaws.com:amr`. Never leave an OIDC trust policy with only a Federated principal and no sub/aud condition."
    cwe: ["CWE-284", "CWE-287"]
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ["T1199", "T1550.001"]
    cis_controls: ["CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "aws_s3_block_public_access_disabled"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "S3 Block Public Access Disabled or Bucket ACL Public"
    description: "Creates or updates an S3 bucket with Block Public Access disabled (BlockPublicAcls=false, IgnorePublicAcls=false, BlockPublicPolicy=false, or RestrictPublicBuckets=false), or sets a public bucket/object ACL (public-read, public-read-write, authenticated-read). This re-enables the data-exfiltration path that BPA exists to prevent."
    regex: "(?:public_access_block_configuration\\s*:[\\s\\S]{0,400}(?:BlockPublicAcls|IgnorePublicAcls|BlockPublicPolicy|RestrictPublicBuckets)\\s*:\\s*[\"']?false[\"']?|(?:BlockPublicAcls|IgnorePublicAcls|BlockPublicPolicy|RestrictPublicBuckets)\\s*=\\s*false|(?:acl|ACL|canned_acl)\\s*[:=]\\s*[\"']?(?:public-read|public-read-write|authenticated-read)[\"']?)"
    positive_examples:
      - "acl: public-read"
    recommendation: "Keep all four Block Public Access settings = true at both the account and bucket level (aws s3api put-public-access-block). Use presigned URLs or CloudFront+OAC for legitimate public distribution. Enable `aws_s3_bucket_ownership_controls: BucketOwnerEnforced` to disable ACLs entirely."
    cwe: ["CWE-200", "CWE-732"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]
    mitre_attack: ["T1530", "T1580"]
    cis_controls: ["CIS-3.3", "CIS-3.11"]
    nist_controls: ['AC-3', 'AC-6', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.3', 'CC6.7']

  - id: "gcp_iam_binding_all_users"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "GCP IAM Binding to allUsers or allAuthenticatedUsers"
    description: "Binds a GCP IAM role to `allUsers` (the entire internet) or `allAuthenticatedUsers` (any Google account holder). This is the GCP equivalent of a public S3 bucket and grants the bound role's permissions - often roles/storage.objectViewer, roles/viewer, or worse - to anonymous/any callers."
    regex: "(?:gcloud\\s+(?:projects|organizations|folders|(?:iam\\s+service-accounts))\\s+(?:add-iam-policy-binding|set-iam-policy)[\\s\\S]{0,400}--member\\s*=?\\s*[\"']?(?:allUsers|allAuthenticatedUsers)|google_(?:project|folder|organization|storage_bucket|pubsub_topic|cloud_run_service)_iam_(?:binding|member|policy)[\\s\\S]{0,400}member(?:s)?\\s*[:=]\\s*[\\[\"']?(?:allUsers|allAuthenticatedUsers))"
    positive_examples:
      - "gcloud projects add-iam-policy-binding--memberallUsers"
    recommendation: "Never grant roles to allUsers or allAuthenticatedUsers on production projects. Enable the `iam.allowedPolicyMemberDomains` Organization Policy constraint to block these bindings at the org level. For public content, use signed URLs or Cloud CDN."
    cwe: ["CWE-284", "CWE-732"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1098.003", "T1530"]
    cis_controls: ["CIS-3.3", "CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "azure_rbac_owner_broad_scope"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Azure RBAC Owner Role Assigned at Subscription or Management Group Scope"
    description: "Assigns the Owner (or User Access Administrator / Contributor) built-in role at a subscription or management-group scope. Owner has full control over all resources AND the ability to delegate access, making it the Azure equivalent of AWS AdministratorAccess. Assigning it at /subscriptions/<id> or /providers/Microsoft.Management/managementGroups/<id> creates a tenant-wide blast radius."
    regex: "(?:az\\s+role\\s+assignment\\s+create[\\s\\S]{0,400}--role\\s+[\"']?(?:Owner|User Access Administrator|Contributor)[\"']?[\\s\\S]{0,400}--scope\\s+[\"']?(?:/subscriptions/[^\"'/\\s]+/?|/providers/Microsoft\\.Management/managementGroups/)|azure\\.azcollection\\.azure_rm_roleassignment\\s*:[\\s\\S]{0,400}role_definition_(?:id|name)\\s*:\\s*[\"']?(?:Owner|User Access Administrator|Contributor)[\"']?[\\s\\S]{0,400}scope\\s*:\\s*[\"']?(?:/subscriptions/|/providers/Microsoft\\.Management/managementGroups/))"
    positive_examples:
      - "az role assignment create--role Owner--scope /subscriptions/x"
    recommendation: "Scope Owner assignments to a specific resource group or resource, never a subscription or management group. Use Privileged Identity Management (PIM) for time-bound, approval-required Owner grants. Prefer a custom role scoped to the actual required actions over the built-in Owner."
    cwe: ["CWE-269", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1078.004", "T1098.003"]
    cis_controls: ["CIS-5.4", "CIS-6.8"]
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  # -- Workload-identity federation misconfig (2025-2026) -------------------

  - id: "aws_sso_admin_permission_set"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "AWS IAM Identity Center (SSO) Permission Set Grants AdministratorAccess"
    description: "A task provisions an AWS SSO permission set whose `ManagedPolicies` include `arn:aws:iam::aws:policy/AdministratorAccess` or `PowerUserAccess` and assigns it to a broad group (`Everyone`, `All Users`, `AWS-Developers`). Because SSO assignments propagate to every account in the org, a single over-broad permission set silently grants admin on hundreds of AWS accounts."
    regex: "(?:community\\.aws\\.sso_permission_set|aws\\s+sso-admin\\s+create-permission-set|CustomerManagedPolicyReferences|ManagedPolicies)[\\s\\S]{0,500}?arn:aws:iam::aws:policy/(?:AdministratorAccess|PowerUserAccess)\\b"
    positive_examples:
      - "community.aws.sso_permission_setarn:aws:iam::aws:policy/AdministratorAccess"
    multiline: true
    window: 30
    recommendation: "Create scoped permission sets (e.g. `EC2-Operator`, `S3-ReadOnly-AuditTeam`). Use AWS-managed policies as a starting point but override with inline session policies or a permissions boundary. Require MFA + break-glass workflow for AdministratorAccess; assign per-account rather than org-wide via Identity Center groups + account-assignment automation."
    cwe: ["CWE-269", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1078.004", "T1098.003"]
    cis_controls: ["CIS-6.1", "CIS-6.8"]
    nist_controls: ["AC-3", "AC-6", "AC-6(1)"]
    pci_dss: ["7.2.1", "7.2.2"]
    soc2: ["CC6.1", "CC6.3"]

  - id: "eks_oidc_unverified_thumbprint"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "EKS / IAM OIDC Provider With Missing or Stale Thumbprint"
    description: "A task creates an `aws_iam_openid_connect_provider` (via community.aws.iam_managed_policy or boto3) without setting `ThumbprintList`, with a placeholder value (`'0000000000000000000000000000000000000000'`), or with a thumbprint that is not the published EKS root CA thumbprint for the cluster region. With an unverified thumbprint, an attacker who compromises the OIDC issuer's CA can mint tokens for the IRSA-bound roles - effectively cluster-to-cloud lateral movement."
    regex: "(?:aws_iam_openid_connect_provider|iam_openid_connect_provider|aws\\s+iam\\s+create-open-id-connect-provider)[\\s\\S]{0,800}?(?:ThumbprintList|thumbprint_list|--thumbprint-list)\\s*[:=]?\\s*(?:\\[\\s*\\]|\\[\\s*['\"]?0{40}['\"]?\\s*\\]|null|~|'')"
    positive_examples:
      - "aws_iam_openid_connect_providerThumbprintList[]"
    multiline: true
    window: 30
    recommendation: "Always set `ThumbprintList` to the current EKS OIDC root CA thumbprint. Automate rotation: AWS provides `aws eks describe-cluster --query 'cluster.identity.oidc.issuer'` + openssl to compute the thumbprint. Better: enable EKS Pod Identity (launched 2023) which doesn't require a customer-managed OIDC provider at all."
    cwe: ["CWE-295", "CWE-345"]
    owasp_appsec: ["A07:2021", "A08:2021"]
    owasp_asvs: [V12.3.4]
    mitre_attack: ["T1528", "T1550.001"]
    cis_controls: ["CIS-6.1"]
    nist_controls: ["IA-5", "SC-8", "SC-12"]
    pci_dss: ["8.6.2"]
    soc2: ["CC6.1", "CC6.6"]

  - id: "gke_workload_identity_broad_ksa_binding"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "GKE Workload Identity Binds KSA To Broadly-Scoped GSA"
    description: "A task binds a Kubernetes ServiceAccount to a Google Service Account using `roles/iam.workloadIdentityUser` where the GSA has `roles/owner`, `roles/editor`, or `roles/iam.serviceAccountTokenCreator` at project/folder/org scope. Any pod that mounts the KSA silently inherits owner-level access to the whole project - a single compromised container becomes a full GCP takeover primitive."
    regex: "(?:google\\.cloud\\.gcp_iam_service_account_key|gcloud\\s+iam\\s+service-accounts\\s+add-iam-policy-binding|gcp_service_account_iam)[\\s\\S]{0,600}?(?:role\\s*[:=]\\s*['\"]?(?:roles/(?:owner|editor|iam\\.serviceAccountTokenCreator)))"
    positive_examples:
      - "google.cloud.gcp_iam_service_account_keyrole:roles/owner"
    multiline: true
    window: 25
    recommendation: "Create per-workload GSAs with least-privilege roles (`roles/storage.objectViewer` scoped to one bucket, not project-level). Never grant `roles/owner` or `roles/editor` to a KSA binding. Use GKE Workload Identity federation (not per-node service account impersonation). Audit via `gcloud projects get-iam-policy` + `gcloud iam service-accounts get-iam-policy`."
    cwe: ["CWE-269", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1078.004", "T1098.003"]
    cis_controls: ["CIS-6.1", "CIS-K8s-5.1.5"]
