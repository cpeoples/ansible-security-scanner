  - id: "aws_sts_assumerole_empty_external_id"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS Cross-Account AssumeRole Trust Policy Without sts:ExternalId Condition"
    description: "A task creates an IAM role with `\"Action\": \"sts:AssumeRole\"` and `\"Principal\": { \"AWS\": \"arn:aws:iam::<different-account>:root\" }` (or any cross-account ARN) WITHOUT a `\"Condition\": { \"StringEquals\": { \"sts:ExternalId\": \"...\" } }` block. Missing `sts:ExternalId` on a cross-account assume-role is the canonical Confused-Deputy primitive (AWS SRA Pillar 2 finding, 2024 AWS Well-Architected Security Tool default alarm): any third-party SaaS that knows your account ID + role name can assume the role from any of their customers' tenants, not just yours."
    regex: "\"Action\"\\s*:\\s*\"sts:AssumeRole\"[\\s\\S]{0,400}?\"Principal\"\\s*:\\s*\\{[^}]*\"AWS\"\\s*:\\s*\"arn:aws:iam::\\d{12}:(?:root|user/|role/)[^\"]*\"(?![\\s\\S]{0,1500}sts:ExternalId)"
    multiline: true
    window: 40
    positive_examples:
      - |2
        Statement:
