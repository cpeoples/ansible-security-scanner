    severity: "HIGH"
    title: "Okta Sign-On Policy Rule With Zero Factor Requirement Or Network Zone = Anywhere For Admin Apps"
    description: "A task renders an Okta Sign-On policy (`okta policies create`, `okta.okta_api` custom module, or the `/api/v1/policies/<id>/rules` Okta Management API) whose rule has `actions.signon.requireFactor: false`, `actions.signon.factorRequirement: []` (empty), or `conditions.network.connection: ANYWHERE` - applied to a group with admin privileges or to the Okta Console app itself. Zero-factor sign-on to Okta Admin + ANYWHERE network zone = password-spray-compromised admin account becomes unrestricted Okta tenant takeover (the exact Scattered Spider 2022-2024 attack chain on MGM, Caesars, Clorox)."
    regex: "(?:okta[_-]policy|okta\\.okta_api|/api/v1/policies/[^/\\s]+/rules|policies/policy_rule)[\\s\\S]{0,800}?(?:actions\\s*:[\\s\\S]{0,300}?signon[\\s\\S]{0,300}?(?:requireFactor\\s*:\\s*false|factorRequirement\\s*:\\s*\\[\\s*\\]|access\\s*:\\s*['\"]?ALLOW['\"]?[\\s\\S]{0,200}?requireFactor\\s*:\\s*false)|conditions\\s*:[\\s\\S]{0,500}?network\\s*:[\\s\\S]{0,200}?connection\\s*:\\s*['\"]?ANYWHERE['\"]?[\\s\\S]{0,500}?groups?\\s*:[\\s\\S]{0,200}?(?:Admin|SuperUser|Everyone|Owner))"
    positive_examples:
      - "okta_policyactions:signonrequireFactor:false"
    multiline: true
    window: 60
    recommendation: "Every Okta Sign-On policy rule applied to an admin group MUST: (1) set `actions.signon.requireFactor: true` with `factorRequirement` including at least one phishing-resistant factor (`FIDO2`, `WebAuthn`, `YubiKey`), (2) pin `conditions.network.connection: ZONE` with a specific corporate-IP zone (never `ANYWHERE`), (3) set `actions.signon.session.maxSessionLifetimeMinutes ≤ 480`, (4) require `actions.signon.session.usePersistentCookie: false`. Audit existing rules via `okta policies list --type OKTA_SIGN_ON` -> for each policy, `okta policies rules list <policy-id>` and red-flag any rule with `requireFactor=false` OR `network=ANYWHERE` on an admin group."
    cwe: ['CWE-287', 'CWE-306', 'CWE-308']
