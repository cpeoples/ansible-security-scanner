    title: "Azure Privileged Role Assigned As Permanent Instead Of PIM-Eligible"
    description: "A task runs `New-AzRoleAssignment`, `az role assignment create`, or `azure.azcollection.azure_rm_roleassignment` with a privileged role (`Owner`, `Contributor`, `User Access Administrator`, `Global Administrator`, `Privileged Role Administrator`, `Application Administrator`) granted permanently - i.e. without going through Privileged Identity Management (`Open-AzureADMSPrivilegedRoleAssignmentRequest` / `New-AzRoleAssignmentScheduleRequest` with `RequestType: AdminAssign` + `ScheduleInfo` bounded). Permanent admin roles violate the Zero-Trust just-in-time principle and were the single largest attack-surface finding in the 2024 Microsoft State of Multicloud Risk report."
    regex: "(?:New-AzRoleAssignment|az\\s+role\\s+assignment\\s+create|azure\\.azcollection\\.azure_rm_roleassignment|azurerm_role_assignment)[\\s\\S]{0,500}?(?:--role\\s+|role_definition_name\\s*[:=]\\s*['\"]?|RoleDefinitionName\\s*=\\s*['\"]?)['\"]?(?:Owner|Contributor|User\\s+Access\\s+Administrator|Global\\s+Administrator|Privileged\\s+Role\\s+Administrator|Application\\s+Administrator)(?![\\s\\S]{0,1500}(?:New-AzRoleAssignmentScheduleRequest|RequestType\\s*[:=]\\s*AdminAssign|PrivilegedRoleAssignment|AssignmentType\\s*[:=]\\s*Eligible))"
