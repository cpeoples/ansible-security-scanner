  - id: "azure_nsg_inbound_ssh_rdp_from_internet"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Azure NSG Inbound Rule Allows SSH/RDP From 0.0.0.0/0 Or Internet Service Tag"
    description: "A task creates/updates an Azure Network Security Group rule (`azure.azcollection.azure_rm_securitygroup`, `azurerm_network_security_rule`, `az network nsg rule create`) with `direction: Inbound`, `access: Allow`, and `source_address_prefix: *` / `0.0.0.0/0` / `Internet` / `Any`, combined with `destination_port_range: 22` / `3389` (or ranges containing them). This exposes Windows RDP or Linux SSH to the entire internet - immediately subject to unauthenticated password-spray from the >10M-IP scanning infrastructure documented by GreyNoise/Shodan. Azure Defender for Cloud's `Just-in-time VM access` feature exists specifically to replace this - its absence means 24/7 exposure. Storm-0501, Akira (2024), and Black Basta (2024-2025) consistently cite open RDP as initial-access vector in Mandiant/CrowdStrike quarterly threat reports."
    regex: "(?:azure\\.azcollection\\.azure_rm_securitygroup|azurerm_network_security_rule|az\\s+network\\s+nsg\\s+rule\\s+(?:create|update))[\\s\\S]{0,1000}?(?:direction\\s*[:=]\\s*['\"]?Inbound|--direction\\s+Inbound)[\\s\\S]{0,600}?(?:access|--access)\\s*[:= ]\\s*['\"]?Allow[\\s\\S]{0,400}?(?:source_address_prefix|--source-address-prefix)\\s*[:= ]\\s*['\"]?(?:\\*|0\\.0\\.0\\.0/0|Internet|Any)['\"]?[\\s\\S]{0,400}?(?:destination_port_range|--destination-port-range[s]?)\\s*[:= ]\\s*['\"]?(?:[*0-9,-]*(?:\\b(?:22|3389)\\b|[0-9]+-[0-9]+))['\"]?"
    positive_examples:
      - "azure.azcollection.azure_rm_securitygroupdirection:Inboundaccess:Allowsource_address_prefix:*destination_port_range:22"
    multiline: true
    window: 50
    recommendation: "Never allow 0.0.0.0/0 inbound on 22/3389. For admin access, use Azure Bastion (`Microsoft.Network/bastionHosts`) - TLS-terminated SSH/RDP through the Azure portal with no public IP on the VM. For automation, use Azure Arc + agent-initiated connectivity (no inbound firewall changes). For break-glass, use Just-in-Time VM Access (`Microsoft.Security/locations/jitNetworkAccessPolicies`) which opens the port only for 3 hours with source-IP restriction. Enforce via Azure Policy `[Preview] Management ports should be closed on your virtual machines` (id `22730e10-96f6-4aac-ad84-9383d35b5917`) with `Deny` effect. Audit: `az network nsg rule list --nsg-name <nsg> --query \"[?access=='Allow' && direction=='Inbound' && (sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0/0' || sourceAddressPrefix=='Internet')]\"`. Rotate any VM admin credentials that were ever exposed + enable Azure AD login for VMs."
    cwe: ['CWE-284', 'CWE-306', 'CWE-862']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1078.004', 'T1133', 'T1190']
    cis_controls: ['CIS-3.3', 'CIS-4.4', 'CIS-12.6']
    nist_controls: ['AC-3', 'AC-4', 'SC-7']
    pci_dss: ['1.3.1', '1.3.2', '2.2.1']
    hipaa: ['164.308(a)(4)', '164.312(a)(1)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "gcp_compute_firewall_ssh_rdp_open_to_world"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "GCP Compute Firewall Rule Allows SSH/RDP Ingress From 0.0.0.0/0"
    description: "A task creates a GCP VPC firewall rule (`google_compute_firewall` Terraform, `google.cloud.gcp_compute_firewall`, `gcloud compute firewall-rules create`) with `direction: INGRESS`, `source_ranges: 0.0.0.0/0`, and `allowed.ports` containing `22` or `3389`. Identical internet-exposure risk to the Azure rule. GCP's own Security Command Center lists `Open SSH Port` / `Open RDP Port` as category `OPEN_SSH_PORT` / `OPEN_RDP_PORT` findings. Default VPC in new GCP projects ships with a `default-allow-ssh` rule that allows `0.0.0.0/0 -> 22` - the single most common GCP misconfiguration finding per Google Cloud's 2024 security-posture report."
    regex: "(?:google_compute_firewall|google\\.cloud\\.gcp_compute_firewall|gcloud\\s+compute\\s+firewall-rules\\s+create)[\\s\\S]{0,1500}?(?:direction\\s*[:=]\\s*['\"]?(?:INGRESS|ingress)['\"]?)[\\s\\S]{0,600}?(?:source_ranges|--source-ranges)\\s*[:= ][\\s\\S]{0,200}?['\"]?0\\.0\\.0\\.0/0['\"]?[\\s\\S]{0,800}?(?:ports?|--rules|--allow)[\\s\\S]{0,200}?['\"]?(?:22|3389)['\"]?|(?:source_ranges|--source-ranges)\\s*[:= ][\\s\\S]{0,200}?['\"]?0\\.0\\.0\\.0/0['\"]?[\\s\\S]{0,800}?(?:allow|tcp:22|tcp:3389|ports?)[\\s\\S]{0,200}?['\"]?(?:22|3389)['\"]?"
    multiline: true
