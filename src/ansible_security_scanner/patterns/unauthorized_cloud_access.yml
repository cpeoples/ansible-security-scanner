  - id: "aws_iam_pass_role_wildcard_to_compute_service"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "IAM policy grants iam:PassRole '*' to EC2/Lambda/ECS/SageMaker (privilege escalation)"
    description: "A task renders an IAM policy granting `iam:PassRole` on `Resource: '*'` to principals that can launch compute (ec2.amazonaws.com, lambda.amazonaws.com, ecs-tasks.amazonaws.com, sagemaker.amazonaws.com, glue.amazonaws.com, cloudformation.amazonaws.com) - the canonical AWS privilege-escalation primitive (documented by Rhino Security Labs as `iam_PassExistingRoleToNewLambdaThenInvoke` and 20+ variants). Any user with this permission can pass an arbitrary admin role to a new compute resource they control, then assume full admin within seconds. Listed in every major cloud-security benchmark (CIS AWS 1.5 §1.16, AWS IAM Access Analyzer, Wiz CNAPP top findings 2024)."
    regex: "(?:\"Action\"\\s*:\\s*(?:\\[[^\\]]*?\"iam:PassRole\"[^\\]]*?\\]|\"iam:PassRole\")[\\s\\S]{0,400}?\"Resource\"\\s*:\\s*(?:\\[\\s*\")?\\*\"?|Action\\s*:\\s*(?:-\\s*)?iam:PassRole[\\s\\S]{0,200}?Resource\\s*:\\s*['\"]?\\*['\"]?)"
    positive_examples:
      - '"Action":["iam:PassRole"]"Resource":*'
    multiline: true
    window: 40
    recommendation: "Never grant `iam:PassRole` on `Resource: '*'`. Scope it explicitly to the ARNs of pre-approved service roles: `Resource: ['arn:aws:iam::<acct>:role/lambda-exec-*', 'arn:aws:iam::<acct>:role/ecs-task-*']` and add `Condition: { StringEquals: { 'iam:PassedToService': ['lambda.amazonaws.com'] } }` so the role can only be passed to the intended service. Separately, put a permissions-boundary on every developer role that caps the roles they can create/pass (prevents `iam:CreateRole` + `PassRole` chained escalation). Audit existing grants with AWS IAM Access Analyzer 'external access' + 'unused access' findings; detect privilege escalation attempts with CloudTrail + GuardDuty `IAMUser/AnomalousBehavior.PassRoleGrantedAdministrativeAccess`."
    cwe: ['CWE-266', 'CWE-269', 'CWE-732']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1078.004', 'T1098.003', 'T1548.005']
