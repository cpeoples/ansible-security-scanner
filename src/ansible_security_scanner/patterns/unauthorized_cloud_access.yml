  - id: "azure_subnet_without_network_security_group"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "Azure Subnet Created Without Associated Network Security Group"
    description: "An `azure.azcollection.azure_rm_subnet` task creates a subnet without a `network_security_group:` reference (and no task later binds an NSG via `azure_rm_networkinterface` at the NIC level - which is the inferior alternative). Without an NSG on the subnet, ALL traffic between workloads on the subnet and between peered VNets flows unrestricted, violating zero-trust east-west segmentation. Microsoft Defender for Cloud scores this as a 'Secure Score' degrader."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_subnet\\s*:\\s*\\n(?:(?!network_security_group\\s*:)[\\s\\S]){0,1500}?(?:^\\s*state\\s*:\\s*present|^\\s*name\\s*:)(?:(?!network_security_group\\s*:|^\\s*- name:|^-\\s*name:)[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
