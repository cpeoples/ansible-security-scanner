  - id: "snowflake_user_created_without_mfa_or_external_oauth"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Snowflake user created with password auth and no MFA / network policy"
    description: "A task creates a Snowflake user (via `CREATE USER`, `snowflake.snowflake_cli`, `community.general.snowflake_user`, or SQL) with `PASSWORD = '...'` but WITHOUT a subsequent `ALTER USER ... SET MUST_CHANGE_PASSWORD + MFA` or `RSA_PUBLIC_KEY` assignment, and without a `NETWORK_POLICY`. This is the exact mis-configuration exploited in the June 2024 Snowflake customer campaign (UNC5537, Mandiant) that compromised 165+ Snowflake customers (Ticketmaster, Santander, AT&T, Advance Auto Parts) - attackers used infostealer-harvested credentials because MFA was not enforced at the tenant or user level. Snowflake now *requires* MFA for all password sign-ins as of Nov 2025 but many deployed Ansible playbooks predate that."
    regex: "CREATE\\s+USER\\s+[^\\s;]+(?:\\s+WITH)?[\\s\\S]{0,300}?PASSWORD\\s*=\\s*['\"][^'\"]+['\"](?![\\s\\S]{0,800}?(?:MFA|MUST_CHANGE_PASSWORD|RSA_PUBLIC_KEY|NETWORK_POLICY))|(?:community\\.general\\.snowflake_user|snowflake_user|snowflake_cli_role_user)[\\s\\S]{0,400}?password\\s*[:=]\\s*['\"][^'\"\\n]+['\"](?![\\s\\S]{0,600}?(?:mfa|rsa_public_key|network_policy|must_change_password))"
    positive_examples:
      - |2-
        create user (check mode)
          assert:
            that:
            - win_user_create_result_check is changed
            - win_user_create_result_check.state == 'present'

        - name: test create user
          win_user: name="{{ test_win_user_name }}" password="{{ test_win_user_password }}"
    multiline: true
    window: 20
    recommendation: "Never create Snowflake users with password-only auth. Options: (1) **SSO + MFA** - federate via SAML/SCIM to Okta/Entra/Google, enforce MFA at the IdP, users never get a local Snowflake password; (2) **Key-pair auth** for service accounts - `ALTER USER svc_acct SET RSA_PUBLIC_KEY='<pem>';` and use private-key JWT auth (no passwords, no bearer tokens); (3) if password is unavoidable, IMMEDIATELY set `ALTER USER <u> SET MFA = ENROLL_REQUIRED` and bind a `NETWORK_POLICY` allowlist of CIDRs. At the account level, set `ALTER ACCOUNT SET REQUIRE_MFA_FOR_ALL_USERS = TRUE` (Snowflake 2024.10+). Audit with `SHOW USERS` + `SELECT * FROM snowflake.account_usage.users WHERE has_password AND (mfa_type IS NULL OR disabled)`. Enable Snowflake Trust Center + Anomaly Detection, and monitor `LOGIN_HISTORY` for un-allowlisted client_ip."
    cwe: ['CWE-287', 'CWE-306', 'CWE-308']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1078.004', 'T1110', 'T1556.006']
    cis_controls: ['CIS-6.3', 'CIS-6.5']
    nist_controls: ['AC-17(3)', 'IA-2(1)', 'IA-2(2)']
    pci_dss: ['8.3.1', '8.4.2', '8.5.1']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "entra_conditional_access_excludes_all_users_or_privileged_role"
    category: "unauthorized_cloud_access"
    severity: "CRITICAL"
    title: "Microsoft Entra Conditional Access policy excludes all users, guest, or privileged roles"
    description: "A task creates or updates an Entra ID Conditional Access policy with `excludeUsers: 'All'`, `excludeGroups` containing `All Users`, `excludeRoles` containing `Global Administrator`, or a massive exclusion list that defeats the policy's intent (e.g. an MFA-enforcement policy that excludes break-glass + legacy protocols + service accounts + every admin). The 2024 Midnight Blizzard / Storm-0558 + 2024 Microsoft internal breach post-mortems specifically cite over-broad CA exclusions as the root cause - a single break-glass account with no MFA, combined with password-spray, gave tenant-wide access. Matches `microsoft.graph.conditional_access_policy`, `Update-MgIdentityConditionalAccessPolicy`, and direct Graph REST `POST /identity/conditionalAccess/policies` with overly permissive exclusion blocks."
    regex: "(?:conditional[_-]?access[\\s\\S]{0,400}?|conditionalAccessPolic[yi](?:es)?[\\s\\S]{0,400}?)(?:excludeUsers|excluded_users|ExcludeUsers)\\s*[:=]\\s*(?:\\[\\s*)?['\"]?(?:All|all|\\*)['\"]?(?:\\s*\\])?|(?:excludeRoles|excluded_roles|ExcludeRoles)\\s*[:=]\\s*\\[?[\\s\\S]{0,400}?(?:Global\\s*Administrator|62e90394-69f5-4237-9190-012177145e10|Privileged\\s*Role\\s*Administrator|e8611ab8-c189-46e8-94e1-60213ab1f814|Security\\s*Administrator|194ae4cb-b126-40b2-bd5b-6091b380977d)[\\s\\S]{0,400}?\\]|excludeApplications\\s*[:=]\\s*\\[?[\\s\\S]{0,200}?['\"]?(?:All|all|\\*)['\"]?"
    positive_examples:
      - "conditionalaccessexcludeUsers:All"
    multiline: true
    window: 30
    recommendation: "Conditional Access exclusions must be minimal and audited. Allowed exclusions: (1) exactly TWO break-glass cloud-only accounts (stored in a sealed envelope physical safe, MFA-exempt but protected by a long random password + monitored for any sign-in via a Sentinel rule), (2) Microsoft Entra Connect sync account (by specific UPN, never 'All'), (3) named service accounts - each pinned to a single IP in a companion CA network policy. NEVER exclude 'Global Administrator' from an MFA-required policy. Use 'Report-only' mode when testing new policies rather than broad exclusions. Run the Entra ID 'What If' tool and Microsoft 365 Secure Score 'Require MFA for admins' check regularly. Export the policy set with `Get-MgIdentityConditionalAccessPolicy | Export-Clixml` quarterly and diff against a known-good baseline; alert on any exclusion list growth via Microsoft Sentinel + UEBA."
    cwe: ['CWE-284', 'CWE-288', 'CWE-863']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1078.004', 'T1484.002', 'T1556.006']
    cis_controls: ['CIS-6.5', 'CIS-6.8']
    nist_controls: ['AC-6', 'IA-2(1)', 'IA-2(2)']
    pci_dss: ['8.3.1', '8.4.2', '8.5.1']
