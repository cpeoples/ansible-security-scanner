  - id: "ollama_server_bound_to_public_interface_no_auth"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Ollama / LM Studio / vLLM Server Bound To 0.0.0.0 With No Auth Proxy"
    description: "A task runs `ollama serve` with `OLLAMA_HOST=0.0.0.0:11434` (or `:11434` which binds to all interfaces in Ollama ≤0.1.34), `lms server start --host 0.0.0.0`, `vllm serve ... --host 0.0.0.0`, or renders a systemd unit / Docker compose with `--network=host` for these local-LLM servers. None of these tools ship with authentication - bind-to-public means any TCP client can invoke inference, list models (model-exfil for LoRA fine-tunes containing private data), push arbitrary models (LOAD a weaponized GGUF that triggers memory-corruption in llama.cpp parser - see 2024 CVE-2024-42478 in llama-cpp parser), and consume GPU quota to $$$ cost in cloud. Shodan / Censys report ~20,000 exposed Ollama instances as of 2025 - typical fingerprint `/api/tags` returns JSON with no auth."
    regex: "(?:OLLAMA_HOST\\s*[:=]\\s*['\"]?(?:0\\.0\\.0\\.0|::|\\*)(?::[0-9]+)?['\"]?|OLLAMA_HOST\\s*[:=]\\s*['\"]?:[0-9]+['\"]?|ollama\\s+serve[^\\n]*|lms\\s+server\\s+(?:start|serve)\\s+[^\\n]*?--host\\s+(?:0\\.0\\.0\\.0|\\*)|vllm\\s+serve\\s+[^\\n]*?--host\\s+(?:0\\.0\\.0\\.0|\\*)|(?:text-generation-launcher|text-generation-inference)[^\\n]*?--hostname\\s+(?:0\\.0\\.0\\.0|\\*))"
    positive_examples:
      - "OLLAMA_HOST:0.0.0.0"
    multiline: true
    window: 10
    recommendation: "Bind LLM inference servers to loopback by default: `OLLAMA_HOST=127.0.0.1:11434` / `vllm serve ... --host 127.0.0.1`. For multi-user access, put an authenticating reverse proxy in front: Caddy / Traefik / nginx with `auth_request` -> OIDC (Authelia, Keycloak, Pomerium) or mTLS. For k8s-hosted inference, use a ClusterIP Service + NetworkPolicy restricting ingress to specific namespaces + Istio/Linkerd mTLS mesh. Rate-limit per-user via the proxy (prevent GPU-time exfil). Monitor `/api/tags`, `/api/pull`, `/api/push` endpoints specifically - alerts on `pull` from untrusted source (model-poisoning vector). For Ollama specifically, set `OLLAMA_ORIGINS` to a strict allow-list (default `*` allows any browser to fetch) + upgrade to ≥0.3.0 (CVE-2024-42478 fix). Scan exposure: `curl -s http://<host>:11434/api/tags` - any successful unauthenticated response is a finding."
    cwe: ['CWE-200', 'CWE-284', 'CWE-306']
    cve: ["CVE-2024-42478"]
