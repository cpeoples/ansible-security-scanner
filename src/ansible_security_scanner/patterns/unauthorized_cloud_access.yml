  - id: "aws_efs_filesystem_without_encryption_at_rest"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "AWS EFS Filesystem Without Encryption at Rest (encrypt: false / kms_key_id missing)"
    description: "A `community.aws.efs` task creates an EFS filesystem with `encrypt: false` (or omits both `encrypt:` and `kms_key_id:` - default is `false` for filesystems created via API/SDK before 2022, and remains overridable via Ansible). EFS volumes often back home-directory data, shared-app state, or ML-training scratch - any of which can contain PII, source-code, SSH private keys, or model weights. An attacker with `elasticfilesystem:DescribeMountTargets` + a VPC foothold can mount the share and read everything in plaintext; worse, an AWS-side snapshot copy to a rogue account remains readable without any AWS-to-AWS decryption step."
