  - id: "aws_iam_password_policy_weak_or_missing"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "IAM Account Password Policy Weak or Missing Complexity"
    description: "A `community.aws.iam_password_policy` task sets the account-level IAM password policy with any of: `minimum_password_length` < 14, `require_symbols: false`, `require_numbers: false`, `require_uppercase: false`, `require_lowercase: false`, `password_reuse_prevention` < 24, `max_password_age` > 90, or `hard_expiry: false`. These settings fall below the CIS AWS Foundations benchmark, PCI-DSS v4.0 and NIST 800-63B requirements. IAM console users (typically operators and emergency break-glass accounts) become brute-force-able, and long max-ages enable stolen-credential replay windows."
    regex: "(?ms)community\\.aws\\.iam_password_policy\\s*:[\\s\\S]{0,1500}?(?:minimum_password_length\\s*:\\s*(?:[1-9]|1[0-3])\\b|require_(?:symbols|numbers|uppercase|lowercase)\\s*:\\s*(?:false|False|no|No|0)|password_reuse_prevention\\s*:\\s*(?:[0-9]|1[0-9]|2[0-3])\\b|max_password_age\\s*:\\s*(?:9[1-9]|[1-9][0-9]{2,})\\b|hard_expiry\\s*:\\s*(?:false|False|no|No|0))"
    positive_examples:
      - |2-
        community.aws.iam_password_policy:
            # ...
            require_symbols: false
    multiline: true
    window: 30
    recommendation: "Set the strongest policy your org can tolerate; a modern baseline: `minimum_password_length: 14`, all four `require_*` flags `true`, `password_reuse_prevention: 24`, `max_password_age: 90`, `hard_expiry: true`. Use IAM Identity Center (formerly AWS SSO) federated from your IdP for HUMAN users - most accounts should have ZERO IAM console users, only programmatic service accounts. For emergency break-glass IAM users, use a 20+ char randomly-generated passphrase, MFA hardware token, and detection via CloudTrail `ConsoleLogin` event alerting."
    cwe: ['CWE-262', 'CWE-307', 'CWE-521']
    owasp_appsec: ["A07:2021"]
    mitre_attack: ['T1110.001', 'T1110.003']
    cis_controls: ['CIS-5.2', 'CIS-5.3']
    nist_controls: ['AC-7', 'IA-5(1)']
    pci_dss: ['8.3.6', '8.3.9']
    hipaa: ['164.308(a)(5)(ii)(D)']
    soc2: ['CC6.1']

  - id: "aws_iam_policy_cross_account_assumerole_without_external_id"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "IAM Role Trust Policy Allows Cross-Account AssumeRole Without ExternalId"
    description: "A `community.aws.iam_role` / `amazon.aws.iam_role` / `community.aws.iam_managed_policy` task defines a trust policy (`assume_role_policy_document:` or similar) that grants `sts:AssumeRole` to a foreign AWS account principal (`Principal: {AWS: 'arn:aws:iam::<different-account-id>:root'}` or `Principal: {AWS: <12-digit-id>}`) without a matching `Condition: {StringEquals: {sts:ExternalId: ...}}`. This is the classic 'confused deputy' pitfall - any customer/vendor/third-party to which the foreign account ID is known can assume the role on your behalf."
    regex: "(?ms)(?:amazon\\.aws\\.iam_role|community\\.aws\\.iam_role|community\\.aws\\.iam_managed_policy)\\s*:[\\s\\S]{0,2500}?(?:assume_role_policy_document|AssumeRolePolicyDocument)\\s*:[\\s\\S]{0,2000}?\"?sts:AssumeRole\"?[\\s\\S]{0,500}?\"?Principal\"?\\s*:\\s*\\{[\\s\\S]{0,200}?\"?AWS\"?\\s*:\\s*['\"]?(?:arn:aws:iam::[0-9]{12}:(?:root|user/|role/)|[0-9]{12})(?![\\s\\S]{0,600}?(?:ExternalId|sts:ExternalId))"
    multiline: true
    window: 100
    positive_examples:
      - |2
        - community.aws.iam_role:
            name: cross-account-role
            assume_role_policy_document:
              Statement:
                - Effect: Allow
                  Action: "sts:AssumeRole"
                  Principal: { "AWS": "arn:aws:iam::123456789012:root" }
    recommendation: "When a trust policy allows a foreign AWS account to assume a role, ALWAYS include `Condition: {StringEquals: {'sts:ExternalId': '<unique-random-value-per-integration>'}}`. Generate the ExternalId as a long random UUID per customer and store it outside the role's trust policy (in a shared vault with the customer). Additionally scope the trust `Principal` to the specific IAM user/role ARN (not `:root`) whenever feasible: `Principal: {AWS: 'arn:aws:iam::111111111111:role/CustomerAutomation'}`. See AWS docs: 'The confused deputy problem' + 'How to use an external ID when granting access to your AWS resources to a third party'."
    cwe: ['CWE-284', 'CWE-441', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1078.004', 'T1134.003']
    cis_controls: ['CIS-5.4', 'CIS-6.8']
    nist_controls: ['AC-3', 'AC-6', 'IA-2']
    pci_dss: ['7.1.2', '7.2.4']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "aws_iam_policy_attached_directly_to_user"
    category: "unauthorized_cloud_access"
    severity: "MEDIUM"
    title: "IAM Policy Attached Directly to User (Group-Based Assignment Bypassed)"
    description: "A `community.aws.iam_user` / `amazon.aws.iam_user` / `community.aws.iam_policy` task attaches a managed policy or inline policy directly to an IAM user (`managed_policy: [...]`, `policy_name:` with `iam_type: user` in the old API). CIS AWS Foundations 1.15 requires that privileges be granted to IAM GROUPS (then users added to groups), not to users directly, because direct attachments (a) bypass group-membership-based auditing, (b) create orphaned permissions when users are deleted piecemeal, and (c) make bulk-permission-changes error-prone."
    regex: "(?ms)community\\.aws\\.iam_policy\\s*:[\\s\\S]{0,1500}?iam_type\\s*:\\s*['\"]?user['\"]?"
    positive_examples:
      - |2-
        community.aws.iam_policy:
            iam_type: user
    multiline: true
    window: 40
    recommendation: "Attach permissions to IAM groups and make users members of groups. For example: `community.aws.iam_group: name: Developers` + `managed_policy: [arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess]` then `community.aws.iam_user: groups: [Developers]`. Migrate existing user-attached policies with: `for u in $(aws iam list-users --query 'Users[*].UserName' --output text); do aws iam list-attached-user-policies --user-name $u; done`. Long-term, migrate IAM human users to AWS Identity Center federation where permissions flow via permission sets tied to groups in the IdP."
    cwe: ['CWE-284', 'CWE-653', 'CWE-732']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1098.001']
    cis_controls: ['CIS-5.4', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'AC-6']
    pci_dss: ['7.1.2', '7.2.1']
    hipaa: ['164.308(a)(4)(ii)(C)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "azure_cosmosdb_network_ip_filter_wide_open"
    category: "unauthorized_cloud_access"
    severity: "HIGH"
    title: "Azure Cosmos DB Account IP Allowlist 0.0.0.0-255.255.255.255 (Publicly Accessible)"
    description: "An `azure.azcollection.azure_rm_cosmosdbaccount` task sets `ip_range_filter: ''` (empty = allow all), `ip_range_filter: '0.0.0.0/0'`, `public_network_access: Enabled` without any virtual-network rule, or a filter string containing `0.0.0.0` without matching compensating `is_virtual_network_filter_enabled: true` + a specific VNet ACL. Cosmos DB data-plane is then reachable from any internet IP that possesses a primary/secondary key. Combined with the common mistake of storing Cosmos keys in Git, this is a direct data-exfiltration primitive."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_cosmosdbaccount\\s*:[\\s\\S]{0,2000}?(?:ip_range_filter\\s*:\\s*(?:['\"]{2}|['\"]?0\\.0\\.0\\.0(?:/0|-255\\.255\\.255\\.255)?['\"]?)|public_network_access\\s*:\\s*['\"]?Enabled['\"]?(?![\\s\\S]{0,500}?virtual_network_rules\\s*:\\s*-))"
    positive_examples:
      - "azure.azcollection.azure_rm_cosmosdbaccount:ip_range_filter:''"
    multiline: true
    window: 80
    recommendation: "Always set a narrow `ip_range_filter:` to specific office / VPN CIDRs + `virtual_network_rules:` for Azure-to-Azure traffic. For zero-trust, disable public network access entirely (`public_network_access: Disabled`) and use Private Link (`public_network_access_from_azure_services: false` + `private_endpoint_connections`). Rotate both primary and secondary keys immediately if the account was ever open. Enforce via Azure Policy built-in `ID: 862e97cf-49fc-4a5c-9de4-40d4e2e7c8eb` (Cosmos DB accounts should use private link). Audit: `az cosmosdb show --name $N --resource-group $RG --query ipRules`."
    cwe: ['CWE-284', 'CWE-668', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1213', 'T1530']
