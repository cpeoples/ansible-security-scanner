  - id: "helm_repo_plaintext_http_skip_tls_verify"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Helm Chart Repository Added Over Plaintext HTTP Or With --insecure-skip-tls-verify"
    description: "A task invokes `helm repo add` or `kubernetes.core.helm_repository` with a plaintext `http://` URL, or passes `--insecure-skip-tls-verify` / `validate_certs: false`. Helm chart tarballs are executable templates that can render arbitrary Kubernetes objects (including `ServiceAccount` tokens + `RoleBinding` to `cluster-admin`) - fetching them over HTTP allows a network-in-the-middle to swap the tarball and own the cluster on first `helm install`."
    # The insecure token (``http://``, ``--insecure-skip-tls-verify``,
    # ``validate_certs: false``) must appear on the SAME logical line
    # as the helm command, not 300 chars later in an unrelated task.
    # The previous windowed version matched a safe ``helm repo add X
    # https://...`` followed 15 lines later by an unrelated
    # ``uri: http://localhost:...`` in a different task, producing pure
    # FPs on legitimate installer playbooks that use helm over HTTPS
    # and also hit a local admin endpoint later. Anchor on ``helm repo
    # add`` / ``helm_repository`` and allow only a short
    # same-line / args-block window to the insecure token.
    regex: "helm\\s+repo\\s+add\\s+[^\\n]*?(?:\\s+http://|--insecure-skip-tls-verify)|kubernetes\\.core\\.helm_repository:[^\\n]*\\n(?:[ \\t]+[^\\n]*\\n){0,8}?[ \\t]+(?:url\\s*:\\s*['\"]?http://|validate_certs\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?(?:\\s|$|#))"
    multiline: true
    window: 10
    positive_examples:
      - "    command: helm repo add mychart http://charts.example.com/"
      - "    shell: helm repo add mychart https://charts.example.com/ --insecure-skip-tls-verify"
      - |2-
            kubernetes.core.helm_repository:
              name: mychart
              url: "http://charts.example.com/"
      - |2-
            kubernetes.core.helm_repository:
              name: mychart
              repo_url: https://charts.example.com/
              validate_certs: false
    negative_examples:
      - "    command: helm repo add splunk-otel-collector-chart https://signalfx.github.io/splunk-otel-collector-chart"
      - |2-
            kubernetes.core.helm_repository:
              name: mychart
              url: "https://charts.example.com/"
              validate_certs: true
      - |2-
            command: helm repo add safechart https://charts.example.com/
          - name: other task
            uri:
              url: "http://localhost:8080/foo"
    recommendation: "Always use `https://` URLs and never pass `--insecure-skip-tls-verify`. Prefer OCI-based chart distribution (`helm install oci://ghcr.io/org/chart --version 1.2.3 --verify`) with `--verify` to enforce provenance files signed by a Cosign keyless identity. For Ansible, set `validate_certs: true` on `kubernetes.core.helm_repository`."
    cwe: ['CWE-295', 'CWE-319', 'CWE-494']
    owasp_appsec: ["A02:2021", "A07:2021", "A08:2021"]
    owasp_asvs: [V12.2.1, V12.3.4, V15.2.4]
    mitre_attack: ['T1195.002', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-16.11']
    nist_controls: ['CM-14', 'SC-8', 'SC-12', 'SI-7']
    pci_dss: ['4.2.1', '6.3.2']
    soc2: ['CC6.1', 'CC6.7']

  - id: "postgres_pg_hba_trust_or_weak_md5"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "PostgreSQL pg_hba.conf Allows trust Or Legacy md5 Instead Of scram-sha-256"
    description: "A task renders `/etc/postgresql/*/main/pg_hba.conf` (or a pg_hba.conf under any `postgres` data-dir) with a `host`/`hostssl`/`local` line whose auth method is `trust` (no password at all) or `md5` (cryptographically broken, rainbow-table-able). `trust` on any non-loopback address is the PostgreSQL equivalent of MongoDB's `--noauth`; the `md5` method uses a single-round MD5 of password+username and is the reason the 2024 Postgres CIS benchmark upgraded to requiring `scram-sha-256` on every non-loopback row."
    regex: "^\\s*(?:host|hostssl|hostnossl|local)\\s+\\S+\\s+\\S+\\s+(?!(?:127\\.0\\.0\\.1/32|::1/128|samehost|samenet)\\s)[^\\s#]+\\s+(trust|md5)\\b"
    positive_examples:
      - "host 0 0 x trust"
    multiline: true
    recommendation: "Replace every non-loopback `trust`/`md5` line with `scram-sha-256`. Typical production posture: `hostssl all all 0.0.0.0/0 scram-sha-256` + `hostnossl all all 0.0.0.0/0 reject`. Set `password_encryption = scram-sha-256` in `postgresql.conf` and rotate every user password once (legacy hashes don't auto-upgrade). Reserve `trust` ONLY for `local all postgres peer` and loopback-only initialisation windows."
    cwe: ['CWE-287', 'CWE-327', 'CWE-328']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1078', 'T1110.002']
    cis_controls: ['CIS-3.10', 'CIS-6.5', 'CIS-16.5']
    nist_controls: ['IA-2', 'IA-5', 'SC-8', 'SC-13']
    pci_dss: ['4.2.1', '8.3.1', '8.3.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "mysql_super_grant_or_skip_networking_disabled"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "MySQL SUPER/ALL Grant To Remote Host Or skip_networking Disabled With Public Bind"
    description: "A task issues `GRANT SUPER ... TO '...'@'%'`, `GRANT ALL ... TO '...'@'%'`, or renders `/etc/mysql/mysql.conf.d/mysqld.cnf` / `/etc/my.cnf` with `skip_networking=0` + `bind-address=0.0.0.0` without an explicit `require_secure_transport=ON`. The SUPER privilege is the MySQL equivalent of sudo (bypass `READ_ONLY`, kill any connection, change global variables, load UDF shared objects for RCE) - granting it to `'%'` gives any network attacker one-step database takeover. This is the 2024 Snowflake/MOVEit credential-reuse attack pattern."
    regex: "GRANT\\s+(?:SUPER|ALL(?:\\s+PRIVILEGES)?)[\\s\\S]{0,200}?TO\\s+['\"][^'\"]+['\"]@['\"]%['\"]|(?:skip[-_]networking\\s*=\\s*0\\b|skip[-_]networking\\s*=\\s*OFF\\b)[\\s\\S]{0,200}?bind[-_]address\\s*=\\s*0\\.0\\.0\\.0"
    positive_examples:
      - "GRANT SUPERTO 'x'@'%'"
    multiline: true
    window: 20
    recommendation: "Never grant SUPER (or ALL) to `'%'`. Scope grants to specific host ranges and minimal privileges: `GRANT SELECT, INSERT, UPDATE, DELETE ON app_db.* TO 'app'@'10.1.%'`. For admin accounts, use `'admin'@'10.1.1.5'` with `REQUIRE SSL` and `REQUIRE SUBJECT`. Set `require_secure_transport=ON`, `bind-address=<private-ip>` (never 0.0.0.0 unless explicitly required), and enable audit-log plugin with `audit_log_policy=ALL`."
    cwe: ['CWE-269', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1078', 'T1210', 'T1552.001']
    cis_controls: ['CIS-3.3', 'CIS-5.4', 'CIS-6.8']
    nist_controls: ['AC-3', 'AC-6', 'IA-2', 'SC-8']
    pci_dss: ['7.2.1', '7.2.5', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "mssql_xp_cmdshell_or_sa_enabled"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "MSSQL xp_cmdshell Enabled Or sa Login Re-Activated From Playbook"
    description: "A task runs `sp_configure 'xp_cmdshell', 1`, `RECONFIGURE` with `show advanced options, 1`, or `ALTER LOGIN sa WITH PASSWORD=... ENABLE`. `xp_cmdshell` gives any DBA (or any SQL-injection finding) an instant cmd.exe shell in the SQL Server service account's context (usually `NT SERVICE\\MSSQLSERVER` - a local admin on most installs). Re-enabling the `sa` login re-introduces the #1 lateral-movement target during ransomware campaigns (Clop/TrueBot 2023-2024 Accellion/MOVEit-adjacent targeting)."
    regex: "sp_configure\\s*[,(]?\\s*['\"]xp_cmdshell['\"]\\s*[,)]?\\s*['\"]?1['\"]?|ALTER\\s+LOGIN\\s+sa\\s+WITH\\s+(?:PASSWORD\\s*=\\s*[^\\s]+\\s+)?ENABLE"
    positive_examples:
      - "sp_configure'xp_cmdshell'1"
    recommendation: "Keep `xp_cmdshell` disabled: `EXEC sp_configure 'xp_cmdshell', 0; RECONFIGURE;`. Keep the `sa` login DISABLED and renamed: `ALTER LOGIN sa DISABLE; ALTER LOGIN sa WITH NAME = [renamed_sa];`. Use AD-integrated logins (`CREATE LOGIN [domain\\user] FROM WINDOWS`) with least-privilege server roles. If a DBA genuinely needs OS command execution for maintenance (rare), use SQL Agent with a proxy account bound to a restricted credential, not `xp_cmdshell`."
    cwe: ['CWE-250', 'CWE-284', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]
    mitre_attack: ['T1059', 'T1078', 'T1210']
    cis_controls: ['CIS-3.3', 'CIS-5.4', 'CIS-6.8']
    nist_controls: ['AC-6', 'CM-7', 'SI-4']
    pci_dss: ['2.2.1', '7.2.1', '7.2.5']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "bind_named_conf_open_recursion"
    category: "insecure_communication"
    severity: "HIGH"
    title: "BIND / PowerDNS Open Recursive Resolver On Public Interface"
    description: "A task renders `named.conf` / `named.conf.options` with `recursion yes;` AND `allow-recursion { any; }` (or `allow-query-cache { any; }`) on a bind address that includes a public interface. Open recursive resolvers are the classic DNS amplification-attack reflectors (>50x amplification via DNSSEC-signed ANY-type queries), get your AS listed on DNS-blocklists / Shadowserver, and are the single most common abuse contributor in the 2024 Shadowserver report on exposed DNS services."
    regex: "recursion\\s+yes\\s*;[\\s\\S]{0,400}?allow-(?:recursion|query-cache)\\s*\\{\\s*any\\s*;\\s*\\}|allow-(?:recursion|query-cache)\\s*\\{\\s*any\\s*;\\s*\\}[\\s\\S]{0,400}?recursion\\s+yes\\s*;"
    positive_examples:
      - "recursion yes;allow-recursion{any;}"
    multiline: true
    window: 40
    recommendation: "Split authoritative and recursive roles onto separate servers. On authoritative servers: `recursion no;` and `allow-query-cache { none; };`. On recursive servers: bind only to internal interfaces (`listen-on { 127.0.0.1; 10.0.0.0/8; };`) and `allow-recursion { internal-nets; };` where `internal-nets` is a named ACL scoped to your RFC1918 ranges + explicit remote users. Enable `rate-limit { responses-per-second 10; };` for further DDoS-reflection hardening."
    cwe: ['CWE-284', 'CWE-406']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1071.004', 'T1498.002']
    cis_controls: ['CIS-9.2', 'CIS-13.10']
    nist_controls: ['AC-3', 'SC-5', 'SC-7']
    pci_dss: ['1.2.1', '1.3.1']
    soc2: ['CC6.6', 'CC7.2']

  - id: "istio_peerauthentication_permissive_global"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Istio PeerAuthentication Set To PERMISSIVE (mTLS Downgrade Allowed)"
    description: "A task renders an `Istio` `PeerAuthentication` / `DestinationRule` manifest with `spec.mtls.mode: PERMISSIVE` (or an empty `spec.mtls: {}`) in the `istio-system` namespace or at workload scope. PERMISSIVE mode allows plaintext traffic to co-exist with mTLS on the same port - which means any sidecar-less pod (or any attacker who gets a foothold in the cluster network) can read service-to-service traffic that the mesh was supposed to protect. The 2024 Istio security advisory explicitly calls out PERMISSIVE as a deploy-time finding that should block production rollouts."
    regex: "kind\\s*:\\s*PeerAuthentication[\\s\\S]{0,400}?mtls\\s*:\\s*(?:\\{\\s*\\}|(?:mode\\s*:\\s*PERMISSIVE))|kind\\s*:\\s*DestinationRule[\\s\\S]{0,500}?tls\\s*:\\s*\\{?\\s*mode\\s*:\\s*DISABLE\\s*\\}?"
    positive_examples:
      - "kind:PeerAuthenticationmtls:{}"
    multiline: true
    window: 40
    recommendation: "Set `spec.mtls.mode: STRICT` on a cluster-wide `PeerAuthentication` in `istio-system` as the baseline. Per-workload exceptions should narrow (`STRICT` -> `PORT_LEVEL_MTLS`), never widen (never `PERMISSIVE`). Monitor via `istioctl analyze` in CI and fail the rollout on any `PeerAuthentication` that is not `STRICT`. For gradual migration, roll out `PERMISSIVE` as a transient 24-hour mode only while deploying sidecars, then audit with `istioctl authn tls-check` and flip to `STRICT`."
    cwe: ['CWE-295', 'CWE-319', 'CWE-757']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-13.7']
    nist_controls: ['AC-4', 'SC-8', 'SC-13']
    pci_dss: ['4.2.1', '8.3.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "otel_collector_otlp_endpoint_plaintext_http"
    category: "insecure_communication"
    severity: "HIGH"
    title: "OpenTelemetry Collector Exporter Uses Plaintext HTTP Or insecure: true"
    description: "A task renders an OpenTelemetry Collector `exporters:` section (or an SDK-level `OTEL_EXPORTER_OTLP_ENDPOINT` env-var) pointing at `http://...` rather than `https://...`, or explicitly sets `tls.insecure: true`. Telemetry streams contain distributed-trace HTTP headers, user IDs, IP addresses, prompt content (for LLM workloads), and SQL statements - sending them in the clear turns the telemetry pipeline itself into a passive-surveillance channel for anyone on path. The 2024 OpenTelemetry hardening guide lists TLS-everywhere as the #1 exporter requirement."
    regex: "exporters\\s*:[\\s\\S]{0,800}?(?:endpoint\\s*:\\s*['\"]?http://|tls\\s*:[\\s\\S]{0,100}?insecure\\s*:\\s*(?:true|yes))|OTEL_EXPORTER_OTLP_(?:ENDPOINT|TRACES_ENDPOINT|METRICS_ENDPOINT|LOGS_ENDPOINT)\\s*[:=]\\s*['\"]?http://"
    positive_examples:
      - |2-
        exporters:
            # ...
            endpoint: http://
    multiline: true
    window: 30
    recommendation: "Always use `https://` OTLP endpoints and never set `tls.insecure: true`. Use mutual TLS between the SDK and the collector (`tls.ca_file`, `tls.cert_file`, `tls.key_file`) and pin the collector's server cert to your internal CA. For the collector -> backend hop, use `authenticator` with OIDC client-credentials to the observability vendor. Block plaintext OTLP at the cluster level via a `NetworkPolicy` denying egress on port 4317 / 4318 without the TLS-enabled authenticator."
    cwe: ['CWE-295', 'CWE-319']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-8.1']
    nist_controls: ['AU-9', 'SC-8', 'SC-12']
    pci_dss: ['4.2.1', '10.3.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "prometheus_remote_write_no_auth_or_tls"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Prometheus remote_write Configured Without basic_auth / authorization / tls_config"
    description: "A task renders a Prometheus `remote_write:` block whose `url:` is `http://...` OR is `https://...` without any of `basic_auth`, `authorization`, `bearer_token_file`, `sigv4`, or `oauth2` sub-keys. Prometheus remote_write streams every scraped metric series (memory/CPU, but also application-emitted business metrics with user-IDs, feature-flag tags, and SQL-level cardinality) to the remote endpoint - an unauthenticated endpoint is a metric-exfiltration target that also accepts arbitrary pushes from any network source (Meow-attack class repeated on Mimir/Thanos receivers in 2024)."
    regex: "remote_write\\s*:\\s*[\\s\\S]{0,200}?url\\s*:\\s*['\"]?http://|remote_write\\s*:\\s*[\\s\\S]{0,1500}?url\\s*:\\s*['\"]?https://[^\\n]+(?![\\s\\S]{0,1500}(?:basic_auth|authorization|bearer_token|bearer_token_file|sigv4|oauth2|tls_config))"
    positive_examples:
      - |2-
        remote_write:
                  - url: http://
    multiline: true
    window: 60
    recommendation: "Always use an `https://` URL AND one of: `basic_auth: { username, password_file }`, `authorization: { type: Bearer, credentials_file: }`, or `sigv4:` (for AMP/AWS). Pin the remote server certificate via `tls_config.ca_file` to your internal CA. For multi-tenant setups (Mimir, Cortex, Grafana Cloud), always send the `X-Scope-OrgID` header and enforce it at the receiver. Never point `remote_write` at a cleartext endpoint even on a 'trusted' internal network - the LAN is part of the threat model in the 2024 CISA Zero-Trust memo."
    cwe: ['CWE-287', 'CWE-306', 'CWE-319']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1041']
    cis_controls: ['CIS-3.10', 'CIS-6.5', 'CIS-8.1']
    nist_controls: ['AU-9', 'IA-2', 'SC-8']
    pci_dss: ['4.2.1', '8.3.1', '10.3.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "loki_push_api_auth_disabled_or_no_tenant_enforcement"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Grafana Loki auth_enabled: false Or Gateway Without X-Scope-OrgID Enforcement"
    description: "A task renders a Loki config (`loki-config.yaml`, Helm values, or `LokiStack` CRD) with `auth_enabled: false` AND a gateway / ingress that accepts unauthenticated POSTs to `/loki/api/v1/push`. In multi-tenant mode Loki uses `auth_enabled: true` + `X-Scope-OrgID` header to isolate tenants; disabling auth collapses all tenants into `fake` and allows any caller to inject arbitrary logs (log-injection / evidence tampering) or exfiltrate logs from any tenant they can guess. Seen in 2024 Grafana Cloud tenant-escape research."
    regex: "auth_enabled\\s*:\\s*(?:false|no)\\b(?![\\s\\S]{0,2000}X-Scope-OrgID)|(?:push_api|loki/api/v1/push)[\\s\\S]{0,500}?(?:(?:nginx|envoy|traefik|ingress)[\\s\\S]{0,500}?(?:auth_request|auth_basic|jwt_verify)\\s*(?:off|none|disabled))"
    positive_examples:
      - "http_auth_enabled: false"
    multiline: true
    window: 80
    recommendation: "Set `auth_enabled: true` in every production Loki and front the `/loki/api/v1/push` endpoint with a gateway (`lokiGateway` chart, nginx `auth_basic`, or Envoy JWT filter) that mints / validates the `X-Scope-OrgID` header from an authenticated identity token. Never expose `auth_enabled: false` outside of a local dev `docker compose`. Add a periodic red-team check that issues `curl -H 'X-Scope-OrgID: prod-tenant' https://loki.../loki/api/v1/push -d '{...}'` without a bearer token and alerts on any non-401 response."
    cwe: ['CWE-284', 'CWE-306']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1070.002', 'T1190', 'T1565.001']
    cis_controls: ['CIS-6.5', 'CIS-8.2', 'CIS-8.5']
    nist_controls: ['AC-3', 'AU-9', 'IA-2']
    pci_dss: ['8.3.1', '10.2.1', '10.5.1']
    hipaa: ['164.312(a)(1)', '164.312(b)']
    soc2: ['CC6.1', 'CC7.2']

  - id: "oauth_implicit_grant_response_type_token"
    category: "insecure_communication"
    severity: "HIGH"
    title: "OAuth 2.0 Implicit Grant (response_type=token) Or Hybrid id_token token"
    description: "A task renders application config, SPA bundle, or OIDC-client registration with `response_type=token` or `response_type=id_token token` (implicit flow / hybrid flow). The OAuth 2.0 Security Best Current Practice (RFC 8725 / OAuth 2.1 draft-16) formally deprecates the implicit grant because access tokens are delivered in the URL fragment - landing in browser history, Referer headers, and JS error-reporting payloads. Every 2024 OIDC-provider migration guide (Okta, Auth0, Entra ID) flags implicit flow as a breaking-change-required finding."
    regex: "response_type\\s*[:=]\\s*['\"]?(?:token(?:\\s+id_token|\\s*$|[&'\"])|id_token\\s+token|\\s*token\\s*['\"])"
    positive_examples:
      - "response_type:token id_token"
    recommendation: "Replace implicit flow with Authorization Code + PKCE (`response_type=code` + `code_challenge=<S256-hash>`). For SPAs, use the `@okta/okta-auth-js`, `oidc-client-ts`, or `@azure/msal-browser` libraries which default to Code+PKCE. At the OIDC provider, disable implicit flow in the client application (`grantTypes: ['authorization_code', 'refresh_token']`). Audit existing clients for `response_type=token` usage and rotate any long-lived tokens that were issued via implicit."
    cwe: ['CWE-200', 'CWE-287', 'CWE-598']
    owasp_appsec: ["A01:2021", "A04:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V14.2.2]
    mitre_attack: ['T1528', 'T1539', 'T1550.001']
    cis_controls: ['CIS-6.5', 'CIS-6.8']
    nist_controls: ['IA-2', 'IA-5', 'SC-8']
    pci_dss: ['6.3.2', '8.3.1']
    soc2: ['CC6.1', 'CC6.2']

  - id: "oidc_id_token_signature_verification_disabled"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "OIDC ID-Token Signature Verification Disabled Or JWKS Validation Skipped"
    description: "A task sets `verify_id_token: false`, `skip_jwks_validation: true`, `InsecureSkipVerify: true` on an OIDC client, or passes `--insecure-skip-token-verify` to `kube-apiserver` / `oidc-login`. Skipping ID-token signature verification turns the entire federated-identity chain into a trust-what-you-receive primitive - any attacker who can forge an unsigned JWT (or flip the `alg: none` trick, CVE-2018-1000531 still actively exploited) authenticates as any user they name in the `sub` claim. This is MITRE T1606.001 (Web Cookies) / T1556.006 at the protocol layer."
    regex: "(?:verify_id_token|verify_token|verify_jwt|verify_signature|verify_jwks|validate_id_token|skip_jwks_validation|InsecureSkipTokenVerify)\\s*[:=]\\s*(?:false|no|0|off|disabled)\\b|--insecure-skip-token-verify\\b|--oidc-signing-algs\\s+none\\b"
    positive_examples:
      - "verify_id_token:false"
    recommendation: "Never disable OIDC signature verification. Use a well-maintained OIDC library (`authlib` for Python, `jsonwebtoken` + `jwks-rsa` for Node, `coreos/go-oidc` for Go) that validates: `iss`, `aud`, `exp`, `nbf`, `iat`, `nonce`, signature against the provider's JWKS, and rejects `alg: none` + unknown `alg` values. Pin `JWKS` cache TTL to the provider's recommendation (~10 minutes). For Kubernetes `kube-apiserver`, specify `--oidc-signing-algs=RS256` and NEVER `none`. Rotate any session that was authenticated while verification was off."
    cwe: ['CWE-287', 'CWE-345', 'CWE-347']
    cve: ["CVE-2018-1000531"]
    owasp_appsec: ["A02:2021", "A07:2021", "A08:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1550.001', 'T1556.006', 'T1606.001']
    cis_controls: ['CIS-3.11', 'CIS-6.5', 'CIS-6.8']
    nist_controls: ['IA-2', 'IA-5', 'SC-12', 'SC-13']
    pci_dss: ['3.6.1', '8.3.1']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "saml_acs_or_oidc_issuer_plaintext_http"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "SAML AssertionConsumerService Or OIDC Issuer URL Uses Plaintext HTTP"
    description: "A task renders a SAML `EntityDescriptor` with `AssertionConsumerService Location=\"http://...\"` / `SingleLogoutService Location=\"http://...\"` OR an OIDC client/provider config with `issuer: http://...`, `token_endpoint: http://...`, `jwks_uri: http://...`, or `authorization_endpoint: http://...` (for any non-localhost host). Plaintext-HTTP federation endpoints leak the SAML assertion (containing groups + NameID + optionally emailed OTP codes) or the OIDC `id_token` (JWT signed, but replay-able on-path) - a passive-MITM on the login subnet immediately becomes an authentication-bypass. Required-HTTPS has been the formal baseline in both specifications since their inception and is a hard-fail on every 2024 OpenID-Federation conformance test."
    regex: "(?:AssertionConsumerService|SingleLogoutService|ArtifactResolutionService)\\s+[^>]*Location\\s*=\\s*['\"]?http://(?!localhost|127\\.0\\.0\\.1)|(?:issuer|token_endpoint|jwks_uri|authorization_endpoint|userinfo_endpoint|end_session_endpoint|revocation_endpoint|introspection_endpoint|device_authorization_endpoint)\\s*[:=]\\s*['\"]?http://(?!localhost|127\\.0\\.0\\.1)"
    positive_examples:
      - "AssertionConsumerService Location=http://"
    multiline: true
    recommendation: "Replace every `http://` with `https://` in SAML metadata and OIDC well-known/provider configs. For SAML, enforce `AuthnRequestsSigned=true` and `WantAssertionsSigned=true` on the SP metadata. For OIDC, pin the JWKS certificate chain (`jwks_uri` must resolve via the system trust-store to the IdP's root) and require `response_mode=query` or `form_post` over HTTPS only. Block plaintext-federation endpoints at the network layer: egress firewall DENY `destination_port=80` to any IdP hostname. Audit existing SP / client registrations via `saml2aws list` / `okta apps list --filter protocol=saml` + grep for `http://`."
    cwe: ['CWE-295', 'CWE-319', 'CWE-614']
    owasp_appsec: ["A02:2021", "A05:2021", "A07:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1556.006', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-6.5']
    nist_controls: ['IA-2', 'IA-8', 'SC-8', 'SC-13']
    pci_dss: ['4.2.1', '8.3.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "mongodb_where_or_mapreduce_server_side_js_with_input"
    category: "insecure_communication"
    severity: "HIGH"
    title: "MongoDB $where Or mapReduce Server-Side JS With User-Templated Input"
    description: "A task issues a MongoDB query via `community.mongodb.mongodb_shell`, `pymongo.*.find`, or `mongosh --eval` containing a `$where:` operator with a Jinja2-templated expression, OR a `mapReduce` call whose `map`/`reduce` bodies are constructed from user-supplied input (`{{ item.filter }}`, `{{ user_query }}`). `$where` executes arbitrary JavaScript inside the mongod process (`mongod --setParameter javascriptEnabled=true` default), and attacker-templated input becomes NoSQL-injection -> server-side-JS RCE. MongoDB 5.0 deprecated but did not remove `$where`; 7.0 disables it by default but many on-prem deploys re-enable it for legacy queries."
    regex: "(?:community\\.mongodb\\.mongodb_shell|pymongo\\.[\\w.]+|mongosh\\s+--eval)[\\s\\S]{0,400}?(?:\\$where|mapReduce)[\\s\\S]{0,300}?\\{\\{\\s*\\w+|(?:db\\.\\w+\\.(?:find|aggregate|mapReduce))[\\s\\S]{0,300}?\\$where[\\s\\S]{0,200}?\\{\\{\\s*\\w+"
    positive_examples:
      - "community.mongodb.mongodb_shell$where{{a"
    multiline: true
    window: 15
    recommendation: "Never use `$where` or `mapReduce` with templated input. Rewrite every `$where: 'this.field == \"' + input + '\"'` as a structured query: `{field: {$eq: input}}` (safe, uses the BSON operator path, not the JS VM). Disable server-side JavaScript entirely: `mongod --setParameter javascriptEnabled=false` (default in 7.0+). Use the Aggregation Pipeline (`$match`, `$group`, `$lookup`) for any computation that previously needed mapReduce. Audit existing queries: `grep -r '\\$where' app/ roles/ playbooks/` and migrate them."
    cwe: ['CWE-89', 'CWE-94', 'CWE-943']
    owasp_appsec: ["A03:2021"]
    mitre_attack: ['T1059', 'T1190']
    cis_controls: ['CIS-3.3', 'CIS-16.11']
    nist_controls: ['CM-7', 'SC-18', 'SI-10']
    pci_dss: ['6.2.4', '6.3.3']
    soc2: ['CC6.1', 'CC7.1']

  - id: "tls_legacy_protocol_tlsv1_0_or_1_1_enabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "TLS 1.0 / 1.1 Explicitly Enabled In Server Config"
    description: "A rendered web-server / app-server / load-balancer config (nginx, Apache httpd, HAProxy, Envoy, Traefik, Tomcat, IIS) has `ssl_protocols`, `SSLProtocol`, `tls-min-version`, or `tls_versions` explicitly including `TLSv1`, `TLSv1.0`, `TLSv1.1`, `tlsv1.0`, or `tlsv1.1`. Both TLS 1.0 and 1.1 have been formally deprecated by IETF RFC 8996 (2021) - they retain BEAST, POODLE, and Lucky13 attack surface. PCI-DSS v4 (effective 2024-03), HIPAA security guidance, FedRAMP Rev5, and CIS v8 all require TLS 1.2+ as a mandatory baseline."
    regex: "(?:ssl_protocols|SSLProtocol|tls[_-]?min[_-]?version|tls[_-]?versions|minimumTLSVersion|ssl\\.protocols)\\s*[:=]?\\s*[^#\\n]*?(?:TLSv?1(?:\\.[01])?\\b|tls1(?:\\.[01])?\\b)(?![\\s]*[.][23])"
    positive_examples:
      - "ssl_protocols TLSv1"
    multiline: true
    window: 3
    recommendation: "Restrict to TLS 1.2+ baseline and prefer TLS 1.3 only where possible. Nginx: `ssl_protocols TLSv1.2 TLSv1.3;`. Apache: `SSLProtocol -all +TLSv1.2 +TLSv1.3`. Envoy: `tls_minimum_protocol_version: TLSv1_2`. HAProxy: `ssl-default-bind-options ssl-min-ver TLSv1.2`. Validate external-facing endpoints with `nmap --script ssl-enum-ciphers -p 443 <host>` - alert on any TLS 1.0/1.1 result. For legacy-client backwards-compat exceptions, document the CVE-risk-acceptance, pin to a specific hostname, and set a 90-day sunset."
    cwe: ['CWE-326', 'CWE-327']
    cve: ["CVE-2014-3566"]
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-12.6']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7']

  - id: "curl_wget_insecure_flag_in_shell_task"
    category: "insecure_communication"
    severity: "HIGH"
    title: "curl -k / wget --no-check-certificate In Shell Task (TLS Verification Skipped)"
    description: "An `ansible.builtin.shell` or `ansible.builtin.command` task runs `curl -k`, `curl --insecure`, `wget --no-check-certificate`, `wget --no-check-certificates`, or `fetch --no-verify-peer` (BSD) against any URL. This disables TLS verification, turning every HTTPS fetch into a MitM-vulnerable fetch. Distinct from the existing `ssl_verification_disabled` rule which only catches the Ansible `validate_certs: false` module arg - this catches the shell-level case that Ansible can't see."
    # Anchor on the actual MODULE-KEY form - ``shell:`` / ``command:``
    # at the start of a YAML-structural line (optional leading ``-``
    # for list items, then ``key:`` with either a block-scalar
    # indicator or an inline value). The previous regex matched the
    # bare word ``shell`` anywhere, which also matched ``shell_output``
    # (a common ``register:`` target) and fired once per task body in
    # files that chain several tasks with long curl payloads. The
    # structural anchor plus the existing ``window: 8`` bound keeps
    # the multi-line intent but prevents the register-var false
    # matches that inflated this rule by ~3× on real corpora.
    regex: "(?m)^\\s*(?:-\\s+)?(?:ansible\\.builtin\\.)?(?:shell|command):\\s*(?=[|>]|\\S)[\\s\\S]{0,400}?(?:curl\\s+[^\\n]*?(?:-k\\b|--insecure\\b)|wget\\s+[^\\n]*?--no-check-certificates?|fetch\\s+[^\\n]*?--no-verify-peer|aria2c\\s+[^\\n]*?--check-certificate=false)"
    multiline: true
    window: 8
    recommendation: "Use the `ansible.builtin.get_url` or `ansible.builtin.uri` module instead of shell-curl - these respect `validate_certs: true` (default). If the target genuinely has a self-signed cert, install the CA bundle: `ansible.builtin.copy: dest=/usr/local/share/ca-certificates/internal.crt` + `ansible.builtin.command: update-ca-certificates`. For air-gapped mirrors, use `pip install --index-url https://internal/pypi/ --cert /etc/ssl/internal-ca.pem`. Never `-k` - it makes every on-path attacker a root-shell away."
    positive_examples:
      - |2-
            - name: fetch an insecure thing
              ansible.builtin.shell: curl -k https://example.com/
      - |2-
            shell: |-
              curl -sSL -k https://internal.example.com/api
      - "    command: wget --no-check-certificate https://example.com/pkg.tgz"
    negative_examples:
      - |2-
            register: shell_output

            - name: next task
              ansible.builtin.get_url:
                url: https://example.com/
      - "    ansible.builtin.shell: curl https://example.com/ -H 'X-Key: abc'"
      - |2-
            vars:
              shell_command: 'curl -k'
    cwe: ['CWE-295', 'CWE-319']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ['T1557', 'T1557.002']
    cis_controls: ['CIS-3.10', 'CIS-12.6']
    nist_controls: ['SC-8', 'SC-8(1)']
    pci_dss: ['4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "shell_ssh_scp_strict_host_key_disabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "shell ssh / scp / sftp Invoked With StrictHostKeyChecking=no"
    description: "An `ansible.builtin.shell` or `ansible.builtin.command` task runs `ssh`, `scp`, `sftp`, or `rsync -e ssh` with `-o StrictHostKeyChecking=no` (or `=accept-new`/`=off`), or sets `UserKnownHostsFile=/dev/null`. This bypasses SSH host-identity verification and accepts whatever key the remote sends - any on-path attacker can sit between the controller and the target and read or modify every byte of the session, including private-key transfers. The existing `ssh_args_disable_host_key` rule only catches the Ansible `ansible_ssh_common_args` variable; this catches the shell-level invocation that Ansible's SSH layer never sees."
    regex: "(?m)^\\s*(?:-\\s+)?(?:ansible\\.builtin\\.)?(?:shell|command):\\s*(?=[|>]|\\S)[\\s\\S]{0,600}?(?:ssh|scp|sftp|rsync\\s+[^\\n]*?-e\\s+['\"]?ssh)\\s+[^\\n]*?(?:-o\\s*StrictHostKeyChecking\\s*=\\s*(?:no|off|accept-new|0|false)|-o\\s*UserKnownHostsFile\\s*=\\s*/dev/null|-F\\s+(?:/tmp/|/var/tmp/|/dev/shm/))\\b"
    multiline: true
    window: 10
    positive_examples:
      - "shell: scp -o StrictHostKeyChecking=no /etc/ssl/private/server.key root@host:/etc/ssl/private/server.key"
      - "shell: ssh -o StrictHostKeyChecking=no root@host 'systemctl restart app'"
    negative_examples:
      - "shell: ssh -o UserKnownHostsFile=/etc/ssh/ssh_known_hosts root@host 'uptime'"
    recommendation: "Pre-populate `~/.ssh/known_hosts` (or `/etc/ssh/ssh_known_hosts`) from a trusted source (`ssh-keyscan` over a side channel, SSHFP DNS records under DNSSEC, or a configuration-management distribution) before the playbook runs, then leave `StrictHostKeyChecking=yes` (the default). For ephemeral fleets, use SSH certificates with `@cert-authority` lines so individual host keys do not need to be pre-known."
    cwe: ['CWE-295', 'CWE-322']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V9.2.1, V9.2.3]
    mitre_attack: ['T1557']
    cis_controls: ['CIS-3.10', 'CIS-12.6']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-23']
    pci_dss: ['4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "weak_dhparam_generated_below_2048"
    category: "insecure_communication"
    severity: "HIGH"
    title: "openssl dhparam Generated With Key Size < 2048 Bits"
    description: "A task runs `openssl dhparam -out <file> 512` or `1024` (or passes bit-length ≤ 1024 to a `community.crypto.openssl_dhparam` module call). DH parameters smaller than 2048 bits are trivially broken by the Logjam attack (2015, precompute for common primes) and by any well-funded state actor in real time. RFC 7919 standardizes FFDHE named groups at 2048/3072/4096. Using pre-2015 2048 or anything ≤1024 is unambiguously a regression."
    regex: "(?:openssl\\s+dhparam\\s+[^\\n]*?\\s(?:512|1024)\\b|community\\.crypto\\.openssl_dhparam[\\s\\S]{0,200}?size\\s*:\\s*(?:512|1024)\\b)"
    positive_examples:
      - "openssl dhparam  512"
    multiline: true
    window: 8
    recommendation: "Generate at minimum 2048-bit (preferably 3072 or 4096): `openssl dhparam -out dhparams.pem 4096`. Better: use RFC 7919 standard FFDHE named groups (`ffdhe2048`, `ffdhe3072`, `ffdhe4096`) instead of generating custom params - these are pre-computed, vetted, and supported by every modern TLS stack. In Nginx: `ssl_dhparam /etc/nginx/ffdhe4096.pem` from https://ssl-config.mozilla.org/ffdhe4096.txt. Better still: disable all DHE ciphers and use ECDHE-only (P-256, P-384, X25519) which bypass DH entirely."
    cwe: ['CWE-326', 'CWE-327']
    cve: ["CVE-2015-4000"]
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-12.6']
    nist_controls: ['SC-8(1)', 'SC-12', 'SC-13']
    pci_dss: ['3.5.1', '4.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.7']

  - id: "weak_rsa_key_generated_below_2048"
    category: "insecure_communication"
    severity: "HIGH"
    title: "openssl genrsa / community.crypto.openssl_privatekey Generated Below 2048 Bits"
    description: "A task runs `openssl genrsa -out <file> 512|1024` or configures `community.crypto.openssl_privatekey` with `size: 512|1024`. RSA-1024 has been deprecated for server certificates by CA/Browser Forum since 2013; NIST SP 800-131A disallows ≤1024 for anything after 2014. Modern CAs (Let's Encrypt, DigiCert, GlobalSign) REJECT CSRs with <2048-bit RSA keys. Generating a 1024-bit key today guarantees either a self-signed deployment or a hidden internal-CA workaround - both operationally broken."
    regex: "(?:openssl\\s+genrsa\\s+[^\\n]*?\\s(?:512|1024)\\b|community\\.crypto\\.openssl_privatekey[\\s\\S]{0,200}?(?:type\\s*:\\s*['\"]?RSA[\\s\\S]{0,200}?)?size\\s*:\\s*(?:512|1024)\\b|ssh-keygen\\s+[^\\n]*?-b\\s+(?:512|1024)\\b)"
    positive_examples:
      - "openssl genrsa  512"
    multiline: true
    window: 8
    recommendation: "Use 3072-bit RSA minimum for new deployments (NIST SP 800-57 equivalent of 128-bit symmetric), 4096-bit for long-lived CA keys. Better: migrate to ECDSA P-256 (`openssl ecparam -name prime256v1 -genkey`) or Ed25519 (`ssh-keygen -t ed25519` / `openssl genpkey -algorithm ED25519`) - faster, smaller, and at least as secure. For Ansible: `community.crypto.openssl_privatekey: type=Ed25519` for SSH, `type=ECC curve=secp256r1` for TLS. Audit existing keys: `find / -name '*.key' -exec openssl rsa -in {} -noout -text 2>/dev/null \\\\; | grep 'Private-Key:'`."
    cwe: ['CWE-326', 'CWE-327']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1552.004', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-16.11']
    nist_controls: ['IA-5(2)', 'SC-12', 'SC-13']
    pci_dss: ['3.6.1', '3.7.1', '4.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(2)(ii)']
    soc2: ['C1.1', 'CC6.7']

  - id: "null_or_anon_cipher_suite_allowed"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "NULL / Anonymous (ADH/eNULL/aNULL) Cipher Suite Explicitly Allowed"
    description: "A TLS config (OpenSSL cipher string, Nginx `ssl_ciphers`, Apache `SSLCipherSuite`, HAProxy `ssl-default-bind-ciphers`, Java `-Djdk.tls.disabledAlgorithms`) explicitly allows NULL encryption (`eNULL`, `NULL-MD5`, `NULL-SHA`) or anonymous Diffie-Hellman (`ADH-`, `AECDH-`, `aNULL`). NULL ciphers provide AUTHENTICATION-ONLY with zero confidentiality; anonymous ciphers skip server authentication entirely and are MitM-by-design. Neither has ANY legitimate production use - they exist only in OpenSSL's cipher tables for protocol-conformance testing."
    regex: "(?:ssl_ciphers|SSLCipherSuite|ssl-default-bind-ciphers|tls_ciphers|disabledAlgorithms|cipher_suites?)\\s*[:=]?\\s*['\"]?[^#\\n]*?(?:\\beNULL\\b|\\baNULL\\b|NULL-(?:MD5|SHA|SHA256)|ADH-[A-Z0-9-]+|AECDH-[A-Z0-9-]+|EXP-[A-Z0-9-]+)"
    positive_examples:
      - |2-
        ssl_ciphers
              value: "HIGH:!aNULL
    multiline: true
    window: 3
    recommendation: "Use Mozilla's modern TLS config generator (https://ssl-config.mozilla.org/) for your specific server+version. As a baseline, OpenSSL cipher string: `ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256` + TLS 1.3 cipher-suites `TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256`. ALWAYS include `!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!SRP:!DSS` as explicit exclusions. Test via `openssl s_client -connect host:443 -cipher 'aNULL'` - should return 'no ciphers available'."
    cwe: ['CWE-295', 'CWE-326', 'CWE-327']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-12.6']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['3.5.1', '4.2.1', '4.2.1.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.7']

  - id: "consul_acl_default_policy_allow"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "HashiCorp Consul ACL default_policy=allow (Service-Mesh Open-By-Default)"
    description: "A Consul config (`consul.hcl`, `consul.json`, `consul agent -config-dir=`) has `acl { default_policy = \"allow\" }` (or `acls.default_policy: allow` in YAML). With default-allow, the ACL system is effectively OFF - any client reaching `8500/tcp` (HTTP API) or `8300/tcp` (RPC) can read all service registrations, KV data, intentions, and node metadata. In service-mesh deployments (Consul Connect), this lets an attacker register a malicious sidecar that MitMs all mTLS traffic between services. 2024 SpecterOps research describes this as the canonical Consul-to-cluster-takeover primitive."
    regex: "(?:acl\\s*\\{[\\s\\S]{0,200}?default_policy\\s*=\\s*['\"]allow['\"]|acls?\\.default_policy\\s*[:=]\\s*['\"]?allow|default_policy\\s*:\\s*['\"]?allow)"
    positive_examples:
      - "acl{default_policy='allow'"
    multiline: true
    window: 15
    recommendation: "Set `default_policy = \"deny\"` in every Consul agent config. Bootstrap ACLs via `consul acl bootstrap` (Consul 1.4+) and distribute role-scoped tokens to services (never the bootstrap token). Enable `acl.enable_token_persistence = true` and `acl.tokens.default = <per-service-token>`. Require ACLs on all API endpoints: `acl.enable_key_list_policy = true`. Gate all Consul HTTP API calls through TLS (`ports.https = 8501`, `cert_file`, `key_file`, `verify_incoming = true`, `verify_server_hostname = true`). Audit via `consul acl policy list` - every policy should have a specific named scope, no wildcards."
    cwe: ['CWE-284', 'CWE-306', 'CWE-862']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1098', 'T1550', 'T1557.002']
    cis_controls: ['CIS-3.3', 'CIS-6.8', 'CIS-16.5']
    nist_controls: ['AC-3', 'AC-6', 'IA-2']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "otel_exporter_otlp_insecure_true"
    category: "insecure_communication"
    severity: "HIGH"
    title: "OpenTelemetry OTLP Exporter OTEL_EXPORTER_OTLP_INSECURE=true Or insecure: true (Cleartext Traces/Metrics)"
    description: "A task sets `OTEL_EXPORTER_OTLP_INSECURE=true`, `OTEL_EXPORTER_OTLP_TRACES_INSECURE=true`, `OTEL_EXPORTER_OTLP_METRICS_INSECURE=true`, `OTEL_EXPORTER_OTLP_LOGS_INSECURE=true`, or renders an OTel Collector config with `exporters: otlp: tls: insecure: true` / `insecure_skip_verify: true`. OTLP traces/metrics/logs commonly contain database query strings, HTTP headers (including Authorization!), stack traces with env-var dumps, SQL parameters, and user-attribute payloads - shipping them over plaintext exposes all of this to any on-path observer. The OTel SDK defaults to gRPC-over-TLS; setting `insecure=true` is an explicit opt-out. Distinct from generic TLS rules because OTel has its own 5+ env vars and config keys with different regex shapes."
    regex: "(?:OTEL_EXPORTER_OTLP(?:_TRACES|_METRICS|_LOGS)?_INSECURE\\s*[:=]\\s*['\"]?(?:true|1|yes)['\"]?|OTEL_EXPORTER_OTLP(?:_TRACES|_METRICS|_LOGS)?_PROTOCOL\\s*[:=]\\s*['\"]?http/protobuf['\"]?[\\s\\S]{0,200}?OTEL_EXPORTER_OTLP(?:_TRACES|_METRICS|_LOGS)?_ENDPOINT\\s*[:=]\\s*['\"]?http://|exporters\\s*:[\\s\\S]{0,600}?otlp[\\s\\S]{0,400}?(?:tls|grpc)\\s*:[\\s\\S]{0,200}?(?:insecure|insecure_skip_verify)\\s*:\\s*(?:true|yes))"
    positive_examples:
      - "OTEL_EXPORTER_OTLP_INSECURE:true"
    multiline: true
    window: 20
    recommendation: "Use `OTEL_EXPORTER_OTLP_PROTOCOL=grpc` (default) with TLS to the OTel Collector endpoint. For the Collector itself, configure `receivers.otlp.protocols.grpc.tls.{ca_file,cert_file,key_file}` + `exporters.otlp.tls.{ca_file,insecure: false}`. For in-cluster communication use a service-mesh (Istio/Linkerd) mTLS so both ends are mutually-authenticated without per-process cert config. If an internal demo-only collector genuinely cannot do TLS, restrict its network scope to loopback (`127.0.0.1:4317`) only - never expose it on the pod/host network without TLS. Validate: `openssl s_client -connect <collector>:4317 -servername <collector>` should return a valid cert. Alert on `insecure=true` in any OTel config via admission-controller policy."
    cwe: ['CWE-200', 'CWE-311', 'CWE-319']
    owasp_appsec: ["A01:2021", "A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.2, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1539', 'T1552.001']
    cis_controls: ['CIS-3.10', 'CIS-8.2', 'CIS-14.4']
    nist_controls: ['AU-9', 'SC-8', 'SC-8(1)']
    pci_dss: ['4.2.1', '10.5.2']
