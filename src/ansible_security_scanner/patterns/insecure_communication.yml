  - id: "aws_elasticache_without_transit_or_at_rest_encryption"
    category: "insecure_communication"
    severity: "HIGH"
    title: "ElastiCache Redis/Memcached Without In-Transit or At-Rest Encryption"
    description: "A `community.aws.elasticache` / `community.aws.elasticache_info` / `community.aws.elasticache_replication_group` task creates a Redis or Memcached cluster with `transit_encryption_enabled: false` (or omitted), `at_rest_encryption_enabled: false` (or omitted), or neither flag present at all. Redis commands (`AUTH`, `SET`, `HGETALL`) travel in cleartext on the VPC network - any compromised EC2 instance or container in the same subnet can passively sniff session tokens, rate-limit counters, or application-layer secrets via `tcpdump` on port 6379/11211. Without at-rest encryption, an AWS operator (or a stolen backup-snapshot) can recover cached data including PII and application cache-poisoning payloads."
    regex: "(?ms)community\\.aws\\.(?:elasticache|elasticache_replication_group|elasticache_info)\\s*:[\\s\\S]{0,2000}?(?:transit_encryption_enabled|at_rest_encryption_enabled|TransitEncryptionEnabled|AtRestEncryptionEnabled)\\s*:\\s*(?:false|False|no|No|0)\\b"
    positive_examples:
      - "community.aws.elasticache_replication_group:transit_encryption_enabled:false"
    multiline: true
    window: 60
    recommendation: "Set both `transit_encryption_enabled: true` and `at_rest_encryption_enabled: true` on every new ElastiCache replication group. For Redis, also set `auth_token:` (pulled from AWS Secrets Manager) to require AUTH on every connection. Note: enabling transit-encryption on an existing cluster is a non-zero-downtime migration - plan with `transit_encryption_mode: preferred` rotation. Enforce via AWS Config rule `elasticache-redis-cluster-automatic-backup-check` + custom rule checking both encryption flags. For Memcached (SASL-less protocol), consider Redis migration since Memcached has no TLS story before `memcached 1.5.13` with stunnel."
    cwe: ['CWE-311', 'CWE-312', 'CWE-319']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1530']
    cis_controls: ['CIS-3.10', 'CIS-3.11']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-28']
    pci_dss: ['3.5.1', '4.1', '4.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "aws_kinesis_stream_without_encryption"
    category: "insecure_communication"
    severity: "MEDIUM"
    title: "Kinesis Data Stream Without Server-Side Encryption"
    description: "A `community.aws.kinesis_stream` task sets `encryption_type: NONE` (or omits `encryption_type:` + `key_id:`). Records flowing through the stream - which typically include application event-bus messages, IoT telemetry, CDC change-data-capture rows, or clickstream sessions - land in Kinesis storage unencrypted. Anyone with `kinesis:GetRecords` + `kinesis:GetShardIterator` on the stream can read the cleartext history; there is no defense-in-depth KMS envelope."
    regex: "(?ms)community\\.aws\\.kinesis_stream\\s*:[\\s\\S]{0,1500}?encryption_type\\s*:\\s*['\"]?NONE['\"]?"
    positive_examples:
      - |2-
        community.aws.kinesis_stream:
            # ...
            encryption_type: NONE
    multiline: true
    window: 30
    recommendation: "Set `encryption_type: KMS` and `key_id: arn:aws:kms:...` (a CMK, NOT the AWS-managed `alias/aws/kinesis` key - customer-managed keys give you key-policy control and rotation audit via CloudTrail). Combine with a stream resource policy that restricts `kinesis:PutRecord*` / `GetRecord*` to specific role ARNs. Enforce via AWS Config rule `kinesis-stream-encrypted`. For highest-sensitivity streams (PCI / HIPAA), use a dedicated per-team CMK with `kms:ViaService = kinesis` condition and CloudTrail data-event logging."
    cwe: ['CWE-311', 'CWE-312', 'CWE-319']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1213', 'T1530']
    cis_controls: ['CIS-3.11', 'CIS-14.8']
    nist_controls: ['SC-28', 'SC-28(1)']
    pci_dss: ['3.4.1', '3.5.1']
    hipaa: ['164.312(a)(2)(iv)']
    soc2: ['CC6.1']

  - id: "aws_elasticsearch_domain_without_encryption_at_rest_or_https"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Elasticsearch/OpenSearch Domain Without At-Rest Encryption or HTTPS-Only"
    description: "A `community.aws.elasticsearch_slr` / `community.aws.opensearch` / `community.aws.elasticsearch_domain` task creates a domain with `encryption_at_rest.enabled: false` (or missing), `node_to_node_encryption.enabled: false`, or `domain_endpoint_options.enforce_https: false`. OpenSearch (formerly Elasticsearch) domains are frequently used to index application logs, PII events, and security-event data - a single breach therefore exposes ALL historical application telemetry. Without `enforce_https`, HTTP clients can still hit the domain endpoint and have credentials or sensitive query parameters sniffed."
    regex: "(?ms)community\\.aws\\.(?:opensearch|elasticsearch_domain|elasticsearch_slr)\\s*:[\\s\\S]{0,2500}?(?:encryption_at_rest\\s*:\\s*\\{?\\s*enabled\\s*:\\s*(?:false|False|no|No|0)|node_to_node_encryption\\s*:\\s*\\{?\\s*enabled\\s*:\\s*(?:false|False|no|No|0)|enforce_https\\s*:\\s*(?:false|False|no|No|0))"
    positive_examples:
      - |2-
        community.aws.opensearch:
              # ...
              enforce_https: false
    multiline: true
    window: 80
    recommendation: "Always set ALL THREE: `encryption_at_rest: {enabled: true, kms_key_id: arn:aws:kms:...}`, `node_to_node_encryption: {enabled: true}`, and `domain_endpoint_options: {enforce_https: true, tls_security_policy: Policy-Min-TLS-1-2-PFS-2023-10}`. Restrict the access policy to a specific IAM role ARN AND a VPC endpoint - never expose an OpenSearch domain publicly. Enable audit logging to a dedicated log group + S3 export for long-term retention. Enforce via AWS Config rules `opensearch-encrypted-at-rest`, `opensearch-node-to-node-encryption-check`, `opensearch-https-required`."
    cwe: ['CWE-311', 'CWE-319', 'CWE-757']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
