  - id: "aws_cloudfront_distribution_minimum_protocol_below_tls12"
    category: "insecure_communication"
    severity: "HIGH"
    title: "CloudFront Distribution Allows TLS < 1.2 (SSLv3/TLS1.0/TLS1.1 Minimum Protocol)"
    description: "A `community.aws.cloudfront_distribution` task sets `viewer_certificate.minimum_protocol_version:` to `SSLv3`, `TLSv1`, `TLSv1_2016`, `TLSv1.1_2016`, or leaves it at the legacy default `TLSv1`. These protocols are deprecated, vulnerable to BEAST / POODLE / LOGJAM / SWEET32 downgrades, and disallowed by PCI-DSS 4.0 (eff Mar 2025), FedRAMP High, and every major compliance regime. AWS introduced `TLSv1.2_2021` and `TLSv1.2_2019` as the currently-approved floors; anything older should be treated as insecure."
    regex: "(?ms)community\\.aws\\.cloudfront_distribution\\s*:[\\s\\S]{0,2500}?minimum_protocol_version\\s*:\\s*['\"]?(?:SSLv3|TLSv1|TLSv1_2016|TLSv1\\.1_2016|TLSv1_1|TLSv1\\.1)['\"]?"
    positive_examples:
      - |2-
        community.aws.cloudfront_distribution:
              # ...
              minimum_protocol_version: TLSv1
    multiline: true
    window: 80
    recommendation: "Set `minimum_protocol_version: TLSv1.2_2021` (the modern AWS recommendation) on every distribution. For customers in highly regulated industries, consider `TLSv1.3` by specifying the `TLSv1.3_2023` policy where available. Run `aws cloudfront list-distributions --query 'DistributionList.Items[*].[Id,ViewerCertificate.MinimumProtocolVersion]' --output text | grep -vE 'TLSv1\\.2_2021|TLSv1\\.3'` to find all out-of-policy distributions. Combined with `ssl_support_method: sni-only` (required; `vip` costs $600/mo and is rarely needed)."
    cwe: ['CWE-326', 'CWE-327', 'CWE-757']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "aws_cloudfront_viewer_protocol_policy_allow_all"
    category: "insecure_communication"
    severity: "HIGH"
    title: "CloudFront Cache/Default Behavior Allows HTTP (viewer_protocol_policy: allow-all)"
    description: "A `community.aws.cloudfront_distribution` task sets `default_cache_behavior.viewer_protocol_policy: allow-all` or any entry in `cache_behaviors.*.viewer_protocol_policy: allow-all`. This allows cleartext HTTP traffic to the distribution in parallel with HTTPS, which (a) makes session cookies vulnerable to passive network capture on public Wi-Fi / transit networks, (b) permits HTTP-downgrade MITM against unpinned clients, and (c) silently serves the origin over HTTP for browsers that follow cached redirects."
    regex: "(?ms)community\\.aws\\.cloudfront_distribution\\s*:[\\s\\S]{0,3000}?viewer_protocol_policy\\s*:\\s*['\"]?allow-all['\"]?"
    positive_examples:
      - |2-
        community.aws.cloudfront_distribution:
              # ...
              viewer_protocol_policy: allow-all
    multiline: true
    window: 80
    recommendation: "Set `viewer_protocol_policy: redirect-to-https` (redirects HTTP -> HTTPS, preserving legacy bookmarks) or `https-only` (hard-fail HTTP, strictly correct for APIs / webhook endpoints). Pair with `minimum_protocol_version: TLSv1.2_2021` and HSTS via a CloudFront Functions response header: `add_header 'Strict-Transport-Security' 'max-age=63072000; includeSubDomains; preload'`. AWS Config rule `cloudfront-viewer-policy-https` flags this continuously."
    cwe: ['CWE-311', 'CWE-319', 'CWE-523']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "aws_elb_listener_weak_ssl_policy"
    category: "insecure_communication"
    severity: "HIGH"
    title: "ELB/ALB Listener Uses Deprecated SSL Negotiation Policy"
    description: "An `amazon.aws.elb_classic_lb` / `community.aws.elb_application_lb` / `amazon.aws.elb_network_lb` task sets an HTTPS/TLS listener `ssl_policy:` (or `policy_names:`) to one of the deprecated / insecure ELB predefined policies: `ELBSecurityPolicy-2015-05`, `ELBSecurityPolicy-TLS-1-0-2015-04`, `ELBSecurityPolicy-TLS-1-1-2017-01`, `ELBSecurityPolicy-FS-1-1-2019-08`, `AWSConsole-SSLNegotiationPolicy-*`, `Reference-Security-Policy`, or any custom policy that enables `DES-CBC3-SHA`, `RC4-`, `ECDHE-ECDSA-RC4-SHA`, or SSLv3/TLS1.0/TLS1.1 ciphers. These expose clients to downgrade-and-MITM attacks."
    regex: "(?ms)(?:amazon\\.aws\\.elb_classic_lb|community\\.aws\\.elb_application_lb|amazon\\.aws\\.elb_network_lb)\\s*:[\\s\\S]{0,2000}?(?:ssl_policy|SslPolicy|policy_names?)\\s*:\\s*['\"]?(?:ELBSecurityPolicy-(?:2015-05|TLS-1-0-2015-04|TLS-1-1-2017-01|FS-1-1-2019-08)|AWSConsole-SSLNegotiationPolicy-[\\w.-]+|Reference-Security-Policy)['\"]?"
    positive_examples:
      - |2-
        community.aws.elb_application_lb:
              # ...
              SslPolicy: ELBSecurityPolicy-2015-05
    multiline: true
    window: 60
    recommendation: "Use `ssl_policy: ELBSecurityPolicy-TLS13-1-2-2021-06` for ALB/NLB (TLS 1.2 + TLS 1.3, strong forward-secret ciphers only), or `ELBSecurityPolicy-FS-1-2-Res-2020-10` for Forward-Secrecy only. Avoid custom policies. Audit with `aws elbv2 describe-listeners --load-balancer-arn $ARN --query 'Listeners[].SslPolicy'` and `aws elb describe-load-balancer-policies --load-balancer-name $NAME`. Enforce via AWS Config rule `elbv2-acm-certificate-required` + a custom rule that filters approved policies."
    cwe: ['CWE-326', 'CWE-327', 'CWE-757']
