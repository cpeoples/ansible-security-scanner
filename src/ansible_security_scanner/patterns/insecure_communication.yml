  - id: "azure_db_server_ssl_enforcement_disabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Azure Database Server SSL Enforcement Disabled (ssl_enforcement/enable_ssl_enforcement: disabled)"
    description: "An `azure.azcollection.azure_rm_postgresqlserver` / `azure.azcollection.azure_rm_mysqlserver` / `azure.azcollection.azure_rm_mariadbserver` task sets `ssl_enforcement: 'Disabled'` (or `enforce_ssl: false` / `ssl_enforcement: false`). Client applications can then connect over unencrypted TCP, exposing username, password, session cookies, and SQL payloads to any attacker who can reach the same Azure VNet/subnet or perform a VNet-peering MITM. Defaults-rich ODBC/JDBC drivers will happily connect unencrypted if the server allows it."
