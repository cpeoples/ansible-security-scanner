  - id: "azure_redis_non_ssl_port_enabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Azure Cache for Redis Accepts Plaintext on Port 6379 (enable_non_ssl_port: true)"
    description: "An `azure.azcollection.azure_rm_rediscache` task sets `enable_non_ssl_port: true` (or `enableNonSslPort: true`). The Redis instance accepts cleartext connections on TCP 6379 in parallel with the TLS port 6380 - clients (or misconfigured libraries falling back to default port 6379) send the `AUTH` token and all commands unencrypted. Anyone with VNet reachability (internal attacker, compromised VM, DNS-cache-poisoning on peered VNets) can capture the auth token and full command stream."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_rediscache\\s*:[\\s\\S]{0,1500}?(?:enable_non_ssl_port|enableNonSslPort)\\s*:\\s*(?:true|True|yes|Yes|1)\\b"
    positive_examples:
      - |2-
        azure.azcollection.azure_rm_rediscache:
                    # ...
                    enable_non_ssl_port: true
    multiline: true
    window: 40
    recommendation: "Set `enable_non_ssl_port: false` (the secure default on newer Azure API versions). Require TLS-only clients: `minimum_tls_version: '1.2'` on the Redis resource, plus use `redis-cli --tls -h $HOST -p 6380 -a $AUTH_TOKEN` or the stackexchange-redis `ssl=true` connection string. Rotate the auth key if the non-SSL port was ever enabled (assume the token was captured). Enforce via Azure Policy built-in `ID: 22bee202-a82f-4305-9a2a-6d7f44d4dedb` (Azure Cache for Redis should not use the non-SSL port). Audit via `az redis list --query '[].{name:name, ssl:enableNonSslPort}'`."
    cwe: ['CWE-311', 'CWE-319', 'CWE-523']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "azure_webapp_https_only_disabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Azure App Service Web App with HTTPS-Only Disabled (https_only: false)"
    description: "An `azure.azcollection.azure_rm_webapp` / `azure.azcollection.azure_rm_functionapp` task sets `https_only: false` (or omits it - the App Service default allows both HTTP and HTTPS). Clients can reach the app over cleartext HTTP on the `*.azurewebsites.net` hostname and over any custom domain not bound with an HTTPS listener. Session cookies, bearer tokens, and form posts travel unencrypted; HSTS is not automatically applied."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_(?:webapp|functionapp)\\s*:[\\s\\S]{0,2500}?https_only\\s*:\\s*(?:false|False|no|No|0)\\b"
    positive_examples:
      - "azure.azcollection.azure_rm_webapp:https_only:false"
    multiline: true
    window: 60
    recommendation: "Set `https_only: true` on every App Service / Function App / Logic App Standard. Configure custom domains with managed certificates (free via Azure-managed cert) and force TLS 1.2 minimum via `min_tls_version: '1.2'` in `site_config:`. Combine with an Application Gateway / Front Door in front that terminates TLS and enforces HSTS. Enforce via Azure Policy built-in `ID: a4af4a39-4135-47fb-b175-47fbdf85311d` ('App Service apps should only be accessible over HTTPS')."
    cwe: ['CWE-311', 'CWE-319', 'CWE-523']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "gcp_dns_managed_zone_dnssec_rsasha1_or_disabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "GCP Cloud DNS Managed Zone with DNSSEC Disabled or Using Weak RSASHA1 Algorithm"
    description: "A `google.cloud.gcp_dns_managed_zone` task either (a) omits `dnssec_config:` / sets `dnssec_config.state: off`, leaving the zone unsigned and spoofable via cache-poisoning attacks, or (b) configures `dnssec_config.default_key_specs[].algorithm: rsasha1`. RSASHA1 has been deprecated by IANA since 2012, is disallowed by NIST SP 800-57 Rev.5, and the underlying SHA-1 collision attack (`SHAttered`, 2017) makes forging a DNSKEY signature computationally feasible for a resourceful adversary."
    regex: "(?ms)google\\.cloud\\.gcp_dns_managed_zone\\s*:(?:(?:[\\s\\S]{0,1500}?dnssec_config\\s*:[\\s\\S]{0,800}?(?:state\\s*:\\s*['\"]?off['\"]?|algorithm\\s*:\\s*['\"]?rsasha1['\"]?))|(?:(?!dnssec_config\\s*:)[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z))"
    positive_examples:
      - |2-
        google.cloud.gcp_dns_managed_zone:
              # ...
              state: off
    multiline: true
    window: 60
    recommendation: "Set `dnssec_config: {state: 'on', default_key_specs: [{algorithm: 'rsasha256', key_length: 2048, key_type: 'zoneSigning'}, {algorithm: 'rsasha256', key_length: 2048, key_type: 'keySigning'}]}`. Prefer `ecdsap256sha256` (P-256) when your registrar supports publishing EC-family DS records - smaller, faster, and preferred by IETF. After enabling, retrieve the DS record with `gcloud dns dns-keys list --zone=<z>` and publish it at the registrar. Enforce via CIS GCP Benchmark 3.3 + 3.5. Validate live with `dig +dnssec +multi <zone> DNSKEY`."
    cwe: ['CWE-326', 'CWE-327', 'CWE-350']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1557.002', 'T1583.002', 'T1584.002']
    cis_controls: ['CIS-3.4', 'CIS-4.1']
    nist_controls: ['SC-13', 'SC-20', 'SC-21']
    pci_dss: ['4.1', '6.2']
    hipaa: ['164.312(c)(1)']
    soc2: ['CC6.7']

  - id: "aws_sqs_queue_without_kms_encryption"
    category: "insecure_communication"
    severity: "MEDIUM"
    title: "AWS SQS Queue Without Server-Side KMS Encryption (kms_master_key_id missing)"
    description: "A `community.aws.sqs_queue` task creates/updates an SQS queue without `kms_master_key_id:` (or `sqs_managed_sse_enabled: true`). AWS SQS without SSE stores messages in plaintext on the SQS service substrate. Sensitive payloads (JSON fanouts containing PII, internal auth tokens, SAML assertions, workflow state) are readable by any AWS support operator with substrate-level access and to anyone who exfiltrates an SQS poll credential. SSE-KMS also enables per-queue key-rotation, queue-level revocation, and CloudTrail visibility on KMS Decrypt calls - critical forensic telemetry."
    regex: "(?ms)community\\.aws\\.sqs_queue\\s*:\\s*\\n(?:(?!kms_master_key_id\\s*:|sqs_managed_sse_enabled\\s*:\\s*(?:true|True|yes|Yes|1))[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
        community.aws.sqs_queue:
            name: "{{ sqs_queue_name }}"
    multiline: true
    window: 60
    recommendation: "Always set `kms_master_key_id:` to a customer-managed KMS key ARN (preferred for multi-account + cross-account access) or `alias/aws/sqs` (AWS-managed fallback). Set `kms_data_key_reuse_period_seconds: 300` (balance between KMS call cost and blast-radius of a leaked data-key). For zero-trust designs, scope the KMS key policy so only the expected producer/consumer IAM roles can `GenerateDataKey`/`Decrypt`. Enforce via AWS Config rule `sqs-queue-encrypted` and SCP denying `sqs:CreateQueue` without `sqs:KmsMasterKeyId`."
    cwe: ['CWE-311', 'CWE-312', 'CWE-319']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.1.1, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1005', 'T1530']
    cis_controls: ['CIS-3.11', 'CIS-14.8']
    nist_controls: ['SC-8', 'SC-28', 'SC-28(1)']
    pci_dss: ['3.4.1', '3.5.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(2)(ii)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "aws_elasticsearch_domain_without_node_to_node_encryption"
    category: "insecure_communication"
    severity: "HIGH"
    title: "AWS OpenSearch/Elasticsearch Domain Without Node-to-Node Encryption"
    description: "A `community.aws.opensearch` / `community.aws.elasticsearch_service` task creates/updates a cluster with `node_to_node_encryption_options: {enabled: false}` (or omits the options block - AWS default is false for Elasticsearch-5.6 and older, and the Ansible module does not force-enable it). Inter-node traffic between data, master, and UltraWarm nodes carries shard-replication, query results, and security-plugin internal API calls in cleartext over the VPC. An attacker with an ENI foothold in the same subnet (via Lambda-in-VPC compromise, Fargate exploit, or VPC-lateral-move) can sniff indexed documents including PII, access logs, and any data the application writes."
    regex: "(?ms)(?:community\\.aws\\.opensearch|community\\.aws\\.elasticsearch_service)\\s*:(?:(?:[\\s\\S]{0,2500}?node_to_node_encryption_options\\s*:\\s*[\\s\\S]{0,300}?enabled\\s*:\\s*(?:false|False|no|No|0)\\b)|(?:(?!node_to_node_encryption_options\\s*:)[\\s\\S]){0,2500}?state\\s*:\\s*['\"]?present['\"]?(?:(?!node_to_node_encryption_options\\s*:|^\\s*- name:|^-\\s*name:)[\\s\\S]){0,500}?(?:^\\s*- name:|^-\\s*name:|\\Z))"
    multiline: true
    window: 70
    positive_examples:
      - |2
        - community.aws.opensearch:
            domain_name: search
            node_to_node_encryption_options:
              enabled: false
    recommendation: "Set `node_to_node_encryption_options: {enabled: true}` AND `encryption_at_rest_options: {enabled: true, kms_key_id: <customer-managed>}` AND `domain_endpoint_options: {enforce_https: true, tls_security_policy: 'Policy-Min-TLS-1-2-2019-07'}` on every OpenSearch/Elasticsearch domain. Pair with VPC-only access (`vpc_options.subnet_ids`, no public endpoint) and fine-grained access control with internal-user-database OR Cognito-federated IAM. Enforce via AWS Config rules `elasticsearch-node-to-node-encryption-check` + `opensearch-node-to-node-encryption-check`."
    cwe: ['CWE-311', 'CWE-319', 'CWE-523']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7']

  - id: "uri_module_validate_certs_false"
    category: "insecure_communication"
    severity: "HIGH"
    title: "ansible.builtin.uri With validate_certs: false (Disables TLS Certificate Validation)"
    description: "An `ansible.builtin.uri` / `uri` task sets `validate_certs: false`. Every HTTPS request issued by the module proceeds even when the peer's TLS certificate is expired, self-signed, hostname-mismatched, or signed by a chain the system doesn't trust. Any on-path attacker can present their own certificate and the Ansible control node will POST credentials, tokens, secret-values, or PII directly to them. This is the #1 source of credential leakage in Ansible-driven CI pipelines (2023 GitLab-CI data showed 38% of `uri:` tasks in public repos had this misconfiguration)."
    regex: "(?ms)(?:ansible\\.builtin\\.uri|^[\\t ]*uri)\\s*:[\\s\\S]{0,1500}?\\bvalidate_certs\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?(?:\\s|$|#)"
    positive_examples:
      - |2-
        uri:
            url: "{{ url }}/admin/"
            status_code: 200
            validate_certs: false
      - |2-
        uri:
            url: "{{ url }}/admin/"
            validate_certs: 'no'
      - |2-
        ansible.builtin.uri:
            url: "{{ url }}/admin/"
            validate_certs: "false"
      - |2-
        uri:
            url: "{{ url }}/api"
            validate_certs: 0
    negative_examples:
      - |2-
        uri:
            url: "{{ url }}/admin/"
            validate_certs: true
      - |2-
        uri:
            url: "{{ url }}/admin/"
            validate_certs: 'true'
    multiline: true
    window: 40
    recommendation: "Remove `validate_certs: false`. For genuine self-signed endpoints (internal CAs), pass `ca_path: /etc/pki/ca-trust/source/anchors/internal.crt` instead; for test endpoints, use `--tags test` gating rather than permanently disabling validation. Audit with `grep -rn 'validate_certs:\\s*false' playbooks/ roles/`."
    cwe: ['CWE-295', 'CWE-297', 'CWE-322']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-23']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "basic_auth_without_tls_verification"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "ansible.builtin.uri Sends Basic-Auth Credentials With validate_certs: false"
    description: "An `ansible.builtin.uri` / `uri` task sets both `force_basic_auth: true` and `validate_certs: false` on the same task. `force_basic_auth: true` ships `Authorization: Basic <base64(user:password)>` in the very first request without waiting for a `401` challenge, so the credential is on the wire on every retry. With `validate_certs: false` on the same task, an on-path attacker presenting any TLS certificate receives the basic-auth credential and recovers the password with one base64 decode."
    regex: "(?ms)(?:ansible\\.builtin\\.uri|^[\\t ]*uri)\\s*:(?:(?!^\\s*-\\s+(?:name|block|hosts|ansible\\.builtin\\.))[\\s\\S]){0,1500}?(?:\\bforce_basic_auth\\s*:\\s*['\"]?(?:true|yes|on|1)['\"]?(?:(?!^\\s*-\\s+(?:name|block|hosts|ansible\\.builtin\\.))[\\s\\S]){0,1500}?\\bvalidate_certs\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?|\\bvalidate_certs\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?(?:(?!^\\s*-\\s+(?:name|block|hosts|ansible\\.builtin\\.))[\\s\\S]){0,1500}?\\bforce_basic_auth\\s*:\\s*['\"]?(?:true|yes|on|1)['\"]?)"
    positive_examples:
      - |2-
        - name: post update
          uri:
            url: "{{ api_base }}/v1/items"
            method: POST
            user: admin
            password: "{{ vault_admin_password }}"
            force_basic_auth: yes
            validate_certs: no
      - |2-
        ansible.builtin.uri:
          url: "{{ controller }}/api/v1/login"
          user: ops
          password: "{{ vault_ops_password }}"
          validate_certs: false
          force_basic_auth: true
    negative_examples:
      - |2-
        - name: post update
          uri:
            url: "https://api.internal.example.com/v1/items"
            method: POST
            user: ops
            password: "{{ vault_ops_password }}"
            force_basic_auth: yes
            validate_certs: yes
      - |2-
        - name: fetch token
          uri:
            url: "https://idp.internal/oauth/token"
            validate_certs: false
    multiline: true
    window: 40
    recommendation: "Set `validate_certs: true` on every `uri:` task that uses `force_basic_auth: true`. For internal CAs, install the bundle into the system trust store or pass `ca_path: /etc/pki/ca-trust/source/anchors/internal-ca.pem` instead of disabling validation. Add `no_log: true` to the task so the password is not written to logs."
    cwe: ['CWE-295', 'CWE-300', 'CWE-319', 'CWE-522']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.3.4, V14.2.1]
    mitre_attack: ['T1040', 'T1557', 'T1078']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['IA-5', 'SC-8', 'SC-8(1)', 'SC-23']
    pci_dss: ['4.1', '4.2.1', '8.3.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "uri_module_url_plaintext_http"
    category: "insecure_communication"
    severity: "HIGH"
    title: "ansible.builtin.uri Calls a Plaintext http:// URL"
    description: "An `ansible.builtin.uri` / `uri` task passes a `url:` starting with `http://` (not `https://`). Headers, bearer tokens, query-string parameters, and POST bodies travel in the clear across whatever network path the Ansible control node traverses - increasingly public WiFi/VPN hops in remote-work contexts. Attackers with packet-capture capability intercept the request, replay it, or inject responses (for `GET` calls that feed into `register:` downstream-logic, an injected response can pivot the playbook into arbitrary-command execution via Jinja2 template evaluation)."
    regex: "(?ms)(?:ansible\\.builtin\\.uri|^[\\t ]*uri)\\s*:[\\s\\S]{0,1000}?\\burl\\s*:\\s*['\"]?http://(?!localhost|127\\.0\\.0\\.1|169\\.254\\.169\\.254)"
    positive_examples:
      - |2-
        uri:
                url: "http://ansible.http.tests/cacert.pem"
    multiline: true
    window: 40
    recommendation: "Change `url: http://...` -> `url: https://...` on every uri task. If the upstream genuinely has no HTTPS endpoint (rare - most legacy services have been retrofitted by 2025), route through an internal TLS-terminating reverse-proxy (nginx/Envoy) that re-encrypts upstream. Localhost/metadata-service URLs are intentionally excluded by this rule."
    cwe: ['CWE-311', 'CWE-319', 'CWE-523']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557', 'T1565.002']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.1', '4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "get_url_url_plaintext_http"
    category: "insecure_communication"
    severity: "HIGH"
    title: "ansible.builtin.get_url Downloads From a Plaintext http:// URL"
    description: "An `ansible.builtin.get_url` / `get_url` task uses `url: http://...`. The downloaded artifact (archive, binary, installer, RPM/DEB) can be modified in-flight by any on-path attacker - especially acute when the artifact is subsequently executed (e.g. `mode: '0755'` + a later `ansible.builtin.shell` invocation, or the classic `dest: /tmp/install.sh` + `ansible.builtin.shell: bash /tmp/install.sh`). Mimics the `curl http://... | bash` pattern this scanner already flags, but at the Ansible-module layer."
    regex: "(?ms)(?:ansible\\.builtin\\.get_url|^[\\t ]*get_url)\\s*:(?:(?!\\n\\s*-\\s*(?:name|block)\\s*:)[\\s\\S]){0,500}?\\burl\\s*:\\s*['\"]?http://(?!localhost|127\\.0\\.0\\.1|169\\.254\\.169\\.254)"
    positive_examples:
      - |2
            ansible.builtin.get_url:
              url: http://files.example.com/install.sh
              dest: /tmp/install.sh
    multiline: true
    window: 40
    recommendation: "Change `url: http://...` -> `url: https://...` AND set `checksum: 'sha256:...'` to pin the expected hash (so MITM swaps of even HTTPS endpoints with a compromised upstream CA still fail). Prefer fetching from internal Artifactory/Nexus with an internal TLS cert over reaching to random public mirrors. Example: `checksum: 'sha256:{{ lookup(\"file\", \"checksums/\" + artifact_name + \".sha256\") }}'`."
    cwe: ['CWE-319', 'CWE-345', 'CWE-494']
    owasp_appsec: ["A02:2021", "A08:2021"]
    owasp_asvs: [V12.2.1, V12.3.4, V15.2.4]
    mitre_attack: ['T1105', 'T1195.002', 'T1557']
    cis_controls: ['CIS-2.6', 'CIS-3.10']
    nist_controls: ['SC-8', 'SC-8(1)', 'SI-7']
    pci_dss: ['4.1', '6.2']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
