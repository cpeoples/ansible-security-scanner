  - id: "exchange_or_google_external_forward_rule_enabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Mailbox inbox / transport rule configured to auto-forward externally (BEC persistence)"
    description: "A task creates an Exchange Online / Microsoft 365, Google Workspace, or on-prem Exchange mailbox inbox-rule / transport-rule / Gmail-forwarding-filter that auto-forwards mail to an external (non-tenant-owned) address. This is the #1 persistence mechanism after a Microsoft 365 / Google Workspace account takeover - Mandiant M-Trends 2024 and Microsoft Digital Defense Report 2024 both list mailbox forwarding rules as the primary BEC reconnaissance and invoice-fraud persistence technique. Matches `New-InboxRule -ForwardTo`, `Set-Mailbox -ForwardingSmtpAddress <external>`, `New-TransportRule -RedirectMessageTo`, Graph API `POST /users/{id}/mailFolders/inbox/messageRules` with external `forwardTo`, and Google Workspace `POST /admin/directory/v1/users/{u}/settings/forwardingAddresses`."
    regex: "(?:New-InboxRule[^\\n]*(?:-ForwardTo|-ForwardAsAttachmentTo|-RedirectTo)[^\\n]*@(?!(?:example\\.com|yourdomain\\.com))[a-zA-Z0-9_.-]+\\.[a-zA-Z]{2,}|Set-Mailbox[^\\n]*-(?:ForwardingSmtpAddress|ForwardingAddress)[^\\n]*@(?!(?:example\\.com|yourdomain\\.com))[a-zA-Z0-9_.-]+\\.[a-zA-Z]{2,}|New-TransportRule[^\\n]*(?:-RedirectMessageTo|-BlindCopyTo)[^\\n]*@[a-zA-Z0-9_.-]+\\.[a-zA-Z]{2,}|messageRules[\\s\\S]{0,400}?forwardTo[\\s\\S]{0,200}?emailAddress[\\s\\S]{0,80}?address\\s*:\\s*['\"][^'\"]+@[a-zA-Z0-9_.-]+\\.[a-zA-Z]{2,}|forwardingAddresses[\\s\\S]{0,200}?forwardingEmail\\s*[:=]\\s*['\"][^'\"]+@[a-zA-Z0-9_.-]+\\.[a-zA-Z]{2,})"
    positive_examples:
      - "New-InboxRule-ForwardTo@a.aa"
    multiline: true
    window: 10
    recommendation: "Block tenant-wide external auto-forwarding by default. In Microsoft 365: Exchange Online -> 'Anti-spam outbound policy' -> 'Automatic forwarding rules: Off - Forwarding is disabled'. In Google Workspace: Admin console -> Apps -> Google Workspace -> Gmail -> Routing -> disable 'Allow users to auto-forward to a specific email address'. For exceptional business need (e.g., shared mailbox forwarding to a ticketing system), allow per-user / per-domain exceptions via transport rule with a specific external sender allowlist, logged to a SIEM. Alert (P1) on every creation/update of an inbox-rule or forwarding address via the Microsoft 365 unified audit log (`New-InboxRule`, `Set-Mailbox`, `Add-MailboxPermission`) or Google Workspace Admin audit log. Run monthly recertification: `Get-Mailbox -ResultSize Unlimited | Where {$_.ForwardingSmtpAddress -ne $null}` and review. Review Microsoft's BEC playbook and the CISA + FBI IC3 BEC guidance (2024)."
