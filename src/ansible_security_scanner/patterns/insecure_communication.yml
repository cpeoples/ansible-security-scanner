  - id: "aws_cloudfront_distribution_uses_default_certificate"
    category: "insecure_communication"
    severity: "MEDIUM"
    title: "CloudFront Distribution Uses Default *.cloudfront.net Certificate (cloudfront_default_certificate: true)"
    description: "A `community.aws.cloudfront_distribution` task has `viewer_certificate.cloudfront_default_certificate: true` (or omits a custom `acm_certificate_arn:` / `iam_certificate_id:`). The distribution will serve TLS with CloudFront's default wildcard `*.cloudfront.net` cert, which (a) forces clients to either ignore the SAN mismatch for your custom domain or accept generic CF branding, (b) precludes any SNI-based access-control via `viewer_certificate.ssl_support_method: sni-only`, and (c) commonly correlates with origin configurations that fall back to HTTP-only, defeating end-to-end TLS."
    regex: "(?ms)community\\.aws\\.cloudfront_distribution\\s*:[\\s\\S]{0,2500}?(?:cloudfront_default_certificate\\s*:\\s*(?:true|True|yes|Yes|1)|viewer_certificate\\s*:\\s*\\{?\\s*cloudfront_default_certificate\\s*:\\s*(?:true|True|yes|Yes|1))"
    multiline: true
    window: 80
    positive_examples:
      - |2
        - community.aws.cloudfront_distribution:
            distribution_config:
              viewer_certificate:
                cloudfront_default_certificate: true
    recommendation: "Always attach a custom ACM certificate in us-east-1 (CloudFront requires that region) via `acm_certificate_arn: arn:aws:acm:us-east-1:...:certificate/...` and set `ssl_support_method: sni-only` + `minimum_protocol_version: TLSv1.2_2021`. Use `aws acm request-certificate --domain-name your.domain.com --validation-method DNS` and DNS-validate against Route 53 for zero-touch renewal. In audit mode, run `aws cloudfront list-distributions --query 'DistributionList.Items[?ViewerCertificate.CloudFrontDefaultCertificate==\\`true\\`]'` and remediate each hit."
    cwe: ['CWE-295', 'CWE-297', 'CWE-319']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
