  - id: "aws_elb_listener_http_on_internet_facing"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Internet-Facing ELB/ALB Listener Accepts Plain HTTP (Not HTTPS)"
    description: "An `amazon.aws.elb_classic_lb` / `community.aws.elb_application_lb` task with `scheme: internet-facing` configures a listener using `Protocol: HTTP` (or `protocol: http` / `listener.Protocol: HTTP`) on a public-facing port without a companion HTTPS listener + redirect rule. All requests to the load balancer travel unencrypted over the internet. This also defeats CloudFront's `https-only` / `redirect-to-https` viewer policy if an origin ALB still accepts HTTP."
    regex: "(?ms)(?:amazon\\.aws\\.elb_classic_lb|community\\.aws\\.elb_application_lb)\\s*:[\\s\\S]{0,2000}?scheme\\s*:\\s*['\"]?internet-facing['\"]?[\\s\\S]{0,2000}?(?:Protocol|protocol)\\s*:\\s*['\"]?HTTP['\"]?\\b(?!S)"
    positive_examples:
      - "amazon.aws.elb_classic_lb:scheme:internet-facingProtocol:HTTP"
    multiline: true
    window: 80
    recommendation: "Configure the ALB/ELB with only an HTTPS (443) listener. For backwards-compat with legacy clients, add an HTTP (80) listener whose ONLY action is `type: redirect` with `port: 443, protocol: HTTPS, status_code: HTTP_301` - this is the ALB-native, no-target-group, zero-capacity redirect. On a classic ELB, prefer migrating to ALB. For internal ELBs where you terminate TLS at the app tier, enforce `scheme: internal` explicitly so this rule does not fire. Audit with `aws elbv2 describe-listeners` and correlate against `Scheme: internet-facing`."
    cwe: ['CWE-311', 'CWE-319', 'CWE-523']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1557']
    cis_controls: ['CIS-3.10', 'CIS-15.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
