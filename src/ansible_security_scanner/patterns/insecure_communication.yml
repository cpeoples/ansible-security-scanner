name: "Insecure Communication Patterns"
author: "Ansible Security Scanner Team"
description: "Detects insecure communication protocols and credential exposure in URLs"

patterns:
  - id: "ftp_with_credentials"
    category: "insecure_communication"
    severity: "HIGH"
    title: "FTP with Embedded Credentials"
    description: >-
        FTP URL embeds user:password@ in the authority component. FTP transmits
        credentials and payload in plaintext; the URL alone is enough for a network
        observer to authenticate.
    regex: "ftp://[^@]*:[^@]*@"
    positive_examples:
      - "{{ 'ftp://admin:secret@example.com/path/to/myfile.yml' is url }}"
    recommendation: "FTP transmits the credential and payload in plaintext; switch the URL to sftp:// (transports over SSH) or https:// and source the credential from Ansible Vault / a secrets manager rather than embedding it in the URL."
    cwe: ["CWE-319", "CWE-522"]
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5, V12.2.1, V12.3.4]
    mitre_attack: ["T1040", "T1557"]
    cis_controls: ["CIS-3.1", "CIS-12.6"]
    nist_controls: ['AC-3', 'IA-5(7)', 'SC-8', 'SC-8(1)', 'SC-28']
    pci_dss: ['2.2.7', '3.5.1', '4.2.1', '8.6.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7']

  - id: "http_basic_auth"
    category: "insecure_communication"
    severity: "HIGH"
    title: "HTTP Basic Auth in URL"
    description: >-
        HTTP URL embeds user:password@ in the authority. Plain-HTTP Basic Auth sends
        the base64-encoded credential on every request and is recoverable from any
        on-path observer.
    regex: "http://[^@]*:[^@]*@"
    positive_examples:
      - |2-
        http://localhost:8080/createItem?name=test <<EOF
            <com.cloudbees.hudson.plugins.folder.Folder plugin="cloudbees-folder@
    recommendation: "Embedding user:pass@ in an http:// URL exposes the credential to anyone on the path; rewrite the URL as https://, and supply the credential via the module's url_username / url_password parameters loaded from Ansible Vault."
    cwe: ["CWE-319", "CWE-522"]
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5, V12.2.1, V12.3.4]
    mitre_attack: ["T1040", "T1557"]
    cis_controls: ["CIS-3.1", "CIS-12.6"]
    nist_controls: ['AC-3', 'IA-5(7)', 'SC-8', 'SC-8(1)', 'SC-28']
    pci_dss: ['2.2.7', '3.5.1', '4.2.1', '8.6.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7']

  - id: "insecure_protocol_usage"
    category: "insecure_communication"
    severity: "MEDIUM"
    title: "Insecure Protocol Usage"
    description: "An Ansible task value (url, dest, repo, src) references http://, ftp://, telnet://, tftp://, or rsync:// for content that is not signature-validated. None of these schemes encrypt traffic; tftp and rsync (the rsync:// daemon protocol, not rsync-over-ssh) additionally have no built-in authentication. URLs inside comments, license headers, doc text, and apt_key:/apt_repository: invocations (which are GPG-validated by the package manager) are filtered out post-match."
    regex: "\\b(?:http|ftp|telnet|tftp|rsync)://(?!(?:localhost|127\\.0\\.0\\.1|\\[::1\\])(?::|/))"
    positive_examples:
      - |2-
            - name: fetch config
              ansible.builtin.uri:
                url: http://internal-api.example.com/v1/config
      - |2-
            - name: download tarball
              ansible.builtin.get_url:
                url: http://files.example.com/payload.tar.gz
                dest: /tmp/p.tgz
      - |2-
            - name: tftp boot image (no auth, no encryption)
              ansible.builtin.get_url:
                url: tftp://boot.example.com/img.bin
                dest: /var/lib/img.bin
      - |2-
            - name: rsync daemon (no encryption)
              ansible.builtin.shell: rsync -av rsync://mirror.example.com/repo /srv/repo
    negative_examples:
      - |2-
            - name: fetch via https
              ansible.builtin.uri:
                url: https://api.example.com/v1/config
      - |2-
            - name: localhost ok
              ansible.builtin.uri:
                url: http://localhost:8080/healthz
    recommendation: "Replace http://, ftp://, and telnet:// with their TLS-protected equivalents (https://, sftp:// or ftps://, ssh://); for unauthenticated artifact fetches, additionally pin a SHA-256 via the module's checksum: parameter."
    cwe: ["CWE-319"]
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ["T1040"]
    cis_controls: ["CIS-12.6"]
    nist_controls: ['SC-8', 'SC-8(1)']
    pci_dss: ['2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7']

  - id: "ssl_verification_disabled"
    category: "insecure_communication"
    severity: "HIGH"
    title: "SSL Verification Disabled"
    description: >-
        verify_ssl / ssl_verify / check_ssl / validate_certs is set to false/no/0.
        Disabling cert validation defeats TLS's identity guarantee and reduces
        transport security to encryption alone.
    regex: "(?:verify_ssl|ssl_verify|check_ssl|validate_certs)\\s*:\\s*['\"]?(?:false|no|0|off|n)['\"]?(?:\\s|$|#)"
    positive_examples:
      - "validate_certs: false"
      - "validate_certs: 'no'"
      - "validate_certs: \"false\""
      - "validate_certs: 0"
      - "validate_certs: off"
      - "verify_ssl: No"
      - "ssl_verify: false  # legacy"
    negative_examples:
      - "validate_certs: true"
      - "validate_certs: 'true'"
      - "validate_certs: yes"
    recommendation: "Remove validate_certs: false / verify_ssl: false; if the endpoint uses an internal CA, distribute that CA bundle to the controller and pass it via ca_path: rather than disabling verification."
    cwe: ["CWE-295", "CWE-297"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]
    mitre_attack: ["T1557", "T1557.002"]
    cis_controls: ["CIS-3.1", "CIS-12.6"]
    nist_controls: ['AC-3', 'SC-8', 'SC-8(1)', 'SC-12', 'SC-28']
    pci_dss: ['3.5.1', '4.2.1', '4.2.1.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.7']

  - id: "weak_cipher_suite"
    category: "insecure_communication"
    severity: "MEDIUM"
    title: "Weak Cipher Suite"
    description: >-
        ssl_cipher / cipher_suite includes RC4, DES, MD5, or SHA1. These primitives
        are broken or deprecated and trip PCI-DSS, FedRAMP, and most modern cipher
        policies.
    regex: "(?:ssl_cipher|cipher_suite).*(?:RC4|DES|MD5|SHA1)"
    positive_examples:
      - "ssl_ciphers EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;"
    recommendation: "Drop RC4, single-DES, MD5, and SHA1 from the cipher / MAC list and require a modern TLS 1.2+ profile (e.g. Mozilla Intermediate); for SSH, use a curated Ciphers / MACs / KexAlgorithms list rather than the legacy defaults."
    cwe: ["CWE-326", "CWE-327"]
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ["T1040"]
    cis_controls: ["CIS-3.1", "CIS-12.6"]
    nist_controls: ['AC-3', 'SC-8', 'SC-8(1)', 'SC-28']
    pci_dss: ['3.5.1', '4.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.7']

  - id: "unencrypted_database_connection"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Unencrypted Database Connection"
    description: >-
        Database URL pins sslmode=disable or ssl=false. Unencrypted DB connections
        expose credentials and rows on the wire and fail HIPAA/PCI
        transit-encryption requirements.
    regex: "(?:mysql|postgres|mongodb)://.*(?:sslmode=disable|ssl=false)"
    positive_examples:
      - "mongodb_exporter_uri: \"mongodb://127.0.0.1:27017/admin?ssl=false\""
    recommendation: "Set sslmode=require (PostgreSQL) / ssl=true + ssl-mode=REQUIRED (MySQL) / ssl=true (MongoDB), and pin the server CA via sslrootcert / ssl-ca so the TLS handshake actually authenticates the database host."
    cwe: ["CWE-311", "CWE-319"]
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ["T1040"]
    cis_controls: ["CIS-3.1"]
    nist_controls: ['AC-3', 'SC-8', 'SC-8(1)', 'SC-28']
    pci_dss: ['2.2.7', '3.5.1', '4.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['C1.1', 'CC6.7']

  - id: "telnet_usage"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Telnet Protocol Usage"
    description: "Telnet transmits data (including credentials) in plaintext; use SSH instead"
    regex: "(?:^|\\s|[\"'])telnet\\s+(?:-\\w+\\s+)*[\\w.-]+"
    positive_examples:
      - "deny tcp 198.51.100.0 0.0.0.255 198.51.101.0 0.0.0.255 eq telnet ack tos 12"
    recommendation: "Replace telnet with ssh (or ansible.builtin.ssh) for interactive sessions and with ansible.builtin.uri / community.general.telnet only for explicit non-credentialed reachability checks against TLS-fronted ports."
    cwe: ["CWE-319"]
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V12.2.1, V12.3.4]
    mitre_attack: ["T1040"]
    cis_controls: ["CIS-12.6"]
    nist_controls: ['SC-8', 'SC-8(1)']
    pci_dss: ['2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7']
    stig: ['V-230264']

  - id: "plaintext_smtp"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Plaintext SMTP (No TLS)"
    description: "SMTP mail without TLS/SSL exposes credentials and message content on the wire"
    regex: "(?:smtp://(?!localhost|127\\.)|(?:secure|tls):\\s*(?:false|no|never|None)\\b.*(?:smtp|mail|postfix)|port:\\s*25\\b(?=.*(?:smtp|mail|postfix)))"
    positive_examples:
      - "smtp://"
    recommendation: "Submit mail on port 587 with STARTTLS or 465 with implicit TLS, set the module's secure: starttls / always option, and authenticate over the encrypted channel rather than port 25 in cleartext."
    cwe: ["CWE-311", "CWE-319"]
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ["T1040"]
    cis_controls: ["CIS-3.1", "CIS-12.6"]
    nist_controls: ['AC-3', 'SC-8', 'SC-8(1)', 'SC-28']
    pci_dss: ['2.2.7', '3.5.1', '4.2.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['C1.1', 'CC6.7']

  - id: "saml_assertion_no_signature_verify"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "SAML Assertion Signature Verification Disabled"
    description: "A playbook configures a SAML SP (Keycloak, Shibboleth, Apache mod_auth_mellon, Python saml2, Ansible AAP SAML auth) with `want_assertions_signed: false`, `want_response_signed: false`, `wantAssertionsSigned: false`, or `validateSignatures: false`. Without signature validation, an attacker who intercepts or replays any SAML response can impersonate any user - the classic SAML-re-signing attack that has compromised several IdP-federated platforms in 2024-2025."
    regex: "(?:want_assertions_signed|want_response_signed|wantAssertionsSigned|wantResponseSigned|validateSignatures|signAssertions)\\s*[:=]\\s*(?:false|no|0|disabled)"
    positive_examples:
      - "want_assertions_signed:false"
    multiline: true
    window: 4
    recommendation: "Always require signed assertions AND signed responses (`want_assertions_signed: true`, `want_response_signed: true`). Validate the signature against a pinned IdP certificate (rotate via automation tied to the IdP's metadata URL, not TOFU). Reject unsigned assertions at the SP layer - don't rely on transport-layer TLS as a substitute."
    cwe: ["CWE-345", "CWE-347"]
    owasp_appsec: ["A02:2021", "A08:2021"]
    mitre_attack: ["T1550.001", "T1606.002"]
    cis_controls: ["CIS-6.5"]
    nist_controls: ["IA-2", "IA-5", "SC-23"]
    pci_dss: ["8.2.1"]
    hipaa: ["164.312(d)"]
    soc2: ["CC6.1"]

  - id: "elasticsearch_security_disabled"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "Elasticsearch xpack.security Disabled Or Bound To 0.0.0.0"
    description: "A task renders `elasticsearch.yml` or invokes `elasticsearch-keystore`/`docker run elasticsearch` with `xpack.security.enabled: false` (or unset on 8.x, where the default is `true` only for self-managed clusters that generate an enrollment token) AND `network.host: 0.0.0.0` / `network.bind_host: 0.0.0.0`. Since Elastic 8.0 (Feb 2022) security is on-by-default; explicitly disabling it and binding to the public interface is the single largest cause of internet-exposed ES clusters and the Meow / ShinyHunters dump campaigns."
    regex: "xpack\\.security\\.enabled\\s*:\\s*(?:false|no|0)[\\s\\S]{0,300}?(?:network\\.(?:host|bind_host)\\s*:\\s*['\"]?(?:0\\.0\\.0\\.0|\\[?::\\]?))|(?:network\\.(?:host|bind_host)\\s*:\\s*['\"]?(?:0\\.0\\.0\\.0|\\[?::\\]?))[\\s\\S]{0,300}?xpack\\.security\\.enabled\\s*:\\s*(?:false|no|0)"
    positive_examples:
      - "xpack.security.enabled:falsenetwork.host:0.0.0.0"
    multiline: true
    window: 40
    recommendation: "Set `xpack.security.enabled: true`, bind to `network.host: _site_` (private interface), and configure at minimum the built-in `elastic` user with a strong password plus API keys for application access. Enable TLS for transport + HTTP with `xpack.security.transport.ssl.enabled: true` and `xpack.security.http.ssl.enabled: true`. If clients truly need internet exposure, front with a reverse-proxy that enforces mTLS or OIDC."
    cwe: ['CWE-284', 'CWE-306', 'CWE-319']
    owasp_appsec: ["A01:2021", "A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1190', 'T1213']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-6.5']
    nist_controls: ['AC-3', 'IA-2', 'SC-7', 'SC-8']
    pci_dss: ['1.2.1', '2.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "mongodb_no_auth_bind_all"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "MongoDB Running Without Authentication On A Public Interface"
    description: "A task renders `mongod.conf` / `docker run mongo` with `security.authorization: disabled` (or omits it while setting `net.bindIp: 0.0.0.0`), or starts `mongod` with `--noauth` and `--bind_ip_all`. This is the configuration that produced the 2017 MongoDB ransomware wave and the 2024 Meow attack resurgence (tens of thousands of exposed clusters). Even behind a firewall, running auth-disabled is an unrecoverable posture - an attacker who reaches the port has `admin.system.users` write."
    regex: "(?:security\\.authorization\\s*:\\s*['\"]?disabled|--noauth\\b)[\\s\\S]{0,300}?(?:net\\.bindIp\\s*:\\s*['\"]?(?:0\\.0\\.0\\.0|,?0\\.0\\.0\\.0|::)|--bind_ip_all|--bind_ip\\s+0\\.0\\.0\\.0)|(?:net\\.bindIp\\s*:\\s*['\"]?(?:0\\.0\\.0\\.0|::)|--bind_ip_all)[\\s\\S]{0,300}?(?:security\\.authorization\\s*:\\s*['\"]?disabled|--noauth\\b)"
    positive_examples:
      - "security.authorization:disablednet.bindIp:0.0.0.0"
    multiline: true
    window: 30
    recommendation: "Set `security.authorization: enabled`, create an admin user via `mongosh` with `db.createUser({user:'admin', pwd: <strong>, roles:['root']})` on first start, and bind to loopback or a private interface (`net.bindIp: 127.0.0.1,10.x.y.z`). Enable TLS with `net.tls.mode: requireTLS`. For sharded / replica-set deployments, also enable keyfile or x.509 cluster authentication."
    cwe: ['CWE-284', 'CWE-306']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1190', 'T1213']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-6.5']
    nist_controls: ['AC-3', 'IA-2', 'SC-7']
    pci_dss: ['1.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "redis_no_auth_protected_mode_disabled"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "Redis Without requirepass And With protected-mode no On Public Bind"
    description: "A task renders `redis.conf` / `docker run redis` without `requirepass` (or with a weak empty string) AND `protected-mode no` AND `bind 0.0.0.0`. Redis has no default authentication; `protected-mode` is the last-resort safety net that rejects external connections when auth is unconfigured. Disabling protected-mode on an exposed bind address produces the classic unauth-RCE chain via `CONFIG SET dir` + `SLAVEOF` / `MODULE LOAD` (Muhstik, WatchBog, P2PInfect 2024 campaigns)."
    regex: "protected-mode\\s+no\\b[\\s\\S]{0,400}?bind\\s+[^\\n#]*0\\.0\\.0\\.0|bind\\s+[^\\n#]*0\\.0\\.0\\.0[\\s\\S]{0,400}?protected-mode\\s+no\\b"
    positive_examples:
      - "protected-mode no bind  0.0.0.0"
    multiline: true
    window: 50
    recommendation: "Set a strong `requirepass <32+ char random>` (or switch to Redis 6+ ACLs with `user default off` and named users), keep `protected-mode yes`, and bind to a private interface: `bind 127.0.0.1 10.x.y.z`. Disable dangerous commands via `rename-command CONFIG \"\"`, `rename-command MODULE \"\"`, `rename-command DEBUG \"\"`, `rename-command SLAVEOF \"\"`. Enable TLS with `tls-port 6379 / port 0`."
    cwe: ['CWE-284', 'CWE-306']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1190', 'T1210']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-6.5']
    nist_controls: ['AC-3', 'IA-2', 'SC-7']
    pci_dss: ['1.2.1', '2.2.1', '8.3.1']
    soc2: ['CC6.1', 'CC6.6']

  - id: "mqtt_broker_allow_anonymous"
    category: "insecure_communication"
    severity: "HIGH"
    title: "MQTT Broker Configured With allow_anonymous true"
    description: "A task renders `mosquitto.conf` or an EMQX/HiveMQ config with `allow_anonymous true` (or omits `password_file` / JWT / OIDC bindings). MQTT brokers on the public internet with anonymous access have been weaponised to leak industrial telemetry (Shodan has ~150k exposed brokers as of 2024) and to pivot into OT networks via retained messages and Last-Will-and-Testament command injection."
    regex: "allow_anonymous\\s+true\\b|allow_anonymous\\s*:\\s*['\"]?true"
    positive_examples:
      - "allow_anonymous true"
    recommendation: "Set `allow_anonymous false` and configure `password_file /etc/mosquitto/passwd` (bcrypt-hashed) or switch to an ACL-capable broker (EMQX + JWT / OIDC, HiveMQ Enterprise + LDAP). Always enable TLS on port 8883 with `require_certificate true` for mutual-auth on OT topics. Use `acl_file` to deny wildcard subscribes from non-operator clients."
    cwe: ['CWE-287', 'CWE-306']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T0830', 'T1190']
    cis_controls: ['CIS-3.3', 'CIS-6.5']
    nist_controls: ['AC-3', 'IA-2', 'SC-7']
    pci_dss: ['1.2.1', '8.3.1']
    soc2: ['CC6.1']

  - id: "kafka_listener_plaintext_no_sasl"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Kafka Listener PLAINTEXT Without SASL Or ACLs"
    description: "A task renders `server.properties` / Strimzi KafkaUser / Helm values with `listeners=PLAINTEXT://0.0.0.0:9092` AND `allow.everyone.if.no.acl.found=true` (or no `authorizer.class.name` set at all). Kafka without SASL allows any network client to produce/consume to every topic - including `__consumer_offsets` and `__transaction_state`, which an attacker can rewrite to corrupt exactly-once semantics or replay historic events (seen in 2024 Confluent-Cloud tenant-escape PoCs)."
    regex: "listeners\\s*=\\s*PLAINTEXT://(?:0\\.0\\.0\\.0|\\[::\\])[\\s\\S]{0,400}?allow\\.everyone\\.if\\.no\\.acl\\.found\\s*=\\s*true|allow\\.everyone\\.if\\.no\\.acl\\.found\\s*=\\s*true[\\s\\S]{0,400}?listeners\\s*=\\s*PLAINTEXT://(?:0\\.0\\.0\\.0|\\[::\\])"
    positive_examples:
      - "listeners=PLAINTEXT://0.0.0.0allow.everyone.if.no.acl.found=true"
    multiline: true
    window: 40
    recommendation: "Replace `PLAINTEXT` with `SASL_SSL` and configure `sasl.enabled.mechanisms=SCRAM-SHA-512` (or mTLS via `SSL` listener with client-cert mapping). Set `authorizer.class.name=kafka.security.authorizer.AclAuthorizer` and `allow.everyone.if.no.acl.found=false`, then grant topic-level ACLs explicitly. For Strimzi, use `KafkaUser` with `authorization: { type: simple, acls: [...] }`."
    cwe: ['CWE-306', 'CWE-319']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1190']
    cis_controls: ['CIS-3.3', 'CIS-6.5']
    nist_controls: ['AC-3', 'IA-2', 'SC-8']
    pci_dss: ['2.2.1', '4.2.1', '8.3.1']
    soc2: ['CC6.1', 'CC6.6']

  - id: "etcd_client_cert_auth_disabled"
    category: "insecure_communication"
    severity: "CRITICAL"
    title: "etcd Running With client-cert-auth=false Or --insecure-transport"
    description: "A task renders an etcd manifest / systemd unit / `docker run quay.io/coreos/etcd` with `--client-cert-auth=false` or `--listen-client-urls=http://0.0.0.0:2379` (not https) or `--insecure-transport=true`. etcd is the Kubernetes control-plane's source of truth - anyone who can speak to it bypasses the API server, RBAC, admission controllers, and audit logging. Disabling client-cert-auth effectively hands a cluster-admin kubeconfig to anyone on the network."
    regex: "--client-cert-auth\\s*=\\s*false\\b|--insecure-transport\\s*=\\s*true\\b|--listen-client-urls\\s*=\\s*['\"]?http://(?:0\\.0\\.0\\.0|\\[::\\])"
    positive_examples:
      - "--listen-client-urls=http://0.0.0.0"
    recommendation: "Set `--client-cert-auth=true`, `--cert-file` / `--key-file` / `--trusted-ca-file`, and bind `--listen-client-urls=https://127.0.0.1:2379,https://<node-ip>:2379`. Never expose 2379/2380 on the public interface; restrict to the control-plane node network. For kubeadm-managed clusters, the default `/etc/kubernetes/manifests/etcd.yaml` already sets these correctly - any playbook that overwrites them should be reverted."
    cwe: ['CWE-284', 'CWE-306', 'CWE-319']
    owasp_appsec: ["A01:2021", "A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1190', 'T1552']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-6.5']
    nist_controls: ['AC-3', 'IA-2', 'SC-7', 'SC-8']
    pci_dss: ['1.2.1', '2.2.1', '4.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
