  - id: "prometheus_scrape_config_basic_auth_plaintext_over_http"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Prometheus Scrape Config With basic_auth Over HTTP (Cleartext Credentials Every Scrape)"
    description: "A Prometheus / VictoriaMetrics / Alertmanager / Thanos scrape-config YAML has a `basic_auth:` block (with `username:`+`password:` or `password_file:`) AND the target `scheme:` is `http` (or omitted, which defaults to `http`). Prometheus scrapes every 15-60s - on each scrape, the Basic Auth header (base64'd `user:pass`) is sent in plaintext HTTP. Any on-path attacker (even transiently - a misconfigured NIC, a noisy tcpdump container, a switch-span-port) captures the credential. This is a 2024 Sysdig-reported finding present in >40% of the corporate Prometheus deployments they audited. Distinct from `prometheus_scrape_no_tls` (general) - this one specifically flags the HTTP+basic-auth combo as the extractable-credential anti-pattern."
    regex: "(?:scrape_configs|job_name)[\\s\\S]{0,1500}?(?:basic_auth\\s*:[\\s\\S]{0,200}?(?:password|password_file)\\s*:[\\s\\S]{0,200}?(?:scheme\\s*:\\s*['\"]?http['\"]?(?!s)|(?!\\s*scheme))|scheme\\s*:\\s*['\"]?http['\"]?(?!s)[\\s\\S]{0,400}?basic_auth\\s*:[\\s\\S]{0,200}?(?:password|password_file)\\s*:)"
    multiline: true
    window: 50
    positive_examples:
      - |2
        scrape_configs:
          - job_name: 'awx-metrics'
            basic_auth:
              username: admin
              password: secret
            scheme: http
            static_configs:
              - targets: ['awx:8080']
    recommendation: "Use HTTPS for every scrape target with `basic_auth`: set `scheme: https` + `tls_config: {ca_file: /etc/ssl/internal-ca.pem, insecure_skip_verify: false}`. For service-to-service auth, prefer bearer tokens over basic auth: `authorization: {type: Bearer, credentials_file: /etc/prometheus/bearer.token}` - still require HTTPS. For internal-only metrics endpoints, use a service-mesh mTLS (Istio, Linkerd) so Prometheus scrapes over the mesh-protected link without explicit config. Rotate scrape credentials quarterly via Vault PKI / cert-manager + reload with `kill -HUP` or `/-/reload`. Audit via `kubectl get configmap -A -o json | jq '..|.basic_auth? | select(.) | input_filename'` -> cross-check each with the scrape-config's `scheme`."
    cwe: ['CWE-311', 'CWE-319', 'CWE-522']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1078.004', 'T1552.001']
    cis_controls: ['CIS-3.10', 'CIS-8.2', 'CIS-14.4']
    nist_controls: ['IA-5', 'SC-8', 'SC-8(1)']
    pci_dss: ['4.2.1', '8.3.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7', 'CC7.2']

  - id: "openssl_fips_mode_disabled_runtime"
    category: "insecure_communication"
    severity: "HIGH"
    title: "OpenSSL FIPS Mode Disabled At Runtime (OPENSSL_FIPS=0 / fips=0 / update-crypto-policies)"
    description: "A task sets `OPENSSL_FIPS=0` / `OPENSSL_FORCE_FIPS_MODE=0` in env, runs `update-crypto-policies --set DEFAULT` (RHEL/CentOS/Fedora - removes FIPS policy), `update-crypto-policies --set LEGACY` (even weaker - re-enables SHA-1, 3DES, DH-1024), `fips-mode-setup --disable`, or writes `/etc/system-fips` to absent. A host in FIPS mode rejects weak algorithms (MD5, SHA-1 for signatures, RC4, DES, RSA <2048, DH <2048) at the library layer - dropping out of FIPS re-enables them. FIPS 140-3 certification is required for US Federal, DoD, HIPAA, PCI-DSS (since 4.0), and many EU regulated workloads. A 'FIPS-certified' fleet that playbooks into non-FIPS mode fails audit and loses the cryptographic assurance the certification implies."
    regex: "(?:OPENSSL_FIPS\\s*[:=]\\s*['\"]?0['\"]?|OPENSSL_FORCE_FIPS_MODE\\s*[:=]\\s*['\"]?0['\"]?|update-crypto-policies\\s+[^\\n]*?--set\\s+(?:DEFAULT|LEGACY|FUTURE)\\b|fips-mode-setup\\s+[^\\n]*?--disable\\b|(?:ansible\\.builtin\\.)?(?:file|copy)[\\s\\S]{0,300}?(?:path|dest)\\s*:\\s*['\"]?/etc/system-fips['\"]?[\\s\\S]{0,150}?state\\s*:\\s*['\"]?absent['\"]?|FIPS_mode_set\\s*\\(\\s*0\\s*\\))"
    positive_examples:
      - "OPENSSL_FIPS:0"
    multiline: true
    window: 12
    recommendation: "Enable and KEEP FIPS mode on all regulated workloads: RHEL/CentOS/Fedora `fips-mode-setup --enable && reboot` + verify `fips-mode-setup --check` returns `FIPS mode is enabled.`. Ubuntu: install `ubuntu-advantage-tools` + `pro enable fips-updates` (requires Ubuntu Pro subscription). For container images, use RHEL UBI-FIPS (`registry.redhat.io/ubi9/ubi-minimal` with FIPS-enabled host kernel - containers inherit FIPS from host). Validate via golang `crypto/tls.FIPSEnabled()` or Python `ssl.FIPS_mode()` at app-startup - fail-closed if False. Audit: `update-crypto-policies --show` must return `FIPS` (or `FIPS:NO-ENFORCE` on transitional hosts). Alert on `update-crypto-policies` / `fips-mode-setup` invocations via auditd. For non-regulated workloads still benefiting from strong defaults, use `update-crypto-policies --set FUTURE` (stronger than DEFAULT, no FIPS cert overhead)."
    cwe: ['CWE-326', 'CWE-327', 'CWE-693']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1562.001', 'T1600']
    cis_controls: ['CIS-3.10', 'CIS-14.6']
    nist_controls: ['CM-6', 'SC-13', 'SC-13(1)']
    pci_dss: ['4.2.1', '6.3.3']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['CC6.7', 'CC7.1']

  - id: "sshd_weak_ciphers_3des_arcfour_cbc_or_hmac_md5"
    category: "insecure_communication"
    severity: "HIGH"
    title: "SSHD / Samba / Other Service Configured With Weak Ciphers (3des-cbc, arcfour, aes-cbc, hmac-md5, hmac-sha1)"
    description: "A task renders a service config (`/etc/ssh/sshd_config`, `/etc/ssh/ssh_config`, `smb.conf`, `krb5.conf`) with `Ciphers`, `MACs`, `KexAlgorithms`, or `HostKeyAlgorithms` lines containing legacy weak primitives: `3des-cbc` (Sweet32 birthday attack), `arcfour*` / `RC4` (bias attacks, removed 2015), `aes128-cbc` / `aes256-cbc` (plaintext-oracle attacks in CBC mode), `hmac-md5*` (chosen-prefix collisions), `hmac-sha1` (SHAttered 2017), `diffie-hellman-group1-sha1` (Logjam 1024-bit), `ssh-dss` (deprecated). Modern OpenSSH (≥9.0) has the safe defaults built-in - explicit `Ciphers` / `MACs` lines almost always ADD legacy support for 'some old device' and weaken the server. The 2024 CISA SSH-hardening guidance and NIST SP 800-52r2 explicitly ban these. Distinct from `sshd_ciphers` rule covering TLS-level (if any such rule exists); this catches the SSH + Kerberos + SMB variants comprehensively."
    regex: "(?:Ciphers|MACs|KexAlgorithms|HostKeyAlgorithms|PubkeyAcceptedAlgorithms|--ciphers|--macs|Protocol|client\\s+signing|server\\s+signing|allow\\s+weak\\s+crypto|permitted_enctypes|default_tgs_enctypes|default_tkt_enctypes)\\s*[:= ]\\s*[^\\n]*?\\b(?:3des-cbc|arcfour(?:128|256)?|aes(?:128|192|256)-cbc|hmac-md5(?:-96)?|hmac-sha1(?:-96)?|hmac-ripemd160|diffie-hellman-group1-sha1|diffie-hellman-group14-sha1|ssh-dss|des-cbc-crc|des-cbc-md5|rc4-hmac|des3-cbc-sha1)\\b"
    positive_examples:
      - "Ciphers:3des-cbc"
    multiline: true
    window: 5
    recommendation: "Remove explicit `Ciphers` / `MACs` / `KexAlgorithms` lines and let OpenSSH use built-in safe defaults (OpenSSH 9.x+ already excludes everything listed). If you MUST pin explicitly (e.g. for FIPS or CIS compliance): `Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com`, `MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com`, `KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512`, `HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256`. For Kerberos (`krb5.conf`): `permitted_enctypes = aes256-cts-hmac-sha384-192 aes128-cts-hmac-sha256-128 aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96`. For Samba: `server signing = mandatory` + `smb encrypt = required` + `ntlm auth = disabled`. Audit via `ssh-audit` (github.com/jtesta/ssh-audit) - enforce A+ rating in CI. For legacy clients that actually need weak crypto, segment them onto a DMZ + proxy."
    cwe: ['CWE-311', 'CWE-326', 'CWE-327']
    cve: ["CVE-2008-5161"]
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1, V14.2.1, V12.2.1]
    mitre_attack: ['T1040', 'T1557', 'T1600']
    cis_controls: ['CIS-3.10', 'CIS-4.8', 'CIS-14.6']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.2.1', '8.3.1']
    hipaa: ['164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['CC6.7']

  - id: "tls_min_version_below_1_2_nginx_apache_haproxy"
    category: "insecure_communication"
    severity: "HIGH"
    title: "Web/proxy server TLS min version configured below 1.2 (TLSv1.0 or 1.1 enabled)"
    description: "A task renders an nginx / Apache httpd / HAProxy / Envoy config with an explicit TLSv1 / TLSv1.1 protocol directive (`ssl_protocols TLSv1 TLSv1.1 TLSv1.2`, `SSLProtocol +TLSv1 +TLSv1.1`, `ssl-min-ver TLSv1.0`, `tls_minimum_protocol_version: TLSv1_1`). TLS 1.0 and 1.1 have been deprecated by IETF RFC 8996 (March 2021), disabled by default in all major browsers since 2020, removed from FIPS 140-3, and are an automatic PCI-DSS 4.0 audit failure. Legacy re-enablement is usually 'we have a compatibility test that broke' - which almost always means an old IoT device that itself needs to be retired, not TLS weakened for."
    regex: "(?:ssl_protocols\\s+[^\\n;]*\\bTLSv1(?:\\.1)?\\b|SSLProtocol\\s+[^\\n]*?\\+?TLSv1(?:\\.1)?\\b|ssl-min-ver\\s+TLSv1(?:\\.0|\\.1)?\\b|ssl-default-(?:bind|server)-options\\s+[^\\n]*\\bssl-min-ver\\s+TLSv1(?:\\.0|\\.1)?|tls(?:_?minimum)?_protocol_version\\s*:\\s*['\"]?TLSv1(?:_[01])?['\"]?|MinProtocol\\s*=\\s*TLSv1(?:\\.1)?\\b)"
    positive_examples:
      - "ssl_protocols TLSv1 TLSv1.1 TLSv1.2;"
    recommendation: "Set the minimum TLS version to 1.2 or 1.3 everywhere: `ssl_protocols TLSv1.2 TLSv1.3;` (nginx), `SSLProtocol -all +TLSv1.2 +TLSv1.3` (Apache), `ssl-default-bind-options ssl-min-ver TLSv1.2` (HAProxy), `tls_minimum_protocol_version: TLSv1_2` (Envoy). For client-side (ansible.builtin.uri, OpenSSL), also ensure `MinProtocol = TLSv1.2` in `/etc/ssl/openssl.cnf`. Audit via `testssl.sh <host>:443` + `sslyze --tlsv1 --tlsv1_1 <host>`. For legacy clients that truly can't do TLS 1.2, isolate them on a dedicated endpoint with its own narrow allow-list - don't weaken the main endpoint for everyone."
    cwe: ['CWE-326', 'CWE-327']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1562.004', 'T1565.002']
    cis_controls: ['CIS-3.10', 'CIS-3.11']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.2.1', '4.2.2']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "tls_weak_cipher_suite_rc4_3des_null_export"
    category: "insecure_communication"
    severity: "HIGH"
    title: "TLS cipher-suite config enables RC4 / 3DES / NULL / EXPORT / DES / MD5"
    description: "A task renders a TLS cipher-suite config that explicitly allows RC4, 3DES (SWEET32/CVE-2016-2183), NULL (no encryption), EXPORT (40/56-bit), DES, aNULL, eNULL, or MD5-based suites. Matches nginx (`ssl_ciphers`), Apache (`SSLCipherSuite`), HAProxy (`ssl-default-bind-ciphers`), OpenSSL (`openssl_cipher_list`), Envoy (`cipher_suites:`), and Kubernetes Ingress (`nginx.ingress.kubernetes.io/ssl-ciphers`). The presence of `:RC4:` or `:DES:` / `:3DES:` in a cipher string is an automatic PCI-DSS 4.0 failure and a CVSS-9+ finding in any modern pentest."
    regex: "(?:ssl_ciphers|SSLCipherSuite|ssl-default-(?:bind|server)-ciphers(?:uites)?|openssl_cipher_list|cipher_suites|ssl-ciphers)\\s*[:=\\s]\\s*['\"]?[^'\"\\n]*\\b(?:RC4|3DES|DES(?:-CBC)?|NULL|aNULL|eNULL|EXPORT(?:40|56)?|PSK-NULL|MD5)\\b"
    positive_examples:
      - "ssl_ciphers EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;"
    recommendation: "Use a modern cipher-suite string. For TLS 1.2: `ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256`. For TLS 1.3, the cipher suites are fixed by the spec - just enable TLS 1.3 and the right ones (TLS_AES_256_GCM_SHA384, TLS_CHACHA20_POLY1305_SHA256, TLS_AES_128_GCM_SHA256) are negotiated automatically. Use the Mozilla SSL Config Generator (ssl-config.mozilla.org) for `modern` or `intermediate` profiles matched to your deployment. Audit with `testssl.sh`, `sslyze --regular <host>`, and `nmap --script ssl-enum-ciphers`. Never keep `RC4`, `DES`, `3DES`, `NULL`, `EXPORT`, `MD5` in any cipher string - delete them entirely rather than disabling via priority."
    cwe: ['CWE-326', 'CWE-327']
    cve: ["CVE-2016-2183"]
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1557.001', 'T1562.004']
    cis_controls: ['CIS-3.10', 'CIS-3.11']
    nist_controls: ['SC-8', 'SC-13']
    pci_dss: ['4.2.1', '4.2.2']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "dkim_signing_key_weak_size_or_sha1"
    category: "insecure_communication"
    severity: "HIGH"
    title: "DKIM signing key deployed with RSA < 2048 bits or SHA-1 hash"
    description: "A task deploys or configures a DKIM (DomainKeys Identified Mail) signing key as an RSA key shorter than 2048 bits, or with SHA-1 (`a=rsa-sha1`) instead of SHA-256 (`a=rsa-sha256`). RFC 8301 (2018) formally deprecated rsa-sha1 and required a minimum 2048-bit key; every major mailbox provider (Google, Microsoft 365, Yahoo, Apple iCloud, Proton) rejects or downgrades mail signed with weaker keys - BIMI and DMARC reputation are impacted. 2024 Google / Yahoo bulk-sender policy updates (Feb 2024) explicitly require 2048-bit RSA + SHA-256 for any sender over 5k msg/day. 1024-bit RSA signing keys have been factorable on commodity GPU clusters since 2022. Matches Postfix/OpenDKIM/rspamd DKIM keygen with `-b 1024`, DNS TXT record `k=rsa; p=<short-base64>`, `mail_services.dkim.keysize: 1024`, and AWS SES `create-email-identity` with `KeyLength: RSA_1024_BIT`."
    regex: "(?:opendkim-genkey[^\\n]*-b\\s*(?:512|768|1024)|dkim[^\\n]{0,40}(?:keysize|key_size|rsa_bits)\\s*[:=]\\s*(?:512|768|1024)|(?:openssl\\s+genrsa|ssh-keygen)[^\\n]*dkim[^\\n]*-?(?:b\\s*|bits\\s*=?)\\s*(?:512|768|1024)|['\"]?a['\"]?\\s*[:=]\\s*['\"]?rsa-sha1['\"]?|DkimSigningKeyLength\\s*[:=]\\s*(?:RSA_1024_BIT|1024)|community\\.general\\.(?:opendkim|rspamd)[\\s\\S]{0,300}?keysize\\s*[:=]\\s*(?:512|768|1024))"
    positive_examples:
      - "opendkim-genkey-b512"
    recommendation: "Generate all DKIM keys as 2048-bit RSA with SHA-256: `opendkim-genkey -s mail-2025 -d example.com -b 2048` (or `-b 4096` for high-assurance domains - note that 4096-bit DNS TXT records need splitting into two strings to fit the 255-byte limit). Always use `a=rsa-sha256` in the signing record. Rotate DKIM selectors every 6-12 months: publish the new selector in DNS, switch signing, retire the old selector after 30 days. For AWS SES, use `PutEmailIdentityDkimSigningAttributes` with `NextSigningKeyLength: RSA_2048_BIT`. For Microsoft 365, the service manages DKIM keys - just enable per-domain signing in the Exchange admin center and confirm 2048-bit. For Google Workspace, use `Dkim DNS management` -> generate 2048-bit. Align DKIM with SPF + DMARC (p=reject) per RFC 7489 and the 2024 Google/Yahoo bulk-sender requirements. Audit with `dig TXT mail-2025._domainkey.example.com +short | grep -o 'p=[^\"]*' | base64 -d | openssl rsa -pubin -text -noout 2>&1 | grep Public-Key`."
    cwe: ['CWE-326', 'CWE-327']
    owasp_appsec: ["A02:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1585.002', 'T1598.002']
    cis_controls: ['CIS-9.4', 'CIS-9.5']
    nist_controls: ['SC-12', 'SC-13', 'SI-8']
    pci_dss: ['4.2.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "dmarc_policy_none_or_missing_on_production_domain"
    category: "insecure_communication"
    severity: "HIGH"
    title: "DMARC record deployed with p=none (monitor-only) or missing on a production domain"
    description: "A task publishes or updates a DMARC DNS TXT record (`_dmarc.<domain>`) with `p=none` (monitor-only, no enforcement) - OR a `p=quarantine` / `p=reject` record with `pct=` < 100 - on what is clearly a production / mail-sending domain. `p=none` gives zero protection against direct-domain spoofing (the #1 BEC / phishing pattern, per FBI IC3 2024 reporting $6.3B annual losses). Google, Yahoo, Apple iCloud, and Microsoft 365 (Feb 2024) now require at least `p=quarantine` for bulk senders; many mailbox providers downgrade reputation of any `p=none` sender. Also matches misconfigured records missing `rua`/`ruf` aggregate reporting, or `sp=none` (subdomain policy explicitly weakened below the parent)."
    regex: "(?:_dmarc[\\s\\S]{0,200}?['\"]?v=DMARC1[\\s\\S]{0,300}?p\\s*=\\s*none\\b|['\"]?v=DMARC1['\"]?[^\\n]{0,300}?\\bsp\\s*=\\s*none\\b|['\"]?v=DMARC1['\"]?[^\\n]{0,300}?\\bp\\s*=\\s*(?:quarantine|reject)[^\\n]{0,100}?\\bpct\\s*=\\s*(?:[1-9]|[1-8][0-9]|90|9[1-9])\\b|dmarc_policy\\s*[:=]\\s*['\"]?none['\"]?|community\\.general\\.(?:cloudflare|route53)_dns_record[\\s\\S]{0,300}?_dmarc[\\s\\S]{0,200}?p=none)"
    positive_examples:
      - "_dmarcv=DMARC1p=none"
    recommendation: "Deploy DMARC in three phases over ~90 days: (1) Week 1-4: `v=DMARC1; p=none; rua=mailto:dmarc-agg@example.com; ruf=mailto:dmarc-fail@example.com; fo=1` - collect aggregate + failure reports, ensure SPF + DKIM pass for every legitimate sender (Salesforce, Marketo, SendGrid, Workday, helpdesk). (2) Week 5-8: step to `p=quarantine; pct=25`, then 50, then 100 - monitor dmarc-aggregate reports for passing %. (3) Week 9+: step to `p=reject; pct=100; sp=reject; aspf=s; adkim=s`. Set `sp` (subdomain) at least as strict as `p`. Use a DMARC analytics service (Dmarcian, Valimail, Postmark DMARC Digests, Cloudflare DMARC Management 2024) during rollout. For parked / non-sending domains, publish the strict 'null-MX + hard DMARC' pattern: `v=DMARC1; p=reject; sp=reject; rua=mailto:dmarc@example.com; adkim=s; aspf=s` immediately. Required by the Feb 2024 Google + Yahoo bulk-sender policy for >5k msg/day. Review NIST SP 800-177r1 and M3AAWG email-authentication best practices."
    cwe: ['CWE-290', 'CWE-345']
    owasp_appsec: ["A07:2021", "A08:2021"]
    mitre_attack: ['T1566.001', 'T1585.002', 'T1598.002']
    cis_controls: ['CIS-9.4', 'CIS-9.5', 'CIS-9.6']
