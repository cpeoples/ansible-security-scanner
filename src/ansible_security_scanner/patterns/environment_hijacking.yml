name: "Environment Hijacking"
author: "Ansible Security Scanner Team"
description: "Detects manipulation of system environment, DNS, network resolution, and execution paths to redirect or intercept traffic and commands"

patterns:
  - id: "etc_hosts_manipulation"
    category: "environment_hijacking"
    severity: "HIGH"
    title: "/etc/hosts DNS Hijacking"
    description: "Modifies /etc/hosts to redirect domain resolution to attacker-controlled IPs"
    regex: "(?:lineinfile|blockinfile|copy|template).*(?:dest|path):\\s*['\"]?/etc/hosts\\b"
    positive_examples:
      - "    - ansible.builtin.lineinfile: { dest: /etc/hosts, line: '10.0.0.1 evil.example.com' }"
    recommendation: "Hosts file changes should use centralized DNS; review all entries for domain hijacking"
    no_ansible_remediation: true
    cwe: ["CWE-345"]
    owasp_appsec: ["A08:2021"]
    mitre_attack: ["T1557"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "resolv_conf_manipulation"
    category: "environment_hijacking"
    severity: "HIGH"
    title: "DNS Resolver Manipulation"
    description: "Modifies /etc/resolv.conf to point to attacker-controlled DNS servers"
    regex: "(?:lineinfile|blockinfile|copy|template).*(?:dest|path):\\s*['\"]?/etc/resolv\\.conf\\b|nameserver\\s+(?!127\\.0\\.0\\.1|::1|8\\.8\\.[84]\\.[84]|1\\.1\\.1\\.1)(?:\\d{1,3}\\.){3}\\d{1,3}"
    positive_examples:
      - |2
            - ansible.builtin.lineinfile: { dest: /etc/resolv.conf, line: 'nameserver 1.2.3.4' }
    recommendation: "DNS resolver changes must point to trusted corporate or well-known DNS servers"
    no_ansible_remediation: true
    cwe: ["CWE-345"]
    owasp_appsec: ["A08:2021"]
    mitre_attack: ["T1557"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "ntp_server_manipulation"
    category: "environment_hijacking"
    severity: "MEDIUM"
    title: "NTP Server Manipulation"
    description: "Changes NTP server configuration, potentially enabling time-based authentication bypass"
    regex: "(?:lineinfile|blockinfile|copy|template).*(?:dest|path):\\s*['\"]?/etc/(?:ntp\\.conf|chrony\\.conf|systemd/timesyncd\\.conf)"
    positive_examples:
      - "    - ansible.builtin.copy: { src: rogue.conf, dest: /etc/ntp.conf }"
    recommendation: "NTP should only point to trusted, authorized time servers"
    no_ansible_remediation: true
    cwe: ["CWE-345"]
    owasp_appsec: ["A08:2021"]
    mitre_attack: ["T1565.001"]
    cis_controls: ["CIS-8.4"]
    nist_controls: ['AU-8', 'AU-9', 'SC-8', 'SI-7']
    pci_dss: ['6.3.2', '10.3.4']
    soc2: ['CC7.1', 'CC7.2']

  - id: "path_env_prepend"
    category: "environment_hijacking"
    severity: "HIGH"
    title: "PATH Environment Variable Manipulation"
    description: "Prepends a directory to PATH, allowing malicious binaries to shadow legitimate system commands"
    regex: "(?:export\\s+)?PATH\\s*=\\s*['\"]?(?:/tmp|/var/tmp|/dev/shm|\\{\\{).*:\\$PATH|PATH\\s*=.*:\\$\\{?PATH"
    positive_examples:
      - "export PATH=~/.local/bin:$PATH"
    recommendation: "Never prepend untrusted directories to PATH; only use system paths"
    no_ansible_remediation: true
    cwe: ["CWE-427"]
    mitre_attack: ["T1574.007"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "pythonpath_manipulation"
    category: "environment_hijacking"
    severity: "HIGH"
    title: "PYTHONPATH Manipulation"
    description: >-
        PYTHONPATH is exported, or set to a writable location like /tmp, /var/tmp,
        or /dev/shm. Python imports the planted module first, giving the attacker
        code execution as the playbook user.
    regex: "(?:export\\s+)?PYTHONPATH\\s*=|PYTHONPATH.*(?:/tmp|/var/tmp|/dev/shm)"
    positive_examples:
      - "shell: \"PYTHONPATH=$(echo {{ remote_tmp_dir }}/pip_root{{ pip_python_site_lib.stdout }}) {{ remote_tmp_dir }}/pip_root{{ pip_python_user_base.stdout }}/bin/ansible_test_pip_chdir\""
    recommendation: "PYTHONPATH should not be modified in playbooks; use virtual environments instead"
    no_ansible_remediation: true
    cwe: ["CWE-427"]
    mitre_attack: ["T1574"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "alternatives_manipulation"
    category: "environment_hijacking"
    severity: "HIGH"
    title: "System Alternatives Manipulation"
    description: "Uses update-alternatives to replace system binaries with attacker-controlled versions"
    regex: "update-alternatives\\s+--(?:install|set|config).*(?:/usr/bin/|/usr/sbin/)"
    positive_examples:
      - "settings: {\"commandToExecute\": \"apt-get update && apt-get install -y python2 && update-alternatives --install /usr/bin/python python /usr/bin/python2 1\"}"
    recommendation: "Alternatives changes should be reviewed; only use packages from trusted repositories"
    no_ansible_remediation: true
    cwe: ["CWE-506"]
    mitre_attack: ["T1036.005"]
    cis_controls: ["CIS-2.3"]
    nist_controls: ['SI-3', 'SI-7']
    soc2: ['CC6.8']

  - id: "ld_config_manipulation"
    category: "environment_hijacking"
    severity: "CRITICAL"
    title: "Dynamic Linker Configuration Tampering"
    description: "Modifies /etc/ld.so.conf or runs ldconfig with custom paths to inject malicious shared libraries"
    regex: "/etc/ld\\.so\\.conf(?:\\.d/)?|ldconfig.*(?:/tmp|/var/tmp|/dev/shm|/home)"
    positive_examples:
      - "/etc/ld.so.conf"
    recommendation: "Never add untrusted paths to the dynamic linker configuration"
    no_ansible_remediation: true
    cwe: ["CWE-427"]
    mitre_attack: ["T1574.006"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "motd_banner_injection"
    category: "environment_hijacking"
    severity: "MEDIUM"
    title: "MOTD/Profile Script Injection"
    description: "Injects commands into /etc/profile, /etc/motd, or login scripts that execute on every user login"
    regex: "(?:dest|path):\\s*['\"]?/etc/(?:profile\\.d/|profile$|bash\\.bashrc|environment).*(?:shell|command|raw)"
    positive_examples:
      - "    dest: /etc/profile.d/payload.sh shell: /bin/sh"
    recommendation: "Login scripts should only contain legitimate system configuration"
    no_ansible_remediation: true
    cwe: ["CWE-506"]
    mitre_attack: ["T1546.004"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7', 'SI-3', 'SI-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC6.8', 'CC7.1', 'CC8.1']

  - id: "library_path_injection"
    category: "environment_hijacking"
    severity: "HIGH"
    title: "Library Search Path Injection"
    description: "Modifies CLASSPATH, GEM_PATH, NODE_PATH, or other language library paths to load malicious code"
    regex: "(?:export\\s+)?(?:CLASSPATH|GEM_PATH|GEM_HOME|NODE_PATH|RUBYLIB|PERL5LIB|GOPATH)\\s*=.*(?:/tmp|/var/tmp|/dev/shm)"
    positive_examples:
      - "CLASSPATH=/tmp"
    recommendation: "Language library paths should only reference trusted, system-managed directories"
    no_ansible_remediation: true
    cwe: ["CWE-427"]
    mitre_attack: ["T1574"]
    cis_controls: ["CIS-4.1"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']
