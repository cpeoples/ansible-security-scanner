  - id: "discord_telegram_pastebin_c2_beacon"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Task POSTs To Discord / Telegram / Pastebin As Live C2 Or Exfil Channel"
    description: "A task invokes `uri`, `ansible.builtin.uri`, `community.general.slack` misused, `curl -X POST`, or a Jinja-templated HTTP call against a Discord webhook (`discord.com/api/webhooks/<id>/<token>`), a Telegram bot API (`api.telegram.org/bot<token>/sendMessage|sendDocument`), Pastebin paste API (`pastebin.com/api/api_post.php`), Hastebin / dpaste / ix.io, or a Keybase chat API. These endpoints are the 2024 default C2 / exfil channels for commodity loaders (AgentTesla, RedLine, Vidar, Lumma, Meduza Stealer) because they blend with legitimate SaaS traffic, TLS-encrypt automatically, and require no infrastructure on the attacker side. Legitimate automation essentially never POSTs to them."
    regex: "(?:ansible\\.builtin\\.uri|community\\.general\\.slack|shell|command|raw)[\\s\\S]{0,500}?(?:url|uri|endpoint|dest)\\s*[:=]\\s*['\"]?https?://(?:discord(?:app)?\\.com/api/webhooks/|api\\.telegram\\.org/bot[^/\\s]+/(?:sendMessage|sendDocument|sendPhoto)|pastebin\\.com/api/api_post\\.php|hastebin\\.com/documents|dpaste\\.com/api|ix\\.io/?|keybase\\.io/_/api)"
    positive_examples:
      - "ansible.builtin.uriurl:http://discord.com/api/webhooks/"
    multiline: true
    window: 10
    recommendation: "Remove the task immediately and treat the host as compromised - no production automation legitimately needs to POST to Discord / Telegram / Pastebin. Rotate credentials reachable from the host, pull network flow logs for any POST to the listed endpoints in the past 30 days, and hunt for the webhook/bot token's usage history via Discord's audit-log API or Telegram's `getMe`. Block the listed domains at the egress firewall (`discord.com`, `api.telegram.org`, `pastebin.com`) outside of narrowly-scoped ChatOps use-cases, which should use an authenticated enterprise broker (Mattermost, Slack Enterprise Grid) instead."
