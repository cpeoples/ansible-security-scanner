  - id: "office_macro_docm_xlsm_with_autoopen_vba_pushed_via_copy"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Office Macro-Enabled Document (.docm/.xlsm/.pptm) With AutoOpen/Workbook_Open VBA Pushed To Targets"
    description: "A task uses `win_copy`, `copy`, `fetch`, `get_url`, or `ansible.builtin.copy` to transfer a macro-enabled Office document (`.docm`, `.xlsm`, `.pptm`, `.dotm`, `.xlsb` with `vbaProject.bin`, `.xll` Excel add-in) to user profile directories (`%APPDATA%`, `Desktop`, `Documents`, `Downloads`, `Startup`, `XLSTART`, Office Templates) OR explicitly references VBA auto-execution hooks (`AutoOpen`, `AutoExec`, `Workbook_Open`, `Document_Open`, `Auto_Close`, `Class_Initialize`). Office macros remain the #1 initial-access vector in 2024 Verizon DBIR (16% of all breaches with a known TTP). Even with Microsoft's 2022 'Macros blocked from the Internet by default' policy, macros in internally-transferred documents (via Ansible playbook) execute without the MotW block. Detection of AutoOpen/Workbook_Open specifically catches the fire-on-open pattern that turns a policy push into RCE. Distinct from lateral-movement rules (this is specifically malicious document delivery via automation)."
    regex: "(?:win_copy|ansible\\.windows\\.win_copy|ansible\\.builtin\\.copy|copy|get_url)[\\s\\S]{0,500}?(?:src|url|dest)[\\s\\S]{0,300}?\\.(?:docm|xlsm|pptm|dotm|xlsb|xltm|pptm|xlam|xll)\\b|(?:dest|path)\\s*[:=]\\s*['\"]?[^'\"\\n]*?(?:AppData|Desktop|Documents|Startup|XLSTART|Templates|Documenti|Documentos)[^'\"\\n]*?\\.(?:docm|xlsm|pptm)|(?:Sub|Function)\\s+(?:AutoOpen|AutoExec|Workbook_Open|Document_Open|Auto_Close|Class_Initialize|Workbook_BeforeClose)\\s*\\(|VBA\\.(?:CreateObject|Shell|Run)[\\s\\S]{0,200}?(?:WScript\\.Shell|powershell|cmd\\.exe)|\\.dotm.*Startup|xlStart.*\\.xl[asm]"
    positive_examples:
      - "win_copysrc.docm"
    multiline: true
    window: 12
    recommendation: "Do NOT distribute macro-enabled Office documents via Ansible for any production workflow. Block macro execution organization-wide via Group Policy: `Computer Config -> Admin Templates -> Microsoft Office 2016 -> Security -> Block macros from running in Office files from the Internet = Enabled` + `VBA Macro Notification Settings = Disable all without notification`. For legitimate macro use (finance teams, engineering calc sheets), require **code-signed macros only** with a digital signature from an internal CA trusted in the user's cert store. Convert existing macros to Office Scripts (cloud-backed, signed, sandboxed, no VBA). Quarantine macro-enabled files at email gateway. If a playbook MUST deliver templates, deliver the non-macro variant (`.docx`, `.xlsx`). Detect: Sysmon Event ID 1 for `WINWORD.EXE`/`EXCEL.EXE` with child process (`cmd.exe`, `powershell.exe`, `wscript.exe`) - this combination is >99% malicious. Alert on any Ansible task transferring `.docm`/`.xlsm`/`.pptm` to user-writable paths."
    no_ansible_remediation: true
    cwe: ['CWE-94', 'CWE-506', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []
    mitre_attack: ['T1059.005', 'T1137.001', 'T1204.002']
