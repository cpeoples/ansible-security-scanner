  - id: "msbuild_inline_task_lolbin_execution"
    category: "malicious_activity"
    severity: "HIGH"
    title: "MSBuild Inline-Task XML (.csproj/.xml) Executed As LOLBIN For Unsigned Code Execution"
    description: "A task creates a `.csproj`, `.xml`, `.proj`, or `.targets` file containing an `<UsingTask>` with inline `Code Type=\"Class\"` / `Code Type=\"Fragment\"` containing C# source, then invokes `MSBuild.exe <file>` / `msbuild /t:<target>` - OR the task uses `powershell` to execute MSBuild against a payload. MSBuild is a Microsoft-signed Windows binary (`%WINDIR%\\Microsoft.NET\\Framework64\\v4.0.30319\\MSBuild.exe`) present on EVERY Windows host since .NET 4, so it bypasses AppLocker 'signed executables only' policies, bypasses Constrained Language Mode (runs C# not PowerShell), and its build output looks legitimate in EDR telemetry. Cobalt Strike, Brute Ratel, and Nighthawk all ship MSBuild inline-task templates for exactly this reason. 2024 Red Canary Threat Report lists `msbuild.exe` as #4 most-abused LOLBIN."
    regex: "<UsingTask\\b[^>]*TaskName[\\s\\S]{0,500}?<Code\\s+Type\\s*=\\s*['\"]?(?:Class|Fragment)['\"]?|<Task\\b[\\s\\S]{0,600}?<Code\\s+Type\\s*=\\s*['\"]?(?:Class|Fragment)['\"]?|(?:msbuild|MSBuild)(?:\\.exe)?\\s+[^\\n]*?(?:\\.(?:csproj|xml|proj|targets))\\b[\\s\\S]{0,200}?(?:/t:|/target:|/p:)|msbuild\\.exe\\s+[^\\n]*?\\\\Users\\\\[^\\s]+\\\\(?:AppData|Temp|Downloads)|(?:win_shell|ansible\\.windows\\.win_shell|win_command|ansible\\.windows\\.win_command)[\\s\\S]{0,400}?msbuild[\\s\\S]{0,100}?(?:\\.csproj|\\.xml|\\.proj|\\.targets)"
    positive_examples:
      - "<UsingTask TaskName <Code Type =  Class "
    multiline: true
    window: 15
    recommendation: "Block `MSBuild.exe` with AppLocker or Microsoft Defender Application Control (WDAC) on hosts that do NOT legitimately compile .NET code (i.e. everything except developer workstations and build servers). Use WDAC's `--Block-MSBuild-Code-Execution` supplemental policy from Microsoft's recommended-block-list. On dev hosts where MSBuild IS legitimate, alert on MSBuild invocations with `.csproj` / `.xml` paths under user profile directories (`AppData`, `Temp`, `Downloads`, `Desktop`) - legitimate dev work uses source-controlled repos, NEVER from those paths. Detect: Sysmon Event ID 1 with `Image=*\\msbuild.exe` + `CommandLine` matching user-profile paths. For Ansible automation that needs compilation, use a dedicated build agent in a locked-down network segment with limited egress - not 'msbuild.exe from a user laptop playbook'. Audit: `Get-EventLog -LogName Application -Source 'MSBuild' -After (Get-Date).AddDays(-7)` - any entry on a non-dev host is suspicious."
    no_ansible_remediation: true
    cwe: ['CWE-94', 'CWE-506', 'CWE-829']
    owasp_appsec: ["A03:2021", "A08:2021"]
