  - id: "lolbas_certutil_url_download"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "certutil.exe Used To Download Remote Payload (LOLBAS)"
    description: "A Windows task invokes `certutil.exe -urlcache -split -f http://... <dest>` or `certutil -decode <b64file> <exe>` - the canonical LOLBAS primitive for fetching or decoding second-stage payloads while masquerading as a PKI tool. certutil is signed by Microsoft, runs with any-user context, and is not blocked by the default Windows Defender Attack Surface Reduction baseline - which is exactly why every commodity loader (Qakbot, Emotet, Black Basta) uses it."
    regex: "certutil(?:\\.exe)?\\s+(?:-urlcache|-verifyctl|-split)\\s+[^\\n]{0,300}https?://|certutil(?:\\.exe)?\\s+-decode\\s+[^\\n]{0,200}\\.(?:exe|dll|ps1|bat)"
    positive_examples:
      - "certutil -urlcache http://"
    recommendation: "Remove the task. If you genuinely need to fetch a signed binary on Windows, use `ansible.windows.win_get_url` with `checksum:` set, or `Invoke-WebRequest -UseBasicParsing` with certificate pinning. Block certutil download behaviour at policy layer via the ASR rule `Block executable content from email client and webmail` (GUID BE9BA2D9-53EA-4CDC-84E5-9B1EEEE46550) and the `BlockOfficeCommunicationAppFromCreatingChildProcesses` equivalents. Monitor with Sysmon Event ID 1 + 3 for `certutil.exe` with a URL in the command line."
    no_ansible_remediation: true
