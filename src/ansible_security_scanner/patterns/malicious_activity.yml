    description: "A task templates or copies a file whose name matches the canonical ransomware-note shape (`HOW_TO_DECRYPT*.txt`, `DECRYPT_INSTRUCTIONS*.txt`, `RESTORE-MY-FILES.txt`, `README_FOR_DECRYPT*.txt`, `_readme.txt` with decrypt keyword in content) into `C:\\Users\\*`, `/home/*`, or `/root`. There is essentially no legitimate reason for a configuration playbook to drop such a filename - it is either a training exercise (should live outside production inventories) or an active extortion payload."
