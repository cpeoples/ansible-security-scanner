    pci_dss: ['1.2.1', '6.3.3']
    soc2: ['CC7.1', 'CC7.2']

  - id: "lolbas_bitsadmin_transfer"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "bitsadmin.exe /transfer Used To Download Remote Payload (LOLBAS)"
    description: "A Windows task invokes `bitsadmin /transfer <jobname> /download /priority <n> http://... <dest>`. BITS (Background Intelligent Transfer Service) was designed for Windows Update but the LOLBAS pattern `bitsadmin /transfer` downloads arbitrary files while appearing as a benign OS service, bypassing many network-activity heuristics because the traffic originates from `svchost.exe` hosting BITS rather than the caller."
