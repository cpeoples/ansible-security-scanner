  - id: "lolbas_esentutl_vss_ntds_copy"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "esentutl.exe Used To Copy NTDS.dit or SYSTEM Hive Via VSS (LOLBAS)"
    description: "A task invokes `esentutl.exe /y /vss C:\\\\Windows\\\\NTDS\\\\ntds.dit` or `/vss C:\\\\Windows\\\\System32\\\\config\\\\SYSTEM`. esentutl's `/y` copy flag combined with `/vss` (Volume Shadow Copy) pulls a consistent copy of locked files - the preferred technique for offline NTDS.dit extraction after domain-admin compromise, because it avoids `ntdsutil.exe ifm create` which drops obvious audit events. With NTDS.dit + SYSTEM hive an attacker has every AD credential hash."
