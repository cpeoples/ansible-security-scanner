  - id: "bitlocker_force_encrypt_ransomware_primitive"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "BitLocker Force-Enabled From Automation With Attacker-Controlled Recovery Key"
    description: "A task invokes `manage-bde -on <drive> -recoverypassword <password>` or `Enable-BitLocker -MountPoint <drive> -RecoveryPasswordProtector` from an ad-hoc Ansible playbook (not a signed corporate MDM / GPO baseline). This is the exact primitive used by LockBit-4, BlackCat/ALPHV, and NoEscape 2024-2025 campaigns: the attacker turns the victim's own native BitLocker into a ransomware crypter, then withholds the recovery password. Legitimate BitLocker rollout always escrows the recovery key in AD / Intune / Azure AD - never in an inline playbook variable."
