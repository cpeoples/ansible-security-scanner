  - id: "wdac_applocker_policy_merged_allow_all"
    category: "malicious_activity"
    severity: "CRITICAL"
    title: "WDAC / AppLocker Policy Merged With Allow-All Rule Or Set To Audit-Only From Playbook"
    description: "A task runs `Set-AppLockerPolicy -Merge`, `Set-CIPolicy`, `ConvertFrom-CIPolicy`, or templates a WDAC `.cip`/`.xml` that contains a `FileRule.Level=\"Hash\"` with wildcard `Hash=\"*\"`, OR toggles the policy mode to `Audit` (enforcement-off) via `Set-RuleOption -Option 3`. WDAC (Windows Defender Application Control) and AppLocker are the Microsoft-recommended application-allowlisting controls for servers and privileged workstations. Merging an allow-all policy, or flipping to Audit-only, is the textbook EDR-bypass setup used by Scattered Spider and BlackCat/ALPHV affiliates in 2024-2025 ransomware intrusions before deploying unsigned ransomware payloads."
    regex: "(?:Set-AppLockerPolicy[\\s\\S]{0,200}?(?:-Merge|-XmlPolicy\\s+[^\\s]*AllowAll)|Set-CIPolicy[\\s\\S]{0,500}?(?:-Rules\\s+[^\\s]*Allow|-Option\\s+(?:3|10))|ConvertFrom-CIPolicy[\\s\\S]{0,200}?(?:-Audit|-Deny\\s+false)|Set-RuleOption\\s+-(?:Option|FilePath)\\s+[^\\s]+\\s+(?:3|10)\\b|<Option>Enabled:Audit\\s+Mode</Option>|FileRule[\\s\\S]{0,200}?Level\\s*=\\s*['\"]?Hash['\"]?[\\s\\S]{0,200}?Hash\\s*=\\s*['\"]?\\*['\"]?)"
    positive_examples:
      - "Set-AppLockerPolicy-Merge"
    multiline: true
    window: 40
    recommendation: "Never push WDAC/AppLocker policies from an ad-hoc playbook; roll them via Intune Endpoint Security or SCCM with a documented policy-review workflow. Keep WDAC in `Enforcement` mode (`Set-RuleOption -Option 0 -Delete` removes audit-mode flag). AppLocker rules MUST be built from publisher-signature (`New-AppLockerPolicy -RuleType Publisher`) or file-path allowlists - never hash wildcards. Monitor WDAC policy changes via Windows Event Log channel `Microsoft-Windows-CodeIntegrity/Operational` event IDs 3099 (policy applied) + 3089 (signature change) forwarded to SIEM with critical alerts on unexpected changes. Verify currently-active policy: `CiTool --list-policies | Where {$_.IsEffective}`."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-693', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1553.005', 'T1562.001', 'T1562.004']
    cis_controls: ['CIS-2.1', 'CIS-2.4', 'CIS-4.8']
    nist_controls: ['CM-7', 'SI-3', 'SI-7']
    pci_dss: ['2.2.1', '5.2.1']
    hipaa: ['164.308(a)(5)(ii)(B)']
