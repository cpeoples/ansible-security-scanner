  - id: "k8s_audit_policy_level_none_or_metadata_only"
    category: "k8s_insecure_spec"
    severity: "HIGH"
    title: "Kubernetes Audit Policy Rule With level: None Or level: Metadata On Mutating Verbs"
    description: "A task renders a Kubernetes audit-policy YAML (`/etc/kubernetes/audit-policy.yaml`, passed to kube-apiserver via `--audit-policy-file`) with a rule matching `create`/`update`/`patch`/`delete` verbs OR sensitive resources (`secrets`, `configmaps`, `roles`, `clusterrolebindings`, `serviceaccounts/token`) but with `level: None` (total silence) or `level: Metadata` (no request/response bodies - hides the actual changes made). Attackers post-compromise of the control plane frequently modify the audit policy to silence their own mutations while leaving enough events to pass compliance dashboards. CIS Kubernetes Benchmark 1.9 explicitly requires `level: RequestResponse` for secrets, token-requests, and RBAC mutations. Distinct from the generic `kube_apiserver_no_audit_log` rule; this catches the targeted-silence variant."
    regex: "apiVersion\\s*:\\s*audit\\.k8s\\.io/[\\s\\S]{0,1500}?rules\\s*:[\\s\\S]{0,3000}?(?:level\\s*:\\s*(?:None|Metadata)[\\s\\S]{0,400}?(?:verbs\\s*:[^\\n]*?(?:create|update|patch|delete)|resources\\s*:[\\s\\S]{0,300}?(?:secrets|configmaps|roles|clusterroles|clusterrolebindings|rolebindings|serviceaccounts/token|tokenreviews))|(?:verbs\\s*:[^\\n]*?(?:create|update|patch|delete)|resources\\s*:[\\s\\S]{0,300}?(?:secrets|configmaps|roles|clusterroles|clusterrolebindings|rolebindings|serviceaccounts/token|tokenreviews))[\\s\\S]{0,400}?level\\s*:\\s*(?:None|Metadata))"
    multiline: true
    window: 80
    positive_examples:
      - |2
        apiVersion: audit.k8s.io/v1
        kind: Policy
        rules:
          - level: None
            verbs: ["create", "update", "delete"]
            resources:
              - group: ""
                resources: ["secrets"]
    recommendation: "Use `level: RequestResponse` for every rule matching mutating verbs (`create`/`update`/`patch`/`delete`) on sensitive resources: `secrets`, `configmaps`, `roles`, `clusterroles`, `rolebindings`, `clusterrolebindings`, `serviceaccounts`, `serviceaccounts/token`, `tokenreviews`, `certificatesigningrequests`. For high-volume read-heavy noise (e.g. `get pods` from kubelet), use `level: None` or `level: Metadata` ONLY for `verbs: [get, list, watch]` on low-sensitivity resources. Ship audit events off-cluster to a SIEM with fluentd/vector/fluent-bit - never rely on on-cluster audit storage (attacker-modifiable). Enforce audit policy via GitOps + sign the audit-policy ConfigMap with Sigstore cosign so tampering is detected. Audit via `kubectl get --raw /apis/audit.k8s.io/v1/events` (on clusters that expose it) or the audit log file directly - cross-check against a committed baseline. Alert on ANY audit-policy change via a separate meta-audit rule."
    cwe: ['CWE-284', 'CWE-693', 'CWE-778']
    owasp_appsec: ["A01:2021", "A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-8.2', 'CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-6', 'AU-9', 'AU-12']
    pci_dss: ['10.2.1', '10.3.1']
    hipaa: ['164.308(a)(1)(ii)(D)', '164.312(b)']
    soc2: ['CC7.2', 'CC7.3']

  - id: "k8s_mutating_webhook_failure_policy_ignore_on_security_resources"
    category: "k8s_insecure_spec"
    severity: "HIGH"
    title: "MutatingWebhookConfiguration failurePolicy=Ignore On Security-Critical Resources"
    description: "A task renders a `MutatingWebhookConfiguration` or `ValidatingWebhookConfiguration` with `failurePolicy: Ignore` (if the webhook is unreachable, the API request PROCEEDS without validation/mutation) AND `rules` matching security-sensitive resources: `pods`, `deployments`, `secrets`, `serviceaccounts`, `roles`, `rolebindings`. Admission webhooks are the primary enforcement point for PodSecurity baselines, image-provenance (Sigstore, Kyverno), and runtime-class pinning (gVisor, Kata). `failurePolicy: Ignore` means a simple DoS of the webhook (network policy blocking port 443 to the webhook service, pod eviction during rolling update, or cert-expiry) silently disables enforcement. Attackers post-cluster-compromise routinely patch the webhook service to fail-fast, then schedule privileged pods that would normally be blocked. CIS K8s Benchmark 1.9 explicitly requires `failurePolicy: Fail` on security webhooks."
    regex: "kind\\s*:\\s*(?:Mutating|Validating)WebhookConfiguration[\\s\\S]{0,3000}?failurePolicy\\s*:\\s*Ignore[\\s\\S]{0,1500}?(?:resources\\s*:[\\s\\S]{0,500}?(?:pods|deployments|secrets|serviceaccounts|roles|clusterroles|rolebindings|clusterrolebindings|namespaces|podsecuritypolicies))|(?:resources\\s*:[\\s\\S]{0,500}?(?:pods|deployments|secrets|serviceaccounts|roles|clusterroles|rolebindings|clusterrolebindings))[\\s\\S]{0,1500}?failurePolicy\\s*:\\s*Ignore"
    positive_examples:
      - "kind:MutatingWebhookConfigurationfailurePolicy:Ignoreresources:pods"
    multiline: true
    window: 100
    recommendation: "Set `failurePolicy: Fail` on every security-enforcement webhook. Pair with HIGH availability: webhook deployment with `replicas: 3`, PodDisruptionBudget `minAvailable: 2`, node-anti-affinity, pre-stop graceful-drain, liveness/readiness probes, and cert-manager for automated cert rotation (preventing expired-cert-induced DoS). Exclude kube-system and kube-public namespaces from the webhook rules to prevent chicken-and-egg during cluster recovery: `namespaceSelector: { matchExpressions: [{ key: kubernetes.io/metadata.name, operator: NotIn, values: [kube-system, kube-public] }] }`. For operators that legitimately need fail-open (e.g. a purely-convenience mutator that injects sidecar images), scope its `rules` to non-security resources (specific CRDs). Monitor webhook error-rate via Prometheus + alert on sustained failures. Audit existing webhooks: `kubectl get mutatingwebhookconfigurations,validatingwebhookconfigurations -o json | jq '.items[] | select(.webhooks[].failurePolicy == \"Ignore\") | .metadata.name'`."
    cwe: ['CWE-284', 'CWE-693', 'CWE-755']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1078.004', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-3.3', 'CIS-4.1', 'CIS-16.2']
    nist_controls: ['AC-3', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '6.3.2']
    hipaa: ['164.308(a)(1)(ii)(A)', '164.312(a)(1)']
    soc2: ['CC6.1', 'CC7.1']

  - id: "k8s_poddisruptionbudget_blocks_all_evictions"
    category: "k8s_insecure_spec"
    severity: "MEDIUM"
    title: "PodDisruptionBudget With maxUnavailable=0 Or minAvailable=100% (Blocks All Evictions, Scheduler-DoS)"
    description: "A task creates a `PodDisruptionBudget` (PDB) with `maxUnavailable: 0` or `minAvailable: 100%` (equivalent) applied to a Deployment / StatefulSet. A PDB with these values means the eviction-subresource for the targeted pods NEVER succeeds - blocking node-drain (required for kernel patches, K8s version upgrades, autoscaler scale-down, and graceful disk replacement), blocking Cluster Autoscaler from consolidating workloads, and creating a DoS condition for the cluster itself. Distinct from the legitimate `maxUnavailable: 1` on a 3-replica deployment - this rule catches the absolute-zero case. Used in 2024 LockBit 3.0 ransomware deployments to pin attacker-controlled pods to specific nodes + prevent automated remediation via `kubectl drain`."
    regex: "kind\\s*:\\s*PodDisruptionBudget[\\s\\S]{0,1000}?(?:spec\\s*:[\\s\\S]{0,500}?(?:maxUnavailable\\s*:\\s*(?:0|['\"]?0['\"]?|['\"]?0%['\"]?)\\b|minAvailable\\s*:\\s*(?:100%|['\"]?100%['\"]?))|(?:maxUnavailable\\s*:\\s*(?:0|['\"]?0['\"]?|['\"]?0%['\"]?)|minAvailable\\s*:\\s*(?:100%|['\"]?100%['\"]?))[\\s\\S]{0,1000}?kind\\s*:\\s*PodDisruptionBudget)"
    positive_examples:
      - "kind:PodDisruptionBudgetspec:maxUnavailable:0"
    multiline: true
    window: 40
    recommendation: "Set `maxUnavailable: 1` (one pod evictable at a time - safe for most multi-replica workloads) or `minAvailable: N-1` (for stateful workloads where N is replica count). Never `maxUnavailable: 0`. For single-replica critical workloads that MUST stay up, increase replicas to 2+ and size the PDB accordingly - a PDB cannot create availability that the Deployment doesn't have. For legitimate 'hold this workload in place during a specific operation' scenarios, use a transient PDB with `maxUnavailable: 0` that is DELETED by the same operator when the operation completes - never a permanent PDB. Enforce via Kyverno / OPA Gatekeeper: reject PDBs with `maxUnavailable: 0` or `minAvailable >= <deployment.replicas>`. Audit: `kubectl get pdb -A -o json | jq '.items[] | select((.spec.maxUnavailable == 0 or .spec.maxUnavailable == \"0\") or (.spec.minAvailable == \"100%\")) | .metadata.namespace + \"/\" + .metadata.name'`."
    cwe: ['CWE-284', 'CWE-400', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V14.1.3"]
    mitre_attack: ['T1499', 'T1499.004', 'T1565.001']
    cis_controls: ['CIS-3.3', 'CIS-13.6']
    nist_controls: ['CP-10', 'SC-5', 'SI-13']
    pci_dss: ['6.3.2']
    hipaa: ['164.308(a)(7)(i)']
    soc2: ['A1.2', 'CC7.4']

  - id: "k8s_tokenrequest_expirationseconds_long_lived"
    category: "k8s_insecure_spec"
    severity: "HIGH"
    title: "Kubernetes TokenRequest With expirationSeconds > 86400 (Long-Lived ServiceAccount JWT)"
    description: "A task issues a Kubernetes `TokenRequest` or `BoundServiceAccountTokenVolume` with `spec.expirationSeconds` greater than 86400 (24 hours) - or uses the legacy `kubernetes.io/service-account-token` secret which issues non-expiring tokens. Modern K8s (≥1.22) uses bound, short-lived projected service-account tokens (default TTL 1 hour, auto-rotated) - requesting a >24h token is explicitly a step away from that posture. 7-day, 30-day, or literal 'infinity' (`expirationSeconds: 2147483647`) tokens are a favorite persistence technique in 2024 cluster-compromise campaigns (Microsoft Defender: SiegedSec, TeamTNT, Peach Sandstorm) - an attacker with a one-time `pods/exec` primitive issues a multi-year token, exfiltrates it, and has persistent cluster access even after the original entry is closed. The `audience` field also matters: `audiences: [\"\"]` / omitted = the default kube-apiserver audience = full in-cluster authN."
    regex: "(?:kind|Kind)\\s*:\\s*TokenRequest[\\s\\S]{0,800}?expirationSeconds\\s*:\\s*(?:[2-9]\\d{5,}|1[0-9]\\d{5}|[2-9]\\d{6,}|\\d{8,})|tokenRequest[\\s\\S]{0,500}?expirationSeconds\\s*[:=]\\s*(?:86401|864[1-9]\\d+|8[6-9]\\d{4,}|9\\d{5,}|\\d{7,})|\\bexpirationSeconds\\s*:\\s*(?:2592000|604800|31536000|2147483647|2419200)\\b|(?:kubectl\\s+create\\s+token|oc\\s+create\\s+token|k8s_service_account_token)[\\s\\S]{0,300}?--duration[= ]\\s*['\"]?(?:[2-9]\\d{2,}|1\\d{3,})[mh]['\"]?|(?:kind|Kind)\\s*:\\s*Secret[\\s\\S]{0,400}?type\\s*:\\s*['\"]?kubernetes\\.io/service-account-token['\"]?"
    positive_examples:
      - |2-
        kind: Secret
                type: kubernetes.io/service-account-token
    multiline: true
    window: 20
    recommendation: "Use short-lived projected service-account tokens via `ProjectedVolumeSource` with `expirationSeconds: 3600` (1 hour, also the default) - kubelet auto-rotates 80% through the TTL with zero application changes. For legitimate cases where a longer TTL is REALLY needed (external CI/CD against a cluster), use **IAM/OIDC federation** instead: EKS IRSA, GKE Workload Identity, AKS Workload Identity - the cluster issues a bound 1-hour SA token, then your CI exchanges it via STS for a cloud-native 1-hour credential (no long-lived cluster token in existence). For cross-cluster or fleet scenarios, use **SPIFFE/SPIRE** with 5-minute SVID rotation. Never use the legacy `kubernetes.io/service-account-token` secret on K8s ≥1.24 (it's opt-in and should be off). Enforce via policy: Kyverno `ClusterPolicy` with `validate: spec.expirationSeconds < 86400` on every `TokenRequest` + OPA Gatekeeper constraint `K8sBlockLegacySATokens` denying `Secret.type == kubernetes.io/service-account-token`. Audit: `kubectl get secrets --all-namespaces --field-selector type=kubernetes.io/service-account-token` must return only the bootstrap/cluster-trust secrets you explicitly expect."
    cwe: ['CWE-284', 'CWE-613', 'CWE-798']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1078.004', 'T1098.001', 'T1525']
    cis_controls: ['CIS-3.11', 'CIS-5.2', 'CIS-16.9']
    nist_controls: ['AC-2(5)', 'IA-5', 'IA-5(13)']
    pci_dss: ['8.2.6', '8.3.1', '8.6.3']
    hipaa: ['164.312(a)(2)(iii)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "kubernetes_pod_security_admission_disabled"
    category: "k8s_insecure_spec"
    severity: "HIGH"
    title: "Kubernetes namespace or cluster has Pod Security Admission disabled or set to privileged"
    description: "A task renders a namespace manifest with `pod-security.kubernetes.io/enforce: privileged` (the escape-hatch label that disables all PSA enforcement for that namespace), OR a kube-apiserver manifest with `--admission-control-config-file` referencing a config that sets PSA `default.enforce: privileged`, OR omits the `pod-security.kubernetes.io/enforce` label entirely on a production namespace while the cluster-wide default is `privileged`. Since PSP was removed in Kubernetes 1.25, PSA is the ONLY in-tree guardrail against privileged / hostPath / hostNetwork pods - a namespace at `privileged` PSA gives any pod-creator root on the node."
    regex: "(?:pod-security\\.kubernetes\\.io/(?:enforce|warn|audit)\\s*:\\s*['\"]?privileged['\"]?|defaults\\s*:[\\s\\S]{0,200}?enforce\\s*:\\s*['\"]?privileged['\"]?|kind\\s*:\\s*PodSecurityConfiguration[\\s\\S]{0,500}?enforce\\s*:\\s*['\"]?privileged['\"]?)"
    positive_examples:
      - |2-
        pod-security.kubernetes.io/audit: privileged
            pod-security.kubernetes.io/enforce: privileged
    multiline: true
    window: 15
    recommendation: "Set every production namespace to `pod-security.kubernetes.io/enforce: restricted` (or `baseline` as a transitional step). Apply `enforce`, `warn`, AND `audit` labels for defense-in-depth. For a cluster-wide default, set the AdmissionConfiguration `defaults.enforce: baseline` minimum and use namespace-level labels to relax for specific workloads (kube-system, operators) - never the other way around. Audit namespaces lacking the enforce label: `kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{\" \"}{.metadata.labels.pod-security\\.kubernetes\\.io/enforce}{\"\\n\"}{end}'`. Integrate PSA validation into CI (`kyverno`, `polaris`, `kube-linter`) to fail-fast on manifests that would require a privileged namespace."
    cwe: ['CWE-250', 'CWE-269', 'CWE-284']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1068', 'T1078', 'T1611']
    cis_controls: ['CIS-K8s-5.2.1', 'CIS-K8s-5.2.2', 'CIS-K8s-5.3.2']
    nist_controls: ['AC-3', 'AC-6', 'CM-7']
    pci_dss: ['2.2.1', '7.2.1']
    soc2: ['CC6.1', 'CC6.3']

  - id: "kubernetes_sa_token_automount_not_disabled"
    category: "k8s_insecure_spec"
    severity: "MEDIUM"
    title: "Kubernetes ServiceAccount token automount not disabled (pod can call API server by default)"
    description: "A task creates a `ServiceAccount` or Pod/Deployment spec WITHOUT `automountServiceAccountToken: false`. By default, Kubernetes projects a JWT for the namespace's default SA into every pod at `/var/run/secrets/kubernetes.io/serviceaccount/token` - any process in the pod (including a compromised dependency) can call the Kubernetes API with the SA's RBAC. Even the default SA in a hardened namespace typically has `get pods` + `get secrets` inside its namespace - enough to enumerate and exfiltrate. Workloads that don't need API access MUST opt out."
    regex: "kind\\s*:\\s*(?:ServiceAccount|Deployment|StatefulSet|DaemonSet|Pod|Job|CronJob)[\\s\\S]{0,2000}?spec\\s*:(?:(?!automountServiceAccountToken\\s*:\\s*false)[\\s\\S]){0,1500}containers\\s*:"
    positive_examples:
      - |2-
        kind: Deployment
        metadata:
          name: calico-policy-controller
          namespace: kube-system
          labels:
            k8s-app: calico-policy-controller
        spec:
          # Turn this deployment off in favor of the kube-controllers deployment above.
          replicas: 0
          strategy:
            type: Recreate
          template:
            metadata:
              name: calico-policy-controller
              namespace: kube-system
              labels:
                k8s-app: calico-policy-controller
            spec:
              hostNetwork: true
              serviceAccountName: calico-kube-controllers
              containers:
    multiline: true
    window: 60
    recommendation: "Set `automountServiceAccountToken: false` at the **ServiceAccount** level (applies to every pod using that SA) AND at the **Pod spec** level for defense-in-depth. For workloads that DO need API access, create a dedicated SA with a narrowly-scoped RBAC Role (not the default SA), and project a token with a short `expirationSeconds` (≤1h) via `serviceAccountToken` projected volume instead of the static mount. Mutating admission webhooks (Kyverno, OPA Gatekeeper) can auto-inject `automountServiceAccountToken: false` for namespaces that don't opt in. Audit: `kubectl get sa -A -o json | jq '.items[] | select(.automountServiceAccountToken != false) | {ns: .metadata.namespace, name: .metadata.name}'`."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V12.4.1", "V14.2.2"]
    mitre_attack: ['T1078', 'T1552.005', 'T1613']
    cis_controls: ['CIS-K8s-5.1.5', 'CIS-K8s-5.1.6']
    nist_controls: ['AC-6', 'CM-7', 'IA-5']
    pci_dss: ['7.2.1', '7.2.2']
    soc2: ['CC6.1', 'CC6.3']
