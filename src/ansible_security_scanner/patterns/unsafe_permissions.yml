  - id: "ansible_cfg_private_key_file_world_readable_path"
    category: "unsafe_permissions"
    severity: "CRITICAL"
    title: "ansible.cfg private_key_file in world-readable location"
    description: "private_key_file = /tmp/..., /home/<user>/Desktop/..., ~/Downloads/... - an SSH private key in a world-readable or user-facing directory is effectively leaked. Compare to a proper ~/.ssh/id_rsa with 0600 perms."
