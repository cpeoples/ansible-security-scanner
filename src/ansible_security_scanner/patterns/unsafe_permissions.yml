  - id: "ssh_weak_hostkey_algorithms_reenabled"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible_ssh_common_args / ssh_args Re-Enables Deprecated SSH Host-Key Algorithms (ssh-rsa / ssh-dss)"
    description: "A task sets `ansible_ssh_common_args`, `ansible_ssh_extra_args`, a playbook `environment:` `ANSIBLE_SSH_ARGS`, or `ssh_args` in `ansible.cfg` to include `-oHostKeyAlgorithms=+ssh-rsa`, `-oPubkeyAcceptedKeyTypes=+ssh-rsa`, `-oPubkeyAcceptedAlgorithms=+ssh-rsa`, `-oHostKeyAlgorithms=+ssh-dss`, `-oCASignatureAlgorithms=+ssh-rsa`, or any equivalent form that re-enables the deprecated SSH SHA-1 host-key family. OpenSSH 8.8 (2021) disabled `ssh-rsa` (SHA-1) by default and 9.8 (2024) removed DSA entirely because SHA-1 collision attacks (SHAttered, 2017) make host-key forgery practical for a well-resourced on-path attacker. Re-enabling these algorithms to 'work around' target OSes stuck on OpenSSH 7.x silently reintroduces MITM risk across every managed node and is a specific CIS/CISA finding in 2024-2025 compliance audits. Distinct from `ssh_args_disable_host_key` (that rule catches `StrictHostKeyChecking=no`); this catches the more subtle 'I kept verification on but trusted a broken algorithm' failure mode."
    regex: "(?:ansible_ssh_(?:common|extra)_args|ANSIBLE_SSH_ARGS|ssh_args)[\\s\\S]{0,300}?-o\\s*(?:HostKeyAlgorithms|PubkeyAcceptedKeyTypes|PubkeyAcceptedAlgorithms|CASignatureAlgorithms)\\s*=\\s*[+]?(?:ssh-rsa|ssh-dss|rsa-sha-?1)\\b"
    positive_examples:
      - "ansible_ssh_common_args-oHostKeyAlgorithms=ssh-rsa"
    multiline: true
    window: 8
    recommendation: "Remove `+ssh-rsa` / `+ssh-dss` from every SSH-args override. If a legacy target truly requires SHA-1 RSA (pre-OpenSSH 7.2 servers, some embedded appliances), upgrade the server first - every distro with vendor support has shipped OpenSSH ≥ 7.2 for years. Where upgrading is impossible in the short term, scope the exception tightly: a single `group_vars/<legacy-group>.yml` with `ansible_ssh_extra_args: \"-oHostKeyAlgorithms=+ssh-rsa -oPubkeyAcceptedAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512\"` (so SHA-2 is still preferred when the server advertises it) instead of a global `ansible.cfg` knob, and file a ticket to retire the legacy target. Modern baseline: `HostKeyAlgorithms` defaults to `ssh-ed25519,ecdsa-sha2-nistp256,ecdsa-sha2-nistp384,ecdsa-sha2-nistp521,rsa-sha2-512,rsa-sha2-256`, and `PubkeyAcceptedAlgorithms` the same - never widen these without a documented, time-boxed exception."
    cwe: ["CWE-295", "CWE-326", "CWE-327"]
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V11.3.1, V11.3.2, V11.4.1, V12.2.1, V12.3.4]
    mitre_attack: ["T1557"]
    cis_controls: ["CIS-3.10", "CIS-5.2.10"]
    nist_controls: ["IA-7", "SC-8", "SC-12", "SC-13"]
    pci_dss: ["2.2.1", "4.2.1", "8.3.1"]
    hipaa: ["164.312(a)(2)(iv)", "164.312(e)(2)(ii)"]
    soc2: ["CC6.1", "CC6.7"]
    stig: ["V-230250", "V-230252"]
