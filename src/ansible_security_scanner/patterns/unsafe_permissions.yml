    pci_dss: ['3.5.1', '7.2.1', '7.2.2', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1', 'CC6.3']
    mitre_attack: ["T1552.004"]
    cwe: ["CWE-522", "CWE-732"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5, V5.3.1]

  - id: "private_key_copied_outside_dot_ssh"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "Private Key Copied Or Linked Outside ~/.ssh"
    description: "A shell task uses `cp`, `mv`, `ln`, or `install` on a path matching `id_rsa`, `id_ed25519`, `id_ecdsa`, `*.pem`, or `*.key` whose destination is NOT a `.ssh/` directory. Common destinations are `/home/root/.ssh/` (which is not root's real home on standard Linux), `/tmp`, `/var/tmp`, `/srv`, `/opt`, or shared directories. Off-`.ssh/` private keys typically inherit the surrounding directory's umask (often 0755) and bypass tooling that audits `~/.ssh/` for mode 0600."
    regex: "(?m)^\\s*(?:-\\s+)?(?:ansible\\.builtin\\.)?(?:shell|command):\\s*(?=[|>]|\\S)[\\s\\S]{0,400}?(?:\\b(?:cp|mv|install|ln(?:\\s+-s)?|rsync(?:\\s+-[avzrlpt]+)?)\\s+[^\\n]*?(?:id_(?:rsa|ed25519|ecdsa|dsa)|\\.pem|\\.key)\\b[^\\n]*?\\s+(?:/home/root\\b|/tmp\\b|/var/tmp\\b|/srv\\b|/opt\\b|/mnt\\b|/media\\b|/data\\b|/var/log\\b)[^\\n]*|\\bcat\\s+[^\\n]*?(?:id_(?:rsa|ed25519|ecdsa|dsa)|\\.pem|\\.key)\\b[^\\n]*?>\\s*(?:/home/root/|/tmp/|/var/tmp/|/srv/|/opt/|/mnt/|/media/|/data/|/var/log/)|\\bdd\\s+[^\\n]*?if=[^\\n]*?(?:id_(?:rsa|ed25519|ecdsa|dsa)|\\.pem|\\.key)\\b[^\\n]*?of=(?:/home/root/|/tmp/|/var/tmp/|/srv/|/opt/|/mnt/|/media/|/data/|/var/log/)|\\btar\\s+[^\\n]*?(?:-c[^\\n]*?-f|cf|czf|cjf|cJf|cvf|czvf)\\s+(?:/home/root/|/tmp/|/var/tmp/|/srv/|/opt/|/mnt/|/media/|/data/|/var/log/)[^\\n]*?(?:\\.ssh\\b|id_(?:rsa|ed25519|ecdsa|dsa)|\\.pem|\\.key))"
    multiline: true
    window: 10
    positive_examples:
      - "shell: cp /root/.ssh/id_rsa /home/root/.ssh/id_rsa"
      - "shell: cp /etc/ssl/private/server.key /tmp/server.key"
    negative_examples:
      - "shell: cp /root/.ssh/id_rsa /home/svc/.ssh/id_rsa"
    recommendation: "Keep private keys under the owning user's `~/.ssh/` directory with mode 0700 on the directory and 0600 on the key. If a tool requires a non-standard path, render the key at runtime with `ansible.builtin.copy: mode='0600'` and remove it in an `always:` block. Note that on standard Linux, root's home is `/`, not `/home/root` - tools that hard-code `/home/root` should be configured to read `/root/.ssh` instead."
    cwe: ["CWE-276", "CWE-522", "CWE-732"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]
    mitre_attack: ["T1552.004"]
    cis_controls: ["CIS-3.3", "CIS-Secrets"]
    nist_controls: ['AC-3', 'AC-6', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '7.2.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)']
    soc2: ['CC6.1']

  - id: "tls_secret_downloaded_to_world_dir"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "Private Key Or TLS Secret Downloaded Into A World-Readable Directory"
    description: "A shell task runs `aws s3 cp`, `gcloud storage cp`, `az storage blob download`, `curl`, or `wget` and writes a file whose name suggests a private key or TLS secret (`*.key`, `*.pem`, `*privatekey*`, `*secret*`) into `/tmp`, `/var/tmp`, `/dev/shm`, or `/srv/<world-readable>`. The destination directory is world-readable on every standard distribution, and the downloader does not enforce a restrictive `mode:` the way `ansible.builtin.copy` would; the secret is exposed for the entire interval before it is moved or removed."
    regex: "(?m)^\\s*(?:-\\s+)?(?:ansible\\.builtin\\.)?(?:shell|command):\\s*(?=[|>]|\\S)[\\s\\S]{0,600}?(?:(?:aws\\s+s3\\s+cp|aws\\s+s3api\\s+get-object|gcloud\\s+storage\\s+cp|gsutil\\s+cp|az\\s+storage\\s+blob\\s+download|oci\\s+os\\s+object\\s+get|rclone\\s+(?:copy|copyto)|curl\\s+[^\\n]*?(?:-o|--output)\\s+|wget\\s+[^\\n]*?(?:-O\\s+|--output-document[\\s=]+))[^\\n]*?(?:/tmp/|/var/tmp/|/dev/shm/)[^\\n]*?(?:\\.key\\b|\\.pem\\b|privatekey|private_key|secret\\.[A-Za-z0-9]+)|(?:curl|wget)\\s+[^\\n]*?\\b(?:\\.key\\b|\\.pem\\b|privatekey|private_key)[^\\n]*?>\\s*(?:/tmp/|/var/tmp/|/dev/shm/))"
    multiline: true
    window: 10
    positive_examples:
      - "shell: aws s3 cp s3://bucket/server.key /tmp/server.key"
      - "shell: curl -sSL https://internal/secret.pem -o /var/tmp/secret.pem"
    negative_examples:
      - "shell: aws s3 cp s3://bucket/server.key /etc/ssl/private/server.key"
    recommendation: "Download the secret directly into its final mode-0600 location (`/etc/ssl/private/`, `/etc/pki/tls/private/`) or stream it into a `umask 077`-protected directory under `/run/<service>` (tmpfs, root-owned). When using `ansible.builtin.get_url` or `ansible.builtin.copy`, set `mode: '0600'` and `owner:`/`group:` to the consuming service account. Avoid staging private keys in `/tmp` even briefly."
    cwe: ["CWE-276", "CWE-732"]
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5]
    mitre_attack: ["T1552.004"]
    cis_controls: ["CIS-3.3", "CIS-Secrets"]
    nist_controls: ['AC-3', 'AC-6', 'SC-28']
    pci_dss: ['3.5.1', '7.2.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)']
    soc2: ['CC6.1']

  - id: "ansible_cfg_callback_whitelist_unpinned"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "ansible.cfg callback_whitelist = <wildcard or all>"
    description: "callback_whitelist = * (or a comma-separated list including unvetted plugins) loads every callback plugin on the plugin path. Unlike a specific whitelist, this loads attacker-planted callbacks (e.g. a tampered-with `slack` plugin) that can exfiltrate task output to external services."
    regex: "^\\s*(?:callback_whitelist|callbacks_enabled)\\s*=\\s*(?:\\*|[^#\\n]*\\*[^#\\n]*)\\s*$"
    positive_examples:
      - "callback_whitelist=*"
    recommendation: "Enumerate callbacks explicitly (e.g. `callbacks_enabled = timer, profile_tasks`). Never use `*`. Pin the plugin path to a read-only directory owned by the ansible user."
    cis_controls: ["CIS-4.2"]
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2']
    soc2: ['CC7.1', 'CC8.1']
    mitre_attack: ["T1195.001"]
    cwe: ["CWE-829", "CWE-1188"]
    owasp_appsec: ["A08:2021"]
    owasp_asvs: []

  - id: "ansible_cfg_any_errors_fatal_false_in_prod"
    category: "unsafe_permissions"
    severity: "LOW"
    title: "ansible.cfg any_errors_fatal = False for privileged playbooks"
    description: "With any_errors_fatal = False, a task that fails on ONE host won't stop the run on the other hosts - useful in dev, dangerous in hardening/patching playbooks where partial failure means a fleet in an inconsistent (possibly less-secure) state."
    regex: "^\\s*any_errors_fatal\\s*=\\s*(?i:false|no|0)\\b"
    positive_examples:
      - "any_errors_fatal=False"
    recommendation: "Set any_errors_fatal = True (or use max_fail_percentage) for playbooks that apply security patches, firewall rules, or user/group changes across a fleet."
    cis_controls: ["CIS-3.4.1"]
    cwe: ["CWE-1188"]
    mitre_attack: ['T1562.001']
    nist_controls: ['AU-9', 'CM-6', 'CM-7', 'IR-4', 'SI-4']
    pci_dss: ['2.2.1', '10.3.4', '12.10.1']
    hipaa: ['164.312(b)']
    soc2: ['CC6.1', 'CC7.2']

  - id: "ansible_cfg_roles_path_writable_location"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible.cfg roles_path / collections_path in world-writable dir"
    description: "roles_path or collections_path pointing to /tmp, /var/tmp, or another world-writable directory lets any local user on the Ansible controller plant a malicious role/collection that the next playbook run will execute."
    regex: "^\\s*(?:roles_path|collections_paths?)\\s*=\\s*(?:/tmp(?:/|$)|/var/tmp(?:/|$)|\\./\\.\\./)"
    positive_examples:
      - "collections_path = /tmp/collections"
    recommendation: "Point roles_path / collections_path at a directory owned by the ansible user with 0755 perms (e.g. ~/.ansible/roles, /etc/ansible/roles owned by root)."
    cis_controls: ["CIS-5.1.2"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']
    mitre_attack: ["T1195.001"]
    cwe: ["CWE-427", "CWE-732"]
    owasp_asvs: [V5.3.1]

  # -- Inventory / group_vars / host_vars hardening -----------------------
  # These fire on content rendered via copy.content OR on actual inventory
  # files if the scanner targets them. Each detects a credential / auth
  # anti-pattern that's specific to inventory vs a regular playbook var.
  # Regexes are deliberately format-agnostic: they match both INI-style
  # (`hostname key=value key=value`) and YAML-style (`key: value`) forms.

  - id: "inventory_ansible_ssh_pass_literal"
    category: "unsafe_permissions"
    severity: "CRITICAL"
    title: "Inventory: ansible_ssh_pass / ansible_password literal"
    description: "Inventory file (or inventory-style INI/YAML content) sets ansible_ssh_pass / ansible_password to a literal value - any checkout of the repo has every host's SSH password in plaintext."
    regex: "(?:ansible_ssh_pass|ansible_password)\\s*[:=]\\s*(?!['\"]?\\{\\{)['\"]?[^'\"\\s{][^'\"\\s]{2,}"
    positive_examples:
      - "ansible_ssh_pass: \"foobar\""
    recommendation: "Remove the literal. Use ssh keys + ssh-agent, or at minimum encrypt the value with `ansible-vault encrypt_string` and store only the vault ciphertext."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']
    mitre_attack: ["T1078.001", "T1552.001"]
    cwe: ["CWE-259", "CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]
    stig: ['V-230555', 'V-260469']

  - id: "inventory_ansible_become_pass_literal"
    category: "unsafe_permissions"
    severity: "CRITICAL"
    title: "Inventory: ansible_become_pass / ansible_sudo_pass literal"
    description: "ansible_become_pass / ansible_sudo_pass is set to a literal value in inventory - committing this gives anyone with repo read access the sudo password for every listed host."
    regex: "(?:ansible_become_pass|ansible_sudo_pass)\\s*[:=]\\s*(?!['\"]?\\{\\{)['\"]?[^'\"\\s{][^'\"\\s]{2,}"
    positive_examples:
      - "ansible_become_pass: broken"
    recommendation: "Vault-encrypt the value (`ansible-vault encrypt_string 'hunter2' --name ansible_become_pass`) or prompt at runtime with --ask-become-pass."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']
    mitre_attack: ["T1078.003", "T1552.001"]
    cwe: ["CWE-259", "CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1]

  - id: "inventory_ansible_connection_paramiko_without_host_key"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "Inventory: ansible_connection=paramiko with host_key_auto_add"
    description: "ansible_connection=paramiko combined with paramiko's host_key_auto_add (or no known_hosts file) trusts whatever host key the target presents on first connection - MITM is trivial on the initial handshake."
    regex: "ansible_connection\\s*[:=]\\s*['\"]?paramiko\\b"
    positive_examples:
      - "ansible_connection:paramiko"
    recommendation: "Prefer ansible_connection=ssh with a pre-populated known_hosts (ssh-keyscan into /etc/ssh/ssh_known_hosts). If you must use paramiko, explicitly set ansible_paramiko_host_key_checking=True."
    cis_controls: ["CIS-5.2.1"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557.001"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]

  - id: "inventory_become_method_sudo_no_password"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "Inventory: ansible_become_flags contains -n (NOPASSWD sudo)"
    description: "A host/group var sets ansible_become_flags to contain `-n` (non-interactive), meaning sudo will NEVER prompt for a password. That requires NOPASSWD in sudoers on the target - silently baked into inventory rather than explicitly reviewed."
    regex: "ansible_become_flags\\s*[:=]\\s*['\"]?[^'\"\\n]*(?:^|[\\s\"'])-n(?:\\s|$|[\"'])"
    positive_examples:
      - "ansible_become_flags: -n "
    recommendation: "Drop -n from become_flags. If the target host truly needs NOPASSWD, document the sudoers entry in a role and version-control it explicitly, don't smuggle it through inventory."
    cis_controls: ["CIS-5.3"]
    nist_controls: ['AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']
    mitre_attack: ["T1548.003"]
    cwe: ["CWE-269"]
    owasp_appsec: ["A04:2021"]
    stig: ['V-230503']

  - id: "inventory_winrm_ignore_cert_validation"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "Inventory: ansible_winrm_server_cert_validation=ignore"
    description: "Inventory sets ansible_winrm_server_cert_validation=ignore - the WinRM TLS handshake accepts any certificate, including an attacker-presented one. MITM on the Windows connection becomes trivial."
    regex: "ansible_winrm_server_cert_validation\\s*[:=]\\s*['\"]?ignore\\b"
    positive_examples:
      - "ansible_winrm_server_cert_validation=ignore"
    recommendation: "Remove the line or set it to 'validate'. Pre-populate the WinRM CA on the controller so validation actually works."
    cis_controls: ["CIS-5.4.1"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557.002"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]

  - id: "inventory_group_vars_all_contains_plaintext_secret"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "group_vars/all: variable name suggests secret, value is plaintext"
    description: "A variable in group_vars/all (or host_vars) named *_password / *_token / *_secret / *_api_key / *_private_key is assigned a non-Jinja, non-vault, non-empty literal. That secret now applies to every host in the inventory."
    # Exclude pure YAML boolean / null / numeric literals - ``generate_
    # token: true`` is a boolean flag inside a uri-task body, not a
    # plaintext secret.  Also exclude ``!vault`` YAML tags (value will
    # be resolved to an encrypted blob at load time; the following
    # ``$ANSIBLE_VAULT`` header sits on a later line).  The negative
    # lookahead immediately after the colon rejects these shapes.
    regex: "^\\s*[a-zA-Z_][a-zA-Z0-9_]*(?:_password|_passwd|_pw|_pass|_secret|_token|_api_key|_apikey|_private_key)\\s*:\\s*(?!['\"]?(?:true|True|TRUE|false|False|FALSE|yes|Yes|YES|no|No|NO|on|On|ON|off|Off|OFF|null|Null|NULL|~|None|[0-9]+)['\"]?\\s*(?:#|$))(?!!vault\\b)['\"]?(?!\\{\\{)(?!\\$ANSIBLE_VAULT)[^'\"\\s{#][^#\\n]{2,}"
    recommendation: "Replace the literal with a vault-encrypted value or a lookup from a secret manager. Never commit literal secrets, especially in group_vars/all which applies to the entire fleet."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']
    mitre_attack: ["T1552.001"]
    cwe: ["CWE-312", "CWE-798"]
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: [V13.2.3, V13.3.1, V14.1.1, V14.2.1]
    positive_examples:
      # Canonical inventory secret: literal password.
      - 'admin_user_password: "lobster-clam-bake"'
      - 'service_account_secret: "green-leek-1816"'
      - 'datablaster_token: "1eef128c-6498-57b5-1009-ea51265def9e"'
      - 'customer_api_key: "sk-live-abcdef1234567890"'
    negative_examples:
      # YAML boolean flag - not a secret value.  This was an FP on
      # ``generate_token: true`` inside a uri-task body.
      - 'generate_token: true'
      - 'rotate_token: false'
      - 'use_token: yes'
      # Vault-encrypted value (stored as ``$ANSIBLE_VAULT`` string).
      - 'db_password: !vault |\n  $ANSIBLE_VAULT;1.1;AES256\n  62313365396662343061393464336163383662...'
      # Templated - resolved at runtime, not a plaintext literal.
      - 'admin_password: "{{ vault_admin_password }}"'
      # Empty string - credential not yet set.
      - 'api_key: ""'
      # Numeric literal - e.g., a token-expiry count, not a token value.
      - 'session_token: 3600'

  - id: "inventory_host_pattern_all_hosts"
    category: "unsafe_permissions"
    severity: "LOW"
    title: "Inventory: host pattern 'all' used in a privileged play"
    description: "A play targets `hosts: all` AND uses become: true - a single typo, YAML anchor, or rogue PR can apply privileged changes to every host in your inventory at once. A narrower pattern (hosts: webservers, hosts: &prod:!canary) is safer."
    regex: "hosts:\\s*all\\s*$[\\s\\S]{0,200}?become:\\s*(?i:true|yes)"
    positive_examples:
      - |2-
        hosts: all
          become: yes
    multiline: true
    window: 12
    recommendation: "Use a named group pattern (`hosts: webservers`) or an explicit intersection (`hosts: webservers:&prod`). Combine with `serial:` to limit blast radius."
    cis_controls: ["CIS-3.4.1"]
    nist_controls: ['AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']
    cwe: ["CWE-269"]
    owasp_appsec: ["A04:2021"]
    mitre_attack: ['T1078']

  # -- Dangerous Task Hygiene - filesystem races & write modes ------------
  # TOCTOU, symlink-follow with privilege, disabled atomic writes, and
  # edits to security-critical files with no backup. These sit alongside
  # the existing permission/mode rules because the underlying concern is
  # the same: an attacker or mis-config can abuse them to gain write
  # where they shouldn't, silently, at privileged time-of-use.

  - id: "file_follow_true_with_become"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "file Module with follow: yes + become (Symlink TOCTOU)"
    description: "An `ansible.builtin.file` (or legacy `file:`) task sets `follow: yes` / `follow: true` AND runs with `become:` privilege escalation. If the `path:` points into a world-writable directory (/tmp, /var/tmp, /dev/shm) or a user-owned directory, a local attacker can swap the target for a symlink to /etc/shadow, /root/.ssh/authorized_keys, or any sensitive file - file then changes mode/owner on the symlink target, as root."
    regex: "(?:ansible\\.builtin\\.)?file\\s*:[\\s\\S]{0,300}?follow\\s*:\\s*(?:true|yes|True|Yes)[\\s\\S]{0,300}?become\\s*:\\s*(?:true|yes|True|Yes)|become\\s*:\\s*(?:true|yes|True|Yes)[\\s\\S]{0,300}?(?:ansible\\.builtin\\.)?file\\s*:[\\s\\S]{0,300}?follow\\s*:\\s*(?:true|yes|True|Yes)"
    positive_examples:
      - "file:follow:truebecome:true"
    multiline: true
    window: 14
    recommendation: "Leave `follow:` at its default (no). If you genuinely need to operate on the symlink target, first validate the path with `stat:` (check that path itself is owned by root and not in a world-writable parent), then chmod/chown the target. Never combine `follow: yes` + `become: true` on a user-controlled path."
    cwe: ["CWE-59", "CWE-250", "CWE-362"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V13.4.5, V15.2.3]
    mitre_attack: ["T1548.001"]
    cis_controls: ["CIS-3.3", "CIS-4.1"]
    nist_controls: ['AC-3', 'AC-6', 'AC-6(1)', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  - id: "copy_unsafe_writes_true"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "copy/template with unsafe_writes: true"
    description: "A `copy:` or `template:` task sets `unsafe_writes: true`, which disables Ansible's atomic `write-to-tempfile -> rename()` strategy in favor of a direct open-and-truncate on the destination. Any local reader at that instant gets a half-written file; any local writer (even an unprivileged one, if the parent directory is world-writable) can race with the truncate and land arbitrary content in a root-owned file."
    regex: "(?:ansible\\.builtin\\.)?(?:copy|template)\\s*:[\\s\\S]{0,300}?unsafe_writes\\s*:\\s*(?:true|yes|True|Yes)\\b"
    positive_examples:
      - "copy:unsafe_writes:true"
    multiline: true
    window: 14
    recommendation: "Leave `unsafe_writes: false` (the default). If you're hitting a real use case (bind-mounted destination, FUSE filesystem without rename support), isolate it: write to a normal path first, then `command: mount --bind` in a separate task. Never enable unsafe_writes for files in /etc/, /root/, or any security-relevant path."
    cwe: ["CWE-362", "CWE-367", "CWE-378"]
    mitre_attack: ["T1222.002"]
    cis_controls: ["CIS-3.3"]
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "template_mode_executable_to_system_path"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "template Rendering Executable File to System Path"
    description: "A `template:` task renders content to /etc/, /usr/bin/, /usr/local/bin/, /usr/sbin/, /opt/, or /root/ AND sets an executable mode (0755, 0775, 0777, 4xxx, or anything with the x-bit). That combination is the classic webshell / persistence-hook pattern: a templated script that runs during cron/systemd/PATH lookup, easy to forget in audits because it looks like 'just a config file'."
    regex: "(?:ansible\\.builtin\\.)?template\\s*:[^\\n]*\\n(?:(?![ \\t]*-\\s)[ \\t]+[^\\n]*\\n){0,10}?[ \\t]+dest\\s*:\\s*['\"]?(?:/etc/|/usr/(?:local/)?(?:bin|sbin)/|/opt/|/root/)[^\\n]*\\n(?:(?![ \\t]*-\\s)[ \\t]+[^\\n]*\\n){0,10}?[ \\t]+mode\\s*:\\s*['\"]?0?[4-7]?[0-7]?[1357]\\b|(?:ansible\\.builtin\\.)?template\\s*:[^\\n]*\\n(?:(?![ \\t]*-\\s)[ \\t]+[^\\n]*\\n){0,10}?[ \\t]+mode\\s*:\\s*['\"]?0?[4-7]?[0-7]?[1357]\\b[^\\n]*\\n(?:(?![ \\t]*-\\s)[ \\t]+[^\\n]*\\n){0,10}?[ \\t]+dest\\s*:\\s*['\"]?(?:/etc/|/usr/(?:local/)?(?:bin|sbin)/|/opt/|/root/)"
    positive_examples:
      - |2-
        template:
            src: dummy_command
            dest: /usr/bin/dummy{{ item }}
            owner: root
            group: root
            mode: '0755
    multiline: true
    window: 18
    recommendation: "If the file is genuinely a config, use mode 0644 (or 0640 for sensitive). If it's genuinely a script, put it in a role's `files/` directory and use `copy:` (so it's reviewed as a script, not a template) - and deploy it to /usr/local/libexec/<role>/ with an explicit systemd unit/cron line, not by virtue of being PATH-reachable."
    cwe: ["CWE-250", "CWE-732"]
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]
    mitre_attack: ["T1505.003", "T1543.002"]
    cis_controls: ["CIS-4.1", "CIS-10.1"]
    nist_controls: ['AC-3', 'AC-6', 'AC-6(1)', 'CM-6', 'CM-7', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "lineinfile_no_backup_on_sensitive_file"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "lineinfile/blockinfile Editing Sensitive File With backup: no"
    description: "A `lineinfile:` or `blockinfile:` task edits /etc/sudoers, /etc/sudoers.d/*, /etc/pam.d/*, /etc/ssh/sshd_config, /etc/passwd, /etc/shadow, /etc/group, /etc/nsswitch.conf, /etc/hosts.allow, /etc/hosts.deny, /etc/crontab, /etc/cron.d/*, or /etc/security/* AND explicitly sets `backup: no` (or `backup: false`). A typo in a sudoers line with no backup locks out every admin; a bad sshd_config edit with no backup loses SSH access. The file is version-controlled in the playbook, not on the target - recovery requires console access."
    regex: "(?:ansible\\.builtin\\.)?(?:lineinfile|blockinfile)\\s*:[\\s\\S]{0,300}?path\\s*:\\s*['\"]?(?:/etc/(?:sudoers|pam\\.d/|ssh/sshd_config|passwd|shadow|group|nsswitch\\.conf|hosts\\.(?:allow|deny)|crontab|cron\\.d/|security/))[^\\n]*[\\s\\S]{0,300}?backup\\s*:\\s*(?:no|false|False|No)\\b|(?:ansible\\.builtin\\.)?(?:lineinfile|blockinfile)\\s*:[\\s\\S]{0,300}?backup\\s*:\\s*(?:no|false|False|No)\\b[\\s\\S]{0,300}?path\\s*:\\s*['\"]?(?:/etc/(?:sudoers|pam\\.d/|ssh/sshd_config|passwd|shadow|group|nsswitch\\.conf|hosts\\.(?:allow|deny)|crontab|cron\\.d/|security/))"
    positive_examples:
      - "lineinfile:path:/etc/sudoersbackup:no"
    multiline: true
    window: 20
    recommendation: "Set `backup: yes` (or omit it - it defaults to no, so use `backup: yes` explicitly on sensitive files). For sudoers specifically, always add `validate: 'visudo -cf %s'`; for sshd_config, `validate: '/usr/sbin/sshd -t -f %s'`. These let Ansible roll back before committing the edit if the new content is syntactically invalid."
    cwe: ["CWE-710", "CWE-755"]
    mitre_attack: ["T1222.002"]
    cis_controls: ["CIS-4.1", "CIS-5.3"]
    nist_controls: ['CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC7.1', 'CC8.1']

  - id: "setfacl_mass_permission_grant"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "setfacl Grants rwx to everyone / other on Sensitive Path"
    description: "A task invokes `setfacl` (or the `ansible.posix.acl` module) to add an ACL entry of `u::rwx,g::rwx,o::rwx`, `m::rwx`, or `user:anyone`/`group:wheel` with `rwx` on paths like `/etc`, `/root`, `/var/log`, `/home`, `/opt`, or the recursive form `-R` on any system path. ACLs silently override POSIX mode bits - a 0600 /etc/shadow with a `user:nobody:rwx` ACL is world-readable in practice. This is a known AV/EDR-evasion trick used by recent Linux ransomware families."
    regex: "(?:setfacl(?:\\s+-R)?\\s+-m\\s+(?:u:[^:\\s]*:rwx|g:[^:\\s]*:rwx|o::rwx|m::rwx|[ugm]::rwx)[\\s\\S]{0,200}?(?:/etc|/root|/var/log|/home|/opt|/usr)\\b|ansible\\.posix\\.acl\\s*:[\\s\\S]{0,400}?permissions\\s*:\\s*[\"']?(?:rwx|7)[\"']?[\\s\\S]{0,400}?path\\s*:\\s*[\"']?(?:/etc|/root|/var/log|/home|/opt|/usr))"
    positive_examples:
      - "setfacl -m u::rwx/etc"
    multiline: true
    window: 10
    recommendation: "Use targeted, minimum-necessary ACLs: `setfacl -m u:jenkins:r-x /srv/app/logs` rather than broad `u::rwx,g::rwx,o::rwx`. Never grant `rwx` to `other` on `/etc/*`. Audit effective ACLs with `getfacl -R /etc /root /var/log | grep rwx`. Enforce with an AIDE rule that alerts on any ACL change to /etc/shadow, /etc/sudoers, /etc/ssh/*."
    cwe: ["CWE-276", "CWE-732"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ["T1222.002"]
    cis_controls: ["CIS-3.3", "CIS-4.1"]
