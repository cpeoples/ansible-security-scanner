name: "Unsafe Permissions Patterns"
author: "Ansible Security Scanner Team"
description: "Detects unsafe file permissions, ownership, and access control issues"

patterns:
  - id: "world_writable_files"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "World Writable Files"
    description: >-
        mode: '0777' is set on a file resource, or chmod 777 / chmod a+w / chmod o+w
        is invoked. Any local user can rewrite the path's contents, defeating
        integrity assumptions of every later task.
    regex: "mode\\s*:\\s*['\"]?(?:0?[0-7]{2}[2367]|[2367])['\"]?(?=\\s|$|#|,)|chmod\\s+(?:-[A-Za-z]+\\s+)*['\"]?(?:0?[0-7]{2}[2367]|[2367])\\b|(?:mode\\s*:\\s*['\"]?|chmod\\s+(?:-[A-Za-z]+\\s+)*)(?:(?=[ugoa]*[oa])[ugoa]+\\+w|(?<![ugoa])\\+w(?=[\\s'\"]))|(?:mode\\s*:\\s*['\"]?|chmod\\s+(?:-[A-Za-z]+\\s+)*)(?:(?=[ugoa]*[oa])[ugoa]+=[rxw]*w[rxw]*)|setfacl\\s+[^\\n]*?-m\\s+[^\\n]*?o:[rxw]*w[rxw]*"
    positive_examples:
      - "mode: \"0777\""
      - "mode: '0666'"
      - "mode: '0773'"
      - "mode: 0666"
      - "mode: 'a+w'"
      - "mode: 'o+w'"
      - "mode: 'ugo+w'"
      - "chmod 777 /etc/foo"
      - "chmod -R 666 /var/data"
      - "chmod a+w /opt/secret"
      - "chmod o=rwx /etc/x"
      - "setfacl -m o:rwx /etc/x"
    negative_examples:
      - "mode: '0775'"
      - "mode: '0700'"
      - "mode: '0640'"
      - "mode: 'g+w'"
      - "mode: 'u+w'"
      - "chmod g+w /etc/x"
      - "chmod u+x /usr/local/bin/x"
    recommendation: "Replace mode: '0777' / chmod 777 with the most restrictive mode that satisfies the workload (typically 0640 for files, 0750 for directories) and use group ownership rather than world-writability to share access."
    cwe: ["CWE-732"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1222.002']
    cis_controls: ['CIS-3.3', 'CIS-4.1']
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  - id: "world_readable_sensitive"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "World Readable Sensitive Files"
    description: >-
        mode: '0744' is applied to a file containing 'key', 'secret', 'password', or
        'credential'. World-readable secrets are a compliance failure mode under
        PCI-DSS, HIPAA, and SOC 2.
    regex: "mode:\\s*[\"']?0?744[\"']?.*(?:key|secret|password|credential)"
    positive_examples:
      - "mode:744key"
    recommendation: "Files whose name contains key / secret / password / credential should not be world-readable; set mode: '0600' (or '0640' with a service group) and confirm the owning user matches the consuming service."
    cwe: ["CWE-200", "CWE-732"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]
    mitre_attack: ['T1222.002', 'T1552.001']
    cis_controls: ['CIS-3.3', 'CIS-Secrets']
    nist_controls: ['AC-3', 'AC-6', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '7.2.1', '7.2.2', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.3', 'CC6.7']

  - id: "legitimate_config_permissions"
    category: "unsafe_permissions"
    severity: "INFO"
    title: "Standard Configuration File Permissions"
    description: "Standard permissions for configuration files (informational)"
    # Match mode 0644 paired with a config/etc path within the same task block.
    regex: "mode:\\s*[\"']?0?644[\"']?[\\s\\S]{0,200}?(?:path|dest|src):\\s*['\"]?(?:/etc/|/opt/|[^'\"\\n]*(?:config|conf)\\b)"
    multiline: true
    window: 6
    exclude: true  # This pattern excludes findings, used to reduce false positives
    cwe: ['CWE-732']
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1222.002']
    cis_controls: ['CIS-3.3']
    nist_controls: ['AC-3', 'AC-6']
    pci_dss: ['7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3']

  - id: "recursive_permission_change"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "Recursive Permission Change"
    description: >-
        chmod -R 777 or 666 walks an entire subtree. Recursive permits rarely target
        only what's intended and frequently widen permissions on credentials buried
        in the tree.
    regex: "chmod\\s+-R\\s+(?:777|666)"
    positive_examples:
      - "chmod -R 777"
    recommendation: "chmod -R 777/666 walks every file under the target and is rarely the intent; scope the change with ansible.builtin.file's recurse: true plus separate mode: for directories vs files, or use find: + file: to apply the right mode per type."
    cwe: ["CWE-732"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1222.002']
    cis_controls: ['CIS-3.3', 'CIS-4.1']
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  - id: "setuid_permission"
    category: "unsafe_permissions"
    severity: "CRITICAL"
    title: "SetUID Permission"
    description: >-
        mode: '<4-7>xxx' or chmod u+s sets the setuid bit on a file. Any unverified
        setuid binary becomes a privilege-escalation primitive.
    regex: "mode:\\s*[\"']?[4-7][0-7]{3}[\"']?|chmod.*u\\+s"
    positive_examples:
      - "mode:4000"
    recommendation: "Drop the setuid bit (mode 4xxx / u+s) - prefer filesystem capabilities (setcap cap_X+ep) or a dedicated systemd service with the right User= and AmbientCapabilities= so the binary does not need to run as root."
    cwe: ["CWE-250", "CWE-732"]
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]
    mitre_attack: ['T1548.001']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['AC-3', 'AC-6', 'AC-6(1)', 'CM-6', 'CM-7', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "setgid_permission"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "SetGID Permission"
    description: >-
        mode: '<2,3,6,7>xxx' or chmod g+s sets the setgid bit on a file. Setgid on a
        binary inherits the file's group on execution and is a classic
        group-escalation primitive.
    regex: "mode:\\s*[\"']?[2367][0-7]{3}[\"']?|chmod.*g\\+s"
    positive_examples:
      - "mode: '2750'"
    recommendation: "Setgid on regular files is rarely needed and is a privilege-escalation surface; if the goal is shared-group writability on a directory, set mode: '2770' on the directory only and leave files at 0640."
    cwe: ["CWE-250", "CWE-732"]
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]
    mitre_attack: ['T1548.001']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['AC-3', 'AC-6', 'AC-6(1)', 'CM-6', 'CM-7', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "sticky_bit_removal"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "Sticky Bit Removal"
    description: "Explicitly removing sticky bit from directories using chmod -t"
    regex: "chmod\\s+.*-t\\s+"
    positive_examples:
      - "chmod -t "
    recommendation: "The sticky bit on shared directories (e.g. /tmp) prevents users from deleting each other's files; do not remove it. If the directory should not be world-writable in the first place, change ownership / mode instead of stripping +t."
    cwe: ["CWE-732"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1222.002']
    cis_controls: ['CIS-3.3', 'CIS-4.1']
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7']
    pci_dss: ['2.2.1', '2.2.4', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.3', 'CC7.1', 'CC8.1']

  # -- SSH / Connection Trust Bypass ------------------------------------
  # Rules originally in patterns/ssh_trust_bypass.yml; consolidated here
  # because host-key verification is a permissions/trust concern. Rule
  # IDs are preserved and still route to SshTrustBypassRemediationGenerator
  # via _RULE_ID_TO_CATEGORY.

  - id: "ssh_stricthostkey_disabled"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "SSH StrictHostKeyChecking Disabled"
    description: "Playbook sets StrictHostKeyChecking=no (via ssh args, ProxyCommand, or -o flag), which accepts any host key and is the primary MitM-enabler for SSH. An attacker on the network path can silently impersonate the target host."
    regex: "StrictHostKeyChecking\\s*[=: ]\\s*[\"']?(?:no|false|off)\\b"
    positive_examples:
      - "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{ lookup('env','USER') }}@localhost true"
    multiline: true
    window: 6
    recommendation: "Remove StrictHostKeyChecking=no. Pre-populate ~/.ssh/known_hosts via ssh-keyscan at build time, or use a signed host certificate (ssh -o CASignatureAlgorithms=...) so the key is verified cryptographically instead of trusted on first use."
    cis_controls: ["CIS-5.2", "CIS-5.2.10"]
    nist_controls: ['IA-5', 'IA-5(1)', 'SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1', '8.3.6']
    hipaa: ['164.312(d)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']
    mitre_attack: ["T1557"]
    references: ["https://www.ssh.com/academy/ssh/stricthostkeychecking"]
    cwe: ["CWE-295", "CWE-322"]
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V12.3.4]
    stig: ['V-230556', 'V-260468']

  - id: "ssh_userknownhosts_devnull"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "SSH UserKnownHostsFile=/dev/null Discards Host Keys"
    description: "UserKnownHostsFile=/dev/null (often paired with StrictHostKeyChecking=no) causes ssh to forget host keys after each connection - every connection becomes trust-on-first-use with no record, defeating host-key pinning entirely."
    regex: "UserKnownHostsFile\\s*[=: ]\\s*[\"']?/dev/null"
    positive_examples:
      - "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{ lookup('env','USER') }}@localhost true"
    multiline: true
    window: 6
    recommendation: "Point UserKnownHostsFile at a real, persisted file (e.g. ~/.ssh/known_hosts or a role-shipped file) so host-key rotation is visible. Never discard the known-hosts database."
    cis_controls: ["CIS-5.2.11"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]
    stig: ['V-230556']

  - id: "ansible_host_key_checking_false"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible_host_key_checking = false"
    description: "Setting ansible_host_key_checking to false (as a host_var, group_var, or extra-var) disables host-key verification for every SSH connection Ansible makes from that inventory scope. This turns off the entire trust layer for whole host groups at once."
    regex: "ansible_host_key_checking\\s*[=: ]\\s*[\"']?(?:no|false|0|off)\\b"
    positive_examples:
      - "ansible_host_key_checking=no"
    multiline: true
    window: 4
    recommendation: "Leave ansible_host_key_checking at its default (true). Seed known_hosts with ssh-keyscan in a bootstrap play that runs with host_key_checking=false exactly once, then flip it back on for all subsequent plays."
    cis_controls: ["CIS-5.2.10"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    references: ["https://docs.ansible.com/ansible/latest/inventory_guide/connection_details.html#managing-host-key-checking"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]

  - id: "ansible_cfg_host_key_checking_false"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible.cfg host_key_checking = False"
    description: "The defaults section of ansible.cfg sets host_key_checking = False, disabling host-key verification globally for every playbook run from this config."
    regex: "^\\s*host_key_checking\\s*=\\s*(?i:false|no|0|off)\\b"
    positive_examples:
      - "host_key_checking = False"
    recommendation: "Remove the line or set host_key_checking = True in [defaults]. If a bootstrap play legitimately needs to accept unknown hosts, scope the bypass to that single play with the ANSIBLE_HOST_KEY_CHECKING=false env var, not the global config."
    cis_controls: ["CIS-5.2.10"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]

  - id: "ssh_keyscan_auto_accept"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "ssh-keyscan Appending Unverified Keys to known_hosts"
    description: "Piping ssh-keyscan directly into known_hosts accepts whatever key the network returns, with no fingerprint comparison - the classic 'TOFU at deploy time' pattern that moves the MitM window earlier in the pipeline instead of eliminating it."
    regex: "ssh-keyscan[^\\n]*>>?\\s*[^\\n]*known_hosts"
    positive_examples:
      - "ansible.builtin.shell: 'ssh-keyscan -H -T 10 {{ item.item }} >> {{ gitlab_runner__home + \"/.ssh/known_hosts\" }}'"
    recommendation: "Pin expected host fingerprints in source control and diff them against ssh-keyscan output before appending (ssh-keyscan ... | awk '{ ... }' | grep -F -f expected_fingerprints.txt). Fail the play if any fingerprint is new."
    cis_controls: ["CIS-5.2.10"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]
    stig: ['V-230556']

  - id: "git_accept_hostkey_yes"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "ansible.builtin.git With accept_hostkey: yes (SSH TOFU on Remote Git Clone)"
    description: "An `ansible.builtin.git` task clones from an SSH remote (`git@host:repo.git` / `ssh://git@host/repo.git`) and sets `accept_hostkey: yes`. This flag tells Ansible to hand OpenSSH a temporary `StrictHostKeyChecking=accept-new` (or `=no` on older Ansible) argument for the single clone - effectively a TOFU (trust-on-first-use) bypass for the git remote's host key. An on-path attacker (rogue GitHub enterprise mirror, DNS-hijacked self-hosted GitLab, BGP-hijacked proxy) gets handed the SSH deploy-key without any fingerprint check, then serves trojanized source code, build artifacts, or Ansible roles that subsequently run with the permissions of the Ansible run. The risk is amplified because most `git:` tasks run with `become: yes` to place the clone into `/opt/`, `/srv/`, `/var/lib/`, etc., so the malicious code inherits root privileges on the managed node."
    regex: "(?ms)(?:ansible\\.builtin\\.git|^[\\t ]*git)\\s*:[\\s\\S]{0,600}?\\baccept_hostkey\\s*:\\s*(?:true|True|yes|Yes|1)\\b"
    multiline: true
    window: 30
    recommendation: "Remove `accept_hostkey: yes`. Instead, seed the git remote's SSH host key into `/etc/ssh/ssh_known_hosts` (or the running user's `~/.ssh/known_hosts`) BEFORE the `git:` task runs, using `ansible.builtin.known_hosts` with the fingerprint from an out-of-band trusted source (the git server's web UI, DNS CAA/SSHFP record, or a signed attestation). Example: `ansible.builtin.known_hosts: name=github.com key='{{ github_known_hosts_entry }}'` followed by the git task with `accept_hostkey: no`. For fleet-wide management, distribute a signed `ssh_known_hosts` via configuration management and treat it as tamper-evident. The rare legitimate case (a genuinely one-time bootstrap clone from an ephemeral host you control) should carry a targeted `# nosec: git_accept_hostkey_yes reason=\"bootstrap-clone, fingerprint pinned OOB via {{ item }}\"` allowlist comment AND a `known_hosts` seed step."
    positive_examples:
      - |
        - name: clone config repo
          git:
            repo: git@github.com:example/config.git
            dest: /opt/config
            accept_hostkey: yes
      - |
        - name: clone config repo (FQCN)
          ansible.builtin.git:
            repo: ssh://git@gitlab.example.com/infra/playbooks.git
            dest: /srv/playbooks
            version: v1.2.3
            accept_hostkey: true
    negative_examples:
      - |
        - name: clone config repo with known_hosts seeded
          git:
            repo: git@github.com:example/config.git
            dest: /opt/config
      - |
        - name: clone via https (no host-key semantics)
          git:
            repo: https://github.com/example/config.git
            dest: /opt/config
            accept_hostkey: no
    cis_controls: ["CIS-5.2.10", "CIS-16.1"]
    nist_controls: ['IA-3', 'SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1195.002", "T1557"]
    cwe: ["CWE-295", "CWE-322"]
    owasp_appsec: ["A07:2021", "A08:2021"]
    owasp_asvs: [V12.3.4]

  - id: "ssh_args_disable_host_key"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible_ssh_common_args / ssh_args Disables Host-Key Verification"
    description: "ansible_ssh_common_args or ansible_ssh_extra_args contains -o StrictHostKeyChecking=no, -o UserKnownHostsFile=/dev/null, or both, disabling host-key checking for every host under this inventory scope."
    regex: "ansible_ssh_(?:common|extra)_args[\\s\\S]{0,200}?(?:StrictHostKeyChecking\\s*=\\s*no|UserKnownHostsFile\\s*=\\s*/dev/null)"
    positive_examples:
      - |2-
        ansible_ssh_common_args: "-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"
              # ansible_ssh_host: "127.0.0.3"
    multiline: true
    window: 6
    recommendation: "Move the StrictHostKeyChecking=no override into a one-time bootstrap play that seeds known_hosts, then remove it. For long-lived inventories, replace the bypass with signed host certificates."
    cis_controls: ["CIS-5.2.10"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]
    stig: ['V-230556']

  - id: "ssh_proxycommand_skips_verification"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "SSH ProxyCommand With Trust-Bypass Flags"
    description: "A nested ProxyCommand that re-invokes ssh with StrictHostKeyChecking=no turns the jump host into a silent MitM: the outer connection is verified, but the hop through the proxy is not."
    regex: "ProxyCommand\\s*=?\\s*['\"]?ssh[^\\n]*StrictHostKeyChecking\\s*=\\s*no"
    positive_examples:
      - "ProxyCommand ssh -F /dev/null -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p -p {{ bastion_port }} {{ real_user }}@{{ bastion_ip }} {% if ansible_ssh_private_key_file is defined %}-i {{ ansible_ssh_private_key_file }}{% endif %}"
    multiline: true
    window: 4
    recommendation: "Remove -o StrictHostKeyChecking=no from the ProxyCommand. Use ssh -J jumphost (native ProxyJump) instead, which verifies both hops against known_hosts."
    cis_controls: ["CIS-5.2.10"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]
    stig: ['V-230556']

  - id: "winrm_cert_validation_ignore"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "WinRM ansible_winrm_server_cert_validation = ignore"
    description: "Setting ansible_winrm_server_cert_validation to 'ignore' disables TLS validation for all WinRM connections - the Windows equivalent of StrictHostKeyChecking=no."
    regex: "ansible_winrm_server_cert_validation\\s*[=: ]\\s*[\"']?ignore\\b"
    positive_examples:
      - "ansible_winrm_server_cert_validation=ignore"
    recommendation: "Deploy a proper CA-signed certificate on the WinRM listener and set ansible_winrm_server_cert_validation=validate (the default). If using a private CA, import it into the controller's trust store."
    cis_controls: ["CIS-5.2.10"]
    nist_controls: ['SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.7']
    mitre_attack: ["T1557"]
    cwe: ["CWE-295"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V12.3.4]

  # -- Become / Delegate / Connection Misuse ----------------------------
  # Rules originally in patterns/become_delegate_misuse.yml; consolidated
  # here because privilege escalation and delegation are permissions
  # concerns. Rule IDs preserved; remediation still routed to
  # BecomeDelegateMisuseRemediationGenerator via _RULE_ID_TO_CATEGORY.

  - id: "become_with_password_plaintext"
    category: "unsafe_permissions"
    severity: "CRITICAL"
    title: "Plaintext become_password in Playbook"
    description: "ansible_become_password / ansible_become_pass / become_password is set inline to a literal string - the sudo password is stored in cleartext in version control."
    regex: "(?:ansible_become_(?:password|pass)|become_password)\\s*[=: ]\\s*[\"'](?!{{)[^\"'\\n]{3,}[\"']"
    positive_examples:
