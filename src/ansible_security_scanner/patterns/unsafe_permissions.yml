  # -- ansible.cfg hardening ----------------------------------------------
  # These detect risky settings in an ansible.cfg file - whether the config
  # is standalone OR rendered into one via `ansible.builtin.copy.content:`
  # (a common attack pattern: a playbook ships a weakened config to hosts).
  # Rules target the exact line `setting = value`, so they fire on both
  # real .cfg files AND on heredoc content inside playbooks.

  - id: "ansible_cfg_allow_world_readable_tmpfiles"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible.cfg allow_world_readable_tmpfiles = True"
    description: "Setting allow_world_readable_tmpfiles = True makes Ansible's per-task temp files (which can briefly contain task parameters including secrets) world-readable. Any local user on the remote host can steal credentials mid-run."
    regex: "^\\s*allow_world_readable_tmpfiles\\s*=\\s*(?i:true|yes|1)\\b"
    positive_examples:
      - "allow_world_readable_tmpfiles = true"
    recommendation: "Leave allow_world_readable_tmpfiles unset (defaults to False). If a task truly needs this (very rare), enable it per-task via ANSIBLE_KEEP_REMOTE_FILES + become to a non-root user."
    cis_controls: ["CIS-3.1"]
    nist_controls: ['AC-3', 'AC-6', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '7.2.1', '7.2.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.3', 'CC6.7']
    mitre_attack: ["T1552.001"]
    cwe: ["CWE-200", "CWE-732"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V14.2.2, V5.3.1]

  - id: "ansible_cfg_pipelining_without_requiretty"
    category: "unsafe_permissions"
    severity: "LOW"
    title: "ansible.cfg pipelining = True (verify sudoers)"
    description: "pipelining = True speeds up runs but REQUIRES `Defaults !requiretty` in /etc/sudoers on every managed host. If requiretty is enabled (default on RHEL/CentOS), pipelining silently breaks become and can mask security issues."
    regex: "^\\s*pipelining\\s*=\\s*(?i:true|yes|1)\\b"
    positive_examples:
      - "pipelining = True"
    recommendation: "Confirm `Defaults !requiretty` is set on every managed host before enabling pipelining, OR leave pipelining = False."
    cis_controls: ["CIS-5.3.4"]
    cwe: ["CWE-1188"]
    mitre_attack: ['T1562.001']
    nist_controls: ['AU-9', 'CM-6', 'CM-7', 'IR-4', 'SI-4']
    pci_dss: ['2.2.1', '10.3.4', '12.10.1']
    hipaa: ['164.312(b)']
    soc2: ['CC6.1', 'CC7.2']

  - id: "ansible_cfg_retry_files_enabled_true"
    category: "unsafe_permissions"
    severity: "MEDIUM"
    title: "ansible.cfg retry_files_enabled = True"
    description: "retry_files_enabled writes .retry files containing inventory hostnames after failed runs. On shared systems these files linger with 0644 permissions and can leak inventory structure to other users."
