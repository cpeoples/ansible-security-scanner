  - id: "ansible_cfg_nocows_disabled_in_prod"
    category: "unsafe_permissions"
    severity: "LOW"
    title: "ansible.cfg command_warnings = False (silences shell-over-module warnings)"
    description: "command_warnings = False disables Ansible's warning when you use the command/shell module for something a native module could do better. That warning is a security signal - silencing it hides `shell: apt install ...` style anti-patterns."
    regex: "^\\s*command_warnings\\s*=\\s*(?i:false|no|0)\\b"
    positive_examples:
