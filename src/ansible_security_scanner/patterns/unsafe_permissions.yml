    hipaa: ['164.312(b)']
    soc2: ['C1.1', 'CC6.1']
    cwe: ["CWE-532"]
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5]
    mitre_attack: ['T1552.001']

  - id: "ansible_cfg_log_path_world_readable"
    category: "unsafe_permissions"
    severity: "HIGH"
    title: "ansible.cfg log_path points to world-readable location"
    description: "log_path set to /tmp, /var/tmp, /var/log with default umask - the ansible log captures task names, hostnames, and (without no_log) sometimes module arguments including secrets. A world-readable log is a credential leak waiting to happen."
