# Companion Secure Fix snippets for privilege_escalation rules.

remediations:

  windows_alwaysinstallelevated_registry_enabled:
    secure_fix: |
      - name: Disable AlwaysInstallElevated (HKLM + HKCU)
        ansible.windows.win_regedit:
          path: "{{ item.path }}"
          name: AlwaysInstallElevated
          data: 0
          type: dword
          state: present
        loop:
          - { path: 'HKLM:\Software\Policies\Microsoft\Windows\Installer' }
          - { path: 'HKCU:\Software\Policies\Microsoft\Windows\Installer' }

  windows_lsa_runasppl_disabled_or_unset:
    secure_fix: |
      - name: Enable LSASS protected-process light (RunAsPPL=1)
        ansible.windows.win_regedit:
          path: HKLM:\System\CurrentControlSet\Control\Lsa
          name: RunAsPPL
          data: 1
          type: dword
          state: present
      - name: Reboot to take effect
        ansible.windows.win_reboot:
          reboot_timeout: 600

  windows_print_spooler_service_enabled_on_domain_controller:
    secure_fix: |
      - name: Stop and disable the Print Spooler on Domain Controllers
        ansible.windows.win_service:
          name: Spooler
          state: stopped
          start_mode: disabled
        when: "'Domain Controllers' in (computer_ou | default(''))"

  windows_unquoted_service_path_with_spaces:
    secure_fix: |
      - name: Quote service ImagePath with spaces (HKLM\...\Services\<svc>)
        ansible.windows.win_regedit:
          path: 'HKLM:\System\CurrentControlSet\Services\{{ service_name }}'
          name: ImagePath
          data: '"{{ binary_path }}" {{ args | default("") }}'
          type: expandstring
          state: present

  windows_wdigest_uselogoncredential_enabled:
    secure_fix: |
      - name: Disable WDigest UseLogonCredential (force=0)
        ansible.windows.win_regedit:
          path: HKLM:\System\CurrentControlSet\Control\SecurityProviders\WDigest
          name: UseLogonCredential
          data: 0
          type: dword
          state: present
