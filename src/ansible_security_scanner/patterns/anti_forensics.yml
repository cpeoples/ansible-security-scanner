name: "Anti-Forensics & Evidence Tampering"
author: "Ansible Security Scanner Team"
description: "Detects techniques used to cover tracks, tamper with evidence, and evade detection"

patterns:
  - id: "timestomping"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "File Timestamp Manipulation (Timestomping)"
    description: "Modifies file timestamps to hide when a file was created or changed, evading forensic timeline analysis"
    regex: "touch\\s+(?:-t\\s+\\d{8,}|-r\\s+\\S+|-d\\s+['\"])"
    positive_examples:
      - "touch -t 00000000"
    recommendation: "File timestomping is a forensic evasion technique; remove immediately and investigate"
    no_ansible_remediation: true
    cwe: ['CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070.006']
    cis_controls: ['CIS-8.2', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "selinux_disable"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "SELinux Disabled or Set Permissive"
    description: "Disables or weakens SELinux enforcement, removing a critical security boundary"
    regex: "setenforce\\s+0|SELINUX\\s*=\\s*(?:disabled|permissive)|selinux:\\s*state:\\s*(?:disabled|permissive)"
    positive_examples:
      - "command: /usr/sbin/setenforce 0"
    recommendation: "SELinux should always be enforcing in production; use targeted policies for application exceptions"
    no_ansible_remediation: true
    cwe: ['CWE-693']
    mitre_attack: ['T1562.001']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['CM-6', 'CM-7', 'SC-8', 'SC-8(1)', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "apparmor_disable"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "AppArmor Profile Disabled"
    description: "Disables AppArmor profiles, removing mandatory access control protections"
    regex: "aa-disable|aa-complain|apparmor_parser\\s+(?:-R|--remove)|systemctl\\s+(?:stop|disable)\\s+apparmor"
    positive_examples:
      - "sudo systemctl stop apparmor.service"
    recommendation: "AppArmor profiles should not be disabled; create proper profiles for applications"
    no_ansible_remediation: true
    cwe: ['CWE-693']
    mitre_attack: ['T1562.001']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['CM-6', 'CM-7', 'SC-8', 'SC-8(1)', 'SI-3']
    pci_dss: ['2.2.1', '2.2.4', '2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7', 'CC6.8', 'CC7.1', 'CC8.1']

  - id: "audit_daemon_disable"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "Audit Daemon Disabled"
    description: "Stops or disables the audit daemon (auditd), preventing security event logging"
    regex: "systemctl\\s+(?:stop|disable|mask)\\s+auditd|service\\s+auditd\\s+stop|auditctl\\s+-e\\s*0|auditctl\\s+-D"
    positive_examples:
      - "systemctl stop auditd"
    recommendation: "The audit daemon must remain running; investigate why someone is attempting to disable it"
    no_ansible_remediation: true
    cwe: ['CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1562.001', 'T1562.006']
    cis_controls: ['CIS-8.2', 'CIS-8.5']
    nist_controls: ['AU-2', 'AU-3', 'AU-12', 'SC-8', 'SC-8(1)']
    pci_dss: ['2.2.7', '4.2.1', '10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)', '164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7', 'CC7.2']

  - id: "journal_log_flush"
    category: "anti_forensics"
    severity: "HIGH"
    title: "Systemd Journal Log Manipulation"
    description: "Flushes, rotates, or vacuums systemd journal logs to destroy forensic evidence"
    regex: "journalctl\\s+--(?:flush|rotate|vacuum-time=1s|vacuum-size=1)"
    positive_examples:
      - "journalctl --flush"
    recommendation: "Journal logs should only be managed by system log rotation policies"
    no_ansible_remediation: true
    cwe: ['CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070.002', 'T1485']
    cis_controls: ['CIS-8.2', 'CIS-8.10']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "utmp_wtmp_tamper"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "Login Record Tampering"
    description: "Directly modifies utmp/wtmp/btmp files to hide login sessions from forensic analysis"
    regex: "(?:>|truncate|rm)\\s+(?:-f\\s+)?/(?:var/)?(?:run/)?(?:utmp|wtmp|btmp|lastlog)"
    positive_examples:
      - "> /utmp"
    recommendation: "Login records must not be tampered with; investigate this as a potential incident"
    no_ansible_remediation: true
    cwe: ['CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070.002']
    cis_controls: ['CIS-8.2', 'CIS-8.5']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "syslog_redirect"
    category: "anti_forensics"
    severity: "HIGH"
    title: "Syslog Redirection"
    description: "Redirects syslog output to /dev/null or a remote attacker-controlled server"
    regex: "(?:rsyslog|syslog-ng|syslogd).*(?:/dev/null|\\*\\.\\*\\s+@@?(?:\\d{1,3}\\.){3}\\d{1,3})"
    positive_examples:
      - "{{ \"invoke-rc.d rsyslog rotate > /dev/null\""
    recommendation: "Syslog should only forward to authorized log aggregation servers"
    no_ansible_remediation: true
    cwe: ['CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V7.1.1", "V7.2.1"]
    mitre_attack: ['T1070', 'T1562.006']
    cis_controls: ['CIS-8.2', 'CIS-8.9']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.1.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "seccomp_disable"
    category: "anti_forensics"
    severity: "HIGH"
    title: "Seccomp Profile Disabled"
    description: "Disables seccomp security profiles in containers, removing syscall filtering"
    regex: "(?:security_opt|seccomp).*(?:unconfined|disabled)|--security-opt\\s+seccomp[=:]unconfined"
    positive_examples:
      - "- seccomp=unconfined"
    recommendation: "Never disable seccomp in production; create appropriate seccomp profiles"
    no_ansible_remediation: true
    cwe: ['CWE-693']
    mitre_attack: ['T1562.001', 'T1611']
    cis_controls: ['CIS-4.1', 'CIS-Docker']
    nist_controls: ['CM-6', 'CM-7', 'SC-8', 'SC-8(1)']
    pci_dss: ['2.2.1', '2.2.4', '2.2.7', '4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.6', 'CC6.7', 'CC7.1', 'CC8.1']

  - id: "coredump_enable"
    category: "anti_forensics"
    severity: "MEDIUM"
    title: "Core Dump Enabled for Credential Extraction"
    description: "Enables core dumps which can be used to extract secrets from process memory"
    regex: "ulimit\\s+-c\\s+unlimited|kernel\\.core_pattern|/proc/sys/kernel/core_pattern"
    positive_examples:
      - "ulimit -c unlimited"
    recommendation: "Core dumps should be disabled or restricted to prevent credential extraction"
    no_ansible_remediation: true
    cwe: ['CWE-200', 'CWE-212']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V8.1.1"]
    mitre_attack: ['T1005', 'T1552']
    cis_controls: ['CIS-3.3', 'CIS-4.1']
    nist_controls: ['AC-3', 'AC-6', 'CM-6', 'CM-7', 'SC-28']
    pci_dss: ['2.2.1', '2.2.4', '3.3.1', '3.5.1', '7.2.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.3', 'CC6.7', 'CC7.1', 'CC8.1']

  - id: "windows_vssadmin_delete_shadows_ransomware_precursor"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "Windows Volume Shadow Copy deletion (vssadmin/wmic/wbadmin/PowerShell) - ransomware precursor"
    description: "A task deletes Windows Volume Shadow Copies using `vssadmin delete shadows /all /quiet`, `wmic shadowcopy delete`, `wbadmin delete catalog -quiet`, `wbadmin delete systemstatebackup`, `bcdedit /set {default} recoveryenabled No`, or PowerShell `Get-WmiObject Win32_ShadowCopy | Remove-WmiObject`. This is the single most consistent TTP across LockBit, Black Basta, Akira, Royal, Play, BianLian, and nearly every other 2023-2025 big-game ransomware family - T1490 (Inhibit System Recovery). Detecting this in Ansible indicates either an offensive payload being deployed via ansible or a legitimate script that ransomware would mimic (either is a critical finding)."
    regex: "(?:vssadmin(?:\\.exe)?\\s+(?:delete|Delete)\\s+shadows\\s+/all|wmic(?:\\.exe)?\\s+shadowcopy\\s+delete|wbadmin(?:\\.exe)?\\s+delete\\s+(?:catalog|systemstatebackup|backup)|bcdedit(?:\\.exe)?\\s+/set\\s+\\{(?:default|[a-f0-9-]{36})\\}\\s+recoveryenabled\\s+No|bcdedit(?:\\.exe)?\\s+/set\\s+\\{(?:default|[a-f0-9-]{36})\\}\\s+bootstatuspolicy\\s+ignoreallfailures|Get-WmiObject\\s+Win32_ShadowCopy[\\s\\S]{0,80}?Remove-WmiObject|Get-CimInstance\\s+Win32_ShadowCopy[\\s\\S]{0,80}?Remove-CimInstance|cipher(?:\\.exe)?\\s+/w:)"
    positive_examples:
      - "vssadmin delete shadows /all"
    recommendation: "Ansible playbooks should NEVER delete shadow copies in production. If this is legitimate disk-maintenance automation: (1) explicitly document and sign the playbook, (2) gate behind AWX/Tower job-template approval with multi-party RBAC, (3) run only on narrowly-scoped hosts (not domain-wide), (4) log via Windows Event ID 524 (backup catalog deleted), 8224 (VSS delete). Detection: Sysmon Event ID 1 (ProcessCreate) for `vssadmin.exe delete shadows`, `wmic shadowcopy delete`, `wbadmin delete catalog`, `bcdedit /set recoveryenabled No`, plus Windows Event ID 524. Prevention: Controlled Folder Access + Defender for Endpoint ASR rule `c1db55a8-c604-4b9b-aa9c-9b79fad0e9f8` (use advanced protection against ransomware) + WDAC policy blocking vssadmin for non-admin contexts. If this playbook ever runs unexpectedly, isolate the host, preserve volatile memory, and invoke IR - shadow deletion is Initial Access + Impact combined."
    no_ansible_remediation: true
    cwe: ['CWE-73', 'CWE-732', 'CWE-1104']
    owasp_appsec: ["A04:2021", "A06:2021"]
    owasp_asvs: ["V12.3.1", "V12.4.1"]
    mitre_attack: ['T1070', 'T1485', 'T1490']
    cis_controls: ['CIS-11.1', 'CIS-11.2', 'CIS-11.3', 'CIS-11.5']
    nist_controls: ['AU-11', 'CP-9', 'CP-10', 'SI-7']
    pci_dss: ['10.5.3', '12.10.1']
    hipaa: ['164.308(a)(7)(ii)(A)', '164.312(c)(1)']
    soc2: ['A1.2', 'CC7.3', 'CC7.4']
    stig: ['V-205775', 'V-213519']

  - id: "windows_defender_exclusion_path_overbroad_or_writable"
    category: "anti_forensics"
    severity: "HIGH"
    title: "Windows Defender / MDE exclusion path is overbroad or user-writable (defender evasion)"
    description: "A task adds a Microsoft Defender / Defender for Endpoint exclusion (via `ansible.windows.win_regedit` on `HKLM\\\\SOFTWARE\\\\Microsoft\\\\Windows Defender\\\\Exclusions\\\\Paths`, `Add-MpPreference -ExclusionPath`, or Intune CSP `Defender/ExcludedPaths`) pointing at a user-writable / overbroad path such as `C:\\\\`, `C:\\\\Users`, `C:\\\\Users\\\\Public`, `C:\\\\Temp`, `C:\\\\Windows\\\\Temp`, `C:\\\\ProgramData`, `*.exe`, or `*`. This is MITRE T1562.001 (Disable or Modify Tools: Defender Exclusion), a staple ransomware / coinminer prestaging technique - observed in Qakbot, IcedID, LockBit, and Akira initial-access operations. A path exclusion in a user-writable location is effectively an antivirus bypass for any file the attacker drops there."
    regex: "(?:HKLM\\\\+SOFTWARE\\\\+(?:Policies\\\\+)?Microsoft\\\\+Windows\\s+Defender\\\\+Exclusions\\\\+(?:Paths|Extensions|Processes)[\\s\\S]{0,300}?(?:C:\\\\\\\\?|C:\\\\\\\\Users(?:\\\\\\\\Public)?|C:\\\\\\\\(?:Program(?:Data|\\s+Files)|Temp|Windows\\\\\\\\Temp)|\\*\\.exe|\\*\\.[a-z]{1,4}\\s*$|\\*\\s*$)|Add-MpPreference\\s+-Exclusion(?:Path|Extension|Process)\\s+['\"]?(?:C:\\\\\\\\?|C:\\\\\\\\Users(?:\\\\\\\\Public)?|C:\\\\\\\\(?:Program(?:Data|\\s+Files)|Temp|Windows\\\\\\\\Temp)|\\*\\.(?:exe|dll|ps1)|\\*)['\"]?|Set-MpPreference\\s+-Exclusion(?:Path|Extension|Process)\\s+['\"]?[^'\"\\n]*\\*[^'\"\\n]*['\"]?|Defender/(?:Excluded(?:Paths|Extensions|Processes))[\\s\\S]{0,200}?(?:C:\\\\\\\\Users|C:\\\\\\\\Temp|\\*\\.exe|\\*\\s*$))"
    positive_examples:
      - 'HKLM\SOFTWARE\Microsoft\Windows Defender\Exclusions\PathsC:\'
    multiline: true
    window: 10
    recommendation: "Never exclude user-writable or broad paths. Legitimate exclusions should be narrow (e.g. a specific SQL server data file `C:\\Program Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\app.mdf`), read-only for non-admins, and documented with vendor KB references (Microsoft publishes app-specific exclusion lists). Replace path exclusions with **process exclusions** when the goal is performance (`Set-MpPreference -ExclusionProcess sqlservr.exe`). Audit with `Get-MpPreference | Select-Object -ExpandProperty ExclusionPath` + compare against a SCM baseline. Detection: Sysmon Event ID 13 (registry-value set) on `HKLM\\SOFTWARE\\Microsoft\\Windows Defender\\Exclusions`, Defender operational event 5007 (configuration change). Disable tamper protection bypass: enable Intune 'Tamper Protection' + 'Prevent local admins from adding exclusions' (Defender CSP `DisableLocalAdminMerge=1`). If an attacker ever modified exclusions, the host is considered compromised - perform IR, full EDR scan, and restore from backup."
    cwe: ['CWE-73', 'CWE-250', 'CWE-693']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V12.3.1", "V14.2.2"]
    mitre_attack: ['T1027', 'T1112', 'T1562.001']
    cis_controls: ['CIS-10.1', 'CIS-10.2', 'CIS-10.5']
    nist_controls: ['AU-12', 'CM-7', 'SI-3', 'SI-4']
    pci_dss: ['5.2.1', '5.2.2', '5.3.3']
    hipaa: ['164.308(a)(5)(ii)(B)']
    soc2: ['CC6.8', 'CC7.1']
    stig: ['V-213450']

  - id: "windows_defender_asr_rule_disabled_or_audit_only"
    category: "anti_forensics"
    severity: "HIGH"
    title: "Microsoft Defender Attack-Surface Reduction (ASR) rule set to Disabled or AuditOnly"
    description: "A task configures a Microsoft Defender ASR rule (via `Set-MpPreference -AttackSurfaceReductionRules_Actions`, `Add-MpPreference`, `ansible.windows.win_regedit` under `HKLM\\\\SOFTWARE\\\\Policies\\\\Microsoft\\\\Windows Defender\\\\Windows Defender Exploit Guard\\\\ASR\\\\Rules`, or Intune ASR CSP) with Action=0 (Disabled) or Action=2 (AuditOnly) for one of the Microsoft-recommended 'standard protection' rules. Specifically dangerous when disabled: `d4f940ab-401b-4efc-aadc-ad5f3c50688a` (block office child processes), `3b576869-a4ec-4529-8536-b80a7769e899` (block office executable content from email), `c1db55a8-c604-4b9b-aa9c-9b79fad0e9f8` (ransomware protection), `5beb7efe-fd9a-4556-801d-275e5ffc04cc` (block execution of obfuscated scripts), `d1e49aac-8f56-4280-b9ba-993a6d77406c` (block Lsass credential stealing), `56a863a9-875e-4185-98a7-b882c64b5ce5` (block abused vulnerable signed drivers)."
    regex: "(?:AttackSurfaceReductionRules_(?:Actions|Ids)[\\s\\S]{0,400}?(?:d4f940ab-401b-4efc-aadc-ad5f3c50688a|3b576869-a4ec-4529-8536-b80a7769e899|c1db55a8-c604-4b9b-aa9c-9b79fad0e9f8|5beb7efe-fd9a-4556-801d-275e5ffc04cc|9e6c4e1f-7d60-472f-ba1a-a39ef669e4b2|d3e037e1-3eb8-44c8-a917-57927947596d|b2b3f03d-6a65-4f7b-a9c7-1c7ef74a9ba4|be9ba2d9-53ea-4cdc-84e5-9b1eeee46550|01443614-cd74-433a-b99e-2ecdc07bfc25|c0033c00-d16d-4114-a5a0-dc9b3a7d2ceb|26190899-1602-49e8-8b27-eb1d0a1ce869|7674ba52-37eb-4a4f-a9a1-f0f9a1619a2c|75668c1f-73b5-4cf0-bb93-3ecf5cb7cc84|92E97FA1-2EDF-4476-BDD6-9DD0B4DDDC7B|D1E49AAC-8F56-4280-B9BA-993A6D77406C|56a863a9-875e-4185-98a7-b882c64b5ce5)[\\s\\S]{0,120}?(?:[Aa]ction\\s*[:=]\\s*['\"]?(?:0|2|AuditMode|Disabled|Audit)['\"]?|[Vv]alue\\s*[:=]\\s*['\"]?(?:0|2)['\"]?)|Set-MpPreference\\s+-AttackSurfaceReductionRules_Actions[\\s\\S]{0,400}?(?:Disabled|AuditMode|0|2)|Remove-MpPreference\\s+-AttackSurfaceReductionRules_Ids)"
    positive_examples:
      - "AttackSurfaceReductionRules_Actionsd4f940ab-401b-4efc-aadc-ad5f3c50688aAction:0"
    multiline: true
    window: 20
    recommendation: "Every production Windows 10/11 / Server 2019+ endpoint should run all 16 Microsoft-recommended ASR rules in **Block** mode (`Action=1`), not Audit/Disabled. Deploy via Intune 'Endpoint security -> Attack surface reduction' policy or Defender CSP with full rule-set list at Block. Known-noisy rules (`26190899-1602-49e8-8b27-eb1d0a1ce869` office communication app child processes) should use ASR 'Warn' mode + per-app exclusions rather than Disable. Test with a pilot ring in AuditMode (Action=2) for ≤ 14 days, review `Get-MpPreference | Select-Object -ExpandProperty AttackSurfaceReductionOnlyExclusions` and event 1121-1125 (MITRE ATT&CK: Microsoft-Windows-Windows Defender/Operational), then promote to Block. Monitor ASR rule state monthly via `Get-MpPreference | Select-Object AttackSurfaceReductionRules_Ids, AttackSurfaceReductionRules_Actions` shipped to a SIEM; alert on any downgrade. Protect the config with Tamper Protection + Intune policy conflict resolution."
    cwe: ['CWE-250', 'CWE-693', 'CWE-807']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1112', 'T1562.001', 'T1562.010']
    cis_controls: ['CIS-10.1', 'CIS-10.2', 'CIS-10.5', 'CIS-10.7']
    nist_controls: ['CM-7', 'SI-3', 'SI-4', 'SI-7']
    pci_dss: ['5.2.1', '5.3.1', '5.3.3']
    hipaa: ['164.308(a)(5)(ii)(B)']
    soc2: ['CC6.8', 'CC7.1']
    stig: ['V-213450']

  - id: "azure_keyvault_soft_delete_or_purge_protection_disabled"
    category: "anti_forensics"
    severity: "HIGH"
    title: "Azure Key Vault Without Soft-Delete or Purge Protection"
    description: "An `azure.azcollection.azure_rm_keyvault` task sets `enable_soft_delete: false`, `enable_purge_protection: false`, `soft_delete_retention_in_days:` < 7, or omits both flags entirely on a new vault. Without soft-delete, a compromised identity or an accidental `az keyvault delete` permanently destroys secrets, certificates, and keys - including KMS keys that encrypt storage accounts, SQL TDE keys, and disk encryption sets - causing catastrophic data-loss that is unrecoverable. Ransomware and insider-threat playbooks explicitly target Key Vault for this reason. Azure made both flags required by policy for new vaults in Feb 2025 but legacy playbooks still recreate vaults without them."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_keyvault\\s*:[\\s\\S]{0,2500}?(?:enable_soft_delete\\s*:\\s*(?:false|False|no|No|0)|enable_purge_protection\\s*:\\s*(?:false|False|no|No|0)|soft_delete_retention_in_days\\s*:\\s*[1-6]\\b)"
    positive_examples:
      - "azure.azcollection.azure_rm_keyvault:enable_soft_delete:false"
    multiline: true
    window: 60
    recommendation: "Set `enable_soft_delete: true` and `enable_purge_protection: true` on every Key Vault. Use `soft_delete_retention_in_days: 90` (the max Azure allows; 7 days minimum is insufficient for real-world incident response). Note: once purge protection is enabled, it cannot be disabled - this is by design (it's the protection against a malicious `Set-AzKeyVaultAccessPolicy` + `Remove-AzKeyVault` flow). Enforce via Azure Policy built-in `ID: 1e66c121-a66a-4b1f-9b83-0fd99bf0fc2d` (Key vaults should have purge protection enabled) + `0b60c0b2-2dc2-4e1c-b5c9-abbed971de53` (soft delete)."
    cwe: ['CWE-285', 'CWE-404', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1485', 'T1490', 'T1552.007']
    cis_controls: ['CIS-3.11', 'CIS-11.2']
    nist_controls: ['CP-9', 'IA-5', 'SC-28']
    pci_dss: ['3.5.1', '10.5.5']
    hipaa: ['164.308(a)(7)(ii)(A)', '164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC7.4']

  - id: "rsyslog_audit_rules_silently_sabotaged"
    category: "anti_forensics"
    severity: "CRITICAL"
    title: "Playbook Writes Log-Silencing Rules To /etc/rsyslog.d/ Or /etc/audit/rules.d/ (Keeps Service Running, Drops Events)"
    description: "An `ansible.builtin.copy`, `template`, `lineinfile`, or `blockinfile` task writes a file under `/etc/rsyslog.d/*.conf`, `/etc/rsyslog.conf`, `/etc/audit/rules.d/*.rules`, or `/etc/audit/auditd.conf` whose content silently drops or discards events - while the logging service itself remains running. Specific fingerprints: (1) rsyslog `discard` / `~` action rules (`:msg, contains, \"sshd\" ~`, `:programname, isequal, \"sudo\" stop`, `*.* ~`, `& stop`, `& ~`), (2) auditd `-a never,exit -F arch=...` / `-a never,user` catch-all exclusion rules, (3) `auditctl -a never,exit ...` lines rendered into rule files, (4) redirecting all rsyslog output to `/dev/null` via an omfile template. Unlike the `rsyslog_or_journald_stopped_masked` rule (which catches service stop/mask), this catches the quieter post-intrusion persistence technique where a playbook leaves a legitimate-looking conf file that continues to drop specific events across every reboot. This is MITRE T1562.006 (Impair Defenses: Indicator Blocking) and the exact primitive used by the 2024 Linux ransomware 'Sedexp' to hide auditd events for `ls`, `find`, and `sudo` while keeping `systemctl status auditd` green."
    regex: "(?:ansible\\.builtin\\.(?:copy|template|lineinfile|blockinfile)|copy|template|lineinfile|blockinfile)\\s*:[\\s\\S]{0,600}?(?:path|dest)\\s*:\\s*['\"]?(?:/etc/rsyslog\\.d/[^'\"\\s]+\\.conf|/etc/rsyslog\\.conf|/etc/audit/rules\\.d/[^'\"\\s]+\\.rules|/etc/audit/auditd\\.conf)['\"]?[\\s\\S]{0,2000}?(?:(?:content|line|block)\\s*:[\\s\\S]{0,1500}?(?::msg\\s*,\\s*contains\\s*,[^\\n]{0,80}~|:programname\\s*,\\s*isequal\\s*,[^\\n]{0,80}(?:stop|~)|\\*\\.\\*\\s+~|&\\s+(?:stop|~)|-a\\s+never,(?:exit|user)\\b|>\\s*/dev/null\\b|omfile[^\\n]{0,200}/dev/null))"
    positive_examples:
      - "ansible.builtin.copy:path:/etc/rsyslog.d/x.confcontent::msg,contains,~"
    multiline: true
    window: 40
    recommendation: "Never render `discard`/`~`/`stop` rsyslog actions or `never,exit` auditd rules from configuration management. Legitimate log-volume control belongs in a separate forwarder layer (rsyslog `omfwd` with rate-limit, Fluent Bit tail+filter with metrics) and should NEVER happen at the local rsyslog/auditd layer on a monitored host - filtering at the source destroys forensic evidence. If a playbook writes to `/etc/rsyslog.d/` or `/etc/audit/rules.d/`, the content should be additive (new file-watches, new destinations) only. Pre-commit lint: reject any rsyslog conf containing `discard`, `~`, or ` stop\\b` actions; reject any audit rules file containing `-a never,`. Runtime detection: add an auditd watch on the rule directories themselves (`-w /etc/audit/rules.d/ -p wa -k audit_rule_tamper`, `-w /etc/rsyslog.d/ -p wa -k rsyslog_tamper`) and forward those events off-host to a SIEM that owns the detection for this anti-forensic class. Verify running config matches committed config: `augenrules --check` + `rsyslogd -N1 -f /etc/rsyslog.conf` and alert on drift. For playbook CI, add a pre-deploy check that greps every rendered template for the listed fingerprints and fails the run."
    no_ansible_remediation: true
    cwe: ['CWE-117', 'CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: ["V8.3.1"]
