name: "Ansible-Specific Security Patterns"
author: "Ansible Security Scanner Team"
description: >
  Detects Ansible-specific secret exposure: hardcoded connection credentials
  (become_pass, ssh_pass, winrm_password), vault password files, SNMP
  community strings, Terraform state access, kubeconfig manipulation, and
  CI/CD token leakage.

patterns:
  # -- Ansible Connection Secrets ---------------------------------------------
  - id: "ansible_become_pass"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "ansible_become_pass in Playbook"
    description: "Hardcodes the sudo/become password in the playbook, exposing it in version control"
    regex: "ansible_become_pass(?:word)?\\s*[:=]\\s*['\"]?(?!\\{\\{)[^\\s'\"]{3,}"
    positive_examples:
      - "ansible_become_password: BOGUSPASS"
    recommendation: "Use --ask-become-pass, Vault-encrypted variables, or an external credential store"
    cwe: ['CWE-259', 'CWE-798']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "ansible_ssh_pass"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "ansible_ssh_pass in Playbook"
    description: "Hardcodes the SSH password in the playbook instead of using key-based auth"
    regex: "ansible_ssh_pass(?:word)?\\s*[:=]\\s*['\"]?(?!\\{\\{)[^\\s'\"]{3,}"
    positive_examples:
      - "ansible_ssh_pass: \"foobar\""
    recommendation: "Use SSH key-based authentication or Vault-encrypted ansible_ssh_pass"
    cwe: ['CWE-259', 'CWE-798']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    stig: ['V-230555', 'V-260469']

  - id: "ansible_winrm_password"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "WinRM Password in Playbook"
    description: >-
        Hardcodes ansible_winrm_password (or ansible_winrm_cert_key_pem) for Windows
        hosts in plaintext. WinRM credentials should live in ansible-vault or a
        secret manager, never in inventory or vars.
    regex: "ansible_winrm_password\\s*[:=]\\s*['\"]?(?!\\{\\{)[^\\s'\"]{3,}|ansible_winrm_cert_key_pem\\s*[:=]"
    positive_examples:
      - "ansible_winrm_password:xxx"
    recommendation: "Use Vault-encrypted variables or Kerberos authentication for WinRM"
    cwe: ['CWE-259', 'CWE-798']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "ansible_connection_password"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "Ansible Connection Password Exposed"
    description: "Hardcodes connection-level passwords in inventory or playbook variables"
    regex: "ansible_password\\s*[:=]\\s*['\"]?(?!\\{\\{)[^\\s'\"]{3,}|ansible_httpapi_pass\\s*[:=]\\s*['\"]?(?!\\{\\{)"
    positive_examples:
      - "ansible_password: other_password"
    recommendation: "Store connection passwords in Vault or use credential plugins"
    cwe: ['CWE-259', 'CWE-798']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "vault_password_file"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Vault Password File Referenced"
    description: "References a vault password file, which may contain plaintext master secret"
    regex: "vault_password_file\\s*[:=]|--vault-password-file\\s+|--vault-pass"
    positive_examples:
      - |2-
        DEFAULT_VAULT_PASSWORD_FILE:
          # ...
          env: [{name: ANSIBLE_VAULT_PASSWORD_FILE}]
    recommendation: "Use vault-id with script-based lookups or external secret backends instead of plaintext files"
    cwe: ['CWE-522', 'CWE-532']
    owasp_appsec: ["A04:2021", "A09:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V7.1.1"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'AU-9', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2', '10.3.1', '10.3.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(b)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  # -- SNMP Community Strings --------------------------------------------------
  - id: "snmp_community_string"
    category: "ansible_specific"
    severity: "HIGH"
    title: "SNMP Community String Exposed"
    description: "Hardcodes SNMP community strings which grant read/write access to network devices"
    regex: "(?:community|snmp_community)\\s*[:=]\\s*['\"]?(?:public|private|(?!\\{\\{)[A-Za-z0-9!@#$%^&*_]{4,})|snmpwalk\\s+.*-c\\s+|snmpget\\s+.*-c\\s+"
    positive_examples:
      - "community: public"
    recommendation: "Use SNMPv3 with authentication; store community strings in Vault"
    no_ansible_remediation: true
    cwe: ['CWE-259', 'CWE-798']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-4.1', 'CIS-Secrets']
    nist_controls: ['CM-6', 'CM-7', 'IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['2.2.1', '2.2.4', '3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1', 'CC7.1', 'CC8.1']

  # -- Terraform State Access -------------------------------------------------
  - id: "terraform_state_access"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "Terraform State File Access"
    description: "Accesses terraform.tfstate which contains all resource attributes including secrets"
    regex: "terraform\\.tfstate|terraform\\s+state\\s+(?:pull|show|list)|terraform\\s+output\\s+-json"
    positive_examples:
      - "terraform.tfstate"
    recommendation: "Use remote state backends (S3, Consul) with encryption; never access tfstate directly from playbooks"
    no_ansible_remediation: true
    cwe: ['CWE-200', 'CWE-522']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V8.1.1"]
    mitre_attack: ['T1005', 'T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7']

  # -- Kubeconfig Manipulation ------------------------------------------------
  - id: "kubeconfig_access"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Kubeconfig File Exfiltration or Distribution"
    description: "A task EXFILTRATES a kubeconfig file (via ``ansible.builtin.slurp`` / ``ansible.builtin.fetch`` - read the controller's or remote's ``~/.kube/config`` back to the playbook) OR DISTRIBUTES one (via ``ansible.builtin.copy`` / ``ansible.builtin.template`` with ``src:`` pointing at a kubeconfig). Both shapes leak cluster-admin-equivalent credentials. Merely setting ``KUBECONFIG=/path/to/config`` as an environment variable for a local kubectl call is NOT flagged - that's the normal operator pattern. The real risk is the credentials LEAVING their trust boundary."
    # Anchor on the leak-vectors, not the operator-env-var pattern:
    #   * ``slurp:`` / ``fetch:`` of a kubeconfig -> exfiltrates back
    #     to the controller
    #   * ``copy: src: .../.kube/config`` / ``template: src: ...`` -> 
    #     distributes a kubeconfig to a managed host
    # The previous regex fired on every ``KUBECONFIG=`` env-var and
    # every local ``.kube/config`` path reference - 18/33 findings
    # were legitimate ``environment: { KUBECONFIG: /home/x/.kube/
    # config }`` usage that is NOT a credential leak.
    regex: "(?:(?:ansible\\.builtin\\.)?(?:slurp|fetch):[\\s\\S]{0,200}?\\.kube/config|(?:ansible\\.builtin\\.)?(?:copy|template):[\\s\\S]{0,200}?src:\\s*[\"']?[^\"'\\n]*?\\.kube/config)"
    multiline: true
    window: 8
    recommendation: "Do not distribute kubeconfig files via playbooks. Use short-lived tokens from OIDC / IAM-integrated service accounts (e.g., ``aws eks get-token``, ``gcloud container clusters get-credentials --internal-ip``) that generate a kubeconfig on the local host from ambient cloud identity. For service accounts, use ``kubernetes.core.k8s`` with a token fetched at runtime from Vault / AWS Secrets Manager - never from a file that follows the playbook."
    no_ansible_remediation: true
    positive_examples:
      - |2-
            ansible.builtin.slurp:
              src: /root/.kube/config
      - |2-
            ansible.builtin.fetch:
              src: /home/operator/.kube/config
              dest: /tmp/cluster-admin
      - |2-
            ansible.builtin.copy:
              src: /controller/secrets/.kube/config
              dest: /home/app/.kube/config
      - |2-
            ansible.builtin.template:
              src: templates/.kube/config.j2
              dest: /etc/kubernetes/kubeconfig
    negative_examples:
      - |2-
            environment:
              KUBECONFIG: /home/splunk/.kube/config
      - |2-
            ansible.builtin.file:
              path: /home/splunk/.kube/config
              owner: splunk
      - |2-
            ansible.builtin.lineinfile:
              path: ~/.bashrc
              line: export KUBECONFIG=/home/splunk/.kube/config
    cwe: ['CWE-200', 'CWE-522']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V8.1.1"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7']

  # -- CI/CD Token Exposure ---------------------------------------------------
  - id: "cicd_token_exposure"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "CI/CD Pipeline Token Exposed"
    description: "References CI/CD pipeline tokens which could be used to compromise the build system"
    regex: "(?:CI_JOB_TOKEN|GITLAB_TOKEN|GITLAB_PRIVATE_TOKEN|ACTIONS_RUNTIME_TOKEN|JENKINS_SECRET|BUILDKITE_AGENT_TOKEN|CIRCLECI_TOKEN|TRAVIS_TOKEN)\\s*[:=]\\s*['\"]?(?!\\{\\{)[^\\s'\"]{3,}"
    positive_examples:
      - "CI_JOB_TOKEN:xxx"
    recommendation: "CI/CD tokens should only be used via masked environment variables, never hardcoded"
    no_ansible_remediation: true
    cwe: ['CWE-522', 'CWE-532']
    owasp_appsec: ["A04:2021", "A09:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V7.1.1"]
    mitre_attack: ['T1552.004']
    cis_controls: ['CIS-16.1', 'CIS-Secrets']
    nist_controls: ['AU-9', 'IA-5(7)', 'SA-11', 'SA-15', 'SC-28']
    pci_dss: ['3.5.1', '6.2.4', '8.6.2', '10.3.1', '10.3.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(b)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1', 'CC8.1']

  - id: "cicd_token_echo"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "CI/CD Token Logged or Echoed"
    description: >-
        Echoes or prints a CI/CD token (CI_JOB_TOKEN, GITHUB_TOKEN,
        ACTIONS_RUNTIME_TOKEN, etc.) inside a shell task. The token is captured in
        the build log and visible to anyone with log access.
    regex: "echo.*\\$(?:CI_JOB_TOKEN|GITLAB_TOKEN|GITHUB_TOKEN|ACTIONS_RUNTIME_TOKEN|JENKINS_SECRET)|\\bprint\\b.*(?:CI_JOB_TOKEN|GITLAB_TOKEN|GITHUB_TOKEN)"
    positive_examples:
      - "echo$CI_JOB_TOKEN"
    recommendation: "Never echo CI/CD tokens; use no_log: true and masked variables"
    no_ansible_remediation: true
    cwe: ['CWE-200', 'CWE-532']
    owasp_appsec: ["A01:2021", "A09:2021"]
    owasp_asvs: ["V7.1.1", "V8.1.1"]
    mitre_attack: ['T1552.004']
    cis_controls: ['CIS-8.2', 'CIS-Secrets']
    nist_controls: ['AC-3', 'AU-2', 'AU-9', 'AU-12', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '8.6.2', '10.2.1', '10.3.1', '10.3.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(b)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7', 'CC7.2']

  # -- Unauthenticated Service Access -----------------------------------------
  - id: "redis_unauthenticated"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Unauthenticated Redis Access"
    description: "Connects to Redis without authentication, which defaults to no password"
    regex: "redis-cli(?!.*-a\\s)(?!.*--pass)\\s+(?:-h\\s|PING|SET\\s|GET\\s|KEYS|FLUSHALL|CONFIG|SLAVEOF|DEBUG)"
    positive_examples:
      - "redis-cli -h "
    recommendation: "Always use Redis AUTH and TLS; never connect without credentials"
    no_ansible_remediation: true
    cwe: ['CWE-306']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.1.1"]
    mitre_attack: ['T1078']
    cis_controls: ['CIS-4.1', 'CIS-13.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-4']
    pci_dss: ['2.2.1', '2.2.4', '11.3.1']
    soc2: ['CC7.1', 'CC7.2', 'CC8.1']

  - id: "elasticsearch_unauthenticated"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Unauthenticated Elasticsearch Access"
    description: "Accesses Elasticsearch API without authentication, exposing data to unauthorized reads"
    regex: "(?:curl|uri|url).*(?:localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0):(?:9200|9300)|elasticsearch.*(?:http://|:9200)"
    positive_examples:
      - "shell: curl -XPUT localhost:9200/_all/_settings -d '{\"index.routing.allocation.disable_allocation\":\"false\" }'"
    recommendation: "Enable Elasticsearch security features (X-Pack) with authentication and TLS"
    no_ansible_remediation: true
    cwe: ['CWE-306']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.1.1"]
    mitre_attack: ['T1078']
    cis_controls: ['CIS-4.1', 'CIS-13.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-4']
    pci_dss: ['2.2.1', '2.2.4', '11.3.1']
    soc2: ['CC7.1', 'CC7.2', 'CC8.1']

  - id: "mongodb_unauthenticated"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Unauthenticated MongoDB Access"
    description: >-
        Connects to MongoDB without --password or --authenticationDatabase.
        Unauthenticated MongoDB access is the shape exploited by the historical
        'MongoDB ransom' campaigns.
    regex: "\\bmongo\\s+(?!.*--password)(?!.*--authenticationDatabase)(?:--host|mongodb://(?!.*:.*@))"
    positive_examples:
      - "mongo --host"
    recommendation: "Enable MongoDB authentication and use SCRAM-SHA-256; never connect without auth"
    no_ansible_remediation: true
    cwe: ['CWE-306']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.1.1"]
    mitre_attack: ['T1078']
    cis_controls: ['CIS-4.1', 'CIS-13.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-4']
    pci_dss: ['2.2.1', '2.2.4', '11.3.1']
    soc2: ['CC7.1', 'CC7.2', 'CC8.1']

  # -- Windows Attack Vectors -------------------------------------------------
  - id: "powershell_download_cradle"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "PowerShell Download Cradle"
    description: "Uses PowerShell to download and execute code from a remote URL (living off the land)"
    regex: "(?:New-Object\\s+(?:Net\\.WebClient|System\\.Net\\.WebClient)).*Download(?:String|File|Data)|Invoke-WebRequest.*\\|.*(?:iex|Invoke-Expression)|IEX\\s*\\(.*(?:Net\\.WebClient|WebRequest|curl|wget)"
    positive_examples:
      - "New-Object Net.WebClientDownloadString"
    recommendation: "Download files to disk with checksum verification instead of executing from memory"
    no_ansible_remediation: true
    cwe: ['CWE-494', 'CWE-829']
    owasp_appsec: ["A08:2021"]
    owasp_asvs: ["V10.3.1", "V10.3.2"]
    mitre_attack: ['T1059.001', 'T1105']
    cis_controls: ['CIS-Supply-Chain']
    nist_controls: ['CM-5', 'CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.2', '6.3.3']
    soc2: ['CC7.1', 'CC8.1']

  - id: "powershell_invoke_expression"
    category: "ansible_specific"
    severity: "HIGH"
    title: "PowerShell Invoke-Expression Usage"
    description: "Uses Invoke-Expression (IEX) to execute dynamically constructed commands"
    regex: "(?:Invoke-Expression|\\biex\\b)\\s+[^#]|\\|\\s*(?:iex|Invoke-Expression)\\b"
    positive_examples:
      - "Invoke-Expression x"
    recommendation: "Avoid Invoke-Expression; use explicit cmdlets with validated parameters"
    no_ansible_remediation: true
    cwe: ['CWE-94', 'CWE-95']
    owasp_appsec: ["A03:2021"]
    mitre_attack: ['T1059.001']
    cis_controls: ['CIS-4.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-3', 'SI-10']
    pci_dss: ['2.2.1', '2.2.4', '6.2.4', '6.3.1']
    soc2: ['CC7.1', 'CC8.1']

  - id: "windows_registry_persistence"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "Windows Registry Persistence"
    description: "Modifies Windows registry Run/RunOnce keys to establish persistence across reboots"
    regex: "(?:HKLM|HKCU).*\\\\(?:Run|RunOnce)\\\\|win_regedit.*(?:Run|RunOnce)|CurrentVersion\\\\Run"
    positive_examples:
      - 'HKLM\RunOnce\'
    recommendation: "Registry persistence should only be configured through approved GPO or SCCM"
    no_ansible_remediation: true
    cwe: ['CWE-506']
    mitre_attack: ['T1547.001']
    cis_controls: ['CIS-4.1', 'CIS-10.1']
    nist_controls: ['CM-6', 'CM-7', 'SI-3', 'SI-7']
    pci_dss: ['2.2.1', '2.2.4']
    soc2: ['CC6.8', 'CC7.1', 'CC8.1']

  # -- AAP / AWX / Tower Runtime Risks ----------------------------------------
  - id: "awx_job_launch_user_extra_vars"
    category: "ansible_specific"
    severity: "HIGH"
    title: "AWX/AAP Job Launch Accepts User-Supplied extra_vars"
    description: "awx.awx.job_launch / tower_job_launch called with extra_vars that appear to come from an untrusted source (survey, webhook, API). If the corresponding Job Template has ask_variables_on_launch=true without a Survey Spec restricting allowed keys, attackers can inject variables that override playbook defaults or pass dangerous values to tasks."
    regex: "(?:awx\\.awx\\.job_launch|tower_job_launch)\\s*:[\\s\\S]{0,600}extra_vars\\s*:\\s*[\"']?\\{\\{"
    positive_examples:
      - "awx.awx.job_launch:extra_vars:{{"
    recommendation: "Set ask_variables_on_launch=false on the Job Template or define a Survey Spec that enumerates allowed variables. Validate webhook/API payloads before forwarding them as extra_vars."
    cwe: ['CWE-20', 'CWE-915']
    owasp_appsec: ["A03:2021", "A08:2021"]
    mitre_attack: ['T1059', 'T1190']
    cis_controls: ['CIS-16.11']
    nist_controls: ['SI-10']
    pci_dss: ['6.2.4']
    soc2: ['CC7.1']

  - id: "awx_survey_password_literal_default"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "AWX/AAP Survey Password Field With Literal Default"
    description: "A Survey Spec declares a password-type question but supplies a plaintext literal as its default, leaking the value into the Job Template export, audit log, and anyone with read access to the Survey."
    regex: "type\\s*:\\s*[\"']?password[\"']?[\\s\\S]{0,200}default\\s*:\\s*[\"'](?!\\{\\{)[^\"'\\s]{3,}[\"']"
    positive_examples:
      - 'type:passworddefault:"xxx"'
    recommendation: "Leave the default empty for password-type questions, or reference a Vault-encrypted variable with {{ lookup('env', ...) }}. Never inline a plaintext password into a survey_spec."
    cwe: ['CWE-256', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.1", "V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
