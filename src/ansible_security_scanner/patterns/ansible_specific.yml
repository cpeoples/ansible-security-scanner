  # -- 2024-2026 container-runtime hygiene ----------------------------------
  - id: "docker_socket_mounted_into_task"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "Docker / Podman / containerd Socket Mounted Into a Container"
    description: "A `community.docker.docker_container`, `containers.podman.podman_container`, or raw `docker run` / `podman run` task bind-mounts `/var/run/docker.sock`, `/run/docker.sock`, `/var/run/containerd/containerd.sock`, `/run/containerd/containerd.sock`, `/var/run/crio/crio.sock`, or `/run/podman/podman.sock` into the container. Any process inside that container can then create new privileged containers, mount host paths, and escape to root on the host - the canonical 'docker.sock = root' escape documented by every container-escape CTF and actively abused by Kinsing, TeamTNT, and Docker-Hub cryptomining campaigns."
    regex: "(?:volumes?|mounts?|-v|--volume|--mount)\\s*[:=][\\s\\S]{0,200}?(?:/(?:var/)?run/(?:docker|containerd/containerd|crio/crio|podman/podman)\\.sock|/var/lib/(?:docker|containerd))"
    positive_examples:
      - |2-
        volumes:
                - /var/run/docker.sock
    multiline: true
    window: 5
    recommendation: "Never mount the container runtime socket into a container. If you need Docker-in-Docker for CI, use a sibling pattern (a separate rootless Docker daemon in its own network namespace) or switch to BuildKit / Buildah with userns remapping. For Kubernetes job execution, use a proper controller (Tekton, Argo Workflows) that talks to the kubelet API with a scoped ServiceAccount, not to the node's CRI socket."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V12.4.1", "V14.2.2"]
    mitre_attack: ['T1068', 'T1610', 'T1611']
    cis_controls: ['CIS-5.2', 'CIS-K8s-5.2.3']
    nist_controls: ['AC-3', 'AC-6', 'SC-7', 'SI-4']
    pci_dss: ['2.2.1', '7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "podman_container_privileged"
    category: "ansible_specific"
    severity: "CRITICAL"
    title: "Podman Container Run With --privileged or Equivalent Cap-Add"
    description: "A `containers.podman.podman_container` task sets `privileged: true`, or a raw `podman run` / `podman create` includes `--privileged`, `--cap-add=SYS_ADMIN` (or `ALL`), or `--security-opt label=disable` together with `--security-opt seccomp=unconfined`. Podman was adopted by RHEL as the rootless alternative to Docker specifically to contain this blast radius - `--privileged` re-enables every capability plus device pass-through, negating rootless mode entirely."
    regex: "containers\\.podman\\.podman_container\\s*:[\\s\\S]{0,400}?privileged\\s*:\\s*(?:true|yes)|podman\\s+(?:run|create)\\s[^\\n]*(?:--privileged\\b|--cap-add[= ](?:SYS_ADMIN|ALL)\\b|--security-opt[= ]label=disable[\\s\\S]{0,80}--security-opt[= ]seccomp=unconfined)"
    positive_examples:
      - "command: \"podman run --rm --privileged -v /etc/ceph:/etc/ceph -v /dev:/dev --net=host --entrypoint=rbd {{ ceph_docker_registry }}/{{ ceph_docker_image }}:{{ ceph_docker_image_tag }} map test/rbd_test\""
    multiline: true
    window: 8
    recommendation: "Drop `--privileged` entirely. If the workload needs a specific capability, add only that one (`--cap-add=NET_ADMIN` for a VPN container, `--cap-add=SYS_PTRACE` for a debugger) and combine with `--cap-drop=ALL` first. Keep the default seccomp profile; if a syscall is blocked, tighten the profile rather than disabling it (`podman run --security-opt seccomp=/etc/containers/seccomp.json`). Use rootless mode (`podman run --userns=auto`) as the outer boundary."
    cwe: ['CWE-250', 'CWE-269']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1068', 'T1611']
    cis_controls: ['CIS-5.2', 'CIS-K8s-5.2.5']
    nist_controls: ['AC-6', 'AC-6(1)', 'CM-7', 'SI-4']
    pci_dss: ['2.2.1', '7.2.1']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "buildah_unshare_as_root"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Buildah Unshare / Build Running as Root"
    description: "A task invokes `buildah unshare`, `buildah bud`, or `buildah build` from within a playbook running as root (implied by `become: true` at task level and no explicit `--isolation=rootless`). Running Buildah as root defeats its primary security guarantee - it uses the host's user and mount namespaces directly, which means a malicious `Containerfile` `RUN` step can escape to the host filesystem via a symlink race or crafted `/etc` write."
    regex: "(?:buildah\\s+(?:unshare|bud|build(?:-using-dockerfile)?)\\s(?:(?!--isolation=rootless)[\\s\\S]){0,200}|containers\\.podman\\.podman_image\\s*:[\\s\\S]{0,400}?build\\s*:[\\s\\S]{0,200}?(?:format|isolation)\\s*:\\s*[\"']?(?:docker|chroot)[\"']?)"
    positive_examples:
      - |2-
        containers.podman.podman_image:
            executable: "{{ test_executable | default('podman') }}"
            name: "{{ idem_image }}"
            path: /tmp/usr_img
            build:
              format: docker
    multiline: true
    window: 6
    recommendation: "Run `buildah` as an unprivileged user with `--isolation=rootless` (the default when not root). For CI, run the entire build job under a `UID/GID != 0` user via the runner's user-spec - don't `become: root` just to call buildah. If you need to cross-compile or access privileged syscalls, run the build inside a gVisor or Kata-containers sandbox rather than giving buildah real root."
    no_ansible_remediation: true
    cwe: ['CWE-250', 'CWE-269']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V14.2.2"]
    mitre_attack: ['T1611']
    cis_controls: ['CIS-K8s-5.2.5']
    nist_controls: ['AC-6', 'CM-7']
    pci_dss: ['2.2.1', '7.2.1']
    soc2: ['CC6.1']

  - id: "terraform_apply_auto_approve_from_ansible"
    category: "ansible_specific"
    severity: "HIGH"
    title: "Ansible Invokes terraform apply -auto-approve"
    description: "A task runs `terraform apply -auto-approve` (or the `community.general.terraform: state: present` module with `force_init: true` and no plan-then-apply sequence). This bypasses the human review step that Terraform's two-phase plan/apply was designed for - destructive changes (destroy/recreate of a database, security-group rewrite, IAM-role deletion) happen at playbook speed with no diff shown to an operator."
    regex: "(?:terraform\\s+apply\\s+[^\\n]*-auto-approve\\b|community\\.general\\.terraform\\s*:[\\s\\S]{0,300}?state\\s*:\\s*present[\\s\\S]{0,200}?force_init\\s*:\\s*(?:yes|true))"
    positive_examples:
      - "terraform apply -auto-approve"
    multiline: true
    window: 10
    recommendation: "Split into two tasks: `terraform plan -out=tfplan` (with register + assert on expected changes), then `terraform apply tfplan` only after a human-gated confirmation (pause + vars_prompt, or an AAP job-template survey). For unattended runs, use Terraform Cloud / Atlantis so apply requires a PR approval with codified guardrails (Sentinel / OPA)."
    cwe: ['CWE-284', 'CWE-710']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1098', 'T1098.003']
    cis_controls: ['CIS-3.3']
    nist_controls: ['CM-3', 'CM-5']
    pci_dss: ['6.3.2']
    soc2: ['CC8.1']
