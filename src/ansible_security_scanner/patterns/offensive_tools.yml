name: "Offensive Security Tools"
author: "Ansible Security Scanner Team"
description: "Detects installation or execution of known offensive security, red team, and exploitation tools"

patterns:
  - id: "mimikatz_usage"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Mimikatz Credential Dumping Tool"
    description: "Installs or invokes Mimikatz, a tool for dumping Windows credentials from memory"
    regex: "\\b(?:mimikatz|sekurlsa|kerberos::list|lsadump|privilege::debug)\\b"
    positive_examples:
      - "mimikatz"
    recommendation: "Mimikatz is an offensive tool for credential theft; remove immediately and investigate"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "responder_tool"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Responder LLMNR/NBT-NS Poisoning"
    description: "Installs or runs Responder for capturing network credentials via LLMNR/NBT-NS poisoning"
    regex: "\\bResponder\\.py\\b|\\bresponder\\b.*(?:-I\\s+eth|-i\\s+\\w+|--interface|--lm|--wpad)"
    positive_examples:
      - "Responder.py"
    recommendation: "Responder is a network credential theft tool; remove immediately"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "bloodhound_sharphound"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "BloodHound/SharpHound AD Enumeration"
    description: "Installs or runs BloodHound or SharpHound for Active Directory attack path mapping"
    regex: "\\b(?:BloodHound|SharpHound|bloodhound-python|aclpwn)\\b"
    positive_examples:
      - "BloodHound"
    recommendation: "AD enumeration tools should not appear in production playbooks"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "impacket_tools"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Impacket Attack Tools"
    description: "Installs or invokes Impacket tools for network protocol attacks and lateral movement"
    regex: "\\b(?:impacket|secretsdump|psexec\\.py|wmiexec\\.py|smbexec\\.py|atexec\\.py|dcomexec\\.py|GetNPUsers|GetUserSPNs|ntlmrelayx|smbclient\\.py)\\b"
    positive_examples:
      - "impacket"
    recommendation: "Impacket tools are offensive; remove and investigate as a potential breach"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "rubeus_kerberos"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Rubeus Kerberos Attack Tool"
    description: "Installs or runs Rubeus for Kerberos ticket manipulation and abuse"
    regex: "\\b(?:Rubeus|asktgt|asktgs|kerberoast|asreproast|s4u|changepw|createnetonly)\\b"
    positive_examples:
      - "Rubeus"
    recommendation: "Rubeus is a Kerberos attack tool; remove immediately"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "cobalt_strike_beacon"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Cobalt Strike / C2 Framework"
    description: "References to Cobalt Strike beacons, Meterpreter, or other Command and Control frameworks"
    regex: "\\b(?:cobaltstrike|beacon\\.exe|meterpreter|metasploit|msfvenom|msfconsole|empire|covenant|sliver|havoc|brute\\s*ratel)\\b"
    positive_examples:
      - "cobaltstrike"
    recommendation: "C2 frameworks indicate an active attack; escalate to incident response immediately"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "hashcat_john"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Password Cracking Tool"
    description: "Installs or runs password cracking tools like hashcat or John the Ripper"
    regex: "\\b(?:hashcat|john(?:theripper)?|hydra|medusa|ncrack|ophcrack|cewl|crunch)\\b(?!.*(?:doe|smith|user))"
    positive_examples:
      - "- john-the-ripper"
    recommendation: "Password cracking tools should never appear in production playbooks"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "exploit_framework"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Exploitation Framework"
    description: "Installs or references exploitation frameworks or known exploit tools"
    regex: "\\b(?:exploit-db|searchsploit|pwntools|ropper|ROPgadget|CVE-\\d{4}-\\d{4,}|0day|zeroday)\\b"
    positive_examples:
      - "exploit-db"
    recommendation: "Exploit tools and references should not appear in production infrastructure code"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "wireless_attack_tools"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Wireless/Network Attack Tools"
    description: >-
        Installs or runs
        aircrack-ng/airmon-ng/aireplay-ng/airodump-ng/wifite/bettercap/ettercap/mitmproxy/sslstrip.
        These are wireless or on-path attack tools, not legitimate ops tooling.
    regex: "\\b(?:aircrack-ng|airmon-ng|aireplay-ng|airodump-ng|wifite|bettercap|ettercap|mitmproxy|sslstrip)\\b"
    positive_examples:
      - "- aircrack-ng"
    recommendation: "Network attack tools should never appear in production playbooks"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "credential_dump_tool"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Credential Dumping Binary"
    description: >-
        References LaZagne, procdump, comsvcs.dll, lsass, the SAM database, or the
        SYSTEM hive. All five are credential-dumping primitives associated with
        active intrusion.
    regex: "\\b(?:LaZagne|lazagne|procdump|comsvcs\\.dll|lsass|SAM\\s+database|SYSTEM\\s+hive)\\b"
    positive_examples:
      - "LaZagne"
    recommendation: "Credential dumping tools indicate an active attack; escalate immediately"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "linpeas_winpeas"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Privilege Escalation Enumeration Script"
    description: "Downloads or executes privilege escalation enumeration scripts"
    regex: "\\b(?:linpeas|winpeas|LinEnum|linux-exploit-suggester|pspy|PEASS|unix-privesc-check)\\b"
    positive_examples:
      - "my $linenum=0;"
    recommendation: "Priv-esc enumeration scripts indicate reconnaissance; investigate immediately"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "crackmapexec_netexec"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "CrackMapExec / NetExec AD Attack Tool"
    description: "Installs or runs CrackMapExec (or its successor NetExec/nxc) for Active Directory enumeration, credential spraying, and lateral movement"
    regex: '\b(?:crackmapexec|nxc|netexec)\b.*(?:smb|ldap|winrm|ssh|mssql|rdp|--lsa|--sam|-u\s|-p\s|-H\s)|\b(?:crackmapexec|nxc|netexec)\s+'
    positive_examples:
      - "crackmapexec smb"
    recommendation: "CrackMapExec/NetExec are offensive AD tools; remove and investigate as a potential compromise"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "evil_winrm"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Evil-WinRM Penetration Testing Shell"
    description: "Installs or runs Evil-WinRM, a WinRM shell used for remote Windows exploitation"
    regex: '\bevil-winrm\b'
    positive_examples:
      - "evil-winrm"
    recommendation: "Evil-WinRM is an offensive remote shell tool; remove immediately and investigate"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "certipy_ad_cs"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Certipy AD Certificate Services Abuse"
    description: "Installs or runs Certipy for exploiting Active Directory Certificate Services misconfigurations"
    regex: '\bcertipy\b.*(?:find|auth|req|ca|cert|shadow|forge|ptt|-pfx\b|-u\s)|\bcertipy\s+'
    positive_examples:
      - "certipy find"
    recommendation: "Certipy is used to abuse AD CS; remove and audit AD certificate configurations"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "kerbrute_kerberos"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Kerbrute Kerberos Brute Force Tool"
    description: "Installs or runs Kerbrute for Kerberos username enumeration and password brute forcing"
    regex: '\bkerbrute\b.*(?:userenum|passwordspray|bruteuser|bruteforce|--dc\s|-d\s)|\bkerbrute\s+'
    positive_examples:
      - "kerbrute userenum"
    recommendation: "Kerbrute is a Kerberos brute forcing tool; remove and investigate unauthorized access attempts"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "pypykatz_credential_dump"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Pypykatz Python Mimikatz Implementation"
    description: "Installs or runs pypykatz, a Python implementation of Mimikatz for credential extraction"
    regex: '\bpypykatz\b.*(?:lsa|minidump|live|registry|nt|kerberos|dpapi)|\bpypykatz\s+'
    positive_examples:
      - "pypykatz lsa"
    recommendation: "Pypykatz is a credential dumping tool; remove immediately and rotate affected credentials"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "ntdsutil_ad_dump"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "NTDS.dit Database Extraction via ntdsutil"
    description: "Uses ntdsutil to create IFM snapshots of the Active Directory database for offline credential extraction"
    regex: '\bntdsutil\b.*(?:ifm|activate\s+instance|create\s+full|ntds|snapshot)|ntds\.dit\b'
    positive_examples:
      - "ntdsutil ifm"
    recommendation: "ntdsutil IFM creates full copies of the AD database; remove and investigate data exfiltration"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "powerview_powersploit"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "PowerView / PowerSploit AD Reconnaissance"
    description: "Imports or invokes PowerView or PowerSploit for Active Directory enumeration and exploitation"
    regex: '\b(?:PowerView|PowerSploit|Invoke-Kerberoast|Get-DomainUser|Get-DomainGroup|Get-DomainComputer|Find-LocalAdminAccess|Invoke-UserHunter|Get-NetSession|Invoke-ShareFinder|Invoke-Mimikatz|Import-Module\s+PowerView)\b'
    positive_examples:
      - "PowerView"
    recommendation: "PowerView/PowerSploit are offensive AD tools; remove and investigate for domain compromise"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "seatbelt_sharpup"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Seatbelt / SharpUp Situational Awareness"
    description: "Executes Seatbelt or SharpUp for host enumeration and privilege escalation checks on Windows"
    regex: '\b(?:Seatbelt(?:\.exe)?|SharpUp(?:\.exe)?)\b.*(?:-group=|audit|all|checks)|\b(?:Seatbelt|SharpUp)(?:\.exe)?\s+'
    positive_examples:
      - "Seatbelt-group="
    recommendation: "Seatbelt/SharpUp are offensive enumeration tools; remove and investigate host compromise"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "enum4linux_smb_enum"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Enum4linux SMB/NetBIOS Enumeration"
    description: "Runs enum4linux or enum4linux-ng for enumerating SMB shares, users, and policies from Windows/Samba hosts"
    regex: '\benum4linux(?:-ng)?\b'
    positive_examples:
      - "enum4linux"
    recommendation: "enum4linux is a network reconnaissance tool; remove and restrict SMB exposure"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "smbclient_smbmap"
    category: "offensive_tools"
    severity: "HIGH"
    title: "SMB Share Enumeration and Access Tools"
    description: "Uses smbclient or smbmap to enumerate or access SMB shares on remote hosts"
    regex: '\bsmbclient\b\s+//|\bsmbmap\b\s+.*-H\s'
    positive_examples:
      - "smbclient //"
    recommendation: "SMB share tools can be used for lateral movement; verify legitimate need and restrict access"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "ldapsearch_enumeration"
    category: "offensive_tools"
    severity: "HIGH"
    title: "LDAP Directory Enumeration"
    description: "Uses ldapsearch to query Active Directory or LDAP directories for users, groups, and configuration"
    regex: '\bldapsearch\b\s+.*(?:-x\s|-H\s+ldap|-b\s|objectClass|userAccountControl|servicePrincipalName)'
    positive_examples:
      - "ATTRIBUTE=$(ldapsearch -Z -LLL -x -y /etc/ssh/ldap_authorized_keys_bindpw -D \"${ldap_binddn}\" -o ldif-wrap=no -S sshPublicKey \"${ldap_filter}\" sshPublicKey | grep -v 'dn:')"
    recommendation: "ldapsearch can expose directory information; verify legitimate need and use least-privilege binds"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "rpcclient_enumeration"
    category: "offensive_tools"
    severity: "HIGH"
    title: "RPC Client Enumeration"
    description: "Uses rpcclient for RPC-based enumeration of users, groups, and shares on Windows/Samba hosts"
    regex: '\brpcclient\b\s+.*(?:-U\s|-N\s|enumdomusers|enumdomgroups|queryuser|lookupnames)'
    positive_examples:
      - "rpcclient -U "
    recommendation: "rpcclient can enumerate domain objects; verify legitimate use and restrict null sessions"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "nikto_web_scanner"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Nikto Web Vulnerability Scanner"
    description: "Runs Nikto to scan web servers for known vulnerabilities and misconfigurations"
    regex: '\bnikto\b\s+.*-h\s'
    positive_examples:
      - "nikto -h "
    recommendation: "Nikto is a web vulnerability scanner; remove from production playbooks"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "nuclei_scanner"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Nuclei Template-Based Vulnerability Scanner"
    description: "Runs Nuclei for automated vulnerability scanning using community and custom templates"
    regex: '\bnuclei\b\s+.*(?:-u\s|-l\s|-t\s|--target|--templates)'
    positive_examples:
      - "nuclei -u "
    recommendation: "Nuclei is a vulnerability scanner; remove from production infrastructure automation"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "ffuf_web_fuzzer"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "FFUF Web Fuzzer"
    description: >-
        ffuf is invoked with -u/-w/FUZZ markers, the canonical web content-discovery
        and parameter-fuzzing shape used in offensive engagements.
    regex: '\bffuf\b\s+.*(?:-u\s|-w\s|FUZZ)'
    positive_examples:
      - "ffuf -u "
    recommendation: "ffuf is an offensive web fuzzing tool; remove from production playbooks"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "feroxbuster_dirbuster"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Feroxbuster Recursive Directory Brute Forcer"
    description: "Runs feroxbuster for recursive web directory and content discovery"
    regex: '\bferoxbuster\b\s+.*(?:-u\s|--url)'
    positive_examples:
      - "feroxbuster -u "
    recommendation: "feroxbuster is an offensive directory brute forcing tool; remove from production playbooks"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "gobuster_brute"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Gobuster Directory and DNS Brute Forcer"
    description: >-
        gobuster is invoked with the dir/dns/vhost/fuzz subcommand. Each enumerates
        a different namespace and is a textbook reconnaissance tool.
    regex: '\bgobuster\b\s+(?:dir|dns|vhost|fuzz)\s'
    positive_examples:
      - "gobuster dir "
    recommendation: "gobuster is an offensive brute forcing tool; remove from production playbooks"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "rustscan_port_scanner"
    category: "offensive_tools"
    severity: "HIGH"
    title: "RustScan Fast Port Scanner"
    description: "Runs RustScan for high-speed port scanning of network targets"
    regex: '\brustscan\b\s+.*(?:-a\s|--addresses)'
    positive_examples:
      - "rustscan -a "
    recommendation: "RustScan is an offensive port scanner; remove from production playbooks"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "snmp_enumeration"
    category: "offensive_tools"
    severity: "HIGH"
    title: "SNMP Enumeration Tools"
    description: "Runs snmpwalk or onesixtyone for SNMP service enumeration and community string brute forcing"
    regex: '\b(?:snmpwalk|onesixtyone)\b\s+.*(?:-v\s*[12c]|-c\s)'
    positive_examples:
      - "snmpwalk -v1"
    recommendation: "SNMP enumeration can expose device configurations; verify legitimate need and use SNMPv3"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "ssl_scanning_tools"
    category: "offensive_tools"
    severity: "HIGH"
    title: "SSL/TLS Scanning Tools"
    description: "Runs testssl.sh or sslscan to probe SSL/TLS configurations for weaknesses"
    regex: '\b(?:testssl(?:\.sh)?|sslscan)\b\s+'
    positive_examples:
      - "testssl "
    recommendation: "SSL scanning tools can identify exploitable weaknesses; verify authorized security testing"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "nbtscan_netbios"
    category: "offensive_tools"
    severity: "HIGH"
    title: "NBTScan NetBIOS Scanner"
    description: "Runs nbtscan to enumerate NetBIOS names and MAC addresses across a network"
    regex: '\bnbtscan\b\s+'
    positive_examples:
      - "nbtscan "
    recommendation: "nbtscan is a network reconnaissance tool; remove from production playbooks"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "reg_save_credential_dump"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Registry SAM/SYSTEM Hive Credential Dump"
    description: "Uses 'reg save' to dump SAM, SYSTEM, or SECURITY registry hives for offline credential extraction"
    regex: '\breg\s+save\b\s+.*(?:HKLM\\SAM|HKLM\\SYSTEM|HKLM\\SECURITY)'
    positive_examples:
      - 'reg save HKLM\SAM'
    recommendation: "Dumping registry hives enables offline credential cracking; remove and investigate immediately"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "firefox_decrypt_tool"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Firefox Decrypt Browser Credential Theft"
    description: "Runs firefox_decrypt to extract saved passwords from Firefox browser profiles"
    regex: '\bfirefox_decrypt(?:\.py)?\b'
    positive_examples:
      - "firefox_decrypt"
    recommendation: "firefox_decrypt steals saved browser credentials; remove and investigate data theft"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "sharpdpapi_donpapi"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "SharpDPAPI / DonPAPI DPAPI Credential Extraction"
    description: "Runs SharpDPAPI or DonPAPI to extract secrets protected by Windows DPAPI (credentials, certificates, browser data)"
    regex: '\b(?:SharpDPAPI(?:\.exe)?|DonPAPI(?:\.py)?)\b.*(?:triage|certificates|credentials|backupkey|masterkey|machine|@)|\b(?:SharpDPAPI|DonPAPI)\s+'
    positive_examples:
      - "SharpDPAPI  triage"
    recommendation: "DPAPI extraction tools steal protected credentials; remove immediately and rotate all secrets"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  # -- Steganography ----------------------------------------------------------

  - id: "steganography_tool"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Steganography Tool Usage"
    description: "Runs steganography tools to hide or extract data inside images/audio/files"
    regex: "\\b(?:steghide|stegsnow|zsteg|stegsolve|openstego|outguess)\\s+"
    positive_examples:
      - "steghide "
    recommendation: "Steganography is used for covert data exfiltration; investigate immediately"
    no_ansible_remediation: true
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

  - id: "steganography_extract"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Steganography Data Extraction"
    description: "Extracts hidden data from image or audio files using steganography tools"
    regex: "(?:steghide\\s+extract|stegsnow\\s+-C|zsteg\\s+|openstego\\s+extract)"
    positive_examples:
      - "steghide extract"
    recommendation: "Hidden data extraction from images is a covert data exfil technique"
    nist_controls: ['CA-7', 'IR-4', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.3']

