  # -- Windows / Active Directory Offensive Tooling ---------------------------

  - id: "adcs_certify_abuse"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Certify / ADCS ESC Exploitation Tool"
    description: "Installs or runs Certify.exe (or the Certipy Python port) with ESC1-8 flags - tools that abuse Active Directory Certificate Services template misconfigurations to issue certificates impersonating high-value accounts and pivot to Domain Admin."
    regex: '\b(?:Certify(?:\.exe)?|certipy(?:-ad)?)\b.*(?:find|request|auth|relay|shadow-credentials|template|vulnerable|-ca\s|/ca:|/template:|ESC[1-9])'
    positive_examples:
      - "Certify  find"
    recommendation: "Certify/Certipy are offensive ADCS tools. Remove immediately, rotate issued certificates, and audit AD CS template permissions for ESC1-8 misconfigurations (see SpecterOps Certified Pre-Owned)."
    cwe: ['CWE-269', 'CWE-295']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: ["V9.2.1"]
    mitre_attack: ['T1556', 'T1649']
    cis_controls: ['CIS-6.8', 'CIS-12.5']
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)', 'SC-8(1)', 'SC-12']
    pci_dss: ['4.2.1', '4.2.1.1', '7.2.1', '7.2.5']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['CC6.2', 'CC6.3', 'CC6.7']

  - id: "dcsync_keyword"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "DCSync / DCShadow Invocation"
    description: "Invokes Mimikatz lsadump::dcsync, Invoke-DCSync, or lsadump::dcshadow - techniques that abuse directory replication privileges to pull password hashes for every account in the domain, including krbtgt (golden ticket), or stealthily inject replicated objects."
    regex: '\b(?:lsadump::dcsync|Invoke-DCSync|lsadump::dcshadow|Invoke-DCShadow)\b|/dcsync\b|/dcshadow\b'
    positive_examples:
      - "lsadump::dcsync"
    recommendation: "DCSync/DCShadow implies DRS replication privilege abuse. Rotate krbtgt twice, audit DS-Replication-Get-Changes grants (should only be DCs + MSOL sync), and investigate for Tier-0 compromise."
    cwe: ['CWE-269', 'CWE-284']
    owasp_appsec: ["A01:2021", "A04:2021"]
    mitre_attack: ['T1003.006', 'T1207']
    cis_controls: ['CIS-6.8', 'CIS-16.11']
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'AC-6(10)']
    pci_dss: ['7.2.1', '7.2.2', '7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "dpapi_extraction"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "DPAPI Credential Extraction Tooling"
    description: "Installs or runs SharpDPAPI, SharpChrome, Mimikatz dpapi::* commands, or impacket dpapi.py - tools that decrypt Windows DPAPI-protected secrets (browser cookies/passwords, vault credentials, RDP credentials, WiFi keys) using extracted masterkeys."
    regex: '\b(?:SharpDPAPI(?:\.exe)?|SharpChrome(?:\.exe)?|dpapi\.py)\b|\bdpapi::(?:cred|masterkey|vault|rdg|ssh|chrome|capi|blob|cache)\b'
    positive_examples:
      - "SharpDPAPI"
    recommendation: "DPAPI extraction implies masterkey theft. Rotate user passwords (forces masterkey re-encryption), rotate browser-stored credentials, and investigate the host for lsass dumping or backup-key theft."
    cwe: ['CWE-312', 'CWE-522']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.1.2", "V6.2.1", "V8.3.1"]
    mitre_attack: ['T1552.001', 'T1555.003', 'T1555.004']
    cis_controls: ['CIS-3.11', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '7.2.5', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1', 'CC6.2', 'CC6.3']

  - id: "safetykatz_usage"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "SafetyKatz Signed-Binary Mimikatz Variant"
    description: "Installs or runs SafetyKatz - a Mimikatz derivative that combines a minidump of lsass with a modified (and often signed) Mimikatz binary to bypass antivirus and extract credentials from memory."
    regex: '\bSafetyKatz(?:\.exe)?\b|\bSafetyKatz\s+(?:dump|sekurlsa)'
    positive_examples:
      - "SafetyKatz dump"
    recommendation: "SafetyKatz is a credential-theft tool; remove immediately, rotate local and domain credentials that logged on to the host, and investigate for lsass access (enable Credential Guard where possible)."
    cwe: ['CWE-250', 'CWE-522']
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V14.2.2"]
    mitre_attack: ['T1003.001', 'T1555']
    cis_controls: ['CIS-3.11', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'AC-6', 'AC-6(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '7.2.1', '7.2.5', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1', 'CC6.2', 'CC6.3']

  - id: "wmi_permanent_event_subscription_persistence"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "WMI Permanent Event Subscription Persistence (ActiveScriptEventConsumer / CommandLineEventConsumer)"
    description: "A task creates a WMI permanent event subscription by binding an `__EventFilter` to an `ActiveScriptEventConsumer` or `CommandLineEventConsumer` via `__FilterToConsumerBinding`. Permanent WMI subscriptions survive reboots, run as SYSTEM, and are not visible in Task Scheduler / Run keys - they are the canonical fileless-persistence primitive catalogued as MITRE T1546.003 and heavily used by APT29, Turla, and modern commodity loaders (Trickbot, Qakbot). There is no legitimate Ansible configuration-management reason to create one."
    regex: "(?:Set-WmiInstance|New-CimInstance|wmic(?:\\.exe)?\\s+/NAMESPACE)[\\s\\S]{0,400}?(?:__EventFilter|ActiveScriptEventConsumer|CommandLineEventConsumer|__FilterToConsumerBinding)"
    positive_examples:
      - "Set-WmiInstance__EventFilter"
    multiline: true
    window: 25
    recommendation: "Remove the task. WMI persistence is never an appropriate CM primitive - use a signed Windows service or scheduled task enrolled through GPO / Intune. Enumerate and clean existing bindings with `Get-WmiObject -Namespace root\\subscription -Class __FilterToConsumerBinding | Remove-WmiObject`. Monitor with Sysmon Event IDs 19/20/21 (WmiEvent) and alert on any subscription whose consumer is ActiveScript or CommandLine."
    no_ansible_remediation: true
    cwe: ['CWE-506', 'CWE-653']
    owasp_appsec: ["A04:2021"]
    mitre_attack: ['T1047', 'T1546.003']
    cis_controls: ['CIS-8.11', 'CIS-10.5']
    nist_controls: ['AU-12', 'CM-7', 'SI-4', 'SI-7']
    pci_dss: ['6.3.3', '10.4.1']
    soc2: ['CC7.2', 'CC7.3']

  - id: "golden_saml_forged_token_material"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "Golden SAML Forgery - ADFS Token-Signing Private Key Exported Or Referenced"
    description: "A task references the ADFS token-signing certificate private key (`AdfsSigningCertificate` with `-Exportable`, `Export-PfxCertificate` of the ADFS signing cert, or a reference to `ADFS\\Token-Signing` with exportable=true). Once the token-signing private key leaves the ADFS server, an attacker can mint SAML assertions for any user in any federated relying party (Azure AD, AWS, Salesforce, Okta) indefinitely - this is the Golden SAML attack (Solorigate / SUNBURST). Even rotating the user's password does not invalidate the forged tokens until the signing cert is rolled."
    regex: "(?:Export-PfxCertificate[\\s\\S]{0,300}?(?:ADFS|Token-?Signing)|Set-AdfsProperties[\\s\\S]{0,200}?-CertificateSharingContainer|Get-AdfsCertificate[\\s\\S]{0,200}?-CertificateType\\s+Token-Signing[\\s\\S]{0,200}?Export|New-SelfSignedCertificate[\\s\\S]{0,200}?ADFS[\\s\\S]{0,200}?-KeyExportPolicy\\s+Exportable)"
    positive_examples:
      - "Export-PfxCertificateADFS"
    multiline: true
    window: 30
    recommendation: "Never export the ADFS token-signing private key via automation. Store it in an HSM-backed key provider (`Microsoft Platform Crypto Provider` / `Microsoft Software Key Storage Provider` with non-exportable keys) and rotate it with `Update-AdfsCertificate -CertificateType Token-Signing -Urgent` immediately if exfiltration is suspected. Monitor ADFS admin log Event IDs 307/310 for certificate operations and correlate with AD 4662 on the ADFS service account. After any Golden SAML suspicion, rotate both primary and secondary token-signing certificates twice (revoke forged tokens in caches)."
    no_ansible_remediation: true
    cwe: ['CWE-321', 'CWE-347', 'CWE-798']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1552.004', 'T1606.002']
    cis_controls: ['CIS-3.11', 'CIS-6.8']
    nist_controls: ['AC-6', 'AU-12', 'IA-5(2)', 'SC-12', 'SC-13']
    pci_dss: ['3.6.1', '3.6.4', '8.6.2']
    hipaa: ['164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "adcs_esc1_vulnerable_template_request"
    category: "offensive_tools"
    severity: "CRITICAL"
    title: "ADCS ESC1 - Certificate Template Enabled With enrollee-supplies-subject And Any-Purpose EKU"
    description: "A task publishes or enables an Active Directory Certificate Services template where `msPKI-Certificate-Name-Flag` has `CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT` (0x1) AND the template EKU is `Any Purpose`, `Client Authentication`, or `Smartcard Logon`, AND low-privilege principals (Domain Users / Authenticated Users) have Enroll rights. This is ESC1 from SpecterOps Certified Pre-Owned - any domain user can request a cert with `subjectAltName=<Domain Admin>` and authenticate as that user forever (until the template is fixed, not the user's password)."
    regex: "(?:certutil(?:\\.exe)?\\s+-setreg[\\s\\S]{0,200}EditFlags|Set-CATemplate|Add-CATemplate|New-ADObject[\\s\\S]{0,300}?objectClass\\s*=\\s*['\"]?pKICertificateTemplate)[\\s\\S]{0,400}?(?:CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT|mspki-certificate-name-flag\\s*[:=]\\s*['\"]?(?:0x1|1)\\b)"
    positive_examples:
      - "certutil -setregEditFlagsCT_FLAG_ENROLLEE_SUPPLIES_SUBJECT"
    multiline: true
    window: 40
    recommendation: "Disable enrollee-supplies-subject on any template that issues authentication EKUs. Audit existing templates with `Get-ADObject -SearchBase (Get-ADRootDSE).ConfigurationNamingContext -Filter {objectClass -eq 'pKICertificateTemplate'} -Properties msPKI-Certificate-Name-Flag,pKIExtendedKeyUsage` and remove the flag, or restrict Enroll/AutoEnroll rights to a specific security group (not Domain Users). Run Certify.exe or Locksmith.ps1 to enumerate ESC1-ESC8 in the environment."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-295']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: ["V9.2.1"]
    mitre_attack: ['T1558.004', 'T1649']
    cis_controls: ['CIS-5.2', 'CIS-6.8']
    nist_controls: ['AC-6', 'AU-12', 'IA-5(2)', 'SC-12']
    pci_dss: ['3.6.1', '7.2.1', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.3']
