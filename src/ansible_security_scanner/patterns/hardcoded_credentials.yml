  - id: "ci_secret_exfil_via_printenv"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "CI Environment Exfiltration (printenv / env -> curl / nc / paste)"
    description: "A playbook or CI script dumps the process environment to a file or network destination: `printenv | curl`, `env | base64 | curl`, `env > /tmp/leak && curl --upload-file`, `jq -n env | nc`, or `echo \"$GITHUB_TOKEN\" >> $GITHUB_STEP_SUMMARY`. This is the canonical technique for sweeping every CI secret after compromising any build step - it exfiltrates GITHUB_TOKEN, AWS_*, PYPI_API_TOKEN, and everything else injected via the runner."
