      - "vault_token:hvs.AAAAAAAAAAAAAAAAAAAA"
    recommendation: "Never embed a Vault root token in a playbook - issue a time-bounded AppRole or short-lived JWT/OIDC token via the ansible-inventory integration and let Ansible exchange it for a per-play token with minimal policy. Unseal keys MUST be split (Shamir 3-of-5 minimum) and each share held by a different human in a different KMS/HSM - never all in one file. For new deployments, use Auto-Unseal with cloud KMS (AWS/GCP/Azure) so there is no human-held Shamir key at all. Rotate any token/key that ever appeared in a committed file (assume compromised)."
    cwe: ['CWE-522', 'CWE-532', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021", "A09:2021"]
    owasp_asvs: ["V2.10.1", "V2.10.2", "V2.10.4", "V6.2.1", "V7.1.1", "V14.1.5"]
    mitre_attack: ['T1552.001', 'T1552.004']
    cis_controls: ['CIS-3.11', 'CIS-6.5', 'CIS-16.9']
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-12', 'SC-28']
