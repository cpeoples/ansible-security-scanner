  - id: "gpp_groups_xml_cpassword_literal"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Group Policy Preferences (Groups.xml) cpassword Literal - Trivially Decryptable"
    description: "A task renders a Windows Group Policy Preferences XML file (`Groups.xml`, `Services.xml`, `ScheduledTasks.xml`, `DataSources.xml`, or `Printers.xml` under SYSVOL) containing a `cpassword=` attribute. Microsoft's GPP feature stored local-admin / service-account passwords as AES-CBC-encrypted blobs using a public, published 32-byte key that Microsoft literally documented on MSDN - making any `cpassword` value trivially decryptable in <1 second with `gpp-decrypt` or a 10-line PowerShell snippet. Microsoft's 2014 MS14-025 patch blocked NEW GPP creation but did NOT remove or re-encrypt existing entries - meaning SYSVOL on most pre-2014-provisioned domains STILL contains valid cpassword blobs decades later. An attacker with Authenticated-User read to SYSVOL (every domain user, by default) harvests every cpassword across the forest in one `Get-GPPPassword` call. This is the #1 'initial-access -> domain-admin' technique in every AD pentest report since 2012 and still hits in 2024-2025 Mandiant M-Trends."
    regex: "\\bcpassword\\s*=\\s*['\"][A-Za-z0-9+/=]{6,}['\"]|<(?:Groups|Services|ScheduledTasks|DataSources|Printers|NTServices)[^>]*cpassword\\s*=|SYSVOL[\\\\/][^\\\\/]+[\\\\/](?:Policies|scripts)[\\s\\S]{0,400}?cpassword\\s*="
    positive_examples:
      - "cpassword='AAAAAA'"
    multiline: true
    window: 8
    recommendation: "NEVER use Group Policy Preferences to store passwords. Remove every existing Groups.xml/Services.xml/ScheduledTasks.xml/DataSources.xml/Printers.xml with a `cpassword=` attribute from SYSVOL IMMEDIATELY (search with `Get-ChildItem \\\\<domain>\\sysvol -Recurse -Include *.xml | Select-String cpassword`), and rotate every password that ever appeared in those files (all of them are compromised). For local-admin password management, use **LAPS** (Local Administrator Password Solution - free from Microsoft, now built into Windows 11/Server 2022 as 'Windows LAPS') with `ms-Mcs-AdmPwd` / `msLAPS-Password` attribute ACLed to the specific helpdesk group only. For service accounts, use **gMSA** (Group Managed Service Accounts) so Windows auto-rotates the 240-character random password every 30 days - nothing to store. Audit: `gpp-decrypt <blob>` against every found cpassword to confirm the exposed cleartext, then rotate. Alert on any NEW file under SYSVOL containing `cpassword=` via a scheduled task + SIEM rule."
    cwe: ['CWE-257', 'CWE-321', 'CWE-798']
    owasp_appsec: ["A02:2021", "A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.1", "V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ['T1003.003', 'T1078.002', 'T1552.006']
    cis_controls: ['CIS-3.11', 'CIS-5.2', 'CIS-6.8']
    nist_controls: ['IA-5', 'IA-5(1)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.1', '8.6.3']
    hipaa: ['164.308(a)(5)(ii)(D)', '164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "rails_secret_key_base_or_master_key_literal"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Rails secret_key_base / master.key / credentials.yml.enc Key Inline Literal"
    description: "A task renders a Rails application config (`config/secrets.yml`, `config/credentials.yml.enc`, `config/master.key`, `.env`, systemd `Environment=SECRET_KEY_BASE=`) with a literal 64-to-128-character hex/base64 value for `secret_key_base`, `RAILS_MASTER_KEY`, `secret_token`, or `encrypted_secret`. Rails' `secret_key_base` signs session cookies and `ActiveSupport::MessageEncryptor` data. With the key, an attacker (1) forges ANY user's session cookie (account takeover on every user), (2) crafts a poisoned Marshal-dumped cookie - historically RCE via `CVE-2019-5420` / `CVE-2020-8165`-style deserialization gadgets, (3) decrypts `credentials.yml.enc` which commonly holds DB passwords + S3 keys + SMTP creds + Stripe keys + Google OAuth secrets. One leaked `master.key` = pwned application + pwned downstream services. 2023 GitHub Dependabot data showed `master.key` as the #3 most-committed-by-accident secret."
    regex: "(?:secret_key_base|SECRET_KEY_BASE|secret_token|RAILS_MASTER_KEY|rails_master_key)\\s*[:=]\\s*['\"]?[a-fA-F0-9]{64,128}['\"]?(?!\\s*\\{\\{)|(?:^|\\n)\\s*master\\.key\\s*[:=]\\s*['\"]?[a-fA-F0-9]{32}['\"]?|ENV\\s*\\[\\s*['\"]SECRET_KEY_BASE['\"]\\s*\\]\\s*=\\s*['\"][a-fA-F0-9]{64,}['\"]"
    positive_examples:
      - "secret_key_base:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    multiline: true
    window: 5
    recommendation: "Never embed `secret_key_base` or `master.key` in playbooks, git, container images, or config files. Inject at runtime from secret management: Ansible Vault (`secret_key_base: \"{{ vault_rails_secret }}\"`), HashiCorp Vault (`lookup('community.hashi_vault.vault_kv2_get', 'secret/data/rails/prod')`), AWS Secrets Manager (`lookup('amazon.aws.secretsmanager_secret', 'prod/rails/secret_key_base')`), or k8s external-secrets operator. For Rails 5.2+ `credentials.yml.enc`, keep `master.key` ONLY in a local (git-ignored) file or in `RAILS_MASTER_KEY` env - never in a committed playbook. Rotate immediately on any exposure: `rails secret` to generate a new key, re-encrypt credentials, deploy atomically (all replicas simultaneously or users get logged out). Audit git history: `git log -p --all | grep -E '(secret_key_base|master\\.key|RAILS_MASTER_KEY)\\s*[:=]\\s*[a-f0-9]{32,}'`. Add pre-commit hook (truffleHog / gitleaks) with custom Rails rule."
    cwe: ['CWE-321', 'CWE-522', 'CWE-798']
    cve: ["CVE-2019-5420", "CVE-2020-8165"]
    owasp_appsec: ["A02:2021", "A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.1", "V2.10.2", "V2.10.4", "V6.2.1", "V14.1.5"]
    mitre_attack: ['T1078.001', 'T1539', 'T1552.001']
    cis_controls: ['CIS-3.11', 'CIS-16.9']
    nist_controls: ['IA-5', 'IA-5(1)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.1']
    hipaa: ['164.312(a)(2)(iv)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "okta_api_token_literal"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Okta API token (SSWS) hardcoded in playbook"
    description: "An Okta API token is hardcoded as `Authorization: SSWS 00<40+chars>` or as a `okta_api_token` / `OKTA_API_TOKEN` variable literal. Okta API tokens carry the permissions of the creating admin (by default, super-admin) and grant unrestricted access to every user, app, group, and factor in the org - the canonical blast-radius one-token leak. Incidents in 2023-2024 (Okta HAR-file leak, Lapsus$ campaigns) were amplified by tokens stored in tooling repos."
    regex: "(?:Authorization\\s*:\\s*['\"]?SSWS\\s+00[A-Za-z0-9_-]{40,}['\"]?|(?:OKTA_API_TOKEN|okta_api_token|oktaApiToken)\\s*[:=]\\s*['\"]?00[A-Za-z0-9_-]{40,}['\"]?)"
    positive_examples:
      - "Authorization:SSWS 00AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    recommendation: "Replace every Okta API token literal with a Vault lookup: `password: \"{{ lookup('community.hashi_vault.vault_kv2_get', 'secret/okta/api')['data']['token'] }}\"`. Use **Okta OAuth for Okta** (service-app OAuth 2.0 client credentials with private-key JWT + scoped claims) instead of SSWS tokens wherever possible - SSWS is deprecated for new integrations. Rotate any token that ever lived in a repo (assume compromised; Okta System Log shows every token use). Scope tokens with `Admin Role` narrowly (Read-Only Admin for monitoring, App Admin for app management) - never use Super Admin for automation. Enable Okta's token-rotation API and rotate on a 90-day max cadence."
    cwe: ['CWE-312', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V6.1.2", "V8.3.1", "V14.1.5"]
    mitre_attack: ['T1078.004', 'T1552.001']
    cis_controls: ['CIS-3.11', 'CIS-16.11']
    nist_controls: ['IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1', 'CC6.2']

  - id: "cloudflare_api_token_literal"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "Cloudflare scoped API token hardcoded in playbook"
    description: "A Cloudflare API token (`Authorization: Bearer` + 40-char base64url) or legacy Global API Key is hardcoded. Cloudflare tokens control DNS, WAF, SSL/TLS, Workers, R2, tunnels - a leaked token with Zone:Edit can pivot to full subdomain takeover and MITM via Workers. The legacy Global API Key grants full-account access and is even more dangerous."
    regex: "(?:CLOUDFLARE_API_TOKEN|CF_API_TOKEN|cloudflare_api_token)\\s*[:=]\\s*['\"]?[A-Za-z0-9_-]{40}['\"]?|X-Auth-Key\\s*:\\s*['\"]?[a-f0-9]{37}['\"]?|Authorization\\s*:\\s*['\"]?Bearer\\s+[A-Za-z0-9_-]{40}['\"]?[\\s\\S]{0,300}?api\\.cloudflare\\.com"
    positive_examples:
      - "CLOUDFLARE_API_TOKEN:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    multiline: true
    window: 6
    recommendation: "Replace with a Vault / AWS Secrets Manager lookup. Use **scoped** Cloudflare API tokens (not the Global API Key) with the minimum zone-level permissions required (`Zone:Read` rather than `All Zones:Edit` for a read-only monitor). Set a token expiration (`Until`) and rotate quarterly. For Ansible use-cases, create a per-playbook service token scoped to the single zone / workspace it manages. Audit token usage in Cloudflare Audit Logs and alert on new IP-source ranges. Rotate immediately any token committed to a repo - GitHub's secret-scanner will already notify Cloudflare which may auto-revoke."
    cwe: ['CWE-312', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V6.1.2", "V8.3.1", "V14.1.5"]
    mitre_attack: ['T1552.001', 'T1584.002']
    cis_controls: ['CIS-3.11']
    nist_controls: ['IA-5', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    soc2: ['CC6.1', 'CC6.2']

  - id: "splunk_hec_token_literal"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "Splunk HEC (HTTP Event Collector) token hardcoded in playbook"
    description: "A Splunk HEC token is hardcoded as `Authorization: Splunk <uuid>` or as `HEC_TOKEN`/`splunk_hec_token` literal. HEC tokens allow unauthenticated event submission on the configured index - a leaked token lets an attacker (1) pollute SIEM data with forged events to hide real intrusions, (2) consume license entitlement (DoS via ingest-quota exhaustion), (3) potentially trigger correlation-search actions that take operational effect. Observability-vendor tokens are under-scanned compared to cloud-provider keys."
    regex: "Authorization\\s*:\\s*['\"]?Splunk\\s+[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}['\"]?|(?:SPLUNK_HEC_TOKEN|HEC_TOKEN|splunk_hec_token)\\s*[:=]\\s*['\"]?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}['\"]?"
    positive_examples:
      - "Authorization:Splunk 00000000-0000-0000-0000-000000000000"
    recommendation: "Store HEC tokens in Vault; reference via `lookup` at playbook runtime. Create per-source HEC tokens with a narrow `Allowed Indexes` list (never `main` / `*`) and a narrow `Default Source Type`. Enable HEC `enableSSL: true` and `requireClientCert: true` for mutual TLS on event submission. Monitor ingest volume per-token for anomalous spikes. Rotate HEC tokens quarterly AND immediately on any repo exposure. For high-sensitivity indexes (authentication, audit), use Splunk Forwarder with client-cert auth instead of HEC."
    cwe: ['CWE-312', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V6.1.2", "V8.3.1", "V14.1.5"]
    mitre_attack: ['T1552.001', 'T1562.008']
    cis_controls: ['CIS-3.11', 'CIS-8.2']
    nist_controls: ['AU-9', 'IA-5', 'SC-28']
    pci_dss: ['8.6.2', '10.3.1']
    soc2: ['CC6.1', 'CC7.2']
