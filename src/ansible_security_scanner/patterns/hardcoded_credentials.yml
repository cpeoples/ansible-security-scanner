    title: "HashiCorp Vault Audit Device Disabled From Playbook (sys/audit Delete)"
    description: "A task runs `vault audit disable <path>` or hits `/v1/sys/audit/<path>` with an HTTP `DELETE`. Disabling the only audit device on a running Vault cluster immediately turns the secrets-broker into a black-box - every subsequent read (`vault kv get`, token issuance, policy change) proceeds with zero forensic trail. This is the canonical post-compromise Vault move and is MITRE T1562.008 applied to secrets management; it is never an appropriate configuration-management primitive."
