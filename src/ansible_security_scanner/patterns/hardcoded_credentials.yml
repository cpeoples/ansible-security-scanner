  - id: "nomad_gossip_encrypt_empty_or_plaintext"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "HashiCorp Nomad Server gossip encrypt Key Empty Or Plaintext In Config"
    description: "A Nomad server config (`nomad.hcl`, `server { encrypt = \"...\" }`, or `community.general.nomad_job` bootstrap) has an empty `encrypt` value, the literal string `\"\"`, a value under 24 chars (not a valid base64 AES-256 key), or a hardcoded literal in the repo. Nomad gossip (Serf) is the inter-server membership protocol on `4648/tcp,udp`. Without encryption, an attacker on the same L2 segment can join the Serf cluster, pretend to be a Nomad server, and poison job scheduling. 2024 HashiCorp hardening-guide mandates `encrypt` MUST be set AND supplied via a secrets manager."
    regex: "(?:nomad[\\s\\S]{0,200}?)?(?:^\\s*encrypt\\s*[=:]\\s*['\"]{2}|^\\s*encrypt\\s*[=:]\\s*['\"][^'\"]{0,15}['\"]|gossip_key\\s*[:=]\\s*['\"][A-Za-z0-9+/=]{0,20}['\"])"
