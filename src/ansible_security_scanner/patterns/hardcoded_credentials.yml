  # -- Ansible Vault Hygiene --------------------------------------------
  # Rules originally in patterns/vault_hygiene.yml; consolidated here
  # because vault issues ARE hardcoded-credential issues (secrets at rest,
  # committed to repo, or handled insecurely). Rule IDs preserved;
  # remediation routed to VaultHygieneRemediationGenerator via
  # _RULE_ID_TO_CATEGORY.
  - id: "vault_password_file_in_repo"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Vault Password File Committed To Repo"
    description: "ansible.cfg (or CLI flag) references a vault_password_file that looks like it's inside the repo tree (./vault_pass, ./.vault_pass) rather than a path outside version control."
    regex: "vault_password_file\\s*=\\s*['\"]?\\.{0,2}/(?:[a-zA-Z0-9_.-]+/)*(?:\\.?vault[_-]?pass[a-z_.-]*|ansible[_-]?vault[_-]?pw[a-z_.-]*|password[a-z_.-]*)['\"]?\\s*$"
    positive_examples:
      - "vault_password_file=/vaultpass"
    recommendation: "Store the vault password OUTSIDE the repo (e.g. ~/.config/ansible/vault_pass, or your secret store). If you need a per-dev script, commit the script - not the password it returns."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    mitre_attack: ["T1552.001"]
    cwe: ["CWE-312", "CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.1.2", "V6.2.1", "V8.3.1"]

  - id: "vault_password_in_env_var_literal"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "Vault Password Exported as Literal in Playbook"
    description: "ANSIBLE_VAULT_PASSWORD / ANSIBLE_VAULT_PASSWORD_FILE is assigned a literal value inside a playbook (as a var, env, or set_fact) - defeats the purpose of vaulting by storing the password in plaintext where the vault data is."
    regex: "(?:ANSIBLE_VAULT_PASSWORD(?:_FILE)?|ansible_vault_password(?:_file)?)\\s*[:=]\\s*['\"](?!{{)[^'\"\\n]{3,}['\"]"
    positive_examples:
      - "ANSIBLE_VAULT_PASSWORD:'xxx'"
    recommendation: "Read the vault password from a file outside the repo, from a secrets manager (AWS Secrets Manager, HashiCorp Vault, 1Password), or prompt at runtime with --ask-vault-pass."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    mitre_attack: ["T1552.001", "T1552.006"]
    cwe: ["CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1"]

  - id: "plaintext_password_should_be_vaulted"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "Variable Named *password/*secret/*token Has Plaintext Value"
    description: "A var with a name that screams 'secret' (db_password, api_token, jwt_secret, private_key) is assigned a literal non-Jinja, non-vault value in a playbook or vars file - the secret sits in plaintext in version control."
    regex: "^\\s*[a-zA-Z_][a-zA-Z0-9_]*(?:password|passwd|_pw|_pass|secret|token|api_key|apikey|private_key)\\s*:\\s*['\"](?!{{)(?!\\$ANSIBLE_VAULT)[^'\"\\n]{4,}['\"]"
    positive_examples:
      - "clientSecret: \"**********\""
    recommendation: "Move the value to a vault-encrypted file (ansible-vault encrypt_string) and reference it via {{ vault_varname }}. Never commit literal secrets."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['CC6.1']
    mitre_attack: ["T1552.001"]
    cwe: ["CWE-259", "CWE-312"]
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: ["V2.10.4", "V6.1.2", "V8.3.1"]

  - id: "vault_id_hardcoded_in_plaintext"
    category: "hardcoded_credentials"
    severity: "MEDIUM"
    title: "Hardcoded vault_identity_list Exposes Vault IDs"
    description: "vault_identity_list in ansible.cfg enumerates vault IDs with a hardcoded password file path - concentrates every vault's key in one line, maximising blast radius if that file is leaked."
    regex: "^\\s*vault_identity_list\\s*=\\s*[^#\\n]*[@,][^#\\n]+"
    positive_examples:
      - "vault_identity_list=@x"
    recommendation: "Keep vault_identity_list short - one or two IDs. Use a client-side script to load the right password per vault ID (e.g. 1Password CLI) so the password file path is not static."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)']
    soc2: ['CC6.1']
    cwe: ["CWE-312"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V6.1.2", "V8.3.1"]
    mitre_attack: ["T1552.001"]

  - id: "ask_vault_pass_skipped_in_ci"
    category: "hardcoded_credentials"
    severity: "MEDIUM"
    title: "CI Script Skips Vault Authentication (--vault-password-file <tmp>)"
    description: "A shell task or CI script pipes a one-liner password into --vault-password-file via a writable temp location (/tmp, $RUNNER_TEMP) - the vault password lands on disk unencrypted during the run."
    regex: "--vault-password-file[\\s=]+(?:/tmp|/var/tmp|\\$RUNNER_TEMP|\\$TMPDIR|\\$HOME/\\.cache)"
    positive_examples:
      - "--vault-password-file /tmp"
    multiline: true
    window: 4
    recommendation: "Feed the vault password through stdin or an fd (e.g. `ansible-playbook --vault-password-file <(echo $PW)`), or use ANSIBLE_VAULT_PASSWORD_FILE pointing to a secret-manager-backed script that never writes plaintext to disk."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    mitre_attack: ["T1552.001"]
    cwe: ["CWE-522"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1"]

  - id: "unencrypted_vault_file"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "File Named vault.yml / *_vault.yml Appears Unencrypted"
    description: "A file whose name suggests it should be vaulted (vault.yml, group_vars/all/vault.yml, *_vault.yml, *_secrets.yml) is being referenced but its content lacks the `$ANSIBLE_VAULT;` header."
    regex: "(?:include_vars|vars_files):[\\s\\S]{0,200}?(?:vault\\.yml|_vault\\.yml|_secrets\\.yml|secrets\\.yml)"
    positive_examples:
      - "include_vars:vault.yml"
    multiline: true
    window: 4
    recommendation: "Encrypt the file with `ansible-vault encrypt group_vars/all/vault.yml`. The first line should read `$ANSIBLE_VAULT;1.1;AES256`."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)']
    soc2: ['CC6.1']
    mitre_attack: ["T1552.001"]
    cwe: ["CWE-312"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: ["V6.1.2", "V8.3.1"]

  - id: "gitlab_ci_job_token_leak"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "GitLab CI Job Token or Registry Password Leaked to External Host"
    description: "A playbook / script echoes, curls, or posts `$CI_JOB_TOKEN`, `$CI_REGISTRY_PASSWORD`, `$CI_DEPLOY_PASSWORD`, `CI_JOB_JWT`, or `CI_REGISTRY_TOKEN` to a non-GitLab destination (webhook, pastebin, external log collector). CI_JOB_TOKEN authenticates as the pipeline and can push packages, read project secrets via the job-token API, and (with GitLab 16.2+) trigger downstream pipelines - leaking it outside GitLab is full pipeline-identity compromise."
    regex: "(?:curl|wget|httpie|http\\s+POST|ansible\\.builtin\\.uri)[\\s\\S]{0,300}\\$(?:CI_JOB_TOKEN|CI_REGISTRY_PASSWORD|CI_DEPLOY_PASSWORD|CI_JOB_JWT|CI_REGISTRY_TOKEN|CI_JOB_TOKEN_OIDC)\\b|echo\\s+[\"']?\\$(?:CI_JOB_TOKEN|CI_REGISTRY_PASSWORD|CI_JOB_JWT)\\b[^|]*\\|\\s*(?:curl|wget|nc|base64\\s*\\|\\s*curl)"
    positive_examples:
      - "curl$CI_JOB_TOKEN"
    multiline: true
    window: 6
    recommendation: "Never send `$CI_JOB_TOKEN` outside GitLab. If you need to authenticate to GitLab from a job, use it against GitLab endpoints only (registry, job-token API, Package Registry). For cross-system auth, use OIDC: https://docs.gitlab.com/ee/ci/secrets/id_token_authentication.html - it hands out short-lived, audience-scoped tokens instead of a general-purpose CI token."
    cis_controls: ["CIS-Secrets"]
    nist_controls: ['AU-9', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2', '10.3.1', '10.3.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(b)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    mitre_attack: ["T1078.004", "T1552.001"]
    cwe: ["CWE-522", "CWE-532"]
    owasp_appsec: ["A04:2021", "A09:2021"]
    owasp_asvs: ["V2.10.1", "V6.2.1", "V7.1.1"]

  - id: "npm_pypi_publish_token"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "NPM or PyPI Publish Token in Plaintext"
    description: "A publish-scope registry token literal: npm automation/publish token (`npm_[A-Za-z0-9]{36}`), PyPI API token (`pypi-AgE[A-Za-z0-9_-]{60,}`), Twine password variable assignment (`TWINE_PASSWORD=...`), or a bare `.npmrc` / `.pypirc` line with a token value. These tokens can publish malicious package versions under the owning project's name - arguably the highest-impact supply-chain credential."
    regex: "\\bnpm_[A-Za-z0-9]{36}\\b|\\bpypi-AgE[A-Za-z0-9_-]{60,}\\b|TWINE_PASSWORD\\s*[:=]\\s*[\"']?(?!\\$|\\{\\{)[^\\s\"'#]{8,}|//registry\\.npmjs\\.org/:_authToken\\s*=\\s*(?!\\$)[A-Za-z0-9_-]{20,}|password\\s*=\\s*pypi-[A-Za-z0-9_-]{20,}"
    positive_examples:
      - "npm_AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    recommendation: "Publish tokens must be injected at runtime via CI secrets (GITHUB_TOKEN + OIDC -> PyPI trusted publishing, `actions/setup-node` + `NODE_AUTH_TOKEN` from secrets) - never committed. Rotate immediately if leaked (PyPI: Account Settings -> API tokens -> Revoke; npm: `npm token revoke <uuid>`). Prefer PyPI/npm trusted-publishing (OIDC) over long-lived tokens entirely."
    cis_controls: ["CIS-Secrets", "CIS-Supply-Chain"]
    nist_controls: ['CM-11', 'IA-5', 'IA-5(7)', 'SA-10', 'SC-28', 'SI-7']
    pci_dss: ['3.5.1', '6.3.2', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
