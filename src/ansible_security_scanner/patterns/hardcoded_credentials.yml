  - id: "aws_session_token_asia_literal"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "AWS Temporary Session Token (ASIA...) Literal With Session Token Co-located"
    description: "A task embeds an AWS session access-key-id prefixed `ASIA` (the STS-temporary-credentials prefix) together with an `aws_session_token:` / `AWS_SESSION_TOKEN=` literal. Unlike long-lived `AKIA...` keys which are almost always hard-coded by mistake, an `ASIA...` session token in a playbook is a strong indicator that a short-lived STS session was actively captured (credential-theft malware / IMDS-SSRF harvest / compromised MFA assume-role) and is being replayed from automation - the legitimate code path for `ASIA` credentials is `boto3.Session().get_credentials()` or `aws sts assume-role`, never a YAML literal. The token is valid for up to 36 hours by default, so rapid revocation is critical."
    regex: "ASIA[A-Z0-9]{16}[\\s\\S]{0,500}?(?:AWS_SESSION_TOKEN|aws_session_token|SessionToken)\\s*[:=]\\s*['\"]?[A-Za-z0-9+/=]{100,}['\"]?|(?:AWS_SESSION_TOKEN|aws_session_token|SessionToken)\\s*[:=]\\s*['\"]?[A-Za-z0-9+/=]{100,}['\"]?[\\s\\S]{0,500}?ASIA[A-Z0-9]{16}"
