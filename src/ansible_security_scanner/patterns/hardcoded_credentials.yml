  - id: "stripe_live_secret_key_literal"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Stripe Live Secret Key (sk_live_ / rk_live_) Embedded In Playbook"
    description: "A task embeds a Stripe live-mode secret key (`sk_live_[A-Za-z0-9]{24,}`) or restricted key (`rk_live_[A-Za-z0-9]{24,}`). A Stripe live secret key can issue charges, refund arbitrary charges to attacker bank accounts, read every saved card-on-file (PCI-DSS scope expansion), list all customers with PII, and create instant-payouts - there is effectively no blast-radius containment. Stripe's breach-response runbook specifically treats a leaked `sk_live_` as requiring rotation + customer notification under PCI-DSS 12.10.1."
    regex: "(?:sk|rk)_live_[A-Za-z0-9]{24,}"
