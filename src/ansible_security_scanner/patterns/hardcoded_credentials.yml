    multiline: true
    window: 8
    recommendation: "Generate the gossip key via `nomad operator gossip keyring generate` (produces a 32-byte base64 AES-256 key). Inject at runtime via env: `NOMAD_ENCRYPT=$(vault kv get -field=gossip_key secret/nomad)`, referenced in config as `encrypt = \"${NOMAD_ENCRYPT}\"`. Rotate every 90 days using `nomad operator gossip keyring install <new-key>` + `use` + `remove <old>`. On Consul-connected deployments, ALSO rotate Consul's gossip key (`consul keyring`). Bind Serf to internal interface only (`bind_addr = <internal-ip>`), add firewall rule to deny 4648 from non-Nomad hosts."
    cwe: ['CWE-322', 'CWE-327', 'CWE-798']
    owasp_appsec: ["A02:2021", "A07:2021"]
