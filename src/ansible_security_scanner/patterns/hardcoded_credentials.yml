    description: "A task contains a 13-19 digit string that matches the Luhn-valid PAN pattern for a major card brand AND passes a heuristic Luhn check - Visa (`4[0-9]{12,18}`), Mastercard (`5[1-5][0-9]{14}` or `2[2-7][0-9]{14}`), Amex (`3[47][0-9]{13}`), Discover (`6(?:011|5[0-9]{2})[0-9]{12}`), JCB (`35(?:2[89]|[3-8][0-9])[0-9]{12}`), Diners (`3(?:0[0-5]|[68][0-9])[0-9]{11}`). A plaintext PAN in a playbook is a PCI-DSS Req-3.5 hard violation - the file, the Git history, the Ansible-callback log, the SIEM that ingested the callback, and every CI artifact that stored the playbook now hold cardholder data in scope. This rule deliberately tolerates test-PAN literals (`4111 1111 1111 1111`, `5555 5555 5555 4444`, `4242 4242 4242 4242`) because they still indicate cardholder-data-handling code that belongs in a PCI-DSS-scoped environment, not an Ansible playbook."
