    positive_examples:
      - "vault audit disable"
    multiline: true
    window: 20
    recommendation: "Never disable the last audit device from a playbook. Vault SHOULD refuse to serve any request when all audit devices fail, and operationally you should run at least TWO audit devices (one file-based `audit enable file file_path=/vault/audit.log`, one syslog) so rotation or failure of one never leaves Vault un-audited. Rotate the Vault root token immediately if a disable-then-re-enable pattern is observed - it indicates a malicious audit-gap window was created."
