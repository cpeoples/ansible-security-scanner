  - id: "github_personal_access_token_literal"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "GitHub Personal-Access-Token Or App-Token Literal In Playbook"
    description: "A task embeds a GitHub token with one of the canonical prefixes - classic PAT (`ghp_<36-base62>`), OAuth user token (`gho_`), user-to-server token (`ghu_`), server-to-server token (`ghs_`), refresh token (`ghr_`), or fine-grained PAT (`github_pat_<22-base62>_<59-base62>`, 2022 format). These tokens bypass 2FA, typically carry `repo`, `workflow`, `admin:org`, or `packages` scopes, and are the #1 pivot used in 2024 supply-chain attacks (Toyota, CircleCI, Pulse Secure, Mercedes source leak) to push malicious commits, poison CI, or exfiltrate source. Detection is trivial (unique prefixes published by GitHub in their token-format spec), revocation SLA is seconds via `gh auth revoke`, and there is no legitimate reason for any of them to appear inline in configuration management."
    regex: "(?:gh[pousr]_[A-Za-z0-9]{36,}|github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59})"
