name: "Hardcoded Credentials Patterns"
author: "Ansible Security Scanner Team"
description: "Detects hardcoded passwords, API keys, tokens, and other sensitive credentials"

patterns:
  - id: "hardcoded_password"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Hardcoded Password"
    description: "Password field contains hardcoded value instead of using secure storage"
    regex: "^(?!\\s*#)\\s*password:\\s*[\"'](?!null|None|false|true|\\{\\{)[a-zA-Z0-9!@#$%^&*()_+\\-=\\[\\]{}|;:,.<>?]{3,}[\"']"
    positive_examples:
      - "password: \"uq4895738!@#$%dfd\""
    recommendation: "Move the literal password out of source: replace the value with {{ vault_password }} (Ansible Vault) or {{ lookup('community.hashi_vault.hashi_vault', 'secret=...') }}, rotate the leaked value at the consuming service, and add the file to .gitleaks / git-secrets allow-lists for the new vault path only."
    cwe: ["CWE-259", "CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-5.2"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(1)', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.3.6', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "hardcoded_api_key"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Hardcoded API Key"
    description: >-
        An `api_key:` / `apikey:` value is set to a 10+ char literal instead of
        being looked up from vault, env, or a secret manager. Once committed, the
        key has to be rotated to be made safe.
    regex: "^(?!\\s*#)\\s*(?:api_key|apikey):\\s*[\"'](?!null|None|false|true|\\{\\{)[a-zA-Z0-9_-]{10,}[\"']"
    positive_examples:
      - "api_key: \"wa9aerahhie0eekee9iaphoorovooyia\""
    recommendation: "Replace the literal api_key: value with a Vault-encrypted variable or a secrets-manager lookup, rotate the key at the issuing provider, and audit the service's audit log for unauthorised use of the leaked key."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "hardcoded_secret"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Hardcoded Secret"
    description: >-
        A `secret:` value is set to a 6+ char literal at the start of a line, not a
        Jinja2 expression. The literal lives in git history indefinitely; rotate the
        value as well as the file.
    regex: "^(?!\\s*#)\\s*secret:\\s+[\"']?(?!null|None|false|true|\\{\\{)[a-zA-Z0-9!@#$%^&*()_+\\-=\\[\\]{}|;:,.<>?]{6,}[\"']?$"
    positive_examples:
      - "secret: aaaaaa"
    recommendation: "Move the secret to Ansible Vault (or a secrets manager) and reference it via {{ vault_<name> }}; rotate the leaked value at its issuing service and audit for unauthorised use."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "hardcoded_token"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Hardcoded Token"
    description: >-
        A `token:` value is set to a 10+ char literal instead of resolved from
        vault/env/secret manager. Tokens leaked into git remain valid until rotated
        upstream.
    regex: "^(?!\\s*#)\\s*token:\\s*[\"'](?!null|None|false|true|\\{\\{)[a-zA-Z0-9_-]{10,}[\"']"
    positive_examples:
      - "token: \"secret12345\""
    recommendation: "Rotate the token at the issuing service immediately, replace the literal value with a Vault-encrypted variable / secrets-manager lookup, and audit the service for use of the leaked token."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "aws_access_key"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "AWS Access Key"
    description: >-
        Matches the AWS Access Key ID format (AKIA + 16 base32 chars). An exposed
        AKIA key is the public half of a credential pair and is routinely paired
        with a leaked secret in the same file.
    regex: "\\bAKIA[0-9A-Z]{16}\\b"
    positive_examples:
      - "aws_access_key_id: AKIAIOSFODNN7EXAMPLE"
      - "AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE"
      - "key: 'AKIA1234567890ABCDEF'"
    negative_examples:
      - "key: AKIASHORT"
      - "variable: AKIAIOSFODNN7EXAMPLETOOLONG"
      - "aws_access_key_id: \"{{ vault_aws_access_key }}\""
    recommendation: "Treat the AKIA... key as compromised: deactivate it in IAM, create a replacement (or migrate the workload to an IAM Role / instance profile), and audit CloudTrail for unauthorised API calls bearing this access key id."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "aws_secret_key"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "AWS Secret Access Key"
    description: >-
        Matches the 40-char AWS Secret Access Key shape associated with
        AKIA-prefixed keys. The secret half grants signed-request access to every
        service the IAM principal can reach.
    # A genuine AWS secret access key is 40 base64-ish chars assigned to an
    # aws_secret_access_key field (or sat next to an AWS_SECRET_ACCESS_KEY
    # env var, netrc, or a paired AKIA/ASIA access key id). The bare 40-char
    # regex used to match every URL path, joined YAML multi-line string, and
    # random base64 chunk in a playbook - a catastrophic false-positive
    # source. Require an AWS context anchor on the same line.
    regex: "(?:aws[_-]?secret[_-]?access[_-]?key|AWS_SECRET_ACCESS_KEY|aws_secret_key)\\s*[:=]\\s*['\"]?(?!\\{\\{|\\$\\{|lookup\\()([A-Za-z0-9/+=]{40})(?![A-Za-z0-9/+=])"
    positive_examples:
      - "aws_secret_access_key: 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'"
      - "aws_secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      - "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      - "aws_secret_key: \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJ1234\""
    negative_examples:
      # The historical FP shape that dominated production reports -
      # bare Jinja-rendered URL path, no AWS context anchor.
      - "url: \"{{ SOME_url }}:N/servicesNS/nobody/example/apps/local/{{ item }}\""
      - "- name: example task name"
      - "- name: example - remove old cache ( if exists )"
      - "body: \"field_a=value_a&field_b=value_b | fields some_name\""
      # Vault / lookup references must not match even in an aws-shaped key
      - "aws_secret_access_key: \"{{ vault_aws_secret_access_key }}\""
      - "aws_secret_access_key: \"{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}\""
      # Unrelated 40-char strings
      - "commit: 1234567890abcdef1234567890abcdef12345678"
      - "body: 'auth_mode=token&cluster_url=https%3A%2F%2Flocalhost%3A16443'"
    recommendation: "Treat the AWS secret access key as compromised: deactivate the parent access key in IAM, replace static credentials with an IAM Role / instance profile, and audit CloudTrail for any API calls signed with this key."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "github_token"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "GitHub Personal Access Token"
    description: >-
        Matches a GitHub Personal Access Token (gh[pousr]_ + 36+ chars). Tokens
        grant repo, workflow, or org-admin scope depending on the prefix and need to
        be rotated via Settings -> Developer settings.
    regex: "\\bgh[pousr]_[A-Za-z0-9_]{36,}\\b"
    positive_examples:
      - "ghp_AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    recommendation: "Revoke the gh{p,o,u,s,r}_ token in GitHub Settings -> Developer settings -> Personal access tokens (or for fine-grained tokens, the matching settings page), issue a replacement, and audit the org's audit log for actions taken with the leaked token."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "stripe_api_key"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Stripe API Key"
    description: >-
        Matches a Stripe live or test API key (sk_live_ / sk_test_ + 24+ chars).
        Live keys can charge cards and refund money; both must be rotated through
        the Stripe dashboard once exposed.
    regex: "\\bsk_(?:live|test)_[a-zA-Z0-9]{24,}\\b"
    positive_examples:
      - "sk_live_aaaaaaaaaaaaaaaaaaaaaaaa"
    recommendation: "Roll the sk_{live,test}_ key in the Stripe Dashboard -> Developers -> API keys, and audit Stripe's events log for charges, refunds, or customer reads bearing the leaked key."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "slack_webhook"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "Slack Webhook URL"
    description: >-
        Matches a hooks.slack.com webhook URL with the team, channel, and 24-char
        secret embedded in the path. Anyone with the URL can post messages as the
        webhook integration.
    regex: "https://hooks\\.slack\\.com/services/[A-Z0-9]{9,}/[A-Z0-9]{9,}/[a-zA-Z0-9]{24,}"
    positive_examples:
      - "api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX'"
    recommendation: "Revoke the leaked Slack webhook in the Slack app's settings, recreate it, and store the replacement in Ansible Vault rather than the playbook source."
    cwe: ["CWE-200", "CWE-798"]
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V8.1.1", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.7']

  - id: "jwt_token"
    category: "hardcoded_credentials"
    severity: "HIGH"
    title: "JWT Token"
    description: >-
        Matches a JWT (header.payload.signature, base64url segments). JWTs often
        carry user identity and remain valid for the token's lifetime; treat any
        committed JWT as compromised.
    regex: "\\bey[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]*\\b"
    positive_examples:
      - "token: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ0ZXN0In0.signature_part_here"
    recommendation: "Revoke the JWT at its issuer (or rotate the signing key if revocation is not supported), and audit downstream services' authentication logs for any session opened with the leaked token."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "anthropic_api_key_credential"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "Anthropic/Claude API Key"
    description: >-
        Matches an Anthropic / Claude API key (sk-ant-apiNN- + 95 chars). Keys grant
        billed model access on the owner's workspace and must be rotated via
        console.anthropic.com.
    regex: "\\bsk-ant-api\\d{2}-[A-Za-z0-9_-]{95}\\b"
    positive_examples:
      - "sk-ant-api00-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    recommendation: "Rotate the sk-ant-api... key in the Anthropic Console -> Settings -> API Keys, and audit the workspace's usage page for traffic from unrecognised IPs."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']

  - id: "openai_api_key_credential"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "OpenAI API Key"
    description: >-
        Matches an OpenAI API key (sk- + 48 chars). The key grants billed access to
        OpenAI's models and must be rotated via the platform.openai.com dashboard
        once exposed.
    regex: "\\bsk-[A-Za-z0-9]{48}\\b"
    positive_examples:
      - "sk-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    recommendation: "Rotate the sk-... key in the OpenAI dashboard -> API keys, restrict the replacement to the minimum scope required, and audit the org's usage page for calls bearing the leaked key."
    cwe: ["CWE-798"]
    owasp_appsec: ["A07:2021"]
    owasp_asvs: ["V2.10.2", "V2.10.4", "V14.1.5"]
    mitre_attack: ["T1552.001"]
    cis_controls: ["CIS-3.1", "CIS-Secrets"]
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(a)(2)(iv)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']
    mitre_atlas: ['AML.T0055', 'AML.T0012']

  - id: "hardcoded_username"
    category: "hardcoded_credentials"
    severity: "LOW"
    title: "Well-Known Default Account Used"
    description: "A task connects as one of the highest-risk well-known default accounts (``root``, ``administrator``, ``Administrator``, ``sa``). These are the top targets for credential stuffing, online password brute-force, and MFA-fatigue attacks because they exist on virtually every deployment. This is an INFORMATIONAL hint, not a secret leak - knowing the username is half the guess. The username itself isn't confidential; the pairing with an unrotated vendor-default password is. Use a named service principal (``ansible-deploy``, ``ci-runner``) scoped to only the required privileges and rotate from the vendor default. A hardcoded username is only suspicious when paired with a hardcoded password - see ``hardcoded_password`` / ``hardcoded_credentials`` / ``inventory_group_vars_all_contains_plaintext_secret`` for the actual secret-leak signals."
    # Narrow to the three accounts that matter - ``root``,
    # ``administrator``, ``sa`` - all highly targeted by automated
    # credential-stuffing tooling. ``admin`` / ``api`` / ``user`` /
    # ``postgres`` / ``mysql`` are mandated by system design
    # (``postgres`` is literally the required superuser name; ``root``
    # on Linux, ``Administrator`` on Windows, ``sa`` on MSSQL) and
    # firing on them generated hundreds of FPs where the rule was
    # telling the operator to "rename ``postgres``", which is
    # impossible. Case-insensitive for Windows parity.
    regex: "(?i)^(?!\\s*#)\\s*(?:user|username|login|account):\\s*[\"'](?:root|administrator|sa)[\"']"
    positive_examples:
      - "    user: \"root\""
      - "    username: \"administrator\""
      - "    login: \"Administrator\""
      - "    account: \"sa\""
    negative_examples:
      - "    user: \"admin\""
      - "    user: \"postgres\""
      - "    user: \"mysql\""
      - "    user: \"oracle\""
      - "    user: \"api\""
      - "    user: \"ansible-deploy\""
      - "    user: \"{{ connection_user }}\""
    recommendation: "Connecting as root / Administrator / sa concentrates blast radius; provision a service-specific account with the minimum privileges the play needs, configure SSH/WinRM/MSSQL auth via ansible.builtin.user / win_user / community.general.mssql_user, and use these accounts in connection variables."
    cwe: ["CWE-200"]
    owasp_appsec: ["A01:2021"]
    owasp_asvs: ["V8.1.1"]
    mitre_attack: ["T1078.003"]
    cis_controls: ["CIS-5.1"]
    nist_controls: ['AC-3', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.7']

  - id: "url_encoded_credentials"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "URL-Encoded Credentials"
    description: >-
        Form-encoded `<name>=<value>` where the name contains words like
        token/secret/auth/password/oauth/jwt. The shape catches credentials baked
        into query strings, callback URLs, and config snippets.
    recommendation: "Move secrets out of URL-encoded request bodies and query strings. Replace the raw token/password with a Jinja reference to an Ansible Vault or secret-store lookup (e.g. `{{ lookup('community.hashi_vault.hashi_vault', ...) }}`), and prefer structured `body:` maps with `body_format: form-urlencoded` so individual fields are easy to audit."
    # Anchored to URL-form parameter boundaries:
    #   * leading ``(?:^|[&?"'\s])``  - param must start at a form/field
    #     boundary (after ``&``, ``?``, a quote, or whitespace). This
    #     prevents substring-capture of ``pass`` inside ``force-change-
    #     pass=0`` (where ``pass`` is NOT at a boundary; it is preceded
    #     by ``-``), and of ``userName`` inside ``eai%3AuserName=...``.
    #   * trailing value class  ``[^&=\s"'{}#%]{8,}`` - within a single
    #     URL-form parameter, the value cannot legally contain ``&`` or
    #     ``=`` (those terminate the parameter). Excluding them here
    #     prevents the value from greedy-matching across adjacent
    #     parameters like ``force-change-pass=0&defaultApp=home&
    #     roles=user-role``. Also excludes ``{``/``}`` so a Jinja
    #     placeholder ``password={{ secret }}`` doesn't look like a
    #     literal; real literal secrets will still match. ``%`` is
    #     excluded so URL-encoded path values like
    #     ``privKeyPath=%2Fetc%2Fssl...`` (which merely reference a
    #     key FILE on disk) don't masquerade as credential literals.
    #     ``(``/``)`` are excluded so Splunk SPL / query-language
    #     expressions like ``_ip_cez_key=if(isnull(foo),"x",foo)``
    #     (matched because ``_ip_cez_key`` ends in ``_key``) don't
    #     masquerade as URL-form values - genuine URL-form values
    #     would URL-encode these as ``%28``/``%29``.
    #   * value cannot be an all-digit / boolean / trivial literal
    #     (negative lookahead) - catches cases like ``enableSSL=1``
    #     and ``force-change-pass=false`` that coincidentally satisfy
    #     the 8+ length after greedy matching was possible.
    regex: "(?:^|[&?\"'\\s])([\\w-]*(?:token|key|secret|auth|credential|pass|pwd|password|login|session|bearer|oauth|jwt|api|access|refresh|csrf|xsrf|verification|reset|activation|confirmation)[\\w-]*)=(?!(?:true|false|yes|no|on|off|null|None|[0-9]+)(?:[&\"'\\s]|$))(?!%2[Ff])([^&=\\s\"'{}#%()]{8,})(?:[&\"'\\s]|$)"
    positive_examples:
      - 'body: "name=alice&password=CorrectHorseBatteryStaple&roles=admin"'
      - 'body: "user=bob&api_key=sk_live_abcdef1234567890&env=prod"'
      - 'url: "https://api.example.com/login?auth_token=ey.JhbGciOiJIUzI1NiJ9&redirect=/"'
    negative_examples:
      - 'body: "force-change-pass=0&defaultApp=home&roles=user-role&realname=Some+User&password={{ user_password }}&name={{ user_name }}"'
      - 'body: "output_mode=json&ackIdleCleanup=true&allowSslCompression=true&enableSSL=1&index=default&maxSockets=0"'
      - 'body: "eai%3AuserName=admin&host=example-host&privKeyPath=%2Fetc%2Fssl%2Fprivate%2Fserver.key&rollingRestartReturnServerBusy=true"'
      - 'url: "https://api.example.com/users?password={{ vault_admin_password }}"'
      # Splunk SPL ``eval`` expressions with identifiers ending in ``_key`` must not match.
      - '| eval _ip_cez_key=if(isnull(cim_entity_zone),"__zone__",cim_entity_zone)'
