  - id: "vault_root_token_or_unseal_keys_inline"
    category: "hardcoded_credentials"
    severity: "CRITICAL"
    title: "HashiCorp Vault Root Token Or Unseal Keys Embedded Inline In Playbook"
    description: "A task assigns a Vault root token (format `hvs.*`, `s.*`, or `hvb.*`) or Shamir unseal-key share inline - typically as `vault_token: hvs.CAESIAbCd...`, `VAULT_TOKEN: s.1a2b3c...`, `unseal_keys: ['abc123...', 'def456...']`, or passed via `--unseal-key=`. Root tokens bypass every Vault policy; unseal-key shares (if a single playbook holds 3-of-5 shares) reconstruct the master key and allow Vault to be unsealed anywhere the attacker wants. Both are one-line catastrophes that end up in Git, CI logs, and Ansible-callback JSON exports."
    regex: "(?:vault_token|VAULT_TOKEN|root_token)\\s*[:=]\\s*['\"]?(?:hvs\\.[A-Za-z0-9_-]{20,}|hvb\\.[A-Za-z0-9_-]{20,}|s\\.[A-Za-z0-9]{20,})|unseal[_-]?keys?\\s*[:=]\\s*\\[[^\\]]{40,}\\]|--unseal-key\\s*=?\\s*['\"]?[A-Za-z0-9+/=]{40,}"
