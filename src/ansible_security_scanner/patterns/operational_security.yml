  - id: "nohup_background_persistence"
    category: "operational_security"
    severity: "LOW"
    title: "Background Process via nohup / disown / setsid (Use systemd Instead)"
    description: "A task uses ``nohup ... &``, ``disown``, ``setsid``, ``screen -dmS``, or ``tmux new-session -d`` to spawn a long-running background process. This is NOT a boot-persistent backdoor on its own (the process still dies on reboot - real persistence needs an init/systemd/cron entry), but it's a deployment anti-pattern: the process escapes Ansible's supervision, has no restart policy, no journald integration, no resource limits. If the process dies (OOM, segfault), nothing restarts it and the failure is silent. Operationally legitimate for quick smoke tests and data-plane warmups, but should never be the production deploy strategy for a service."
    regex: "\\bnohup\\s+[^\\n]+\\s&(?![&>])|\\bdisown\\s+|\\bsetsid\\s+|\\bscreen\\s+-dmS\\s+|\\btmux\\s+new-session\\s+-d"
    positive_examples:
      - "cd $DAEMON_PATH && nohup npm start > $DAEMON_PATH/logs/$DAEMON_NAME.log 2>&1 &"
    recommendation: "Long-running processes should be managed as systemd services with a ``Restart=on-failure``, ``StandardOutput=journal``, and ``MemoryMax=`` limit. For containers, use the container runtime's restart policy (``--restart=unless-stopped`` for podman/docker, ``restartPolicy: Always`` for Kubernetes). For one-off jobs, use ``systemd-run --unit=... --on-calendar=...`` (transient timer) so the schedule is still tracked by systemd."
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

