  - id: "azure_diagnostic_setting_deleted_or_never_attached"
    category: "operational_security"
    severity: "HIGH"
    title: "Azure Diagnostic Setting Deleted Or Resource Never Attached To Log-Analytics"
    description: "A task deletes `Microsoft.Insights/diagnosticSettings` via `az monitor diagnostic-settings delete`, `Remove-AzDiagnosticSetting`, or `azurerm_monitor_diagnostic_setting` with `state: absent` on a KeyVault, Storage Account, Azure AD, or network resource. Azure resources do NOT log to Log Analytics by default - the diagnostic-setting is the explicit opt-in. Removing one silences all subsequent audit events for that resource without any visible resource state change. 2024 Storm-0501 / Midnight Blizzard intrusion reports specifically call out `Remove-AzDiagnosticSetting` on KeyVault as their pre-exfiltration step. Distinct from the existing `az_monitor_disable` rule which catches `az monitor log-profiles delete` (subscription-wide) - this catches the per-resource variant that flies under compliance-dashboard radars."
    regex: "(?:az\\s+monitor\\s+diagnostic-settings\\s+delete\\b|Remove-AzDiagnosticSetting\\b|azurerm_monitor_diagnostic_setting[\\s\\S]{0,300}?state\\s*:\\s*['\"]?absent)"
    positive_examples:
      - "az monitor diagnostic-settings delete"
