  - id: "azure_defender_cspm_downgrade_to_free_tier"
    category: "operational_security"
    severity: "HIGH"
    title: "Azure Defender / Microsoft Defender For Cloud Plan Downgraded To Free Tier"
    description: "A task runs `az security pricing create --name <VirtualMachines|SqlServers|KeyVaults|StorageAccounts|Containers|AppServices|Arm|Dns> --tier Free` OR `Set-AzSecurityPricing -Name <plan> -PricingTier Free`, OR the `azurerm_security_center_subscription_pricing` resource sets `tier = \"Free\"`. The Free tier retains only the AppSec posture overview - it DISABLES all threat detections (malicious-IP flag, suspicious-RDP-brute-force alerts, impossible-travel, JIT-VM-access, file-integrity-monitoring, adaptive-app-control). Budget-constrained orgs sometimes flip this, but in compromise scenarios it is the canonical step to blind Microsoft's threat-intel before privilege escalation. Defender Plans are the Azure-native EDR; removing them is the Azure equivalent of `Disable-WindowsDefender`."
    regex: "(?:az\\s+security\\s+pricing\\s+create\\s+[^\\n]*?--tier\\s+['\"]?Free\\b|Set-AzSecurityPricing\\s+[^\\n]*?-PricingTier\\s+['\"]?Free\\b|azurerm_security_center_subscription_pricing[\\s\\S]{0,300}?tier\\s*=\\s*['\"]?Free['\"]?)"
    positive_examples:
