  - id: "ldap_signing_or_channel_binding_disabled"
    category: "operational_security"
    severity: "HIGH"
    title: "LDAP Signing / Channel Binding Disabled Via Registry (NTLM Relay Enabler)"
    description: "A task writes `HKLM:\\SYSTEM\\CurrentControlSet\\Services\\NTDS\\Parameters\\LDAPServerIntegrity` = `1` (signing OPTIONAL instead of REQUIRED=2) OR `LdapEnforceChannelBinding` = `0` (disabled) OR `HKLM:\\...\\LDAP\\LdapClientIntegrity=0`. Both settings are the exact knobs Microsoft required hardening of in the March 2020 LDAP-signing advisory (ADV190023, turned on by default 2023 H2). Without them, an attacker on-path can perform NTLM-relay + LDAPS-downgrade attacks (`ntlmrelayx --target ldaps://dc...`) to escalate to Domain Admin - the primary pivot used by 2024 Volt Typhoon, Storm-0501, and most ransomware operators after initial foothold."
    regex: "win_regedit[\\s\\S]{0,300}?NTDS\\\\Parameters[\\s\\S]{0,400}?(?:LDAPServerIntegrity[\\s\\S]{0,80}?(?:data|value)\\s*:\\s*(?:0|1)\\b|LdapEnforceChannelBinding[\\s\\S]{0,80}?(?:data|value)\\s*:\\s*0\\b)|(?:LdapEnforceChannelBinding|LDAPServerIntegrity|LdapClientIntegrity)\\s*:\\s*REG_DWORD:0x[0-9a-f]*0[01]\\b"
    positive_examples:
