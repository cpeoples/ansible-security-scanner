    window: 25
    recommendation: "Set `LDAPServerIntegrity = 2` (REQUIRED) and `LdapEnforceChannelBinding = 2` (REQUIRED) on every Domain Controller. Enforce via GPO `Default Domain Controllers Policy` -> Security Options -> `Domain controller: LDAP server signing requirements = Require signing` and `LDAP server channel binding token requirements = Always`. Test impact with Microsoft's LDAP Channel Binding And Signing Health Check tool BEFORE enforcing. Rotate affected service accounts to use LDAPS (636) with cert-based auth. Audit Windows EID 2886, 2887, 2888, 2889 on DCs - presence of 2889 (clear-text bind) indicates clients still at risk."
    cwe: ['CWE-287', 'CWE-295', 'CWE-308']
