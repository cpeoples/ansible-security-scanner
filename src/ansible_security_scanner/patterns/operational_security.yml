  - id: "dns_over_https_exfil_primary_resolver"
    category: "operational_security"
    severity: "HIGH"
    title: "Primary System Resolver Pointed At Public DoH Endpoint (DNS-SIEM Blind-Spot)"
    description: "A task renders `/etc/systemd/resolved.conf`, `/etc/resolv.conf`, `/etc/NetworkManager/NetworkManager.conf`, Windows `Set-DnsClientDohServerAddress`, or a browser/enterprise policy that sets the PRIMARY resolver to a public DoH endpoint (`1.1.1.1/dns-query`, `dns.google/dns-query`, `dns.quad9.net/dns-query`, `https://doh.opendns.com/dns-query`) without the enterprise DNS-resolver in front. DoH encrypts the DNS query end-to-end to the public resolver, which blinds every SIEM / DLP that relied on `passive-DNS` logs to detect C2, DGA domains, and data-exfil over DNS. In 2024 this was the #1 evasion technique reported by MITRE D3FEND for new intrusions bypassing NDR products."
