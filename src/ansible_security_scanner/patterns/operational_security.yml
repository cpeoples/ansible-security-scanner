    category: "operational_security"
    severity: "HIGH"
    title: "Swap/Memory Dump Credential Harvesting"
    description: "Reads swap partitions or memory dumps to extract credentials from process memory"
    regex: "(?:strings\\s+/dev/.*swap|strings\\s+/proc/kcore|strings\\s+/dev/mem|strings\\s+.*\\.vmem)"
    positive_examples:
      - "strings /dev/swap"
    recommendation: "Reading swap/memory for credentials is an attack technique; remove and investigate"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "at_job_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "at/batch Job for Delayed Execution"
    description: "Schedules commands for later execution using at/batch, which can evade real-time detection"
    regex: "\\b(?:echo.*\\|\\s*at\\s+|at\\s+(?:now|midnight|noon|teatime|\\d{1,2}:\\d{2}))"
    positive_examples:
      - "- cron: \"0 4 * * *\" # Run daily at 4:00 UTC"
    recommendation: "Scheduled at jobs can evade detection; use cron/systemd timers with proper auditing instead"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Active Directory Operational Security ----------------------------------

  - id: "krbtgt_password_reset"
    category: "operational_security"
    severity: "MEDIUM"
    title: "Domain krbtgt Password Reset"
    description: "Resets the password of the krbtgt account (the KDC service account whose hash signs every Kerberos ticket). Resetting krbtgt is a legitimate domain-recovery action (golden-ticket remediation), but it MUST be done twice with a wait interval and coordinated with the Tier-0 team - running it from routine automation is either a mistake that breaks Kerberos or an attacker laundering a compromise recovery."
    regex: "(?:Reset-ADAccountPassword|Set-ADAccountPassword|net\\s+user\\s+krbtgt|microsoft\\.ad\\.user)\\s*[\\s\\S]{0,400}(?:[iI]dentity|-Name|user|name)\\s*[:=]?\\s*[\"']?krbtgt[\"']?"
    positive_examples:
      - "Reset-ADAccountPasswordidentitykrbtgt"
    recommendation: "krbtgt resets should follow the Microsoft-recommended two-reset procedure (>10 hour gap) and be triggered by an IR runbook, not routine configuration management. Document the reason in the change ticket and audit who initiated it."
    no_ansible_remediation: true
    cwe: ['CWE-321', 'CWE-1188']
    owasp_appsec: ["A02:2021"]
    mitre_attack: ['T1098.007', 'T1558.001']
    cis_controls: ['CIS-5.4', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3']
    pci_dss: ['7.2.5']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.2', 'CC6.3']

  - id: "laps_password_read"
    category: "operational_security"
    severity: "HIGH"
    title: "LAPS Password Attribute Read"
    description: "Reads the ms-Mcs-AdmPwd, msLAPS-Password, or msLAPS-EncryptedPassword attribute from an AD computer object (Get-LAPSADPassword, Get-ADComputer -Properties ms-Mcs-AdmPwd, ldap_search filtering that attribute). LAPS stores per-machine local administrator passwords; a playbook reading them in bulk is a credential-harvest primitive."
    regex: "(?:Get-LAPSADPassword|Get-AdmPwdPassword|Get-ADComputer[\\s\\S]{0,100}(?:ms-Mcs-AdmPwd|msLAPS-Password|msLAPS-EncryptedPassword)|(?:ldapsearch|ldap_search|community\\.general\\.ldap_search)[\\s\\S]{0,200}(?:ms-Mcs-AdmPwd|msLAPS-Password))"
    positive_examples:
      - "Get-LAPSADPassword"
    recommendation: "LAPS reads should be just-in-time, for a specific host, by a specific engineer (via the LAPS UI or scoped PowerShell). Bulk reads from automation indicate either a scope problem (script has more access than needed) or credential harvesting - audit the caller and tighten 'All extended rights' on OUs."
    no_ansible_remediation: true
    cwe: ['CWE-200', 'CWE-522']
    owasp_appsec: ["A01:2021", "A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5, V14.2.2]
    mitre_attack: ['T1003', 'T1555']
    cis_controls: ['CIS-3.11', 'CIS-6.8']
    nist_controls: ['AC-2', 'AC-3', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.3.1', '3.5.1', '7.2.5', '8.6.2']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(iv)', '164.312(d)', '164.312(e)(1)']
    soc2: ['C1.1', 'CC6.1', 'CC6.2', 'CC6.3', 'CC6.7']

  # -- RHEL / enterprise Linux hardening (2025-2026) -------------------------

  - id: "rhsm_subscription_token_leak"
    category: "operational_security"
    severity: "HIGH"
    title: "Red Hat Subscription Manager Token or Activation Key in Plaintext"
    description: "A task registers a system with `subscription-manager register`, `rhsm_repository`, `community.general.redhat_subscription`, or `rhc connect` and passes an activation key, password, or organisation token as a plaintext string - not a Vaulted variable. RHSM activation keys authorise full subscription consumption and can enable a lateral pivot into other Red Hat-managed assets (Insights, Satellite); leaking one into role source, a log, or a CI console echoes it to anyone with read access."
    regex: "(?:subscription-manager\\s+register\\s[^\\n]*--(?:password|activationkey|token)[= ][\"']?(?!\\{\\{)[^\"'\\s{][^\\s\"']+|(?:redhat_subscription|rhsm_repository|rhc_connect)\\s*:[\\s\\S]{0,400}?(?:password|activationkey|activation_keys|token)\\s*:\\s*[\"']?(?!\\{\\{)[^\"'\\s{][^\"'\\n]{3,})"
    positive_examples:
      - "subscription-manager register --password=xx"
    multiline: true
    window: 8
    recommendation: "Store activation keys and passwords in Ansible Vault and reference them by variable: `password: \"{{ vault_rhsm_password }}\"`. For unattended registration, prefer activation keys over passwords (they have narrower scope and can be rotated independently), and rotate them after every CI run that exposed them. Use Red Hat Insights + organisation-scoped service accounts rather than per-host credentials where possible."
    no_ansible_remediation: true
    cwe: ['CWE-312', 'CWE-522', 'CWE-798']
    owasp_appsec: ["A04:2021", "A07:2021"]
    owasp_asvs: [V13.2.1, V13.2.3, V13.3.1, V14.1.1, V11.2.5, V14.2.1]
    mitre_attack: ['T1078.004', 'T1552.001']
    cis_controls: ['CIS-3.1', 'CIS-Secrets']
    nist_controls: ['AC-3', 'IA-5', 'IA-5(7)', 'SC-28']
    pci_dss: ['3.5.1', '8.6.2']
    hipaa: ['164.312(a)(2)(i)', '164.312(d)']
    soc2: ['C1.1', 'CC6.1']

  - id: "leapp_upgrade_no_rpm_verify"
    category: "operational_security"
    severity: "HIGH"
    title: "RHEL leapp Upgrade With RPM Signature Verification Disabled"
    description: "A task invokes `leapp preupgrade` / `leapp upgrade` with `--no-rpm-verify` or sets `LEAPP_NO_RPM_CHECK=1` / `LEAPP_UNSUPPORTED=1`. leapp is the supported in-place major-version upgrade tool for RHEL 7 -> 8 -> 9 -> 10; disabling RPM signature verification during an OS upgrade means the new OS can be installed from tampered or unsigned packages - a high-impact supply-chain window on a machine that is about to become the new golden image."
    regex: "leapp\\s+(?:preupgrade|upgrade)\\b[^\\n]*--no-rpm-verify|LEAPP_NO_RPM_CHECK\\s*[:=]\\s*[\"']?1\\b|LEAPP_UNSUPPORTED\\s*[:=]\\s*[\"']?1\\b"
    positive_examples:
      - "leapp preupgrade--no-rpm-verify"
    multiline: false
    recommendation: "Never use `--no-rpm-verify` on a production upgrade. If an unsigned package is legitimately required (internal custom RPM), sign it with the organisation's GPG key first and add that key to the RPM trust store, rather than bypassing verification globally. For irrecoverable signature-failure situations, file a Red Hat Support case - `LEAPP_UNSUPPORTED=1` removes upgrade support entirely."
    cwe: ['CWE-345', 'CWE-347', 'CWE-494']
    owasp_appsec: ["A02:2021", "A08:2021"]
    owasp_asvs: [V15.2.4]
    mitre_attack: ['T1195.002', 'T1554']
    cis_controls: ['CIS-Supply-Chain']
    nist_controls: ['CM-11', 'SA-10', 'SI-7']
    pci_dss: ['6.3.3']
    soc2: ['CC7.1', 'CC8.1']

  - id: "fapolicyd_disabled_or_permissive"
    category: "operational_security"
    severity: "HIGH"
    title: "RHEL fapolicyd File-Access Policy Daemon Disabled or Set Permissive"
    description: "A task stops/disables/masks the `fapolicyd` service, or edits `/etc/fapolicyd/fapolicyd.conf` to set `permissive = 1`. fapolicyd is RHEL's application-allowlist - it blocks execution of any binary not in the trust DB (rpmdb + `/etc/fapolicyd/rules.d/`). Disabling it removes the last-line defence against droppers that bypass SELinux (e.g. interpreted cryptominers launched via `python3 -c` or `bash -c`) and is a hallmark of post-exploitation staging."
    regex: "(?:systemctl|service)\\s+(?:stop|disable|mask)\\s+fapolicyd\\b|ansible\\.builtin\\.service\\s*:[\\s\\S]{0,300}?name\\s*:\\s*[\"']?fapolicyd[\"']?[\\s\\S]{0,200}?state\\s*:\\s*[\"']?(?:stopped|absent)[\"']?|permissive\\s*=\\s*1\\b"
    positive_examples:
      - "systemctl stop fapolicyd"
    multiline: true
    window: 8
    recommendation: "Keep fapolicyd enabled and in enforcing mode: `systemctl enable --now fapolicyd`, `permissive = 0` in `/etc/fapolicyd/fapolicyd.conf`. Add allow rules to `/etc/fapolicyd/rules.d/` for legitimate custom applications (generate with `fapolicyd-cli --file add /opt/myapp/bin/myapp`). Ship the baseline via an Ansible role so ad-hoc changes are reverted on the next run."
    cwe: ['CWE-693', 'CWE-732']
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1562.001', 'T1562.004']
    cis_controls: ['CIS-2.7', 'CIS-4.1']
    nist_controls: ['CM-7', 'CM-7(5)', 'SI-3', 'SI-4']
    pci_dss: ['10.3.4', '12.10.1']
    hipaa: ['164.312(b)']
    soc2: ['CC6.8', 'CC7.2']
    stig: ['V-230221']

  - id: "aide_integrity_check_disabled"
    category: "operational_security"
    severity: "HIGH"
    title: "AIDE File-Integrity Database Disabled, Removed, or Not Initialised"
    description: "A task stops/disables/masks the `aidecheck.timer` or `aide.service`, removes `/var/lib/aide/aide.db.gz`, or calls `aide --update` without a subsequent `--check`. AIDE (Advanced Intrusion Detection Environment) is the standard file-integrity baseline on RHEL-family and Debian-family hosts; disabling it or wiping the baseline is how post-exploitation playbooks hide filesystem changes (new SUID binaries, modified `/etc/passwd`, planted cronjobs) from the next audit."
    regex: "(?:systemctl|service)\\s+(?:stop|disable|mask)\\s+(?:aide|aidecheck)(?:\\.(?:service|timer))?\\b|(?:ansible\\.builtin\\.service|service|systemd|ansible\\.builtin\\.systemd)\\s*:[\\s\\S]{0,300}?name\\s*:\\s*[\"']?(?:aide|aidecheck)(?:\\.(?:service|timer))?[\"']?[\\s\\S]{0,200}?(?:state\\s*:\\s*[\"']?(?:stopped|absent)[\"']?|enabled\\s*:\\s*(?:false|no))|(?:rm|unlink|file)\\s[^\\n]*(?:/var/lib/aide/aide\\.db(?:\\.gz)?|/etc/aide/aide\\.conf)|aide\\s+(?:--init|--update)(?![^\\n]*(?:--check|-C))"
    positive_examples:
      - "systemctl stop aidecheck"
    multiline: true
    window: 6
    recommendation: "Keep `aidecheck.timer` enabled (`systemctl enable --now aidecheck.timer`) and ship the DB baseline from a trusted build host. After legitimate system changes, regenerate with `aide --init` then verify with `aide --check` and commit the new `/var/lib/aide/aide.db.gz` through change-control. For HA fleets, store the reference DB in a separate integrity-protected location (offline / WORM bucket) so a compromised host can't silently rewrite its own baseline."
    cwe: ['CWE-345', 'CWE-693']
    owasp_appsec: ["A08:2021"]
    mitre_attack: ['T1070', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-3.14', 'CIS-4.1']
    nist_controls: ['AU-9', 'CM-6', 'SI-4', 'SI-7']
    pci_dss: ['10.3.4', '11.5.2']
    hipaa: ['164.312(b)', '164.312(c)(1)']
    soc2: ['CC7.1', 'CC7.2']

  - id: "chattr_immutable_tampering"
    category: "operational_security"
    severity: "HIGH"
    title: "chattr Used to Clear Immutable / Append-Only Flag on Security-Critical File"
    description: "A task invokes `chattr -i` / `chattr -a` (or the module-form equivalents `ansible.posix.file attributes: '-i'`) against paths like `/etc/passwd`, `/etc/shadow`, `/etc/sudoers`, `/etc/ssh/sshd_config`, `/var/log/audit/audit.log`, or entries under `/etc/audit/rules.d/`. Administrators set the immutable (`i`) or append-only (`a`) attribute specifically so these files cannot be rewritten or truncated - even by root. Clearing those flags is a near-unambiguous prelude to credential theft (editing shadow), privilege escalation (editing sudoers), or log tampering (truncating audit.log)."
    regex: "(?:chattr\\s+-(?:[aAcCdDeEiIjPsSTtu]*[ia][aAcCdDeEiIjPsSTtu]*)\\s+|ansible\\.posix\\.file\\s*:[\\s\\S]{0,300}?attributes\\s*:\\s*[\"']?-[aAcCdDeEiIjPsSTtu]*[ia][aAcCdDeEiIjPsSTtu]*[\"']?[\\s\\S]{0,200}?path\\s*:\\s*[\"']?(?:/etc/(?:passwd|shadow|sudoers|sudoers\\.d|ssh/sshd_config|audit)|/var/log/audit))|chattr\\s+-(?:[aAcCdDeEiIjPsSTtu]*[ia][aAcCdDeEiIjPsSTtu]*)\\s+[\"']?(?:/etc/(?:passwd|shadow|sudoers|sudoers\\.d|ssh/sshd_config|audit)|/var/log/audit)"
    positive_examples:
      - "command: chattr -A \"{{ attributes_file }}\""
    multiline: true
    window: 6
    recommendation: "Immutable / append-only flags on `/etc/shadow`, `/etc/sudoers`, `/etc/ssh/sshd_config`, `/var/log/audit/audit.log`, and `/etc/audit/rules.d/` are a deliberate defence; removing them should only happen inside a short, audited maintenance window, with the flag restored immediately after. If an Ansible role needs to edit these files routinely, fix the root cause (don't set the flag), rather than toggling it. Monitor: add an auditd watch (`-w /etc/shadow -p wa`) and alert on `ausearch -k shadow_write` from a non-maintenance session."
    no_ansible_remediation: true
    cwe: ['CWE-281', 'CWE-732']
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1070.002', 'T1222', 'T1562.001']
    cis_controls: ['CIS-3.14', 'CIS-4.1']
    nist_controls: ['AC-3', 'AC-6', 'AU-9', 'SI-7']
    pci_dss: ['7.2.1', '10.3.4']
    hipaa: ['164.312(b)', '164.312(c)(1)']
    soc2: ['CC6.1', 'CC7.2']

  - id: "firewalld_flush_or_disable"
    category: "operational_security"
    severity: "HIGH"
    title: "firewalld Flushed, Stopped, or Set to Trusted Zone"
    description: "A task flushes every firewalld rule (`firewall-cmd --reload` after `--permanent --remove`), stops/disables the firewalld service, or moves the default zone to `trusted` (which accepts every packet). On RHEL 8/9 fleets this is the functional equivalent of `iptables -F` and is almost always either a post-exploitation evasion step or an operational foot-gun that silently exposes every bound service. The ansible.posix.firewalld module form (`state: absent` + `zone: trusted`) is equally dangerous and is how several Red-Hat-family ransomware campaigns in 2024-2025 opened C2 egress."
    regex: "(?:firewall-cmd\\s+(?:--permanent\\s+)?--set-default-zone=trusted\\b|firewall-cmd\\s+--panic-off\\s*;\\s*firewall-cmd\\s+--reload|systemctl\\s+(?:stop|disable|mask)\\s+firewalld|ansible\\.posix\\.firewalld\\s*:[\\s\\S]{0,200}?zone\\s*:\\s*[\"']?trusted|ansible\\.builtin\\.service\\s*:[\\s\\S]{0,120}?name\\s*:\\s*[\"']?firewalld[\"']?[\\s\\S]{0,120}?state\\s*:\\s*(?:stopped|absent))"
    positive_examples:
      - |2-
        ansible.posix.firewalld:
                # ...
                zone: trusted
    multiline: true
    window: 6
    recommendation: "Never flush or disable firewalld on production RHEL. To add a legitimate rule, use `ansible.posix.firewalld: zone: public, service: https, permanent: true, state: enabled`. If a host genuinely does not need a firewall (e.g. a bastion behind a dedicated security group), document the exception in `.security-scanner-allowlist.yml` with a business justification, not by disabling firewalld."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1562.004']
    cis_controls: ['CIS-4.4', 'CIS-4.5']
    nist_controls: ['CM-7', 'SC-7', 'SI-4']
    pci_dss: ['1.2.1']
    soc2: ['CC6.6', 'CC7.2']

  - id: "rsyslog_or_journald_stopped_masked"
    category: "operational_security"
    severity: "CRITICAL"
    title: "rsyslog / systemd-journald Stopped Or Masked (Log Destruction)"
    description: "A task stops, disables, or `systemctl mask`s `rsyslog`, `syslog-ng`, `systemd-journald`, or `auditd`, or sets `Storage=none` in `/etc/systemd/journald.conf`. Masking the logging subsystem is the canonical post-exploit anti-forensic move (MITRE T1562.001) - used by every modern Linux ransomware / miner / APT to blind incident-response before the destructive-action stage. There is no legitimate configuration-management reason to mask these services."
    regex: "(?:ansible\\.builtin\\.(?:systemd|service)|systemd_module)\\s*:[\\s\\S]{0,300}?name\\s*:\\s*['\"]?(?:rsyslog|syslog-ng|systemd-journald|auditd)['\"]?[\\s\\S]{0,200}?(?:state\\s*:\\s*(?:stopped|masked)|enabled\\s*:\\s*(?:false|no)|masked\\s*:\\s*(?:true|yes))|Storage\\s*=\\s*none\\b"
    positive_examples:
      - "Storage=none"
    multiline: true
    window: 25
    recommendation: "Remove the task. If a legitimate maintenance window needs rsyslog briefly stopped, use a tightly-scoped handler with a matching `state: started` restart and log the action to a remote SIEM via a separate channel (syslog-ng forwarder on a different host, or a Fluent Bit sidecar). Never use `masked: true` on a logging service. Monitor with auditd's `-w /bin/systemctl -p x -k systemctl_exec` and alert on any `stop`/`mask` targeting logging units."
    no_ansible_remediation: true
    cwe: ['CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1070.002', 'T1562.001']
    cis_controls: ['CIS-8.2', 'CIS-8.5', 'CIS-10.5']
    nist_controls: ['AU-2', 'AU-6', 'AU-9', 'AU-12', 'SI-4']
    pci_dss: ['10.2.1', '10.4.1', '12.10.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2', 'CC7.3']

  - id: "history_log_wiped_or_redirected_dev_null"
    category: "operational_security"
    severity: "HIGH"
    title: "Shell History Or System Log Redirected To /dev/null Or Wiped"
    description: "A task runs `> /dev/null`, `cat /dev/null >`, `truncate -s 0`, or `rm -f` targeting `~/.bash_history`, `~/.zsh_history`, `/var/log/auth.log`, `/var/log/secure`, `/var/log/syslog`, `/var/log/audit/audit.log`, or `/var/log/wtmp`. Legitimate log-rotation uses `logrotate` with `copytruncate` + a rotation policy, never ad-hoc `rm` or `> /dev/null` - this pattern is the defining indicator of T1070.003 Indicator Removal: Clear Command History / T1070.002 Clear Linux or Mac System Logs."
    regex: "(?:>\\s*/dev/null\\s*(?:2>&1)?|cat\\s+/dev/null\\s*>|truncate\\s+-s\\s*0\\s+|rm\\s+-f\\s+)[\\s\\S]{0,80}?(?:\\.bash_history|\\.zsh_history|\\.sh_history|/var/log/(?:auth\\.log|secure|syslog|messages|audit/audit\\.log|wtmp|btmp|lastlog))"
    positive_examples:
      - ">/dev/null.bash_history"
    multiline: true
    window: 3
    recommendation: "Remove the task. For log-size control, configure `logrotate` under `/etc/logrotate.d/` with `copytruncate`, `compress`, and `maxsize` directives. For history hygiene on shared hosts, rely on `HISTCONTROL=ignoreboth` and a remote session-recording tool (auditd + ausearch, or Teleport session recording) - never truncate live logs. Forward all auth/secure/audit logs off-host to a SIEM (rsyslog `@@siem:6514` over TLS) so a local wipe cannot destroy evidence."
    no_ansible_remediation: true
    cwe: ['CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1070.002', 'T1070.003']
    cis_controls: ['CIS-8.2', 'CIS-8.5', 'CIS-8.10']
    nist_controls: ['AU-2', 'AU-4', 'AU-9', 'AU-12']
    pci_dss: ['10.2.1', '10.3.1', '10.5.1']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "ntp_chrony_untrusted_upstream_nopeer_auth"
    category: "operational_security"
    severity: "HIGH"
    title: "chrony / ntpd Configured With Untrusted Upstream And No NTS/Symmetric-Key Authentication"
    description: "A task renders `/etc/chrony.conf` or `/etc/ntp.conf` with a public `pool`/`server` directive (e.g. `pool 0.pool.ntp.org iburst`) that lacks `nts`, `key`, or `autokey` authentication, AND `makestep 1.0 -1` is set (step any offset, at any time). Unauthenticated NTP is vulnerable to upstream spoofing attacks (Khronos / Chronos research) that step the clock arbitrarily backwards, causing certificate expiry bypass, Kerberos ticket replay (AS-REP window widening), and HSTS / HPKP pin expiry."
    regex: "(?:^|\\n)\\s*(?:pool|server)\\s+[^\\s#]+(?!\\s+(?:nts|key|autokey))(?:\\s+(?:iburst|minpoll|maxpoll)\\s*\\S*){0,4}[\\s\\S]{0,500}makestep\\s+\\d+(?:\\.\\d+)?\\s+-1\\b"
    positive_examples:
      - |2-
        server {{ server }}
        # ...
        makestep 1.0 -1
    multiline: true
    window: 40
    recommendation: "Use NTS-secured upstreams (`server time.cloudflare.com iburst nts` / `server nts.ptb.de iburst nts`) or symmetric-key authenticated internal NTP (`keyfile /etc/chrony.keys`, `server <internal> key 1`). Bound `makestep` so the clock can only be stepped at daemon start: `makestep 1.0 3` (step ≤1s offset, only on first 3 updates). Monitor large step events with `chronyc tracking` + journalctl on `chronyd.service` and alert on non-zero `Update interval` anomalies."
    cwe: ['CWE-345', 'CWE-346', 'CWE-613']
    owasp_appsec: ["A07:2021", "A08:2021"]
    mitre_attack: ['T1557', 'T1565.002']
    cis_controls: ['CIS-2.1', 'CIS-8.4']
    nist_controls: ['AU-8', 'SC-8', 'SC-45']
    pci_dss: ['10.6.1', '10.6.3']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "aide_tripwire_samhain_db_destroyed"
    category: "operational_security"
    severity: "HIGH"
    title: "File-Integrity Baseline Destroyed - AIDE / Tripwire / Samhain DB Removed Or Reinitialised Without Archive"
    description: "A task `rm`s `/var/lib/aide/aide.db*`, `/var/lib/tripwire/*.twd`, `/var/lib/samhain/samhain_file`, or runs `aide --init` / `tripwire --init` / `samhain -t init` WITHOUT first copying the previous DB to an out-of-band archive. The file-integrity baseline IS the after-the-fact forensic evidence of what changed on disk since last scan; destroying it (or reinitialising without preserving the prior baseline) creates an anti-forensic gap that is the hallmark of post-exploit cleanup, especially in ransomware playbooks and in Mustang Panda / Volt Typhoon Linux intrusions (2024)."
    regex: "(?:rm\\s+-[rf]+\\s+|ansible\\.builtin\\.file[\\s\\S]{0,200}?state\\s*:\\s*absent[\\s\\S]{0,200}?path\\s*:\\s*)['\"]?(?:/var/lib/aide/aide\\.db[^'\"\\s]*|/var/lib/tripwire/[^'\"\\s]*\\.twd|/var/lib/samhain/samhain_file)|(?:aide\\s+--init|tripwire\\s+(?:--init|-m\\s+i)|samhain\\s+-t\\s+init)(?![\\s\\S]{0,1000}(?:cp\\s+|copy\\s*:|backup|archive|s3\\s+cp|rsync))"
