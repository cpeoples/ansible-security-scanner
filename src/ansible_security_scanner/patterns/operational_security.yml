name: "Operational Security Patterns"
author: "Ansible Security Scanner Team"
description: >
  Detects operational security risks: untrusted package repositories, rogue CA
  certificates, network reconnaissance, log tampering, unauthorized persistence
  mechanisms, SSH tunneling, database CLI abuse, and untrusted Ansible Galaxy roles.

patterns:
  # -- Untrusted Package Repositories ---------------------------------------

  - id: "untrusted_apt_repo"
    category: "operational_security"
    severity: "HIGH"
    title: "Untrusted APT Repository Added"
    description: "Adds a third-party APT repository, which could serve malicious packages"
    regex: "apt_repository:|add-apt-repository|echo.*>/etc/apt/sources\\.list"
    positive_examples:
      - "apt_repository: repo=\"ppa:ansible/ansible\""
    recommendation: "Only use approved internal package mirrors; vet third-party repos through security review"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']
    stig: ['V-230221']

  - id: "untrusted_yum_repo"
    category: "operational_security"
    severity: "HIGH"
    title: "Untrusted YUM Repository Added"
    description: "Adds a third-party YUM/DNF repository, which could serve malicious packages"
    regex: "yum_repository:|dnf.*config-manager.*--add-repo"
    positive_examples:
      - "cmd: dnf config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo"
    recommendation: "Only use approved internal package mirrors; vet third-party repos through security review"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']
    stig: ['V-230221']

  - id: "package_gpg_check_disabled"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Package GPG Verification Disabled"
    description: "Disables GPG signature verification for package installs, allowing unsigned/tampered packages"
    regex: "gpgcheck\\s*[:=]\\s*(?:no|0|false)|--nogpgcheck|--allow-unauthenticated|--force-yes"
    positive_examples:
      - "shell: apt-get upgrade -oDir::Etc::SourceList=/etc/apt/security.sources.list --force-yes -y"
    recommendation: "Never disable GPG verification; ensure all package sources have valid signing keys"
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']
    stig: ['V-230221']

  # -- Certificate Trust Store Manipulation ---------------------------------

  - id: "rogue_ca_certificate"
    category: "operational_security"
    severity: "CRITICAL"
    title: "CA Certificate Installation"
    description: "Installs a CA certificate into the system trust store, enabling MITM attacks on TLS"
    regex: "update-ca-certificates|update-ca-trust|copy.*\\.crt.*dest.*/usr/local/share/ca-certificates|copy.*\\.crt.*dest.*/etc/pki/ca-trust"
    positive_examples:
      - "command: update-ca-trust"
    recommendation: "CA certificate installation must go through approved PKI workflows with security review"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "ssl_cert_generation"
    category: "operational_security"
    severity: "MEDIUM"
    title: "SSL Certificate Generated in Playbook"
    description: "Generates self-signed or custom SSL certificates from a playbook"
    regex: "openssl\\s+req\\s+.*-newkey|openssl\\s+x509\\s+.*-signkey|openssl\\s+genrsa"
    positive_examples:
      - "openssl req -x509 -batch -sha256 -days 1825 -newkey rsa:2048 -nodes -keyout /root/ca.key -out /usr/local/share/ca-certificates/ca.crt"
    recommendation: "Use an approved certificate authority (Let's Encrypt, internal CA); avoid self-signed certs"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Network Reconnaissance -----------------------------------------------

  - id: "network_port_scan"
    category: "operational_security"
    severity: "HIGH"
    title: "Network Port Scanning"
    description: "Runs network port scanning tools, which is a reconnaissance technique"
    regex: "\\bnmap\\s+|\\bmasscan\\s+|\\bzmap\\s+|\\bnetcat\\s+.*-z"
    positive_examples:
      - "- nmap inventory plugin - use ``raise ... from ...`` when passing on exceptions (https://github.com/ansible-collections/community.general/pull/11095)."
    recommendation: "Network scanning should only be performed by authorized security teams, not from playbooks"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "network_packet_capture"
    category: "operational_security"
    severity: "HIGH"
    title: "Network Packet Capture"
    description: "Captures network traffic, potentially intercepting credentials and sensitive data"
    regex: "\\btcpdump\\s+|\\btshark\\s+|\\bwireshark|pcap"
    positive_examples:
      - "qhv8FwdoPFNh8TC11btfU1wphcBl65pCaPff2s94/Gj2aQ0PrFYuhPtzqwARAQAB"
    recommendation: "Network capture should only be performed by authorized network teams with proper controls"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Log Tampering / Evidence Destruction ---------------------------------

  - id: "log_file_deletion"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Log File Deletion or Truncation"
    description: "Deletes, truncates, or overwrites system log files to cover tracks"
    regex: "(?:rm|truncate|shred)\\s+.*(?:/var/log|/var/adm|syslog|auth\\.log|secure|messages|wtmp|btmp|lastlog)"
    positive_examples:
      - "- name: Perform Secure Erase operation on SED drive"
    recommendation: "Never delete log files from automation; use centralized log shipping (rsyslog, Fluentd)"
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "history_file_tampering"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Shell History Tampering"
    description: "Clears or disables shell command history to hide executed commands"
    regex: "history\\s+-c|>\\s*~/\\.bash_history|>\\s*~/\\.zsh_history|HISTFILE=/dev/null|HISTSIZE=0|unset\\s+HISTFILE"
    positive_examples:
      - "history -c"
    recommendation: "Never tamper with shell history; this is a strong indicator of malicious intent"
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "audit_log_tampering"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Audit System Tampering"
    description: "Stops or modifies the Linux audit system (auditd) to hide activity"
    regex: "(?:systemctl|service)\\s+(?:stop|disable)\\s+auditd|auditctl\\s+-D|auditctl\\s+-e\\s+0"
    positive_examples:
      - "systemctl stop auditd"
    recommendation: "Never disable auditd; this is a strong indicator of malicious intent"
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Unauthorized Persistence Mechanisms ----------------------------------

  - id: "systemd_service_creation"
    category: "operational_security"
    severity: "MEDIUM"
    title: "Suspicious systemd Service Unit Created"
    description: "A task creates a systemd unit that looks like an ad-hoc persistence mechanism rather than a managed configuration-management deployment. Pure managed deployments (``/etc/systemd/system/nginx.service``, ``kubelet.service``, ``docker.service``) are expected and are NOT flagged. This rule fires only when the unit has a SUSPICIOUS shape: the ``ExecStart=`` target lives in a writable/ephemeral path (``/tmp/``, ``/var/tmp/``, ``/dev/shm/``, ``~/``, ``/home/.../``), OR the unit points to a just-downloaded binary whose path contains ``download``/``installer``/``update``, OR the unit name looks randomised (hex-only basename). These are the shapes reported in IR write-ups for Kinsing, SysUpdate, APT28/Diplomatic Orbiter, and MITRE T1543.002 (Systemd Service) - NOT the `foo.service` that ops teams manage every day."
    # Fire ONLY on suspicious unit shapes:
    #   1. ``ExecStart=`` pointing into a world-writable / ephemeral
    #      path (``/tmp``, ``/var/tmp``, ``/dev/shm``, ``~/``) - the
    #      canonical T1543.002 staging pattern.
    #   2. ``/etc/systemd/system/<basename>.service`` where basename
    #      is ≥16 chars of hex only (randomised name -> malware beacon).
    regex: "(?mi)(?:^\\s*ExecStart\\s*=\\s*(?:/tmp/|/var/tmp/|/dev/shm/|~/|/home/[^/\\s]+/\\.cache/|/home/[^/\\s]+/tmp/)[^\\n]+|/etc/systemd/system/[a-f0-9]{16,}\\.service(?=[\"'\\s]|$))"
    recommendation: "If the service is legitimate, move the binary to a managed location (``/usr/local/bin/`` or a package-managed path) and reference it from there; ephemeral/user-writable ``ExecStart=`` targets let any local user (or any process with equivalent write access) hijack a root-context service at boot."
    no_ansible_remediation: true
    positive_examples:
      - |2-
              content: |
                [Service]
                ExecStart=/tmp/backdoor.sh
      - |2-
              content: |
                [Service]
                ExecStart=/dev/shm/agent
      - |2-
              content: |
                [Service]
                ExecStart=/home/user/.cache/update.sh
      - "    path: /etc/systemd/system/a3f9b10d5e6c8471.service"
    negative_examples:
      - "    path: /etc/systemd/system/nginx.service"
      - "    path: /etc/systemd/system/demoinabox.service"
      - "    path: /etc/systemd/system/diab.service"
      - "    path: /etc/systemd/system/kubelet.service"
      - |2-
              content: |
                [Service]
                ExecStart=/usr/local/bin/my-agent
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "init_script_creation"
    category: "operational_security"
    severity: "HIGH"
    title: "Init Script Creation"
    description: "Creates SysV init scripts or rc.local entries for persistence"
    regex: "/etc/init\\.d/.*\\b(?:start|stop)|/etc/rc\\.local|update-rc\\.d"
    positive_examples:
      - "ExecStart = /etc/init.d/elastichq start"
    recommendation: "Use approved configuration management for service lifecycle, not init script manipulation"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "xdg_autostart_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "XDG Autostart Persistence"
    description: "Writes desktop entries to XDG autostart directories, executing programs at user login"
    regex: '(?:dest|path):\s*[''"]?(?:~|\{\{.*\}\})?/\.config/autostart/.*\.desktop|/etc/xdg/autostart/.*\.desktop'
    positive_examples:
      - "dest:/.config/autostart/.desktop"
    recommendation: "XDG autostart entries should be deployed through approved configuration management only"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "anacron_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "Anacron Persistence"
    description: "Writes to anacrontab or anacron spool to schedule persistent command execution"
    regex: '/etc/anacrontab|/var/spool/anacron'
    positive_examples:
      - "/etc/anacrontab"
    recommendation: "Scheduled tasks should use approved orchestration; do not modify anacrontab in playbooks"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "udev_rules_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "udev Rules Persistence"
    description: "Creates udev rules with RUN directives to execute commands when hardware events occur"
    regex: '/etc/udev/rules\.d/.*\.rules|RUN\+?=.*[''"]/'
    positive_examples:
      - "pidfile_run=\"/run/$(basename \"${0}\").pid\""
    recommendation: "udev rules must go through approved system configuration; RUN= allows arbitrary command execution"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "dpkg_apt_hooks_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "APT/dpkg Hook Persistence"
    description: "Installs APT hooks or dpkg triggers that execute commands during package operations"
    regex: '/etc/apt/apt\.conf\.d/|DPkg::(?:Post-Invoke|Pre-Invoke|Pre-Install-Pkgs)'
    positive_examples:
      - "path:  '{{ \"/etc/apt/apt.conf.d/\" + (item.filename | d(item.name | regex_replace(\".conf$\", \"\") + \".conf\")) }}'"
    recommendation: "APT hooks can execute arbitrary code on every package install; use approved config management"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "modules_load_d_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "Kernel Module Auto-Load Persistence"
    description: "Writes to modules-load.d to automatically load kernel modules at boot"
    regex: '/etc/modules-load\.d/.*\.conf'
    positive_examples:
      - "dest: '/etc/modules-load.d/{{ item.filename | d(item.name | replace(\"_\", \"-\") + \".conf\") }}'"
    recommendation: "Kernel module auto-loading must be managed through approved system hardening workflows"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "networkmanager_dispatcher_persistence"
    category: "operational_security"
    severity: "HIGH"
    title: "NetworkManager Dispatcher Persistence"
    description: "Writes scripts to NetworkManager dispatcher.d, executing code on network events"
    regex: '/etc/NetworkManager/dispatcher\.d/'
    positive_examples:
      - "/etc/NetworkManager/dispatcher.d/"
    recommendation: "NetworkManager dispatcher scripts run as root on network changes; use approved config management"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- SSH Tunneling / Unauthorized Network Access --------------------------

  - id: "ssh_tunnel_creation"
    category: "operational_security"
    severity: "HIGH"
    title: "SSH Tunnel or Port Forwarding"
    description: "Creates SSH tunnels or reverse port forwards, bypassing network controls"
    regex: "ssh\\s+.*-[LRD]\\s+|ssh\\s+.*-o\\s+.*Tunnel|autossh\\s+"
    positive_examples:
      - "ssh -M -S '{{ xdebug_tunnel_control_socket }}' -fnNT -R {{ xdebug_tunnel_port_mapping }} {{ xdebug_tunnel_user_at_host }} '{{ xdebug_tunnel_control_identity }}'"
    recommendation: "Use approved VPN or network access solutions, not SSH tunnels from playbooks"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "ssh_config_manipulation"
    category: "operational_security"
    severity: "HIGH"
    title: "SSH Configuration Manipulation"
    description: "Modifies SSH server or client configuration with weakening settings"
    regex: "PermitRootLogin\\s+yes|PasswordAuthentication\\s+yes|StrictHostKeyChecking\\s+no|ChallengeResponseAuthentication\\s+yes|UsePAM\\s+no|PermitEmptyPasswords\\s+yes|Protocol\\s+1(?!\\d)"
    positive_examples:
      - "line: PasswordAuthentication yes"
    recommendation: "SSH hardening should follow CIS benchmarks; never weaken SSH config from playbooks"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']
    stig: ['V-230386', 'V-230388']

  # -- Database CLI with Credentials ----------------------------------------

  - id: "database_cli_credentials"
    category: "operational_security"
    severity: "HIGH"
    title: "Database CLI with Inline Credentials"
    description: "Runs database CLI commands with credentials visible in the command line"
    regex: "mysql\\s+.*-p[^\\s]|psql\\s+.*(?:PGPASSWORD|postgresql://.*:.*@)|mongo\\s+.*(?:--password|mongodb://.*:.*@)|redis-cli\\s+.*-a\\s+"
    positive_examples:
      - "redis-cli -a \"$(redis-password)\" -n \"${REDIS_DATABASE}\" --raw keys \"blobs::sha256:*\" 2>/dev/null \\"
    recommendation: "Use credential files (.my.cnf, .pgpass) or environment variables, not inline passwords"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Ansible Galaxy Untrusted Roles ---------------------------------------

  - id: "ansible_galaxy_untrusted"
    category: "operational_security"
    severity: "MEDIUM"
    title: "Ansible Galaxy Role from External Source"
    description: "Installs Ansible Galaxy roles or collections by ad-hoc name on the command line, with no version pin and no requirements file. The hardened pattern is ``ansible-galaxy install -r requirements.yml`` (or ``collection install -r``) where the requirements file pins versions / sources / signatures."
    regex: "ansible-galaxy\\s+(?:install|collection\\s+install|role\\s+install)\\s+(?!(?:[A-Za-z0-9_=-]+\\s+)*-r\\b)(?!(?:[A-Za-z0-9_=-]+\\s+)*--requirements-file\\b)(?!(?:[A-Za-z0-9_=-]+\\s+)*--role-file\\b)[^\\s-]"
    positive_examples:
      - "- shell: ansible-galaxy install geerlingguy.nginx"
      - "- shell: ansible-galaxy collection install community.general"
    negative_examples:
      - "- shell: ansible-galaxy collection install -r requirements.yml"
      - "- shell: ansible-galaxy install --requirements-file roles.yml"
    recommendation: "Always install via a pinned ``requirements.yml`` (``ansible-galaxy install -r requirements.yml``). Pin every entry to a version (``version: 1.2.3``), or for git sources to a full 40-char SHA. For collections, pin via ``signatures:`` (Sigstore / GPG) when the source supports it. Run installs against an internal Galaxy proxy you control; avoid the public ``galaxy.ansible.com`` for production."
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "git_clone_in_playbook"
    category: "operational_security"
    severity: "MEDIUM"
    title: "Git Repository Cloned in Playbook"
    description: "Clones a git repository from within a playbook, pulling potentially untrusted code"
    regex: "git\\s+clone\\s+https?://"
    positive_examples:
      - "git clone https://github.com/containers/podman.git /tmp/podman"
    recommendation: "Pin git clone to specific tags/SHAs; prefer internal mirrors for external repositories"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Firewall Manipulation ------------------------------------------------

  - id: "firewall_disable"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Host Firewall Disabled"
    description: "Disables or flushes iptables/nftables/firewalld rules on the host"
    regex: "iptables\\s+-F|iptables\\s+--flush|nft\\s+flush|(?:systemctl|service)\\s+(?:stop|disable)\\s+(?:firewalld|ufw)|ufw\\s+disable"
    positive_examples:
      - "iptables -F"
    recommendation: "Never disable host firewalls from playbooks; manage rules through approved IaC"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- DNS Exfiltration -----------------------------------------------------

  - id: "dns_exfiltration"
    category: "operational_security"
    severity: "HIGH"
    title: "Potential DNS Exfiltration"
    description: "Uses DNS queries with encoded data, a common data exfiltration technique"
    regex: "(?:nslookup|\\bdig\\b|\\bhost\\b)\\s+['\"]?\\$\\("
    positive_examples:
      - "Write-Host \"$($acl.AccessRight)|$($acl.AccessControlType)|$($acl.AccountName)\""
    recommendation: "DNS queries should not contain dynamic/variable data; this pattern suggests data exfiltration"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- Kernel Module Loading ------------------------------------------------

  - id: "kernel_module_load"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Kernel Module Loading"
    description: "Loads kernel modules, which could install rootkits or keyloggers"
    regex: "\\binsmod\\s+|\\bmodprobe\\s+|/lib/modules/"
    positive_examples:
      - "- modprobe - remove redundant conversions to unicode (https://github.com/ansible-collections/community.general/pull/11098)."
    recommendation: "Kernel module management should go through approved system hardening workflows"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']
    stig: ['V-230234', 'V-230237']

  # -- Crypto Mining ----------------------------------------------------------

  - id: "crypto_mining_binary"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Cryptocurrency Miner Detected"
    description: "Installs or executes cryptocurrency mining software, abusing compute resources"
    regex: "\\b(?:xmrig|cgminer|ethminer|bfgminer|cpuminer|minerd|nicehash|nbminer|t-rex|phoenixminer|lolminer|gminer|cryptonight|stratum\\+tcp://|ccminer|srbminer|teamredminer|xmr-stak|xmrig-proxy)\\b"
    positive_examples:
      - "git: repo=git://github.com/pooler/cpuminer.git dest=/opt/cpuminer accept_hostkey=yes"
    recommendation: "Crypto mining is never permitted on managed infrastructure; remove immediately and investigate"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  - id: "crypto_mining_pool"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Cryptocurrency Mining Pool Connection"
    description: "Connects to a known mining pool, strong indicator of unauthorized crypto mining"
    regex: "(?:pool\\.|mining\\.|mine\\.).*:\\d{4,5}|stratum\\+(?:tcp|ssl)://|(?:nanopool|2miners|f2pool|ethermine|hiveon|nicehash)\\.(?:com|org)"
    positive_examples:
      - "pool.:0000"
    recommendation: "Mining pool connections are never legitimate in automation; investigate immediately"
    no_ansible_remediation: true
    nist_controls: ['AU-6', 'CA-7', 'SI-4']
    pci_dss: ['10.4.1', '12.10.1']
    soc2: ['CC7.2']

  # -- LD_PRELOAD / Shared Library Injection ----------------------------------

  - id: "ld_preload_injection"
    category: "operational_security"
    severity: "CRITICAL"
    title: "LD_PRELOAD Library Injection"
    description: "Sets LD_PRELOAD to inject a shared library into processes, hijacking function calls"
    regex: "LD_PRELOAD\\s*=|ld\\.so\\.preload|/etc/ld\\.so\\.preload"
    positive_examples:
      - "Environment=LD_PRELOAD={{ libfaketime_path.stdout_lines[0].strip() }}"
