  - id: "aws_organizations_scp_detached_or_deleted"
    category: "operational_security"
    severity: "CRITICAL"
    title: "AWS Organizations SCP Detached Or Deleted (Org-Wide Guardrail Removed)"
    description: "A task runs `aws organizations detach-policy --policy-id <scp>` (detaches SCP from OU/account) or `aws organizations delete-policy --policy-id <scp>` (removes the policy entirely). Service Control Policies are the org-wide always-on guardrails (block root usage, deny CloudTrail-disable, deny region-usage outside approved list). Removing one drops the entire set of protections for every account below that OU simultaneously. Every 2024 enterprise-level AWS ransomware / crypto-mining incident with lateral movement between accounts (Mandiant M-Trends 2025) involves SCP detachment as a pre-attack step."
