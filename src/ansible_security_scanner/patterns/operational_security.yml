  - id: "kafka_security_inter_broker_protocol_plaintext"
    category: "operational_security"
    severity: "HIGH"
    title: "Kafka security.inter.broker.protocol=PLAINTEXT (Cleartext Cluster Replication)"
    description: "A task renders `server.properties` with `security.inter.broker.protocol=PLAINTEXT` or `listener.security.protocol.map` containing `INTERNAL:PLAINTEXT` for the inter-broker listener. Kafka brokers continuously replicate partition data to each other; plaintext inter-broker means every record (and thus every message in every topic) crosses the wire unencrypted during replication. For multi-AZ / multi-region clusters this is an inter-datacenter cleartext fan-out - whoever owns a single L2/L3 hop captures every production topic. Confluent's 2024 hardening docs list this as a P0 finding. Existing Kafka TLS rules catch client-facing SSL but not the inter-broker listener specifically."
    regex: "(?:security\\.inter\\.broker\\.protocol\\s*=\\s*PLAINTEXT\\b|inter_broker_protocol\\s*[:=]\\s*['\"]?PLAINTEXT['\"]?|listener\\.security\\.protocol\\.map\\s*=\\s*[^\\n]*?(?:INTERNAL|BROKER|PLAINTEXT_HOST):PLAINTEXT\\b)"
    positive_examples:
      - "security.inter.broker.protocol=PLAINTEXT"
    multiline: true
    window: 5
    recommendation: "Set `security.inter.broker.protocol=SSL` (TLS, or `SASL_SSL` for authN+TLS). Configure `listener.security.protocol.map=CLIENT:SASL_SSL,INTERNAL:SSL`, `inter.broker.listener.name=INTERNAL`. Provision TLS certs via cert-manager (k8s) or Vault PKI (VMs) with per-broker hostnames; rotate annually. Enable mTLS between brokers: `ssl.client.auth=required`. For in-transit protection of consumer groups too, use `security.protocol=SSL` on the client side. Audit: `kafka-configs --bootstrap-server <broker>:9092 --entity-type brokers --describe | grep listeners` - verify no `PLAINTEXT://` entries. Enforce at org scope via Confluent RBAC policy `require_tls=true`."
    cwe: ['CWE-311', 'CWE-319', 'CWE-326']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V11.2.5, V11.3.1, V11.3.2, V11.4.1, V14.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1040', 'T1552.001']
    cis_controls: ['CIS-3.10', 'CIS-14.4']
    nist_controls: ['SC-8', 'SC-8(1)', 'SC-13']
    pci_dss: ['4.2.1']
    hipaa: ['164.312(e)(1)', '164.312(e)(2)(ii)']
    soc2: ['CC6.7']

  - id: "nats_server_authorization_disabled_or_accounts_system_user_default"
    category: "operational_security"
    severity: "HIGH"
    title: "NATS Server Authorization Disabled Or System Account Default (Unauthenticated Pub/Sub)"
    description: "A task renders a NATS `server.conf` without an `authorization {}` block AND with a `listen: 0.0.0.0:4222` (or any non-loopback address), OR explicitly sets `no_auth_user:` to grant a principal `$SYS` account-level access. NATS defaults to NO AUTH on fresh installs - deploying a NATS cluster to a non-loopback address without configuring authorization exposes the entire pub/sub bus to any TCP client that can reach 4222/tcp (monitoring port 8222 too). The `$SYS` account has cluster-admin privileges and should never be granted to a regular client. The 2024 Synadia hardening guide lists authorization-disabled as the #1 NATS misconfiguration they observe in production audits."
    regex: "(?:nats-server|server\\.conf|nats\\.conf|nats_config)[\\s\\S]{0,500}?(?:listen\\s*[:=]\\s*['\"]?(?:0\\.0\\.0\\.0|[^'\\\"\\s:]+):[0-9]+['\"]?(?:(?!authorization\\s*\\{)[\\s\\S]){0,800}|no_auth_user\\s*[:=]\\s*['\"][^'\"]+['\"]|accounts\\s*:\\s*\\{[\\s\\S]{0,400}?\\$SYS[\\s\\S]{0,200}?users\\s*:)"
    positive_examples:
      - "nats-serverlisten:0.0.0.0:0"
    multiline: true
    window: 50
    recommendation: "Configure the `authorization {}` block with per-user credentials or (better) NKey / JWT-based auth: `authorization { users = [{ user: svc-orders, password: $2a$11$... }, { nkey: UABC... }] }`. For multi-tenant clusters use decentralized accounts (NATS 2.x): `operator: /etc/nats/operator.jwt` + per-tenant account JWTs. Enable TLS on the listen address: `tls { cert_file, key_file, verify: true }`. Never include real users in the `$SYS` account - reserve it for cluster-admin only, deploy an enterprise NATS Admin Console for access. For dev/test clusters, bind to loopback: `listen: 127.0.0.1:4222`. Audit open NATS ports: `nmap -p 4222,8222 <subnet>` - any response from an uncredentialed probe is a finding."
    cwe: ['CWE-284', 'CWE-287', 'CWE-306']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1040', 'T1190', 'T1210']
    cis_controls: ['CIS-3.3', 'CIS-4.7', 'CIS-12.6']
    nist_controls: ['AC-3', 'AC-6', 'IA-2']
    pci_dss: ['2.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(a)(2)(i)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "backup_repo_immutable_lock_disabled_veeam_commvault_rubrik"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Backup Repository Immutability / Object-Lock Disabled (Veeam / Commvault / Rubrik / Cohesity)"
    description: "A task renders a backup-repository config with immutability disabled: Veeam `SOBR` / `Repository` `makeRecentBackupsImmutableDays: 0` / `immutabilityEnabled: false`, Commvault `Lock-enabled: false` on a WORM cloud library, Rubrik `retention_lock_enabled: false`, Cohesity `dataLockConfig.lockDurationUsecs: 0`, or `aws s3 put-object-lock-configuration` with `Status: Disabled` on a backup bucket. Ransomware operators' 2023-2025 playbook (LockBit, ALPHV/BlackCat, Akira, Black Basta) specifically targets backup infrastructure FIRST - Mandiant M-Trends 2025 found 78% of ransomware victims had backups compromised before encryption. Immutability (WORM / Object Lock in Compliance mode) is the only backup defense that cannot be disabled even by a domain-admin-equivalent actor within the retention window. Veeam v12+ enforces immutability by default; explicitly disabling it is a deliberate downgrade."
    regex: "(?:makeRecentBackupsImmutableDays\\s*[:=]\\s*0|immutabilityEnabled\\s*[:=]\\s*['\"]?false['\"]?|(?:veeam|vbr)[\\s\\S]{0,500}?(?:enableImmutability|ImmutabilityPeriod)\\s*[:=]\\s*(?:['\"]?0['\"]?|['\"]?false['\"]?)|(?:commvault|cvrepository)[\\s\\S]{0,400}?(?:lock[-_]enabled|WORMEnabled|retentionLockEnabled)\\s*[:=]\\s*['\"]?(?:false|no|0)['\"]?|(?:rubrik|polaris)[\\s\\S]{0,400}?retention_lock_enabled\\s*[:=]\\s*['\"]?false['\"]?|(?:cohesity|dataLockConfig)[\\s\\S]{0,400}?lockDurationUsecs\\s*[:=]\\s*0\\b|aws\\s+s3api?\\s+put-object-lock-configuration[\\s\\S]{0,400}?(?:ObjectLockEnabled|Status)\\s*[:=]\\s*['\"]?(?:Disabled|Suspended)['\"]?)"
    positive_examples:
      - "makeRecentBackupsImmutableDays:0"
    multiline: true
    window: 25
    recommendation: "Enable immutability on every backup repository with minimum 14-day retention (PCI-scoped: 30 days; HIPAA/regulated: 90+ days). Veeam: `Hardened Repository` with XFS + filesystem-level immutability + `Immutable for: 30 days` policy + separate non-domain-joined backup-service account. Commvault: WORM-enabled storage policy + Cloud Storage Lock with S3 Object Lock in Compliance mode. Rubrik: SLA with `retention_lock_mode: COMPLIANCE` + `snapshot_archival_lock_duration_days: 30`. Cohesity: DataLock with `lockDurationUsecs: 2592000000000` (30 days in µs). For cloud S3-backed backups: `aws s3api put-object-lock-configuration --bucket backups --object-lock-configuration 'ObjectLockEnabled=Enabled,Rule={DefaultRetention={Mode=COMPLIANCE,Days=30}}'` + separate AWS account with SCP denying `s3:PutObjectLockConfiguration` / `s3:BypassGovernanceRetention` from anyone outside break-glass role. Test quarterly via ransomware-simulation: attempt deletion as domain-admin - must fail. Audit: Veeam `Get-VBRBackupRepository | Select Name, ImmutabilityPeriodDays` / `aws s3api get-object-lock-configuration --bucket <b>`."
    no_ansible_remediation: true
    cwe: ['CWE-693', 'CWE-732', 'CWE-1326']
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1485', 'T1490', 'T1565.001']
    cis_controls: ['CIS-11.1', 'CIS-11.2', 'CIS-11.5']
    nist_controls: ['CP-9', 'CP-9(5)', 'CP-10']
    pci_dss: ['9.4.1', '12.10.1']
    hipaa: ['164.308(a)(7)(ii)(A)', '164.308(a)(7)(ii)(B)']
    soc2: ['A1.2', 'A1.3', 'CC7.5']

  - id: "kvm_libvirt_tcp_listen_no_tls"
    category: "operational_security"
    severity: "HIGH"
    title: "libvirt / KVM Daemon Listening On TCP Without TLS (Unauthenticated Hypervisor Control)"
    description: "A task renders `/etc/libvirt/libvirtd.conf` or systemd-override with `listen_tcp = 1` + `auth_tcp = \"none\"` / `auth_tcp = \"sasl\"` without `listen_tls = 1`, or sets `LIBVIRTD_ARGS=\"--listen\"` + `/etc/sysconfig/libvirtd` with TLS disabled, OR connects via `virsh -c qemu+tcp://host/system` / `qemu+unix:///system?socket=/var/run/libvirt/libvirt-sock` + `auth_unix_rw=\"none\"`. libvirt's TCP transport (port 16509) is the remote-management API - without TLS and with `auth_tcp=none`, any network-reachable client can list, create, destroy, and exfiltrate (via disk-snapshot + SCP) every VM on the hypervisor. 2024 OVH / Proxmox forum reports show multiple commodity-malware campaigns auto-scanning 16509/tcp for this config. Distinct from ESXi shell rules (different product); this is the Linux/KVM/Proxmox/oVirt exposure path."
    regex: "(?:/etc/libvirt/libvirtd\\.conf|libvirtd\\.conf|LIBVIRTD_ARGS|/etc/sysconfig/libvirtd)[\\s\\S]{0,800}?(?:listen_tcp\\s*=\\s*1|LIBVIRTD_ARGS[\\s\\S]{0,100}?--listen)[\\s\\S]{0,600}?(?:auth_tcp\\s*=\\s*['\"]?(?:none|sasl)['\"]?|listen_tls\\s*=\\s*0)|auth_tcp\\s*=\\s*['\"]?none['\"]?|(?:virsh\\s+-c\\s+qemu\\+tcp://|qemu\\+tcp://[^/]+/system)|auth_unix_(?:ro|rw)\\s*=\\s*['\"]?none['\"]?"
    positive_examples:
      - "/etc/libvirt/libvirtd.conflisten_tcp=1auth_tcp=none"
    multiline: true
    window: 25
    recommendation: "Never use `listen_tcp = 1` + `auth_tcp = none`. For remote libvirt management, use `libvirt+ssh://` transport (port 22, uses SSH keys - already authenticated and encrypted): `virsh -c qemu+ssh://root@hypervisor/system`. For high-throughput remote APIs (oVirt / RHEV manager), use `libvirt+tls://` (port 16514) with: `listen_tcp = 0`, `listen_tls = 1`, `auth_tls = \"x509\"`, cert pinning via `tls_allowed_dn_list`, + firewall inbound 16514 to the management-network CIDR only. Disable the listen entirely on hypervisors managed only locally: remove `--listen` from `LIBVIRTD_ARGS` and rely on `/var/run/libvirt/libvirt-sock` (Unix socket, requires local login + group membership). For VM tenancy on a multi-customer host, use per-tenant AppArmor/SELinux profiles + sVirt. Audit: `ss -tlnp | grep ':16509'` must return nothing on production + `virsh -c qemu+tcp://<host>/system list` from another host must fail. Rotate any TLS certs used for libvirt management annually."
    cwe: ['CWE-284', 'CWE-306', 'CWE-319']
    owasp_appsec: ["A01:2021", "A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1021', 'T1133', 'T1563']
    cis_controls: ['CIS-3.10', 'CIS-4.7', 'CIS-12.6']
    nist_controls: ['AC-3', 'IA-2', 'SC-8']
    pci_dss: ['2.2.1', '4.2.1', '8.3.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.7']

  - id: "linux_cap_bpf_granted_to_container_or_service"
    category: "operational_security"
    severity: "HIGH"
    title: "CAP_BPF / CAP_PERFMON / CAP_SYS_ADMIN granted to a container, pod, or systemd unit"
    description: "A task adds `CAP_BPF`, `CAP_PERFMON`, or `CAP_SYS_ADMIN` to a Docker / Podman / containerd / Kubernetes pod `securityContext.capabilities.add` or to a systemd `AmbientCapabilities` / `CapabilityBoundingSet`. These caps (or the older catch-all CAP_SYS_ADMIN) give a workload the ability to load unprivileged eBPF programs, hook kprobes/uprobes, and read kernel memory - an ideal LPE / credential-dumping / syscall-tampering primitive. 2024 research (TracerFS, BadBPF, Project Zero eBPF verifier bypasses CVE-2024-26589, CVE-2024-40967) repeatedly demonstrated kernel-privilege escalation from these caps. Also catches the deprecated `unconfined` AppArmor profile used to bypass the same restrictions."
    regex: "(?:(?:securityContext|security_context)[\\s\\S]{0,400}?capabilities[\\s\\S]{0,200}?add[\\s\\S]{0,200}?['\"]?(?:BPF|PERFMON|SYS_ADMIN|NET_ADMIN|SYS_MODULE|SYS_PTRACE)['\"]?|(?:docker|podman)[\\s\\S]{0,300}?(?:--cap-add[=\\s]+(?:BPF|PERFMON|SYS_ADMIN|ALL)|--privileged\\b)|AmbientCapabilities\\s*=\\s*[^\\n]*(?:CAP_BPF|CAP_PERFMON|CAP_SYS_ADMIN)|CapabilityBoundingSet\\s*=\\s*[^\\n]*(?:CAP_BPF|CAP_PERFMON|CAP_SYS_ADMIN)|apparmor_profile\\s*[:=]\\s*['\"]?unconfined['\"]?)"
    positive_examples:
      - |2-
        DOCKERHOST = DOCKERHOST
        	# ...
        	docker run --rm --privileged
    multiline: true
    window: 20
    recommendation: "Run workloads with the kernel-default `NET_BIND_SERVICE` + nothing else; use `drop: [\"ALL\"]` in Kubernetes `securityContext.capabilities`. For legitimate observability (`bpftrace`, `perf`, `opensnoop`, Cilium, Pixie, Parca, Falco), run the eBPF-using process in a dedicated DaemonSet pod with only `CAP_BPF` + `CAP_PERFMON` + `CAP_NET_ADMIN` (not `SYS_ADMIN`, not `privileged: true`), with a pinned, signed image and a node-selector restricting to observability-only nodes. Block `CAP_SYS_MODULE` and `CAP_SYS_PTRACE` entirely. Enforce at admission via Kyverno / OPA Gatekeeper policy (`require.capabilities.drop: [\"ALL\"]`, `disallow: [\"SYS_ADMIN\", \"BPF\"]`) and Pod Security Admission `restricted` profile. Audit with `ps -eo comm,caps | grep -i cap_` and `crictl ps -o json | jq '...securityContext'`. For systemd: never set `AmbientCapabilities=CAP_SYS_ADMIN`; prefer `AmbientCapabilities=CAP_NET_BIND_SERVICE` + `NoNewPrivileges=yes` + a dedicated sandboxing profile (`ProtectSystem=strict`, `ProtectHome=yes`, `PrivateUsers=yes`)."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
    cve: ["CVE-2024-26589", "CVE-2024-40967"]
    owasp_appsec: ["A04:2021"]
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]
    mitre_attack: ['T1055', 'T1068', 'T1611']
    cis_controls: ['CIS-4.1', 'CIS-4.7', 'CIS-5.4']
    nist_controls: ['AC-6', 'CM-7', 'SC-39']
    pci_dss: ['2.2.5', '7.1.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "falco_runtime_security_agent_disabled_or_masked"
    category: "operational_security"
    severity: "HIGH"
    title: "Falco runtime-security agent stopped, masked, or uninstalled"
    description: "A task stops, disables, masks, or uninstalls Falco (`falco`, `falco-bpf`, `falco-modern-bpf`, `falcoctl`) - the canonical runtime-security / behavioural-detection agent for Linux hosts, Kubernetes nodes, and OpenShift. Falco generates the critical `Write below etc`, `Terminal shell in container`, `Disallowed K8s API call`, `Read sensitive file untrusted` alerts that feed most modern SOC detection pipelines. 2024-2025 ransomware and state-actor IR reports (Mandiant, CrowdStrike Falcon Overwatch) consistently show adversaries disabling Falco as one of the first post-exploitation actions. Also matches deletion of the Falco rules directory and uninstallation of the Falco Helm chart from the `falco` namespace."
    regex: "(?:(?:systemd|systemctl|service)[\\s\\S]{0,60}?(?:stop|disable|mask)[\\s\\S]{0,60}?falco(?:-(?:bpf|modern-bpf|exporter|sidekick|driver|rules))?(?:\\.service)?(?![a-z])|ansible\\.builtin\\.systemd[\\s\\S]{0,300}?name\\s*:\\s*['\"]?falco(?:-(?:bpf|modern-bpf|exporter|sidekick|driver|rules))?['\"]?[\\s\\S]{0,200}?state\\s*:\\s*['\"]?(?:stopped|absent)['\"]?[\\s\\S]{0,200}?enabled\\s*:\\s*(?:false|no)|(?:yum|dnf|apt|apt-get|zypper)\\s+(?:remove|erase|autoremove)[^\\n]*\\bfalco(?:-(?:bpf|modern-bpf|exporter|sidekick|driver|rules))?\\b|helm\\s+(?:uninstall|delete)\\s+falco\\b|kubectl\\s+delete\\s+(?:ds|daemonset|ns|namespace)\\s+falco\\b|rm\\s+(?:-rf?\\s+)?/etc/falco(?:/[a-z_.-]+)?|falcoctl[^\\n]*(?:uninstall|disable))"
    multiline: true
    window: 10
    positive_examples:
      - "    shell: systemctl stop falco"
      - "    shell: systemctl disable falco.service"
      - "    shell: systemctl mask falco-bpf"
      - "    shell: helm uninstall falco"
      - "    shell: kubectl delete ds falco -n falco"
      - "    shell: rm -rf /etc/falco/"
      - "    shell: apt-get remove falco"
      - "    shell: falcoctl rules uninstall"
    negative_examples:
      - "    shell: systemctl stop falcon-sensor"
      - "    shell: systemctl disable falcon-sensor.service"
      - "    shell: helm uninstall falconctl"
      - "    shell: apt-get remove falcon-agent"
      - "    shell: kubectl delete ds falcon-node-sensor"
      - |2-
            ansible.builtin.service:
              name: falcon-sensor
              state: stopped
