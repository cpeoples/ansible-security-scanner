  - id: "iptables_nft_flush_then_default_accept"
    category: "operational_security"
    severity: "CRITICAL"
    title: "iptables -F Or nft flush ruleset Followed By ACCEPT-Any / Default-ACCEPT Policy"
    description: "A playbook flushes the host firewall (`iptables -F`, `iptables -X`, `iptables -Z`, `ip6tables -F`, or nftables `nft flush ruleset`) AND either sets a default-ACCEPT policy (`iptables -P INPUT ACCEPT`, `iptables -P FORWARD ACCEPT`) OR immediately installs a `0.0.0.0/0 ACCEPT` rule. This is the canonical T1562.004 firewall-evasion pattern used by Kinsing, TeamTNT, SysJoker, and the 2024 Perfctl cryptominer campaigns to expose a previously-isolated host to inbound attacker traffic. Legitimate firewall-rule-reset scripts always re-apply a baseline policy in the same playbook - detecting the flush without a baseline rebuild is high-signal."
    regex: "(?:iptables(?:-(?:save|restore|legacy|nft))?\\s+-F\\b|ip6tables\\s+-F\\b|nft\\s+flush\\s+ruleset|nft\\s+delete\\s+table\\s+)[\\s\\S]{0,800}?(?:iptables(?:\\s+-[46])?\\s+-P\\s+(?:INPUT|FORWARD|OUTPUT)\\s+ACCEPT|iptables(?:\\s+-[46])?\\s+-[AI]\\s+\\S+\\s+(?:-s\\s+)?0\\.0\\.0\\.0/0\\s+-j\\s+ACCEPT|nft\\s+add\\s+rule[^\\n]+accept\\s*$)"
    positive_examples:
      - "iptables  -F iptables  -P INPUT ACCEPT"
    multiline: true
    window: 30
    recommendation: "Never flush a host firewall without the replacement ruleset in the same transaction. Use `iptables-restore < /etc/iptables/rules.v4` (atomic swap) or nftables `nft -f /etc/nftables.conf` (transactional). Preferred: manage the firewall with `ansible.posix.firewalld` / `community.general.ufw` / `ansible.builtin.iptables` module idempotently - never with ad-hoc shell. Maintain default-DENY policies: `iptables -P INPUT DROP`, `iptables -P FORWARD DROP`. Audit for this pattern in your config-drift detection."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-693', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1562.001', 'T1562.004']
    cis_controls: ['CIS-3.3', 'CIS-4.4', 'CIS-12.2']
    nist_controls: ['AC-4', 'CM-7', 'SC-7']
    pci_dss: ['1.2.1', '1.4.1', '11.5.1']
    hipaa: ['164.308(a)(1)(ii)(B)']
    soc2: ['CC6.6', 'CC7.1']

  - id: "iptables_save_redirected_to_dev_null"
    category: "operational_security"
    severity: "HIGH"
    title: "iptables-save / nft list ruleset Redirected To /dev/null Or /tmp (Audit-Trail Evasion)"
    description: "A task runs `iptables-save > /dev/null` / `nft list ruleset > /dev/null` / `iptables-save > /tmp/*` - redirecting the firewall-audit output to a throwaway location, typically to satisfy a compliance-scan check that a firewall dump 'happens' without actually saving it to `/etc/iptables/rules.v4` or an auditable location. This defeats post-incident forensics (no record of what rules were active) and is used by threat actors to pre-emptively wipe the audit trail before flushing rules."
    regex: "(?:iptables-save|ip6tables-save|nft\\s+list\\s+ruleset|nft\\s+export)\\s+[\\s\\S]{0,80}?>\\s*(?:/dev/null|/tmp/|/var/tmp/|/dev/shm/)"
    positive_examples:
      - "iptables-save >/dev/null"
    recommendation: "Always persist firewall rules to the distro's canonical location: `/etc/iptables/rules.v4` (Debian/Ubuntu netfilter-persistent), `/etc/sysconfig/iptables` (RHEL/CentOS with `iptables-services`), `/etc/nftables.conf` (nftables-based distros). Use the `ansible.builtin.iptables` module with `state: saved` (iptables ≥ 1.8.4) or a `notify: save iptables` handler. For compliance dumps, write to `/var/log/firewall/snapshot-$(date +%Y%m%d).conf` with mode `0600` owner `root:adm`. Never pipe firewall state to ephemeral storage."
    no_ansible_remediation: true
    cwe: ['CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1070', 'T1562.004']
    cis_controls: ['CIS-4.4', 'CIS-8.2', 'CIS-8.11']
    nist_controls: ['AU-6', 'AU-9', 'SI-4']
