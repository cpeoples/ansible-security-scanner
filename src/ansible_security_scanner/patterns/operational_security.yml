  - id: "macos_sip_disabled_csrutil"
    category: "operational_security"
    severity: "CRITICAL"
    title: "macOS System Integrity Protection (SIP) Disabled Via csrutil"
    description: "A task runs `csrutil disable` (or writes an NVRAM `csr-active-config` value with SIP flags cleared) on a macOS host. SIP is Apple's rootless/system-volume-protection layer - disabling it is the documented pre-requisite for every macOS kernel-extension rootkit (XCSSET, Shlayer, LightSpy, the 2024 BlueNoroff RustDoor variant) because it removes the `com.apple.rootless` entitlement enforcement that prevents modification of `/System`, `/usr`, `/sbin`, `/var/db`, signed kexts, and the SIP-protected portion of `/Library`. `csrutil disable` requires booting into recoveryOS; automating it via Ansible across a fleet is always a red-team or threat-actor pattern - no legitimate MDM posture requires it."
    regex: "(?:csrutil\\s+(?:disable|clear|authenticated-root\\s+disable)|nvram\\s+(?:-d\\s+)?csr-active-config(?:\\s*=\\s*['\"]?%[0-9a-fA-F]{2,})?|defaults\\s+write\\s+[^\\s]+\\s+SIPDisabled\\s+-bool\\s+true)"
    positive_examples:
      - "csrutil disable"
    recommendation: "Never disable SIP on production or endpoint-fleet macOS. For the rare legitimate case (kernel-extension development for a security product) require it to be scoped to a dedicated developer Mac that is NEVER enrolled in MDM and NEVER holds corporate credentials. If a playbook legitimately disables SIP for a kernel-driver install, verify via Apple's recommended path: a temporary `csr-active-config` with MINIMAL flags (only `CSR_ALLOW_UNAPPROVED_KEXTS`) not a full `disable`. On fleet endpoints, use Apple MDM's `com.apple.security.*` profile to LOCK SIP on via DeviceManagement. Alert on `csrutil status` != `enabled` via Jamf/Kandji/Mosyle."
    no_ansible_remediation: true
    cwe: ['CWE-250', 'CWE-284', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V13.4.5, V15.2.3]
    mitre_attack: ['T1014', 'T1553', 'T1562.001']
    cis_controls: ['CIS-3.3', 'CIS-4.8', 'CIS-10.5']
    nist_controls: ['AC-6', 'CM-7', 'SI-7']
    pci_dss: ['2.2.1', '11.5.1']
