  - id: "aws_cloudtrail_writeonly_or_trail_deleted"
    category: "operational_security"
    severity: "CRITICAL"
    title: "AWS CloudTrail Event-Selector Set To WriteOnly Or Trail Deleted / Logging Stopped"
    description: "A task runs `aws cloudtrail delete-trail`, `aws cloudtrail stop-logging`, `aws cloudtrail put-event-selectors` with `ReadWriteType: WriteOnly`, or the equivalent `amazon.aws.cloudtrail` / `community.aws.cloudtrail` module calls. Deleting / stopping a trail is the single most common MITRE T1562.008 action in every AWS breach post-mortem (Capital One 2019, SolarWinds-AWS pivot 2020, Uber 2022, CircleCI 2023). `ReadWriteType: WriteOnly` is the subtler variant: it preserves the trail (so audit checklists pass) but hides all `Describe*`/`List*`/`Get*` recon activity from forensics, which is specifically what ransomware affiliates enable before lateral-movement."
    regex: "(?:aws\\s+cloudtrail\\s+(?:delete-trail|stop-logging|put-event-selectors\\s+[^\\n]*ReadWriteType[\\\"'\\s=]+WriteOnly)|amazon\\.aws\\.cloudtrail[\\s\\S]{0,400}?state\\s*:\\s*absent|community\\.aws\\.cloudtrail[\\s\\S]{0,400}?(?:state\\s*:\\s*absent|enable_logging\\s*:\\s*(?:false|no))|boto3[\\s\\S]{0,200}?client\\(['\"]?cloudtrail['\"]?\\)[\\s\\S]{0,300}?(?:delete_trail|stop_logging))"
    positive_examples:
      - |2-
        amazon.aws.cloudtrail: {}}
              amazon.aws.cloudtrail:
                state: absent
    multiline: true
    window: 20
    recommendation: "Treat any CloudTrail-disablement task as an active incident. Re-enable logging IMMEDIATELY (`aws cloudtrail start-logging` + `put-event-selectors ReadWriteType=All IncludeManagementEvents=true`). Lock the trail against future disablement by applying an SCP at the organisation level: `Deny cloudtrail:DeleteTrail, cloudtrail:StopLogging, cloudtrail:PutEventSelectors` except from a break-glass role requiring manual ticket approval. Enable AWS Security Hub control `CloudTrail.1` and `CloudTrail.4` for alerting. Restore any missing events from the S3 backing bucket (log files continue to be written during the `WriteOnly` window - only API filtering is affected)."
    no_ansible_remediation: true
