  - id: "docker_sock_abuse"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Docker Socket Mounted Into Container (Host Escape Primitive)"
    description: "A task mounts the host's Docker socket (``/var/run/docker.sock``) INTO a container via ``-v``, ``--mount``, Kubernetes ``hostPath``, or an Ansible ``volumes:``/``mounts:`` field. A container with access to the host Docker socket can ``docker run --privileged -v /:/host ... chroot /host`` to become root on the host - it's the canonical container-escape primitive. This rule fires ONLY on mount / bind contexts; ``dockerd -H unix:///var/run/docker.sock ...`` (the daemon's OWN listen-socket config) is a different class of issue (covered by ``docker_api_exposed_plaintext``) and is NOT a container-escape vector."
    # Sub-shape A: ``-v /var/run/docker.sock:`` / ``--mount type=bind,source=/var/run/docker.sock,``
    # Sub-shape B: Ansible ``docker_container`` / ``containers.podman.podman_container``
    #              ``volumes:``/``mounts:`` list item containing the sock path.
    # Sub-shape C: Kubernetes ``hostPath:`` with ``path: /var/run/docker.sock``.
    # Sub-shape D: curl / nc talking to the sock directly as a Docker-API
    #              client (``curl --unix-socket /var/run/docker.sock``).
    regex: "(?:-v\\s+|--volume[\\s=]|--mount[\\s=][^\\n]*?source=|--unix-socket\\s+|-U\\s+|volumes:\\s*\\[?[^\\n]*|mounts:\\s*\\[?[^\\n]*|hostPath:[\\s\\S]{0,120}?path:\\s*['\\\"]?)/var/run/docker\\.sock|/var/run/docker\\.sock\\s*:(?!\\s*[#\\n])"
    multiline: true
    window: 6
    positive_examples:
      - "    shell: docker run -v /var/run/docker.sock:/var/run/docker.sock alpine"
      - "    shell: docker run --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock alpine"
      - |2-
            community.docker.docker_container:
              name: cadvisor
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock:ro
      - |2-
                  - name: docker-sock
                    hostPath:
                      path: /var/run/docker.sock
      - "    shell: curl --unix-socket /var/run/docker.sock http://localhost/containers/json"
    negative_examples:
      - "          ExecStart=/usr/bin/dockerd -H fd:// -H unix:///var/run/docker.sock -H tcp://127.0.0.1:2375"
      - "    # Docs reference: bind-mounting /var/run/docker.sock is a container-escape primitive"
      - |2-
            systemd:
              name: docker.socket
              state: started
    recommendation: "Remove the socket bind-mount. If the container genuinely needs Docker API access, prefer the rootless Docker socket (``/run/user/$UID/docker.sock``) scoped to a non-root user, or a mediated API server (e.g. ``docker-socket-proxy`` with read-only endpoint allowlist). For CI use-cases, run the job on a dedicated build host rather than giving socket access to a container. For metrics collectors (cAdvisor, Prometheus), use the Docker API over a locked-down TCP socket with mTLS instead."
    cwe: ['CWE-250', 'CWE-269', 'CWE-732']
    mitre_attack: ['T1610', 'T1611']
    nist_controls: ['AC-6', 'AU-6', 'CA-7', 'SI-4']
    pci_dss: ['2.2.2', '10.4.1']
    soc2: ['CC6.1', 'CC7.2']

