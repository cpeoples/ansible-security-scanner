  - id: "rabbitmq_default_guest_user_enabled_remote"
    category: "operational_security"
    severity: "CRITICAL"
    title: "RabbitMQ Default guest/guest User Enabled For Remote Connections"
    description: "A task renders `rabbitmq.conf` / `advanced.config` with `loopback_users = none`, `loopback_users.guest = false`, or explicitly preserves the `guest` user with its default password (`guest`) while ALSO enabling remote listeners. RabbitMQ ships with a `guest` user (password `guest`) restricted to loopback-only; removing the loopback restriction with the default password is direct unauthenticated admin access to the broker (read/write every queue, install plugins, shell out via the `rabbitmq_management` HTTP API, access backing Mnesia DB). The 2024 CloudPassage survey found this exact config in 12% of exposed RabbitMQ instances on Shodan."
    regex: "(?:rabbitmq\\.conf|advanced\\.config|rabbitmq_config)[\\s\\S]{0,1500}?(?:loopback_users\\s*[:=]\\s*(?:\\[\\s*\\]|none|\\{\\s*\\})|loopback_users\\.guest\\s*=\\s*false|\\{loopback_users\\s*,\\s*\\[\\s*\\]\\})|rabbitmqctl\\s+set_user_tags\\s+guest\\s+administrator|rabbitmq_user[\\s\\S]{0,200}?name\\s*:\\s*guest[\\s\\S]{0,300}?(?:password\\s*:\\s*guest|tags\\s*:[\\s\\S]{0,100}?administrator)"
    positive_examples:
      - "rabbitmq.confloopback_users:[]"
    multiline: true
    window: 20
    recommendation: "DELETE the `guest` user entirely: `rabbitmqctl delete_user guest`. Create per-service accounts with scoped vhost permissions: `rabbitmqctl add_user <svc> <strong-password-from-vault>` + `rabbitmqctl set_permissions -p /<vhost> <svc> '^svc-.*$' '^svc-.*$' '^svc-.*$'`. Keep `loopback_users = [guest]` (default) even after deletion as a safety net. Enforce TLS on AMQP listener: `listeners.ssl.default = 5671` + disable plaintext: `listeners.tcp = none`. Enable client-cert authentication for service-to-service. Audit: `rabbitmqctl list_users` - any `guest` entry is a finding. Monitor `rabbitmq_management` API access logs for `guest` login attempts."
    cwe: ['CWE-287', 'CWE-521', 'CWE-798']
    owasp_appsec: ["A07:2021"]
    owasp_asvs: [V6.2.1, V13.2.3, V13.3.1]
