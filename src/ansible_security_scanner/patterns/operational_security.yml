  - id: "aws_cloudtrail_event_selector_read_only_only"
    category: "operational_security"
    severity: "HIGH"
    title: "AWS CloudTrail Event Selector Filters Out Write Events (Blind Trail)"
    description: "A task creates/updates a CloudTrail with `ReadWriteType: ReadOnly` (or `IncludeManagementEvents: false`, or an advanced-event-selector block that explicitly excludes `readOnly=false` events). The resulting trail logs only metadata-read API calls and is completely blind to `CreateUser`, `AttachRolePolicy`, `PutBucketPolicy`, `DeleteTrail`, `StopLogging` - i.e. every privilege-change and tamper action an attacker cares about. The existing `aws_cloudtrail_writeonly_or_trail_deleted` rule catches the trail-deletion and writeonly-flipped cases; this one catches the filter-to-readonly variant used when attackers want the trail to appear 'still on' to compliance dashboards while hiding their mutations."
    regex: "(?:ReadWriteType\\s*[:=]\\s*['\"]?ReadOnly['\"]?|aws\\s+cloudtrail\\s+put-event-selectors[^\\n]*?ReadWriteType=ReadOnly|(?:community|amazon)\\.aws\\.cloudtrail[\\s\\S]{0,400}?read_write_type\\s*:\\s*['\"]?ReadOnly|IncludeManagementEvents\\s*[:=]\\s*['\"]?(?:false|no)['\"]?|include_management_events\\s*:\\s*(?:false|no)\\b)"
    positive_examples:
      - "ReadWriteType:ReadOnly"
    multiline: true
    window: 15
    recommendation: "Configure every production trail as organization-wide, multi-region, with `ReadWriteType: All`, `IncludeManagementEvents: true`, + data-event selectors for sensitive buckets (`AWS::S3::Object`) and Lambda functions (`AWS::Lambda::Function`). Enable log-file validation (`EnableLogFileValidation: true`) + S3 Object Lock + cross-account log archive. Require SCP at org level denying `cloudtrail:PutEventSelectors` with `ReadWriteType=ReadOnly` except for a break-glass role. Alert on `PutEventSelectors` CloudTrail events where the new config covers fewer event types than the old one. Cross-check trail health quarterly via `aws cloudtrail get-trail-status` + `get-event-selectors`."
    cwe: ['CWE-284', 'CWE-693', 'CWE-778']
    owasp_appsec: ["A01:2021", "A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1562.001', 'T1562.008', 'T1578']
    cis_controls: ['CIS-8.2', 'CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-6', 'AU-9', 'AU-12']
    pci_dss: ['10.2.1', '10.3.1', '10.5.2']
