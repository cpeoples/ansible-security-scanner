  - id: "esxi_syslog_remote_destination_disabled_or_missing"
    category: "operational_security"
    severity: "HIGH"
    title: "VMware ESXi remote syslog (vmsyslogd) disabled or no remote destination configured"
    description: "A task disables the ESXi syslog daemon (`vmsyslogd`) OR sets `Syslog.global.logHost` to empty / localhost OR removes the remote log destination - preventing forwarding of `hostd`, `vpxa`, `vmkernel`, `shell.log`, and `auth.log` to a central SIEM. This is both a CIS ESXi 8.0 Benchmark 3.1 failure and a standard anti-forensics move in every published ESXi ransomware IR timeline (Mandiant M-Trends 2024, Unit 42 ESXiArgs reports). Without remote syslog, a compromised host's logs are wiped by the ransomware encryptor seconds before file encryption starts, leaving zero forensic artefacts."
    regex: "(?:community\\.vmware\\.vmware_host_(?:syslog|config|service_manager)\\b[\\s\\S]{0,300}?(?:(?:service_name\\s*:\\s*['\"]?vmsyslogd['\"]?[\\s\\S]{0,200}?(?:state\\s*:\\s*['\"]?(?:absent|stopped|disabled)['\"]?|policy\\s*:\\s*['\"]?off['\"]?))|(?:log_host|syslog_host|logHost|Syslog\\.global\\.logHost)\\s*[:=]\\s*['\"]?(?:|null|~|localhost|127\\.0\\.0\\.1|::1)['\"]?)|esxcli\\s+system\\s+syslog\\s+config\\s+set[^\\n]*--loghost\\s*=(?:\\s|['\"]?)(?:['\"]|$|localhost|127\\.0\\.0\\.1)|esxcli\\s+system\\s+syslog\\s+(?:stop|remove)\\b|Syslog\\.global\\.logHost\\s*=\\s*['\"]{2}|vim-cmd\\s+hostsvc/(?:stop|disable)syslog)"
    positive_examples:
      - "community.vmware.vmware_host_syslog service_name :  vmsyslogd  state :  absent "
    multiline: true
    window: 10
    recommendation: "Configure remote syslog on every ESXi host pointing at ≥ 2 SIEM collectors with TLS: `esxcli system syslog config set --loghost='ssl://siem1.example.com:6514,ssl://siem2.example.com:6514' --logdir-unique=true --default-rotate=20 --default-size=10240 && esxcli system syslog reload`. In vCenter: Host -> Configure -> Advanced System Settings -> `Syslog.global.logHost` = `ssl://siem1:6514,ssl://siem2:6514` (TLS mandatory for PCI-DSS 10.5.4). Open the host firewall for outbound syslog: `esxcli network firewall ruleset set -r syslog -e true`. Ship: `hostd.log`, `vpxa.log`, `vmkernel.log`, `shell.log`, `auth.log`, `vmkwarning.log`, `vobd.log` at minimum. Enable log rotation + persistence to a vSAN / NFS datastore (not local-only, which is lost on host rebuild). Alert (P1) on `vmsyslogd` restart, on `Syslog.global.logHost` change, and on any host that stops shipping logs for > 15 min. Review CIS ESXi 8.0 Benchmark 3.1-3.4, PCI-DSS v4.0 10.5, and Mandiant ESXi ransomware playbook."
    cwe: ['CWE-693', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1070', 'T1562.001', 'T1562.006']
    cis_controls: ['CIS-8.1', 'CIS-8.2', 'CIS-8.10']
    nist_controls: ['AU-4', 'AU-9', 'AU-12']
    pci_dss: ['10.5.1', '10.5.3', '10.5.4']
    hipaa: ['164.308(a)(1)(ii)(D)', '164.312(b)']
    soc2: ['CC7.2', 'CC7.3']

  - id: "aws_cloudwatch_log_group_without_retention_or_kms"
    category: "operational_security"
    severity: "MEDIUM"
    title: "CloudWatch Log Group Without Retention Policy or KMS Encryption"
    description: "A `community.aws.cloudwatchlogs_log_group` task creates a log group with `retention: -1` (or `retention:` absent, which defaults to 'Never Expire') and/or `kms_key_id:` absent. Without retention, log volume grows without bound and costs escalate - but more importantly, indefinite retention means historical credential leaks stay forever discoverable. Without KMS, AWS stores logs under a shared service key, and an incident investigator loses the ability to instantly revoke access to old logs by rotating a CMK."
    regex: "(?ms)community\\.aws\\.cloudwatchlogs_log_group\\s*:\\s*\\n(?:(?!kms_key_id\\s*:|retention\\s*:\\s*(?:[1-9]\\d*|0)\\b)[\\s\\S]){0,1000}?(?:^\\s*name\\s*:|^\\s*state\\s*:\\s*present)(?:(?!kms_key_id\\s*:|retention\\s*:\\s*(?:[1-9]\\d*|0)\\b|^\\s*- name:|^-\\s*name:)[\\s\\S]){0,1000}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |-
        community.aws.cloudwatchlogs_log_group:
        name:- name:
    multiline: true
    window: 40
    recommendation: "Always set both: `retention: 90` (or your compliance-mandated number of days - PCI-DSS v4 requires 12 months for audit logs, HIPAA requires 6 years) AND `kms_key_id: arn:aws:kms:...`. For short-lived dev log groups, use `retention: 7` to avoid cost drift. Enforce globally via AWS Config rules `cw-loggroup-retention-period-check` + `cloudwatch-log-group-encrypted`. Apply a default retention via AWS Organizations SCP that denies `logs:PutRetentionPolicy` with `Retention: NeverExpire`. For centralised logging, stream every log group to a log-archive account with Object Lock."
    cwe: ['CWE-311', 'CWE-532', 'CWE-778']
    owasp_appsec: ["A04:2021", "A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1, V14.2.1, V12.2.1]
    mitre_attack: ['T1070.002', 'T1562.008']
    cis_controls: ['CIS-8.3', 'CIS-8.10']
    nist_controls: ['AU-4', 'AU-11', 'SC-28']
    pci_dss: ['10.5.1', '10.7']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "azure_postgresql_log_checkpoints_or_connections_off"
    category: "operational_security"
    severity: "MEDIUM"
    title: "Azure PostgreSQL/MySQL Server Logging Parameters Disabled"
    description: "An `azure.azcollection.azure_rm_postgresqlconfiguration` / `azure.azcollection.azure_rm_mysqlconfiguration` / `azure.azcollection.azure_rm_postgresqlflexibleserverconfiguration` task sets `log_checkpoints`, `log_connections`, `log_disconnections`, or `log_duration` to `off`, `OFF`, `false`, or `0`. These server parameters produce the only authoritative trail of WHO connected, WHEN they connected, HOW LONG statements ran, and WHEN checkpoints flushed - essential for forensic investigation of SQL-injection exfiltration, stolen-credential replay, and unauthorised schema changes. Azure Defender for SQL and Microsoft Sentinel depend on these flags being `on`."
    regex: "(?ms)azure\\.azcollection\\.azure_rm_(?:postgresql|mysql)(?:flexibleserver)?configuration\\s*:[\\s\\S]{0,1500}?name\\s*:\\s*['\"]?(?:log_checkpoints|log_connections|log_disconnections|log_duration)['\"]?[\\s\\S]{0,300}?value\\s*:\\s*['\"]?(?:off|OFF|false|False|no|No|0)['\"]?"
    multiline: true
    window: 30
    positive_examples:
      - |2
        - azure.azcollection.azure_rm_postgresqlconfiguration:
            resource_group: rg
            server_name: pgsrv
            name: log_checkpoints
            value: "off"
    recommendation: "Set `value: on` for all four logging parameters: `log_checkpoints`, `log_connections`, `log_disconnections`, `log_duration`. Additionally enable `log_statement: ddl` (or `mod` for write-auditing, `all` for full capture - expensive) and `log_min_duration_statement: 1000` (ms) for slow-query forensics. Stream the logs to Azure Monitor Log Analytics + Microsoft Sentinel with a 90-day minimum retention. Enforce via Azure Policy 'Audit PostgreSQL log_*_connections/checkpoints' / built-in policy `ID: eb6f77b9-bd53-4e35-a23d-7f65d5f0e446` (enable logging resources for PostgreSQL)."
    cwe: ['CWE-223', 'CWE-532', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1070.002', 'T1562.008']
    cis_controls: ['CIS-8.2', 'CIS-8.5']
    nist_controls: ['AU-2', 'AU-3', 'AU-12']
    pci_dss: ['10.2.1', '10.2.2']
    hipaa: ['164.312(b)']
