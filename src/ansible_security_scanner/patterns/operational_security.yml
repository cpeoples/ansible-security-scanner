  - id: "macos_gatekeeper_disabled_spctl"
    category: "operational_security"
    severity: "HIGH"
    title: "macOS Gatekeeper Disabled Via spctl --master-disable"
    description: "A task runs `spctl --master-disable`, `spctl --global-disable`, or writes `GKAutoRearm = false` / `AppleSecurity` policy overrides that turn off Gatekeeper. Gatekeeper is the Apple notarization-verification layer that blocks execution of any binary not signed by a Developer-ID-certified cert AND notarized by Apple's ticketing service. Disabling it is the step every macOS adware/trojan installer script takes before dropping an unsigned payload - and the 2024 Cuckoo Stealer / Atomic macOS Stealer / Banshee campaigns all include `spctl --master-disable` as their second-stage line."
    regex: "(?:spctl\\s+--(?:master-disable|global-disable)|defaults\\s+write\\s+com\\.apple\\.LaunchServices\\s+LSQuarantine\\s+-bool\\s+(?:false|NO)|defaults\\s+write\\s+/Library/Preferences/com\\.apple\\.security\\s+GKAutoRearm\\s+-bool\\s+(?:false|NO))"
