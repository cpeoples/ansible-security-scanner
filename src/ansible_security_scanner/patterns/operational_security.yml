  - id: "tetragon_cilium_runtime_observability_disabled_or_masked"
    category: "operational_security"
    severity: "HIGH"
    title: "Tetragon (Cilium) eBPF runtime-security agent stopped, masked, or uninstalled"
    description: "A task stops, disables, masks, or uninstalls Cilium Tetragon (`tetragon`, `tetragon-operator`) - the Cilium project's eBPF runtime-security and process-lineage observability agent commonly deployed alongside Cilium networking for zero-trust enforcement and MITRE ATT&CK-aligned policy enforcement. Tetragon is the primary source of `process_exec`, `process_exit`, `sys_write`, `tcp_connect`, and `file_write` signals in many Cilium-based clusters; disabling it blinds detection engineering. Also matches deletion of the `cilium` or `kube-system/tetragon` DaemonSet and removal of `TracingPolicy` CRDs used to enforce kill-on-syscall rules."
