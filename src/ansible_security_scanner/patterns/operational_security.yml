  - id: "esxi_shell_ssh_enabled_via_vimcmd"
    category: "operational_security"
    severity: "CRITICAL"
    title: "VMware ESXi Shell / SSH Enabled Via vim-cmd (Ransomware Lateral-Movement TTP)"
    description: "A task runs `vim-cmd hostsvc/enable_ssh`, `vim-cmd hostsvc/enable_esx_shell`, `esxcli system settings advanced set -o /UserVars/SuppressShellWarning`, or equivalent. 2024's most-exploited data-center lateral-movement TTP: ESXi hypervisors with SSH/Shell enabled let ransomware operators (Akira, Black Basta, Play, ALPHV/BlackCat, LockBit) deploy encryptors directly to the hypervisor, encrypting hundreds of guest VMs at once while bypassing every endpoint-EDR on the guests. Default on ESXi is SSH/Shell = disabled; this is a deliberate unhardening."
    regex: "(?:vim-cmd\\s+hostsvc/(?:enable_ssh|enable_esx_shell|start_ssh|start_esx_shell)|esxcli\\s+system\\s+settings\\s+advanced\\s+set\\s+-o\\s+(?:/UserVars/SuppressShellWarning|/UserVars/ESXiShellTimeOut)|community\\.vmware\\.vmware_host_service_manager[\\s\\S]{0,200}?(?:service_name\\s*:\\s*['\"]?(?:TSM-SSH|TSM)['\"]?[\\s\\S]{0,100}?state\\s*:\\s*['\"]?(?:present|started|enabled)))"
    positive_examples:
      - |2-
            - name: enable esxi shell
              ansible.builtin.shell: vim-cmd hostsvc/enable_ssh
      - |2-
            - name: suppress shell warning
              ansible.builtin.shell: esxcli system settings advanced set -o /UserVars/SuppressShellWarning -i 1
    multiline: true
    window: 15
    recommendation: "Keep SSH and ESXi Shell DISABLED on production hypervisors. Use vCenter's web UI + vSphere API (authenticated, audit-logged) for all management. For rare break-glass shell access: enable SSH only during an approved maintenance window, from a jump host with source-IP ACL (`/UserVars/SSHClientRange`), require lockdown mode `strict`, and disable immediately after. Enforce via vSphere Host Profiles - attach a baseline with `TSM-SSH.state=stopped`, `TSM.state=stopped`, and `Security.AccountLockFailures=5`. Alert on any `esxcli system settings advanced set` event touching SuppressShellWarning."
    cwe: ['CWE-284', 'CWE-306', 'CWE-693']
    owasp_appsec: ["A01:2021", "A07:2021"]
    owasp_asvs: [V6.2.1]
    mitre_attack: ['T1021.004', 'T1133', 'T1562.001']
    cis_controls: ['CIS-4.4', 'CIS-5.7', 'CIS-12.6']
    nist_controls: ['AC-17', 'CM-7', 'SI-4']
    pci_dss: ['2.2.1', '2.2.7']
    hipaa: ['164.308(a)(1)(ii)(B)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "hypervisor_root_ssh_permit_with_weak_ciphers"
    category: "operational_security"
    severity: "HIGH"
    title: "Hypervisor (Proxmox/ESXi/libvirt) SSH With PermitRootLogin yes + Weak Ciphers"
    description: "A playbook renders `/etc/ssh/sshd_config` (or an ESXi-style `/etc/ssh/sshd_config`) on a host that's tagged as Proxmox/libvirt/ESXi/KVM AND has both `PermitRootLogin yes` AND a weak `Ciphers` / `MACs` / `KexAlgorithms` block (e.g. `Ciphers aes128-cbc,3des-cbc` or includes `hmac-md5`, `hmac-sha1`, `diffie-hellman-group1-sha1`, `diffie-hellman-group14-sha1`). Hypervisors are the highest-value management targets - every guest VM is one `virsh define --validate=no` away from full compromise."
    regex: "(?:pve|proxmox|libvirt|kvm|esxi|hypervisor)[\\s\\S]{0,800}?PermitRootLogin\\s+yes[\\s\\S]{0,600}?(?:Ciphers\\s+[^#\\n]*(?:aes128-cbc|3des-cbc|blowfish|arcfour)|MACs\\s+[^#\\n]*(?:hmac-md5|hmac-sha1[^-])|KexAlgorithms\\s+[^#\\n]*(?:diffie-hellman-group(?:1|14)-sha1|diffie-hellman-group-exchange-sha1))"
    positive_examples:
      - "pvePermitRootLogin yesCiphers aes128-cbc"
    multiline: true
    window: 40
    recommendation: "On hypervisors: set `PermitRootLogin prohibit-password` (key-only), `PasswordAuthentication no`, `AuthenticationMethods publickey,hostbased`. Restrict ciphers to modern: `Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes256-ctr`, `MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com`, `KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512`. Gate all hypervisor SSH access behind a bastion with per-user certificates (`TrustedUserCAKeys`), auditd `-a always,exit -S execve -F uid=0 -k hypervisor_root_exec`, and IDS alerts on new SSH sessions."
    cwe: ['CWE-287', 'CWE-326', 'CWE-327']
    owasp_appsec: ["A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V11.2.5, V11.3.1, V11.3.2, V11.4.1]
    mitre_attack: ['T1021.004', 'T1078', 'T1557']
    cis_controls: ['CIS-4.4', 'CIS-5.7', 'CIS-12.6']
