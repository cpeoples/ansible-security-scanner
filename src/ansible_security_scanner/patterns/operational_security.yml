  - id: "otel_collector_grpc_or_http_listener_bound_to_wildcard_interface"
    category: "operational_security"
    severity: "HIGH"
    title: "OpenTelemetry Collector OTLP receiver bound to 0.0.0.0 / :: (all interfaces)"
    description: "A task configures an OpenTelemetry Collector (`otelcol`, `otelcol-contrib`, `adot-collector`, `splunk-otel-collector`, `datadog-agent otlp_config`, `grafana-agent`) with an OTLP gRPC (4317) or HTTP (4318) receiver bound to `0.0.0.0` / `::` / unspecified instead of an explicit internal IP or a Kubernetes `ClusterIP` service. OTLP receivers accept unauthenticated trace/metric/log submissions by default - a wide-open collector is a trivial data-sink for spoofed telemetry, a DoS target, and (when paired with file-exporter or debug-exporter) a data-exfiltration oracle. CIS OpenTelemetry Benchmark (2024) and OTel Collector security guidance both require receivers on loopback or a dedicated internal interface, with mTLS or bearer-token auth if cross-host."
    regex: "(?:receivers\\s*:[\\s\\S]{0,800}?otlp\\s*:[\\s\\S]{0,600}?protocols\\s*:[\\s\\S]{0,400}?(?:grpc|http)\\s*:[\\s\\S]{0,200}?endpoint\\s*:\\s*['\"]?(?:0\\.0\\.0\\.0|::|\\*):[0-9]{2,5}['\"]?|otel[_-]?collector[\\s\\S]{0,400}?(?:otlp_grpc_endpoint|otlp_http_endpoint|receiver_endpoint)\\s*[:=]\\s*['\"]?(?:0\\.0\\.0\\.0|::|\\*):[0-9]+['\"]?|otelcol[^\\n]*--config[^\\n]*0\\.0\\.0\\.0:431[78])"
    positive_examples:
      - "receivers:otlp:protocols:grpc:endpoint:0.0.0.0:00"
    multiline: true
    window: 30
    recommendation: "Bind OTLP receivers to a specific internal IP or a Kubernetes ClusterIP service - never `0.0.0.0`. In Kubernetes, expose the collector via a `ClusterIP` (or `ClusterIP` + `NetworkPolicy` ingress-allowlisted to your instrumented workloads). Enable OTLP auth: either (a) mTLS via the `tls` block with a private-CA-issued cert + `client_ca_file`, or (b) bearer-token header via the `bearertokenauth` extension with a rotated token stored in a sealed secret. Rate-limit via `memory_limiter` + `batch` processors. Run the collector as non-root, `readOnlyRootFilesystem: true`, drop all caps. For SaaS ingestion (Datadog, Honeycomb, New Relic), point the OTLP exporter - not the receiver - at the public endpoint. Audit with `ss -tlnp | grep -E ':431[78]'` and verify the bind IP is internal. Enable the collector's internal-metrics scraping (port 8888) only on loopback."
    cwe: ['CWE-284', 'CWE-306', 'CWE-319']
    owasp_appsec: ["A01:2021", "A02:2021", "A07:2021"]
    owasp_asvs: [V6.2.1, V12.2.1, V12.3.4]
    mitre_attack: ['T1498', 'T1552.004', 'T1590.002']
    cis_controls: ['CIS-4.4', 'CIS-8.10', 'CIS-12.6']
    nist_controls: ['AC-3', 'AC-4', 'SC-7']
    pci_dss: ['1.4.4', '4.2.1', '10.3.1']
    hipaa: ['164.312(a)(1)', '164.312(e)(1)']
    soc2: ['CC6.1', 'CC6.6']

  - id: "esxi_esxi_shell_or_tsm_service_enabled"
    category: "operational_security"
    severity: "HIGH"
    title: "VMware ESXi 'ESXi Shell' (TSM) service enabled or set to start-on-boot"
    description: "A task enables the ESXi 'ESXi Shell' (TSM - `Technical Support Mode`, DCUI local shell) service or sets its Policy to `on` (auto-start). ESXi Shell is a root-level BusyBox shell directly on the hypervisor and is the primary post-compromise pivot for 2023-2025 ESXi-targeting ransomware families (ESXiArgs, Akira, BlackBasta, LockBit-ESXi, HelloKitty/Phobos) - they enable TSM, push ransomware binaries (`encrypt`, `vmfsencrypt`), stop VMs, and bulk-encrypt `.vmdk`/`.vswp`. CIS VMware ESXi 8.0 Benchmark (2024) requires TSM and SSH both set to `off` by default. Matches `community.vmware.vmware_host_service_manager` / `vmware_host_config_manager` with `service_name: TSM` + `state: present`/`enabled`, `esxcli system settings advanced set -o /UserVars/SuppressShellWarning`, and direct `/etc/init.d/tsm start`."
    regex: "(?:community\\.vmware\\.vmware_host_(?:service_manager|config)\\b[\\s\\S]{0,300}?service_name\\s*:\\s*['\"]?(?:TSM(?:-SSH)?|ESXiShell|ESXShell)['\"]?[\\s\\S]{0,200}?(?:state\\s*:\\s*['\"]?(?:present|running|enabled|start)['\"]?|policy\\s*:\\s*['\"]?on['\"]?)|esxcli\\s+system\\s+settings\\s+advanced\\s+set[^\\n]*(?:SuppressShellWarning|/UserVars/ESXiShellTimeOut)[^\\n]*-i\\s*[01]\\b|/etc/init\\.d/tsm\\s+(?:start|restart)|vim-cmd\\s+hostsvc/enable_shell|esxcli\\s+system\\s+settings\\s+kernel\\s+set[^\\n]*execInstalledOnly=FALSE|TSM(?:-SSH)?\\.Policy\\s*=\\s*['\"]?on['\"]?)"
    positive_examples:
      - "- esxcli system settings advanced set -o /UserVars/SuppressShellWarning -i 1"
    multiline: true
    window: 10
    recommendation: "Never enable ESXi Shell (TSM) or SSH on a production ESXi host - both should be stopped with Policy=`off`. Manage hypervisors exclusively through vCenter (vSphere API over HTTPS). For emergency diagnostics, enable TSM temporarily via DCUI console (keyboard at the physical/iLO console), perform the diagnostic, then disable + Policy=`off` immediately - and alert on the event via vCenter `vim.event.LocalTsmEnabledEvent` shipped to SIEM. Enable ESXi Lockdown Mode ('Strict') to block direct-host logins entirely. Require `execInstalledOnly=TRUE` (CIS ESXi 8.0 2.2), Secure Boot on the server, and vSphere Trust Authority. Restrict vCenter access to MFA-enforced admin accounts, segment the management VLAN, and put the host management NIC behind a bastion. Audit fleet-wide with `Get-VMHost | Get-VMHostService | Where {$_.Key -in 'TSM','TSM-SSH' -and $_.Running}`. Review Mandiant UNC3886 + ESXi-targeting ransomware playbooks (2024)."
    cwe: ['CWE-16', 'CWE-250', 'CWE-732']
    owasp_appsec: ["A05:2021"]
    owasp_asvs: [V5.3.1, V13.4.5, V15.2.3]
    mitre_attack: ['T1021.004', 'T1059.004', 'T1562.001']
    cis_controls: ['CIS-4.1', 'CIS-4.7', 'CIS-12.6']
    nist_controls: ['AC-3', 'AC-17', 'CM-7']
    pci_dss: ['2.2.1', '7.1.2']
    hipaa: ['164.312(a)(1)']
    soc2: ['CC6.1', 'CC6.3']

  - id: "esxi_ntp_service_disabled_or_policy_off"
    category: "operational_security"
    severity: "MEDIUM"
    title: "VMware ESXi NTP daemon disabled or set to manual (policy=off)"
    description: "A task disables the ESXi NTP service (`ntpd`) or sets its policy to `off`, or configures it without peers. ESXi hosts require synchronized time for vSphere HA, vMotion, Kerberos auth to vCenter SSO, certificate validation, log correlation, and - critically for IR - accurate forensic timeline reconstruction after a ransomware incident. ESXi-targeting crews (Akira, BlackBasta) routinely disable ntpd as an anti-forensics step. CIS VMware ESXi 8.0 Benchmark 2.7 requires NTP service = `on` with `ntpd.Policy=on` pointing at ≥ 3 authenticated stratum-2 sources. Also matches the newer `chrony` daemon on ESXi 8.0u2+ with the same misconfiguration."
    regex: "(?:community\\.vmware\\.vmware_host_(?:ntp|service_manager|config)\\b[\\s\\S]{0,300}?(?:service_name\\s*:\\s*['\"]?(?:ntpd|chrony|chronyd)['\"]?[\\s\\S]{0,200}?(?:state\\s*:\\s*['\"]?(?:absent|stopped|disabled)['\"]?|policy\\s*:\\s*['\"]?off['\"]?)|ntp_servers\\s*:\\s*(?:\\[\\s*\\]|null|~))|esxcli\\s+system\\s+ntp\\s+set[^\\n]*-e\\s*(?:false|0)\\b|esxcli\\s+system\\s+ntp\\s+(?:stop|remove)\\b|vim-cmd\\s+hostsvc/(?:stop|disable)ntp|ntpd\\.Policy\\s*=\\s*['\"]?off['\"]?)"
    positive_examples:
      - "community.vmware.vmware_host_ntp service_name :  ntpd  state :  absent "
    multiline: true
    window: 10
    recommendation: "Enable NTP on every ESXi host with Policy=`on` pointing at ≥ 3 stratum-2 NTP servers (preferably authenticated via NTS/NTPv4 AUTH): `esxcli system ntp set --enabled=true --server=time1.example.com,time2.example.com,time3.example.com`. In vCenter: Host -> Configure -> Time Configuration -> NTP Service -> Policy=Start and stop with host. For vSphere 8.0u2+, prefer the `chrony` daemon with NTS-KE. Restrict outbound UDP/123 to only your authorised NTP sources via the management-network firewall. For isolated/air-gapped hosts, use a local GPS-disciplined NTP appliance (Meinberg, Microsemi) or vCenter-hosted NTP. Monitor clock drift with `esxcli hardware clock get` compared to a trusted reference + alert on > 100 ms drift. Review CIS ESXi 8.0 Benchmark 2.7 and NIST SP 800-53 AU-8(1)."
    cwe: ['CWE-325', 'CWE-693']
    owasp_appsec: ["A02:2021"]
    mitre_attack: ['T1070.006', 'T1562.001']
