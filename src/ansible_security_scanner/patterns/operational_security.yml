  - id: "print_spooler_service_enabled_on_domain_controller"
    category: "operational_security"
    severity: "CRITICAL"
    title: "Print Spooler Service Enabled/Running On Domain Controller (PrintNightmare Pivot)"
    description: "A task starts/enables the `Spooler` service on a host tagged as a Domain Controller (role hints: `ActiveDirectory`, `AD-Domain-Services`, `DomainController`, `dc01`, `NTDS`). The Print Spooler service on a DC is the exact vector for PrintNightmare (CVE-2021-34527) and its 2023-2024 bypasses (CVE-2023-21678, CVE-2024-20683) which give unauthenticated domain-admin-equivalent via a standard user session. Microsoft's own hardening guidance AND CIS L1 for Windows DCs require Print Spooler to be DISABLED on DCs unconditionally - there is no print-serving role on a DC."
