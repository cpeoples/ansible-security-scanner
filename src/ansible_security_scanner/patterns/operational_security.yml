  - id: "gcp_audit_config_exempted_members_data_read"
    category: "operational_security"
    severity: "HIGH"
    title: "GCP Audit Config Exempts Members From DATA_READ / ADMIN_READ Logging"
    description: "A task renders an `iam_audit_config` resource (Terraform / gcloud / `google.cloud.gcp_iam_audit_config`) with `exempted_members:` populated for the `DATA_READ` or `ADMIN_READ` log-type. Any principal in the exempted list will NOT generate Cloud Audit Logs for that log-type - effectively invisible to the SIEM when they read data or inspect admin metadata. The 2024 Mandiant / Google Cloud incident-response findings show this is the canonical GCP pre-attack step for insider-threat actors: exempt themselves, then exfiltrate. Distinct from wholesale log-sink disablement; this is the narrow per-identity exemption that looks like a benign config."
