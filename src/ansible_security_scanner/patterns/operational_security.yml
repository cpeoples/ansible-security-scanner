  - id: "bsd_pf_conf_block_all_removed_or_disabled"
    category: "operational_security"
    severity: "HIGH"
    title: "BSD pf.conf Block-All Baseline Removed Or pfctl -F All Issued"
    description: "A task on a FreeBSD/OpenBSD/macOS-server host runs `pfctl -F all`, `pfctl -d` (disable packet filter entirely), or writes a `/etc/pf.conf` without a `block all` / `block in all` baseline. pf's block-all-then-pass model is what makes pf secure-by-default - removing the block baseline and only having `pass` rules means every port without a matching pass rule is open. Seen in 2024 macOS-server compromise reports from the Mac Admins community where attackers disabled pf to pivot laterally."
    regex: "(?:pfctl\\s+-(?:F\\s+all|d\\b)|/etc/pf\\.conf[\\s\\S]{0,1500}?^(?!.*block\\s+(?:in\\s+)?all)[\\s\\S]{0,800}?pass\\s+(?:in|out|quick))"
    positive_examples:
      - "pfctl -F all"
    multiline: true
    window: 60
    recommendation: "Every `/etc/pf.conf` MUST start with `set skip on lo` then `block return all` (or `block drop all`) BEFORE any `pass` rules. Load via `pfctl -f /etc/pf.conf -e` in the maintenance window, never `pfctl -d`. For macOS, use an MDM configuration profile (`com.apple.applicationaccess.new`) to prevent `pfctl -d`. Validate with `pfctl -sr | head -1` - first rule should be `block`. Audit rule-loads via `/var/log/pflog` (tcpdump-compatible)."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    mitre_attack: ['T1562.004']
    cis_controls: ['CIS-4.4', 'CIS-12.2']
    nist_controls: ['AC-4', 'SC-7']
    pci_dss: ['1.2.1', '1.4.1']
    soc2: ['CC6.6']

  - id: "systemd_resolved_dnssec_disabled"
    category: "operational_security"
    severity: "MEDIUM"
    title: "systemd-resolved DNSSEC Set To no (DNS Spoofing Enabler)"
    description: "A task renders `/etc/systemd/resolved.conf` (or a `/etc/systemd/resolved.conf.d/*.conf` drop-in) with `DNSSEC=no` OR `DNSOverTLS=no` AND no fallback pinning. systemd-resolved's DNSSEC validation is what defeats 2024-era DNS cache-poisoning variants (SADDNS, Kashpureff-style), BGP-hijack DNS tampering, and rogue-DHCP / rogue-WiFi DNS redirection. Distro default is `DNSSEC=allow-downgrade` which is acceptable; explicit `=no` is a regression used by attackers installing a `Dns=` override pointing at a malicious resolver."
    regex: "/etc/systemd/resolved\\.conf(?:\\.d/[^/]+)?[\\s\\S]{0,1500}?^\\s*DNSSEC\\s*=\\s*no\\b|^\\s*DNSSEC\\s*=\\s*no\\s*$"
    positive_examples:
      - |2-
        DNSSEC=no
        # ...
        {% if systemd_resolved_disable_stub_listener | bool %}
    multiline: true
    window: 20
    recommendation: "Set `DNSSEC=allow-downgrade` (default) or `DNSSEC=yes` (strict, enterprise) in `/etc/systemd/resolved.conf`. Also set `DNSOverTLS=opportunistic` to encrypt the stub-to-resolver hop, `Cache=yes`, and pin `DNS=` to trusted resolvers (1.1.1.2, 9.9.9.9, or your internal AD-DS DNS). Reload via `systemctl reload systemd-resolved`. Validate with `resolvectl status | grep -i dnssec`. On CIS-benchmarked hosts, fail the CIS 3.5 audit if DNSSEC=no is detected."
    cwe: ['CWE-290', 'CWE-346']
    owasp_appsec: ["A07:2021"]
    mitre_attack: ['T1071.004', 'T1557.002']
    cis_controls: ['CIS-3.3', 'CIS-12.6']
    nist_controls: ['SC-8', 'SC-20', 'SC-21']
    pci_dss: ['4.2.1']
    soc2: ['CC6.7']

  - id: "aws_s3_object_lock_disabled_or_cleared"
    category: "operational_security"
    severity: "CRITICAL"
    title: "AWS S3 Object Lock Disabled Or WORM/Retention Removed (Ransomware Pre-Stage)"
    description: "A task calls `aws s3api put-object-lock-configuration` with `ObjectLockEnabled=Disabled`, `put-bucket-versioning` with `Status=Suspended` on a bucket that had Object Lock, or removes `DefaultRetention`. Object Lock is the WORM/immutable-backup primitive that defeats the ransomware-encrypt-and-overwrite playbook. Every 2024 major ransomware intrusion (LockBit, Akira, Black Basta affiliates) includes an S3 Object-Lock-disable step when the victim is cloud-native, because without it the attacker can overwrite all backup objects."
    regex: "aws\\s+s3(?:api)?\\s+(?:put-object-lock-configuration|put-bucket-versioning|delete-bucket-replication)[\\s\\S]{0,500}?(?:ObjectLockEnabled\\s*[=:]\\s*['\"]?Disabled|Status\\s*[=:]\\s*['\"]?Suspended|DefaultRetention\\s*[=:]\\s*null)|amazon\\.aws\\.s3_bucket[\\s\\S]{0,300}?(?:versioning|object_lock)\\s*:\\s*['\"]?(?:false|disabled|suspended)['\"]?"
    positive_examples:
      - |2-
        amazon.aws.s3_bucket:
                name: "{{ local_bucket_name }}"
                state: present
                policy: "{{ lookup('template', 'policy.json') }}"
                requester_pays: false
                versioning: false
    multiline: true
    window: 20
    recommendation: "NEVER programmatically disable Object Lock or Versioning on a production bucket. Object Lock is WRITE-ONCE - once enabled with COMPLIANCE mode + retention period, it CANNOT be overridden, even by the root account. That's the entire security property. For legitimate bucket-deletion, use a separate 'cold archive' bucket without Object Lock; don't toggle it. Require MFA-Delete on all versioning buckets (`aws s3api put-bucket-versioning --mfa 'arn:aws:iam::...::mfa/root SerialNumber code' --versioning-configuration Status=Enabled,MFADelete=Enabled`). Alert on `PutObjectLockConfiguration` / `PutBucketVersioning` CloudTrail events where the new config is less restrictive than the old one."
    cwe: ['CWE-693', 'CWE-732', 'CWE-922']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1485', 'T1490', 'T1562.001']
    cis_controls: ['CIS-3.11', 'CIS-11.3', 'CIS-11.4']
    nist_controls: ['AU-9', 'CP-9', 'CP-10', 'SI-7']
    pci_dss: ['10.3.2', '12.10.1']
    hipaa: ['164.308(a)(7)(ii)(A)', '164.312(c)(1)']
    soc2: ['A1.2', 'CC7.2']

  - id: "aws_backup_vault_lock_removed_or_deleted"
    category: "operational_security"
    severity: "CRITICAL"
    title: "AWS Backup Vault Lock Removed Or Vault Deleted (Ransomware Pre-Stage)"
    description: "A task calls `aws backup delete-backup-vault`, `delete-backup-vault-lock-configuration`, or sets `community.aws.backup_vault` with `state: absent` / removes `backup_vault_lock`. AWS Backup Vault Lock (GA 2022) is the WORM equivalent for AWS Backup recovery points - once locked in COMPLIANCE mode, backups cannot be deleted even by the root account until retention expires. Pre-attack, ransomware affiliates disable or delete the vault to ensure post-encrypt recovery is impossible. 2024 Mandiant M-Trends lists this as a Top-5 cloud-ransomware pre-stage action."
    regex: "(?:aws\\s+backup\\s+(?:delete-backup-vault(?:-lock-configuration)?|delete-recovery-point|put-backup-vault-access-policy)|community\\.aws\\.backup_vault[\\s\\S]{0,200}?state\\s*:\\s*['\"]?absent)"
    positive_examples:
      - "aws backup delete-backup-vault"
    multiline: true
    window: 15
    recommendation: "Lock Backup Vaults in COMPLIANCE mode with a `MinRetentionDays >= 30` and `ChangeableForDays=0` (permanent lock) via `aws backup put-backup-vault-lock-configuration --mode=COMPLIANCE`. Once in COMPLIANCE mode, no AWS action - not even by root - can shorten retention. For regulatory DR use `MinRetentionDays >= 2555` (7-year). Audit CloudTrail for `DeleteBackupVault`/`DeleteRecoveryPoint`/`PutBackupVaultLockConfiguration` events with `requestParameters.lockMode != 'COMPLIANCE'` - alert high on any of these, page on-call on `DeleteBackupVault`. Require SCPs at the org-level to deny `backup:DeleteBackupVault` entirely except for a break-glass role."
    cwe: ['CWE-693', 'CWE-732', 'CWE-922']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1485', 'T1490', 'T1562.001']
    cis_controls: ['CIS-11.3', 'CIS-11.4']
    nist_controls: ['CP-9', 'CP-10', 'SI-7']
    pci_dss: ['10.3.2', '12.10.1']
    hipaa: ['164.308(a)(7)(ii)(A)']
    soc2: ['A1.2', 'CC7.2']

  - id: "gcp_vpc_service_controls_perimeter_weakened"
    category: "operational_security"
    severity: "HIGH"
    title: "GCP VPC Service Controls Perimeter Weakened (Dry-Run Or Bridge)"
    description: "A task creates or updates a `accesscontextmanager.googleapis.com/ServicePerimeter` with `perimeterType: PERIMETER_TYPE_BRIDGE` (which permits data egress between bridged perimeters) OR uses `dryRun`/`spec` only without an enforced `status` - meaning violations are logged but NOT blocked. VPC-SC is GCP's core data-exfiltration-prevention boundary; weakening it is the GCP analogue of 2024-reported AWS-Org-SCP-removal attacks by hands-on-keyboard actors."
    regex: "(?:google_access_context_manager_service_perimeter|serviceperimeters|service_perimeter)[\\s\\S]{0,600}?(?:perimeter_type\\s*[:=]\\s*['\"]?PERIMETER_TYPE_BRIDGE|perimeterType\\s*:\\s*['\"]?PERIMETER_TYPE_BRIDGE|dry_run\\s*[:=]\\s*true|useExplicitDryRunSpec\\s*:\\s*true(?![\\s\\S]{0,500}?status\\s*:))"
    positive_examples:
      - "google_access_context_manager_service_perimeterperimeter_type:PERIMETER_TYPE_BRIDGE"
    multiline: true
    window: 50
    recommendation: "Use `perimeterType: PERIMETER_TYPE_REGULAR` (strong boundary) for all production perimeters. Enforce via `status:` block not `spec:`/`dryRun:` only - `spec` is audit-only; `status` blocks violations. Bridge perimeters are ONLY legitimate for very narrow multi-project read-only scenarios; if you need one, it must itself be protected by an Access Policy with MFA-required ingress. Alert on `accesscontextmanager.*.update` AuditLog events that move a perimeter from `status` to `spec` mode or change its type to BRIDGE. Require Org-Admin + Access-Context-Admin dual-control for these changes."
    cwe: ['CWE-284', 'CWE-693', 'CWE-732']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1530', 'T1562.007']
    cis_controls: ['CIS-3.12', 'CIS-12.2']
    nist_controls: ['AC-4', 'SC-7', 'SI-4']
    pci_dss: ['1.2.1', '1.3.2']
    hipaa: ['164.312(e)(1)']
    soc2: ['CC6.6', 'CC7.2']

  - id: "azure_management_lock_removed_subscription_or_rg"
    category: "operational_security"
    severity: "HIGH"
    title: "Azure Management Lock Removed At Subscription Or Resource-Group Scope"
    description: "A task calls `Remove-AzResourceLock`, `az lock delete`, `azurerm_management_lock` with `state: absent`, or sets `--lock-type None` at subscription or resource-group scope. Management Locks (CanNotDelete / ReadOnly) are the Azure equivalent of AWS SCPs for preventing accidental or malicious resource deletion. Removing a subscription-level lock is the Azure pre-stage step in 2024-reported BEC-to-cloud-ransomware chains (Storm-0501 documented by Microsoft)."
    regex: "(?:Remove-AzResourceLock\\b|az\\s+lock\\s+delete|azurerm_management_lock[\\s\\S]{0,200}?(?:state\\s*:\\s*['\"]?absent|lock_level\\s*:\\s*['\"]?(?:NotSpecified|None)))"
    positive_examples:
      - "Remove-AzResourceLock"
    multiline: true
    window: 15
    recommendation: "Apply `CanNotDelete` locks at the subscription level on all production subscriptions via Azure Policy `deployIfNotExists` assignment. Use Azure AD Privileged Identity Management (PIM) to require time-bound, MFA-gated activation for any role that can remove locks (`Owner`, `User Access Administrator`). Audit `Microsoft.Authorization/locks/delete` Activity Log events - alert high on sub-scope lock removals and page on-call for prod subs. Consider Azure Policy `deny` on `Microsoft.Authorization/locks/delete` except from a break-glass account."
    no_ansible_remediation: true
    cwe: ['CWE-284', 'CWE-732', 'CWE-922']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V5.3.1]
    mitre_attack: ['T1485', 'T1490', 'T1562.007']
