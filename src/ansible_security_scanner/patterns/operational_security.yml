  - id: "powershell_execution_policy_set_localmachine_bypass"
    category: "operational_security"
    severity: "HIGH"
    title: "Set-ExecutionPolicy Bypass/Unrestricted At LocalMachine Or User Scope (Persistent Policy Weakening)"
    description: "A task runs `Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope LocalMachine` / `-Scope CurrentUser` / `-Scope Process` (persistent scope), OR writes the `ExecutionPolicy` registry key at `HKLM:\\SOFTWARE\\Microsoft\\PowerShell\\1\\ShellIds\\Microsoft.PowerShell` to `Bypass`/`Unrestricted`. Distinct from the one-off `powershell.exe -ep Bypass` invocation (which is scoped to a single process and used legitimately by installers) - this is the PERSISTENT policy change that makes the host permanently run unsigned scripts, even from remote locations. The 2024 Lazarus North Korea campaign and Earth Baku persistently set LocalMachine to Bypass before dropping their stagers."
    regex: "(?:Set-ExecutionPolicy\\s+(?:-ExecutionPolicy\\s+)?(?:Bypass|Unrestricted)\\s+(?:-Scope\\s+)?(?:LocalMachine|CurrentUser)|win_regedit[\\s\\S]{0,300}?Microsoft\\\\PowerShell[\\s\\S]{0,200}?ExecutionPolicy[\\s\\S]{0,100}?(?:Bypass|Unrestricted))"
    positive_examples:
      - "Set-ExecutionPolicy Bypass LocalMachine"
    multiline: true
    window: 15
    recommendation: "For legitimate admin scripting, use `Set-ExecutionPolicy RemoteSigned -Scope LocalMachine` (blocks downloaded unsigned scripts, allows local) or `AllSigned` (requires all scripts code-signed). Sign your internal scripts with an enterprise code-signing cert via `Set-AuthenticodeSignature`. Deploy script-policy via GPO `Computer Configuration\\Administrative Templates\\Windows Components\\Windows PowerShell\\Turn on Script Execution = AllSigned` which takes precedence over `Set-ExecutionPolicy`. Audit with `Get-ExecutionPolicy -List` - alert on any scope where the effective policy is `Bypass` or `Unrestricted`. Enable PowerShell Script Block Logging (EID 4104) to capture what runs when policy is weakened."
    no_ansible_remediation: true
    cwe: ['CWE-250', 'CWE-284', 'CWE-693']
    owasp_appsec: ["A01:2021"]
    owasp_asvs: [V13.4.5, V15.2.3]
    mitre_attack: ['T1059.001', 'T1112', 'T1562.001']
    cis_controls: ['CIS-3.3', 'CIS-8.5', 'CIS-10.5']
    nist_controls: ['CM-6', 'CM-7', 'SI-7']
