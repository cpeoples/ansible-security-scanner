  - id: "winrm_allow_unencrypted_true"
    category: "operational_security"
    severity: "CRITICAL"
    title: "WinRM Service AllowUnencrypted=true (Credential Exposure Over HTTP)"
    description: "A task runs `winrm set winrm/config/service @{AllowUnencrypted=\"true\"}`, `Set-Item WSMan:\\localhost\\Service\\AllowUnencrypted $true`, or writes registry `HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\WSMAN\\Service\\auth*` with `AllowUnencrypted=1`. This lets WinRM accept unauthenticated HTTP (port 5985) traffic without TLS, exposing NTLM hashes, credentials, and session keys to any on-path attacker. The existing `winrm_unencrypted_transport` rule catches the Ansible side (`ansible_winrm_transport: basic` + HTTP) - this one catches the SERVER-side WinRM config that permits such clients. The 2024 Volt Typhoon kill-chain explicitly enables AllowUnencrypted on compromised edge devices before harvesting creds via WinRM."
    regex: "(?:winrm\\s+set\\s+winrm/config/service\\s+['\"]?@?\\{?[^}\\n]*?AllowUnencrypted\\s*=\\s*['\"]?true|Set-Item\\s+[^\\n]*?WSMan:[^\\n]*?AllowUnencrypted[^\\n]*?\\$?true|win_regedit[\\s\\S]{0,400}?WSMAN\\\\Service[\\s\\S]{0,200}?AllowUnencrypted[\\s\\S]{0,80}?(?:data|value)\\s*:\\s*1\\b)"
    positive_examples:
      - "winrm set winrm/config/service AllowUnencrypted=true"
    multiline: true
    window: 10
    recommendation: "Force WinRM over HTTPS (5986) with a trusted CA-issued cert: `winrm quickconfig -transport:https` after installing the cert, then `winrm set winrm/config/service @{AllowUnencrypted=\"false\"}`. For Ansible use `ansible_winrm_transport: credssp` or `kerberos` (domain-joined) + `ansible_winrm_scheme: https` + `ansible_winrm_server_cert_validation: validate`. Enforce via GPO `Computer Configuration\\Policies\\Windows Components\\Windows Remote Management\\WinRM Service\\Allow unencrypted traffic = Disabled`. Audit: `winrm get winrm/config/service` - `AllowUnencrypted` must be `false`. Firewall inbound 5985 to DENY (leaving only 5986 HTTPS open)."
    no_ansible_remediation: true
    cwe: ['CWE-311', 'CWE-319', 'CWE-522']
    owasp_appsec: ["A02:2021", "A04:2021"]
    owasp_asvs: [V13.2.1, V11.2.5, V14.2.1, V12.2.1, V12.3.4]
