  - id: "azure_postgresql_connection_throttling_off"
    category: "operational_security"
    severity: "MEDIUM"
    title: "Azure PostgreSQL connection_throttling Parameter Disabled"
    description: "An `azure.azcollection.azure_rm_postgresqlconfiguration` / `azure.azcollection.azure_rm_postgresqlflexibleserverconfiguration` task sets `connection_throttling` to `off` / `false` / `0`. When disabled, the server does not rate-limit failed-login attempts, enabling on-line password-guessing / credential-stuffing against PostgreSQL user accounts. With `connection_throttling: on` (the secure default), Azure tracks failed authentications and throttles the offending source IP, which significantly reduces brute-force success probability and generates Defender-for-Cloud alerts on pattern detection."
