  - id: "aws_iam_user_programmatic_access_key_created_via_playbook"
    category: "operational_security"
    severity: "HIGH"
    title: "IAM User Programmatic Access Key Created Via Playbook (Long-Lived Credential Anti-Pattern)"
    description: "A task uses `community.aws.iam_access_key` / `amazon.aws.iam_access_key_info` / `aws iam create-access-key` to create or rotate a PROGRAMMATIC access key on an IAM user (not a role). Programmatic keys are long-lived, shareable, and the #1 source of leaked AWS credentials (Trufflehog scans of GitHub alone find >100k/year). Modern AWS best-practice (as of 2023-2024) is explicit: use IAM Identity Center + OIDC federation + IAM Roles for ALL programmatic access; human users should NEVER have access keys. The rule is tuned to catch the Ansible pattern: using a playbook to mint an `AKIA...` key that then gets embedded in a CI config or another playbook."
    regex: "(?:community\\.aws\\.iam_access_key[\\s\\S]{0,300}?state\\s*:\\s*['\"]?present|aws\\s+iam\\s+create-access-key\\s+--user-name\\s+\\S+)"
    positive_examples:
      - "community.aws.iam_access_keystate:present"
    multiline: true
    window: 15
    recommendation: "DELETE the IAM user immediately if possible and replace with IAM Identity Center + permission sets. For non-human access from an on-prem / CI system, use OIDC Web Identity Federation (GitHub Actions has native AWS OIDC integration, 2022 GA) - no access key needed. For Ansible control-node on EC2/ECS, use the instance profile / task role - Ansible's `amazon.aws` collection auto-detects these. If a long-lived key is unavoidable (legacy partner integration), rotate every 30 days via `aws iam update-access-key --status Inactive` + re-create, enforce via SCP: `iam:CreateAccessKey` denied except for specific service users with a `KeyMaxAgeDays: 90` tag. Audit with AWS IAM Credentials Report: `aws iam generate-credential-report` + find `access_key_1_last_rotated > 90 days ago`."
    no_ansible_remediation: true
    cwe: ['CWE-308', 'CWE-522', 'CWE-798']
