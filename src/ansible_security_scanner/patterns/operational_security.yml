  - id: "smbv1_protocol_enabled_dism_or_powershell"
    category: "operational_security"
    severity: "CRITICAL"
    title: "SMBv1 Protocol Re-Enabled Via DISM / PowerShell (EternalBlue Attack Surface)"
    description: "A task runs `Enable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol` (or `-FeatureName SMB1Protocol-Client`/`-Server`), `dism.exe /online /Enable-Feature /FeatureName:SMB1Protocol`, `Set-SmbServerConfiguration -EnableSMB1Protocol $true`, or the registry path `HKLM:\\SYSTEM\\CurrentControlSet\\Services\\LanmanServer\\Parameters\\SMB1=1`. SMBv1 is the protocol exploited by EternalBlue / WannaCry / NotPetya (2017) and remains actively exploited by the 2024 Akira ransomware affiliate for east-west lateral movement on under-patched fleets. Microsoft removed SMB1 from default installs in Windows 10 1709+ / Server 2019+ - re-enabling it is unambiguously a regression with no legitimate modern use-case except legacy scanner/copier appliances (which themselves should be isolated)."
    regex: "(?:Enable-WindowsOptionalFeature[\\s\\S]{0,200}?-FeatureName\\s+(?:['\"]?SMB1Protocol(?:-Client|-Server)?['\"]?)|dism(?:\\.exe)?\\s+[^\\n]*?/Enable-Feature\\s+[^\\n]*?/FeatureName:SMB1Protocol|Set-SmbServerConfiguration\\s+[^\\n]*?-EnableSMB1Protocol\\s+\\$?true|win_regedit[\\s\\S]{0,300}?(?:LanmanServer|MRxSmb10)[\\s\\S]{0,200}?(?:SMB1|Start)\\s*:\\s*(?:1|2)\\b)"
    positive_examples:
      - "Enable-WindowsOptionalFeature-FeatureName SMB1Protocol"
    multiline: true
    window: 12
    recommendation: "Disable SMBv1 everywhere: `Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force` + `Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol`. For stragglers that need SMBv1 (legacy scanners, NAS), isolate them on a dedicated VLAN with no route to user endpoints or servers, and explicitly ACL only those IP pairs that need SMB1. Enforce fleet-wide via GPO `Computer Configuration\\Policies\\Administrative Templates\\MS Security Guide\\Configure SMBv1 client / server driver = Disabled`. Audit via `Get-SmbServerConfiguration | Select EnableSMB1Protocol` - must be `False`. Alert on Windows EID 2000 (SMB1 access attempt)."
    no_ansible_remediation: true
