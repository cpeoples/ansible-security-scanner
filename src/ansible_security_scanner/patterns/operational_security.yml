  - id: "macos_launchdaemon_persistence_plist"
    category: "operational_security"
    severity: "HIGH"
    title: "macOS LaunchDaemon Plist Dropped With RunAtLoad + KeepAlive Persistence"
    description: "A task writes a `.plist` into `/Library/LaunchDaemons/` or `/Library/LaunchAgents/` (root-level persistence) OR `~/Library/LaunchAgents/` (per-user) with the combination `RunAtLoad=true` and `KeepAlive=true` AND a `ProgramArguments` / `Program` pointing at `/tmp`, `/var/tmp`, `/Users/Shared`, `/private/tmp`, or `/Library/Application Support/<non-standard-vendor>`. This is the exact T1543.004 persistence primitive used by XCSSET, Shlayer, Banshee, LightSpy, and the 2024 BlueNoroff RustDoor / KANDYKORN campaigns - the LaunchDaemon is re-spawned forever by `launchd(8)` and survives reboots and user logout."
