  - id: "gcp_storage_bucket_without_access_logging"
    category: "operational_security"
    severity: "MEDIUM"
    title: "GCP Cloud Storage Bucket Without Access Logging (logging:/logBucket: unset)"
    description: "A `google.cloud.gcp_storage_bucket` task creates a bucket without a `logging:` block (sub-keys `log_bucket:` and `log_object_prefix:`). GCS-side access logs (who-read-what, who-wrote-what, from which IP) are not emitted to a sink bucket. Forensic investigation of a data-exfil incident has no direct evidence trail at the storage layer - you'd have to reconstruct from VPC-Flow + Cloud Audit Logs, which typically miss object-level authenticated GET/HEAD operations from external identities."
    regex: "(?ms)google\\.cloud\\.gcp_storage_bucket\\s*:\\s*\\n(?:(?!logging\\s*:)[\\s\\S]){0,2000}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
        google.cloud.gcp_storage_bucket:
            name: ansible-storage-module
    multiline: true
    window: 60
    recommendation: "Add to every bucket: `logging: {log_bucket: 'gcs-access-logs-<project>', log_object_prefix: 'access-logs/<bucket>'}`. The sink bucket must be in the same project and grant `group:cloud-storage-analytics@google.com` write access (documented in GCS logging docs). For richer telemetry, also enable `Data Access audit logs` for `storage.googleapis.com` in Cloud Audit Logs (captures authenticated reads). Enforce via Organization Policy `constraints/storage.uniformBucketLevelAccess: enforced` plus a custom `constraints/storage.requireAccessLogging` via Custom Org Policy (Preview). Monitor compliance with `gcloud storage buckets describe gs://<b> --format='value(logging)'`."
    cwe: ['CWE-223', 'CWE-532', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1070', 'T1530', 'T1562.008']
    cis_controls: ['CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-12', 'SI-4']
    pci_dss: ['10.2.1', '10.7']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "aws_eks_cluster_control_plane_logging_disabled"
    category: "operational_security"
    severity: "HIGH"
    title: "AWS EKS Cluster Created Without Control-Plane Logging (api/audit/authenticator)"
    description: "A `community.aws.eks_cluster` task creates an EKS cluster without `logging: {cluster_logging: [{types: ['api','audit','authenticator','controllerManager','scheduler'], enabled: true}]}` (or omits the `logging:` block entirely - the AWS default for all five log types is DISABLED). Without the `audit` stream, there is no way to reconstruct `kubectl` requests to the API server - so detecting credential compromise, privilege escalation via RBAC, or `exec`/`attach` into pods is impossible. Incident-response runbooks for the 2023 tj-actions/changed-files compromise and the 2024 UNC5221 EKS campaign both explicitly depended on the audit log."
    regex: "(?ms)community\\.aws\\.eks_cluster\\s*:\\s*\\n(?:(?!logging\\s*:\\s*[\\s\\S]{0,500}?audit[\\s\\S]{0,500}?enabled\\s*:\\s*true)[\\s\\S]){0,2000}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |-
        community.aws.eks_cluster:
        - name:
    multiline: true
    window: 70
    recommendation: "On every EKS cluster enable ALL FIVE control-plane log types by adding `logging: {cluster_logging: [{types: [api, audit, authenticator, controllerManager, scheduler], enabled: true}]}`. Ship the CloudWatch log group (`/aws/eks/<cluster>/cluster`) to your SIEM and build detections for: `userAgent` anomalies, `ResponseStatus.code >= 400` bursts (brute-force), `verb: exec|attach` from unexpected SAs, and `system:anonymous` requests. Enforce via AWS Config rule `eks-cluster-logging-enabled` and OPA/Kyverno at the IaC layer."
    cwe: ['CWE-223', 'CWE-532', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1552.007', 'T1562.008', 'T1609']
    cis_controls: ['CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-12', 'SI-4']
    pci_dss: ['10.2.1', '10.7']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "aws_rds_backup_retention_less_than_seven_days"
    category: "operational_security"
    severity: "MEDIUM"
    title: "AWS RDS Instance/Cluster with backup_retention_period < 7 Days (Recovery Exposure)"
    description: "An `amazon.aws.rds_instance` / `community.aws.rds_cluster` task sets `backup_retention_period:` to `0` (automated backups disabled entirely) or a value below `7` days. A 0-day retention prevents point-in-time-recovery (PITR) altogether - a ransomware event or accidental `DROP TABLE` is unrecoverable. A 1-6 day retention window means if an attacker poisons data and the compromise isn't noticed for > retention (common for slow-moving fraud / data tampering), the only clean snapshots have already expired. PCI-DSS 10.5.5, HIPAA 164.308(a)(7)(ii)(A), and CIS AWS 2.3.2 mandate ≥7 days."
    regex: "(?ms)(?:amazon\\.aws\\.rds_instance|community\\.aws\\.rds_cluster)\\s*:[\\s\\S]{0,2500}?backup_retention_period\\s*:\\s*['\"]?(?:0|1|2|3|4|5|6)['\"]?(?:\\s|$)"
    positive_examples:
      - |2-
        amazon.aws.rds_instance:
                id: "{{ instance_id }}"
                state: present
                allocated_storage: "{{ io2_modified_allocated_storage }}"
                storage_type: "{{ new_storage_type }}"
                db_instance_class: "{{ modified_db_instance_class }}"
                backup_retention_period: 2
    multiline: true
    window: 60
    recommendation: "Set `backup_retention_period: 35` (AWS maximum without using AWS Backup) on every production database, 7 minimum for non-prod. Combine with `delete_automated_backups: false` to retain backups after an instance is deleted (protects against malicious `aws rds delete-db-instance`). For regulated workloads, layer AWS Backup with Vault Lock (governance or compliance mode) for WORM-protected snapshots. Enforce via AWS Config rule `db-instance-backup-enabled` + `rds-cluster-deletion-protection-enabled`."
    cwe: ['CWE-404', 'CWE-693', 'CWE-799']
    owasp_appsec: ["A04:2021"]
    mitre_attack: ['T1485', 'T1490']
    cis_controls: ['CIS-11.2', 'CIS-11.3']
    nist_controls: ['CP-9', 'CP-10']
    pci_dss: ['10.5.5', '12.10.1']
    hipaa: ['164.308(a)(7)(ii)(A)']
    soc2: ['A1.2', 'CC7.4']

  - id: "aws_lambda_function_xray_tracing_disabled"
    category: "operational_security"
    severity: "LOW"
    title: "AWS Lambda Function Without X-Ray Tracing (tracing_config.mode != Active)"
    description: "A `community.aws.lambda` / `amazon.aws.lambda` task deploys a function without `tracing_config: {mode: Active}` (AWS default is `PassThrough`, which means no traces unless an upstream caller already sampled - effectively off for most event-source-driven workloads like S3-events, SQS, DynamoDB-Streams). Without X-Ray segments, forensic investigation of supply-chain-injected or living-off-the-cloud Lambda backdoors has no call-graph: you can't see which AWS APIs the function invoked, which downstream services it pivoted into, or how long exfiltration ran."
    regex: "(?ms)(?:community\\.aws\\.lambda|amazon\\.aws\\.lambda)\\s*:\\s*\\n(?:(?!tracing_config\\s*:\\s*[\\s\\S]{0,200}?mode\\s*:\\s*['\"]?Active['\"]?)[\\s\\S]){0,2000}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
        amazon.aws.lambda:
              register: result
    multiline: true
    window: 60
    recommendation: "Set `tracing_config: {mode: Active}` on every Lambda. Grant the function's execution role `arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess` (or inline the three actions: `xray:PutTraceSegments`, `xray:PutTelemetryRecords`, `xray:GetSamplingRules`). Ship X-Ray traces to CloudWatch + your observability platform; build detections for anomalous AWS-SDK calls (e.g. `iam:CreateAccessKey`, `s3:GetObject` from an unexpected bucket). Enforce via AWS Config custom rule or OPA at the IaC layer."
    cwe: ['CWE-223', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1562.008', 'T1578.005']
    cis_controls: ['CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-12', 'SI-4']
    pci_dss: ['10.2.1', '10.2.7']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "aws_autoscaling_group_without_elb_health_check"
    category: "operational_security"
    severity: "LOW"
    title: "AWS Auto Scaling Group Attached to Load Balancer but Using EC2 Health Check"
    description: "An `amazon.aws.autoscaling_group` task references `load_balancers:` or `target_group_arns:` but sets `health_check_type: EC2` (the AWS default) or omits `health_check_type:` entirely. EC2 health checks only consider whether the EC2 instance is `running` at the hypervisor level - they cannot detect an application-layer failure (process crash, port no longer listening, 500-error storm, deadlocked event-loop). A ransomware payload that disables the app but leaves the VM running will keep the unhealthy instance in rotation, serving attacker content OR dropping traffic, while CloudWatch alarms stay green."
    regex: "(?ms)amazon\\.aws\\.autoscaling_group\\s*:[\\s\\S]{0,2500}?(?:load_balancers|target_group_arns)\\s*:(?:(?!health_check_type\\s*:\\s*['\"]?ELB['\"]?)[\\s\\S]){0,1500}?(?:^\\s*- name:|^-\\s*name:|\\Z)"
    positive_examples:
      - |2-
        amazon.aws.autoscaling_group:
                name: "{{ resource_prefix }}-asg"
                launch_config_name: "{{ resource_prefix }}-lc"
                health_check_type: ELB
                desired_capacity: 1
                min_size: 1
                max_size: 1
                health_check_period: 300
                vpc_zone_identifier: "{{ testing_subnet.subnet.id }}"
                load_balancers: "{{ ec2_asg_load_balancer_name }}"
                wait_for_instances: true
    multiline: true
    window: 70
    recommendation: "Set `health_check_type: ELB` + `health_check_grace_period: 300` on every ASG that is behind a load-balancer. Define meaningful LB target-group health checks (application-layer HTTP path, non-200 threshold, matcher `200-299`). Combine with CloudWatch alarms on `UnHealthyHostCount` > 0 for 2 consecutive periods - alert your on-call. Enforce via AWS Config custom rule and/or OPA/Kyverno at the IaC layer."
    cwe: ['CWE-404', 'CWE-754']
    mitre_attack: ['T1485', 'T1499']
    cis_controls: ['CIS-11.2']
    nist_controls: ['CP-10', 'SI-4']
    pci_dss: ['10.6.1']
    hipaa: ['164.308(a)(7)(ii)(A)']
    soc2: ['A1.2']

  - id: "aws_config_recorder_or_aggregator_missing_global_resource_types"
    category: "operational_security"
    severity: "MEDIUM"
    title: "AWS Config Recorder With Global-Resources Recording Disabled"
    description: "A `community.aws.config_recorder` task sets `recording_group.include_global_resource_types: false` OR enumerates `resource_types:` explicitly but omits IAM + CloudFront + Route53 + STS + Shield (the five global-scoped AWS resource families). AWS Config in that region loses visibility into every IAM permission change - the #1 signal for detecting compromised-credential abuse, role-chain pivoting, and SCP bypass attempts."
    regex: "(?ms)community\\.aws\\.config_recorder\\s*:[\\s\\S]{0,2000}?recording_group\\s*:[\\s\\S]{0,1000}?include_global_resource_types\\s*:\\s*(?:false|False|no|No|0)\\b"
    positive_examples:
      - "community.aws.config_recorder:recording_group:include_global_resource_types:false"
    multiline: true
    window: 60
    recommendation: "Set `include_global_resource_types: true` AND `all_supported: true` on at least ONE region's Config Recorder (typically `us-east-1` - IAM is global but surfaces there). Also make sure multi-region aggregation is on: deploy an organization-level AWS Config aggregator with `all_aws_regions: true`. Stream to a centralized S3 bucket with object-lock + a dedicated audit account. Enforce with AWS Config conformance pack `Operational-Best-Practices-for-AWS-Config`."
    cwe: ['CWE-223', 'CWE-778']
    owasp_appsec: ["A09:2021"]
    owasp_asvs: [V16.2.5, V16.3.1]
    mitre_attack: ['T1098', 'T1526', 'T1562.008']
    cis_controls: ['CIS-8.5', 'CIS-8.11']
    nist_controls: ['AU-2', 'AU-12', 'CA-7']
    pci_dss: ['10.2.1', '10.7']
    hipaa: ['164.312(b)']
    soc2: ['CC7.2']

  - id: "aws_cloudtrail_without_log_file_validation"
    category: "operational_security"
    severity: "HIGH"
    title: "AWS CloudTrail with Log File Validation Disabled (enable_log_file_validation: false)"
    description: "An `amazon.aws.cloudtrail` / `community.aws.cloudtrail` task creates/updates a trail with `enable_log_file_validation: false` (or omits it - AWS default is false). Without log-file-validation, an attacker who gains `s3:PutObject` + `s3:DeleteObject` on the trail bucket (via role compromise or misconfigured bucket policy) can silently modify or delete individual CloudTrail log files to cover their tracks, and downstream consumers have no way to detect the tampering. CIS AWS Benchmark 3.2 explicitly requires validation enabled."
    regex: "(?ms)(?:amazon\\.aws\\.cloudtrail|community\\.aws\\.cloudtrail)\\s*:(?:(?:[\\s\\S]{0,2000}?enable_log_file_validation\\s*:\\s*(?:false|False|no|No|0)\\b)|(?:(?!enable_log_file_validation\\s*:)[\\s\\S]){0,2000}?state\\s*:\\s*['\"]?(?:present|enabled)['\"]?(?:(?!enable_log_file_validation\\s*:|^\\s*- name:|^-\\s*name:)[\\s\\S]){0,800}?(?:^\\s*- name:|^-\\s*name:|\\Z))"
    positive_examples:
      - |2-
        amazon.aws.cloudtrail:
              s3_bucket_name: "{{ s3_bucket_name }}"
              region: "{{ aws_region }}"
          block:
          # ============================================================
          #   Argument Tests
          # ============================================================
            - name: S3 Bucket required when state is "present"
              module_defaults: { amazon.aws.cloudtrail: {}}
              amazon.aws.cloudtrail:
                state: present
    multiline: true
    window: 70
    recommendation: "Set `enable_log_file_validation: true` on every CloudTrail. Additionally: (1) write trails to a dedicated S3 bucket in a separate audit AWS account, (2) set the bucket policy to deny delete/put-object-acl to the source-account principals, (3) enable S3 Object Lock in compliance mode, (4) run `aws cloudtrail validate-logs --trail-arn ... --start-time ... --end-time ...` on a scheduled Lambda and alarm on any hash-mismatch. Enforce via AWS Config rule `cloud-trail-log-file-validation-enabled`."
    cwe: ['CWE-345', 'CWE-354', 'CWE-532']
    owasp_appsec: ["A08:2021", "A09:2021"]
    owasp_asvs: [V16.2.5]
    mitre_attack: ['T1070.002', 'T1070.004', 'T1562.008']
    cis_controls: ['CIS-8.3', 'CIS-8.5']
    nist_controls: ['AU-9', 'AU-9(3)', 'SI-7']
    pci_dss: ['10.3.4', '10.5.1']
    hipaa: ['164.312(b)', '164.312(c)(1)']
    soc2: ['CC7.2']

  - id: "aws_rds_instance_without_deletion_protection"
    category: "operational_security"
    severity: "MEDIUM"
    title: "AWS RDS Instance / Aurora Cluster Without Deletion Protection (deletion_protection: false)"
    description: "An `amazon.aws.rds_instance` / `community.aws.rds_cluster` task creates/updates an RDS DB instance or Aurora cluster with `deletion_protection: false` (or omits the flag - AWS default is `false`). A compromised IAM principal (or a misfired `delete-db-instance` CLI call during an incident-response drill) can permanently destroy the database in seconds; automated snapshots are also deleted unless `final_db_snapshot_identifier:` is passed at delete-time, which Ansible playbooks rarely do. For production RDS, deletion-protection is a last-line-of-defense against both ransomware (T1485) and insider-threat data-destruction. CIS AWS Benchmark 2.3.3."
    regex: "(?ms)(?:amazon\\.aws\\.rds_instance|community\\.aws\\.rds_cluster|community\\.aws\\.rds_instance)\\s*:[\\s\\S]{0,2500}?deletion_protection\\s*:\\s*(?:false|False|no|No|0)\\b"
    positive_examples:
      - |2-
        amazon.aws.rds_instance:
                id: "{{ instance_id }}"
                state: absent
                skip_final_snapshot: true
              register: result
              ignore_errors: true

            - ansible.builtin.assert:
                that:
                  - result.failed

            - name: Turn off deletion protection
              amazon.aws.rds_instance:
                id: "{{ instance_id }}"
                deletion_protection: false
    multiline: true
    window: 60
    recommendation: "Set `deletion_protection: true` on every production RDS / Aurora playbook. Also enable `backup_retention_period: 35` (max AWS allows without cross-region copy), `copy_tags_to_snapshot: true`, and `storage_encrypted: true` with a customer-managed KMS key. For cross-region disaster recovery, configure automated cross-region snapshot copy via `aws backup` plans. Enforce via AWS Config rule `rds-instance-deletion-protection-enabled` / `rds-cluster-deletion-protection-enabled` and Service Control Policy denying `rds:DeleteDBInstance` without `rds:DeletionProtection` = true."
    cwe: ['CWE-404', 'CWE-693']
    mitre_attack: ['T1485', 'T1490']
    cis_controls: ['CIS-11.2', 'CIS-11.3']
    nist_controls: ['CP-9', 'CP-10', 'SI-13']
    pci_dss: ['10.5.5', '12.10.1']
    hipaa: ['164.308(a)(7)(ii)(A)']
    soc2: ['A1.2', 'CC7.4']

  - id: "aws_ec2_instance_not_ebs_optimized"
    category: "operational_security"
    severity: "LOW"
    title: "amazon.aws.ec2_instance With ebs_optimized: false (Degraded I/O + Noisy-Neighbor Susceptibility)"
    description: "An `amazon.aws.ec2_instance` task sets `ebs_optimized: false` (or omits it on an instance family where it's not default-on, such as pre-2018 c4/m4 types with custom network stacks). EBS-optimization dedicates a network pipe for EBS traffic; without it, EBS I/O and VPC traffic contend for the same ENI bandwidth, making the instance susceptible to side-channel timing observation from noisy-neighbor tenants on the same Nitro slot (per AWS re:Inforce 2023 session SEC304). More importantly for security - not just perf - EBS-optimized instances are a prerequisite for many AWS Backup fast-restore SLAs, so disabling this key also weakens your RTO commitments."
    regex: "(?ms)(?:amazon\\.aws\\.ec2_instance|community\\.aws\\.ec2|^[\\t ]*ec2(?:_instance)?)\\s*:[\\s\\S]{0,1500}?\\bebs_optimized\\s*:\\s*(?:false|False|no|No|0)\\b"
    positive_examples:
      - |2-
        ec2_instance:
                # ...
                ebs_optimized: false
    multiline: true
    window: 50
    recommendation: "Set `ebs_optimized: true` for all production EC2 instances. All current-generation Nitro-based instance types (m5/m6/m7, c5/c6/c7, r5/r6/r7, t3/t3a/t4g) have EBS-optimized enabled by default and at zero additional cost - explicitly passing `ebs_optimized: false` is actively harmful. Legacy families (m4.10xlarge and smaller, c4) charge a small hourly surcharge; budget owners should still enable it for IOPS-sensitive workloads."
    cwe: ['CWE-400', 'CWE-770']
    owasp_asvs: []
    mitre_attack: ['T1499', 'T1499.004']
    cis_controls: ['CIS-13.11']
    nist_controls: ['CP-2', 'SC-5']
    pci_dss: ['12.10.1']
    hipaa: ['164.308(a)(7)(i)']
    soc2: ['A1.2']
