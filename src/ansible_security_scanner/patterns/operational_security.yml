    recommendation: "Leave Gatekeeper enabled: `spctl --master-enable`, `defaults delete com.apple.LaunchServices LSQuarantine`, and re-arm via `spctl --assess --verbose=4 /Applications`. For internal unsigned tools use the correct path: Developer ID + notarization (`xcrun notarytool submit`), NOT disabling Gatekeeper fleet-wide. Enforce via MDM `com.apple.systempolicy.control` payload with `DisableOverride = true`. Monitor via `spctl --status` in a Jamf/Kandji extension-attribute."
