  - id: "windows_restrict_anonymous_zero"
    category: "operational_security"
    severity: "HIGH"
    title: "RestrictAnonymous / RestrictAnonymousSAM Set To 0 (Anonymous SAM Enumeration)"
    description: "A task writes `HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Lsa\\RestrictAnonymous` = `0` OR `RestrictAnonymousSAM` = `0` OR `EveryoneIncludesAnonymous` = `1`. With these values, anonymous (unauthenticated) connections can enumerate SAM accounts, shares, and group memberships via SAMR/LSARPC - the primary source for `enum4linux` / `rpcclient` / `NetExec --users` reconnaissance that precedes every Windows pentest and real intrusion. Windows 2000+ defaults to `1` (restrict) and Windows 10+ / Server 2016+ defaults to `2` (strict) - rolling back to `0` is unambiguously a regression."
    regex: "win_regedit[\\s\\S]{0,300}?(?:Control\\\\Lsa|Lsa)[\\s\\S]{0,400}?(?:RestrictAnonymous(?:SAM)?|EveryoneIncludesAnonymous)[\\s\\S]{0,80}?(?:data|value)\\s*:\\s*(?:0|1)\\b|(?:RestrictAnonymous(?:SAM)?|EveryoneIncludesAnonymous)\\s*[=:]\\s*REG_DWORD:0x0*(?:0|1)\\b"
