  - id: "macos_tcc_db_reset_or_mutation"
    category: "operational_security"
    severity: "HIGH"
    title: "macOS TCC Privacy Database Mutated Or Reset (Consent Bypass)"
    description: "A task calls `tccutil reset <service>` / `tccutil reset All` OR directly mutates `/Library/Application Support/com.apple.TCC/TCC.db` or `~/Library/Application Support/com.apple.TCC/TCC.db` via sqlite3 / cp. TCC is Apple's Transparency-Consent-and-Control framework that gates access to Screen Recording, Full Disk Access, Camera, Microphone, Accessibility, and Location Services. Mutating TCC.db directly is the canonical macOS privacy-bypass primitive exploited by CVE-2020-9771, CVE-2022-32800, CVE-2023-40424, and by every stealer family targeting macOS in 2023-2024 (Atomic, RealSt, Cuckoo) to grant themselves Full Disk Access without triggering a user prompt."
    regex: "(?:tccutil\\s+reset\\s+(?:All|AppleEvents|Accessibility|ScreenCapture|SystemPolicyAllFiles|SystemPolicyDesktopFolder|Camera|Microphone|ListenEvent|PostEvent)|(?:sqlite3|sqlite)\\s+[^\\s]*TCC\\.db|(?:cp|install|mv)\\s+[^\\s]+\\s+[^\\s]*com\\.apple\\.TCC/TCC\\.db)"
