baseURL = "/"
languageCode = "en-us"
title = "Ansible Security Scanner"
theme = "hugo-theme-relearn"

uglyURLs = false
enableGitInfo = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  author = "Chris Peoples"
  description = "Static SAST scanner for Ansible playbooks, roles, collections, and inventories. Detects malicious code, RCE, command and template injection, hardcoded credentials, supply-chain risk, unauthorized cloud access, lateral movement, and reverse shells. Outputs SARIF, CycloneDX SBOM, GitLab SAST, JUnit, JSON, HTML, and Markdown reports with remediation guidance. Findings map to CWE, OWASP Top 10, OWASP ASVS, MITRE ATT&CK, NIST, and CIS."

  themeVariant = ["relearn-dark", "relearn-light"]
  themeVariantAuto = ["relearn-dark", "relearn-light"]
  themeVariantDefault = "relearn-dark"

  search = true
  searchMaxResultLength = 20

  disableBreadcrumb = false
  disableNextPrev = false

  collapsibleMenu = true
  alwaysopen = false

  externalLinkTarget = "_blank"

  sidebarmenus = [
    { type = "page", identifier = "main", disableTitle = true, pageRef = "/" },
    { type = "menu", identifier = "shortcuts", disableTitle = true }
  ]

  customCSS = ["css/custom.css"]
  customJS = ["js/custom.js"]

  showVisitedLinks = false
  print = true
  printPageBreak = true

  [[params.boxStyle]]
    identifier = "note"
    color = "#3b82f6"

[[menu.shortcuts]]
  pre = '<i class="fa-fw fab fa-github"></i> '
  name = "GitHub Repo"
  url = "https://github.com/cpeoples/ansible-security-scanner"
  weight = 10

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = true
    lineNumbersInTable = true
    style = "monokai"
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true
      title = true
