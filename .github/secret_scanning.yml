# Secret-scanning path exclusions. See README's "Security" section for
# why these paths are structurally required to contain credential-shaped
# strings; reject any new entries that don't have the same justification.

paths-ignore:
  # Negative fixtures for the regression suite (deliberate fake creds).
  - "tests/playbooks/bad_example.yml"
  - "tests/playbooks/multi_example_bad/**"

  # Rule-pack `vulnerable_examples:` blocks - documentation, not config.
  - "src/ansible_security_scanner/patterns/**"
