# Dependabot config. See README's "Security" section for context.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: ci
      include: scope
    # Bundle every action bump into one PR. The ecosystem releases in
    # waves (Node 24 transition is the canonical example); reviewing one
    # PR with eight bumps is much cheaper than reviewing eight PRs.
    groups:
      github-actions:
        patterns: ["*"]
