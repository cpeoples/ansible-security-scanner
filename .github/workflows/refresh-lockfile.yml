name: Refresh CI tooling lockfile

# Dependabot can't run pip-compile, so this regenerates the hash-locked
# constraints.txt from constraints.in on a weekly schedule.

on:
  schedule:
    - cron: "0 11 * * 1"  # Monday 06:00 America/New_York (11:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install --require-hashes -c .github/workflows/constraints.txt pip pip-tools

      - name: Recompile lockfile
        run: |
          pip-compile \
            --generate-hashes \
            --strip-extras \
            --allow-unsafe \
            --output-file=.github/workflows/constraints.txt \
            .github/workflows/constraints.in

      - name: Open PR if lockfile changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: "Refresh CI tooling lockfile"
          title: "Refresh CI tooling lockfile"
          body: |
            Weekly regeneration of `.github/workflows/constraints.txt` from
            `.github/workflows/constraints.in` via `pip-compile`.
          branch: refresh-ci-lockfile
          delete-branch: true
          add-paths: .github/workflows/constraints.txt
