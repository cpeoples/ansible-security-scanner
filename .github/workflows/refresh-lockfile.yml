name: Refresh CI tooling lockfile

# Dependabot can't run pip-compile, so this regenerates the hash-locked
# constraints.txt from constraints.in on a weekly schedule.

on:
  schedule:
    - cron: "0 11 * * 1"  # Monday 06:00 America/New_York (11:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install --require-hashes -c .github/constraints.txt pip pip-tools

      - name: Recompile lockfile
        run: |
          pip-compile \
            --generate-hashes \
            --strip-extras \
            --allow-unsafe \
            --output-file=.github/constraints.txt \
            .github/constraints.in

      - name: Open PR if lockfile changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: "Refresh CI tooling lockfile"
          title: "Refresh CI tooling lockfile"
          body: |
            Weekly regeneration of `.github/constraints.txt` from
            `.github/constraints.in` via `pip-compile`.
          branch: refresh-ci-lockfile
          delete-branch: true
          add-paths: .github/constraints.txt
          sign-commits: true
