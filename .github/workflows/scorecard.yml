name: Scorecard analysis

# OpenSSF Scorecard runs weekly against the default branch and on every
# push to main. Results are published to api.scorecard.dev via
# ``publish_results: true``; that's what powers the README badge.

on:
  push:
    branches: [main]
  schedule:
    # Weekly, Saturday 01:30 UTC. Out-of-band with the rest of CI so a
    # bad result doesn't block a release.
    - cron: "30 1 * * 6"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
