name: Scanner CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/scanner-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/scanner-ci.yml"
  workflow_dispatch:

concurrency:
  group: scanner-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # hatch-vcs needs full history for version resolution

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable) + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run scanner unit + regression tests
        run: pytest tests/ -v

  build:
    name: Build distribution (dry run)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata with twine
        run: twine check --strict dist/*

      - name: Upload dist artifacts (for inspection)
        uses: actions/upload-artifact@v7
        with:
          name: scanner-dist-preview
          path: dist/*
          retention-days: 7
          if-no-files-found: error
