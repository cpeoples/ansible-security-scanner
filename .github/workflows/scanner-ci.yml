name: Scanner CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: scanner-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # hatch-vcs needs full history for version resolution
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable) + test deps
        run: |
          pip install --require-hashes -c .github/constraints.txt pip
          pip install -e ".[dev]"

      - name: Run scanner unit + regression tests
        run: pytest tests/ -v

  build:
    name: Build distribution (dry run)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install --require-hashes -c .github/constraints.txt build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata with twine
        run: twine check --strict dist/*

      - name: Upload dist artifacts (for inspection)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scanner-dist-preview
          path: dist/*
          retention-days: 7
          if-no-files-found: error

  snap:
    name: Build snap (dry run)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # need tags so `git describe` can resolve the version
          persist-credentials: false

      - name: Check for snap-relevant changes
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE_SHA" HEAD \
            | grep -qE '^(snap/|pyproject\.toml|src/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve snap version
        if: steps.changed.outputs.run == 'true'
        run: git describe --tags --abbrev=0 | sed 's/^v//' > snap/.version

      - name: Build snap
        id: build
        if: steps.changed.outputs.run == 'true'
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79  # v1.3.0

      - name: Install and smoke-test the snap
        if: steps.changed.outputs.run == 'true'
        env:
          SNAP_FILE: ${{ steps.build.outputs.snap }}
        run: |
          set -euo pipefail
          sudo snap install --dangerous --classic "$SNAP_FILE"
          ansible-security-scanner --version
