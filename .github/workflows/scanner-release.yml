name: Scanner Release

# Publishes ansible-security-scanner to TestPyPI and PyPI using
# PyPI's Trusted Publishing (OIDC) - no long-lived API tokens.
#
# Release flow:
#
#   1. Bump anything needed, merge to main.
#   2. `git tag -a v1.0.0 -m "Release 1.0.0" && git push origin v1.0.0`
#   3. On GitHub -> Releases -> "Draft a new release" -> pick that tag
#      -> "Publish release".
#   4. Pipeline: build -> testpypi -> smoke-test -> pypi -> sign-and-attest.
#      A TestPyPI failure short-circuits prod. The `pypi` environment
#      requires reviewer approval (see repo Settings -> Environments).
#
# Dry-run to TestPyPI: workflow_dispatch with publish_pypi=false.
#
# PyPI trusted-publisher form values:
#   Project           : ansible-security-scanner
#   Owner             : cpeoples
#   Repository        : ansible-security-scanner
#   Workflow          : scanner-release.yml
#   Environment       : pypi   (also add a 'testpypi' publisher)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish to production PyPI (false = TestPyPI only)"
        type: boolean
        default: false

concurrency:
  group: scanner-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history + tags so hatch-vcs can resolve the version.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install --require-hashes -c .github/workflows/constraints.txt build twine cyclonedx-bom

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check --strict dist/*

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p sbom
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --upgrade pip
          /tmp/sbom-venv/bin/pip install dist/*.whl
          python -m cyclonedx_py environment \
            --of JSON \
            --output-reproducible \
            --pyproject pyproject.toml \
            --mc-type application \
            -o "sbom/${{ github.event.release.tag_name || 'sbom' }}.cdx.json" \
            /tmp/sbom-venv

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scanner-dist
          path: dist/*
          if-no-files-found: error

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scanner-sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ansible-security-scanner
    permissions:
      id-token: write

    steps:
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scanner-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # idempotent retries

  smoke-test:
    name: Smoke test from TestPyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install from TestPyPI (with PyPI fallback for PyYAML etc.)
        run: |
          # Retry: TestPyPI's index can lag a few seconds behind the upload.
          for i in 1 2 3 4 5; do
            if python -m pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                ansible-security-scanner; then
              exit 0
            fi
            echo "Install attempt $i failed; retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: CLI entry point works
        run: ansible-security-scanner --help

      - name: Pattern YAMLs are packaged
        run: |
          python - <<'PY'
          import importlib.resources as r
          files = list(r.files("ansible_security_scanner.patterns").iterdir())
          yml = [f for f in files if f.name.endswith(".yml")]
          assert len(yml) >= 25, f"Expected bundled pattern YAMLs, got {len(yml)}"
          print(f"OK: {len(yml)} pattern files bundled in wheel")
          PY

      - name: All 11 formatters are importable (including CycloneDX)
        run: |
          python - <<'PY'
          from ansible_security_scanner.formatters import (
              MarkdownFormatter, JSONFormatter, XMLFormatter, YAMLFormatter,
              CSVFormatter, HTMLFormatter, JUnitFormatter, SARIFFormatter,
              CycloneDXFormatter,
          )
          from ansible_security_scanner.utils import get_formatter_class
          assert get_formatter_class("cyclonedx") is CycloneDXFormatter
          assert get_formatter_class("sbom") is CycloneDXFormatter
          print("OK: all formatters importable; cyclonedx + sbom aliases wired")
          PY

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: smoke-test
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true)
    environment:
      name: pypi
      url: https://pypi.org/p/ansible-security-scanner
    permissions:
      id-token: write

    steps:
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scanner-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  sign-and-attest:
    name: Sign + attest artifacts
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: github.event_name == 'release'
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scanner-dist
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: scanner-sbom
          path: sbom/

      - name: Generate SLSA build provenance
        id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: "dist/*"

      - name: Stage provenance bundle for release upload
        run: cp "${{ steps.provenance.outputs.bundle-path }}" "dist/${{ github.event.release.tag_name }}.intoto.jsonl"

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc  # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl ./sbom/*.cdx.json

      - name: Attach signed artifacts + signatures to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.tar.gz \
            dist/*.whl \
            dist/*.sigstore.json \
            dist/*.intoto.jsonl \
            sbom/*.cdx.json \
            sbom/*.sigstore.json \
            --clobber
