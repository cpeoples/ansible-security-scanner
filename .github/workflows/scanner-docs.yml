name: Build & Deploy Scanner Docs

on:
  push:
    branches: [main]
    paths:
      - "src/ansible_security_scanner/patterns/**"
      - ".hugo/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/scanner-docs.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PIP_CONSTRAINT: ${{ github.workspace }}/.github/workflows/constraints.txt

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install --require-hashes -c "$PIP_CONSTRAINT" pyyaml

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Generate Hugo content from patterns
        env:
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url || '/' }}
        run: python .hugo/scripts/build_docs.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78  # v3
        with:
          hugo-version: "0.141.0"
          extended: true

      - name: Verify Hugo theme submodule
        working-directory: .hugo
        run: |
          if [ ! -f "themes/hugo-theme-relearn/layouts/_default/baseof.html" ]; then
            echo "ERROR: Theme submodule not populated. Did actions/checkout run with submodules: recursive?"
            exit 1
          fi

      - name: Build Hugo site
        working-directory: .hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url || '/' }}"

          if [ ! -f public/index.html ]; then
            echo "ERROR: Hugo build failed - no index.html generated"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: .hugo/public

  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
